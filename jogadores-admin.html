<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogadores ADM - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0b1f3a;
  --bg-dark:#08172c;
  --card:#102a52;
  --card-hover:#153766;
  --gold:#f7c600;
  --gold-soft:rgba(247,198,0,.12);
  --gold-line:rgba(247,198,0,.24);
  --white:#ffffff;
  --muted:#d8e1ef;
  --shadow:0 8px 22px rgba(0,0,0,.28);
  --transition:.25s ease;
  --max:1240px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(11,31,58,.88), rgba(11,31,58,.94)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
}

a{text-decoration:none;color:inherit;transition:var(--transition)}
button{font-family:inherit;cursor:pointer;transition:var(--transition);border:none;background:none}
input,select{font-family:inherit}

.wrap{width:min(100% - 28px, var(--max));margin:0 auto}

header{
  background:rgba(8,23,44,.96);
  border-bottom:3px solid var(--gold);
  box-shadow:var(--shadow);
}

.header-top{
  min-height:82px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  padding:14px 0;
}

.header-left,.header-right{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.header-title{
  flex:1;
  text-align:center;
  font-size:24px;
  font-weight:700;
}

.top-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:10px 16px;
  border-radius:10px;
  font-weight:700;
  white-space:nowrap;
}

.btn-light{background:#fff4cf;color:#111}
.btn-light:hover{background:var(--gold);transform:translateY(-2px)}
.btn-gold{background:var(--gold);color:#111}
.btn-gold:hover{filter:brightness(1.04);transform:translateY(-2px)}

.nav-bar{
  background:rgba(16,42,82,.95);
  border-top:1px solid rgba(255,255,255,.06);
  border-bottom:1px solid rgba(255,255,255,.08);
}

.menu{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:12px 0;
  flex-wrap:wrap;
}

.menu a{
  color:white;
  font-weight:700;
  font-size:14px;
  background:#0d2346;
  padding:10px 14px;
  border-radius:10px;
  border:1px solid transparent;
  white-space:nowrap;
}

.menu a:hover{
  color:var(--gold);
  background:var(--gold-soft);
  border-color:var(--gold-line);
}

.menu a.ativo{
  background:var(--gold);
  color:black;
}

.container{padding:24px 0 34px}

.hero,.form-panel{
  background:linear-gradient(135deg,#102a52,#0d2346);
  border:1px solid var(--gold-line);
  border-radius:18px;
  padding:22px;
  margin-bottom:20px;
  box-shadow:var(--shadow);
}

.hero h2{
  margin:0 0 8px;
  color:var(--gold);
  font-size:28px;
}

.hero p{
  margin:0;
  color:var(--muted);
  line-height:1.6;
  font-size:15px;
}

.form-title{
  color:var(--gold);
  font-size:20px;
  margin-bottom:14px;
  font-weight:900;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

label{
  display:block;
  font-size:13px;
  font-weight:900;
  margin-bottom:6px;
  color:#fff;
}

input,select{
  width:100%;
  padding:13px;
  border:none;
  border-radius:10px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
}

.preview-foto{
  display:none;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-top:10px;
}

.preview-foto img{
  width:78px;
  height:78px;
  object-fit:cover;
  background:#fff;
  border-radius:50%;
  border:2px solid var(--gold);
}

.form-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  margin-bottom:20px;
}

.lista-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:14px;
}

.card{
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(12,33,64,.96));
  padding:16px;
  border-radius:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  border:1px solid rgba(255,230,0,.10);
  box-shadow:var(--shadow);
}

.player{
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
}

.photo{
  width:68px;
  height:68px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid rgba(255,255,255,.15);
  background:#fff;
  flex-shrink:0;
}

.player-info{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.nome-jogador{
  font-weight:700;
  font-size:18px;
  color:#fff;
}

.player-info small{
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}

.tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:4px;
}

.tag{
  background:#1a3f73;
  padding:5px 9px;
  border-radius:999px;
  font-size:12px;
  border:1px solid rgba(255,255,255,.08);
}

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.btn-acao{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:11px 14px;
  border-radius:10px;
  font-weight:700;
  font-size:13px;
  border:none;
  cursor:pointer;
}

.btn-ver{background:var(--gold);color:black}
.btn-danger{background:#d94141;color:#fff}

@media(max-width:900px){
  .form-grid,.filtros{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="wrap container">

<section class="form-panel">
<div class="form-title">Novo Jogador</div>

<div class="form-grid">

<div>
<label>Nome completo *</label>
<input id="nome">
</div>

<div>
<label>CPF *</label>
<input id="cpf">
</div>

<div>
<label>Data de nascimento *</label>
<input id="nascimento" type="date">
</div>

<div>
<label>Email *</label>
<input id="email" type="email">
</div>

<div>
<label>WhatsApp *</label>
<input id="whatsapp">
</div>

<div>
<label>Número da camisa</label>
<input id="numero" type="number">
</div>

</div>

<div class="form-actions">
<button class="btn-acao btn-ver" onclick="salvarJogador()">
Salvar Jogador
</button>
</div>

</section>

</div>

<script type="module">
import { db } from "./firebase.js";
import {
collection,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

window.salvarJogador = async function(){

const nome = document.getElementById("nome").value.trim();
const cpf = document.getElementById("cpf").value.trim();
const nascimento = document.getElementById("nascimento").value;
const email = document.getElementById("email").value.trim();
const whatsapp = document.getElementById("whatsapp").value.trim();

if(!nome){
alert("Digite o nome.");
return;
}

if(!cpf){
alert("CPF obrigatório.");
return;
}

if(!nascimento){
alert("Data de nascimento obrigatória.");
return;
}

if(!email){
alert("Email obrigatório.");
return;
}

if(!whatsapp){
alert("WhatsApp obrigatório.");
return;
}

await addDoc(collection(db,"jogadores"),{
nome,
cpf,
nascimento,
email,
whatsapp,
criadoEm:serverTimestamp()
});

alert("Jogador cadastrado com sucesso.");
}
</script>

</body>
</html>
