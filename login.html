<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Liga Goiana</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(rgba(2,10,25,.75), rgba(2,10,25,.9)), url("fundo.png");
      background-size:cover;
      background-position:center;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      padding:20px 0;
    }

    .box{
      width:100%;
      max-width:420px;
      background:rgba(3,16,34,.92);
      border:1px solid rgba(255,230,0,.18);
      border-radius:18px;
      padding:28px;
      box-shadow:0 12px 28px rgba(0,0,0,.35);
    }

    h1{
      margin:0 0 8px;
      color:#ffe600;
      text-align:center;
      text-transform:uppercase;
      font-size:28px;
    }

    p{
      margin:0 0 20px;
      text-align:center;
      color:#dbe3ee;
      line-height:1.5;
    }

    label{
      display:block;
      margin:12px 0 6px;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      box-sizing:border-box;
      font-size:14px;
    }

    .senha-wrap{
      position:relative;
      width:100%;
    }

    .senha-wrap input{
      padding-right:48px;
    }

    .toggle-senha{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      border:none;
      background:none;
      cursor:pointer;
      color:#444;
      font-size:18px;
      padding:0;
      width:auto;
      margin:0;
    }

    .btn-principal{
      width:100%;
      margin-top:18px;
      padding:13px;
      border:none;
      border-radius:10px;
      background:linear-gradient(to bottom, #fff04d, #ffd000);
      color:#111;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
    }

    .btn-principal:hover{
      filter:brightness(1.04);
    }

    .voltar{
      display:block;
      margin-top:14px;
      text-align:center;
      color:#ffe600;
      font-weight:bold;
      text-decoration:none;
    }

    .link-auxiliar{
      display:block;
      margin-top:14px;
      text-align:center;
      color:#dbe3ee;
      font-weight:bold;
      text-decoration:none;
    }

    .link-auxiliar:hover,
    .voltar:hover{
      text-decoration:underline;
    }

    .msg{
      margin-top:14px;
      padding:12px;
      border-radius:10px;
      display:none;
      font-weight:bold;
      line-height:1.5;
    }

    .erro{
      background:rgba(180,0,0,.22);
      color:#ffb0b0;
      border:1px solid rgba(255,120,120,.25);
    }

    .sucesso{
      background:rgba(0,120,40,.22);
      color:#b8ffd1;
      border:1px solid rgba(120,255,170,.25);
    }
  </style>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="box">
    <h1>Login</h1>
    <p>Entre para acessar o sistema</p>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Digite seu email">

    <label for="senha">Senha</label>
    <div class="senha-wrap">
      <input type="password" id="senha" placeholder="Digite sua senha">
      <button type="button" class="toggle-senha" onclick="alternarSenha('senha', this)">
        <i class="fa-solid fa-eye"></i>
      </button>
    </div>

    <button class="btn-principal" onclick="login()">Entrar</button>

    <div id="msgErro" class="msg erro"></div>
    <div id="msgSucesso" class="msg sucesso"></div>

    <a href="recuperar-senha.html" class="link-auxiliar">Esqueci minha senha</a>
    <a href="cadastro.html" class="voltar">Criar conta</a>
    <a href="index.html" class="voltar">← Voltar para o site</a>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import {
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import {
      doc,
      getDoc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const msgErro = document.getElementById("msgErro");
    const msgSucesso = document.getElementById("msgSucesso");

    function limparMensagens(){
      msgErro.style.display = "none";
      msgErro.innerText = "";
      msgSucesso.style.display = "none";
      msgSucesso.innerText = "";
    }

    function mostrarErro(texto){
      msgSucesso.style.display = "none";
      msgErro.style.display = "block";
      msgErro.innerText = texto;
    }

    function mostrarSucesso(texto){
      msgErro.style.display = "none";
      msgSucesso.style.display = "block";
      msgSucesso.innerText = texto;
    }

    function normalizarTipo(tipo){
      if(!tipo) return "";

      const valor = String(tipo).trim().toLowerCase();

      if(valor === "publico_geral") return "torcedor";
      if(valor === "publico") return "torcedor";
      if(valor === "público") return "torcedor";
      if(valor === "torcedor") return "torcedor";
      if(valor === "pai_atleta") return "pai_atleta";
      if(valor === "jogador") return "jogador";
      if(valor === "tecnico") return "tecnico";
      if(valor === "técnico") return "tecnico";
      if(valor === "assistente") return "assistente";
      if(valor === "arbitro") return "arbitro";
      if(valor === "árbitro") return "arbitro";
      if(valor === "admin") return "admin";
      if(valor === "administrador") return "admin";

      return valor;
    }

    async function garantirRegistroBasico(uid, email){
      const userRef = doc(db, "usuarios", uid);
      const userSnap = await getDoc(userRef);

      if(userSnap.exists()){
        return userSnap;
      }

      await setDoc(userRef, {
        nome: "",
        email: email,
        cpf: "",
        tipoUsuario: "torcedor",
        time: "",
        status: "ativo",
        autorizado: false,
        aprovado: true,
        criadoEm: new Date().toISOString(),
        atualizadoEm: new Date().toISOString()
      });

      return await getDoc(userRef);
    }

    window.alternarSenha = function(idInput, botao){
      const input = document.getElementById(idInput);
      const icone = botao.querySelector("i");

      if(input.type === "password"){
        input.type = "text";
        icone.className = "fa-solid fa-eye-slash";
      }else{
        input.type = "password";
        icone.className = "fa-solid fa-eye";
      }
    };

    window.login = async function(){
      limparMensagens();

      const email = document.getElementById("email").value.trim().toLowerCase();
      const senha = document.getElementById("senha").value.trim();

      if(!email){
        mostrarErro("Digite o email.");
        return;
      }

      if(!senha){
        mostrarErro("Digite a senha.");
        return;
      }

      try{
        const cred = await signInWithEmailAndPassword(auth, email, senha);
        const uid = cred.user.uid;

        const userSnap = await garantirRegistroBasico(uid, email);

        if(!userSnap.exists()){
          mostrarErro("Seu cadastro não foi encontrado no sistema.");
          return;
        }

        const dados = userSnap.data();

        const tipoUsuario = normalizarTipo(dados.tipoUsuario || dados.tipousuario || dados.tipo || "");
        const autorizado = dados.autorizado === true;
        const aprovado = dados.aprovado === true;
        const status = String(dados.status || "").trim().toLowerCase();

        if(status === "bloqueado"){
          mostrarErro("Seu acesso está bloqueado.");
          return;
        }

        if(tipoUsuario === "admin"){
          if(!autorizado || !aprovado){
            mostrarErro("Seu acesso de administrador não está liberado.");
            return;
          }

          mostrarSucesso("Login realizado com sucesso. Redirecionando...");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 600);
          return;
        }

        if(tipoUsuario === "arbitro"){
          if(!autorizado || !aprovado){
            mostrarErro("Seu acesso de árbitro ainda está pendente de autorização do administrador.");
            return;
          }

          mostrarSucesso("Login realizado com sucesso. Redirecionando...");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 600);
          return;
        }

        if(tipoUsuario === "assistente"){
          if(!aprovado){
            mostrarErro("Seu cadastro de assistente ainda está pendente de aprovação.");
            return;
          }

          mostrarSucesso("Login realizado com sucesso. Redirecionando...");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 600);
          return;
        }

        if(tipoUsuario === "tecnico"){
          if(!aprovado){
            mostrarErro("Seu cadastro de técnico ainda está pendente de aprovação.");
            return;
          }

          mostrarSucesso("Login realizado com sucesso. Redirecionando...");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 600);
          return;
        }

        if(tipoUsuario === "jogador"){
          if(!aprovado){
            mostrarErro("Seu cadastro de jogador ainda está pendente de aprovação.");
            return;
          }

          mostrarSucesso("Login realizado com sucesso. Redirecionando...");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 600);
          return;
        }

        if(tipoUsuario === "pai_atleta"){
          if(!aprovado){
            mostrarErro("Seu cadastro ainda está pendente de aprovação.");
            return;
          }

          mostrarSucesso("Login realizado com sucesso. Redirecionando...");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 600);
          return;
        }

        if(tipoUsuario === "torcedor" || !tipoUsuario){
          mostrarSucesso("Login realizado com sucesso. Redirecionando...");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 600);
          return;
        }

        mostrarSucesso("Login realizado com sucesso. Redirecionando...");
        setTimeout(() => {
          window.location.href = "index.html";
        }, 600);

      }catch(e){
        if(e.code === "auth/invalid-credential"){
          mostrarErro("Email ou senha inválidos.");
        }else if(e.code === "auth/invalid-email"){
          mostrarErro("Email inválido.");
        }else if(e.code === "auth/user-disabled"){
          mostrarErro("Este usuário foi desativado.");
        }else{
          mostrarErro("Erro ao entrar: " + e.message);
        }
      }
    };
  </script>

</body>
</html>
