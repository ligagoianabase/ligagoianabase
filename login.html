<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --red:#b42323;
  --green:#1b5e20;
  --shadow:0 14px 34px rgba(0,0,0,.38);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.box{
  width:100%;
  max-width:430px;
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.35);
  border-radius:20px;
  padding:28px;
  box-shadow:var(--shadow);
}

.logo{
  width:82px;
  height:82px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--gold);
  margin:0 auto 14px;
  background:#fff;
}

h1{
  color:var(--gold);
  text-align:center;
  font-size:28px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:6px;
}

p{
  color:var(--muted);
  text-align:center;
  font-size:14px;
  line-height:1.5;
  margin-bottom:20px;
}

label{
  display:block;
  margin:12px 0 6px;
  font-weight:900;
  font-size:13px;
  color:#fff;
}

input{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
  outline:none;
}

input:focus{
  outline:2px solid rgba(247,198,0,.65);
}

.senha-wrap{
  position:relative;
}

.senha-wrap input{
  padding-right:48px;
}

.toggle-senha{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  background:transparent;
  border:none;
  color:#333;
  font-size:18px;
  cursor:pointer;
}

.btn-principal{
  width:100%;
  margin-top:18px;
  padding:13px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  font-weight:900;
  font-size:15px;
  cursor:pointer;
}

.btn-principal:disabled{
  opacity:.65;
  cursor:not-allowed;
}

.links{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:9px;
  text-align:center;
}

.links a{
  color:var(--gold);
  font-weight:900;
  font-size:13px;
  text-decoration:none;
}

.links a:hover{
  text-decoration:underline;
}

.msg{
  margin-top:14px;
  padding:12px;
  border-radius:12px;
  display:none;
  font-weight:800;
  font-size:13px;
  line-height:1.45;
  text-align:center;
}

.erro{
  background:rgba(180,35,35,.22);
  color:#ffb0b0;
  border:1px solid rgba(255,120,120,.25);
}

.sucesso{
  background:rgba(27,94,32,.22);
  color:#b8ffd1;
  border:1px solid rgba(120,255,170,.25);
}
</style>
</head>

<body>

<div class="box">
  <img src="logo-liga.jfif" class="logo" onerror="this.style.display='none'">

  <h1>Login</h1>
  <p>Entre para acessar o sistema da Liga Goiana de Futebol de Base.</p>

  <label for="email">Email</label>
  <input type="email" id="email" placeholder="Digite seu email" autocomplete="email">

  <label for="senha">Senha</label>
  <div class="senha-wrap">
    <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">
    <button type="button" class="toggle-senha" onclick="alternarSenha()">
      <i class="fa-solid fa-eye" id="iconeSenha"></i>
    </button>
  </div>

  <button class="btn-principal" id="btnLogin" onclick="login()">
    Entrar
  </button>

  <div id="msgErro" class="msg erro"></div>
  <div id="msgSucesso" class="msg sucesso"></div>

  <div class="links">
    <a href="recuperar-senha.html">Esqueci minha senha</a>
    <a href="cadastro.html">Criar conta</a>
    <a href="index.html">← Voltar para o site</a>
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {
  doc,
  getDoc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const msgErro = document.getElementById("msgErro");
const msgSucesso = document.getElementById("msgSucesso");
const btnLogin = document.getElementById("btnLogin");

function limparMensagens(){
  msgErro.style.display = "none";
  msgErro.innerText = "";
  msgSucesso.style.display = "none";
  msgSucesso.innerText = "";
}

function mostrarErro(texto){
  msgSucesso.style.display = "none";
  msgErro.style.display = "block";
  msgErro.innerText = texto;
}

function mostrarSucesso(texto){
  msgErro.style.display = "none";
  msgSucesso.style.display = "block";
  msgSucesso.innerText = texto;
}

function normalizarTipo(tipo){
  return String(tipo || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g,"_");
}

async function garantirRegistroBasico(uid,email){
  const ref = doc(db,"usuarios",uid);
  const snap = await getDoc(ref);

  if(snap.exists()){
    return snap;
  }

  await setDoc(ref,{
    nome:"",
    email,
    cpf:"",
    tipoUsuario:"torcedor",
    status:"ativo",
    autorizado:false,
    aprovado:true,
    criadoEm:serverTimestamp(),
    atualizadoEm:serverTimestamp()
  });

  return await getDoc(ref);
}

window.alternarSenha = function(){
  const input = document.getElementById("senha");
  const icone = document.getElementById("iconeSenha");

  if(input.type === "password"){
    input.type = "text";
    icone.className = "fa-solid fa-eye-slash";
  }else{
    input.type = "password";
    icone.className = "fa-solid fa-eye";
  }
};

function redirecionar(){
  window.location.href = "index.html";
}

window.login = async function(){
  limparMensagens();

  const email = document.getElementById("email").value.trim().toLowerCase();
  const senha = document.getElementById("senha").value.trim();

  if(!email){
    mostrarErro("Digite o email.");
    return;
  }

  if(!senha){
    mostrarErro("Digite a senha.");
    return;
  }

  btnLogin.disabled = true;
  btnLogin.innerText = "Entrando...";

  try{
    const cred = await signInWithEmailAndPassword(auth,email,senha);
    const uid = cred.user.uid;

    const userSnap = await garantirRegistroBasico(uid,email);
    const dados = userSnap.data();

    const tipo = normalizarTipo(dados.tipoUsuario || dados.tipousuario || dados.tipo || dados.perfil || "");
    const status = normalizarTipo(dados.status || "ativo");
    const aprovado = dados.aprovado === true;
    const autorizado = dados.autorizado === true;

    if(status === "bloqueado" || status === "inativo"){
      mostrarErro("Seu acesso está bloqueado.");
      btnLogin.disabled = false;
      btnLogin.innerText = "Entrar";
      return;
    }

    if(tipo === "admin"){
      if(!aprovado || !autorizado){
        mostrarErro("Seu acesso de administrador ainda não está liberado.");
        btnLogin.disabled = false;
        btnLogin.innerText = "Entrar";
        return;
      }

      mostrarSucesso("Login realizado com sucesso.");
      setTimeout(redirecionar,600);
      return;
    }

    if(tipo === "arbitro"){
      if(!aprovado || !autorizado){
        mostrarErro("Seu acesso de árbitro ainda está pendente de autorização.");
        btnLogin.disabled = false;
        btnLogin.innerText = "Entrar";
        return;
      }

      mostrarSucesso("Login realizado com sucesso.");
      setTimeout(redirecionar,600);
      return;
    }

    if(tipo === "assistente" || tipo === "tecnico" || tipo === "jogador"){
      if(!aprovado){
        mostrarErro("Seu cadastro ainda está pendente de aprovação.");
        btnLogin.disabled = false;
        btnLogin.innerText = "Entrar";
        return;
      }

      mostrarSucesso("Login realizado com sucesso.");
      setTimeout(redirecionar,600);
      return;
    }

    mostrarSucesso("Login realizado com sucesso.");
    setTimeout(redirecionar,600);

  }catch(e){
    console.error(e);

    if(e.code === "auth/invalid-credential"){
      mostrarErro("Email ou senha inválidos.");
    }else if(e.code === "auth/invalid-email"){
      mostrarErro("Email inválido.");
    }else if(e.code === "auth/user-disabled"){
      mostrarErro("Este usuário foi desativado.");
    }else{
      mostrarErro("Erro ao entrar. Tente novamente.");
    }

    btnLogin.disabled = false;
    btnLogin.innerText = "Entrar";
  }
};

document.addEventListener("keydown",e=>{
  if(e.key === "Enter"){
    login();
  }
});
</script>

</body>
</html>
