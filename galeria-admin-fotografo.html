<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galeria / Fotógrafo - AGF</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0b1f3a;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --muted:#d9e3f2;
  --gold-line:rgba(247,198,0,.34);
  --shadow:0 8px 22px rgba(0,0,0,.28);
  --red:#d94141;
  --green:#1b8f43;
  --blue:#1a3f73;
  --max:1280px;
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  min-height:100%;
  overflow-x:hidden;
}

body{
  font-family:Arial,sans-serif;
  background:
    linear-gradient(rgba(11,31,58,.90),rgba(11,31,58,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
}

a{text-decoration:none;color:inherit}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer;border:none}

.wrap{
  width:min(100% - 28px,var(--max));
  margin:0 auto;
}

header{
  background:rgba(8,23,44,.96);
  border-bottom:3px solid var(--gold);
  box-shadow:var(--shadow);
}

.header-inner{
  min-height:84px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  padding:14px 0;
}

.header-left,
.header-right{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.header-title{
  flex:1;
  text-align:center;
  font-size:24px;
  font-weight:900;
  text-transform:uppercase;
}

.top-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:10px 16px;
  border-radius:10px;
  font-weight:900;
}

.btn-light{background:#fff4cf;color:#111}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111}
.btn-red{background:var(--red);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}

.container{padding:24px 0 34px}

.hero-panel,
.form-panel,
.list-panel{
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(12,33,64,.96));
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}

.hero-panel h2{
  font-size:28px;
  color:var(--gold);
  margin-bottom:8px;
}

.hero-panel p{
  color:var(--muted);
  line-height:1.6;
}

.bloco-titulo{
  margin:0 0 14px;
  color:var(--gold);
  font-size:18px;
  font-weight:900;
  display:flex;
  align-items:center;
  gap:8px;
}

.perfil-box{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}

.perfil-tag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 10px;
  border-radius:999px;
  background:rgba(247,198,0,.12);
  border:1px solid var(--gold-line);
  color:var(--gold);
  font-size:12px;
  font-weight:900;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.full{grid-column:1/-1}

label{
  display:block;
  margin:0 0 6px;
  font-weight:900;
  color:#eef4ff;
  font-size:13px;
}

input,select,textarea{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
  outline:none;
}

textarea{
  min-height:90px;
  resize:vertical;
}

.preview-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-top:10px;
}

.preview-item{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  overflow:hidden;
  min-height:120px;
}

.preview-item img,
.preview-item video{
  width:100%;
  height:120px;
  object-fit:cover;
  display:block;
}

.top-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}

.action-btn,
.link-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:10px 14px;
  border-radius:10px;
  font-weight:900;
}

.action-btn{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.link-btn{
  background:var(--gold);
  color:#111;
  font-size:12px;
}

.lista{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:14px;
}

.card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  overflow:hidden;
}

.card-cover{
  width:100%;
  height:220px;
  object-fit:cover;
  background:#fff;
}

.card-body{
  padding:14px;
}

.card strong{
  display:block;
  color:var(--gold);
  font-size:17px;
  margin-bottom:8px;
}

.card p{
  color:var(--muted);
  font-size:13px;
  line-height:1.6;
}

.mini-galeria{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
  margin:10px 0;
}

.mini-galeria img,
.mini-galeria video{
  width:100%;
  height:58px;
  object-fit:cover;
  border-radius:8px;
  background:#fff;
}

.tag{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:5px 8px;
  border-radius:999px;
  background:rgba(247,198,0,.12);
  border:1px solid var(--gold-line);
  color:var(--gold);
  font-size:11px;
  font-weight:900;
  margin:4px 4px 0 0;
}

.tag-ok{color:#9ff0b8;border-color:rgba(27,143,67,.45);background:rgba(27,143,67,.16)}
.tag-warn{color:#ffe690;border-color:rgba(247,198,0,.45);background:rgba(247,198,0,.14)}
.tag-red{color:#ffb7b7;border-color:rgba(217,65,65,.45);background:rgba(217,65,65,.14)}

.status{
  display:none;
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  font-weight:900;
  font-size:13px;
}

.status-ok{
  display:block;
  background:rgba(27,143,67,.18);
  color:#aaf0bd;
  border:1px solid rgba(27,143,67,.35);
}

.status-erro{
  display:block;
  background:rgba(217,65,65,.18);
  color:#ffb7b7;
  border:1px solid rgba(217,65,65,.35);
}

.mensagem-vazia{
  color:var(--muted);
  text-align:center;
  padding:16px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  grid-column:1/-1;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.82);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:18px;
}

.modal.show{display:flex}

.modal img,
.modal video{
  max-width:96vw;
  max-height:86vh;
  border-radius:14px;
  background:#fff;
}

.modal-close{
  position:fixed;
  top:18px;
  right:18px;
  width:44px;
  height:44px;
  border-radius:50%;
  background:var(--red);
  color:#fff;
  font-size:22px;
  font-weight:900;
}

@media(max-width:900px){
  .header-title{
    order:3;
    width:100%;
    text-align:center;
    font-size:19px;
  }

  .header-left,.header-right{
    width:100%;
    justify-content:center;
  }

  .grid{grid-template-columns:1fr}
}

@media(max-width:600px){
  .top-btn,.action-btn,.link-btn{width:100%}
  .hero-panel h2{font-size:23px}
  .hero-panel,.form-panel,.list-panel{padding:16px}
}
</style>
</head>

<body>

<div class="modal" id="modalMidia" onclick="fecharModal()">
  <button class="modal-close" type="button" onclick="fecharModal()">×</button>
  <div id="modalConteudo"></div>
</div>

<header>
  <div class="wrap header-inner">
    <div class="header-left">
      <button class="top-btn btn-light" type="button" onclick="voltarPagina()">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </button>

      <a href="index.html" class="top-btn btn-light">
        <i class="fa-solid fa-house"></i> Página Inicial
      </a>

      <a href="admin.html" class="top-btn btn-light" id="btnPainelAdm">
        <i class="fa-solid fa-gears"></i> Painel AGF
      </a>
    </div>

    <div class="header-title">Galeria / Fotógrafo</div>

    <div class="header-right">
      <button class="top-btn btn-gold" type="button" onclick="salvarGaleria()">
        <i class="fa-solid fa-cloud-arrow-up"></i> Salvar Álbum
      </button>
    </div>
  </div>
</header>

<div class="wrap container">

<section class="hero-panel">
  <h2>Galeria de Fotos e Vídeos</h2>
  <p id="textoPerfil">
    Carregando perfil...
  </p>

  <div class="perfil-box">
    <span class="perfil-tag" id="tagPerfil"><i class="fa-solid fa-user"></i> Perfil</span>
    <span class="perfil-tag" id="tagVisao"><i class="fa-solid fa-eye"></i> Carregando</span>
  </div>

  <div id="statusBox" class="status"></div>
</section>

<section class="form-panel">
  <h3 class="bloco-titulo">
    <i class="fa-solid fa-images"></i> Novo Álbum / Galeria
  </h3>

  <input type="hidden" id="galeriaId">

  <div class="grid">
    <div>
      <label>Título</label>
      <input id="titulo" placeholder="Ex: Final Sub-15">
    </div>

    <div>
      <label>Campeonato</label>
      <input id="campeonato" placeholder="Ex: Copa Goiás">
    </div>

    <div>
      <label>Categoria</label>
      <input id="categoria" placeholder="Ex: Sub-15">
    </div>

    <div>
      <label>Fotógrafo</label>
      <input id="fotografo" placeholder="Nome do fotógrafo">
    </div>

    <div>
      <label>Data</label>
      <input id="data" type="date">
    </div>

    <div>
      <label>Tipo</label>
      <select id="tipo">
        <option value="album">Álbum</option>
        <option value="foto">Foto</option>
        <option value="video">Vídeo</option>
        <option value="galeria">Galeria</option>
      </select>
    </div>

    <div id="boxStatusAdm">
      <label>Status</label>
      <select id="statusGaleria">
        <option value="aprovado">Aprovado</option>
        <option value="pendente">Pendente</option>
        <option value="oculto">Oculto</option>
      </select>
    </div>

    <div id="boxDestaqueAdm">
      <label>Destaque</label>
      <select id="destaqueGaleria">
        <option value="nao">Não</option>
        <option value="sim">Sim</option>
      </select>
    </div>

    <div id="boxFotografoOficialAdm">
      <label>Fotógrafo Oficial</label>
      <select id="fotografoOficial">
        <option value="sim">Sim</option>
        <option value="nao">Não</option>
      </select>
    </div>

    <div class="full">
      <label>Fotos/Vídeos do celular ou computador</label>
      <input id="arquivosMidia" type="file" accept="image/*,video/*" multiple onchange="previewMidiasSelecionadas()">
      <div id="previewMidias" class="preview-grid"></div>
    </div>

    <div class="full">
      <label>Link externo opcional</label>
      <input id="linkExterno" placeholder="https://... álbum Google Drive, foto, vídeo etc.">
    </div>

    <div class="full">
      <label>Descrição</label>
      <textarea id="descricao" placeholder="Descrição da galeria"></textarea>
    </div>
  </div>

  <div class="top-actions">
    <button class="action-btn" type="button" onclick="salvarGaleria()">
      <i class="fa-solid fa-cloud-arrow-up"></i> Salvar Álbum
    </button>

    <button class="action-btn btn-blue" type="button" onclick="limparFormulario()">
      <i class="fa-solid fa-broom"></i> Limpar
    </button>
  </div>
</section>

<section class="list-panel">
  <h3 class="bloco-titulo" id="tituloLista">
    <i class="fa-solid fa-camera"></i> Galeria Cadastrada
  </h3>

  <div id="listaGaleria" class="lista">
    <div class="mensagem-vazia">Carregando galeria...</div>
  </div>
</section>

</div>

<script type="module">
import { auth, db, storage } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {
  collection,
  getDocs,
  getDoc,
  addDoc,
  updateDoc,
  deleteDoc,
  doc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

let usuarioAtual = null;
let perfilAtual = null;
let isAdmin = false;
let isFotografo = false;
let galeriaCache = [];
let midiasExistentesEdicao = [];

function el(id){
  return document.getElementById(id);
}

function texto(v){
  return String(v || "").trim();
}

function normalizar(v){
  return texto(v).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function campo(obj,chaves,fallback=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== "") return obj[c];
  }
  return fallback;
}

function mostrarStatus(msg,tipo="ok"){
  const box = el("statusBox");
  box.className = "status " + (tipo === "erro" ? "status-erro" : "status-ok");
  box.innerText = msg;
  setTimeout(()=>{ box.style.display = "none"; }, 4500);
}

window.voltarPagina = function(){
  if(window.history.length > 1){
    window.history.back();
  }else{
    window.location.href = "admin.html";
  }
};

async function carregarPerfilUsuario(){
  if(!usuarioAtual) return null;

  const refs = [
    doc(db,"usuarios",usuarioAtual.uid),
    doc(db,"users",usuarioAtual.uid),
    doc(db,"fotografos",usuarioAtual.uid),
    doc(db,"admins",usuarioAtual.uid)
  ];

  for(const r of refs){
    const snap = await getDoc(r);
    if(snap.exists()) return {id:snap.id,...snap.data()};
  }

  return {
    id:usuarioAtual.uid,
    uid:usuarioAtual.uid,
    email:usuarioAtual.email || "",
    nome:usuarioAtual.displayName || ""
  };
}

function definirPermissao(){
  const tipo = normalizar(campo(perfilAtual,["tipoUsuario","tipo","perfil","cargo","role","funcao"],""));
  const nivel = normalizar(campo(perfilAtual,["nivel","permissao"],""));

  isAdmin =
    tipo.includes("admin") ||
    nivel.includes("admin") ||
    perfilAtual?.admin === true ||
    perfilAtual?.autorizado === true && tipo.includes("admin");

  isFotografo =
    tipo.includes("fotografo") ||
    tipo.includes("fotógrafo") ||
    tipo.includes("foto") ||
    perfilAtual?.fotografo === true;

  if(!isAdmin && !isFotografo){
    // Se chegou aqui com login, libera como fotógrafo comum para publicar próprias galerias.
    isFotografo = true;
  }
}

function nomeFotografoAtual(){
  return campo(perfilAtual,["nome","nomeCompleto","displayName"], usuarioAtual?.displayName || usuarioAtual?.email || "Fotógrafo");
}

function aplicarPerfilNaTela(){
  if(isAdmin){
    el("textoPerfil").innerText = "ADM pode publicar, aprovar, destacar e editar todas as galerias. Fotógrafos publicam e mexem apenas nas próprias galerias.";
    el("tagPerfil").innerHTML = `<i class="fa-solid fa-user-shield"></i> ADM`;
    el("tagVisao").innerHTML = `<i class="fa-solid fa-eye"></i> Visualizando todas as galerias`;
    el("tituloLista").innerHTML = `<i class="fa-solid fa-camera"></i> Todas as Galerias`;
    el("btnPainelAdm").style.display = "inline-flex";
    el("boxStatusAdm").style.display = "block";
    el("boxDestaqueAdm").style.display = "block";
    el("boxFotografoOficialAdm").style.display = "block";
  }else{
    el("textoPerfil").innerText = "Fotógrafo pode publicar fotos/vídeos direto do celular e editar somente os próprios álbuns.";
    el("tagPerfil").innerHTML = `<i class="fa-solid fa-camera"></i> Fotógrafo`;
    el("tagVisao").innerHTML = `<i class="fa-solid fa-eye"></i> Minhas galerias`;
    el("tituloLista").innerHTML = `<i class="fa-solid fa-camera"></i> Minhas Galerias`;
    el("btnPainelAdm").style.display = "none";
    el("boxStatusAdm").style.display = "none";
    el("boxDestaqueAdm").style.display = "none";
    el("boxFotografoOficialAdm").style.display = "none";
  }

  el("fotografo").value = nomeFotografoAtual();
}

function tipoArquivoPorMime(mime){
  return String(mime || "").startsWith("video/") ? "video" : "imagem";
}

function renderMidiaThumb(m){
  if(m.tipo === "video"){
    return `<video src="${m.url}" onclick="abrirModal('${m.url}','video')" muted></video>`;
  }

  return `<img src="${m.url}" onclick="abrirModal('${m.url}','imagem')" onerror="this.src='logo-agf.png'">`;
}

window.previewMidiasSelecionadas = function(){
  const box = el("previewMidias");
  const arquivos = Array.from(el("arquivosMidia").files || []);

  if(!arquivos.length){
    box.innerHTML = "";
    return;
  }

  box.innerHTML = arquivos.map(arquivo=>{
    const url = URL.createObjectURL(arquivo);
    const tipo = tipoArquivoPorMime(arquivo.type);

    if(tipo === "video"){
      return `<div class="preview-item"><video src="${url}" muted controls></video></div>`;
    }

    return `<div class="preview-item"><img src="${url}"></div>`;
  }).join("");
};

async function uploadMidias(){
  const arquivos = Array.from(el("arquivosMidia").files || []);
  const novasMidias = [];

  for(const arquivo of arquivos){
    const tipo = tipoArquivoPorMime(arquivo.type);
    const nomeSeguro = arquivo.name.replace(/[^a-zA-Z0-9._-]/g,"_");
    const caminho = `galeria/${usuarioAtual.uid}/${Date.now()}-${Math.random().toString(36).slice(2)}-${nomeSeguro}`;
    const arquivoRef = ref(storage,caminho);

    await uploadBytes(arquivoRef,arquivo);
    const url = await getDownloadURL(arquivoRef);

    novasMidias.push({
      url,
      tipo,
      nome:arquivo.name,
      caminho,
      mime:arquivo.type,
      criadoEm:new Date().toISOString()
    });
  }

  return novasMidias;
}

window.limparFormulario = function(){
  el("galeriaId").value = "";
  el("titulo").value = "";
  el("campeonato").value = "";
  el("categoria").value = "";
  el("fotografo").value = nomeFotografoAtual();
  el("data").value = "";
  el("tipo").value = "album";
  el("statusGaleria").value = isAdmin ? "aprovado" : "pendente";
  el("destaqueGaleria").value = "nao";
  el("fotografoOficial").value = "sim";
  el("linkExterno").value = "";
  el("descricao").value = "";
  el("arquivosMidia").value = "";
  el("previewMidias").innerHTML = "";
  midiasExistentesEdicao = [];
};

function podeMexerNaGaleria(g){
  if(isAdmin) return true;
  return g.fotografoUid === usuarioAtual?.uid || g.criadoPorUid === usuarioAtual?.uid;
}

window.salvarGaleria = async function(){
  if(!usuarioAtual) return mostrarStatus("Faça login para publicar galeria.","erro");

  const id = el("galeriaId").value;
  const titulo = texto(el("titulo").value);
  if(!titulo) return mostrarStatus("Digite o título da galeria.","erro");

  if(id){
    const atual = galeriaCache.find(g=>g.id === id);
    if(atual && !podeMexerNaGaleria(atual)){
      return mostrarStatus("Você não pode editar galeria de outro fotógrafo.","erro");
    }
  }

  mostrarStatus("Enviando arquivos. Aguarde...");

  const novasMidias = await uploadMidias();
  const midias = [...midiasExistentesEdicao, ...novasMidias];

  const linkExterno = texto(el("linkExterno").value);

  if(!midias.length && !linkExterno){
    return mostrarStatus("Envie pelo menos uma foto/vídeo ou informe um link externo.","erro");
  }

  const capa = midias.find(m=>m.tipo === "imagem")?.url || midias[0]?.url || linkExterno || "logo-agf.png";

  const statusFinal = isAdmin ? el("statusGaleria").value : "pendente";
  const destaqueFinal = isAdmin && el("destaqueGaleria").value === "sim";
  const fotografoOficialFinal = isAdmin ? el("fotografoOficial").value === "sim" : true;

  const dados = {
    titulo,
    campeonato:texto(el("campeonato").value),
    categoria:texto(el("categoria").value),
    fotografo:texto(el("fotografo").value) || nomeFotografoAtual(),
    fotografoNome:texto(el("fotografo").value) || nomeFotografoAtual(),
    fotografoUid:id ? (galeriaCache.find(g=>g.id === id)?.fotografoUid || usuarioAtual.uid) : usuarioAtual.uid,
    fotografoEmail:id ? (galeriaCache.find(g=>g.id === id)?.fotografoEmail || usuarioAtual.email || "") : (usuarioAtual.email || ""),
    fotografoOficial:fotografoOficialFinal,
    data:texto(el("data").value),
    tipo:texto(el("tipo").value),
    linkExterno,
    imagem:capa,
    capa,
    midias,
    totalMidias:midias.length,
    descricao:texto(el("descricao").value),
    status:statusFinal,
    aprovado:statusFinal === "aprovado",
    publicado:statusFinal === "aprovado",
    destaque:destaqueFinal,
    criadoPorUid:id ? (galeriaCache.find(g=>g.id === id)?.criadoPorUid || usuarioAtual.uid) : usuarioAtual.uid,
    criadoPorNome:id ? (galeriaCache.find(g=>g.id === id)?.criadoPorNome || nomeFotografoAtual()) : nomeFotografoAtual(),
    atualizadoEm:serverTimestamp()
  };

  if(id){
    await updateDoc(doc(db,"galeria",id),dados);
    mostrarStatus(isAdmin ? "Galeria atualizada." : "Galeria atualizada e enviada para aprovação.");
  }else{
    await addDoc(collection(db,"galeria"),{
      ...dados,
      criadoEm:serverTimestamp()
    });
    mostrarStatus(isAdmin ? "Galeria publicada." : "Galeria enviada para aprovação do ADM.");
  }

  limparFormulario();
  carregarGaleria();
};

window.editarGaleria = function(id){
  const g = galeriaCache.find(x=>x.id === id);
  if(!g) return;

  if(!podeMexerNaGaleria(g)){
    return mostrarStatus("Você não pode editar galeria de outro fotógrafo.","erro");
  }

  el("galeriaId").value = g.id;
  el("titulo").value = g.titulo || "";
  el("campeonato").value = g.campeonato || "";
  el("categoria").value = g.categoria || "";
  el("fotografo").value = g.fotografo || g.fotografoNome || nomeFotografoAtual();
  el("data").value = g.data || "";
  el("tipo").value = g.tipo || "album";
  el("statusGaleria").value = g.status || (g.aprovado ? "aprovado" : "pendente");
  el("destaqueGaleria").value = g.destaque ? "sim" : "nao";
  el("fotografoOficial").value = g.fotografoOficial === false ? "nao" : "sim";
  el("linkExterno").value = g.linkExterno || "";
  el("descricao").value = g.descricao || "";
  el("arquivosMidia").value = "";

  midiasExistentesEdicao = Array.isArray(g.midias) ? [...g.midias] : [];

  el("previewMidias").innerHTML = midiasExistentesEdicao.map(m=>`
    <div class="preview-item">${renderMidiaThumb(m)}</div>
  `).join("");

  window.scrollTo({top:220,behavior:"smooth"});
};

window.excluirGaleria = async function(id){
  const g = galeriaCache.find(x=>x.id === id);
  if(!g) return;

  if(!podeMexerNaGaleria(g)){
    return mostrarStatus("Você não pode excluir galeria de outro fotógrafo.","erro");
  }

  if(!confirm("Deseja excluir este álbum da galeria?")) return;
  await deleteDoc(doc(db,"galeria",id));
  mostrarStatus("Álbum removido.");
  carregarGaleria();
};

window.aprovarGaleria = async function(id){
  if(!isAdmin) return;
  await updateDoc(doc(db,"galeria",id),{
    status:"aprovado",
    aprovado:true,
    publicado:true,
    aprovadoEm:serverTimestamp(),
    atualizadoEm:serverTimestamp()
  });
  mostrarStatus("Galeria aprovada.");
  carregarGaleria();
};

window.marcarDestaque = async function(id,valor){
  if(!isAdmin) return;
  await updateDoc(doc(db,"galeria",id),{
    destaque:valor,
    atualizadoEm:serverTimestamp()
  });
  mostrarStatus(valor ? "Galeria marcada como destaque." : "Destaque removido.");
  carregarGaleria();
};

window.abrirModal = function(url,tipo){
  const modal = el("modalMidia");
  const box = el("modalConteudo");

  box.innerHTML = tipo === "video"
    ? `<video src="${url}" controls autoplay></video>`
    : `<img src="${url}">`;

  modal.classList.add("show");
};

window.fecharModal = function(){
  el("modalMidia").classList.remove("show");
  el("modalConteudo").innerHTML = "";
};

window.compartilharGaleria = function(id){
  const url = location.href.split("/").slice(0,-1).join("/") + "/galeria.html?id=" + encodeURIComponent(id);
  window.open("https://wa.me/?text=" + encodeURIComponent("Galeria da AGF: " + url), "_blank");
};

function tagStatus(g){
  const status = g.status || (g.aprovado ? "aprovado" : "pendente");

  if(status === "aprovado"){
    return `<span class="tag tag-ok"><i class="fa-solid fa-circle-check"></i> Aprovado</span>`;
  }

  if(status === "oculto"){
    return `<span class="tag tag-red"><i class="fa-solid fa-eye-slash"></i> Oculto</span>`;
  }

  return `<span class="tag tag-warn"><i class="fa-solid fa-clock"></i> Pendente</span>`;
}

function renderGaleria(){
  const lista = el("listaGaleria");

  const visiveis = galeriaCache.filter(g=>{
    if(isAdmin) return true;
    return g.fotografoUid === usuarioAtual?.uid || g.criadoPorUid === usuarioAtual?.uid;
  });

  if(!visiveis.length){
    lista.innerHTML = `<div class="mensagem-vazia">${isAdmin ? "Nenhum álbum cadastrado ainda." : "Você ainda não publicou nenhum álbum."}</div>`;
    return;
  }

  lista.innerHTML = visiveis.map(g=>{
    const midias = Array.isArray(g.midias) ? g.midias : [];
    const capa = g.capa || g.imagem || midias[0]?.url || "logo-agf.png";
    const podeEditar = podeMexerNaGaleria(g);

    return `
      <div class="card">
        <img class="card-cover" src="${capa}" onerror="this.src='logo-agf.png'">

        <div class="card-body">
          <strong>${g.titulo || "-"}</strong>

          <p>
            Campeonato: ${g.campeonato || "-"}<br>
            Categoria: ${g.categoria || "-"}<br>
            Fotógrafo: ${g.fotografo || g.fotografoNome || "-"}<br>
            Data: ${g.data || "-"}<br>
            Total: ${g.totalMidias || midias.length || 0} arquivo(s)<br>
            Descrição: ${g.descricao || "-"}
          </p>

          <div class="mini-galeria">
            ${midias.slice(0,8).map(m=>renderMidiaThumb(m)).join("")}
          </div>

          ${tagStatus(g)}
          ${g.destaque ? `<span class="tag"><i class="fa-solid fa-star"></i> Destaque</span>` : ""}
          ${g.fotografoOficial !== false ? `<span class="tag"><i class="fa-solid fa-certificate"></i> Fotógrafo Oficial</span>` : ""}

          <div class="top-actions">
            ${podeEditar ? `
              <button class="link-btn" type="button" onclick="editarGaleria('${g.id}')">
                <i class="fa-solid fa-pen"></i> Editar
              </button>
            ` : ""}

            <button class="link-btn btn-blue" type="button" onclick="compartilharGaleria('${g.id}')">
              <i class="fa-brands fa-whatsapp"></i> Compartilhar
            </button>

            ${isAdmin && (g.status || "pendente") !== "aprovado" ? `
              <button class="link-btn btn-green" type="button" onclick="aprovarGaleria('${g.id}')">
                <i class="fa-solid fa-check"></i> Aprovar
              </button>
            ` : ""}

            ${isAdmin ? `
              <button class="link-btn" type="button" onclick="marcarDestaque('${g.id}',${!g.destaque})">
                <i class="fa-solid fa-star"></i> ${g.destaque ? "Tirar Destaque" : "Destaque"}
              </button>
            ` : ""}

            ${podeEditar ? `
              <button class="link-btn btn-red" type="button" onclick="excluirGaleria('${g.id}')">
                <i class="fa-solid fa-trash"></i> Excluir
              </button>
            ` : ""}
          </div>
        </div>
      </div>
    `;
  }).join("");
}

async function carregarGaleria(){
  const lista = el("listaGaleria");
  lista.innerHTML = `<div class="mensagem-vazia">Carregando galeria...</div>`;

  try{
    const snap = await getDocs(collection(db,"galeria"));
    galeriaCache = [];
    snap.forEach(d=>galeriaCache.push({id:d.id,...d.data()}));

    galeriaCache.sort((a,b)=>
      String(b.data || "").localeCompare(String(a.data || ""))
    );

    renderGaleria();
  }catch(e){
    console.error(e);
    mostrarStatus("Erro ao carregar galeria.","erro");
    lista.innerHTML = `<div class="mensagem-vazia">Erro ao carregar galeria.</div>`;
  }
}

onAuthStateChanged(auth, async user=>{
  usuarioAtual = user;

  if(!user){
    el("listaGaleria").innerHTML = `<div class="mensagem-vazia">Faça login para publicar na galeria.</div>`;
    mostrarStatus("Faça login para publicar na galeria.","erro");
    return;
  }

  perfilAtual = await carregarPerfilUsuario();
  definirPermissao();
  aplicarPerfilNaTela();
  limparFormulario();
  await carregarGaleria();
});
</script>

</body>
</html>
