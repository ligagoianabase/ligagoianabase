<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Árbitro Público - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --gold:#f7c600;
  --gold2:#ffe45c;
  --muted:#cbd6ea;
  --gold-line:rgba(247,198,0,.45);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
  min-height:100vh;
}

.wrap{
  width:min(100% - 24px,1280px);
  margin:auto;
  padding:22px 0 40px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.18), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.97), rgba(8,23,44,.98));
  border:1px solid var(--gold-line);
  border-radius:22px;
  padding:22px;
  display:grid;
  grid-template-columns:180px 1fr;
  gap:22px;
  align-items:center;
  margin-bottom:16px;
}

.foto{
  width:160px;
  height:160px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid var(--gold);
  background:#fff;
}

.hero h1{
  color:var(--gold);
  font-size:36px;
  margin-bottom:8px;
}

.hero p{
  color:var(--muted);
  line-height:1.6;
}

.tags{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}

.tag{
  background:#1a3f73;
  padding:7px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.stats{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
  margin-bottom:16px;
}

.stat{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.12), transparent 35%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:16px;
  padding:15px;
  text-align:center;
}

.stat strong{
  display:block;
  color:var(--gold);
  font-size:28px;
}

.stat span{
  color:var(--muted);
  font-size:10px;
  font-weight:900;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.panel{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.10), transparent 35%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:18px;
  overflow:hidden;
}

.panel h2{
  color:var(--gold);
  padding:16px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.panel-body{
  padding:14px;
}

.item{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.item:last-child{
  border-bottom:none;
}

.item span{
  color:var(--muted);
}

.item strong{
  color:#fff;
}

.jogo{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}

.jogo strong{
  display:block;
  margin-bottom:6px;
}

.jogo p{
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}

.loading{
  max-width:700px;
  margin:80px auto;
  background:rgba(16,42,82,.96);
  border:1px solid var(--gold-line);
  color:var(--gold);
  padding:24px;
  border-radius:18px;
  text-align:center;
  font-weight:900;
}

@media(max-width:1000px){
  .stats{
    grid-template-columns:repeat(3,1fr);
  }

  .grid{
    grid-template-columns:1fr;
  }
}

@media(max-width:700px){
  .hero{
    grid-template-columns:1fr;
    text-align:center;
  }

  .foto{
    margin:auto;
  }

  .stats{
    grid-template-columns:1fr 1fr;
  }

  .hero h1{
    font-size:28px;
  }

  .tags{
    justify-content:center;
  }
}

@media(max-width:500px){
  .stats{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="wrap" id="app">

  <div class="loading">
    <i class="fa-solid fa-spinner fa-spin"></i><br>
    Carregando árbitro...
  </div>

</div>

<script type="module">

import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";

import {
  collection,
  getDocs,
  getDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("arbitro");

const app = document.getElementById("app");
const id = new URLSearchParams(location.search).get("id");

let arbitro = null;
let jogos = [];
let sumulas = [];

function val(obj,chaves,f=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== ""){
      return obj[c];
    }
  }
  return f;
}

function n(t){
  return String(t || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();
}

function nomeArbitro(a){
  return val(a,["nome","nomeCompleto","arbitro","arbitroNome"],"Árbitro");
}

function fotoArbitro(a){
  return val(a,["foto","imagem","avatar","fotoUrl"],"logo-liga.jfif");
}

function cidadeArbitro(a){
  return val(a,["cidade","cidadeNascimento","municipio"],"-");
}

function categorias(a){
  const cats = val(a,["categorias"],[]);
  if(Array.isArray(cats) && cats.length) return cats;

  const cat = val(a,["categoria","categoriaNome"],"");
  return cat ? [cat] : [];
}

function statusTexto(status){
  const st = n(status);

  if(st === "inativo") return "Inativo";
  if(st === "reprovado") return "Reprovado";
  if(st === "pendente") return "Pendente";

  return "Ativo";
}

function mesmoArbitro(item){

  const ids = [
    val(item,["arbitroId"],""),
    val(item,["arbitroPrincipalId"],""),
    val(item,["juizId"],""),
    val(item,["arbitro"],"")
  ];

  if(ids.includes(id)) return true;

  const nomes = [
    val(item,["arbitro"],""),
    val(item,["arbitroPrincipal"],""),
    val(item,["arbitroNome"],""),
    val(item,["nomeArbitro"],""),
    val(item,["juiz"],""),
    val(item,["juizNome"],"")
  ];

  return nomes.some(x=>n(x) === n(nomeArbitro(arbitro)));
}

function finalizado(j){
  return j.finalizado === true ||
    j.encerrado === true ||
    j.sumulaFinalizada === true ||
    j.publica === true ||
    j.publico === true ||
    n(val(j,["status"],"")) === "finalizado";
}

function calcular(){

  let jogosCount = 0;
  let finalizados = 0;
  let pendentes = 0;
  let sumulasFinalizadas = 0;

  const categoriasMap = {};
  const campeonatosMap = {};
  const recentes = [];

  jogos.forEach(j=>{

    if(!mesmoArbitro(j)) return;

    jogosCount++;
    recentes.push(j);

    const categoria = val(j,["categoria","categoriaNome"],"Sem categoria");
    categoriasMap[categoria] = (categoriasMap[categoria] || 0) + 1;

    const camp = val(j,["campeonato","campeonatoNome","nomeCampeonato"],"Sem campeonato");
    campeonatosMap[camp] = (campeonatosMap[camp] || 0) + 1;

    if(finalizado(j)) finalizados++;
    else pendentes++;
  });

  sumulas.forEach(s=>{

    if(!mesmoArbitro(s)) return;

    if(finalizado(s)){
      sumulasFinalizadas++;
    }
  });

  return {
    jogos:jogosCount,
    finalizados,
    pendentes,
    sumulas:sumulasFinalizadas,
    categorias:categoriasMap,
    campeonatos:campeonatosMap,
    recentes:recentes.reverse().slice(0,8)
  };
}

function jogoNome(j){
  const a = val(j,["timeANome"], j.timeA?.nome || j.timeA || "Time A");
  const b = val(j,["timeBNome"], j.timeB?.nome || j.timeB || "Time B");

  return `${a} x ${b}`;
}

function listaHTML(obj){

  const entries = Object.entries(obj);

  if(!entries.length){
    return `
      <div class="item">
        <span>Nenhum dado</span>
        <strong>0</strong>
      </div>
    `;
  }

  return entries
    .sort((a,b)=>b[1]-a[1])
    .map(([nome,valor])=>`
      <div class="item">
        <span>${nome}</span>
        <strong>${valor}</strong>
      </div>
    `).join("");
}

function render(){

  if(!arbitro){
    app.innerHTML = `<div class="loading">Árbitro não encontrado.</div>`;
    return;
  }

  const s = calcular();

  app.innerHTML = `
    <section class="hero">

      <img class="foto" src="${fotoArbitro(arbitro)}" onerror="this.src='logo-liga.jfif'">

      <div>

        <h1>${nomeArbitro(arbitro)}</h1>

        <p>
          Árbitro oficial da Liga Goiana de Futebol de Base.<br>
          Cidade: ${cidadeArbitro(arbitro)}<br>
          Contatos e documentos são privados.
        </p>

        <div class="tags">

          ${categorias(arbitro).map(c=>`
            <span class="tag">${c}</span>
          `).join("")}

          <span class="tag">
            ${statusTexto(val(arbitro,["status"],"ativo"))}
          </span>

        </div>

      </div>

    </section>

    <section class="stats">

      <div class="stat">
        <strong>${s.jogos}</strong>
        <span>JOGOS</span>
      </div>

      <div class="stat">
        <strong>${s.finalizados}</strong>
        <span>FINALIZADOS</span>
      </div>

      <div class="stat">
        <strong>${s.pendentes}</strong>
        <span>PENDENTES</span>
      </div>

      <div class="stat">
        <strong>${s.sumulas}</strong>
        <span>SÚMULAS</span>
      </div>

      <div class="stat">
        <strong>${Object.keys(s.categorias).length}</strong>
        <span>CATEGORIAS</span>
      </div>

      <div class="stat">
        <strong>${Object.keys(s.campeonatos).length}</strong>
        <span>CAMPEONATOS</span>
      </div>

    </section>

    <section class="grid">

      <div class="panel">

        <h2><i class="fa-solid fa-layer-group"></i> Categorias</h2>

        <div class="panel-body">
          ${listaHTML(s.categorias)}
        </div>

      </div>

      <div class="panel">

        <h2><i class="fa-solid fa-trophy"></i> Campeonatos</h2>

        <div class="panel-body">
          ${listaHTML(s.campeonatos)}
        </div>

      </div>

      <div class="panel" style="grid-column:1/-1;">

        <h2><i class="fa-solid fa-calendar-days"></i> Jogos recentes</h2>

        <div class="panel-body">

          ${
            s.recentes.length
            ? s.recentes.map(j=>`
              <div class="jogo">

                <strong>${jogoNome(j)}</strong>

                <p>
                  Campeonato: ${val(j,["campeonato","campeonatoNome","nomeCampeonato"],"-")}<br>
                  Categoria: ${val(j,["categoria","categoriaNome"],"-")}<br>
                  Data: ${val(j,["data","dataJogo","dataHora"],"-")}<br>
                  Status: ${val(j,["status"],"-")}
                </p>

              </div>
            `).join("")
            : `<div class="loading">Nenhum jogo encontrado.</div>`
          }

        </div>

      </div>

    </section>
  `;
}

async function carregar(){

  if(!id){
    app.innerHTML = `<div class="loading">ID do árbitro não informado.</div>`;
    return;
  }

  const arbitroSnap = await getDoc(doc(db,"arbitros",id));

  if(arbitroSnap.exists()){

    arbitro = {
      id:arbitroSnap.id,
      ...arbitroSnap.data()
    };
  }

  const jogosSnap = await getDocs(collection(db,"jogos"));

  jogos = jogosSnap.docs.map(d=>({
    id:d.id,
    ...d.data()
  }));

  const sumulasSnap = await getDocs(collection(db,"sumulas"));

  sumulas = sumulasSnap.docs.map(d=>({
    id:d.id,
    ...d.data()
  }));

  render();
}

carregar();

</script>

</body>
</html>
