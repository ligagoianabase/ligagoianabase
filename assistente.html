<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assistente - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --yellow:#7a5a00;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit}
img{display:block;max-width:100%}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

.hero-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:12px;
}

.hero-tag{
  background:rgba(26,63,115,.9);
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

input,
select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
  outline:none;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
}

input:focus,
select:focus{
  outline:2px solid rgba(247,198,0,.65);
}

.titulo-secao{
  color:var(--gold);
  font-size:22px;
  font-weight:900;
  margin:18px 0 12px;
}

.lista-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:14px;
}

.card{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.10), transparent 36%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:16px;
  padding:15px;
  min-height:210px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  transition:.25s ease;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:12px;
}

.card:hover{
  transform:translateY(-2px);
  border-color:var(--gold);
}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
}

.card-funcao{
  color:var(--gold);
  font-size:14px;
  font-weight:900;
}

.status-tag{
  color:#fff;
  padding:5px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
}

.status-ativo{background:rgba(27,94,32,.88);}
.status-pendente{background:rgba(122,90,0,.88);}
.status-inativo{background:rgba(180,35,35,.88);}

.card-main{
  display:flex;
  align-items:flex-start;
  gap:12px;
}

.photo{
  width:78px;
  height:78px;
  border-radius:50%;
  object-fit:cover;
  background:#1a3f73;
  border:2px solid var(--gold);
  flex-shrink:0;
}

.user-info{
  flex:1;
  min-width:0;
}

.nome{
  font-weight:900;
  font-size:17px;
  color:#fff;
  line-height:1.25;
  margin-bottom:5px;
}

.time-nome{
  color:var(--gold);
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:4px;
}

.sub{
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
}

.tags{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  margin-top:8px;
}

.tag{
  background:#1a3f73;
  padding:4px 8px;
  border-radius:999px;
  font-size:10px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:10px;
}

.stat-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:9px;
  padding:7px 4px;
  text-align:center;
}

.stat-card strong{
  display:block;
  color:var(--gold);
  font-size:15px;
  line-height:1;
}

.stat-card span{
  display:block;
  color:var(--muted);
  font-size:9px;
  font-weight:800;
  margin-top:3px;
}

.actions{
  display:flex;
  justify-content:center;
  margin-top:10px;
}

.btn-ver{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  padding:10px 12px;
  border-radius:11px;
  font-weight:900;
  font-size:13px;
}

.ranking-box{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-bottom:14px;
}

.ranking-card{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.14), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.ranking-card h3{
  color:var(--gold);
  font-size:15px;
  margin-bottom:10px;
}

.ranking-item{
  display:flex;
  justify-content:space-between;
  gap:8px;
  padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  color:var(--muted);
  font-size:12px;
}

.ranking-item strong{
  color:#fff;
}

.ranking-num{
  color:var(--gold);
  font-weight:900;
}

.vazio{
  grid-column:1/-1;
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  padding:22px;
  border-radius:14px;
  text-align:center;
  color:var(--muted);
  border:1px solid rgba(255,255,255,.08);
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.72);
  justify-content:center;
  align-items:center;
  padding:15px;
  z-index:9999;
}

.modal-content{
  background:linear-gradient(180deg, rgba(16,42,82,.98), rgba(8,23,44,.98));
  padding:20px;
  border-radius:18px;
  max-width:780px;
  width:100%;
  max-height:88vh;
  overflow:auto;
  border:1px solid var(--gold-line);
  box-shadow:var(--shadow);
  text-align:center;
}

.modal-content h2{
  color:var(--gold);
  margin:10px 0;
}

.modal-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:14px;
  text-align:left;
}

.modal-box{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
  color:var(--muted);
  line-height:1.6;
  font-size:14px;
}

.modal-box h3{
  color:var(--gold);
  margin-bottom:8px;
}

.modal-box strong{
  color:#fff;
}

.categoria-item{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  color:var(--muted);
}

.categoria-item strong{
  color:var(--gold);
}

.modal-close{
  margin-top:14px;
  padding:10px 14px;
  border-radius:11px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  font-weight:900;
}

@media(max-width:900px){
  .filtros,
  .modal-grid,
  .ranking-box{
    grid-template-columns:1fr;
  }

  .lista-grid{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:650px){
  .lista-grid{
    grid-template-columns:1fr;
  }

  .card-main{
    align-items:center;
  }
}

@media(max-width:600px){
  .hero{
    padding:14px;
  }

  .hero h2{
    font-size:22px;
  }
}
</style>
</head>

<body>

<main class="wrap container">

  <section class="hero">
    <h2>Assistentes</h2>
    <p>Veja os assistentes cadastrados e acompanhe estatísticas públicas de atuação. Telefone, e-mail e CPF não aparecem para o público.</p>

    <div class="hero-tags">
      <div class="hero-tag" id="tagTotal">Assistentes: 0</div>
      <div class="hero-tag" id="tagJogos">Jogos: 0</div>
      <div class="hero-tag" id="tagCategorias">Categorias: 0</div>
      <div class="hero-tag" id="tagSumulas">Súmulas: 0</div>
    </div>
  </section>

  <section class="filtros">
    <input id="busca" placeholder="Pesquisar assistente, cidade ou categoria...">

    <select id="filtroCategoria">
      <option value="">Todas categorias</option>
    </select>
  </section>

  <h2 class="titulo-secao">Ranking dos Assistentes</h2>
  <section class="ranking-box" id="rankingBox"></section>

  <h2 class="titulo-secao" id="tituloPagina">Assistentes</h2>

  <section class="lista-grid" id="lista">
    <div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando assistentes...</div>
  </section>

</main>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import {
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("assistente");

let assistentes = [];
let jogos = [];
let sumulas = [];

function n(txt){
  return String(txt || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();
}

function val(obj, chaves, f=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== ""){
      return obj[c];
    }
  }
  return f;
}

function nomeAssistente(a){
  return val(a,["nome","nomeCompleto","assistente"],"Assistente sem nome");
}

function fotoAssistente(a){
  return val(a,["foto","imagem","avatar","fotoUrl"],"logo-liga.jfif");
}

function cidadeAssistente(a){
  return val(a,["cidadeNascimento","cidade","municipio"],"-");
}

function statusAssistente(a){
  return n(val(a,["status"],"ativo"));
}

function categoriasAssistente(a){
  const cats = val(a,["categorias"],[]);
  const cat = val(a,["categoria"],"");

  if(Array.isArray(cats) && cats.length) return cats;
  if(cat) return [cat];

  return ["Todas as categorias"];
}

function mesmoAssistente(nome, item){
  const nomeNormal = n(nome);

  const nomes = [
    val(item,["assistente"],""),
    val(item,["assistente1"],""),
    val(item,["assistente2"],""),
    val(item,["assistenteNome"],""),
    val(item,["nomeAssistente"],""),
    val(item,["arbitroAuxiliar"],""),
    val(item,["auxiliar"],"")
  ];

  return nomes.some(x => n(x) === nomeNormal);
}

function categoriaDoJogo(jogo){
  return val(jogo,["categoria","categoriaNome"],"Sem categoria");
}

function statusClasse(status){
  if(status === "inativo" || status === "reprovado") return "status-inativo";
  if(status === "pendente") return "status-pendente";
  return "status-ativo";
}

function statusTexto(status){
  if(status === "inativo") return "Inativo";
  if(status === "reprovado") return "Reprovado";
  if(status === "pendente") return "Pendente";
  return "Ativo";
}

function calcularStatsAssistente(a){
  const nome = nomeAssistente(a);

  let jogosTrabalhados = 0;
  let jogosFinalizados = 0;
  let jogosPendentes = 0;
  let sumulasFinalizadas = 0;
  const porCategoria = {};
  const porCampeonato = {};

  jogos.forEach(j=>{
    if(!mesmoAssistente(nome,j)) return;

    jogosTrabalhados++;

    const categoria = categoriaDoJogo(j);
    porCategoria[categoria] = (porCategoria[categoria] || 0) + 1;

    const campeonato = val(j,["campeonato","campeonatoNome","nomeCampeonato"],"Sem campeonato");
    porCampeonato[campeonato] = (porCampeonato[campeonato] || 0) + 1;

    const status = n(val(j,["status"],""));

    if(status === "finalizado" || j.finalizado === true || j.sumulaFinalizada === true){
      jogosFinalizados++;
    }else{
      jogosPendentes++;
    }
  });

  sumulas.forEach(s=>{
    if(!mesmoAssistente(nome,s)) return;

    if(
      s.sumulaFinalizada === true ||
      s.publica === true ||
      s.publico === true ||
      n(val(s,["status"],"")) === "finalizado"
    ){
      sumulasFinalizadas++;
    }
  });

  return {
    jogosTrabalhados,
    jogosFinalizados,
    jogosPendentes,
    sumulasFinalizadas,
    porCategoria,
    porCampeonato
  };
}

function preencherCategorias(){
  const select = document.getElementById("filtroCategoria");
  const atual = select.value;
  const set = new Set();

  jogos.forEach(j=>{
    const cat = categoriaDoJogo(j);
    if(cat && cat !== "Sem categoria") set.add(cat);
  });

  assistentes.forEach(a=>{
    categoriasAssistente(a).forEach(c=>{
      if(c && c !== "Todas as categorias") set.add(c);
    });
  });

  select.innerHTML = `<option value="">Todas categorias</option>`;

  [...set].sort((a,b)=>a.localeCompare(b,"pt-BR")).forEach(c=>{
    select.innerHTML += `<option value="${c}">${c}</option>`;
  });

  if([...set].includes(atual)){
    select.value = atual;
  }
}

function filtrados(){
  const busca = n(document.getElementById("busca").value);
  const categoria = document.getElementById("filtroCategoria").value;

  return assistentes.filter(a=>{
    const nome = nomeAssistente(a);
    const cidade = cidadeAssistente(a);
    const cats = categoriasAssistente(a);

    if(busca){
      const texto = n(`${nome} ${cidade} ${cats.join(" ")}`);
      if(!texto.includes(busca)) return false;
    }

    if(categoria){
      const stats = calcularStatsAssistente(a);
      const temCategoriaPeloCadastro = cats.includes(categoria);
      const temCategoriaPeloJogo = !!stats.porCategoria[categoria];

      if(!temCategoriaPeloCadastro && !temCategoriaPeloJogo) return false;
    }

    return true;
  }).sort((a,b)=>nomeAssistente(a).localeCompare(nomeAssistente(b),"pt-BR"));
}

function atualizarTopo(lista){
  let totalJogos = 0;
  let totalCategorias = new Set();
  let totalSumulas = 0;

  lista.forEach(a=>{
    const stats = calcularStatsAssistente(a);

    totalJogos += stats.jogosTrabalhados;
    totalSumulas += stats.sumulasFinalizadas;

    Object.keys(stats.porCategoria).forEach(c=>{
      if(c) totalCategorias.add(c);
    });
  });

  document.getElementById("tagTotal").innerText = `Assistentes: ${lista.length}`;
  document.getElementById("tagJogos").innerText = `Jogos: ${totalJogos}`;
  document.getElementById("tagCategorias").innerText = `Categorias: ${totalCategorias.size}`;
  document.getElementById("tagSumulas").innerText = `Súmulas: ${totalSumulas}`;

  const categoria = document.getElementById("filtroCategoria").value;

  document.getElementById("tituloPagina").innerText =
    `Assistentes${categoria ? " - " + categoria : ""}`;
}

function rankingHTML(titulo, lista, campo){
  const top = [...lista]
    .map(a=>({
      nome:nomeAssistente(a),
      valor:calcularStatsAssistente(a)[campo] || 0
    }))
    .sort((a,b)=>b.valor - a.valor)
    .slice(0,5);

  if(!top.length){
    return `
      <div class="ranking-card">
        <h3>${titulo}</h3>
        <div class="ranking-item">
          <span>Nenhum dado</span>
          <span class="ranking-num">0</span>
        </div>
      </div>
    `;
  }

  return `
    <div class="ranking-card">
      <h3>${titulo}</h3>
      ${
        top.map((item,index)=>`
          <div class="ranking-item">
            <strong>${index + 1}. ${item.nome}</strong>
            <span class="ranking-num">${item.valor}</span>
          </div>
        `).join("")
      }
    </div>
  `;
}

function renderRanking(lista){
  const box = document.getElementById("rankingBox");

  box.innerHTML = `
    ${rankingHTML("Mais jogos trabalhados", lista, "jogosTrabalhados")}
    ${rankingHTML("Mais súmulas finalizadas", lista, "sumulasFinalizadas")}
    ${rankingHTML("Mais jogos finalizados", lista, "jogosFinalizados")}
  `;
}

function render(){
  const box = document.getElementById("lista");
  const lista = filtrados();

  atualizarTopo(lista);
  renderRanking(lista);

  if(!assistentes.length){
    box.innerHTML = `<div class="vazio">Nenhum assistente cadastrado no Firebase.</div>`;
    return;
  }

  if(!lista.length){
    box.innerHTML = `<div class="vazio">Nenhum assistente encontrado.</div>`;
    return;
  }

  box.innerHTML = lista.map(a=>{
    const nome = nomeAssistente(a);
    const foto = fotoAssistente(a);
    const cidade = cidadeAssistente(a);
    const status = statusAssistente(a);
    const stats = calcularStatsAssistente(a);
    const cats = categoriasAssistente(a);

    return `
      <div class="card">

        <div class="card-top">
          <div class="card-funcao">Assistente</div>

          <div class="status-tag ${statusClasse(status)}">
            ${statusTexto(status)}
          </div>
        </div>

        <div class="card-main">
          <img src="${foto}" class="photo" onerror="this.src='logo-liga.jfif'">

          <div class="user-info">
            <div class="nome">${nome}</div>
            <div class="time-nome">Assistente oficial</div>
            <div class="sub">Cidade: ${cidade}</div>

            <div class="tags">
              ${cats.map(c=>`<span class="tag">${c}</span>`).join("")}
            </div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <strong>${stats.jogosTrabalhados}</strong>
            <span>JOGOS</span>
          </div>

          <div class="stat-card">
            <strong>${stats.sumulasFinalizadas}</strong>
            <span>SÚMULAS</span>
          </div>

          <div class="stat-card">
            <strong>${stats.jogosPendentes}</strong>
            <span>PEND.</span>
          </div>

          <div class="stat-card">
            <strong>${stats.jogosFinalizados}</strong>
            <span>FINAL.</span>
          </div>

          <div class="stat-card">
            <strong>${Object.keys(stats.porCategoria).length}</strong>
            <span>CATEG.</span>
          </div>

          <div class="stat-card">
            <strong>${Object.keys(stats.porCampeonato).length}</strong>
            <span>CAMPS.</span>
          </div>
        </div>

        <div class="actions">
          <button class="btn-ver" onclick="ver('${a.id}')">
            <i class="fa-solid fa-eye"></i> Ver Assistente
          </button>
        </div>
      </div>
    `;
  }).join("");
}

window.ver = function(id){
  const a = assistentes.find(x=>x.id === id);
  if(!a) return;

  const nome = nomeAssistente(a);
  const foto = fotoAssistente(a);
  const cidade = cidadeAssistente(a);
  const status = statusAssistente(a);
  const cats = categoriasAssistente(a);
  const stats = calcularStatsAssistente(a);

  const categoriasHTML = Object.keys(stats.porCategoria).length
    ? Object.entries(stats.porCategoria)
      .sort((x,y)=>x[0].localeCompare(y[0],"pt-BR"))
      .map(([c,q])=>`
        <div class="categoria-item">
          <span>${c}</span>
          <strong>${q} jogo(s)</strong>
        </div>
      `).join("")
    : `<div class="categoria-item"><span>Sem jogos por categoria</span><strong>0</strong></div>`;

  const campeonatosHTML = Object.keys(stats.porCampeonato).length
    ? Object.entries(stats.porCampeonato)
      .sort((x,y)=>x[0].localeCompare(y[0],"pt-BR"))
      .map(([c,q])=>`
        <div class="categoria-item">
          <span>${c}</span>
          <strong>${q} jogo(s)</strong>
        </div>
      `).join("")
    : `<div class="categoria-item"><span>Sem campeonatos vinculados</span><strong>0</strong></div>`;

  document.getElementById("modalContent").innerHTML = `
    <img src="${foto}" class="photo" style="margin:auto;width:90px;height:90px;" onerror="this.src='logo-liga.jfif'">
    <h2>${nome}</h2>

    <div class="tags" style="justify-content:center;">
      ${cats.map(c=>`<span class="tag">${c}</span>`).join("")}
    </div>

    <div class="modal-grid">

      <div class="modal-box">
        <h3>Dados públicos</h3>
        <strong>Cidade:</strong> ${cidade}<br>
        <strong>Status:</strong> ${statusTexto(status)}<br>
        <strong>Contato:</strong> Privado<br>
        <strong>Documento:</strong> Privado
      </div>

      <div class="modal-box">
        <h3>Resumo</h3>
        <strong>Jogos trabalhados:</strong> ${stats.jogosTrabalhados}<br>
        <strong>Súmulas finalizadas:</strong> ${stats.sumulasFinalizadas}<br>
        <strong>Jogos finalizados:</strong> ${stats.jogosFinalizados}<br>
        <strong>Jogos pendentes:</strong> ${stats.jogosPendentes}
      </div>

      <div class="modal-box">
        <h3>Campeonatos</h3>
        ${campeonatosHTML}
      </div>

      <div class="modal-box">
        <h3>Categorias</h3>
        ${categoriasHTML}
      </div>

    </div>

    <button class="modal-close" onclick="fechar()">
      <i class="fa-solid fa-xmark"></i> Fechar
    </button>
  `;

  document.getElementById("modal").style.display = "flex";
};

window.fechar = function(){
  document.getElementById("modal").style.display = "none";
};

document.getElementById("modal").addEventListener("click",e=>{
  if(e.target.id === "modal") fechar();
});

document.getElementById("busca").addEventListener("input",render);
document.getElementById("filtroCategoria").addEventListener("change",render);

onSnapshot(collection(db,"assistentes"),snap=>{
  assistentes = snap.docs.map(d=>({id:d.id,...d.data()}));
  preencherCategorias();
  render();
});

onSnapshot(collection(db,"jogos"),snap=>{
  jogos = snap.docs.map(d=>({id:d.id,...d.data()}));
  preencherCategorias();
  render();
});

onSnapshot(collection(db,"sumulas"),snap=>{
  sumulas = snap.docs.map(d=>({id:d.id,...d.data()}));
  preencherCategorias();
  render();
});
</script>

</body>
</html>
