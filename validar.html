<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Validação de Súmula</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family:Arial;
  background:#061d3d;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

.card{
  background:#fff;
  color:#111;
  padding:30px;
  border-radius:12px;
  width:400px;
  max-width:90%;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h1{
  margin-bottom:15px;
  color:#061d3d;
}

.status{
  font-size:20px;
  font-weight:900;
  margin:15px 0;
}

.ok{
  color:#009640;
}

.erro{
  color:#e30613;
}

.info{
  font-size:14px;
  margin-top:10px;
}

.btn{
  margin-top:20px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:8px;
  background:#061d3d;
  color:#fff;
  font-weight:900;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

  <h1>Validação de Súmula</h1>

  <div id="status" class="status">Verificando...</div>

  <div class="info" id="info"></div>

  <button class="btn" onclick="abrirSumula()">Ver Súmula</button>

</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const id = new URLSearchParams(location.search).get("id");

async function validar(){

  if(!id){
    erro("Código inválido");
    return;
  }

  const snap = await getDoc(doc(db,"jogos",id));

  if(!snap.exists()){
    erro("Súmula não encontrada");
    return;
  }

  const j = snap.data();

  if(!j.sumulaFinalizada){
    erro("Súmula não finalizada");
    return;
  }

  ok(j);
}

function ok(j){
  document.getElementById("status").innerHTML =
    `<i class="fa-solid fa-circle-check"></i> SÚMULA OFICIAL VÁLIDA`;

  document.getElementById("status").classList.add("ok");

  document.getElementById("info").innerHTML = `
    ${j.campeonato} <br>
    ${j.timeA?.nome} x ${j.timeB?.nome} <br>
    ${j.data}
  `;
}

function erro(msg){
  document.getElementById("status").innerHTML =
    `<i class="fa-solid fa-circle-xmark"></i> ${msg}`;

  document.getElementById("status").classList.add("erro");
}

window.abrirSumula = function(){
  window.location.href = "sumula-publica.html?id="+id;
};

validar();
</script>

</body>
</html>
