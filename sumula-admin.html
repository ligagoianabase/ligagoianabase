<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súmula ADM - LIGA GOIANA</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#061427;
  --card:#0d2a52;
  --gold:#f7c600;
  --line:rgba(255,255,255,.1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:var(--bg);color:#fff}

.wrap{max-width:1200px;margin:auto;padding:15px}

.topo{text-align:center;margin-bottom:10px}
.placar{font-size:22px;font-weight:900;color:var(--gold)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.box{
  background:var(--card);
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line)
}

input,select{
  width:100%;padding:10px;border-radius:8px;border:none;margin-top:5px
}

.btn{
  width:100%;padding:10px;border-radius:10px;
  font-weight:900;margin-top:6px;cursor:pointer
}

.btn-gold{background:var(--gold);color:#111}
.btn-green{background:#25d366;color:#fff}

.item{
  background:#081c3a;
  padding:6px;
  margin-top:4px;
  border-radius:6px;
  font-size:13px
}

.jog{
  background:#081c3a;
  padding:6px;
  border-radius:6px;
  margin-top:5px;
  font-size:13px
}
</style>
</head>

<body>

<div id="bloqueado" style="display:none;text-align:center;margin-top:100px">
<h2>❌ Acesso negado</h2>
</div>

<div id="app" class="wrap" style="display:none">

<div class="topo">
<h2>SÚMULA ADM</h2>
<div class="placar">
<span id="timeA"></span> <span id="golsA">0</span> x <span id="golsB">0</span> <span id="timeB"></span>
</div>
</div>

<div class="grid">

<div class="box">
<h3 id="nomeTimeA"></h3>
<input id="buscaA" placeholder="Buscar jogador...">
<div id="jogadoresA"></div>

<input id="numeroA" placeholder="Nº camisa">
<input id="minutoA" placeholder="Minuto">
<button class="btn btn-gold" onclick="gol('A')">Gol</button>
<div id="listaGolsA"></div>

<input id="numeroCartaoA" placeholder="Nº camisa">
<select id="tipoCartaoA">
<option value="amarelo">Amarelo</option>
<option value="vermelho">Vermelho</option>
</select>
<input id="minutoCartaoA" placeholder="Minuto">
<button class="btn btn-gold" onclick="cartao('A')">Cartão</button>
<div id="listaCartoesA"></div>
</div>

<div class="box">
<h3 id="nomeTimeB"></h3>
<input id="buscaB" placeholder="Buscar jogador...">
<div id="jogadoresB"></div>

<input id="numeroB" placeholder="Nº camisa">
<input id="minutoB" placeholder="Minuto">
<button class="btn btn-gold" onclick="gol('B')">Gol</button>
<div id="listaGolsB"></div>

<input id="numeroCartaoB" placeholder="Nº camisa">
<select id="tipoCartaoB">
<option value="amarelo">Amarelo</option>
<option value="vermelho">Vermelho</option>
</select>
<input id="minutoCartaoB" placeholder="Minuto">
<button class="btn btn-gold" onclick="cartao('B')">Cartão</button>
<div id="listaCartoesB"></div>
</div>

</div>

<button class="btn btn-green" onclick="finalizar()">FINALIZAR SÚMULA</button>

</div>

<script type="module">
import { db, auth } from "./firebase.js";
import {
collection,getDocs,doc,getDoc,setDoc,updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* 🔥 COPA 2022 */
const jogosCopa={
"final-copa-2022":{
timeA:"Argentina",
timeB:"França",
timeAId:"arg",
timeBId:"fra",
campeonatoId:"copa2022",
status:"finalizado"
}
};

let jogo,jogadores=[],mapA={},mapB={},golsA=[],golsB=[],cartA=[],cartB=[];
const id=new URLSearchParams(location.search).get("id");

/* 🔥 INICIAR */
async function iniciar(){

let snap=await getDoc(doc(db,"jogos",id));

if(snap.exists()){
jogo={id:snap.id,...snap.data()};
}else{
jogo=jogosCopa[id];
}

timeA.textContent=jogo.timeA;
timeB.textContent=jogo.timeB;
nomeTimeA.textContent=jogo.timeA;
nomeTimeB.textContent=jogo.timeB;

const snapJog=await getDocs(collection(db,"jogadores"));
snapJog.forEach(d=>jogadores.push({id:d.id,...d.data()}));

renderJogadores();
}

/* 🔥 RENDER JOGADORES */
function renderJogadores(){

const listaA=jogadores.filter(j=>j.timeId===jogo.timeAId);
const listaB=jogadores.filter(j=>j.timeId===jogo.timeBId);

jogadoresA.innerHTML=listaA.map(j=>`
<div class="jog">
<b>${j.nome}</b><br>
<small>${j.nascimento}</small>
<input placeholder="Nº" oninput="definir('A','${j.id}',this.value)">
</div>
`).join("");

jogadoresB.innerHTML=listaB.map(j=>`
<div class="jog">
<b>${j.nome}</b><br>
<small>${j.nascimento}</small>
<input placeholder="Nº" oninput="definir('B','${j.id}',this.value)">
</div>
`).join("");
}

/* 🔥 MAPEAR NÚMERO */
window.definir=(lado,idJog,num)=>{
if(!num)return;

if(lado==="A"){
if(mapA[num]) return alert("Número já usado");
mapA[num]=jogadores.find(j=>j.id===idJog);
}else{
if(mapB[num]) return alert("Número já usado");
mapB[num]=jogadores.find(j=>j.id===idJog);
}
};

/* 🔥 GOL */
window.gol=(l)=>{
const n=document.getElementById(`numero${l}`).value;
const m=document.getElementById(`minuto${l}`).value;
const j=l==="A"?mapA[n]:mapB[n];
if(!j)return alert("Número inválido");

(l==="A"?golsA:golsB).push({numero:n,nome:j.nome,minuto:m});
render();
};

/* 🔥 CARTÃO */
window.cartao=(l)=>{
const n=document.getElementById(`numeroCartao${l}`).value;
const t=document.getElementById(`tipoCartao${l}`).value;
const m=document.getElementById(`minutoCartao${l}`).value;
const j=l==="A"?mapA[n]:mapB[n];
if(!j)return alert("Número inválido");

(l==="A"?cartA:cartB).push({numero:n,nome:j.nome,tipo:t,minuto:m});
render();
};

/* 🔥 RENDER */
function render(){
listaGolsA.innerHTML=golsA.map(g=>`<div class="item">${g.nome} ${g.minuto}'</div>`).join("");
listaGolsB.innerHTML=golsB.map(g=>`<div class="item">${g.nome} ${g.minuto}'</div>`).join("");

listaCartoesA.innerHTML=cartA.map(c=>`<div class="item">${c.nome} ${c.tipo}</div>`).join("");
listaCartoesB.innerHTML=cartB.map(c=>`<div class="item">${c.nome} ${c.tipo}</div>`).join("");

golsAEl.textContent=golsA.length;
golsBEl.textContent=golsB.length;
}

/* 🔥 FINALIZAR */
window.finalizar=async()=>{

await setDoc(doc(db,"sumulas",id),{
timeA:jogo.timeA,
timeB:jogo.timeB,
golsA:golsA.length,
golsB:golsB.length,
golsDetalhadosA:golsA,
golsDetalhadosB:golsB,
amarelosDetalhadosA:cartA.filter(c=>c.tipo==="amarelo"),
amarelosDetalhadosB:cartB.filter(c=>c.tipo==="amarelo"),
vermelhosDetalhadosA:cartA.filter(c=>c.tipo==="vermelho"),
vermelhosDetalhadosB:cartB.filter(c=>c.tipo==="vermelho"),
campeonatoId:jogo.campeonatoId,
categoria:jogo.categoria,
status:"finalizada"
});

await updateDoc(doc(db,"jogos",id),{
status:"finalizado",
golsA:golsA.length,
golsB:golsB.length
});

location.href=`sumula-publica.html?id=${id}`;
};

/* 🔥 AUTH */
onAuthStateChanged(auth,user=>{
if(!user)return bloqueado.style.display="block";
app.style.display="block";
iniciar();
});
</script>

</body>
</html>
