<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula Admin</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  background:#0b1f3a;
  font-family:Arial;
  color:#fff;
  margin:0;
}

/* AREA QUE VAI VIRAR IMAGEM */
#area{
  width:900px;
  margin:20px auto;
  background:#08172c;
  padding:20px;
  border-radius:10px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid gold;
  padding-bottom:10px;
}

.logo{height:60px;}

.placar{
  text-align:center;
  font-size:40px;
  margin:20px 0;
}

.times{
  display:flex;
  justify-content:space-between;
}

.col{
  width:45%;
}

.evento{
  margin:5px 0;
}

/* BOTÕES */
.botoes{
  text-align:center;
  margin:20px;
}

button{
  padding:12px 20px;
  margin:5px;
  font-weight:bold;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.pdf{background:gold;}
.img{background:green;color:#fff;}
.wpp{background:#25D366;color:#fff;}
</style>
</head>

<body>

<div id="area">

  <div class="header">
    <img src="logo-liga.jfif" class="logo">

    <h2>SÚMULA OFICIAL</h2>

    <img id="logoCamp" class="logo">
  </div>

  <div id="dados" style="text-align:center;margin-top:10px;"></div>

  <div class="placar" id="placar"></div>

  <div class="times">
    <div class="col">
      <h3 id="timeA"></h3>
      <div id="jogadoresA"></div>
    </div>

    <div class="col">
      <h3 id="timeB"></h3>
      <div id="jogadoresB"></div>
    </div>
  </div>

  <hr>

  <div id="eventos"></div>

  <hr>

  <div id="obs"></div>

</div>

<div class="botoes">
  <button class="img" onclick="gerarImagem()">📸 Baixar Imagem</button>
  <button class="pdf" onclick="gerarPDF()">📄 Baixar PDF</button>
  <button class="wpp" onclick="enviarWhatsApp()">📲 WhatsApp</button>
</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const jogoId = new URLSearchParams(window.location.search).get("id");

let imagemGerada = "";

async function carregar(){

  const snap = await getDoc(doc(db,"sumulas",jogoId));
  const s = snap.data();

  document.getElementById("dados").innerText =
    `${s.campeonato} | ${s.categoria} | ${s.data} | ${s.local}`;

  document.getElementById("placar").innerText =
    `${s.golsA} x ${s.golsB}`;

  document.getElementById("timeA").innerText = s.timeA;
  document.getElementById("timeB").innerText = s.timeB;

  document.getElementById("logoCamp").src =
    s.logoCampeonato || "logo-liga.jfif";

  document.getElementById("jogadoresA").innerHTML =
    (s.jogadoresA || []).map(j => `#${j.numero} ${j.nome}`).join("<br>");

  document.getElementById("jogadoresB").innerHTML =
    (s.jogadoresB || []).map(j => `#${j.numero} ${j.nome}`).join("<br>");

  document.getElementById("eventos").innerHTML =
    (s.golsDetalhadosA || []).map(e => `⚽ ${e.nome} (${s.timeA})`).join("<br>")
    +
    (s.golsDetalhadosB || []).map(e => `⚽ ${e.nome} (${s.timeB})`).join("<br>")
    +
    (s.amarelosDetalhadosA || []).map(e => `🟨 ${e.nome}`).join("<br>")
    +
    (s.vermelhosDetalhadosA || []).map(e => `🟥 ${e.nome}`).join("<br>");

  document.getElementById("obs").innerText =
    s.observacoes || "";
}

carregar();

/* GERAR IMAGEM */
window.gerarImagem = async function(){

  const canvas = await html2canvas(document.getElementById("area"));
  const img = canvas.toDataURL("image/png");

  imagemGerada = img;

  const link = document.createElement("a");
  link.download = "sumula.png";
  link.href = img;
  link.click();
}

/* GERAR PDF */
window.gerarPDF = async function(){

  if(!imagemGerada){
    await gerarImagem();
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  pdf.addImage(imagemGerada, 'PNG', 10, 10, 190, 0);
  pdf.save("sumula.pdf");
}

/* WHATSAPP */
window.enviarWhatsApp = function(){

  const texto = encodeURIComponent("Súmula do jogo disponível");

  window.open(`https://wa.me/?text=${texto}`, "_blank");
}
</script>

</body>
</html>
