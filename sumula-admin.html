<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula ADM - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0b1f3a;
  --bg-dark:#08172c;
  --card:#102a52;
  --card2:#0d2346;
  --gold:#f7c600;
  --gold-soft:rgba(247,198,0,.12);
  --gold-line:rgba(247,198,0,.28);
  --white:#ffffff;
  --muted:#d9e3f2;
  --green:#1b5e20;
  --red:#b42323;
  --shadow:0 8px 22px rgba(0,0,0,.28);
  --max:1240px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:
    linear-gradient(rgba(11,31,58,.88),rgba(11,31,58,.94)),
    url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
}

a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none}
input,select,textarea{font-family:inherit}

.wrap{
  width:min(100% - 28px,var(--max));
  margin:0 auto;
}

header{
  background:rgba(8,23,44,.96);
  border-bottom:3px solid var(--gold);
  box-shadow:var(--shadow);
}

.header-inner{
  min-height:84px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  padding:14px 0;
}

.header-left,.header-right{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.header-title{
  flex:1;
  text-align:center;
  font-size:24px;
  font-weight:900;
}

.top-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:10px 16px;
  border-radius:10px;
  font-weight:900;
}

.btn-light{background:#fff4cf;color:#111}
.btn-gold{background:var(--gold);color:#111}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}

.container{padding:24px 0 34px}

.panel{
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(12,33,64,.96));
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}

.titulo-bloco{
  color:var(--gold);
  font-size:20px;
  font-weight:900;
  margin-bottom:14px;
}

.status{
  padding:12px;
  border-radius:12px;
  margin-top:12px;
  background:rgba(255,255,255,.06);
  color:#fff;
  font-weight:900;
  text-align:center;
}

.placar-box{
  display:grid;
  grid-template-columns:1fr 230px 1fr;
  gap:18px;
  align-items:center;
}

.time-box{
  text-align:center;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:16px;
}

.time-box img{
  width:90px;
  height:90px;
  object-fit:contain;
  background:#fff;
  border-radius:18px;
  border:2px solid var(--gold);
  margin:0 auto 10px;
}

.time-box h2{
  color:#fff;
  font-size:22px;
}

.placar-input{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.placar-input input{
  width:80px;
  text-align:center;
  font-size:34px;
  font-weight:900;
}

.placar-input span{
  font-size:34px;
  font-weight:900;
  color:var(--gold);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.full{grid-column:1/-1}

label{
  display:block;
  margin-bottom:6px;
  font-weight:900;
  font-size:14px;
}

input,select,textarea{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#f5f7fb;
  color:#111;
  font-size:14px;
}

textarea{min-height:110px;resize:vertical}

table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,.04);
}

th,td{
  border:1px solid rgba(255,255,255,.12);
  padding:8px;
  font-size:13px;
}

th{
  background:rgba(247,198,0,.14);
  color:var(--gold);
  text-align:left;
}

.table-actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.small-btn{
  padding:7px 10px;
  border-radius:8px;
  font-weight:900;
  font-size:12px;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}

.vazio{
  color:var(--muted);
  padding:12px;
  text-align:center;
}

@media(max-width:900px){
  .header-title{order:3;width:100%}
  .header-left,.header-right{width:100%;justify-content:center}
  .placar-box{grid-template-columns:1fr}
  .grid,.form-grid{grid-template-columns:1fr}
  .top-btn{width:100%}
}
</style>
</head>

<body>

<header>
  <div class="wrap header-inner">
    <div class="header-left">
      <button class="top-btn btn-light" onclick="voltarPagina()">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </button>

      <a href="admin.html" class="top-btn btn-light">
        <i class="fa-solid fa-gears"></i> Painel ADM
      </a>

      <a href="jogos-admin.html" class="top-btn btn-light">
        <i class="fa-solid fa-calendar-days"></i> Jogos
      </a>
    </div>

    <div class="header-title">Súmula ADM / Árbitro</div>

    <div class="header-right">
      <button class="top-btn btn-gold" onclick="salvarRascunho()">
        <i class="fa-solid fa-floppy-disk"></i> Salvar
      </button>
    </div>
  </div>
</header>

<main class="wrap container">

<section class="panel">
  <div class="titulo-bloco">Dados da Partida</div>
  <div id="infoJogo">Carregando jogo...</div>
  <div class="status" id="statusJogo">Aguardando...</div>
</section>

<section class="panel">
  <div class="placar-box">
    <div class="time-box">
      <img id="logoA" src="logo-liga.jfif">
      <h2 id="timeA">Time A</h2>
    </div>

    <div class="placar-input">
      <input id="placarA" type="number" min="0" value="0">
      <span>x</span>
      <input id="placarB" type="number" min="0" value="0">
    </div>

    <div class="time-box">
      <img id="logoB" src="logo-liga.jfif">
      <h2 id="timeB">Time B</h2>
    </div>
  </div>
</section>

<section class="grid">

  <div class="panel">
    <div class="titulo-bloco" id="tituloEscA">Escalação Time A</div>
    <table>
      <thead>
        <tr>
          <th>Nº</th>
          <th>Jogador</th>
          <th>Posição</th>
          <th>C</th>
        </tr>
      </thead>
      <tbody id="elencoA"></tbody>
    </table>
  </div>

  <div class="panel">
    <div class="titulo-bloco" id="tituloEscB">Escalação Time B</div>
    <table>
      <thead>
        <tr>
          <th>Nº</th>
          <th>Jogador</th>
          <th>Posição</th>
          <th>C</th>
        </tr>
      </thead>
      <tbody id="elencoB"></tbody>
    </table>
  </div>

</section>

<section class="grid">

  <div class="panel">
    <div class="titulo-bloco">Adicionar Gol</div>

    <div class="form-grid">
      <div>
        <label>Time</label>
        <select id="golTime">
          <option value="A">Time A</option>
          <option value="B">Time B</option>
        </select>
      </div>

      <div>
        <label>Jogador</label>
        <select id="golJogador"></select>
      </div>

      <div>
        <label>Minuto</label>
        <input id="golTempo" placeholder="Ex: 23">
      </div>

      <div>
        <label>Tipo</label>
        <select id="golTipo">
          <option value="Normal">Normal</option>
          <option value="Pênalti">Pênalti</option>
          <option value="Contra">Contra</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button class="top-btn btn-gold" onclick="adicionarGol()">
        <i class="fa-solid fa-futbol"></i> Adicionar Gol
      </button>
    </div>

    <table style="margin-top:12px">
      <tbody id="listaGols"></tbody>
    </table>
  </div>

  <div class="panel">
    <div class="titulo-bloco">Adicionar Cartão</div>

    <div class="form-grid">
      <div>
        <label>Time</label>
        <select id="cartaoTime">
          <option value="A">Time A</option>
          <option value="B">Time B</option>
        </select>
      </div>

      <div>
        <label>Jogador</label>
        <select id="cartaoJogador"></select>
      </div>

      <div>
        <label>Minuto</label>
        <input id="cartaoTempo" placeholder="Ex: 45">
      </div>

      <div>
        <label>Tipo</label>
        <select id="cartaoTipo">
          <option value="amarelo">Amarelo</option>
          <option value="vermelho">Vermelho</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button class="top-btn btn-gold" onclick="adicionarCartao()">
        <i class="fa-solid fa-square"></i> Adicionar Cartão
      </button>
    </div>

    <table style="margin-top:12px">
      <tbody id="listaCartoes"></tbody>
    </table>
  </div>

</section>
<section class="panel">
  <div class="titulo-bloco">Melhor em Campo</div>

  <select id="melhorJogador"></select>
</section>

<section class="panel">
  <div class="titulo-bloco">Observações do Árbitro</div>
  <textarea id="observacoes" placeholder="Digite observações da partida..."></textarea>
</section>

<section class="panel">
  <div class="actions">
    <button class="top-btn btn-green" onclick="finalizarSumula()">
      <i class="fa-solid fa-check"></i> Finalizar Súmula
    </button>
  </div>
</section>

</main>

<script type="module">
import { db } from "./firebase.js";
import {
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const id = new URLSearchParams(location.search).get("id");

let jogo = {};
let gols = [];
let cartoes = [];

window.voltarPagina = function(){
  window.history.back();
};

// ===== LOAD =====
async function carregar(){

  const snap = await getDoc(doc(db,"jogos",id));
  jogo = snap.data();

  // HEADER
  document.getElementById("infoJogo").innerHTML =
    `${jogo.campeonato} - ${jogo.categoria}<br>
     ${jogo.timeA.nome} x ${jogo.timeB.nome}`;

  document.getElementById("statusJogo").innerText = jogo.status || "pendente";

  // TIMES
  timeA.innerText = jogo.timeA.nome;
  timeB.innerText = jogo.timeB.nome;

  logoA.src = jogo.timeA.logo;
  logoB.src = jogo.timeB.logo;

  tituloEscA.innerText = "Escalação - " + jogo.timeA.nome;
  tituloEscB.innerText = "Escalação - " + jogo.timeB.nome;

  elencoA.innerHTML = renderJogadores(jogo.titularesA);
  elencoB.innerHTML = renderJogadores(jogo.titularesB);

  atualizarSelectJogadores();

  melhorJogador.innerHTML = gerarOptionsJogadores();

}

carregar();

// ===== RENDER =====
function renderJogadores(lista){
  return (lista || []).map(j => `
    <tr>
      <td>${j.numero}</td>
      <td>${j.nome}</td>
      <td>${j.posicao}</td>
      <td>${j.capitao ? "C" : ""}</td>
    </tr>
  `).join("");
}

function gerarOptionsJogadores(){
  const todos = [...(jogo.titularesA||[]), ...(jogo.titularesB||[])];
  return todos.map(j => `<option>${j.nome}</option>`).join("");
}

function atualizarSelectJogadores(){

  const todosA = jogo.titularesA || [];
  const todosB = jogo.titularesB || [];

  golJogador.innerHTML =
    todosA.map(j=>`<option value="${j.nome}" data-time="A">${j.nome}</option>`).join("") +
    todosB.map(j=>`<option value="${j.nome}" data-time="B">${j.nome}</option>`).join("");

  cartaoJogador.innerHTML = golJogador.innerHTML;
}

// ===== GOLS =====
window.adicionarGol = function(){

  const nome = golJogador.value;
  const tempo = golTempo.value;
  const tipo = golTipo.value;
  const time = golTime.value;

  if(!nome || !tempo) return alert("Preencha tudo");

  gols.push({nome,tempo,tipo,time});

  atualizarListaGols();
};

function atualizarListaGols(){
  listaGols.innerHTML = gols.map((g,i)=>`
    <tr>
      <td>⚽ ${g.tempo}'</td>
      <td>${g.nome}</td>
      <td>${g.tipo}</td>
      <td><button onclick="removerGol(${i})">X</button></td>
    </tr>
  `).join("");
}

window.removerGol = function(i){
  gols.splice(i,1);
  atualizarListaGols();
};

// ===== CARTÕES =====
window.adicionarCartao = function(){

  const nome = cartaoJogador.value;
  const tempo = cartaoTempo.value;
  const tipo = cartaoTipo.value;
  const time = cartaoTime.value;

  if(!nome || !tempo) return alert("Preencha tudo");

  cartoes.push({nome,tempo,tipo,time});

  atualizarListaCartoes();
};

function atualizarListaCartoes(){
  listaCartoes.innerHTML = cartoes.map((c,i)=>`
    <tr>
      <td>${c.tipo==="vermelho"?"🟥":"🟨"} ${c.tempo}'</td>
      <td>${c.nome}</td>
      <td><button onclick="removerCartao(${i})">X</button></td>
    </tr>
  `).join("");
}

window.removerCartao = function(i){
  cartoes.splice(i,1);
  atualizarListaCartoes();
};

// ===== SALVAR =====
window.salvarRascunho = async function(){

  await updateDoc(doc(db,"jogos",id),{
    gols,
    cartoes,
    placar:{
      A:Number(placarA.value||0),
      B:Number(placarB.value||0)
    },
    observacoes:observacoes.value,
    melhorJogador:melhorJogador.value
  });

  alert("Salvo!");
};

// ===== FINALIZAR =====
window.finalizarSumula = async function(){

  await updateDoc(doc(db,"jogos",id),{
    gols,
    cartoes,
    placar:{
      A:Number(placarA.value||0),
      B:Number(placarB.value||0)
    },
    observacoes:observacoes.value,
    melhorJogador:melhorJogador.value,
    status:"finalizado",
    sumulaFinalizada:true
  });

  alert("Súmula finalizada!");

  window.location.href = "sumula-publica.html?id="+id;
};

</script>

</body>
</html>
