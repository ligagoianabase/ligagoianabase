<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula ADM - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0b1f3a;
  --bg-dark:#08172c;
  --card:#102a52;
  --card2:#0d2346;
  --gold:#f7c600;
  --gold-soft:rgba(247,198,0,.12);
  --gold-line:rgba(247,198,0,.28);
  --white:#ffffff;
  --muted:#d9e3f2;
  --green:#1b5e20;
  --red:#b42323;
  --shadow:0 8px 22px rgba(0,0,0,.28);
  --max:1240px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:
    linear-gradient(rgba(11,31,58,.88),rgba(11,31,58,.94)),
    url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
}

a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none}
input,select,textarea{font-family:inherit}

.wrap{
  width:min(100% - 28px,var(--max));
  margin:0 auto;
}

header{
  background:rgba(8,23,44,.96);
  border-bottom:3px solid var(--gold);
  box-shadow:var(--shadow);
}

.header-inner{
  min-height:84px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  padding:14px 0;
}

.header-left,
.header-right{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.header-title{
  flex:1;
  text-align:center;
  font-size:24px;
  font-weight:900;
}

.top-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:10px 16px;
  border-radius:10px;
  font-weight:900;
}

.btn-light{background:#fff4cf;color:#111}
.btn-gold{background:var(--gold);color:#111}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}

.container{padding:24px 0 34px}

.panel{
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(12,33,64,.96));
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}

.titulo-bloco{
  color:var(--gold);
  font-size:20px;
  font-weight:900;
  margin-bottom:14px;
}

.status{
  padding:12px;
  border-radius:12px;
  margin-top:12px;
  background:rgba(255,255,255,.06);
  color:#fff;
  font-weight:900;
  text-align:center;
}

.status.finalizado{background:rgba(27,94,32,.85)}
.status.negado{background:rgba(180,35,35,.85)}
.status.aviso{background:rgba(122,90,0,.88)}

.placar-box{
  display:grid;
  grid-template-columns:1fr 230px 1fr;
  gap:18px;
  align-items:center;
}

.time-box{
  text-align:center;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:16px;
}

.time-box img{
  width:90px;
  height:90px;
  object-fit:contain;
  background:#fff;
  border-radius:18px;
  border:2px solid var(--gold);
  margin:0 auto 10px;
}

.time-box h2{
  color:#fff;
  font-size:22px;
}

.placar-input{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.placar-input input{
  width:80px;
  text-align:center;
  font-size:34px;
  font-weight:900;
}

.placar-input span{
  font-size:34px;
  font-weight:900;
  color:var(--gold);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.full{grid-column:1/-1}

label{
  display:block;
  margin-bottom:6px;
  font-weight:900;
  font-size:14px;
}

input,select,textarea{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#f5f7fb;
  color:#111;
  font-size:14px;
}

textarea{
  min-height:110px;
  resize:vertical;
}

table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,.04);
}

th,td{
  border:1px solid rgba(255,255,255,.12);
  padding:8px;
  font-size:13px;
}

th{
  background:rgba(247,198,0,.14);
  color:var(--gold);
  text-align:left;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}

.small-btn{
  padding:7px 10px;
  border-radius:8px;
  font-weight:900;
  font-size:12px;
}

.vazio{
  color:var(--muted);
  padding:12px;
  text-align:center;
}

input:disabled,
select:disabled,
textarea:disabled,
button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

@media(max-width:900px){
  .header-title{order:3;width:100%}
  .header-left,.header-right{width:100%;justify-content:center}
  .placar-box,.grid,.form-grid{grid-template-columns:1fr}
  .top-btn{width:100%}
}
</style>
</head>

<body>

<header>
  <div class="wrap header-inner">
    <div class="header-left">
      <a href="admin.html" class="top-btn btn-light">
        <i class="fa-solid fa-gears"></i> Painel ADM
      </a>

      <a href="jogos-admin.html" class="top-btn btn-light">
        <i class="fa-solid fa-calendar-days"></i> Jogos
      </a>
    </div>

    <div class="header-title">Súmula ADM / Controle</div>

    <div class="header-right">
      <button class="top-btn btn-gold" onclick="salvarRascunho()">
        <i class="fa-solid fa-floppy-disk"></i> Salvar
      </button>
    </div>
  </div>
</header>

<main class="wrap container">

<section class="panel">
  <div class="titulo-bloco">Dados da Partida</div>
  <div id="infoJogo">Carregando jogo...</div>
  <div class="status" id="statusJogo">Aguardando...</div>
</section>

<section class="panel">
  <div class="placar-box">
    <div class="time-box">
      <img id="logoA" src="logo-liga.jfif">
      <h2 id="timeA">Time A</h2>
    </div>

    <div class="placar-input">
      <input id="placarA" type="number" min="0" value="0">
      <span>x</span>
      <input id="placarB" type="number" min="0" value="0">
    </div>

    <div class="time-box">
      <img id="logoB" src="logo-liga.jfif">
      <h2 id="timeB">Time B</h2>
    </div>
  </div>
</section>

<section class="grid">
  <div class="panel">
    <div class="titulo-bloco" id="tituloEscA">Escalação Time A</div>
    <table>
      <thead>
        <tr>
          <th>Nº</th>
          <th>Jogador</th>
          <th>Posição</th>
          <th>C</th>
        </tr>
      </thead>
      <tbody id="elencoA"></tbody>
    </table>
  </div>

  <div class="panel">
    <div class="titulo-bloco" id="tituloEscB">Escalação Time B</div>
    <table>
      <thead>
        <tr>
          <th>Nº</th>
          <th>Jogador</th>
          <th>Posição</th>
          <th>C</th>
        </tr>
      </thead>
      <tbody id="elencoB"></tbody>
    </table>
  </div>
</section>

<section class="grid">
  <div class="panel">
    <div class="titulo-bloco">Adicionar Gol</div>

    <div class="form-grid">
      <div>
        <label>Time</label>
        <select id="golTime" onchange="atualizarSelectsPorTime()">
          <option value="A">Time A</option>
          <option value="B">Time B</option>
        </select>
      </div>

      <div>
        <label>Jogador</label>
        <select id="golJogador"></select>
      </div>

      <div>
        <label>Minuto</label>
        <input id="golTempo" placeholder="Ex: 23">
      </div>

      <div>
        <label>Tipo</label>
        <select id="golTipo">
          <option value="Normal">Normal</option>
          <option value="Pênalti">Pênalti</option>
          <option value="Contra">Contra</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button class="top-btn btn-gold" onclick="adicionarGol()">
        <i class="fa-solid fa-futbol"></i> Adicionar Gol
      </button>
    </div>

    <table style="margin-top:12px">
      <tbody id="listaGols"></tbody>
    </table>
  </div>

  <div class="panel">
    <div class="titulo-bloco">Adicionar Cartão</div>

    <div class="form-grid">
      <div>
        <label>Time</label>
        <select id="cartaoTime" onchange="atualizarSelectsPorTime()">
          <option value="A">Time A</option>
          <option value="B">Time B</option>
        </select>
      </div>

      <div>
        <label>Jogador</label>
        <select id="cartaoJogador"></select>
      </div>

      <div>
        <label>Minuto</label>
        <input id="cartaoTempo" placeholder="Ex: 45">
      </div>

      <div>
        <label>Tipo</label>
        <select id="cartaoTipo" onchange="mostrarTipoVermelhoADM()">
          <option value="amarelo">Amarelo</option>
          <option value="vermelho">Vermelho</option>
        </select>
      </div>

      <div class="full" id="boxTipoVermelho" style="display:none">
        <label>Tipo de vermelho</label>
        <select id="cartaoVermelhoTipo">
          <option value="direto">Vermelho direto</option>
          <option value="segundo_amarelo">Segundo amarelo</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button class="top-btn btn-gold" onclick="adicionarCartao()">
        <i class="fa-solid fa-square"></i> Adicionar Cartão
      </button>
    </div>

    <table style="margin-top:12px">
      <tbody id="listaCartoes"></tbody>
    </table>
  </div>
</section>

<section class="panel">
  <div class="titulo-bloco">Melhor em Campo</div>
  <select id="melhorJogador"></select>
</section>

<section class="panel">
  <div class="titulo-bloco">Observações do Árbitro</div>
  <textarea id="observacoes" placeholder="Digite observações da partida..."></textarea>
</section>

<section class="panel">
  <div class="actions">
    <button class="top-btn btn-green" onclick="finalizarSumula()">
      <i class="fa-solid fa-check"></i> Finalizar Súmula
    </button>

    <button class="top-btn btn-light" onclick="abrirPublica()">
      <i class="fa-solid fa-eye"></i> Ver Pública
    </button>
  </div>
</section>

</main>
<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import {
  doc,
  getDoc,
  updateDoc,
  setDoc,
  increment,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const id = new URLSearchParams(location.search).get("id");

let jogo = {};
let sumula = {};
let usuarioAtual = null;
let perfilAtual = null;
let gols = [];
let cartoes = [];
let finalizada = false;
let acessoLiberado = false;
let estatisticasAplicadas = false;

function el(id){ return document.getElementById(id); }

function safe(v){ return v || ""; }

function normalizar(txt){
  return String(txt || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function pegarArray(...listas){
  for(const lista of listas){
    if(Array.isArray(lista) && lista.length) return lista;
  }
  return [];
}

function todosJogadores(){
  return [
    ...pegarArray(sumula.jogadoresA, sumula.titularesA, sumula.escalacaoA, jogo.jogadoresA, jogo.titularesA, jogo.escalacaoA),
    ...pegarArray(sumula.jogadoresB, sumula.titularesB, sumula.escalacaoB, jogo.jogadoresB, jogo.titularesB, jogo.escalacaoB)
  ];
}

function jogadoresDoLado(lado){
  return lado === "A"
    ? pegarArray(sumula.jogadoresA, sumula.titularesA, sumula.escalacaoA, jogo.jogadoresA, jogo.titularesA, jogo.escalacaoA)
    : pegarArray(sumula.jogadoresB, sumula.titularesB, sumula.escalacaoB, jogo.jogadoresB, jogo.titularesB, jogo.escalacaoB);
}

function jogadorPorIdOuNome(idOuNome){
  return todosJogadores().find(j => j.id === idOuNome || j.jogadorId === idOuNome || j.nome === idOuNome) || {};
}

function usuarioEhAdmin(){
  const tipo = normalizar(perfilAtual?.tipo || perfilAtual?.perfil || perfilAtual?.funcao || perfilAtual?.cargo || "");
  const nivel = normalizar(perfilAtual?.nivel || perfilAtual?.role || "");
  return tipo.includes("admin") || nivel.includes("admin") || perfilAtual?.admin === true;
}

function usuarioEhArbitroDesignado(){
  if(!usuarioAtual) return false;

  const uid = usuarioAtual.uid;
  const email = normalizar(usuarioAtual.email);

  const arbitroUid = sumula.arbitroUid || jogo.arbitroUid || "";
  const arbitroId = sumula.arbitroId || jogo.arbitroId || "";
  const arbitroEmail = normalizar(sumula.arbitroEmail || jogo.arbitroEmail || "");

  if(uid && arbitroUid && uid === arbitroUid) return true;
  if(uid && arbitroId && uid === arbitroId) return true;
  if(email && arbitroEmail && email === arbitroEmail) return true;
  if(perfilAtual?.arbitroId && arbitroId && perfilAtual.arbitroId === arbitroId) return true;
  if(perfilAtual?.id && arbitroId && perfilAtual.id === arbitroId) return true;
  if(normalizar(perfilAtual?.nome) && normalizar(jogo.arbitro) && normalizar(perfilAtual.nome) === normalizar(jogo.arbitro)) return true;

  return false;
}

function renderJogadores(lista){
  if(!lista || !lista.length){
    return `<tr><td colspan="4">Nenhum jogador encontrado.</td></tr>`;
  }

  return lista.map(j => `
    <tr>
      <td>${j.numero || "-"}</td>
      <td>${j.nome || "-"}</td>
      <td>${j.posicao || "-"}</td>
      <td>${j.capitao ? "C" : ""}</td>
    </tr>
  `).join("");
}

function gerarOptionsJogadores(lista){
  if(!lista || !lista.length){
    return `<option value="">Nenhum jogador</option>`;
  }

  return lista.map(j => `
    <option value="${j.id || j.jogadorId || j.nome}">
      ${j.numero || "-"} - ${j.nome || "-"}
    </option>
  `).join("");
}

window.mostrarTipoVermelhoADM = function(){
  el("boxTipoVermelho").style.display = el("cartaoTipo").value === "vermelho" ? "block" : "none";
};

window.atualizarSelectsPorTime = function(){
  el("golJogador").innerHTML = gerarOptionsJogadores(jogadoresDoLado(el("golTime").value));
  el("cartaoJogador").innerHTML = gerarOptionsJogadores(jogadoresDoLado(el("cartaoTime").value));
};

function atualizarMelhorJogador(){
  el("melhorJogador").innerHTML = gerarOptionsJogadores(todosJogadores());
}

function atualizarPlacarAutomatico(){
  el("placarA").value = gols.filter(g => g.time === "A").length;
  el("placarB").value = gols.filter(g => g.time === "B").length;
}

function atualizarListaGols(){
  atualizarPlacarAutomatico();

  el("listaGols").innerHTML = gols.map((g,i)=>`
    <tr>
      <td>⚽ ${g.tempo || g.minuto || "-"}'</td>
      <td>${g.numero || "-"}</td>
      <td>${g.nome || "-"}</td>
      <td>${g.tipo || "-"}</td>
      <td><button class="small-btn btn-red" onclick="removerGol(${i})">X</button></td>
    </tr>
  `).join("") || `<tr><td colspan="5" class="vazio">Nenhum gol lançado.</td></tr>`;
}

function atualizarListaCartoes(){
  el("listaCartoes").innerHTML = cartoes.map((c,i)=>`
    <tr>
      <td>${c.tipo === "vermelho" ? "🟥" : "🟨"} ${c.tempo || c.minuto || "-"}'</td>
      <td>${c.numero || "-"}</td>
      <td>${c.nome || "-"}</td>
      <td>${c.tipo || "-"} ${c.vermelhoTipo ? "(" + (c.vermelhoTipo === "segundo_amarelo" ? "2º amarelo" : "direto") + ")" : ""}</td>
      <td><button class="small-btn btn-red" onclick="removerCartao(${i})">X</button></td>
    </tr>
  `).join("") || `<tr><td colspan="5" class="vazio">Nenhum cartão lançado.</td></tr>`;
}

function bloquearTela(){
  document.querySelectorAll("input,select,textarea,button").forEach(c=>{
    if(c.textContent && c.textContent.includes("Ver Pública")) return;
    c.disabled = true;
  });
}

function liberarTela(){
  document.querySelectorAll("input,select,textarea,button").forEach(c=>{
    c.disabled = false;
  });
}

function bloquearPorAcesso(){
  acessoLiberado = false;

  document.querySelectorAll("input,select,textarea,button").forEach(c=>{
    if(c.textContent && c.textContent.includes("Ver Pública")) return;
    c.disabled = true;
  });

  el("statusJogo").innerText = "ACESSO NEGADO: somente o ADM ou o árbitro designado pode acessar esta súmula.";
  el("statusJogo").className = "status negado";
}

async function carregarPerfilUsuario(uid){
  const caminhos = [
    ["usuarios",uid],
    ["users",uid],
    ["admins",uid],
    ["arbitros",uid]
  ];

  for(const caminho of caminhos){
    const snap = await getDoc(doc(db,caminho[0],caminho[1]));
    if(snap.exists()) return {id:snap.id,...snap.data()};
  }

  return null;
}

async function carregar(){
  if(!id){
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:40px'>Jogo não informado.</h2>";
    return;
  }

  const jogoSnap = await getDoc(doc(db,"jogos",id));

  if(!jogoSnap.exists()){
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:40px'>Jogo não encontrado.</h2>";
    return;
  }

  jogo = {id:jogoSnap.id,...jogoSnap.data()};

  const sumulaSnap = await getDoc(doc(db,"sumulas",id));

  if(sumulaSnap.exists()){
    sumula = {id:sumulaSnap.id,...sumulaSnap.data()};
  }else{
    sumula = {
      id,
      jogoId:id,
      ...jogo,
      status:"pendente",
      sumulaStatus:"pendente",
      sumulaFinalizada:false,
      publica:false,
      publico:false,
      finalizadaEm:null,
      estatisticasAplicadas:false,
      criadaEm:serverTimestamp()
    };

    await setDoc(doc(db,"sumulas",id),sumula,{merge:true});
  }

  gols = Array.isArray(sumula.gols) ? sumula.gols : Array.isArray(jogo.gols) ? jogo.gols : [];
  cartoes = Array.isArray(sumula.cartoes) ? sumula.cartoes : Array.isArray(jogo.cartoes) ? jogo.cartoes : [];

  finalizada = sumula.sumulaFinalizada === true || jogo.sumulaFinalizada === true || normalizar(sumula.status) === "finalizado";
  estatisticasAplicadas = sumula.estatisticasAplicadas === true || jogo.estatisticasAplicadas === true;

  el("infoJogo").innerHTML = `
    <strong>${safe(sumula.campeonato || jogo.campeonato)}</strong> - ${safe(sumula.categoria || jogo.categoria)}<br>
    ${safe(sumula.rodada || jogo.rodada)} | ${safe(sumula.data || jogo.data)} | ${safe(sumula.local || jogo.local)}
    <br>Árbitro: <strong>${safe(sumula.arbitro || jogo.arbitro || "-")}</strong>
  `;

  el("statusJogo").innerText = finalizada
    ? "SÚMULA FINALIZADA"
    : (sumula.sumulaStatus || sumula.status || jogo.status || "pendente");

  el("statusJogo").className = finalizada ? "status finalizado" : "status";

  el("timeA").innerText = sumula.timeA?.nome || jogo.timeA?.nome || "Time A";
  el("timeB").innerText = sumula.timeB?.nome || jogo.timeB?.nome || "Time B";

  el("logoA").src = sumula.timeA?.logo || sumula.timeA?.escudo || jogo.timeA?.logo || jogo.timeA?.escudo || "logo-liga.jfif";
  el("logoB").src = sumula.timeB?.logo || sumula.timeB?.escudo || jogo.timeB?.logo || jogo.timeB?.escudo || "logo-liga.jfif";

  el("placarA").value = gols.filter(g => g.time === "A").length || sumula.golsA || jogo.golsA || 0;
  el("placarB").value = gols.filter(g => g.time === "B").length || sumula.golsB || jogo.golsB || 0;

  el("tituloEscA").innerText = "Escalação - " + (sumula.timeA?.nome || jogo.timeA?.nome || "Time A");
  el("tituloEscB").innerText = "Escalação - " + (sumula.timeB?.nome || jogo.timeB?.nome || "Time B");

  el("elencoA").innerHTML = renderJogadores(jogadoresDoLado("A"));
  el("elencoB").innerHTML = renderJogadores(jogadoresDoLado("B"));

  el("observacoes").value = sumula.observacoes || sumula.observacoesArbitro || jogo.observacoes || jogo.observacoesArbitro || "";

  atualizarSelectsPorTime();
  atualizarMelhorJogador();

  const melhorId = sumula.melhorJogadorId || jogo.melhorJogadorId;
  const melhorNome = sumula.melhorJogador || jogo.melhorJogador;

  if(melhorId){
    el("melhorJogador").value = melhorId;
  }else if(melhorNome){
    const mj = todosJogadores().find(j => j.nome === melhorNome);
    if(mj) el("melhorJogador").value = mj.id || mj.jogadorId || mj.nome;
  }

  atualizarListaGols();
  atualizarListaCartoes();

  if(!acessoLiberado){
    bloquearPorAcesso();
    return;
  }

  liberarTela();

  if(finalizada){
    bloquearTela();
  }
}

window.adicionarGol = function(){
  if(!acessoLiberado || finalizada) return;

  const jogador = jogadorPorIdOuNome(el("golJogador").value);

  if(!jogador.nome) return alert("Selecione o jogador.");
  if(!el("golTempo").value) return alert("Digite o minuto.");

  gols.push({
    time:el("golTime").value,
    jogadorId:jogador.id || jogador.jogadorId || "",
    nome:jogador.nome || "",
    numero:jogador.numero || "",
    tempo:el("golTempo").value,
    minuto:el("golTempo").value,
    tipo:el("golTipo").value
  });

  el("golTempo").value = "";
  atualizarListaGols();
};

window.removerGol = function(i){
  if(!acessoLiberado || finalizada) return;
  gols.splice(i,1);
  atualizarListaGols();
};

function dadosBaseSalvar(finalizar=false){
  const melhor = jogadorPorIdOuNome(el("melhorJogador").value);
  const golsA = gols.filter(g=>g.time==="A").length;
  const golsB = gols.filter(g=>g.time==="B").length;

  return {
    jogoId:id,

    campeonatoId:sumula.campeonatoId || jogo.campeonatoId || "",
    campeonato:sumula.campeonato || jogo.campeonato || "",
    campeonatoNome:sumula.campeonatoNome || jogo.campeonatoNome || sumula.campeonato || jogo.campeonato || "",
    categoria:sumula.categoria || jogo.categoria || "",
    temporada:sumula.temporada || jogo.temporada || "",
    rodada:sumula.rodada || jogo.rodada || "",
    fase:sumula.fase || jogo.fase || "1ª Fase",

    data:sumula.data || jogo.data || "",
    dataHora:sumula.dataHora || jogo.dataHora || jogo.data || "",
    hora:sumula.hora || jogo.hora || "",
    local:sumula.local || jogo.local || "",
    campo:sumula.campo || jogo.campo || jogo.local || "",

    timeA:sumula.timeA || jogo.timeA || {},
    timeB:sumula.timeB || jogo.timeB || {},
    timeAId:sumula.timeAId || jogo.timeAId || sumula.timeA?.id || jogo.timeA?.id || "",
    timeBId:sumula.timeBId || jogo.timeBId || sumula.timeB?.id || jogo.timeB?.id || "",

    jogadoresA:pegarArray(sumula.jogadoresA, sumula.titularesA, sumula.escalacaoA, jogo.jogadoresA, jogo.titularesA, jogo.escalacaoA),
    jogadoresB:pegarArray(sumula.jogadoresB, sumula.titularesB, sumula.escalacaoB, jogo.jogadoresB, jogo.titularesB, jogo.escalacaoB),
    escalacaoA:pegarArray(sumula.jogadoresA, sumula.titularesA, sumula.escalacaoA, jogo.jogadoresA, jogo.titularesA, jogo.escalacaoA),
    escalacaoB:pegarArray(sumula.jogadoresB, sumula.titularesB, sumula.escalacaoB, jogo.jogadoresB, jogo.titularesB, jogo.escalacaoB),

    gols,
    cartoes,

    golsA,
    golsB,
    placar:`${golsA} x ${golsB}`,

    arbitroId:sumula.arbitroId || jogo.arbitroId || "",
    arbitroUid:sumula.arbitroUid || jogo.arbitroUid || "",
    arbitroEmail:sumula.arbitroEmail || jogo.arbitroEmail || "",
    arbitro:sumula.arbitro || jogo.arbitro || "",
    arbitroNome:sumula.arbitroNome || jogo.arbitroNome || sumula.arbitro || jogo.arbitro || "",

    assistente1:sumula.assistente1 || jogo.assistente1 || "",
    assistente2:sumula.assistente2 || jogo.assistente2 || "",
    observador:sumula.observador || jogo.observador || sumula.quartoArbitro || jogo.quartoArbitro || "",

    observacoes:el("observacoes").value,
    observacoesArbitro:el("observacoes").value,

    melhorJogadorId:melhor.id || melhor.jogadorId || "",
    melhorJogador:melhor.nome || "",
    melhorJogadorTime:melhor.timeNome || melhor.time || "",

    codigo:id,
    codigoPartida:id,
    numeroSumula:sumula.numeroSumula || jogo.numeroSumula || id.slice(0,8).toUpperCase(),

    status:finalizar ? "finalizado" : "rascunho",
    sumulaStatus:finalizar ? "finalizada" : "rascunho",
    sumulaFinalizada:finalizar,
    publica:finalizar,
    publico:finalizar,

    atualizadoEm:serverTimestamp()
  };
}

window.salvarRascunho = async function(){
  if(!acessoLiberado) return alert("Acesso negado.");
  if(finalizada) return alert("Súmula já finalizada.");

  const dados = dadosBaseSalvar(false);

  await updateDoc(doc(db,"jogos",id),dados);
  await setDoc(doc(db,"sumulas",id),dados,{merge:true});

  alert("Rascunho salvo!");
};

async function atualizarTime(timeObj, golsPro, golsContra, resultado){
  if(!timeObj?.id) return;

  const pontos = resultado === "vitoria" ? 3 : resultado === "empate" ? 1 : 0;

  await setDoc(doc(db,"times",timeObj.id),{
    jogos:increment(1),
    pontos:increment(pontos),
    vitorias:increment(resultado === "vitoria" ? 1 : 0),
    empates:increment(resultado === "empate" ? 1 : 0),
    derrotas:increment(resultado === "derrota" ? 1 : 0),
    golsPro:increment(golsPro),
    golsContra:increment(golsContra),
    saldo:increment(golsPro - golsContra),
    atualizadoEm:serverTimestamp()
  },{merge:true});
}

async function atualizarJogadores(){
  for(const p of todosJogadores()){
    if(!p.id && !p.jogadorId) continue;

    await setDoc(doc(db,"jogadores",p.id || p.jogadorId),{
      jogos:increment(1),
      partidas:increment(1),
      atualizadoEm:serverTimestamp()
    },{merge:true});
  }

  for(const g of gols){
    if(!g.jogadorId) continue;

    await setDoc(doc(db,"jogadores",g.jogadorId),{
      gols:increment(1),
      atualizadoEm:serverTimestamp()
    },{merge:true});
  }

  for(const c of cartoes){
    if(!c.jogadorId) continue;

    const dados = {
      atualizadoEm:serverTimestamp()
    };

    if(c.tipo === "amarelo"){
      dados.cartoesAmarelos = increment(1);
      dados.amarelos = increment(1);
    }

    if(c.tipo === "vermelho"){
      dados.cartoesVermelhos = increment(1);
      dados.vermelhos = increment(1);

      if(c.vermelhoTipo === "direto"){
        dados.suspenso = increment(1);
      }
    }

    await setDoc(doc(db,"jogadores",c.jogadorId),dados,{merge:true});
  }
}

async function aplicarSuspensaoPorAmarelos(){
  const ids = new Set();

  cartoes.forEach(c=>{
    if(c.tipo === "amarelo" && c.jogadorId) ids.add(c.jogadorId);
  });

  for(const jogadorId of ids){
    const snap = await getDoc(doc(db,"jogadores",jogadorId));
    if(!snap.exists()) continue;

    const dados = snap.data();
    const amarelos = dados.cartoesAmarelos || dados.amarelos || 0;

    if(amarelos >= 3){
      await setDoc(doc(db,"jogadores",jogadorId),{
        suspenso:increment(1),
        cartoesAmarelos:0,
        amarelos:0,
        atualizadoEm:serverTimestamp()
      },{merge:true});
    }
  }
}

async function atualizarArbitragem(){
  const arbitroId = sumula.arbitroId || jogo.arbitroId || "";

  if(arbitroId){
    await setDoc(doc(db,"arbitros",arbitroId),{
      jogos:increment(1),
      partidas:increment(1),
      cartoesAplicados:increment(cartoes.length),
      atualizadoEm:serverTimestamp()
    },{merge:true});
  }
}

async function atualizarTudoAutomatico(){
  if(estatisticasAplicadas){
    return;
  }

  const placarA = gols.filter(g=>g.time==="A").length;
  const placarB = gols.filter(g=>g.time==="B").length;

  let resultadoA = "empate";
  let resultadoB = "empate";

  if(placarA > placarB){
    resultadoA = "vitoria";
    resultadoB = "derrota";
  }

  if(placarB > placarA){
    resultadoA = "derrota";
    resultadoB = "vitoria";
  }

  await atualizarTime(sumula.timeA || jogo.timeA, placarA, placarB, resultadoA);
  await atualizarTime(sumula.timeB || jogo.timeB, placarB, placarA, resultadoB);
  await atualizarJogadores();
  await aplicarSuspensaoPorAmarelos();
  await atualizarArbitragem();

  await setDoc(doc(db,"sumulas",id),{
    estatisticasAplicadas:true,
    estatisticasAplicadasEm:serverTimestamp()
  },{merge:true});

  await setDoc(doc(db,"jogos",id),{
    estatisticasAplicadas:true,
    estatisticasAplicadasEm:serverTimestamp()
  },{merge:true});

  estatisticasAplicadas = true;
}

window.finalizarSumula = async function(){
  if(!acessoLiberado) return alert("Acesso negado.");
  if(finalizada) return alert("Já finalizada.");

  if(!confirm("Finalizar súmula? Isso vai travar, publicar e atualizar tudo automaticamente.")) return;

  const dados = {
    ...dadosBaseSalvar(true),
    dataFinalizacao:serverTimestamp(),
    finalizadaEm:serverTimestamp()
  };

  await updateDoc(doc(db,"jogos",id),dados);
  await setDoc(doc(db,"sumulas",id),dados,{merge:true});

  await atualizarTudoAutomatico();

  alert("SÚMULA FINALIZADA ✔");

  window.location.href = "sumula-publica.html?id="+id;
};

window.abrirPublica = function(){
  window.location.href = "sumula-publica.html?id="+id;
};

onAuthStateChanged(auth,async(user)=>{
  usuarioAtual = user;

  if(!user){
    acessoLiberado = false;
    await carregar();
    return;
  }

  perfilAtual = await carregarPerfilUsuario(user.uid);
  acessoLiberado = usuarioEhAdmin() || usuarioEhArbitroDesignado();

  await carregar();

  if(!acessoLiberado){
    bloquearPorAcesso();
    return;
  }

  liberarTela();

  if(finalizada){
    bloquearTela();
  }
});
