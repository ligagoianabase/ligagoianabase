<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súmula ADM - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family:Arial;
  background:#061427;
  color:#fff;
  margin:0;
  padding:0;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:15px;
}

.topo{
  text-align:center;
  margin-bottom:15px;
}

.placar{
  font-size:26px;
  font-weight:900;
  color:#f7c600;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  background:#0d2a52;
  padding:12px;
  border-radius:10px;
}

h3{
  color:#f7c600;
  margin-bottom:8px;
}

input,select{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:none;
  margin-top:5px;
}

.btn{
  background:#f7c600;
  color:#000;
  padding:10px;
  border-radius:8px;
  font-weight:900;
  margin-top:6px;
  cursor:pointer;
}

.lista{
  margin-top:8px;
}

.item{
  background:#081c3a;
  padding:6px;
  border-radius:6px;
  margin-bottom:4px;
  font-size:13px;
}

.finalizar{
  background:#25d366;
  color:#fff;
  margin-top:15px;
}

img{
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
  background:#fff;
}
</style>
</head>

<body>

<div id="bloqueado" style="display:none;text-align:center;margin-top:100px;">
<h2>❌ Acesso negado</h2>
</div>

<div id="app" class="wrap" style="display:none;">

<div class="topo">
<img id="logoCampeonato">
<h2>SÚMULA ADM</h2>
<div class="placar">
<img id="escudoA"> 
<span id="timeA"></span>
<span id="golsA">0</span> x
<span id="golsB">0</span>
<span id="timeB"></span>
<img id="escudoB">
</div>
</div>

<div class="grid">

<div class="box">
<h3 id="nomeTimeA">Time A</h3>

<input id="golNumeroA" placeholder="Nº camisa">
<input id="golMinutoA" placeholder="Minuto">
<button class="btn" onclick="addGol('A')">Gol</button>

<div id="listaGolsA" class="lista"></div>

<input id="cartaoNumeroA" placeholder="Nº camisa">
<select id="cartaoTipoA">
<option value="amarelo">Amarelo</option>
<option value="vermelho">Vermelho</option>
</select>
<input id="cartaoMinutoA" placeholder="Minuto">
<button class="btn" onclick="addCartao('A')">Cartão</button>

<div id="listaCartoesA" class="lista"></div>
</div>

<div class="box">
<h3 id="nomeTimeB">Time B</h3>

<input id="golNumeroB" placeholder="Nº camisa">
<input id="golMinutoB" placeholder="Minuto">
<button class="btn" onclick="addGol('B')">Gol</button>

<div id="listaGolsB" class="lista"></div>

<input id="cartaoNumeroB" placeholder="Nº camisa">
<select id="cartaoTipoB">
<option value="amarelo">Amarelo</option>
<option value="vermelho">Vermelho</option>
</select>
<input id="cartaoMinutoB" placeholder="Minuto">
<button class="btn" onclick="addCartao('B')">Cartão</button>

<div id="listaCartoesB" class="lista"></div>
</div>

</div>

<button class="btn finalizar" onclick="finalizar()">FINALIZAR SÚMULA</button>

</div>

<script type="module">
import { db, auth } from "./firebase.js";
import {
collection,getDocs,doc,getDoc,setDoc,updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let jogadores=[], jogo=null;
let golsA=[],golsB=[],cartoesA=[],cartoesB=[];
let mapaNumerosA={}, mapaNumerosB={};

const id=new URLSearchParams(location.search).get("id");

async function carregarJogadores(){
const snap=await getDocs(collection(db,"jogadores"));
snap.forEach(d=>jogadores.push({id:d.id,...d.data()}));
}

function buscarPorNumero(numero,lado){
return lado==="A"?mapaNumerosA[numero]:mapaNumerosB[numero];
}

window.addGol=(lado)=>{
const numero=document.getElementById(`golNumero${lado}`).value;
const minuto=document.getElementById(`golMinuto${lado}`).value;

const j=buscarPorNumero(numero,lado);
if(!j)return alert("Número não definido na súmula");

const obj={numero,nome:j.nome,minuto};

lado==="A"?golsA.push(obj):golsB.push(obj);
render(lado);
placar();
}

window.addCartao=(lado)=>{
const numero=document.getElementById(`cartaoNumero${lado}`).value;
const tipo=document.getElementById(`cartaoTipo${lado}`).value;
const minuto=document.getElementById(`cartaoMinuto${lado}`).value;

const j=buscarPorNumero(numero,lado);
if(!j)return alert("Número não definido");

const obj={numero,nome:j.nome,minuto,tipo};

lado==="A"?cartoesA.push(obj):cartoesB.push(obj);
render(lado);
}

function render(l){
document.getElementById(`listaGols${l}`).innerHTML=(l==="A"?golsA:golsB).map(g=>`<div class="item">${g.nome} ${g.minuto}'</div>`).join("");
document.getElementById(`listaCartoes${l}`).innerHTML=(l==="A"?cartoesA:cartoesB).map(c=>`<div class="item">${c.nome} ${c.tipo}</div>`).join("");
}

function placar(){
document.getElementById("golsA").textContent=golsA.length;
document.getElementById("golsB").textContent=golsB.length;
}

async function carregarJogo(){

const snap=await getDoc(doc(db,"jogos",id));
jogo={id:snap.id,...snap.data()};

document.getElementById("timeA").textContent=jogo.timeA;
document.getElementById("timeB").textContent=jogo.timeB;
document.getElementById("nomeTimeA").textContent=jogo.timeA;
document.getElementById("nomeTimeB").textContent=jogo.timeB;

// logos
const timeA=await getDoc(doc(db,"times",jogo.timeAId));
const timeB=await getDoc(doc(db,"times",jogo.timeBId));
const camp=await getDoc(doc(db,"campeonatos",jogo.campeonatoId));

document.getElementById("escudoA").src=timeA.data().escudo||"logo-liga.jfif";
document.getElementById("escudoB").src=timeB.data().escudo||"logo-liga.jfif";
document.getElementById("logoCampeonato").src=camp.data().logo||"logo-liga.jfif";

// jogadores do time
const listaA=jogadores.filter(j=>j.timeId===jogo.timeAId);
const listaB=jogadores.filter(j=>j.timeId===jogo.timeBId);

// definir números
listaA.forEach(j=>{
const numero=prompt(`Número camisa: ${j.nome}`);
mapaNumerosA[numero]=j;
});

listaB.forEach(j=>{
const numero=prompt(`Número camisa: ${j.nome}`);
mapaNumerosB[numero]=j;
});

}

async function atualizarEstatisticas(){

for(const g of [...golsA,...golsB]){
const j=jogadores.find(x=>x.nome===g.nome);
await updateDoc(doc(db,"jogadores",j.id),{
gols:(j.gols||0)+1,
jogos:(j.jogos||0)+1
});
}

}

window.finalizar=async()=>{

await setDoc(doc(db,"sumulas",id),{
golsDetalhadosA:golsA,
golsDetalhadosB:golsB,
amarelosDetalhadosA:cartoesA,
amarelosDetalhadosB:cartoesB,
status:"Finalizada"
});

await updateDoc(doc(db,"jogos",id),{status:"finalizado"});

await atualizarEstatisticas();

location.href=`sumula-publica.html?id=${id}`;
}

// segurança
onAuthStateChanged(auth, async user=>{
if(!user)return bloquear();

await carregarJogadores();
await carregarJogo();

if(jogo.arbitroId!==user.uid){
bloquear();
}else{
document.getElementById("app").style.display="block";
}
});

function bloquear(){
document.getElementById("bloqueado").style.display="block";
}
</script>

</body>
</html>
