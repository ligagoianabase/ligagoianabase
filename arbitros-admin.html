<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfil do Árbitro - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none}
img{display:block;max-width:100%}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.18), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.97), rgba(8,23,44,.98));
  border:1px solid var(--gold-line);
  border-radius:22px;
  padding:22px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
  display:grid;
  grid-template-columns:170px 1fr;
  gap:20px;
  align-items:center;
}

.foto{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid var(--gold);
  background:#fff;
}

.hero h1{
  color:var(--gold);
  font-size:36px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.55;
  font-size:14px;
}

.tags{
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  margin-top:12px;
}

.tag{
  background:#1a3f73;
  padding:7px 11px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.08);
}

.tag-gold{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}

.btn{
  min-height:40px;
  border-radius:12px;
  padding:0 14px;
  font-weight:900;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111}
.btn-blue{background:#1a3f73;color:#fff}
.btn-gray{background:#4b5563;color:#fff}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
  margin-bottom:16px;
}

.stat{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.12), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:16px;
  padding:15px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,.22);
}

.stat strong{
  display:block;
  color:var(--gold);
  font-size:30px;
  margin-bottom:5px;
}

.stat span{
  color:var(--muted);
  font-size:11px;
  font-weight:900;
  text-transform:uppercase;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.panel{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.10), transparent 35%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.22);
  margin-bottom:14px;
}

.panel h2{
  color:var(--gold);
  font-size:20px;
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.panel-body{
  padding:14px;
}

.item{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  color:var(--muted);
  font-size:14px;
}

.item:last-child{border-bottom:none}

.item strong{
  color:#fff;
}

.valor{
  color:var(--gold);
  font-weight:900;
}

.jogo-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}

.jogo-card strong{
  color:#fff;
  display:block;
  margin-bottom:6px;
}

.jogo-card p{
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}

.vazio{
  color:var(--muted);
  text-align:center;
  padding:18px;
}

.loading{
  max-width:760px;
  margin:80px auto;
  background:rgba(16,42,82,.96);
  border:1px solid var(--gold-line);
  color:var(--gold);
  padding:24px;
  border-radius:16px;
  text-align:center;
  font-size:18px;
  font-weight:900;
}

@media(max-width:1000px){
  .stats-grid{
    grid-template-columns:repeat(3,1fr);
  }

  .grid2{
    grid-template-columns:1fr;
  }
}

@media(max-width:700px){
  .hero{
    grid-template-columns:1fr;
    text-align:center;
  }

  .foto{
    margin:auto;
  }

  .hero h1{
    font-size:28px;
  }

  .stats-grid{
    grid-template-columns:1fr 1fr;
  }

  .actions,
  .tags{
    justify-content:center;
  }
}

@media(max-width:480px){
  .stats-grid{
    grid-template-columns:1fr;
  }

  .btn{
    width:100%;
  }
}
</style>
</head>

<body>

<main class="wrap container" id="app">
  <div class="loading">
    <i class="fa-solid fa-spinner fa-spin"></i><br>
    Carregando perfil do árbitro...
  </div>
</main>

<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("arbitros");

const app = document.getElementById("app");
const idUrl = new URLSearchParams(location.search).get("id");

let arbitro = null;
let jogos = [];
let sumulas = [];
let todosArbitros = [];

function n(txt){
  return String(txt || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();
}

function val(obj,chaves,f=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== ""){
      return obj[c];
    }
  }
  return f;
}

function nomeArbitro(a){
  return val(a,["nome","nomeCompleto","arbitro"],"Árbitro");
}

function fotoArbitro(a){
  return val(a,["foto","imagem","avatar","fotoUrl"],"logo-liga.jfif");
}

function cidadeArbitro(a){
  return val(a,["cidadeNascimento","cidade","municipio"],"-");
}

function categoriasArbitro(a){
  const cats = val(a,["categorias"],[]);
  const cat = val(a,["categoria"],"");

  if(Array.isArray(cats) && cats.length) return cats;
  if(cat) return [cat];

  return ["Todas as categorias"];
}

function mesmoArbitro(nome,item){
  const nomeNormal = n(nome);

  const nomes = [
    val(item,["arbitro"],""),
    val(item,["arbitroNome"],""),
    val(item,["nomeArbitro"],""),
    item?.arbitragem?.arbitro || ""
  ];

  const ids = [
    val(item,["arbitroId"],""),
    val(item,["arbitroUid"],"")
  ];

  return nomes.some(x=>n(x) === nomeNormal) || ids.includes(idUrl);
}

function finalizado(item){
  return item.finalizado === true ||
    item.encerrado === true ||
    item.sumulaFinalizada === true ||
    item.publica === true ||
    item.publico === true ||
    n(val(item,["status"],"")) === "finalizado" ||
    n(val(item,["sumulaStatus"],"")) === "finalizada";
}

function contarCartoes(s){
  let amarelos = 0;
  let vermelhos = 0;

  const eventos = [
    ...(s.eventos || []),
    ...(s.cartoes || []),
    ...(s.cartoesLista || [])
  ];

  eventos.forEach(ev=>{
    const tipo = n(val(ev,["tipo","evento","acao","cartao"],""));

    if(tipo.includes("amarelo")) amarelos++;
    if(tipo.includes("vermelho")) vermelhos++;
  });

  amarelos += (s.amarelosDetalhadosA || []).length;
  amarelos += (s.amarelosDetalhadosB || []).length;
  amarelos += (s.cartoesAmarelos || []).length;
  amarelos += (s.amarelos || []).length;

  vermelhos += (s.vermelhosDetalhadosA || []).length;
  vermelhos += (s.vermelhosDetalhadosB || []).length;
  vermelhos += (s.cartoesVermelhos || []).length;
  vermelhos += (s.vermelhos || []).length;

  return {amarelos,vermelhos};
}

function calcularStats(a){
  const nome = nomeArbitro(a);

  let jogosApitados = 0;
  let jogosFinalizados = 0;
  let jogosPendentes = 0;
  let sumulasFinalizadas = 0;
  let amarelos = 0;
  let vermelhos = 0;

  const porCategoria = {};
  const porCampeonato = {};
  const jogosRecentes = [];

  jogos.forEach(j=>{
    if(!mesmoArbitro(nome,j)) return;

    jogosApitados++;

    if(finalizado(j)) jogosFinalizados++;
    else jogosPendentes++;

    const categoria = val(j,["categoria","categoriaNome"],"Sem categoria");
    const campeonato = val(j,["campeonato","campeonatoNome","nomeCampeonato"],"Sem campeonato");

    porCategoria[categoria] = (porCategoria[categoria] || 0) + 1;
    porCampeonato[campeonato] = (porCampeonato[campeonato] || 0) + 1;

    jogosRecentes.push(j);
  });

  sumulas.forEach(s=>{
    if(!mesmoArbitro(nome,s)) return;

    if(finalizado(s)) sumulasFinalizadas++;

    const cartoes = contarCartoes(s);
    amarelos += cartoes.amarelos;
    vermelhos += cartoes.vermelhos;
  });

  const totalCartoes = amarelos + vermelhos;
  const mediaCartoes = jogosApitados ? (totalCartoes / jogosApitados).toFixed(2) : "0.00";

  return {
    jogosApitados,
    jogosFinalizados,
    jogosPendentes,
    sumulasFinalizadas,
    amarelos,
    vermelhos,
    totalCartoes,
    mediaCartoes,
    porCategoria,
    porCampeonato,
    jogosRecentes:jogosRecentes.slice(-8).reverse()
  };
}

function rankingPosicao(a){
  const lista = todosArbitros
    .map(ar=>({
      id:ar.id,
      jogos:calcularStats(ar).jogosApitados
    }))
    .sort((x,y)=>y.jogos-x.jogos);

  const pos = lista.findIndex(x=>x.id === a.id);

  return pos >= 0 ? pos + 1 : "-";
}

function itemHTML(nome,valor){
  return `
    <div class="item">
      <span>${nome}</span>
      <strong class="valor">${valor}</strong>
    </div>
  `;
}

function listaObj(obj){
  const entries = Object.entries(obj || {})
    .sort((a,b)=>b[1]-a[1]);

  if(!entries.length) return `<div class="vazio">Nenhum dado encontrado.</div>`;

  return entries.map(([nome,valor])=>itemHTML(nome,valor)).join("");
}

function jogoNome(j){
  const a = val(j,["timeANome"], j.timeA?.nome || j.timeA || "Time A");
  const b = val(j,["timeBNome"], j.timeB?.nome || j.timeB || "Time B");
  return `${a} x ${b}`;
}

function dataJogo(j){
  return val(j,["data","dataJogo","dataHora"],"-");
}

function render(){
  if(!arbitro){
    app.innerHTML = `<div class="loading">Árbitro não encontrado.</div>`;
    return;
  }

  const stats = calcularStats(arbitro);
  const cats = categoriasArbitro(arbitro);

  app.innerHTML = `
    <section class="hero">
      <img class="foto" src="${fotoArbitro(arbitro)}" onerror="this.src='logo-liga.jfif'">

      <div>
        <h1>${nomeArbitro(arbitro)}</h1>

        <p>
          Árbitro cadastrado na Liga Goiana de Futebol de Base.<br>
          Cidade: ${cidadeArbitro(arbitro)}<br>
          Contato, CPF e dados pessoais são privados.
        </p>

        <div class="tags">
          <span class="tag tag-gold"><i class="fa-solid fa-whistle"></i> Árbitro Oficial</span>
          ${cats.map(c=>`<span class="tag">${c}</span>`).join("")}
          <span class="tag">Ranking: ${rankingPosicao(arbitro)}º</span>
        </div>

        <div class="actions">
          <a class="btn btn-gold" href="arbitros.html">
            <i class="fa-solid fa-arrow-left"></i> Voltar
          </a>

          <button class="btn btn-blue" onclick="compartilhar()">
            <i class="fa-solid fa-share-nodes"></i> Compartilhar
          </button>
        </div>
      </div>
    </section>

    <section class="stats-grid">
      <div class="stat"><strong>${stats.jogosApitados}</strong><span>Jogos</span></div>
      <div class="stat"><strong>${stats.sumulasFinalizadas}</strong><span>Súmulas</span></div>
      <div class="stat"><strong>${stats.jogosFinalizados}</strong><span>Finalizados</span></div>
      <div class="stat"><strong>${stats.jogosPendentes}</strong><span>Pendentes</span></div>
      <div class="stat"><strong>${stats.amarelos}</strong><span>Amarelos</span></div>
      <div class="stat"><strong>${stats.vermelhos}</strong><span>Vermelhos</span></div>
    </section>

    <section class="grid2">
      <div class="panel">
        <h2><i class="fa-solid fa-chart-line"></i> Estatísticas</h2>
        <div class="panel-body">
          ${itemHTML("Total de cartões",stats.totalCartoes)}
          ${itemHTML("Média de cartões por jogo",stats.mediaCartoes)}
          ${itemHTML("Ranking por jogos",rankingPosicao(arbitro)+"º")}
          ${itemHTML("Status",val(arbitro,["status"],"ativo"))}
        </div>
      </div>

      <div class="panel">
        <h2><i class="fa-solid fa-trophy"></i> Campeonatos trabalhados</h2>
        <div class="panel-body">
          ${listaObj(stats.porCampeonato)}
        </div>
      </div>

      <div class="panel">
        <h2><i class="fa-solid fa-layer-group"></i> Jogos por categoria</h2>
        <div class="panel-body">
          ${listaObj(stats.porCategoria)}
        </div>
      </div>

      <div class="panel">
        <h2><i class="fa-solid fa-calendar-days"></i> Jogos recentes</h2>
        <div class="panel-body">
          ${
            stats.jogosRecentes.length
            ? stats.jogosRecentes.map(j=>`
              <div class="jogo-card">
                <strong>${jogoNome(j)}</strong>
                <p>
                  Campeonato: ${val(j,["campeonato","campeonatoNome"],"-")}<br>
                  Categoria: ${val(j,["categoria"],"-")}<br>
                  Data: ${dataJogo(j)}<br>
                  Status: ${val(j,["status"],"-")}
                </p>
              </div>
            `).join("")
            : `<div class="vazio">Nenhum jogo encontrado.</div>`
          }
        </div>
      </div>
    </section>
  `;
}

window.compartilhar = async function(){
  const url = location.href;

  if(navigator.share){
    await navigator.share({
      title:"Perfil do Árbitro - Liga Goiana",
      url
    });
    return;
  }

  await navigator.clipboard.writeText(url);
  alert("Link copiado.");
};

async function carregar(){
  if(!idUrl){
    app.innerHTML = `<div class="loading">ID do árbitro não informado.</div>`;
    return;
  }

  const snapArbitro = await getDoc(doc(db,"arbitros",idUrl));

  if(snapArbitro.exists()){
    arbitro = {id:snapArbitro.id,...snapArbitro.data()};
  }

  const snapArbitros = await getDocs(collection(db,"arbitros"));
  todosArbitros = snapArbitros.docs.map(d=>({id:d.id,...d.data()}));

  const snapJogos = await getDocs(collection(db,"jogos"));
  jogos = snapJogos.docs.map(d=>({id:d.id,...d.data()}));

  const snapSumulas = await getDocs(collection(db,"sumulas"));
  sumulas = snapSumulas.docs.map(d=>({id:d.id,...d.data()}));

  render();
}

carregar();
</script>

</body>
</html>
