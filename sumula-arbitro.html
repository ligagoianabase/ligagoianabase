<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súmula do Árbitro - Liga Goiana</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --yellow:#7a5a00;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  min-height:100%;
  overflow-x:hidden;
}

body{
  font-family:Arial,Helvetica,sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
}

a{text-decoration:none;color:inherit}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer;border:none}

input,select,textarea{
  width:100%;
  padding:10px 11px;
  border:none;
  border-radius:10px;
  font-size:13px;
  background:#f5f7fb;
  color:#111;
  outline:none;
  box-shadow:0 8px 18px rgba(0,0,0,.18);
}

input:focus,select:focus,textarea:focus{
  outline:2px solid rgba(247,198,0,.65);
}

textarea{
  min-height:90px;
  resize:vertical;
  line-height:1.35;
}

img{
  display:block;
  max-width:100%;
}

.topbar{
  background:rgba(5,18,38,.98);
  border-bottom:2px solid var(--gold);
  padding:10px 0;
  box-shadow:0 8px 22px rgba(0,0,0,.28);
}

.topbar-inner{
  width:min(100% - 28px, var(--max));
  margin:auto;
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:8px;
  align-items:center;
}

#statusMsg{
  font-size:13px;
  font-weight:900;
  color:var(--gold);
  white-space:nowrap;
}

.btn{
  min-height:38px;
  padding:9px 12px;
  border-radius:10px;
  font-weight:900;
  font-size:12px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  transition:.2s ease;
}

.btn:hover{transform:translateY(-1px)}

.btn-blue{
  background:#1a3f73;
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
}

.btn-gold{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.btn-green{
  background:#25d366;
  color:#fff;
}

.btn-red{
  background:var(--red);
  color:#fff;
}

.btn-gray{
  background:#4b5563;
  color:#fff;
}

.alerta-sistema{
  width:min(100% - 28px, var(--max));
  margin:12px auto 0;
  padding:10px 12px;
  border-radius:12px;
  font-size:13px;
  font-weight:900;
  box-shadow:0 8px 20px rgba(0,0,0,.22);
}

.alerta-ok{
  background:rgba(27,94,32,.95);
  color:#fff;
  border:1px solid rgba(255,255,255,.12);
}

.alerta-aviso{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  border:1px solid var(--gold-line);
}

.alerta-erro{
  background:var(--red);
  color:#fff;
  border:1px solid rgba(255,255,255,.12);
}

.page{
  width:min(100% - 28px, var(--max));
  margin:18px auto 34px;
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.10), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:20px;
  overflow:hidden;
  box-shadow:var(--shadow);
}

.header{
  display:grid;
  grid-template-columns:120px 1fr 180px;
  align-items:center;
  gap:14px;
  padding:18px 20px;
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.98), rgba(8,23,44,.98));
  color:#fff;
  border-bottom:4px solid var(--gold);
  position:relative;
  overflow:hidden;
}

.header:after{
  content:"";
  position:absolute;
  right:-72px;
  bottom:-28px;
  width:300px;
  height:70px;
  border-top:5px solid var(--gold);
  transform:rotate(-12deg);
  opacity:.9;
}

.header-logo,
.header-title,
.header-right{
  position:relative;
  z-index:1;
}

.header-logo{
  display:flex;
  justify-content:center;
}

.header-logo img{
  width:96px;
  height:96px;
  object-fit:contain;
}

.header-title{
  text-align:left;
}

.header-title h1{
  color:#fff;
  font-size:42px;
  font-weight:900;
  line-height:1;
  letter-spacing:.5px;
  text-transform:uppercase;
}

.header-title input{
  margin-top:9px;
  color:var(--gold);
  font-size:17px;
  font-weight:900;
  text-transform:uppercase;
  border:none;
  background:rgba(255,255,255,.04);
  box-shadow:none;
}

.header-right{
  text-align:center;
  font-weight:900;
  color:#fff;
}

.header-right img{
  width:88px;
  height:88px;
  object-fit:contain;
  background:#fff;
  border-radius:14px;
  border:2px solid var(--gold);
  padding:4px;
  margin:0 auto 6px;
}

.info-strip{
  margin:12px 16px;
  display:grid;
  grid-template-columns:1.1fr 1.35fr .85fr .85fr 1.05fr;
  border:1px solid var(--gold-line);
  border-radius:14px;
  overflow:hidden;
  background:rgba(2,10,24,.50);
}

.info-box{
  min-height:70px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border-right:1px solid var(--line);
  background:rgba(255,255,255,.035);
}

.info-box:last-child{border-right:none}

.info-box i{
  width:34px;
  color:var(--gold);
  font-size:26px;
  text-align:center;
  flex-shrink:0;
}

.info-box small{
  display:block;
  font-size:11px;
  font-weight:900;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:4px;
}

.info-box input{
  padding:8px 9px;
  border-radius:9px;
}

.status-badge{
  display:inline-flex;
  color:#fff;
  padding:8px 15px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
}

.status-pendente{background:var(--yellow)}
.status-andamento{background:var(--blue)}
.status-finalizado{background:var(--green)}

.score-card{
  margin:0 16px 12px;
  display:grid;
  grid-template-columns:1fr 240px 1fr;
  min-height:128px;
  border:1px solid var(--gold-line);
  border-radius:15px;
  overflow:hidden;
  background:rgba(2,10,24,.48);
}

.team-score{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:14px;
  background:rgba(255,255,255,.035);
}

.team-score.away{flex-direction:row-reverse}

.team-score img{
  width:88px;
  height:88px;
  object-fit:contain;
  background:#fff;
  border:2px solid var(--gold);
  border-radius:50%;
  padding:3px;
  flex-shrink:0;
}

.team-name{
  text-align:center;
  min-width:0;
}

.team-name input.nome{
  color:#fff;
  font-size:22px;
  font-weight:900;
  text-transform:uppercase;
  text-align:center;
  border:none;
  background:transparent;
  box-shadow:none;
  padding:6px 4px;
}

.team-name input.cidade{
  margin-top:4px;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
  text-align:center;
  border:none;
  background:transparent;
  box-shadow:none;
  padding:4px;
}

.score-center{
  background:rgba(2,10,24,.92);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-left:1px solid var(--gold-line);
  border-right:1px solid var(--gold-line);
}

.score-number{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--gold);
  font-size:58px;
  font-weight:900;
  line-height:1;
}

.score-center span{
  margin-top:7px;
  color:var(--muted);
  text-transform:uppercase;
  font-size:12px;
  font-weight:900;
}

.match-strip{
  margin:0 16px 12px;
  display:grid;
  grid-template-columns:1fr 1fr 1.2fr 1.1fr;
  border:1px solid var(--gold-line);
  border-radius:14px;
  overflow:hidden;
  background:rgba(2,10,24,.50);
}

.match-box{
  display:flex;
  align-items:center;
  gap:12px;
  min-height:64px;
  padding:10px 12px;
  border-right:1px solid var(--line);
  background:rgba(255,255,255,.035);
}

.match-box:last-child{border-right:none}

.match-box i{
  width:32px;
  color:var(--gold);
  font-size:26px;
  text-align:center;
  flex-shrink:0;
}

.match-box small{
  display:block;
  color:var(--muted);
  text-transform:uppercase;
  font-weight:900;
  font-size:11px;
  margin-bottom:4px;
}

.section{
  margin:0 16px 12px;
  border:1px solid var(--gold-line);
  border-radius:15px;
  overflow:hidden;
  background:rgba(2,10,24,.50);
}

.section-title{
  background:linear-gradient(135deg,var(--card2),var(--card));
  color:var(--gold);
  text-align:center;
  padding:10px;
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
  border-bottom:2px solid var(--gold);
}

.section-body{
  padding:12px;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.lineup-head{
  min-height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:var(--gold);
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
  border:1px solid var(--gold-line);
  border-bottom:none;
  background:rgba(26,63,115,.55);
  border-radius:12px 12px 0 0;
}

.lineup-head img{
  width:28px;
  height:28px;
  object-fit:contain;
}

.table-wrap{
  overflow-x:auto;
  border:1px solid var(--gold-line);
  border-radius:0 0 12px 12px;
  background:rgba(2,10,24,.62);
}

table{
  width:100%;
  min-width:760px;
  border-collapse:collapse;
}

th{
  background:rgba(26,63,115,.95);
  color:#fff;
  font-size:11px;
  text-transform:uppercase;
  padding:8px;
  border-bottom:1px solid var(--line);
  text-align:left;
}

td{
  font-size:12px;
  padding:6px;
  border-bottom:1px solid var(--line);
  color:#fff;
}

tr:last-child td{border-bottom:none}

td input,td select{
  border:none;
  padding:7px;
  border-radius:8px;
  box-shadow:none;
  font-size:12px;
}

.sub-row td{
  background:rgba(247,198,0,.12);
  color:var(--gold);
  text-align:center;
  font-weight:900;
  text-transform:uppercase;
}

.add-row{
  display:grid;
  grid-template-columns:60px 1fr 1fr 95px auto;
  gap:6px;
  margin-top:8px;
}

.event-box{
  border:1px solid var(--gold-line);
  border-radius:15px;
  overflow:hidden;
  background:rgba(2,10,24,.58);
}

.event-box h3{
  color:var(--gold);
  background:rgba(26,63,115,.90);
  text-align:center;
  padding:9px;
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
  border-bottom:2px solid var(--gold);
}

.event-columns{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.event-col{
  min-height:130px;
  padding:12px;
  border-right:1px solid var(--line);
}

.event-col:last-child{border-right:none}

.event-col h4{
  color:var(--gold);
  text-align:center;
  text-transform:uppercase;
  font-size:15px;
  font-weight:900;
  margin-bottom:8px;
}

.event-form{
  display:grid;
  grid-template-columns:1fr 64px 100px auto;
  gap:6px;
  margin-bottom:8px;
}

.event-form.cartao-form{
  grid-template-columns:1fr 58px 92px 125px auto;
}

.event-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:7px;
  border:1px solid rgba(247,198,0,.22);
  background:rgba(255,255,255,.05);
  border-radius:10px;
  padding:8px;
  color:#fff;
  font-size:12px;
}

.event-item button{
  background:var(--red);
  color:#fff;
  border-radius:8px;
  padding:6px 8px;
  font-weight:900;
}

.lower-grid{
  margin:0 16px 12px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:16px;
}

.panel{
  border:1px solid var(--gold-line);
  border-radius:15px;
  overflow:hidden;
  background:rgba(2,10,24,.50);
}

.panel h3{
  background:linear-gradient(135deg,var(--card2),var(--card));
  color:var(--gold);
  text-align:center;
  padding:10px;
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
  border-bottom:2px solid var(--gold);
}

.panel-body{
  padding:12px;
  color:#fff;
}

.arb-grid{
  display:grid;
  gap:8px;
}

.summary-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  border-bottom:1px solid var(--line);
}

.summary-box{
  text-align:center;
  padding:15px 10px;
  border-right:1px solid var(--line);
  color:var(--muted);
  font-weight:900;
}

.summary-box:last-child{border-right:none}

.summary-box strong{
  display:block;
  color:var(--gold);
  font-size:31px;
  margin-top:4px;
}

.best-player{
  display:grid;
  grid-template-columns:90px 1fr;
  gap:12px;
  padding:12px;
}

.trophy{
  width:76px;
  height:76px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
}

.footer-grid{
  margin:0 16px 12px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:16px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.final-footer{
  margin-top:12px;
  background:rgba(2,10,24,.92);
  color:var(--muted);
  text-align:center;
  padding:10px;
  font-size:13px;
  border-top:2px solid var(--gold);
}

.loading,.error{
  max-width:760px;
  margin:80px auto;
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.12), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid var(--gold-line);
  color:var(--gold);
  padding:24px;
  border-radius:16px;
  text-align:center;
  font-size:18px;
  font-weight:900;
  box-shadow:var(--shadow);
}

.error{color:#ffb4b4}

.locked-overlay{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:1px solid var(--gold-line);
  color:#111;
  margin:0 16px 12px;
  padding:12px;
  border-radius:12px;
  font-size:14px;
  font-weight:900;
  display:none;
}

.comissao-vazio{
  color:var(--muted);
  text-align:center;
  padding:12px;
}

.comissao-item{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(247,198,0,.22);
  border-radius:12px;
  padding:10px;
  margin-bottom:8px;
  color:#fff;
}

.comissao-item small{
  display:block;
  color:var(--gold);
  font-size:10px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:4px;
}

.comissao-item strong{
  display:block;
  color:#fff;
  font-size:13px;
}

@media(max-width:1100px){
  .header{grid-template-columns:100px 1fr 150px}
  .header-title h1{font-size:36px}
  .score-card{grid-template-columns:1fr 210px 1fr}
  .score-number{font-size:48px}
}

@media(max-width:900px){
  .topbar-inner,
  .header,
  .info-strip,
  .score-card,
  .match-strip,
  .grid2,
  .event-columns,
  .lower-grid,
  .summary-grid,
  .footer-grid,
  .buttons,
  .add-row,
  .event-form,
  .event-form.cartao-form{
    grid-template-columns:1fr;
  }

  .topbar-inner{
    width:min(100% - 18px, var(--max));
  }

  .page{
    width:min(100% - 18px, var(--max));
    margin-top:12px;
    border-radius:16px;
  }

  .header{
    text-align:center;
    padding:16px;
  }

  .header-logo,
  .header-title,
  .header-right{
    justify-content:center;
    text-align:center;
  }

  .header-logo img{
    margin:auto;
    width:78px;
    height:78px;
  }

  .header-title h1{
    font-size:28px;
  }

  .header-title input{
    text-align:center;
  }

  .header-right img{
    width:76px;
    height:76px;
  }

  .info-box,
  .match-box{
    border-right:none;
    border-bottom:1px solid var(--line);
  }

  .info-box:last-child,
  .match-box:last-child{
    border-bottom:none;
  }

  .team-score,
  .team-score.away{
    flex-direction:column;
  }

  .team-score img{
    width:74px;
    height:74px;
  }

  .team-name input.nome{
    font-size:19px;
  }

  .score-number{
    font-size:42px;
    padding-top:12px;
  }

  .score-center{
    min-height:110px;
    border-left:none;
    border-right:none;
    border-top:1px solid var(--gold-line);
    border-bottom:1px solid var(--gold-line);
  }

  .event-col{
    border-right:none;
    border-bottom:1px solid var(--line);
  }

  .event-col:last-child{
    border-bottom:none;
  }

  .summary-box{
    border-right:none;
    border-bottom:1px solid var(--line);
  }

  .summary-box:last-child{
    border-bottom:none;
  }

  .best-player{
    grid-template-columns:1fr;
    text-align:center;
  }

  .trophy{
    margin:auto;
  }
}

@media(max-width:430px){
  .topbar-inner,
  .page{
    width:min(100% - 14px, var(--max));
  }

  input,select,textarea{
    font-size:12px;
  }

  .header-title h1{
    font-size:24px;
  }

  .section-title{
    font-size:17px;
  }
}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-inner"><input id="inputJogoId" placeholder="ID do jogo ou use ?id=ID_DO_JOGO"><button class="btn btn-blue" onclick="carregarJogo()"><i class="fa-solid fa-download"></i> Carregar Jogo</button><span id="statusMsg">Aguardando...</span></div></div>
<div id="alertaSistema"></div>
<div id="app"><div class="loading"><i class="fa-solid fa-spinner fa-spin"></i><br>Carregando...</div></div>

<script type="module">
import { db, auth } from "./firebase.js";
import { doc, getDoc, setDoc, updateDoc, serverTimestamp, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const app=document.getElementById("app"), alertaSistema=document.getElementById("alertaSistema"), $=id=>document.getElementById(id);
let usuarioAtual=null, usuarioPerfil=null, jogoId="", jogo=null, sumulaSalva=null, finalizada=false, podeEditar=false, autoSaveTimer=null;
let jogadoresA=[],jogadoresB=[],golsA=[],golsB=[],cartoesA=[],cartoesB=[];

function campo(o,ks,p=""){for(const k of ks){if(o&&o[k]!==undefined&&o[k]!==null&&o[k]!=="")return o[k]}return p}
function primeiroArray(...ls){for(const l of ls){if(Array.isArray(l)&&l.length)return l}return[]}
function norm(v){return String(v||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
function dataAgora(){return new Date().toLocaleString("pt-BR")}
function codigoVerificacao(){return btoa(`${jogoId}-${Date.now()}-${Math.random()}`).replace(/[^A-Z0-9]/gi,"").slice(0,12).toUpperCase()}
function linkPublico(){const base=location.href.split("/").slice(0,-1).join("/");return `${base}/sumula-publica.html?id=${jogoId}`}

function renderEventos(){$("listaGolsA").innerHTML=golsA.map((g,i)=>eventoHtml(g,"gol","A",i)).join("");$("listaGolsB").innerHTML=golsB.map((g,i)=>eventoHtml(g,"gol","B",i)).join("");$("listaCartoesA").innerHTML=cartoesA.map((c,i)=>eventoHtml(c,"cartao","A",i)).join("");$("listaCartoesB").innerHTML=cartoesB.map((c,i)=>eventoHtml(c,"cartao","B",i)).join("")}
function eventoHtml(e,tipo,time,i){const icone=tipo==="gol"?"⚽":(e.tipo==="vermelho"?"🟥":"🟨"),fn=tipo==="gol"?"removerGol":"removerCartao";return`<div class="event-item"><span>${icone} <strong>${e.minuto||"-"}</strong> ${e.nome} Nº ${e.numero||"S/N"}</span><button onclick="${fn}('${time}',${i})">X</button></div>`}
window.removerGol=function(time,i){(time==="A"?golsA:golsB).splice(i,1);renderEventos();atualizarResumo();salvarRascunhoRapido()}
window.removerCartao=function(time,i){(time==="A"?cartoesA:cartoesB).splice(i,1);renderEventos();atualizarResumo();salvarRascunhoRapido()}
function atualizarResumo(){$("golsA").innerText=golsA.length;$("golsB").innerText=golsB.length;const todos=[...cartoesA,...cartoesB];$("totalGols").innerText=golsA.length+golsB.length;$("totalAmarelos").innerText=todos.filter(c=>c.tipo==="amarelo").length;$("totalVermelhos").innerText=todos.filter(c=>c.tipo==="vermelho").length}
function atualizarStatusVisual(){const el=$("statusOficial");el.innerText=finalizada?"FINALIZADO":"EM ANDAMENTO";el.className="status-badge "+(finalizada?"status-finalizado":"status-andamento")}
function montarDados(finalizar=false){const timeA=getTimeA(),timeB=getTimeB();const gols=[...golsA.map(g=>({...g,time:"A",timeNome:timeA.nome})),...golsB.map(g=>({...g,time:"B",timeNome:timeB.nome}))];const cartoes=[...cartoesA.map(c=>({...c,time:"A",timeNome:timeA.nome})),...cartoesB.map(c=>({...c,time:"B",timeNome:timeB.nome}))];const codigo=finalizar?codigoVerificacao():campo(sumulaSalva,["codigoVerificacao","hash"],"");const link=linkPublico();return{jogoId,id:jogoId,campeonato:$("campeonato").value,campeonatoId:campo(jogo,["campeonatoId"],""),categoria:campo(jogo,["categoria","categoriaNome"],""),numeroSumula:$("numeroSumula").value,codigoPartida:$("codigoPartida").value||jogoId,codigo:$("codigoPartida").value||jogoId,fase:$("fase").value,rodada:$("rodada").value,data:$("dataJogo").value,dataHora:$("dataJogo").value,hora:$("horaJogo").value,horario:$("horaJogo").value,local:$("localJogo").value,campo:$("localJogo").value,timeA,timeB,timeAId:campo(jogo,["timeAId"],campo(jogo?.timeA,["id"],"")),timeBId:campo(jogo,["timeBId"],campo(jogo?.timeB,["id"],"")),timeANome:timeA.nome,timeBNome:timeB.nome,nomeTimeA:timeA.nome,nomeTimeB:timeB.nome,golsA:golsA.length,golsB:golsB.length,placarA:golsA.length,placarB:golsB.length,placar:`${golsA.length} x ${golsB.length}`,jogadoresA,jogadoresB,jogadores:[...jogadoresA,...jogadoresB],comissaoA:listaComissao("A"),comissaoB:listaComissao("B"),escalacaoA:jogadoresA,escalacaoB:jogadoresB,escalacao:[...jogadoresA,...jogadoresB],gols,cartoes,golsLista:gols,cartoesLista:cartoes,golsEventosA:golsA,golsEventosB:golsB,cartoesA,cartoesB,eventos:[...gols,...cartoes],arbitro:$("arbitro").value||$("arbitroTopo").value,arbitroNome:$("arbitro").value||$("arbitroTopo").value,arbitroId:campo(jogo,["arbitroId"],""),arbitroUid:campo(jogo,["arbitroUid"],""),assistente1:$("assistente1").value,assistente2:$("assistente2").value,observador:$("observador").value,arbitragem:{arbitro:$("arbitro").value||$("arbitroTopo").value,assistente1:$("assistente1").value,assistente2:$("assistente2").value,observador:$("observador").value},melhorJogador:$("melhorJogador").value,melhorJogadorTime:$("melhorJogadorTime").value,melhorJogadorDestaque:$("melhorDestaque").value,observacoes:$("observacoes").value,observacoesArbitro:$("observacoes").value,codigoVerificacao:codigo,hash:codigo,linkPublico:link,publicadaEmTexto:finalizar?dataAgora():campo(sumulaSalva,["publicadaEmTexto"],"Aguardando finalização"),autenticada:finalizar,publico:finalizar,publica:finalizar,publicada:finalizar,status:finalizar?"finalizado":"em_andamento",sumulaStatus:finalizar?"finalizada":"em_andamento",sumulaFinalizada:finalizar,finalizada:finalizar,finalizadaEm:finalizar?serverTimestamp():null,atualizadoEm:serverTimestamp()}}
async function salvarRascunhoRapido(){if(!podeEditar||finalizada||!jogoId)return;try{await setDoc(doc(db,"sumulas",jogoId),montarDados(false),{merge:true});await updateDoc(doc(db,"jogos",jogoId),{sumulaStatus:"em_andamento",sumulaId:jogoId,atualizadoEm:serverTimestamp()});$("statusMsg").innerText="Rascunho salvo."}catch(e){console.error(e)}}
function iniciarAutoSave(){if(autoSaveTimer)clearInterval(autoSaveTimer);autoSaveTimer=setInterval(salvarRascunhoRapido,5000)}
function aplicarBloqueio(motivo=""){if(podeEditar&&!finalizada)return;document.querySelectorAll("#paginaSumula input,#paginaSumula select,#paginaSumula textarea,#paginaSumula button").forEach(el=>{el.disabled=true});$("bloqueioAviso").style.display="block";$("bloqueioAviso").innerText=motivo||(finalizada?"Súmula finalizada. Edição bloqueada.":"Você não tem permissão para editar.")}
window.carregarJogo=async function(){jogoId=$("inputJogoId").value.trim()||new URLSearchParams(location.search).get("id");if(!jogoId){alert("Informe o ID do jogo.");return}$("statusMsg").innerText="Carregando...";const jogoSnap=await getDoc(doc(db,"jogos",jogoId));if(!jogoSnap.exists()){app.innerHTML=`<div class="error">Jogo não encontrado.</div>`;return}jogo={id:jogoId,...jogoSnap.data()};const sumulaSnap=await getDoc(doc(db,"sumulas",jogoId));sumulaSalva=sumulaSnap.exists()?{id:jogoId,...sumulaSnap.data()}:null;if(!sumulaSalva){sumulaSalva={id:jogoId,jogoId,...jogo,status:"pendente",sumulaStatus:"pendente",sumulaFinalizada:false,publico:false,publica:false,criadoEmServidor:serverTimestamp()};await setDoc(doc(db,"sumulas",jogoId),sumulaSalva,{merge:true})}finalizada=!!sumulaSalva.sumulaFinalizada||sumulaSalva.status==="finalizado";const admin=perfilEhAdmin(),arb=perfilEhArbitroDoJogo();podeEditar=(admin||arb)&&!finalizada;criarTela();preencher();if(!admin&&!arb){aplicarBloqueio("Acesso negado. Somente o árbitro designado ou ADM pode editar.");exibirAlerta("erro","Acesso negado para edição.");return}if(finalizada){aplicarBloqueio("Súmula finalizada. Edição bloqueada.");exibirAlerta("ok","Esta súmula já foi finalizada.")}else{exibirAlerta("ok","Súmula liberada para edição.");iniciarAutoSave()}$("statusMsg").innerText="Jogo carregado."}
window.finalizarSumula=async function(){if(!podeEditar||finalizada){alert("Você não tem permissão para finalizar ou ela já está finalizada.");return}if(!confirm("Tem certeza? Após finalizar não poderá editar."))return;try{const dados=montarDados(true);await setDoc(doc(db,"sumulas",jogoId),dados,{merge:true});await updateDoc(doc(db,"jogos",jogoId),{status:"finalizado",finalizado:true,encerrado:true,sumulaStatus:"finalizada",sumulaFinalizada:true,publico:true,publica:true,placar:dados.placar,golsA:dados.golsA,golsB:dados.golsB,placarA:dados.placarA,placarB:dados.placarB,gols:dados.gols,cartoes:dados.cartoes,jogadoresA:dados.jogadoresA,jogadoresB:dados.jogadoresB,linkSumula:dados.linkPublico,sumulaPublica:dados.linkPublico,sumulaId:jogoId,atualizadoEm:serverTimestamp()});finalizada=true;podeEditar=false;$("codigoVerificacao").innerText=dados.codigoVerificacao;$("linkPublicoTexto").innerText=dados.linkPublico;$("publicadaEm").innerText=dados.publicadaEmTexto;atualizarStatusVisual();alert("Súmula finalizada e publicada com sucesso.");location.href=dados.linkPublico}catch(e){console.error(e);alert("Erro ao finalizar súmula: "+(e?.message||e))}}
onAuthStateChanged(auth,async user=>{usuarioAtual=user;if(!user){app.innerHTML=`<div class="error">Faça login para acessar a súmula.</div>`;return}usuarioPerfil=await carregarPerfilUsuario();const idUrl=new URLSearchParams(location.search).get("id");if(idUrl){$("inputJogoId").value=idUrl;await window.carregarJogo()}else app.innerHTML=`<div class="loading">Informe o ID do jogo ou abra pelo link da súmula.</div>`});
</script>
</body>
