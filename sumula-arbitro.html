<body>

<div class="topbar">
  <div class="topbar-inner">
    <input id="inputJogoId" placeholder="ID do jogo ou use ?id=ID_DO_JOGO">
    <button class="btn btn-blue" onclick="carregarJogo()"><i class="fa-solid fa-download"></i> Carregar Jogo</button>
    <span id="statusMsg">Aguardando...</span>
  </div>
</div>

<div id="alertaSistema"></div>

<div id="app">
  <div class="loading">
    <i class="fa-solid fa-spinner fa-spin"></i><br>
    Carregando...
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { db, auth } from "./firebase.js";
import {
  doc,
  getDoc,
  setDoc,
  updateDoc,
  serverTimestamp,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const app = document.getElementById("app");
const alertaSistema = document.getElementById("alertaSistema");
const $ = id => document.getElementById(id);

let usuarioAtual = null;
let usuarioPerfil = null;
let jogoId = "";
let jogo = null;
let sumulaSalva = null;
let finalizada = false;
let podeEditar = false;
let autoSaveTimer = null;

let jogadoresA = [];
let jogadoresB = [];
let golsA = [];
let golsB = [];
let cartoesA = [];
let cartoesB = [];

function campo(obj, chaves, fallback=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== "") return obj[c];
  }
  return fallback;
}

function primeiroArray(...listas){
  for(const lista of listas){
    if(Array.isArray(lista) && lista.length) return lista;
  }
  return [];
}

function dataAgora(){
  return new Date().toLocaleString("pt-BR");
}

function codigoVerificacao(){
  return btoa(`${jogoId}-${Date.now()}-${Math.random()}`)
    .replace(/[^A-Z0-9]/gi,"")
    .slice(0,12)
    .toUpperCase();
}

function linkPublico(){
  const base = location.href.split("/").slice(0,-1).join("/");
  return `${base}/sumula-publica.html?id=${jogoId}`;
}

function normalizarTexto(txt){
  return String(txt || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}
function mesmoDiaDoJogo(){
  const data = campo(jogo,["data","dataJogo","dataHora"],"");
  if(!data) return true;

  const hoje = new Date();
  const yyyy = hoje.getFullYear();
  const mm = String(hoje.getMonth()+1).padStart(2,"0");
  const dd = String(hoje.getDate()).padStart(2,"0");
  const hojeISO = `${yyyy}-${mm}-${dd}`;

  if(String(data).includes("-")) return String(data).slice(0,10) === hojeISO;

  const partes = String(data).split("/");
  if(partes.length === 3){
    const dataISO = `${partes[2]}-${partes[1].padStart(2,"0")}-${partes[0].padStart(2,"0")}`;
    return dataISO === hojeISO;
  }

  return true;
}

function exibirAlerta(tipo, texto){
  const classe = tipo === "erro" ? "alerta-erro" : tipo === "ok" ? "alerta-ok" : "alerta-aviso";
  alertaSistema.innerHTML = `<div class="alerta-sistema ${classe}"><i class="fa-solid fa-circle-info"></i> ${texto}</div>`;
}

function perfilEhAdmin(){
  const tipo = normalizarTexto(campo(usuarioPerfil,["tipo","perfil","cargo","role"],""));
  const nivel = normalizarTexto(campo(usuarioPerfil,["nivel","permissao"],""));
  return tipo.includes("admin") || nivel.includes("admin") || usuarioPerfil?.admin === true;
}

function perfilEhArbitroDoJogo(){
  if(!usuarioAtual || !jogo) return false;

  const uid = usuarioAtual.uid;
  const email = normalizarTexto(usuarioAtual.email || "");

  const idsPermitidos = [
    campo(jogo,["arbitroId"],""),
    campo(jogo,["arbitroUid"],""),
    campo(jogo,["arbitroPrincipalId"],""),
    campo(jogo?.arbitroObj,["id","uid"],"")
  ].filter(Boolean);

  if(idsPermitidos.includes(uid)) return true;

  const emailsPermitidos = [
    campo(jogo,["arbitroEmail"],""),
    campo(jogo?.arbitroObj,["email"],"")
  ].map(normalizarTexto).filter(Boolean);

  if(email && emailsPermitidos.includes(email)) return true;

  return false;
}

async function carregarPerfilUsuario(){
  if(!usuarioAtual) return null;

  const refs = [
    doc(db,"usuarios",usuarioAtual.uid),
    doc(db,"users",usuarioAtual.uid),
    doc(db,"arbitros",usuarioAtual.uid),
    doc(db,"admins",usuarioAtual.uid)
  ];

  for(const ref of refs){
    const snap = await getDoc(ref);
    if(snap.exists()) return {id:snap.id,...snap.data()};
  }

  return {
    id:usuarioAtual.uid,
    email:usuarioAtual.email || "",
    nome:usuarioAtual.displayName || ""
  };
}

function normalizarJogador(j){
  return {
    id: campo(j,["id","uid","jogadorId"],""),
    cpf: campo(j,["cpf","CPF"],""),
    nascimento: campo(j,["nascimento","dataNascimento","data_nascimento"],""),
    numero: campo(j,["numero","camisa","n"],""),
    nome: campo(j,["nome","jogador","jogadorNome","atleta"],""),
    posicao: campo(j,["posicao","posição","funcao"],""),
    categoria: campo(j,["categoria"],""),
    tipo: campo(j,["tipo","status","condicao"],"titular"),
    capitao: !!j.capitao,
    goleiro: !!j.goleiro,
    manual: !!j.manual
  };
}

function timeAObj(){
  return jogo?.timeA && typeof jogo.timeA === "object" ? jogo.timeA : {};
}

function timeBObj(){
  return jogo?.timeB && typeof jogo.timeB === "object" ? jogo.timeB : {};
}

function getTimeA(){
  return {
    nome:$("timeA").value || "Mandante",
    cidade:$("cidadeA").value || "",
    escudo:$("logoA").src || "logo-liga.jfif"
  };
}

function getTimeB(){
  return {
    nome:$("timeB").value || "Visitante",
    cidade:$("cidadeB").value || "",
    escudo:$("logoB").src || "logo-liga.jfif"
  };
}

function criarTela(){
  app.innerHTML = `
  <div class="page" id="paginaSumula">

    <header class="header">
      <div class="header-logo">
        <img src="logo-liga.jfif">
      </div>

      <div class="header-title">

      </div>

      <div class="header-right">
        <div>FUTEBOL<br>É PAIXÃO!</div>
        <div style="color:var(--dourado);font-size:16px;margin-top:2px;">★★★</div>
        <div class="header-ball">⚽</div>
      </div>
    </header>

    <section class="info-strip">
      <div class="info-box">
        <i class="fa-regular fa-file-lines"></i>
        <div><small>Súmula Nº</small><input id="numeroSumula"></div>
      </div>

      <div class="info-box">
        <i class="fa-solid fa-barcode"></i>
        <div><small>Código da partida</small><input id="codigoPartida"></div>
      </div>

function preencher(){

  const B = timeBObj();

  $("campeonato").value = campo(jogo,["campeonato","campeonatoNome"],"CAMPEONATO LIGA GOIANA");
  $("numeroSumula").value = campo(sumulaSalva,["numeroSumula"], campo(jogo,["numeroSumula"],`${new Date().getFullYear()}-${String(Date.now()).slice(-5)}`));
  $("codigoPartida").value = campo(jogo,["codigoPartida","codigo"],jogoId);
  $("fase").value = campo(jogo,["fase"],"Primeira fase");
  $("rodada").value = campo(jogo,["rodada"],"");

  $("timeA").value = campo(A,["nome","nomeTime"],"Mandante");
  $("timeB").value = campo(B,["nome","nomeTime"],"Visitante");
  $("cidadeA").value = campo(A,["cidade","municipio"],"");
  $("cidadeB").value = campo(B,["cidade","municipio"],"");
  $("logoA").src = campo(A,["logo","escudo","imagem"],"logo-liga.jfif");
  $("logoB").src = campo(B,["logo","escudo","imagem"],"logo-liga.jfif");
  $("miniLogoA").src = $("logoA").src;
  $("miniLogoB").src = $("logoB").src;

  $("dataJogo").value = campo(jogo,["data","dataJogo","dataHora"],"");
  $("horaJogo").value = campo(jogo,["hora","horario"],"");
  $("localJogo").value = campo(jogo,["local","campo","estadio"],"");
  $("arbitroTopo").value = campo(jogo,["arbitro","arbitroNome"],"");
  $("arbitro").value = campo(jogo,["arbitro","arbitroNome"],"");
  $("assistente1").value = campo(jogo,["assistente1"],"");
  $("assistente2").value = campo(jogo,["assistente2"],"");
  $("observador").value = campo(jogo,["observador","quartoArbitro","arbitroAuxiliar"],"");

  jogadoresA = primeiroArray(
    sumulaSalva?.jogadoresA,
    sumulaSalva?.escalacaoA,
    jogo.jogadoresA,
    jogo.escalacaoA,
    jogo.titularesA
  ).map(normalizarJogador);

  jogadoresB = primeiroArray(
    sumulaSalva?.jogadoresB,
    sumulaSalva?.escalacaoB,
    jogo.jogadoresB,
    jogo.escalacaoB,
    jogo.titularesB
  ).map(normalizarJogador);

  golsA = Array.isArray(sumulaSalva?.gols) ? sumulaSalva.gols.filter(g=>g.time==="A") : [];
  golsB = Array.isArray(sumulaSalva?.gols) ? sumulaSalva.gols.filter(g=>g.time==="B") : [];

  cartoesA = Array.isArray(sumulaSalva?.cartoes) ? sumulaSalva.cartoes.filter(c=>c.time==="A") : [];
  cartoesB = Array.isArray(sumulaSalva?.cartoes) ? sumulaSalva.cartoes.filter(c=>c.time==="B") : [];

  $("melhorJogador").value = campo(sumulaSalva,["melhorJogador"],"");
  $("melhorDestaque").value = campo(sumulaSalva,["melhorJogadorDestaque","melhorDestaque"],"");
  $("observacoes").value = campo(sumulaSalva,["observacoes","observacoesArbitro"],"");

  $("codigoVerificacao").innerText = campo(sumulaSalva,["codigoVerificacao","hash"],"---");
  $("linkPublicoTexto").innerText = campo(sumulaSalva,["linkPublico"],linkPublico());
  $("publicadaEm").innerText = campo(sumulaSalva,["publicadaEmTexto"],"Aguardando finalização");

  atualizarTitulos();
  renderEscalacoes();
  montarSelects();
  renderEventos();
  atualizarResumo();
  atualizarStatusVisual();
  gerarQr(linkPublico());
}

  $("escA").innerHTML = renderJogadores(jogadoresA,"A");
  $("escB").innerHTML = renderJogadores(jogadoresB,"B");

function renderJogadores(lista,time){
  const titulares = lista.filter(j=>j.tipo !== "suplente");
  const suplentes = lista.filter(j=>j.tipo === "suplente");

  return `
    <tr class="sub-row"><td colspan="7">Titulares</td></tr>
    ${titulares.map(j=>linhaJogador(j,time)).join("")}
    <tr class="sub-row"><td colspan="7">Suplentes</td></tr>
    ${suplentes.map(j=>linhaJogador(j,time)).join("")}
  `;
}

function linhaJogador(j,time){
  const lista = time === "A" ? jogadoresA : jogadoresB;
  const i = lista.indexOf(j);

  return `
    <tr>
      <td><input value="${j.numero || ""}" onchange="editarJogador('${time}',${i},'numero',this.value)" placeholder="Nº"></td>
      <td><input value="${j.nome || ""}" onchange="editarJogador('${time}',${i},'nome',this.value)" placeholder="Nome"></td>
      <td><input value="${j.cpf || ""}" onchange="editarJogador('${time}',${i},'cpf',this.value)" placeholder="CPF"></td>
      <td><input value="${j.nascimento || ""}" onchange="editarJogador('${time}',${i},'nascimento',this.value)" placeholder="Nasc."></td>
      <td><input value="${j.posicao || ""}" onchange="editarJogador('${time}',${i},'posicao',this.value)" placeholder="Posição"></td>
      <td>
        <select onchange="editarJogador('${time}',${i},'tipo',this.value)">
          <option value="titular" ${j.tipo !== "suplente" ? "selected" : ""}>Titular</option>
          <option value="suplente" ${j.tipo === "suplente" ? "selected" : ""}>Suplente</option>
        </select>
      </td>
      <td><button class="btn btn-red" onclick="removerJogador('${time}',${i})">X</button></td>
    </tr>
  `;
}

window.editarJogador = function(time,i,c,v){
  const lista = time === "A" ? jogadoresA : jogadoresB;
  if(!lista[i]) return;
  lista[i][c] = v;
  montarSelects();
  salvarRascunhoRapido();
};

window.removerJogador = function(time,i){
  const lista = time === "A" ? jogadoresA : jogadoresB;
  lista.splice(i,1);
  renderEscalacoes();
  montarSelects();
  salvarRascunhoRapido();
};

window.adicionarJogador = function(time){
  const n = $(`novoNum${time}`).value;
  const nome = $(`novoNome${time}`).value;
  const pos = $(`novaPos${time}`).value;
  const tipo = $(`novoTipo${time}`).value;

  if(!n || !nome){
    alert("Informe número e nome.");
    return;
  }

  const obj = {
    id:"",
    numero:n,
    nome,
    cpf:"",
    nascimento:"",
    posicao:pos,
    categoria:campo(jogo,["categoria"],""),
    tipo,
    manual:true
  };

  if(time === "A") jogadoresA.push(obj);
  else jogadoresB.push(obj);

  $(`novoNum${time}`).value = "";
  $(`novoNome${time}`).value = "";
  $(`novaPos${time}`).value = "";

  renderEscalacoes();
  montarSelects();
  salvarRascunhoRapido();
};

window.buscarOutroJogador = async function(time){
  const termo = normalizarTexto($(`buscaOutro${time}`).value);
  if(!termo){
    alert("Digite o nome do jogador.");
    return;
  }

  const timeId = time === "A" ? campo(jogo,["timeAId"], campo(jogo?.timeA,["id"],"")) : campo(jogo,["timeBId"], campo(jogo?.timeB,["id"],""));
  const timeNome = time === "A" ? getTimeA().nome : getTimeB().nome;

  const snap = await getDocs(collection(db,"jogadores"));
  const encontrados = [];

  snap.forEach(d=>{
    const j = {id:d.id,...d.data()};

    const mesmoTime =
      j.timeId === timeId ||
      j.timeID === timeId ||
      normalizarTexto(j.timeNome) === normalizarTexto(timeNome) ||
      normalizarTexto(j.time) === normalizarTexto(timeNome);

    const nomeBate = normalizarTexto(j.nome).includes(termo);

    if(mesmoTime && nomeBate){
      encontrados.push(normalizarJogador(j));
    }
  });

  if(!encontrados.length){
    alert("Nenhum jogador encontrado nesse time.");
    return;
  }

  const escolhido = encontrados[0];
  escolhido.numero = "";
  escolhido.tipo = "suplente";

  if(time === "A") jogadoresA.push(escolhido);
  else jogadoresB.push(escolhido);

  $(`buscaOutro${time}`).value = "";

  renderEscalacoes();
  montarSelects();
  salvarRascunhoRapido();

  alert("Jogador puxado de outra categoria. Informe o número da camisa na súmula.");
};

function montarSelects(){
  const optA = jogadoresA
    .filter(j=>j.nome)
    .map(j=>`<option value="${j.nome}" data-num="${j.numero || ""}">${j.numero || "S/N"} - ${j.nome}</option>`)
    .join("");

  const optB = jogadoresB
    .filter(j=>j.nome)
    .map(j=>`<option value="${j.nome}" data-num="${j.numero || ""}">${j.numero || "S/N"} - ${j.nome}</option>`)
    .join("");

  $("golJogadorA").innerHTML = optA || `<option value="">Sem jogadores</option>`;
  $("cartaoJogadorA").innerHTML = optA || `<option value="">Sem jogadores</option>`;
  $("golJogadorB").innerHTML = optB || `<option value="">Sem jogadores</option>`;
  $("cartaoJogadorB").innerHTML = optB || `<option value="">Sem jogadores</option>`;
}

    vermelhoTipo

  if(time === "A") cartoesA.push(obj);
  else cartoesB.push(obj);

  $(time === "A" ? "cartaoMinutoA" : "cartaoMinutoB").value = "";

  renderEventos();

  $("listaCartoesB").innerHTML = cartoesB.map((c,i)=>eventoHtml(c,"cartao","B",i)).join("");
}

function eventoHtml(e,tipo,time,i){
  const icone = tipo === "gol" ? "⚽" : (e.tipo === "vermelho" ? "🟥" : "🟨");
  const extra = e.tipo === "vermelho"
    ? ` - ${e.vermelhoTipo === "segundo_amarelo" ? "2º amarelo" : "direto"}`
    : "";

  const fn = tipo === "gol" ? "removerGol" : "removerCartao";

  return `
    <div class="event-item">
      <span>${icone} <strong>${e.minuto || "-"}</strong> ${e.nome} Nº ${e.numero || "S/N"} ${extra}</span>
      <button onclick="${fn}('${time}',${i})">X</button>
    </div>
  `;
}

window.removerGol = function(time,i){
  if(time === "A") golsA.splice(i,1);
  else golsB.splice(i,1);

  renderEventos();
  atualizarResumo();
  salvarRascunhoRapido();
};

window.removerCartao = function(time,i){
  if(time === "A") cartoesA.splice(i,1);
  else cartoesB.splice(i,1);

  renderEventos();
  atualizarResumo();
  salvarRascunhoRapido();
};

window.atualizarResumo = function(){
  $("golsA").innerText = golsA.length;
  $("golsB").innerText = golsB.length;

  const todosCartoes = [...cartoesA,...cartoesB];

  $("totalGols").innerText = golsA.length + golsB.length;
  $("totalAmarelos").innerText = todosCartoes.filter(c=>c.tipo==="amarelo").length;
  $("totalVermelhos").innerText = todosCartoes.filter(c=>c.tipo==="vermelho").length;
};

function atualizarStatusVisual(){
  const status = finalizada ? "FINALIZADO" : "EM ANDAMENTO";
  const elStatus = $("statusOficial");

  elStatus.innerText = status;
  elStatus.className = "status-badge " + (finalizada ? "status-finalizado" : "status-andamento");
}

function gerarQr(link){
  if(window.QRCode && $("qrCanvas")){
    QRCode.toCanvas($("qrCanvas"), link, {width:98, margin:1});
  }
}

function montarDados(finalizar=false){
  const timeA = getTimeA();
  const timeB = getTimeB();
  const gols = [...golsA.map(g=>({...g,time:"A",timeNome:timeA.nome})), ...golsB.map(g=>({...g,time:"B",timeNome:timeB.nome}))];
  const cartoes = [...cartoesA.map(c=>({...c,time:"A",timeNome:timeA.nome})), ...cartoesB.map(c=>({...c,time:"B",timeNome:timeB.nome}))];

  const codigo = finalizar ? codigoVerificacao() : campo(sumulaSalva,["codigoVerificacao","hash"],"");
  const link = linkPublico();

  return {
    jogoId,
    id:jogoId,

    campeonato:$("campeonato").value,
    categoria:campo(jogo,["categoria"],""),
    numeroSumula:$("numeroSumula").value,
    codigoPartida:$("codigoPartida").value || jogoId,
    codigo:$("codigoPartida").value || jogoId,
    fase:$("fase").value,
    rodada:$("rodada").value,

    data:$("dataJogo").value,
    dataHora:$("dataJogo").value,
    hora:$("horaJogo").value,
    horario:$("horaJogo").value,
    local:$("localJogo").value,
    campo:$("localJogo").value,

    timeA,
    timeB,
    timeAId:campo(jogo,["timeAId"], campo(jogo?.timeA,["id"],"")),
    timeBId:campo(jogo,["timeBId"], campo(jogo?.timeB,["id"],"")),
    timeANome:timeA.nome,
    timeBNome:timeB.nome,

    golsA:golsA.length,
    golsB:golsB.length,
    placar:`${golsA.length} x ${golsB.length}`,

    jogadoresA,
    jogadoresB,
    escalacaoA:jogadoresA,
    escalacaoB:jogadoresB,

    gols,
    cartoes,
    golsLista:gols,
    cartoesLista:cartoes,

    arbitro:$("arbitro").value || $("arbitroTopo").value,
    arbitroNome:$("arbitro").value || $("arbitroTopo").value,
    arbitroId:campo(jogo,["arbitroId"],""),
    arbitroUid:campo(jogo,["arbitroUid"],""),

    assistente1:$("assistente1").value,
    assistente2:$("assistente2").value,
    observador:$("observador").value,

    arbitragem:{
      arbitro:$("arbitro").value || $("arbitroTopo").value,
      assistente1:$("assistente1").value,
      assistente2:$("assistente2").value,
      observador:$("observador").value
    },

    melhorJogador:$("melhorJogador").value,
    melhorJogadorTime:$("melhorJogadorTime").value,
    melhorJogadorDestaque:$("melhorDestaque").value,

    observacoes:$("observacoes").value,
    observacoesArbitro:$("observacoes").value,

    codigoVerificacao:codigo,
    hash:codigo,
    linkPublico:link,

    publicadaEmTexto:finalizar ? dataAgora() : campo(sumulaSalva,["publicadaEmTexto"],"Aguardando finalização"),
    autenticada:finalizar,
    publico:finalizar,
    publica:finalizar,
    status:finalizar ? "finalizado" : "em_andamento",
    sumulaStatus:finalizar ? "finalizada" : "em_andamento",
    sumulaFinalizada:finalizar,
    finalizadaEm:finalizar ? serverTimestamp() : null,

    removidoSubstituicoes:true,
    atualizadoEm:serverTimestamp()
  };
}

async function salvarRascunhoRapido(){
  if(!podeEditar || finalizada || !jogoId) return;

  try{
    const dados = montarDados(false);
    await setDoc(doc(db,"sumulas",jogoId),dados,{merge:true});
    await updateDoc(doc(db,"jogos",jogoId),{
      sumulaStatus:"em_andamento",
      atualizadoEm:serverTimestamp()
    });
    $("statusMsg").innerText = "Rascunho salvo.";
  }catch(e){
    console.error(e);
  }
}

function iniciarAutoSave(){
  if(autoSaveTimer) clearInterval(autoSaveTimer);

  autoSaveTimer = setInterval(async ()=>{
    if(!podeEditar || finalizada) return;

    try{
      await setDoc(doc(db,"sumulas",jogoId), montarDados(false), {merge:true});
      $("statusMsg").innerText = "Salvo automático.";
    }catch(e){
      console.error("AutoSave erro:", e);
    }
  }, 5000);
}

function aplicarBloqueio(motivo=""){
  if(podeEditar && !finalizada) return;

  document.querySelectorAll("#paginaSumula input,#paginaSumula select,#paginaSumula textarea,#paginaSumula button").forEach(el=>{
    el.disabled = true;
  });

  const aviso = $("bloqueioAviso");
  aviso.style.display = "block";
  aviso.innerText = motivo || (finalizada ? "Súmula finalizada. Edição bloqueada." : "Você não tem permissão para editar esta súmula.");
}

window.carregarJogo = async function(){
  jogoId = $("inputJogoId").value.trim() || new URLSearchParams(location.search).get("id");

  if(!jogoId){
    alert("Informe o ID do jogo.");
    return;
  }

  $("statusMsg").innerText = "Carregando...";

  const jogoSnap = await getDoc(doc(db,"jogos",jogoId));
  if(!jogoSnap.exists()){
    app.innerHTML = `<div class="error">Jogo não encontrado.</div>`;
    return;
  }

  jogo = {id:jogoId,...jogoSnap.data()};

  const sumulaSnap = await getDoc(doc(db,"sumulas",jogoId));
  sumulaSalva = sumulaSnap.exists() ? {id:jogoId,...sumulaSnap.data()} : null;

  if(!sumulaSalva){
    sumulaSalva = {
      id:jogoId,
      jogoId,
      ...jogo,
      status:"pendente",
      sumulaStatus:"pendente",
      sumulaFinalizada:false,
      publico:false,
      publica:false,
      criadoAutomaticamente:false,
      criadoEmServidor:serverTimestamp()
    };

    await setDoc(doc(db,"sumulas",jogoId),sumulaSalva,{merge:true});
  }

  finalizada = !!sumulaSalva.sumulaFinalizada || sumulaSalva.status === "finalizado";

  const admin = perfilEhAdmin();
  const arbitroDoJogo = perfilEhArbitroDoJogo();
  const diaDoJogo = mesmoDiaDoJogo();

  podeEditar = (admin || arbitroDoJogo) && !finalizada && diaDoJogo;

  if(!admin && !arbitroDoJogo){
    criarTela();
    preencher();
    aplicarBloqueio("Acesso negado. Somente o árbitro designado para este jogo ou um ADM autorizado pode editar esta súmula.");
    exibirAlerta("erro","Acesso negado para edição desta súmula.");
    return;
  }

  criarTela();
  preencher();

  if(!diaDoJogo && !admin){
    aplicarBloqueio("A súmula só pode ser editada pelo árbitro no dia do jogo.");
    exibirAlerta("aviso","A súmula ainda não está liberada para edição. Ela será aberta no dia do jogo.");
  }else if(finalizada){
    aplicarBloqueio("Súmula finalizada. Edição bloqueada.");
    exibirAlerta("ok","Esta súmula já foi finalizada.");
  }else{
    exibirAlerta("ok","Súmula liberada para edição.");
    iniciarAutoSave();
  }

  $("statusMsg").innerText = "Jogo carregado.";
};

window.finalizarSumula = async function(){
  if(!podeEditar || finalizada){
    alert("Você não pode finalizar esta súmula.");
    return;
  }

  if(!confirm("Tem certeza? Após finalizar, a súmula será publicada e não poderá ser editada.")) return;

  try{
    const dados = montarDados(true);

    await setDoc(doc(db,"sumulas",jogoId),dados,{merge:true});

    await updateDoc(doc(db,"jogos",jogoId),{
      status:"finalizado",
      sumulaFinalizada:true,
      sumulaStatus:"finalizada",
      publico:true,
      publica:true,
      golsA:dados.golsA,
      golsB:dados.golsB,
      placar:dados.placar,
      linkSumula:dados.linkPublico,
      sumulaPublica:dados.linkPublico,
      codigoVerificacao:dados.codigoVerificacao,
      finalizadoEm:serverTimestamp(),
      atualizadoEm:serverTimestamp()
    });

    finalizada = true;
    podeEditar = false;

    $("codigoVerificacao").innerText = dados.codigoVerificacao;
    $("linkPublicoTexto").innerText = dados.linkPublico;
    $("publicadaEm").innerText = dados.publicadaEmTexto;
    gerarQr(dados.linkPublico);
    atualizarStatusVisual();

    alert("Súmula finalizada e publicada com sucesso.");
    location.href = dados.linkPublico;

  }catch(error){
    console.error("Erro ao finalizar súmula:", error);
    alert("Erro ao finalizar súmula. Veja o console.");
  }
};

window.compartilharWhatsApp = function(){
  const texto = encodeURIComponent(`Súmula oficial Liga Goiana: ${linkPublico()}`);
  window.open(`https://wa.me/?text=${texto}`,"_blank");
};

window.enviarEmail = function(){
  const assunto = encodeURIComponent("Súmula oficial - Liga Goiana");
  const corpo = encodeURIComponent(`Segue link da súmula oficial:\n${linkPublico()}`);
  location.href = `mailto:?subject=${assunto}&body=${corpo}`;
};

window.copiarLink = async function(){
  await navigator.clipboard.writeText(linkPublico());
  alert("Link copiado.");
};

window.baixarPDF = async function(){
  alert("Use imprimir/salvar como PDF pelo navegador. A função PDF avançada pode ser ligada depois.");
};

onAuthStateChanged(auth, async (user)=>{
  usuarioAtual = user;

  if(!user){
    app.innerHTML = `<div class="error">Faça login para acessar a súmula.</div>`;
    return;
  }

  usuarioPerfil = await carregarPerfilUsuario();

  const idUrl = new URLSearchParams(location.search).get("id");
  if(idUrl){
    $("inputJogoId").value = idUrl;
    await window.carregarJogo();
  }else{
    app.innerHTML = `<div class="loading">Informe o ID do jogo ou abra pelo link da súmula.</div>`;
  }
});
</script>
