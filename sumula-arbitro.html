<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súmula do Árbitro - AGF</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --azul:#061d44;
  --azul2:#0b3f86;
  --vermelho:#e30613;
  --verde:#069447;
  --dourado:#f7c600;
  --linha:#cfd7e3;
  --texto:#071833;
  --muted:#4b5563;
  --bg:#dfe6ef;
  --white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--texto);
  min-height:100vh;
  overflow-x:hidden;
}

.sumula-viewport{width:100%;overflow:hidden;display:flex;justify-content:center;padding:14px 8px;}
.sumula-scale{width:1120px;max-width:1120px;transform-origin:top center;}

button,input,select,textarea{font-family:inherit}
button{cursor:pointer;border:none}

input,select,textarea{
  width:100%;
  padding:8px 10px;
  border:1px solid var(--linha);
  border-radius:7px;
  font-size:13px;
  background:#fff;
  color:#111;
  outline:none;
}

textarea{min-height:90px;resize:vertical}

input:disabled,select:disabled,textarea:disabled,button:disabled{
  opacity:.65;
  cursor:not-allowed;
}

.topbar{
  background:#fff;
  border-bottom:2px solid var(--azul);
  padding:10px;
}

.topbar-inner{
  width:min(100% - 20px,1180px);
  margin:auto;
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:8px;
  align-items:center;
}

#statusMsg{
  font-size:13px;
  font-weight:900;
  color:var(--azul);
}

.btn{
  padding:10px 13px;
  border-radius:8px;
  font-weight:900;
  font-size:13px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
}

.btn-blue{background:var(--azul);color:#fff}
.btn-gold{background:linear-gradient(135deg,var(--dourado),#ffe45c);color:#111}
.btn-green{background:var(--verde);color:#fff}
.btn-red{background:var(--vermelho);color:#fff}
.btn-gray{background:#475569;color:#fff}

.alerta-sistema{
  width:min(100% - 20px,1180px);
  margin:12px auto 0;
  padding:10px 12px;
  border-radius:9px;
  font-size:13px;
  font-weight:900;
  display:flex;
  align-items:center;
  gap:8px;
}

.alerta-ok{background:#dcfce7;color:#14532d;border:1px solid #86efac}
.alerta-aviso{background:#fff7d6;color:#854d0e;border:1px solid #f7c600}
.alerta-erro{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}

.page{
  width:1120px;
  max-width:1120px;
  margin:14px auto;
  background:#fff;
  border:1px solid #b9c4d4;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.16);
}

.header{
  display:grid;
  grid-template-columns:145px 1.35fr 145px 260px;
  align-items:center;
  gap:14px;
  padding:16px 22px 18px;
  background:radial-gradient(circle at top left,rgba(255,255,255,.10),transparent 32%),linear-gradient(135deg,#041b40 0%,#06265a 55%,#061d44 100%);
  color:#fff;
  border-bottom:4px solid var(--dourado);
}

.header-logo{display:flex;justify-content:center}

.header-logo img{
  width:94px;
  height:94px;
  object-fit:contain;
}

.header-title{text-align:left}

.header-title h1{
  color:#fff;
  font-size:54px;
  white-space:nowrap;
  font-weight:900;
  letter-spacing:1px;
  line-height:.95;
  text-transform:uppercase;
}

.header-title input{
  margin-top:8px;
  text-align:left;
  color:var(--dourado);
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
  border:none!important;
  background:transparent!important;
  box-shadow:none!important;
  outline:none!important;
  padding:0!important;
}
.header-title .header-slogan{
  display:block;
  color:#fff;
  font-size:14px;
  font-weight:900;
  margin-top:4px;
  text-transform:uppercase;
}

.header-campeonato-logo{display:flex;justify-content:center;align-items:center}
.header-campeonato-logo img{width:102px;height:102px;object-fit:contain;border-radius:16px;background:#fff;padding:3px;}
.header-right{
  text-align:left;
  color:#fff;
  font-weight:900;
  font-size:18px;
  line-height:1.08;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:center;
}
.header-right img{width:92px;height:92px;object-fit:contain;background:#fff;border-radius:14px;border:2px solid var(--dourado);padding:4px;}
.header-right small{color:var(--dourado);margin-top:6px;text-transform:uppercase;font-size:12px;}

.info-strip{
  margin:8px 18px 14px;
  display:grid;
  grid-template-columns:1.1fr 1.35fr .85fr .85fr 1.05fr;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.info-box{
  min-height:70px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border-right:1px solid var(--linha);
  background:#fff;
}

.info-box:last-child{border-right:none}

.info-box i{
  width:36px;
  color:var(--azul);
  font-size:30px;
  text-align:center;
}

.info-box small{
  display:block;
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  color:#111;
  margin-bottom:4px;
}

.status-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  color:#fff;
  padding:8px 15px;
  border-radius:8px;
  font-size:15px;
  font-weight:900;
  text-transform:uppercase;
}

.status-pendente{background:#ca8a04}
.status-andamento{background:#2563eb}
.status-finalizado{background:var(--verde)}

.score-card{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:1fr 260px 1fr;
  min-height:140px;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.team-score{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  padding:14px;
  background:#fff;
}

.team-score.away{flex-direction:row-reverse}

.team-score img{
  width:108px;
  height:108px;
  object-fit:contain;
}

.team-name{text-align:center}

.team-name input.nome{
  color:var(--azul);
  font-size:31px;
  font-weight:900;
  text-transform:uppercase;
  text-align:center;
  border:none;
}

.team-name input.cidade{
  display:none;
  margin-top:6px;
  color:var(--azul);
  font-size:15px;
  font-weight:800;
  text-align:center;
  border:none;
}

.score-center{
  background:var(--azul);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.score-number{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-size:70px;
  font-weight:900;
}

.score-valor{
  min-width:72px;
  text-align:center;
}

.score-center span{
  margin-top:8px;
  text-transform:uppercase;
  font-size:14px;
  font-weight:900;
}

.match-strip{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:1fr 1fr 1.2fr 1.1fr;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.match-box{
  display:flex;
  align-items:center;
  gap:12px;
  min-height:64px;
  padding:10px 12px;
  border-right:1px solid var(--linha);
  background:#fff;
}

.match-box:last-child{border-right:none}

.match-box i{
  width:34px;
  color:var(--azul);
  font-size:30px;
  text-align:center;
}

.match-box small{
  display:block;
  color:var(--azul);
  text-transform:uppercase;
  font-weight:900;
  font-size:12px;
  margin-bottom:3px;
}

.section{
  margin:0 18px 12px;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
  background:#fff;
}

.section-title{
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:8px 10px;
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.section-body{padding:12px}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.lineup-head{
  min-height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:var(--azul);
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
  border:1px solid var(--linha);
  border-bottom:none;
}

.lineup-head img{
  width:28px;
  height:28px;
  object-fit:contain;
}

.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

table{
  width:100%;
  min-width:760px;
  border-collapse:collapse;
}

th{
  background:#f5f7fb;
  color:var(--azul);
  font-size:12px;
  text-transform:uppercase;
  padding:7px 8px;
  border:1px solid var(--linha);
  text-align:left;
}

td{
  color:#111;
  font-size:13px;
  padding:5px 8px;
  border:1px solid #e5eaf1;
}

td input,td select{border:none;padding:5px;min-width:100%;}
td:nth-child(2) input{min-width:240px}
td:nth-child(3) input{min-width:140px}
td:nth-child(4) input{min-width:110px}

.num{width:48px;text-align:center}

.sub-row td{
  background:#f8fafc;
  color:var(--azul);
  text-align:center;
  font-weight:900;
  text-transform:uppercase;
  padding:7px;
}

.add-row{
  display:grid;
  grid-template-columns:60px 1fr 150px 1fr 95px auto;
  gap:6px;
  margin-top:8px;
}

.busca-box{
  margin-top:8px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:6px;
}


.comissao-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.comissao-card{border:1px solid var(--linha);border-radius:8px;overflow:hidden;background:#fff;}
.comissao-head{background:#f5f7fb;color:var(--azul);text-align:center;padding:8px;font-size:16px;font-weight:900;text-transform:uppercase;border-bottom:1px solid var(--linha);}
.comissao-lista{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px;}
.comissao-item{border:1px solid #dbe3ef;border-radius:10px;padding:10px;background:linear-gradient(180deg,#fff,#f8fafc);display:grid;grid-template-columns:36px 1fr;gap:9px;align-items:center;min-height:72px;box-shadow:0 4px 10px rgba(6,29,68,.05);}
.comissao-icone{width:34px;height:34px;border-radius:50%;background:#eef4ff;color:var(--azul);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid #d7e2f0;}
.comissao-info small{display:block;color:var(--azul);font-size:10px;font-weight:900;text-transform:uppercase;margin-bottom:4px;}
.comissao-info strong{display:block;color:#111;font-size:13px;line-height:1.25;}
.comissao-info em{display:block;color:#4b5563;font-style:normal;font-size:10px;margin-top:3px;}
.comissao-vazio{grid-column:1/-1;color:#777;text-align:center;padding:10px;}

.event-box{
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.event-box h3{
  color:#fff;
  background:var(--azul);
  text-align:center;
  padding:8px;
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.event-box.away h3{background:var(--vermelho)}

.event-columns{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.event-col{
  min-height:130px;
  padding:12px;
  border-right:1px solid var(--linha);
}

.event-col:last-child{border-right:none}

.event-col h4{
  color:var(--azul);
  text-align:center;
  font-size:17px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:10px;
}

.event-form{
  display:grid;
  grid-template-columns:1fr 64px 100px auto;
  gap:6px;
  margin-bottom:8px;
}

.event-form.cartao-form{
  grid-template-columns:1fr 58px 92px 125px auto;
}

.event-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:7px;
  color:#111;
  font-size:13px;
  border:1px solid var(--linha);
  background:#f8fafc;
  border-radius:8px;
  padding:7px;
}

.event-item button{
  background:var(--vermelho);
  color:#fff;
  border-radius:6px;
  padding:5px 7px;
  font-weight:900;
}

.lower-grid{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:24px;
}

.panel{
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
  background:#fff;
}

.panel h3{
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:8px;
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
}

.panel-body{padding:12px}

.arb-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
}

.summary-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  border-bottom:1px solid var(--linha);
}

.summary-box{
  text-align:center;
  padding:15px 10px;
  border-right:1px solid var(--linha);
}

.summary-box:last-child{border-right:none}

.summary-box span{
  display:block;
  color:var(--azul);
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
}

.summary-box strong{
  display:block;
  color:var(--azul);
  font-size:31px;
  font-weight:900;
  margin-top:4px;
}

.best-player{
  display:grid;
  grid-template-columns:90px 1fr;
  align-items:center;
  gap:12px;
  padding:12px;
}

.trophy{
  width:76px;
  height:76px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--dourado),#ffe45c);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
}

.footer-grid{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:24px;
}

.auth-box{
  display:grid;
  grid-template-columns:110px 1fr;
  gap:12px;
  align-items:center;
  padding:12px;
}

.auth-box canvas{
  width:98px!important;
  height:98px!important;
}

.auth-code{
  color:var(--azul);
  font-size:17px;
  font-weight:900;
  margin:4px 0;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.btn-whats{background:#0ca84a;color:#fff}
.btn-email{background:#2563eb;color:#fff}
.btn-link{background:#4b5563;color:#fff}
.btn-pdf{background:#dc2626;color:#fff}

.final-footer{
  margin-top:12px;
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:9px;
  font-size:13px;
  line-height:1.35;
}

.loading,.error{
  max-width:760px;
  margin:80px auto;
  background:#fff;
  border:1px solid #cfd7e3;
  color:#b42323;
  padding:24px;
  border-radius:10px;
  text-align:center;
  font-size:18px;
  font-weight:900;
}

.locked-overlay{
  background:#fff7d6;
  border:1px solid var(--dourado);
  color:#713f12;
  margin:0 18px 12px;
  padding:12px;
  border-radius:8px;
  font-size:14px;
  font-weight:900;
  display:none;
}



/* AJUSTE: manter a súmula do árbitro no mesmo padrão da pública */
.lineups-grid,
.grid2,
.events-grid,
.lower-grid,
.footer-grid,
.comissao-grid{
  grid-template-columns:repeat(2,minmax(0,1fr));
}

.lineup-card,
.event-box,
.team-events,
.panel,
.comissao-card,
.team-score,
.team-name{
  min-width:0;
}

.table-wrap{
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
}

.table-wrap table{
  min-width:720px;
}

.lineup-head span,
.team-name input.nome{
  width:100%;
  max-width:100%;
}

.team-name{
  flex:1;
}

.team-name input.nome{
  font-size:27px;
  overflow:visible;
  text-overflow:clip;
}

.comissao-lista{
  grid-template-columns:repeat(2,minmax(0,1fr));
}

.comissao-item{
  min-height:82px;
  align-items:center;
}

.comissao-icone{
  background:linear-gradient(135deg,#eef4ff,#ffffff);
  color:var(--azul);
  box-shadow:0 3px 9px rgba(6,29,68,.10);
}


/* AJUSTE FINAL: TABELA DO ÁRBITRO LEGÍVEL SEM CORTAR */
.table-wrap{overflow:hidden !important;}
.lineup-card{min-width:0;}
.table-wrap table{width:100% !important;min-width:0 !important;table-layout:fixed;}
.table-wrap th,.table-wrap td{font-size:10.5px;padding:4px 5px;vertical-align:middle;}
.table-wrap td input,.table-wrap td select{font-size:10.5px;padding:4px 3px;white-space:normal;overflow:visible;text-overflow:clip;}
.table-wrap td:nth-child(1),.table-wrap th:nth-child(1){width:32px;text-align:center;}
.table-wrap td:nth-child(2),.table-wrap th:nth-child(2){width:220px;}
.table-wrap td:nth-child(3),.table-wrap th:nth-child(3){width:112px;}
.table-wrap td:nth-child(4),.table-wrap th:nth-child(4){width:82px;}
.table-wrap td:nth-child(5),.table-wrap th:nth-child(5){width:58px;}
.table-wrap td:nth-child(6),.table-wrap th:nth-child(6){width:42px;}
.table-wrap td:nth-child(7),.table-wrap th:nth-child(7){width:42px;}
.table-wrap td:nth-child(2) input{white-space:normal;line-height:1.15;min-height:28px;}
.table-wrap .btn{padding:5px 7px;font-size:10px;border-radius:7px;}
.comissao-grid{grid-template-columns:1fr 1fr !important;}
.comissao-lista{grid-template-columns:repeat(2,minmax(0,1fr));}
.comissao-item{border-radius:12px;min-height:74px;}
@media(max-width:900px){
  .header{grid-template-columns:145px 1.35fr 145px 260px !important;}
  .header-title h1{font-size:52px;white-space:nowrap;}
  .sumula-scale{transform:scale(var(--escala-mobile,1)) !important;transform-origin:top left;}
  .sumula-viewport{justify-content:flex-start !important;overflow:hidden !important;}
  .comissao-grid{grid-template-columns:1fr 1fr !important;}
  .comissao-lista{grid-template-columns:repeat(2,minmax(0,1fr)) !important;}
  .table-wrap table{min-width:0 !important;}
}
@media(max-width:900px){
  body{background:#fff;}
  .sumula-viewport{justify-content:flex-start;align-items:flex-start;padding:8px 0;overflow:hidden;}
  .sumula-scale{transform:scale(var(--escala-mobile,1));transform-origin:top left;}
  .page{border-radius:0;box-shadow:none;}

  .header,
  .info-strip,
  .score-card,
  .match-strip,
  .grid2,
  .lineups-grid,
  .events-grid,
  .event-columns,
  .lower-grid,
  .summary-grid,
  .footer-grid,
  .buttons,
  .comissao-grid,
  .auth-box{
    grid-template-columns:inherit;
  }

  .topbar-inner,
  .add-row,
  .event-form,
  .event-form.cartao-form,
  .busca-box{
    grid-template-columns:1fr;
  }

  .header{grid-template-columns:145px 1.35fr 145px 260px;}
  .info-strip{grid-template-columns:1.1fr 1.45fr .86fr .72fr 1.05fr;}
  .score-card{grid-template-columns:1fr 260px 1fr;}
  .match-strip{grid-template-columns:1fr 1fr 1.2fr 1.1fr;}
  .grid2,.lineups-grid,.events-grid,.lower-grid,.footer-grid,.comissao-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
  .event-columns{grid-template-columns:1fr 1fr;}
  .summary-grid{grid-template-columns:1fr 1fr 1fr;}
  .buttons{grid-template-columns:repeat(4,1fr);}
  .auth-box{grid-template-columns:110px 1fr;}
  .team-score.away{flex-direction:row-reverse;}
  .team-score{flex-direction:row;}
  .comissao-lista{grid-template-columns:repeat(2,minmax(0,1fr));}
}


/* POSIÇÕES AUTOMÁTICAS — facilitar preenchimento do árbitro */
.select-posicao,
#novaPosA,
#novaPosB{
  cursor:pointer;
  font-weight:800;
  color:var(--azul);
  background:#f8fafc;
}

.select-posicao:focus,
#novaPosA:focus,

function campo(obj, chaves, fallback=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== "") return obj[c];
  }
  return fallback;
}

function primeiroArray(...listas){
  for(const lista of listas){
    if(Array.isArray(lista) && lista.length) return lista;
  }
  return [];
}

function dataAgora(){
  return new Date().toLocaleString("pt-BR");
}

function codigoVerificacao(){
  return btoa(`${jogoId}-${Date.now()}-${Math.random()}`)
    .replace(/[^A-Z0-9]/gi,"")
    .slice(0,12)
    .toUpperCase();
}

function linkPublico(){
  const base = location.href.split("/").slice(0,-1).join("/");
  return `${base}/sumula-publica.html?id=${jogoId}`;
}

function normalizarTexto(txt){
  return String(txt || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function limparCpf(cpf){
  return String(cpf || "").replace(/\D/g,"");
}

function cpfJaEscalado(cpf, ignorarJogador=null){
  const cpfLimpo = limparCpf(cpf);
  if(!cpfLimpo) return false;

  return [...jogadoresA, ...jogadoresB].some(j => j !== ignorarJogador && limparCpf(j.cpf) === cpfLimpo);
}


async function buscarJogadorFirebasePorCpf(cpf){
  const cpfLimpo = limparCpf(cpf);
  if(!cpfLimpo) return null;

  const snap = await getDocs(collection(db,"jogadores"));
  let encontrado = null;

  snap.forEach(d=>{
    if(encontrado) return;

    const dados = {id:d.id,...d.data()};
    const cpfJogador = limparCpf(campo(dados,["cpf","CPF"],""));

    if(cpfJogador && cpfJogador === cpfLimpo){
      encontrado = dados;
    }
  });

  return encontrado;
}

function dadosTimeParaJogador(time){
  if(time === "A"){
    return {
      timeId:campo(jogo,["timeAId","mandanteId","timeMandanteId"], campo(jogo?.timeA,["id"],"")),
      timeNome:getTimeA().nome,
      time:getTimeA().nome
    };
  }

  return {
    timeId:campo(jogo,["timeBId","visitanteId","timeVisitanteId"], campo(jogo?.timeB,["id"],"")),
    timeNome:getTimeB().nome,
    time:getTimeB().nome
  };
}

async function salvarJogadorNovoNoFirebase(jogador,time){
  const cpfLimpo = limparCpf(jogador.cpf);

  if(!cpfLimpo){
    throw new Error("Informe o CPF do jogador.");
  }

  const existente = await buscarJogadorFirebasePorCpf(cpfLimpo);

  if(existente){
    throw new Error("Esse CPF já está cadastrado em outro jogador. Não é permitido cadastrar CPF duplicado.");
  }

  const dadosTime = dadosTimeParaJogador(time);

  const dados = {
    nome:jogador.nome,
    nomeCompleto:jogador.nome,
    cpf:cpfLimpo,
    numero:jogador.numero || "",
    camisa:jogador.numero || "",
    nascimento:jogador.nascimento || "",
    dataNascimento:jogador.nascimento || "",
    posicao:jogador.posicao || "",
    categoria:jogador.categoria || campo(jogo,["categoria"],""),
    tipo:jogador.tipo || "titular",

    ...dadosTime,

    campeonatoId:campo(jogo,["campeonatoId"],""),
    campeonato:campo(jogo,["campeonato","campeonatoNome"],""),
    status:"ativo",
    aprovado:true,
    autorizado:true,
    criadoPeloArbitro:true,
    criadoNaSumula:true,
    sumulaOrigemId:jogoId,
    jogoOrigemId:jogoId,
    criadoEm:serverTimestamp(),
    atualizadoEm:serverTimestamp()
  };

  const ref = await addDoc(collection(db,"jogadores"),dados);

  return ref.id;
}

function quantidadeTitulares(lista){
  return lista.filter(j => j.tipo !== "suplente").length;
}

function validarTitularesAntesDeFinalizar(){
  const titularesA = quantidadeTitulares(jogadoresA);
  const titularesB = quantidadeTitulares(jogadoresB);

  if(titularesA !== LIMITE_TITULARES || titularesB !== LIMITE_TITULARES){
    alert(`Cada time precisa ter exatamente ${LIMITE_TITULARES} titulares.\n\n${getTimeA().nome}: ${titularesA} titular(es)\n${getTimeB().nome}: ${titularesB} titular(es)`);
    return false;
  }

  return true;
}
function mesmoDiaDoJogo(){
  const data = campo(jogo,["data","dataJogo","dataHora"],"");
  if(!data) return true;

  const hoje = new Date();
  const yyyy = hoje.getFullYear();
  const mm = String(hoje.getMonth()+1).padStart(2,"0");
  const dd = String(hoje.getDate()).padStart(2,"0");
  const hojeISO = `${yyyy}-${mm}-${dd}`;

  if(String(data).includes("-")) return String(data).slice(0,10) === hojeISO;

  const partes = String(data).split("/");
  if(partes.length === 3){
    const dataISO = `${partes[2]}-${partes[1].padStart(2,"0")}-${partes[0].padStart(2,"0")}`;
    return dataISO === hojeISO;
  }

  return true;
}

function exibirAlerta(tipo, texto){

function perfilEhAdmin(){
  const tipo = normalizarTexto(campo(usuarioPerfil,["tipo","perfil","cargo","role"],""));
  const nivel = normalizarTexto(campo(usuarioPerfil,["nivel","permissao"],""));
  return tipo.includes("admin") || nivel.includes("admin") || usuarioPerfil?.admin === true;
}

function perfilEhArbitroDoJogo(){
  if(!usuarioAtual || !jogo) return false;

  const uid = String(usuarioAtual.uid || "");
  const email = normalizarTexto(usuarioAtual.email || "");
  const perfilId = String(usuarioPerfil?.id || "");
  const perfilEmail = normalizarTexto(campo(usuarioPerfil,["email","gmail"],""));
  const perfilCpf = normalizarTexto(campo(usuarioPerfil,["cpf","CPF"],""));

  const idsDoUsuario = [
    uid,
    perfilId,
    String(campo(usuarioPerfil,["uid","usuarioId","userId","authUid","arbitroId"],""))
  ].map(String).filter(Boolean);

  const emailsDoUsuario = [email, perfilEmail].filter(Boolean);

  const idsPermitidos = [
    campo(jogo,["arbitroId"],""),
    campo(jogo,["arbitroUid"],""),
    campo(jogo,["arbitroUsuarioId"],""),
    campo(jogo,["arbitroPrincipalId"],""),
    campo(jogo,["arbitroSelecionadoId"],""),
    campo(jogo?.arbitroObj,["id","uid","usuarioId","userId","authUid"],""),
    campo(sumulaSalva,["arbitroId"],""),
    campo(sumulaSalva,["arbitroUid"],""),
    campo(sumulaSalva,["arbitroUsuarioId"],""),
    campo(sumulaSalva?.arbitroObj,["id","uid","usuarioId","userId","authUid"],"")
  ].map(String).filter(Boolean);

  if(idsDoUsuario.some(id => idsPermitidos.includes(id))) return true;

  const emailsPermitidos = [
    campo(jogo,["arbitroEmail"],""),
    campo(jogo?.arbitroObj,["email","gmail"],""),
    campo(sumulaSalva,["arbitroEmail"],""),
    campo(sumulaSalva?.arbitroObj,["email","gmail"],"")
  ].map(normalizarTexto).filter(Boolean);

  if(emailsDoUsuario.some(e => emailsPermitidos.includes(e))) return true;

  const cpfPermitido = [
    campo(jogo,["arbitroCpf"],""),
    campo(jogo?.arbitroObj,["cpf","CPF"],""),
    campo(sumulaSalva,["arbitroCpf"],""),
    campo(sumulaSalva?.arbitroObj,["cpf","CPF"],"")
  ].map(normalizarTexto).filter(Boolean);

  if(perfilCpf && cpfPermitido.includes(perfilCpf)) return true;

  return false;
}

async function carregarPerfilUsuario(){
  if(!usuarioAtual) return null;

  const refs = [
    doc(db,"usuarios",usuarioAtual.uid),
    doc(db,"users",usuarioAtual.uid),
    doc(db,"arbitros",usuarioAtual.uid),
    doc(db,"admins",usuarioAtual.uid)
  ];

  for(const ref of refs){
    const snap = await getDoc(ref);
    if(snap.exists()) return {id:snap.id,...snap.data()};
  }

  return {
    id:usuarioAtual.uid,
    email:usuarioAtual.email || "",
    nome:usuarioAtual.displayName || ""
  };
}

function normalizarComissao(t, timeNome=""){
  return {
    id: campo(t,["id","uid","tecnicoId"],""),
    nome: campo(t,["nome","nomeCompleto","tecnico","profissional"],""),
    funcao: campo(t,["funcao","cargo","tipo"],"Técnico"),
    cpf: campo(t,["cpf","CPF"],""),
    cref: campo(t,["cref","CREF","registro"],""),
    timeNome
  };
}
function listaComissao(time){
  return time === "A" ? comissaoAEdit : comissaoBEdit;
}

function carregarComissaoInicial(time){
  const timeNome = time === "A" ? getTimeA().nome : getTimeB().nome;
  const base = time === "A"
    ? primeiroArray(sumulaSalva?.comissaoAPrivada, sumulaSalva?.tecnicosAPrivada, sumulaSalva?.comissaoA, sumulaSalva?.tecnicosA, jogo.comissaoA, jogo.tecnicosA)
    : primeiroArray(sumulaSalva?.comissaoBPrivada, sumulaSalva?.tecnicosBPrivada, sumulaSalva?.comissaoB, sumulaSalva?.tecnicosB, jogo.comissaoB, jogo.tecnicosB);

  let lista = base.map(t=>normalizarComissao(t,timeNome)).filter(t=>t.nome);

  if(!lista.length){
    const nome = time === "A" ? campo(jogo,["tecnicoA"],"") : campo(jogo,["tecnicoB"],"");
    if(nome) lista = [{nome,funcao:"Técnico",cpf:"",cref:"",timeNome}];
  }

  return lista;
}
function renderComissaoLista(lista){
  if(!lista.length) return `<div class="comissao-vazio">Nenhum técnico informado.</div>`;
  return lista.map(t=>{
    const f = String(t.funcao || "Técnico");
    const nf = normalizarTexto(f);
    const icon = nf.includes("mass") ? "fa-hand-holding-medical" : nf.includes("prepar") ? "fa-briefcase-medical" : nf.includes("aux") ? "fa-user-group" : "fa-user-tie";
    return `<div class="comissao-item">
      <div class="comissao-icone"><i class="fa-solid ${icon}"></i></div>
      <div class="comissao-info">
        <small>${f}</small>
        <strong>${t.nome || "-"}</strong>
        ${t.cpf ? `<em>CPF: ${t.cpf}</em>` : ""}
        ${t.cref ? `<em>CREF: ${t.cref}</em>` : ""}
      </div>
    </div>`;
  }).join("");
}
function renderComissao(){
  if(!$("comissaoA") || !$("comissaoB")) return;
  $("comissaoTituloA").innerText = getTimeA().nome;
  $("comissaoTituloB").innerText = getTimeB().nome;
  $("comissaoA").innerHTML = renderComissaoLista(listaComissao("A"));
  $("comissaoB").innerHTML = renderComissaoLista(listaComissao("B"));
}

window.adicionarTecnico = function(time){
  const nome = $(`novoTecnicoNome${time}`).value.trim();
  const cpf = $(`novoTecnicoCpf${time}`).value.trim();

  if(!nome){
    alert("Informe o nome do técnico.");
    return;
  }

  if(!cpf){
    alert("Informe o CPF do técnico.");
    return;
  }

  const item = {
    nome,
    funcao:"Técnico",
    cpf,
    cref:"",
    timeNome:time === "A" ? getTimeA().nome : getTimeB().nome,
    manual:true
  };

  if(time === "A") comissaoAEdit.push(item);
  else comissaoBEdit.push(item);

  $(`novoTecnicoNome${time}`).value = "";
  $(`novoTecnicoCpf${time}`).value = "";

  renderComissao();
  salvarRascunhoRapido();
};

function renderEscalacoes(){
  $("escA").innerHTML = renderJogadores(jogadoresA,"A");
  $("escB").innerHTML = renderJogadores(jogadoresB,"B");
}

function renderJogadores(lista,time){
  const titulares = lista.filter(j=>j.tipo !== "suplente");
  const suplentes = lista.filter(j=>j.tipo === "suplente");

  return `
    <tr class="sub-row"><td colspan="7">Titulares</td></tr>
    ${titulares.map(j=>linhaJogador(j,time)).join("")}
    <tr class="sub-row"><td colspan="7">Suplentes</td></tr>
    ${suplentes.map(j=>linhaJogador(j,time)).join("")}
  `;
}

function opcoesPosicaoHtml(valorAtual){
  const valor = String(valorAtual || "").trim();
  const posicoes = [
    "Goleiro",
    "Zagueiro",
    "Lateral Direito",
    "Lateral Esquerdo",
    "Volante",
    "Meia",
    "Atacante"
  ];

  const existe = posicoes.some(p => normalizarTexto(p) === normalizarTexto(valor));
  const extra = valor && !existe ? `<option value="${valor}" selected>${valor}</option>` : "";

  return `
    <option value="" ${!valor ? "selected" : ""}>-</option>
    ${extra}
    ${posicoes.map(p => `<option value="${p}" ${normalizarTexto(valor) === normalizarTexto(p) ? "selected" : ""}>${p}</option>`).join("")}
  `;
}

function linhaJogador(j,time){
  const lista = time === "A" ? jogadoresA : jogadoresB;
  const i = lista.indexOf(j);

  return `
    <tr>
      <td><input value="${j.numero || ""}" onchange="editarJogador('${time}',${i},'numero',this.value)" placeholder="Nº"></td>
      <td><input value="${j.nome || ""}" onchange="editarJogador('${time}',${i},'nome',this.value)" placeholder="Nome"></td>
      <td><input value="${j.cpf || ""}" onchange="editarJogador('${time}',${i},'cpf',this.value)" placeholder="CPF"></td>
      <td><input value="${j.nascimento || ""}" onchange="editarJogador('${time}',${i},'nascimento',this.value)" placeholder="Nasc."></td>
      <td>
        <select class="select-posicao" onchange="editarJogador('${time}',${i},'posicao',this.value)">
          ${opcoesPosicaoHtml(j.posicao)}
        </select>
      </td>
      <td>
        <select onchange="editarJogador('${time}',${i},'tipo',this.value)">
          <option value="titular" ${j.tipo !== "suplente" ? "selected" : ""}>Tit.</option>
          <option value="suplente" ${j.tipo === "suplente" ? "selected" : ""}>Sup.</option>
        </select>
      </td>
      <td><button class="btn btn-red" onclick="removerJogador('${time}',${i})">X</button></td>
    </tr>
  `;
}

window.editarJogador = function(time,i,c,v){
  const lista = time === "A" ? jogadoresA : jogadoresB;
  if(!lista[i]) return;

  if(c === "cpf"){
    if(cpfJaEscalado(v, lista[i])){
      alert("Este CPF já está na súmula. Não é permitido cadastrar o mesmo jogador 2 vezes.");
      renderEscalacoes();
      return;
    }
  }

  if(c === "tipo" && v !== "suplente"){
    const titularesSemEsse = lista.filter((j,idx) => idx !== i && j.tipo !== "suplente").length;
    if(titularesSemEsse >= LIMITE_TITULARES){
      alert(`Este time já tem ${LIMITE_TITULARES} titulares. Deixe este jogador como suplente.`);
      renderEscalacoes();
      return;
    }
  }

  lista[i][c] = v;
  montarSelects();
  salvarRascunhoRapido();
};

window.removerJogador = function(time,i){
  const lista = time === "A" ? jogadoresA : jogadoresB;
  lista.splice(i,1);
  renderEscalacoes();
  montarSelects();
  salvarRascunhoRapido();
};

window.adicionarJogador = async function(time){
  const n = $(`novoNum${time}`).value;
  const nome = $(`novoNome${time}`).value.trim();
  const cpf = $(`novoCpf${time}`).value;
  const pos = $(`novaPos${time}`).value;
  const tipo = $(`novoTipo${time}`).value;
  const cpfLimpo = limparCpf(cpf);

  if(!n || !nome){
    alert("Informe número e nome.");
    return;
  }

  if(!cpfLimpo){
    alert("Informe o CPF do jogador.");
    return;
  }

  if(cpfJaEscalado(cpfLimpo)){
    alert("Este CPF já está na súmula. Não é permitido cadastrar o mesmo jogador 2 vezes.");
    return;
  }

  try{
    const existente = await buscarJogadorFirebasePorCpf(cpfLimpo);

    if(existente){
      alert("Esse CPF já está cadastrado no sistema. Use o botão Buscar CPF para adicionar esse jogador, sem cadastrar duplicado.");
      return;
    }

    const lista = time === "A" ? jogadoresA : jogadoresB;

    if(tipo !== "suplente" && quantidadeTitulares(lista) >= LIMITE_TITULARES){
      alert(`Este time já tem ${LIMITE_TITULARES} titulares. Adicione como reserva/suplente.`);
      return;
    }

    const obj = {
      id:"",
      numero:n,
      nome,
      cpf:cpfLimpo,
      nascimento:"",
      posicao:pos,
      categoria:campo(jogo,["categoria"],""),
      tipo,
      manual:true,
      criadoPeloArbitro:true
    };

    if(jogadorSuspenso(obj)){
      alert("Este jogador está suspenso e não pode ser escalado.");
      return;
    }

    const novoId = await salvarJogadorNovoNoFirebase(obj,time);
    obj.id = novoId;

    lista.push(obj);

    $(`novoNum${time}`).value = "";
    $(`novoNome${time}`).value = "";
    $(`novoCpf${time}`).value = "";
    $(`novaPos${time}`).value = "";

    renderEscalacoes();
    montarSelects();
    salvarRascunhoRapido();

    alert("Jogador cadastrado no sistema e adicionado à súmula com time e categoria.");

  }catch(e){
    console.error(e);
    alert(e.message || "Erro ao cadastrar jogador.");
  }
};

window.buscarOutroJogadorPorCpf = async function(time){
  const cpfBusca = limparCpf($(`buscaOutro${time}`).value);

  if(!cpfBusca){
    alert("Digite o CPF do jogador.");
    return;
  }

  if(cpfJaEscalado(cpfBusca)){
    alert("Este CPF já está na súmula. Não é permitido lançar o mesmo jogador 2 vezes.");
    return;
  }

  const snap = await getDocs(collection(db,"jogadores"));
  let encontrado = null;

  snap.forEach(d=>{
    if(encontrado) return;

    const j = {id:d.id,...d.data()};
    const cpfJogador = limparCpf(campo(j,["cpf","CPF"],""));

    if(cpfJogador && cpfJogador === cpfBusca){
      encontrado = normalizarJogador(j);
    }
  });

  if(!encontrado){
    alert("Nenhum jogador cadastrado encontrado com esse CPF. Se for incluir manualmente, preencha número, nome e CPF no campo acima.");
    return;
  }

  if(jogadorSuspenso(encontrado)){
    alert("Este jogador está suspenso e não pode ser escalado.");
    return;
  }

  const lista = time === "A" ? jogadoresA : jogadoresB;

  encontrado.numero = "";
  encontrado.tipo = quantidadeTitulares(lista) >= LIMITE_TITULARES ? "suplente" : "titular";
  encontrado.categoria = encontrado.categoria || campo(jogo,["categoria"],"");
  encontrado.timeNome = encontrado.timeNome || (time === "A" ? getTimeA().nome : getTimeB().nome);
  encontrado.time = encontrado.time || encontrado.timeNome;
  encontrado.manual = false;

  lista.push(encontrado);

  $(`buscaOutro${time}`).value = "";

  renderEscalacoes();
  montarSelects();
  salvarRascunhoRapido();

  alert("Jogador encontrado pelo CPF e adicionado à súmula. Informe o número da camisa se necessário.");
};

    .filter(j=>j.nome)

    .join("");

  $("golJogadorA").innerHTML = optA || `<option value="">Sem jogadores</option>`;
  $("cartaoJogadorA").innerHTML = optA || `<option value="">Sem jogadores</option>`;
  $("golJogadorB").innerHTML = optB || `<option value="">Sem jogadores</option>`;

    const opts = opcoesTodosJogadores().map(j=>`<option value="${j.nome}" data-time="${j.time}">${j.numero || "S/N"} - ${j.nome} (${j.time})</option>`).join("");
    $("melhorJogador").innerHTML = `<option value="">Selecione o melhor jogador</option>` + opts;
    if(atual) $("melhorJogador").value = atual;
    $("melhorJogador").onchange = function(){
      const opt = this.selectedOptions[0];
      if(opt?.dataset?.time && $("melhorJogadorTime")) $("melhorJogadorTime").value = opt.dataset.time;
      salvarRascunhoRapido();
    };
  }
}

window.toggleVermelhoExtra = function(time){
  const tipo = $(`cartaoTipo${time}`).value;
  const extra = $(`cartaoVermelhoTipo${time}`);
  extra.style.display = tipo === "vermelho" ? "block" : "none";
};

window.adicionarGol = function(time){
  const sel = $(time === "A" ? "golJogadorA" : "golJogadorB");
  if(!sel.value) return;

  const minuto = $(time === "A" ? "golMinutoA" : "golMinutoB").value;
  const tipo = $(time === "A" ? "golTipoA" : "golTipoB").value;

  const obj = {
    time,
    timeNome: time === "A" ? getTimeA().nome : getTimeB().nome,
    nome:sel.value,
    jogador:sel.value,
    numero:sel.selectedOptions[0]?.dataset?.num || "",
    minuto,
    tempo:minuto,
    tipo
  };

  if(time === "A") golsA.push(obj);
  else golsB.push(obj);

  $(time === "A" ? "golMinutoA" : "golMinutoB").value = "";

  renderEventos();
  atualizarResumo();
  salvarRascunhoRapido();
};

window.adicionarCartao = function(time){
  const sel = $(time === "A" ? "cartaoJogadorA" : "cartaoJogadorB");
  if(!sel.value) return;

  const minuto = $(time === "A" ? "cartaoMinutoA" : "cartaoMinutoB").value;
  const tipo = $(time === "A" ? "cartaoTipoA" : "cartaoTipoB").value;
  const vermelhoTipo = tipo === "vermelho" ? $(time === "A" ? "cartaoVermelhoTipoA" : "cartaoVermelhoTipoB").value : "";
  const motivo = $(time === "A" ? "cartaoMotivoA" : "cartaoMotivoB").value;

  const obj = {
    time,
    timeNome: time === "A" ? getTimeA().nome : getTimeB().nome,
    nome:sel.value,
    jogador:sel.value,
    numero:sel.selectedOptions[0]?.dataset?.num || "",
    minuto,
    tempo:minuto,
    tipo,
    vermelhoTipo,
    motivoCartao:motivo,
    motivo
  };

  if(time === "A") cartoesA.push(obj);
  else cartoesB.push(obj);

  $(time === "A" ? "cartaoMinutoA" : "cartaoMinutoB").value = "";
  if($(time === "A" ? "cartaoMotivoA" : "cartaoMotivoB")){
    $(time === "A" ? "cartaoMotivoA" : "cartaoMotivoB").value = "";
  }

  renderEventos();
  atualizarResumo();
  salvarRascunhoRapido();
};

function renderEventos(){
  $("listaGolsA").innerHTML = golsA.map((g,i)=>eventoHtml(g,"gol","A",i)).join("");
  $("listaGolsB").innerHTML = golsB.map((g,i)=>eventoHtml(g,"gol","B",i)).join("");
  $("listaCartoesA").innerHTML = cartoesA.map((c,i)=>eventoHtml(c,"cartao","A",i)).join("");
  $("listaCartoesB").innerHTML = cartoesB.map((c,i)=>eventoHtml(c,"cartao","B",i)).join("");
}

function eventoHtml(e,tipo,time,i){
  const icone = tipo === "gol" ? "⚽" : (e.tipo === "vermelho" ? "🟥" : "🟨");
  const extra = e.tipo === "vermelho"
    ? ` - ${e.vermelhoTipo === "segundo_amarelo" ? "2º amarelo" : "direto"}`
    : "";

  const fn = tipo === "gol" ? "removerGol" : "removerCartao";

  const motivo = e.motivoCartao || e.motivo || "";
  return `
    <div class="event-item">
      <span>${icone} <strong>${e.minuto || "-"}</strong> ${e.nome} Nº ${e.numero || "S/N"} ${extra}${motivo ? `<br><small>Motivo: ${motivo}</small>` : ""}</span>
      <button onclick="${fn}('${time}',${i})">X</button>
    </div>
  `;
}

window.removerGol = function(time,i){
  if(time === "A") golsA.splice(i,1);
  else golsB.splice(i,1);

  renderEventos();
  atualizarResumo();
  salvarRascunhoRapido();
};

window.removerCartao = function(time,i){
  if(time === "A") cartoesA.splice(i,1);
  else cartoesB.splice(i,1);

  renderEventos();
  atualizarResumo();
  salvarRascunhoRapido();
};

window.atualizarResumo = function(){
  $("golsA").innerText = golsA.length;
  $("golsB").innerText = golsB.length;

  const todosCartoes = [...cartoesA,...cartoesB];

  $("totalGols").innerText = golsA.length + golsB.length;
  $("totalAmarelos").innerText = todosCartoes.filter(c=>c.tipo==="amarelo").length;
  $("totalVermelhos").innerText = todosCartoes.filter(c=>c.tipo==="vermelho").length;
};

function atualizarStatusVisual(){
  const status = finalizada ? "FINALIZADO" : "EM ANDAMENTO";
  const elStatus = $("statusOficial");

  elStatus.innerText = status;
  elStatus.className = "status-badge " + (finalizada ? "status-finalizado" : "status-andamento");
}

function gerarQr(link){
  if(window.QRCode && $("qrCanvas")){
    QRCode.toCanvas($("qrCanvas"), link, {width:98, margin:1});
  }
}

function montarDados(finalizar=false){
  const timeA = getTimeA();
  const timeB = getTimeB();
  const gols = [...golsA.map(g=>({...g,time:"A",timeNome:timeA.nome})), ...golsB.map(g=>({...g,time:"B",timeNome:timeB.nome}))];
  const cartoes = [...cartoesA.map(c=>({...c,time:"A",timeNome:timeA.nome})), ...cartoesB.map(c=>({...c,time:"B",timeNome:timeB.nome}))];

  const codigo = finalizar ? codigoVerificacao() : campo(sumulaSalva,["codigoVerificacao","hash"],"");
  const link = linkPublico();

  return {
    jogoId,
    id:jogoId,

    campeonato:campo(jogo,["campeonato","campeonatoNome"],$("campeonato").value),
    categoria:campo(jogo,["categoria"],""),
    numeroSumula:$("numeroSumula").value,
    codigoPartida:$("codigoPartida").value || jogoId,
    codigo:$("codigoPartida").value || jogoId,
    fase:$("fase").value,
    rodada:$("rodada").value,

    data:$("dataJogo").value,
    dataHora:$("dataJogo").value,
    hora:$("horaJogo").value,
    horario:$("horaJogo").value,
    local:$("localJogo").value,
    campo:$("localJogo").value,

    timeA,
    timeB,
    timeAId:campo(jogo,["timeAId"], campo(jogo?.timeA,["id"],"")),
    timeBId:campo(jogo,["timeBId"], campo(jogo?.timeB,["id"],"")),
    timeANome:timeA.nome,
    timeBNome:timeB.nome,

    golsA:golsA.length,
    golsB:golsB.length,
    placar:`${golsA.length} x ${golsB.length}`,

    jogadoresA,
    jogadoresB,
    comissaoA:listaComissao("A").map(t=>({...t,cpf:""})),
    comissaoB:listaComissao("B").map(t=>({...t,cpf:""})),
    comissaoAPrivada:listaComissao("A"),
    comissaoBPrivada:listaComissao("B"),
    tecnicosA:listaComissao("A").map(t=>({...t,cpf:""})),
    tecnicosB:listaComissao("B").map(t=>({...t,cpf:""})),
    tecnicosAPrivada:listaComissao("A"),
    tecnicosBPrivada:listaComissao("B"),
    escalacaoA:jogadoresA,
    escalacaoB:jogadoresB,

    gols,
    cartoes,
    golsLista:gols,
    cartoesLista:cartoes,

    arbitro:$("arbitro").value || $("arbitroTopo").value,
    arbitroNome:$("arbitro").value || $("arbitroTopo").value,
    arbitroId:campo(jogo,["arbitroId"],""),
    arbitroUid:campo(jogo,["arbitroUid"],""),

    assistente1:$("assistente1").value,
    assistente2:$("assistente2").value,
    observador:$("observador").value,

    arbitragem:{
      arbitro:$("arbitro").value || $("arbitroTopo").value,
      assistente1:$("assistente1").value,
      assistente2:$("assistente2").value,
      observador:$("observador").value
    },

    melhorJogador:$("melhorJogador").value,
    melhorJogadorTime:$("melhorJogadorTime").value,
    melhorJogadorDestaque:$("melhorDestaque").value,

    observacoes:$("observacoes").value,
    observacoesArbitro:$("observacoes").value,

    codigoVerificacao:codigo,
    hash:codigo,
    linkPublico:link,

    publicadaEmTexto:finalizar ? dataAgora() : campo(sumulaSalva,["publicadaEmTexto"],"Aguardando finalização"),
    autenticada:finalizar,
    publico:finalizar,
    publica:finalizar,
    status:finalizar ? "finalizado" : "em_andamento",
    sumulaStatus:finalizar ? "finalizada" : "em_andamento",
    sumulaFinalizada:finalizar,
    finalizadaEm:finalizar ? serverTimestamp() : null,

    removidoSubstituicoes:true,
    atualizadoEm:serverTimestamp()
  };
}

async function salvarRascunhoRapido(){
  if(!podeEditar || finalizada || !jogoId) return;

  try{
    const dados = montarDados(false);
    await setDoc(doc(db,"sumulas",jogoId),dados,{merge:true});
    await updateDoc(doc(db,"jogos",jogoId),{
      sumulaStatus:"em_andamento",
      atualizadoEm:serverTimestamp()
    });
    $("statusMsg").innerText = "Rascunho salvo.";
  }catch(e){
    console.error(e);
  }
}

function iniciarAutoSave(){
  if(autoSaveTimer) clearInterval(autoSaveTimer);

  autoSaveTimer = setInterval(async ()=>{
    if(!podeEditar || finalizada) return;

    try{
      await setDoc(doc(db,"sumulas",jogoId), montarDados(false), {merge:true});
      $("statusMsg").innerText = "Salvo automático.";
    }catch(e){
      console.error("AutoSave erro:", e);
    }
  }, 5000);
}

function aplicarBloqueio(motivo=""){
  if(podeEditar && !finalizada) return;

  document.querySelectorAll("#paginaSumula input,#paginaSumula select,#paginaSumula textarea,#paginaSumula button").forEach(el=>{
    el.disabled = true;
  });

  const aviso = $("bloqueioAviso");
  aviso.style.display = "block";
  aviso.innerText = motivo || (finalizada ? "Súmula finalizada. Edição bloqueada." : "Você não tem permissão para editar esta súmula.");
}

window.carregarJogo = async function(){
  jogoId = $("inputJogoId").value.trim() || new URLSearchParams(location.search).get("id");

  if(!jogoId){
    alert("Informe o ID do jogo.");
    return;
  }

  $("statusMsg").innerText = "Carregando...";

  const jogoSnap = await getDoc(doc(db,"jogos",jogoId));
  if(!jogoSnap.exists()){
    app.innerHTML = `<div class="error">Jogo não encontrado.</div>`;
    return;
  }

  jogo = {id:jogoId,...jogoSnap.data()};

  const sumulaSnap = await getDoc(doc(db,"sumulas",jogoId));
  sumulaSalva = sumulaSnap.exists() ? {id:jogoId,...sumulaSnap.data()} : null;

  if(!sumulaSalva){
    sumulaSalva = {
      id:jogoId,
      jogoId,
      ...jogo,
      status:"pendente",
      sumulaStatus:"pendente",
      sumulaFinalizada:false,
      publico:false,
      publica:false,
      criadoAutomaticamente:false,
      criadoEmServidor:serverTimestamp()
    };

    await setDoc(doc(db,"sumulas",jogoId),sumulaSalva,{merge:true});
  }

  finalizada = !!sumulaSalva.sumulaFinalizada || sumulaSalva.status === "finalizado";

  const admin = perfilEhAdmin();
  const arbitroDoJogo = perfilEhArbitroDoJogo();
  const diaDoJogo = mesmoDiaDoJogo();

  podeEditar = (admin || arbitroDoJogo) && !finalizada && diaDoJogo;

  if(!admin && !arbitroDoJogo){
    criarTela();
    preencher();
    aplicarBloqueio("Acesso negado. Somente o árbitro designado para este jogo ou um ADM autorizado pode editar esta súmula.");
    exibirAlerta("erro","Acesso negado para edição desta súmula.");
    return;
  }

  criarTela();
  preencher();

  if(!diaDoJogo && !admin){
    aplicarBloqueio("A súmula só pode ser editada pelo árbitro no dia do jogo.");
    exibirAlerta("aviso","A súmula ainda não está liberada para edição. Ela será aberta no dia do jogo.");
  }else if(finalizada){
    aplicarBloqueio("Súmula finalizada. Edição bloqueada.");
    exibirAlerta("ok","Esta súmula já foi finalizada.");
  }else{
    exibirAlerta("ok","Súmula liberada para edição.");
    iniciarAutoSave();
  }

  $("statusMsg").innerText = "Jogo carregado.";
  setTimeout(ajustarEscalaSumula,100);
};

window.finalizarSumula = async function(){
  if(!podeEditar || finalizada){
    alert("Você não tem permissão para finalizar esta súmula ou ela já está finalizada.");
    return;
  }

  if(!validarTitularesAntesDeFinalizar()) return;

  if(!confirm("Tem certeza? Após finalizar não poderá editar.")) return;

  try{
    const dados = montarDados(true);

    await setDoc(doc(db,"sumulas",jogoId), dados, {merge:true});

    await updateDoc(doc(db,"jogos",jogoId),{
      status:"finalizado",
      sumulaStatus:"finalizada",
      sumulaFinalizada:true,
      publico:true,
      publica:true,
      placar:`${golsA.length} x ${golsB.length}`,
      golsA:golsA.length,
      golsB:golsB.length,
      linkSumula:linkPublico(),
      sumulaPublica:linkPublico(),
      atualizadoEm:serverTimestamp()
    });

    const timeA = jogo.timeA || {id:campo(jogo,["timeAId","mandanteId","timeMandanteId"],""),nome:getTimeA().nome};
    const timeB = jogo.timeB || {id:campo(jogo,["timeBId","visitanteId","timeVisitanteId"],""),nome:getTimeB().nome};

    const golsTimeA = golsA.length;
    const golsTimeB = golsB.length;

    async function atualizarTimeTabela(time, golsPro, golsContra){
      if(!time?.id || !jogo.campeonatoId) return;

      const ref = doc(db,"classificacao", `${jogo.campeonatoId}_${time.id}`);
      const snap = await getDoc(ref);

      let dadosTime = {
        jogos:0,
        vitorias:0,
        empates:0,
        derrotas:0,
        golsPro:0,
        golsContra:0,
        saldo:0,
        pontos:0
      };

      if(snap.exists()) dadosTime = {...dadosTime,...snap.data()};

      dadosTime.jogos = Number(dadosTime.jogos || 0) + 1;
      dadosTime.golsPro = Number(dadosTime.golsPro || 0) + golsPro;
      dadosTime.golsContra = Number(dadosTime.golsContra || 0) + golsContra;
      dadosTime.saldo = dadosTime.golsPro - dadosTime.golsContra;

      if(golsPro > golsContra){
        dadosTime.vitorias = Number(dadosTime.vitorias || 0) + 1;
        dadosTime.pontos = Number(dadosTime.pontos || 0) + 3;
      }else if(golsPro === golsContra){
        dadosTime.empates = Number(dadosTime.empates || 0) + 1;
        dadosTime.pontos = Number(dadosTime.pontos || 0) + 1;
      }else{
        dadosTime.derrotas = Number(dadosTime.derrotas || 0) + 1;
      }

      await setDoc(ref,{
        ...dadosTime,
        timeId:time.id,
        timeNome:time.nome || time.nomeTime || "Time",
        campeonatoId:jogo.campeonatoId,
        categoria:campo(jogo,["categoria"],""),
        atualizadoEm:serverTimestamp()
      },{merge:true});
    }

    async function atualizarJogador(jogadorId, tipo){
      if(!jogadorId) return;
      const ref = doc(db,"jogadores", jogadorId);
      const snap = await getDoc(ref);
      if(!snap.exists()) return;
      const dadosJog = snap.data();
      const update = { jogos:Number(dadosJog.jogos || 0) + (tipo === "jogo" ? 1 : 0) };
      if(tipo === "gol") update.gols = Number(dadosJog.gols || 0) + 1;
      if(tipo === "amarelo") update.amarelos = Number(dadosJog.amarelos || 0) + 1;
      if(tipo === "vermelho") update.vermelhos = Number(dadosJog.vermelhos || 0) + 1;
      await updateDoc(ref, update);
    }

    async function aplicarSuspensaoAutomatica(cartao){
      if(!cartao.id) return;
      const refJogador = doc(db,"jogadores", cartao.id);
      const snapJogador = await getDoc(refJogador);
      if(!snapJogador.exists()) return;

      const dadosJogador = snapJogador.data();
      let amarelos = Number(dadosJogador.amarelos || 0);
      let vermelhos = Number(dadosJogador.vermelhos || 0);
      const update = {};

      if(cartao.tipo === "amarelo"){
        amarelos += 1;
        if(amarelos >= 3){
          update.suspenso = true;
          update.motivoSuspensao = "3 cartões amarelos";
          update.jogosSuspensao = 1;
          update.dataSuspensao = serverTimestamp();
          amarelos = 0;
        }
        update.amarelos = amarelos;
      }

      if(cartao.tipo === "vermelho"){
        vermelhos += 1;
        update.vermelhos = vermelhos;
        update.suspenso = true;
        update.motivoSuspensao = cartao.vermelhoTipo === "segundo_amarelo" ? "Expulsão por segundo amarelo" : "Cartão vermelho direto";
        update.jogosSuspensao = 1;
        update.dataSuspensao = serverTimestamp();
      }

      await updateDoc(refJogador, update);
    }

    await atualizarTimeTabela(timeA, golsTimeA, golsTimeB);
    await atualizarTimeTabela(timeB, golsTimeB, golsTimeA);

    for(const j of [...jogadoresA,...jogadoresB]) await atualizarJogador(j.id, "jogo");
    for(const g of [...golsA,...golsB]) await atualizarJogador(g.id, "gol");

    for(const c of [...cartoesA,...cartoesB]){
      await aplicarSuspensaoAutomatica(c);
      await atualizarJogador(c.id, c.tipo === "amarelo" ? "amarelo" : "vermelho");
    }

    if(jogo.arbitroId){
      const refArbitro = doc(db,"arbitros", jogo.arbitroId);
      const snapArb = await getDoc(refArbitro);
      if(snapArb.exists()){
        const dadosArb = snapArb.data();
        await updateDoc(refArbitro,{ jogos:Number(dadosArb.jogos || 0) + 1 });
      }
    }

    finalizada = true;
    podeEditar = false;

    $("codigoVerificacao").innerText = dados.codigoVerificacao;
    $("linkPublicoTexto").innerText = dados.linkPublico;
    $("publicadaEm").innerText = dados.publicadaEmTexto;
    gerarQr(dados.linkPublico);
    atualizarStatusVisual();

    alert("Súmula finalizada, publicada e estatísticas atualizadas com sucesso.");
    location.href = dados.linkPublico;

  }catch(error){
    console.error("Erro ao finalizar súmula:", error);
    alert("Erro ao finalizar súmula. Veja o console: " + (error?.message || error));
  }
};

function ajustarEscalaSumula(){
  const scaleBox = document.querySelector(".sumula-scale");
  const viewport = document.querySelector(".sumula-viewport");
  const page = document.querySelector(".page");
  if(!scaleBox || !viewport || !page) return;
  if(window.innerWidth <= 900){
    const escala = window.innerWidth / 1120;
    scaleBox.style.setProperty("--escala-mobile", escala);
    viewport.style.height = (page.offsetHeight * escala + 16) + "px";
  }else{
    scaleBox.style.removeProperty("--escala-mobile");
    viewport.style.height = "auto";
  }
}
window.addEventListener("resize",ajustarEscalaSumula);
