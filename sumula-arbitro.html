<body>

<div class="topbar">
  <div class="topbar-inner">
    <input id="inputJogoId" placeholder="ID do jogo ou use ?id=ID_DO_JOGO">
    <button class="btn btn-blue" onclick="carregarJogo()"><i class="fa-solid fa-download"></i> Carregar Jogo</button>
    <span id="statusMsg">Aguardando...</span>
  </div>
</div>

<div id="alertaSistema"></div>

<div id="app">
  <div class="loading">
    <i class="fa-solid fa-spinner fa-spin"></i><br>
    Carregando...
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { db, auth } from "./firebase.js";
import {
  doc,
  getDoc,
  setDoc,
  updateDoc,
  serverTimestamp,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const app = document.getElementById("app");
const alertaSistema = document.getElementById("alertaSistema");
const $ = id => document.getElementById(id);

let usuarioAtual = null;
let usuarioPerfil = null;
let jogoId = "";
let jogo = null;
let sumulaSalva = null;
let finalizada = false;
let bloqueada = false;
let podeEditar = false;
let autoSaveTimer = null;
let jaCarregouInicial = false;

let jogadoresA = [];
let jogadoresB = [];
let golsA = [];
let golsB = [];
let cartoesA = [];
let cartoesB = [];

function campo(obj, chaves, fallback=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== "") return obj[c];
  }
  return fallback;
}

function primeiroArray(...listas){
  for(const lista of listas){
    if(Array.isArray(lista) && lista.length) return lista;
  }
  return [];
}

function dataAgora(){
  return new Date().toLocaleString("pt-BR");
}

function codigoVerificacao(){
  return btoa(`${jogoId}-${Date.now()}-${Math.random()}`)
    .replace(/[^A-Z0-9]/gi,"")
    .slice(0,12)
    .toUpperCase();
}

function linkPublico(){
  const base = location.href.split("/").slice(0,-1).join("/");
  return `${base}/sumula-publica.html?id=${jogoId}`;
}

function normalizarTexto(txt){
  return String(txt || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function mesmoDiaDoJogo(){
  const data = campo(jogo,["data","dataJogo"],"");
  if(!data) return true;

  const hoje = new Date();
  const yyyy = hoje.getFullYear();
  const mm = String(hoje.getMonth()+1).padStart(2,"0");
  const dd = String(hoje.getDate()).padStart(2,"0");
  const hojeISO = `${yyyy}-${mm}-${dd}`;

  if(data.includes("-")) return data.slice(0,10) === hojeISO;

  const partes = data.split("/");
  if(partes.length === 3){
    const dataISO = `${partes[2]}-${partes[1].padStart(2,"0")}-${partes[0].padStart(2,"0")}`;
    return dataISO === hojeISO;
  }

  return true;
}

function exibirAlerta(tipo, texto){
  const classe = tipo === "erro" ? "alerta-erro" : tipo === "ok" ? "alerta-ok" : "alerta-aviso";
  alertaSistema.innerHTML = `<div class="alerta-sistema ${classe}"><i class="fa-solid fa-circle-info"></i> ${texto}</div>`;
}

function limparAlerta(){
  alertaSistema.innerHTML = "";
}

function perfilEhAdmin(){
  const tipo = normalizarTexto(campo(usuarioPerfil,["tipo","perfil","cargo","role"],""));
  const nivel = normalizarTexto(campo(usuarioPerfil,["nivel","permissao"],""));
  return tipo.includes("admin") || nivel.includes("admin") || usuarioPerfil?.admin === true;
}

function perfilEhArbitroDoJogo(){
  if(!usuarioAtual || !jogo) return false;

  const uid = usuarioAtual.uid;
  const email = normalizarTexto(usuarioAtual.email || "");

  const idsPermitidos = [
    campo(jogo,["arbitroId"],""),
    campo(jogo,["arbitroUid"],""),
    campo(jogo,["arbitroPrincipalId"],""),
    campo(jogo?.arbitroObj,["id","uid"],"")
  ].filter(Boolean);

  if(idsPermitidos.includes(uid)) return true;

  const emailsPermitidos = [
    campo(jogo,["arbitroEmail"],""),
    campo(jogo?.arbitroObj,["email"],"")
  ].map(normalizarTexto).filter(Boolean);

  if(email && emailsPermitidos.includes(email)) return true;

  return false;
}

async function carregarPerfilUsuario(){
  if(!usuarioAtual) return null;

  const refs = [
    doc(db,"usuarios",usuarioAtual.uid),
    doc(db,"users",usuarioAtual.uid),
    doc(db,"arbitros",usuarioAtual.uid),
    doc(db,"admins",usuarioAtual.uid)
  ];

  for(const ref of refs){
    const snap = await getDoc(ref);
    if(snap.exists()) return {id:snap.id,...snap.data()};
  }

  return {
    id:usuarioAtual.uid,
    email:usuarioAtual.email || "",
    nome:usuarioAtual.displayName || ""
  };
}

function normalizarJogador(j){
  return {
    id: campo(j,["id","uid","jogadorId"],""),
    cpf: campo(j,["cpf","CPF"],""),
    nascimento: campo(j,["nascimento","dataNascimento","data_nascimento"],""),
    numero: campo(j,["numero","camisa","n"],""),
    nome: campo(j,["nome","jogador","jogadorNome","atleta"],""),
    posicao: campo(j,["posicao","posição","funcao"],""),
    categoria: campo(j,["categoria"],""),
    tipo: campo(j,["tipo","status","condicao"],"titular"),
    capitao: !!j.capitao,
    goleiro: !!j.goleiro,
    manual: !!j.manual
  };
}

function timeAObj(){
  return jogo?.timeA && typeof jogo.timeA === "object" ? jogo.timeA : {};
}

function timeBObj(){
  return jogo?.timeB && typeof jogo.timeB === "object" ? jogo.timeB : {};
}

function getTimeA(){
  return {
    nome:$("timeA").value || "Mandante",
    cidade:$("cidadeA").value || "",
    escudo:$("logoA").src || "logo-liga.jfif"
  };
}

function getTimeB(){
  return {
    nome:$("timeB").value || "Visitante",
    cidade:$("cidadeB").value || "",
    escudo:$("logoB").src || "logo-liga.jfif"
  };
}

function criarTela(){
  app.innerHTML = `
  <div class="page" id="paginaSumula">

    <header class="header">
      <div class="header-logo">
        <img src="logo-liga.jfif">
      </div>

      <div class="header-title">
        <h1>SÚMULA OFICIAL</h1>
        <input id="campeonato" placeholder="CAMPEONATO LIGA GOIANA">
      </div>

      <div class="header-right">

/* ======================= REGRAS NOVAS ======================= */

function toggleVermelhoExtra(time){
  const tipo = document.getElementById(`cartaoTipo${time}`).value;
  const extra = document.getElementById(`cartaoVermelhoTipo${time}`);
  extra.style.display = tipo === "vermelho" ? "block" : "none";
}

function atualizarPlacarAutomatico(){
  document.getElementById("golsA").innerText = golsA.length;
  document.getElementById("golsB").innerText = golsB.length;
}

/* ======================= AUTO SAVE ======================= */

function iniciarAutoSave(){
  if(autoSaveTimer) clearInterval(autoSaveTimer);

  autoSaveTimer = setInterval(async ()=>{
    if(!podeEditar || finalizada) return;

    try{
      await setDoc(doc(db,"sumulas",jogoId), montarDados(), {merge:true});
      $("statusMsg").innerText = "Salvando automático...";
    }catch(e){
      console.error("AutoSave erro:", e);
    }
  }, 5000);
}

/* ======================= BLOQUEIOS ======================= */

function aplicarBloqueio(){
  if(!podeEditar){
    document.querySelectorAll("input,select,textarea,button").forEach(el=>{
      if(!el.classList.contains("btn-link")) el.disabled = true;
    });

    const aviso = document.getElementById("bloqueioAviso");
    aviso.style.display = "block";
    aviso.innerText = "Você não tem permissão para editar esta súmula.";
  }

  if(finalizada){
    document.querySelectorAll("input,select,textarea,button").forEach(el=>{
      el.disabled = true;
    });

    const aviso = document.getElementById("bloqueioAviso");
    aviso.style.display = "block";
    aviso.innerText = "Súmula finalizada. Edição bloqueada.";
  }
}

/* ======================= FINALIZAÇÃO ======================= */

window.finalizarSumula = async function(){

  if(!confirm("Tem certeza? Após finalizar não poderá editar.")) return;

  const dados = montarDados();

  await setDoc(doc(db,"sumulas",jogoId), dados, {merge:true});

  await updateDoc(doc(db,"jogos",jogoId),{
    status:"finalizado",
    sumulaFinalizada:true,
    linkSumula:linkPublico()
  });

  alert("Súmula finalizada!");
  location.href = linkPublico();
};

/* ======================= INIT ======================= */

onAuthStateChanged(auth, async (user)=>{
  usuarioAtual = user;

  if(!user){
    app.innerHTML = `<div class="error">Faça login.</div>`;
    return;
  }

  usuarioPerfil = await carregarPerfilUsuario();
});
