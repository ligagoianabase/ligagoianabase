<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súmula do Árbitro - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --azul:#061d44;
  --azul2:#0b3f86;
  --vermelho:#e30613;
  --verde:#069447;
  --dourado:#f7c600;
  --linha:#cfd7e3;
  --texto:#071833;
  --muted:#4b5563;
  --bg:#dfe6ef;
  --white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--texto);
  min-height:100vh;
}

button,input,select,textarea{
  font-family:inherit;
}

button{
  cursor:pointer;
  border:none;
}

input,select,textarea{
  width:100%;
  padding:8px 10px;
  border:1px solid var(--linha);
  border-radius:7px;
  font-size:13px;
  background:#fff;
  color:#111;
  outline:none;
}

textarea{
  min-height:90px;
  resize:vertical;
}

.topbar{
  position:sticky;
  top:0;
  z-index:50;
  background:#fff;
  border-bottom:2px solid var(--azul);
  padding:10px;
}

.topbar-inner{
  width:min(100% - 20px,1180px);
  margin:auto;
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:8px;
  align-items:center;
}

.btn{
  padding:10px 13px;
  border-radius:8px;
  font-weight:900;
  font-size:13px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
}

.btn-blue{background:var(--azul);color:#fff}
.btn-gold{background:linear-gradient(135deg,var(--dourado),#ffe45c);color:#111}
.btn-green{background:var(--verde);color:#fff}
.btn-red{background:var(--vermelho);color:#fff}
.btn-gray{background:#475569;color:#fff}

.page{
  width:min(100% - 20px,1180px);
  margin:14px auto;
  background:#fff;
  border:1px solid #b9c4d4;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.16);
}

.header{
  display:grid;
  grid-template-columns:150px 1fr 210px;
  align-items:center;
  gap:10px;
  padding:16px 18px 8px;
}

.header-logo{
  display:flex;
  justify-content:center;
}

.header-logo img{
  width:94px;
  height:94px;
  object-fit:contain;
}

.header-title{
  text-align:center;
}

.header-title h1{
  color:var(--azul);
  font-size:56px;
  font-weight:900;
  letter-spacing:1px;
  line-height:.95;
}

.header-title input{
  margin-top:8px;
  text-align:center;
  color:var(--azul);
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
  border:none;
}

.header-right{
  text-align:center;
  color:var(--azul);
  font-weight:900;
  font-size:22px;
  line-height:1.08;
}

.header-ball{
  font-size:58px;
  margin-top:6px;
}

.info-strip{
  margin:8px 18px 14px;
  display:grid;
  grid-template-columns:1.1fr 1.35fr .85fr .85fr 1.05fr;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.info-box{
  min-height:70px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border-right:1px solid var(--linha);
  background:#fff;
}

.info-box:last-child{border-right:none}

.info-box i{
  width:36px;
  color:var(--azul);
  font-size:30px;
  text-align:center;
}

.info-box small{
  display:block;
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  color:#111;
  margin-bottom:4px;
}

.status-finalizado{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  background:var(--verde);
  color:#fff;
  padding:8px 15px;
  border-radius:8px;
  font-size:16px;
  font-weight:900;
}

.score-card{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:1fr 260px 1fr;
  min-height:140px;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.team-score{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  padding:14px;
  background:#fff;
}

.team-score.away{flex-direction:row-reverse}

.team-score img{
  width:108px;
  height:108px;
  object-fit:contain;
}

.team-name{
  text-align:center;
}

.team-name input.nome{
  color:var(--azul);
  font-size:31px;
  font-weight:900;
  text-transform:uppercase;
  text-align:center;
  border:none;
}

.team-name input.cidade{
  margin-top:6px;
  color:var(--azul);
  font-size:15px;
  font-weight:800;
  text-align:center;
  border:none;
}

.score-center{
  background:var(--azul);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.score-number{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-size:70px;
  font-weight:900;
}

.score-number input{
  width:78px;
  border:none;
  background:transparent;
  color:#fff;
  font-size:70px;
  font-weight:900;
  text-align:center;
  padding:0;
}

.score-center span{
  margin-top:8px;
  text-transform:uppercase;
  font-size:14px;
  font-weight:900;
}

.match-strip{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:1fr 1fr 1.2fr 1.1fr;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.match-box{
  display:flex;
  align-items:center;
  gap:12px;
  min-height:64px;
  padding:10px 12px;
  border-right:1px solid var(--linha);
  background:#fff;
}

.match-box:last-child{border-right:none}

.match-box i{
  width:34px;
  color:var(--azul);
  font-size:30px;
  text-align:center;
}

.match-box small{
  display:block;
  color:var(--azul);
  text-transform:uppercase;
  font-weight:900;
  font-size:12px;
  margin-bottom:3px;
}

.section{
  margin:0 18px 12px;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
  background:#fff;
}

.section-title{
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:8px 10px;
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.section-body{
  padding:12px;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.grid3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.lineup-head{
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:var(--azul);
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
  border:1px solid var(--linha);
  border-bottom:none;
}

.lineup-head img{
  width:28px;
  height:28px;
  object-fit:contain;
}

.table-wrap{overflow-x:auto}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#f5f7fb;
  color:var(--azul);
  font-size:12px;
  text-transform:uppercase;
  padding:7px 8px;
  border:1px solid var(--linha);
  text-align:left;
}

td{
  color:#111;
  font-size:13px;
  padding:5px 8px;
  border:1px solid #e5eaf1;
}

td input,
td select{
  border:none;
  padding:5px;
}

.num{width:48px;text-align:center}

.sub-row td{
  background:#f8fafc;
  color:var(--azul);
  text-align:center;
  font-weight:900;
  text-transform:uppercase;
  padding:7px;
}

.add-row{
  display:grid;
  grid-template-columns:60px 1fr 1fr 90px auto;
  gap:6px;
  margin-top:8px;
}

.event-box{
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.event-box h3{
  color:#fff;
  background:var(--azul);
  text-align:center;
  padding:8px;
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.event-box.away h3{background:var(--vermelho)}

.event-columns{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.event-col{
  min-height:130px;
  padding:12px;
  border-right:1px solid var(--linha);
}

.event-col:last-child{border-right:none}

.event-col h4{
  color:var(--azul);
  text-align:center;
  font-size:17px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:10px;
}

.event-form{
  display:grid;
  grid-template-columns:1fr 70px 90px auto;
  gap:6px;
  margin-bottom:8px;
}

.event-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:7px;
  color:#111;
  font-size:13px;
  border:1px solid var(--linha);
  background:#f8fafc;
  border-radius:8px;
  padding:7px;
}

.event-item button{
  background:var(--vermelho);
  color:#fff;
  border-radius:6px;
  padding:5px 7px;
  font-weight:900;
}

.lower-grid{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:24px;
}

.panel{
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
  background:#fff;
}

.panel h3{
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:8px;
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
}

.panel-body{
  padding:12px;
}

.arb-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
}

.summary-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  border-bottom:1px solid var(--linha);
}

.summary-box{
  text-align:center;
  padding:15px 10px;
  border-right:1px solid var(--linha);
}

.summary-box:last-child{border-right:none}

.summary-box span{
  display:block;
  color:var(--azul);
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
}

.summary-box strong{
  display:block;
  color:var(--azul);
  font-size:31px;
  font-weight:900;
  margin-top:4px;
}

.best-player{
  display:grid;
  grid-template-columns:90px 1fr;
  align-items:center;
  gap:12px;
  padding:12px;
}

.trophy{
  width:76px;
  height:76px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--dourado),#ffe45c);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
}

.footer-grid{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:24px;
}

.auth-box{
  display:grid;
  grid-template-columns:110px 1fr;
  gap:12px;
  align-items:center;
  padding:12px;
}

.auth-box canvas{
  width:98px!important;
  height:98px!important;
}

.auth-code{
  color:var(--azul);
  font-size:17px;
  font-weight:900;
  margin:4px 0;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.btn-whats{background:#0ca84a;color:#fff}
.btn-email{background:#2563eb;color:#fff}
.btn-link{background:#4b5563;color:#fff}
.btn-pdf{background:#dc2626;color:#fff}

.final-footer{
  margin-top:12px;
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:9px;
  font-size:13px;
  line-height:1.35;
}

.loading,.error{
  max-width:760px;
  margin:80px auto;
  background:#fff;
  border:1px solid #cfd7e3;
  color:#b42323;
  padding:24px;
  border-radius:10px;
  text-align:center;
  font-size:18px;
  font-weight:900;
}

@media(max-width:900px){
  .topbar-inner,
  .header,
  .info-strip,
  .score-card,
  .match-strip,
  .grid2,
  .grid3,
  .event-columns,
  .lower-grid,
  .summary-grid,
  .footer-grid,
  .buttons,
  .auth-box,
  .add-row,
  .event-form{
    grid-template-columns:1fr;
  }

  .header-title h1{font-size:36px}
  .score-number,.score-number input{font-size:50px}
  .team-score,.team-score.away{flex-direction:column}
}
</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <input id="inputJogoId" placeholder="ID do jogo ou use ?id=ID_DO_JOGO">
    <button class="btn btn-blue" onclick="carregarJogo()"><i class="fa-solid fa-download"></i> Carregar Jogo</button>
    <span id="statusMsg">Aguardando...</span>
  </div>
</div>

<div id="app">
  <div class="loading">
    <i class="fa-solid fa-spinner fa-spin"></i><br>
    Carregando...
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { db, auth } from "./firebase.js";
import {
  doc,
  getDoc,
  setDoc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const app = document.getElementById("app");
const $ = id => document.getElementById(id);

let usuarioAtual = null;
let jogoId = "";
let jogo = null;
let finalizada = false;

let jogadoresA = [];
let jogadoresB = [];
let golsA = [];
let golsB = [];
let cartoesA = [];
let cartoesB = [];

function normalizar(v){
  return String(v || "").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function campo(obj, chaves, fallback=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== "") return obj[c];
  }
  return fallback;
}

function dataAgora(){
  return new Date().toLocaleString("pt-BR");
}

function codigoVerificacao(){
  return btoa(`${jogoId}-${Date.now()}-${Math.random()}`)
    .replace(/[^A-Z0-9]/gi,"")
    .slice(0,12)
    .toUpperCase();
}

function linkPublico(){
  const base = location.href.split("/").slice(0,-1).join("/");
  return `${base}/sumula-publica.html?id=${jogoId}`;
}

function normalizarJogador(j){
  return {
    numero: campo(j,["numero","camisa","n"],""),
    nome: campo(j,["nome","jogador","jogadorNome","atleta"],""),
    posicao: campo(j,["posicao","posição","funcao"],""),
    tipo: campo(j,["tipo","status","condicao"],"titular"),
    capitao: !!j.capitao,
    goleiro: !!j.goleiro
  };
}

function timeAObj(){
  return jogo?.timeA && typeof jogo.timeA === "object" ? jogo.timeA : {};
}

function timeBObj(){
  return jogo?.timeB && typeof jogo.timeB === "object" ? jogo.timeB : {};
}

function getTimeA(){
  return {
    nome:$("timeA").value || "Mandante",
    cidade:$("cidadeA").value || "",
    escudo:$("logoA").src || "logo-liga.jfif"
  };
}

function getTimeB(){
  return {
    nome:$("timeB").value || "Visitante",
    cidade:$("cidadeB").value || "",
    escudo:$("logoB").src || "logo-liga.jfif"
  };
}

function criarTela(){
  app.innerHTML = `
  <div class="page" id="paginaSumula">

      <div class="header-logo">
        <img src="logo-liga.jfif">

      <div class="header-title">

      <div class="header-right">
        <div>FUTEBOL<br>É PAIXÃO!</div>
        <div style="color:var(--dourado);font-size:16px;margin-top:2px;">★★★</div>
        <div class="header-ball">⚽</div>
      </div>
    </header>

    <section class="info-strip">
      <div class="info-box">
        <i class="fa-regular fa-file-lines"></i>
        <div><small>Súmula Nº</small><input id="numeroSumula"></div>
      </div>

      <div class="info-box">
        <i class="fa-solid fa-barcode"></i>
        <div><small>Código da partida</small><input id="codigoPartida"></div>
      </div>

      <div class="info-box">
        <i class="fa-solid fa-trophy"></i>
        <div><small>Fase</small><input id="fase"></div>
      </div>

      <div class="info-box">
        <i class="fa-solid fa-list-ol"></i>
        <div><small>Rodada</small><input id="rodada"></div>
      </div>

      <div class="info-box">
        <div><small>Status</small><strong class="status-finalizado" id="statusOficial">EM PREENCHIMENTO</strong></div>
      </div>
    </section>

    <section class="score-card">
      <div class="team-score">
        <img id="logoA" src="logo-liga.jfif">
        <div class="team-name">
          <input class="nome" id="timeA">
          <input class="cidade" id="cidadeA">
        </div>
      </div>

      <div class="score-center">
        <div class="score-number">
          <input id="golsA" type="number" value="0" min="0" oninput="atualizarResumo()">
          <span>x</span>
          <input id="golsB" type="number" value="0" min="0" oninput="atualizarResumo()">
        </div>
        <span>Placar Final</span>
      </div>

      <div class="team-score away">
        <img id="logoB" src="logo-liga.jfif">
        <div class="team-name">
          <input class="nome" id="timeB">
          <input class="cidade" id="cidadeB">

    </section>

    <section class="match-strip">
      <div class="match-box">
        <i class="fa-regular fa-calendar-days"></i>
        <div><small>Data</small><input id="dataJogo"></div>
      </div>

      <div class="match-box">
        <i class="fa-regular fa-clock"></i>
        <div><small>Horário</small><input id="horaJogo"></div>
      </div>

      <div class="match-box">

        <div><small>Campo</small><input id="localJogo"></div>
      </div>

      <div class="match-box">
        <i class="fa-solid fa-whistle"></i>
        <div><small>Árbitro</small><input id="arbitroTopo"></div>
      </div>
    </section>

    <section class="section">
      <div class="section-title">Escalações</div>
      <div class="section-body grid2">
        <div>
          <div class="lineup-head"><span id="tituloA">TIME A</span><img id="miniLogoA" src="logo-liga.jfif"></div>

            <table>

            <input id="novoNumA" placeholder="Nº">
            <input id="novoNomeA" placeholder="Jogador">

            <select id="novoTipoA"><option value="titular">Titular</option><option value="suplente">Suplente</option></select>

          </div>
        </div>

        <div>
          <div class="lineup-head"><span id="tituloB">TIME B</span><img id="miniLogoB" src="logo-liga.jfif"></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th class="num">Nº</th><th>Jogador</th><th>Posição</th><th>Tipo</th><th></th></tr></thead>
              <tbody id="escB"></tbody>
            </table>
          </div>
          <div class="add-row">
            <input id="novoNumB" placeholder="Nº">
            <input id="novoNomeB" placeholder="Jogador">
            <input id="novaPosB" placeholder="Posição">

            <button class="btn btn-blue" onclick="adicionarJogador('B')">+</button>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-title">Gols e Cartões</div>
      <div class="section-body grid2">

        <div class="event-box">
          <h3 id="eventoTituloA">TIME A</h3>
          <div class="event-columns">
            <div class="event-col">
              <h4>Gols</h4>
              <div class="event-form">
                <select id="golJogadorA"></select>

function preencher(){
  const A = timeAObj();
  const B = timeBObj();

  $("campeonato").value = campo(jogo,["campeonato","campeonatoNome"],"CAMPEONATO LIGA GOIANA");
  $("numeroSumula").value = campo(jogo,["numeroSumula","sumulaNumero"],`${new Date().getFullYear()}-${String(Math.floor(Math.random()*99999)).padStart(5,"0")}`);
  $("codigoPartida").value = campo(jogo,["codigoPartida","codigo"],jogoId);
  $("fase").value = campo(jogo,["fase"],"1ª Fase");
  $("rodada").value = campo(jogo,["rodada"],"");

  $("timeA").value = campo(A,["nome","nomeTime"], campo(jogo,["mandante","timeA_nome"],"Mandante"));
  $("timeB").value = campo(B,["nome","nomeTime"], campo(jogo,["visitante","timeB_nome"],"Visitante"));
  $("cidadeA").value = campo(A,["cidade","municipio"], campo(jogo,["cidadeA"],"Goiânia - GO"));
  $("cidadeB").value = campo(B,["cidade","municipio"], campo(jogo,["cidadeB"],"Goiânia - GO"));
  $("logoA").src = campo(A,["logo","escudo","imagem"], campo(jogo,["logoA","escudoTimeA"],"logo-liga.jfif"));
  $("logoB").src = campo(B,["logo","escudo","imagem"], campo(jogo,["logoB","escudoTimeB"],"logo-liga.jfif"));
  $("miniLogoA").src = $("logoA").src;
  $("miniLogoB").src = $("logoB").src;

  $("dataJogo").value = campo(jogo,["data","dataJogo"],"");
  $("horaJogo").value = campo(jogo,["hora","horario"],"");
  $("localJogo").value = campo(jogo,["local","campo","estadio"],"");
  $("arbitroTopo").value = campo(jogo,["arbitro","arbitroNome"],"");
  $("arbitro").value = campo(jogo,["arbitro","arbitroNome"],"");
  $("assistente1").value = campo(jogo,["assistente1"],"");
  $("assistente2").value = campo(jogo,["assistente2"],"");
  $("observador").value = campo(jogo,["observador"],"");

  jogadoresA = (campo(jogo,["jogadoresA","escalacaoA"],[]) || campo(A,["jogadores"],[]) || []).map(normalizarJogador);
  jogadoresB = (campo(jogo,["jogadoresB","escalacaoB"],[]) || campo(B,["jogadores"],[]) || []).map(normalizarJogador);

  if(!jogadoresA.length) jogadoresA = jogadoresPadrao();
  if(!jogadoresB.length) jogadoresB = jogadoresPadrao();

  $("golsA").value = campo(jogo,["golsA"],0);
  $("golsB").value = campo(jogo,["golsB"],0);

  atualizarTitulos();
  renderEscalacoes();
  montarSelects();
  atualizarResumo();
  gerarQr(linkPublico());
}

function renderEscalacoes(){
  $("escA").innerHTML = renderJogadores(jogadoresA,"A");
  $("escB").innerHTML = renderJogadores(jogadoresB,"B");
}

function renderJogadores(lista,time){
  const titulares = lista.filter(j=>j.tipo !== "suplente");
  const suplentes = lista.filter(j=>j.tipo === "suplente");

  return `
    <tr class="sub-row"><td colspan="5">Titulares</td></tr>
    ${titulares.map(j=>linhaJogador(j,time)).join("")}
    <tr class="sub-row"><td colspan="5">Suplentes</td></tr>
    ${suplentes.map(j=>linhaJogador(j,time)).join("")}
  `;
}

function linhaJogador(j,time){
  const lista = time === "A" ? jogadoresA : jogadoresB;
  const i = lista.indexOf(j);
  return `
    <tr>
      <td><input value="${j.numero || ""}" onchange="editarJogador('${time}',${i},'numero',this.value)"></td>
      <td><input value="${j.nome || ""}" onchange="editarJogador('${time}',${i},'nome',this.value)"></td>
      <td><input value="${j.posicao || ""}" onchange="editarJogador('${time}',${i},'posicao',this.value)"></td>
      <td>
        <select onchange="editarJogador('${time}',${i},'tipo',this.value)">
          <option value="titular" ${j.tipo !== "suplente" ? "selected" : ""}>Titular</option>
          <option value="suplente" ${j.tipo === "suplente" ? "selected" : ""}>Suplente</option>
        </select>
      </td>
      <td><button class="btn btn-red" onclick="removerJogador('${time}',${i})">X</button></td>
    </tr>
  `;
}

window.editarJogador = function(time,i,c,v){
  const lista = time === "A" ? jogadoresA : jogadoresB;
  lista[i][c] = v;
  montarSelects();
};

window.removerJogador = function(time,i){
  const lista = time === "A" ? jogadoresA : jogadoresB;
  lista.splice(i,1);
  renderEscalacoes();
  montarSelects();
};

window.adicionarJogador = function(time){
  const n = $(`novoNum${time}`).value;
  const nome = $(`novoNome${time}`).value;
  const pos = $(`novaPos${time}`).value;
  const tipo = $(`novoTipo${time}`).value;
  if(!n || !nome){ alert("Informe número e nome."); return; }
  const obj = {numero:n,nome,posicao:pos,tipo};
  if(time === "A") jogadoresA.push(obj); else jogadoresB.push(obj);
  $(`novoNum${time}`).value = "";
  $(`novoNome${time}`).value = "";
  $(`novaPos${time}`).value = "";
  renderEscalacoes();
  montarSelects();
};

function montarSelects(){
  const optA = jogadoresA.filter(j=>j.nome).map(j=>`<option value="${j.nome}" data-num="${j.numero}">${j.numero} - ${j.nome}</option>`).join("");
  const optB = jogadoresB.filter(j=>j.nome).map(j=>`<option value="${j.nome}" data-num="${j.numero}">${j.numero} - ${j.nome}</option>`).join("");
  $("golJogadorA").innerHTML = optA || `<option value="">Sem jogadores</option>`;
  $("cartaoJogadorA").innerHTML = optA || `<option value="">Sem jogadores</option>`;
  $("golJogadorB").innerHTML = optB || `<option value="">Sem jogadores</option>`;
  $("cartaoJogadorB").innerHTML = optB || `<option value="">Sem jogadores</option>`;
}

window.carregarJogo = async function(){
  jogoId = $("inputJogoId").value.trim() || new URLSearchParams(location.search).get("id");
  if(!jogoId){ alert("Informe o ID do jogo."); return; }

  $("statusMsg").innerText = "Carregando...";

  const snap = await getDoc(doc(db,"jogos",jogoId));
  if(!snap.exists()){
    app.innerHTML = `<div class="error">Jogo não encontrado.</div>`;
    return;
  }

  jogo = {id:jogoId,...snap.data()};

  if(usuarioAtual && jogo.arbitroId && usuarioAtual.uid !== jogo.arbitroId && jogo.adminId !== usuarioAtual.uid){
    app.innerHTML = `<div class="error">Acesso negado.</div>`;
    return;
  }

  criarTela();
  preencher();

  const sSnap = await getDoc(doc(db,"sumulas",jogoId));
  if(sSnap.exists()){
    carregarSumulaSalva(sSnap.data());
  }

  $("statusMsg").innerText = "Jogo carregado.";
};

function carregarSumulaSalva(s){
  if(s.sumulaFinalizada){
    finalizada = true;
    $("statusOficial").innerText = "FINALIZADO";
  }

  if(Array.isArray(s.gols)){
    golsA = s.gols.filter(g=>g.time === "A");
    golsB = s.gols.filter(g=>g.time === "B");
  }

  if(Array.isArray(s.cartoes)){
    cartoesA = s.cartoes.filter(c=>c.time === "A");
    cartoesB = s.cartoes.filter(c=>c.time === "B");
  }

  if(Array.isArray(s.jogadoresA)) jogadoresA = s.jogadoresA;
  if(Array.isArray(s.jogadoresB)) jogadoresB = s.jogadoresB;

  $("golsA").value = campo(s,["golsA"],golsA.length);
  $("golsB").value = campo(s,["golsB"],golsB.length);
  $("codigoVerificacao").innerText = campo(s,["codigoVerificacao","hash"],"---");
  $("linkPublicoTexto").innerText = campo(s,["linkPublico"],linkPublico());
  $("publicadaEm").innerText = campo(s,["publicadaEmTexto"],"Aguardando finalização");

  renderEscalacoes();
  montarSelects();
  renderEventos();
  atualizarResumo();
  gerarQr(campo(s,["linkPublico"],linkPublico()));
}

window.finalizarSumula = async function(){
  if(!jogoId || !jogo){ alert("Carregue o jogo primeiro."); return; }
  if(finalizada && !confirm("Súmula já finalizada. Deseja sobrescrever?")) return;

  const dados = montarDados();

  await setDoc(doc(db,"sumulas",jogoId),dados);
  await updateDoc(doc(db,"jogos",jogoId),{
    status:"finalizado",
    sumulaFinalizada:true,
    golsA:dados.golsA,
    golsB:dados.golsB,
    placar:dados.placar,
    linkSumula:dados.linkPublico,
    sumulaPublica:dados.linkPublico
  });

  $("statusOficial").innerText = "FINALIZADO";
  $("codigoVerificacao").innerText = dados.codigoVerificacao;
  $("linkPublicoTexto").innerText = dados.linkPublico;
  $("publicadaEm").innerText = dados.publicadaEmTexto;
  gerarQr(dados.linkPublico);

  finalizada = true;
  alert("Súmula finalizada e publicada.");
  location.href = dados.linkPublico;
};

window.baixarPDF = async function(){
  const canvas = await html2canvas($("paginaSumula"),{scale:2,useCORS:true,backgroundColor:"#fff"});
  const img = canvas.toDataURL("image/png");
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");
  const w = pdf.internal.pageSize.getWidth();
  const h = canvas.height * w / canvas.width;
  let pos = 0;
  pdf.addImage(img,"PNG",0,pos,w,h);
  let left = h - pdf.internal.pageSize.getHeight();
  while(left > 0){
    pos = left - h;
    pdf.addPage();
    pdf.addImage(img,"PNG",0,pos,w,h);
    left -= pdf.internal.pageSize.getHeight();
  }
  pdf.save(`sumula-${jogoId || "oficial"}.pdf`);
};

onAuthStateChanged(auth,user=>{
  usuarioAtual = user;
  const id = new URLSearchParams(location.search).get("id");
  if(id){
    $("inputJogoId").value = id;
    carregarJogo();
  }else{
    app.innerHTML = `<div class="error">Informe o ID do jogo.</div>`;
  }
});
</script>
