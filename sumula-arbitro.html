<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula do Árbitro - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#061427;
  --card:#0d2a52;
  --card2:#071d37;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --green:#1b5e20;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1180px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.90), rgba(2,8,20,.97)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
}

a{
  color:inherit;
  text-decoration:none;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

input,
select,
textarea{
  font-family:inherit;
  width:100%;
  padding:11px;
  border-radius:10px;
  border:none;
  background:#f5f7fb;
  color:#111;
  font-size:14px;
  margin-top:6px;
}

textarea{
  min-height:90px;
  resize:vertical;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.18), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.98), rgba(8,23,44,.98));
  border:1px solid rgba(247,198,0,.35);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h1{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
}

.hero-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:12px;
}

.hero-tag{
  background:rgba(26,63,115,.9);
  border:1px solid rgba(255,255,255,.08);
  border-radius:999px;
  padding:6px 10px;
  font-size:11px;
  font-weight:800;
}

.box{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.10), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:16px;
  padding:15px;
  margin-bottom:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.box h2,
.box h3{
  color:var(--gold);
  font-size:19px;
  font-weight:900;
  margin-bottom:10px;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.grid3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

.info-jogo{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:12px;
  align-items:center;
  text-align:center;
}

.time-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:14px;
}

.time-card img{
  width:70px;
  height:70px;
  object-fit:contain;
  border-radius:50%;
  background:#fff;
  border:2px solid var(--gold);
  margin:0 auto 8px;
}

.time-card strong{
  display:block;
  color:#fff;
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
}

.versus{
  color:var(--gold);
  font-size:32px;
  font-weight:900;
}

label{
  display:block;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
  margin-bottom:8px;
}

.tabela{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  overflow:hidden;
  border-radius:12px;
}

.tabela th,
.tabela td{
  border-bottom:1px solid rgba(255,255,255,.10);
  padding:8px;
  font-size:13px;
  text-align:left;
}

.tabela th{
  color:var(--gold);
  background:rgba(0,0,0,.18);
  text-transform:uppercase;
  font-size:11px;
}

.tabela td:first-child,
.tabela th:first-child{
  text-align:center;
  width:54px;
}

.btn{
  width:100%;
  padding:12px;
  border-radius:11px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:14px;
}

.btn-gold{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.btn-blue{
  background:var(--blue);
  color:#fff;
}

.btn-red{
  background:var(--red);
  color:#fff;
}

.btn-green{
  background:var(--green);
  color:#fff;
}

.lista-eventos{
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.evento-item{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  padding:9px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  font-size:13px;
}

.evento-item strong{
  color:#fff;
}

.evento-item span{
  color:var(--muted);
}

.evento-item button{
  background:var(--red);
  color:#fff;
  border-radius:8px;
  padding:6px 8px;
  font-weight:900;
}

.acesso{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.acesso-card{
  background:linear-gradient(180deg, rgba(16,42,82,.98), rgba(8,23,44,.98));
  border:1px solid rgba(247,198,0,.35);
  border-radius:18px;
  padding:24px;
  max-width:520px;
  box-shadow:var(--shadow);
}

.acesso-card h2{
  color:var(--gold);
  margin-bottom:10px;
}

.acesso-card p{
  color:var(--muted);
  line-height:1.5;
}

.finalizar-box{
  position:sticky;
  bottom:0;
  background:rgba(2,8,20,.95);
  border:1px solid rgba(247,198,0,.35);
  border-radius:16px;
  padding:12px;
  box-shadow:0 -10px 25px rgba(0,0,0,.35);
}

@media(max-width:800px){
  .grid2,
  .grid3,
  .info-jogo{
    grid-template-columns:1fr;
  }

  .versus{
    font-size:22px;
  }

  .hero h1{
    font-size:22px;
  }
}
</style>
</head>

<body>

<div id="app"></div>
<div class="wrap container" id="conteudo" style="display:none;">

  <div class="hero">
    <h1>Súmula da Partida</h1>
    <p>Preencha todos os dados corretamente. Após finalizar, a súmula será publicada automaticamente.</p>

    <div class="hero-tags">
      <div class="hero-tag" id="tagCampeonato">-</div>
      <div class="hero-tag" id="tagCategoria">-</div>
      <div class="hero-tag" id="tagRodada">-</div>
    </div>
  </div>

  <!-- JOGO -->
  <div class="box">
    <div class="info-jogo">

      <div class="time-card">
        <img id="logoA" src="logo-liga.jfif">
        <strong id="timeA">Time A</strong>
      </div>

      <div class="versus">X</div>

      <div class="time-card">
        <img id="logoB" src="logo-liga.jfif">
        <strong id="timeB">Time B</strong>
      </div>

    </div>
  </div>

  <!-- PLACAR -->
  <div class="box">
    <h2>Placar</h2>

    <div class="grid2">
      <div>
        <label>Gols Time A</label>
        <input id="golsA" type="number" value="0">
      </div>

      <div>
        <label>Gols Time B</label>
        <input id="golsB" type="number" value="0">
      </div>
    </div>
  </div>

  <!-- ESCALAÇÃO -->
  <div class="box">
    <h2>Escalação</h2>

    <div class="grid2">

      <div>
        <h3 id="tituloEscA">Time A</h3>
        <table class="tabela">
          <thead>
            <tr>
              <th>Nº</th>
              <th>Jogador</th>
              <th>Posição</th>
            </tr>
          </thead>
          <tbody id="escA"></tbody>
        </table>
      </div>

      <div>
        <h3 id="tituloEscB">Time B</h3>
        <table class="tabela">
          <thead>
            <tr>
              <th>Nº</th>
              <th>Jogador</th>
              <th>Posição</th>
            </tr>
          </thead>
          <tbody id="escB"></tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- GOLS -->
  <div class="box">
    <h2>Gols</h2>

    <div class="grid3">

      <div>
        <label>Time</label>
        <select id="golTime" onchange="trocarGol()"></select>
      </div>

      <div>
        <label>Jogador</label>
        <select id="golJogador"></select>
      </div>

      <div>
        <label>Minuto</label>
        <input id="golTempo" placeholder="Ex: 12">
      </div>

    </div>

    <button class="btn btn-blue" onclick="addGol()">
      <i class="fa-solid fa-plus"></i> Adicionar Gol
    </button>

    <div id="listaGols" class="lista-eventos"></div>
  </div>

  <!-- CARTÕES -->
  <div class="box">
    <h2>Cartões</h2>

    <div class="grid3">

      <div>
        <label>Time</label>
        <select id="cartTime" onchange="trocarCartao()"></select>
      </div>

      <div>
        <label>Jogador</label>
        <select id="cartJogador"></select>
      </div>

      <div>
        <label>Tipo</label>
        <select id="cartTipo">
          <option value="amarelo">Amarelo</option>
          <option value="vermelho">Vermelho</option>
        </select>
      </div>

    </div>

    <div style="margin-top:10px;">
      <label>Minuto</label>
      <input id="cartTempo" placeholder="Ex: 35">
    </div>

    <button class="btn btn-blue" onclick="addCartao()">
      <i class="fa-solid fa-plus"></i> Adicionar Cartão
    </button>

    <div id="listaCartoes" class="lista-eventos"></div>
  </div>

  <!-- MELHOR -->
  <div class="box">
    <h2>Melhor Jogador</h2>

    <div class="grid2">
      <input id="melhorNome" placeholder="Nome do jogador">
      <select id="melhorTime"></select>
    </div>
  </div>

  <!-- OBS -->
  <div class="box">
    <h2>Observações</h2>
    <textarea id="obs"></textarea>
  </div>

  <!-- FINALIZAR -->
  <div class="finalizar-box">
    <button class="btn btn-gold" onclick="finalizarSumula()">
      <i class="fa-solid fa-check"></i> FINALIZAR SÚMULA
    </button>
  </div>

</div>

<div id="acesso" class="acesso"></div>
<script type="module">
import { db, auth } from "./firebase.js";
import {
  doc,
  getDoc,
  setDoc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* ================= VARIÁVEIS ================= */

const id = new URLSearchParams(location.search).get("id");

let jogo = null;
let jogadoresA = [];
let jogadoresB = [];
let gols = [];
let cartoes = [];

/* ================= SEGURANÇA ================= */

onAuthStateChanged(auth, async(user)=>{

  if(!user){
    document.getElementById("acesso").innerHTML = `
      <div class="acesso-card">
        <h2>Login necessário</h2>
        <p>Faça login para acessar a súmula.</p>
      </div>
    `;
    return;
  }

  const snap = await getDoc(doc(db,"jogos",id));

  if(!snap.exists()){
    document.getElementById("acesso").innerHTML = `<div class="acesso-card">Jogo não encontrado</div>`;
    return;
  }

  jogo = snap.data();

  if(user.uid !== jogo.arbitroId){
    document.getElementById("acesso").innerHTML = `
      <div class="acesso-card">
        <h2>Acesso negado</h2>
        <p>Você não é o árbitro desta partida.</p>
      </div>
    `;
    return;
  }

  iniciarTela();
});

/* ================= INIT ================= */

function iniciarTela(){

  document.getElementById("conteudo").style.display = "block";
  document.getElementById("acesso").style.display = "none";

  jogadoresA = jogo.timeA?.jogadores || [];
  jogadoresB = jogo.timeB?.jogadores || [];

  document.getElementById("timeA").innerText = jogo.timeA?.nome || "Time A";
  document.getElementById("timeB").innerText = jogo.timeB?.nome || "Time B";

  document.getElementById("logoA").src = jogo.timeA?.logo || "logo-liga.jfif";
  document.getElementById("logoB").src = jogo.timeB?.logo || "logo-liga.jfif";

  document.getElementById("tituloEscA").innerText = jogo.timeA?.nome;
  document.getElementById("tituloEscB").innerText = jogo.timeB?.nome;

  document.getElementById("tagCampeonato").innerText = jogo.campeonato || "-";
  document.getElementById("tagCategoria").innerText = jogo.categoria || "-";
  document.getElementById("tagRodada").innerText = jogo.rodada || "-";

  renderEscalacao();
  montarSelects();
}

/* ================= ESCALAÇÃO ================= */

function renderEscalacao(){

  const escA = jogadoresA.map(j=>`
    <tr>
      <td>${j.numero || "-"}</td>
      <td>${j.nome}</td>
      <td>${j.posicao || "-"}</td>
    </tr>
  `).join("");

  const escB = jogadoresB.map(j=>`
    <tr>
      <td>${j.numero || "-"}</td>
      <td>${j.nome}</td>
      <td>${j.posicao || "-"}</td>
    </tr>
  `).join("");

  document.getElementById("escA").innerHTML = escA;
  document.getElementById("escB").innerHTML = escB;
}

/* ================= SELECTS ================= */

function montarSelects(){

  const selectA = jogadoresA.map(j=>`<option value="${j.nome}" data-num="${j.numero}">${j.numero} - ${j.nome}</option>`).join("");
  const selectB = jogadoresB.map(j=>`<option value="${j.nome}" data-num="${j.numero}">${j.numero} - ${j.nome}</option>`).join("");

  document.getElementById("golTime").innerHTML = `
    <option value="A">${jogo.timeA.nome}</option>
    <option value="B">${jogo.timeB.nome}</option>
  `;

  document.getElementById("cartTime").innerHTML = document.getElementById("golTime").innerHTML;

  document.getElementById("melhorTime").innerHTML = `
    <option value="${jogo.timeA.nome}">${jogo.timeA.nome}</option>
    <option value="${jogo.timeB.nome}">${jogo.timeB.nome}</option>
  `;

  document.getElementById("golJogador").innerHTML = selectA;
  document.getElementById("cartJogador").innerHTML = selectA;

  window.selectA = selectA;
  window.selectB = selectB;
}

window.trocarGol = function(){
  const t = document.getElementById("golTime").value;
  document.getElementById("golJogador").innerHTML = t === "A" ? selectA : selectB;
};

window.trocarCartao = function(){
  const t = document.getElementById("cartTime").value;
  document.getElementById("cartJogador").innerHTML = t === "A" ? selectA : selectB;
};

/* ================= GOLS ================= */

window.addGol = function(){

  const sel = document.getElementById("golJogador");
  const nome = sel.value;
  const numero = sel.selectedOptions[0].dataset.num;
  const tempo = document.getElementById("golTempo").value;
  const time = document.getElementById("golTime").value;

  gols.push({nome,numero,tempo,time,tipo:"gol"});

  renderGols();
};

function renderGols(){
  document.getElementById("listaGols").innerHTML = gols.map((g,i)=>`
    <div class="evento-item">
      ⚽ <strong>${g.numero}</strong> ${g.nome} (${g.tempo}')
      <button onclick="gols.splice(${i},1);renderGols()">X</button>
    </div>
  `).join("");
}

/* ================= CARTÕES ================= */

window.addCartao = function(){

  const sel = document.getElementById("cartJogador");
  const nome = sel.value;
  const numero = sel.selectedOptions[0].dataset.num;
  const tempo = document.getElementById("cartTempo").value;
  const time = document.getElementById("cartTime").value;
  const tipo = document.getElementById("cartTipo").value;

  cartoes.push({nome,numero,tempo,time,tipo});

  renderCartoes();
};

function renderCartoes(){
  document.getElementById("listaCartoes").innerHTML = cartoes.map((c,i)=>`
    <div class="evento-item">
      ${c.tipo === "amarelo" ? "🟨" : "🟥"}
      <strong>${c.numero}</strong> ${c.nome} (${c.tempo}')
      <button onclick="cartoes.splice(${i},1);renderCartoes()">X</button>
    </div>
  `).join("");
}

/* ================= FINALIZAR ================= */

window.finalizarSumula = async function(){

  const dados = {
    jogoId:id,

    campeonato:jogo.campeonato,
    categoria:jogo.categoria,
    rodada:jogo.rodada,
    fase:jogo.fase,

    timeA:jogo.timeA,
    timeB:jogo.timeB,

    golsA:Number(document.getElementById("golsA").value),
    golsB:Number(document.getElementById("golsB").value),

    titularesA:jogadoresA,
    titularesB:jogadoresB,

    gols:gols,
    cartoes:cartoes,

    arbitro:jogo.arbitro,
    arbitroId:jogo.arbitroId,
    assistente1:jogo.assistente1 || "",
    assistente2:jogo.assistente2 || "",

    melhorJogador:document.getElementById("melhorNome").value,
    melhorJogadorTime:document.getElementById("melhorTime").value,

    observacoes:document.getElementById("obs").value,

    sumulaFinalizada:true,
    publico:true,
    status:"finalizado",

    finalizadaEm:serverTimestamp()
  };

  await setDoc(doc(db,"sumulas",id),dados);

  await updateDoc(doc(db,"jogos",id),{
    status:"finalizado",
    sumulaFinalizada:true
  });

  alert("Súmula finalizada!");

  window.location.href = "sumula-publica.html?id=" + id;
};

</script>
</body>
</html>
