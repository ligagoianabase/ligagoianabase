/* ===== MODO EDIÇÃO ADM/ÁRBITRO ===== */
.edit-topbar{
  background:#061d44;
  border-bottom:4px solid var(--dourado);
  color:#fff;
  padding:10px 12px;
  position:sticky;
  top:0;
  z-index:99;
  box-shadow:0 6px 16px rgba(0,0,0,.28);
}
.edit-topbar-inner{
  width:min(100% - 20px,1120px);
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}
.edit-topbar h2{
  font-size:20px;
  text-transform:uppercase;
  font-weight:900;
}
.edit-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.edit-btn{
  min-height:40px;
  padding:9px 14px;
  border-radius:9px;
  font-weight:900;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
}
.edit-btn-gold{background:linear-gradient(135deg,var(--dourado),#ffe45c);color:#111}
.edit-btn-light{background:#fff4cf;color:#111}
.edit-btn-green{background:#069447;color:#fff}
.edit-btn-red{background:#dc2626;color:#fff}
.edit-status{
  width:min(100% - 20px,1120px);
  margin:8px auto 0;
  padding:9px 12px;
  border-radius:10px;
  font-size:13px;
  font-weight:900;
  display:none;
}
.edit-status.ok{display:block;background:#dcfce7;color:#14532d;border:1px solid #86efac}
.edit-status.erro{display:block;background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.edit-status.aviso{display:block;background:#fff7d6;color:#854d0e;border:1px solid #f7c600}
.edit-input,
.edit-select,
.edit-textarea{
  width:100%;
  border:1px solid rgba(6,29,68,.25);
  background:#fffef2;
  color:#071833;
  border-radius:6px;
  padding:5px 7px;
  font-family:Arial,Helvetica,sans-serif;
  font-weight:900;
}
.edit-input.center{text-align:center}
.edit-input.team-name-edit{
  color:var(--azul);
  font-size:28px;
  font-weight:900;
  text-transform:uppercase;
  text-align:center;
}
.score-inputs{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-size:68px;
  font-weight:900;
}
.score-inputs input{
  width:78px;
  background:transparent;
  border:2px solid rgba(247,198,0,.8);
  border-radius:10px;
  color:#fff;
  font-size:58px;
  font-weight:900;
  text-align:center;
}
.edit-table-input{
  width:100%;
  border:none;
  background:#fffef2;
  color:#111;
  font-size:12px;
  padding:4px;
  font-family:Arial,Helvetica,sans-serif;
}
.event-edit-list{
  display:grid;
  gap:6px;
}
.event-edit-item{
  display:grid;
  grid-template-columns:52px 1fr 42px;
  gap:5px;
  align-items:center;
  margin-bottom:6px;
}
.event-edit-item button{
  background:#dc2626;
  color:#fff;
  border-radius:6px;
  height:28px;
  font-weight:900;
}
.add-event-mini{
  margin-top:8px;
  display:grid;
  grid-template-columns:1fr 52px 34px;
  gap:5px;
}
.add-event-mini button{
  background:var(--dourado);
  color:#111;
  border-radius:7px;
  font-weight:900;
}
.comissao-edit-list{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
.comissao-edit-item{
  display:grid;
  grid-template-columns:1fr;
  gap:4px;
  padding:6px;
  border:1px solid #dbe3ef;
  border-radius:10px;
  background:#f8fafc;
}
.add-row-mini{
  display:grid;
  grid-template-columns:50px 1fr 80px 34px;
  gap:5px;
  margin-top:7px;
}
.add-row-mini button{
  background:var(--dourado);
  color:#111;
  border-radius:7px;
  font-weight:900;
}
.edit-textarea{
  min-height:80px;
  resize:vertical;
}
@media(max-width:900px){
  .edit-topbar{position:relative}
  .edit-topbar-inner{justify-content:center;text-align:center}
  .edit-actions{width:100%}
  .edit-btn{flex:1}
}
@media print{
  .edit-topbar,.edit-status,.edit-only{display:none!important}
}

</style>
</head>
<body>

<header class="edit-topbar">
  <div class="edit-topbar-inner">
    <button class="edit-btn edit-btn-light" type="button" onclick="history.length>1?history.back():location.href='sumula-admin.html'">
      <i class="fa-solid fa-arrow-left"></i> Voltar
    </button>

    <h2>Súmula Completa Editável</h2>

    <div class="edit-actions">
      <button class="edit-btn edit-btn-gold" type="button" onclick="salvarRascunho()">
        <i class="fa-solid fa-floppy-disk"></i> Salvar
      </button>
      <button class="edit-btn edit-btn-green" type="button" onclick="finalizarRepublicar()">
        <i class="fa-solid fa-check"></i> Salvar e Republicar
      </button>
      <button class="edit-btn edit-btn-light" type="button" onclick="abrirPublica()">
        <i class="fa-solid fa-eye"></i> Ver Pública
      </button>
    </div>
  </div>
  <div id="editStatus" class="edit-status"></div>
</header>

<div id="app"><div class="error"><i class="fa-solid fa-spinner fa-spin"></i><br>Carregando súmula editável...</div></div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app=document.getElementById("app");
const editStatus=document.getElementById("editStatus");
const params=new URLSearchParams(location.search);
const id=params.get("id");

let usuarioAtual=null;
let perfilAtual=null;
let sumula={};
let jogo={};
let estado={
  jogadoresA:[],
  jogadoresB:[],
  comissaoA:[],
  comissaoB:[],
  golsA:[],
  golsB:[],
  cartoesA:[],
  cartoesB:[]
};

function campo(obj,chaves,fallback=""){for(const chave of chaves){if(obj&&obj[chave]!==undefined&&obj[chave]!==null&&obj[chave]!=="")return obj[chave]}return fallback}
function texto(v,f="-"){return v===undefined||v===null||v===""?f:v}
function normalizar(v){return String(v||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
function nomeTime(v,fallback="TIME"){if(v&&typeof v==="object")return campo(v,["nome","nomeTime","time","equipe"],fallback);return texto(v,fallback)}
function escudoTime(v){if(v&&typeof v==="object")return campo(v,["escudo","logo","imagem","foto"],"logo-liga.jfif");return "logo-liga.jfif"}
function cidadeTime(v,fallback="-"){if(v&&typeof v==="object")return campo(v,["cidade","municipio","local"],fallback);return fallback}
function dataBR(v){if(!v)return "-";if(typeof v.toDate==="function")v=v.toDate();const d=new Date(v);if(!isNaN(d.getTime()))return d.toLocaleDateString("pt-BR");return String(v)}
function dataHoraBR(v){if(!v)return "-";if(typeof v.toDate==="function")v=v.toDate();const d=new Date(v);if(!isNaN(d.getTime()))return d.toLocaleDateString("pt-BR")+" às "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});return String(v)}
function placarA(){return Number(document.getElementById("golsAEdit")?.value ?? campo(sumula,["golsA","placarA","golsMandante"],0))}
function placarB(){return Number(document.getElementById("golsBEdit")?.value ?? campo(sumula,["golsB","placarB","golsVisitante"],0))}
function codigoSumula(s){return campo(s,["codigoVerificacao","hash","numeroSumula","codigoPartida","codigo"],String(id||"LG").slice(0,12).toUpperCase())}
function qrUrl(){return `https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=${encodeURIComponent(location.origin+location.pathname.replace("sumula-arbitro.html","sumula-publica.html")+"?id="+id)}`}
function ladoEvento(item){const time=normalizar(item.time||item.lado||item.equipe||"");return (time==="b"||time==="visitante"||time==="timeb"||time==="time b")?"B":"A"}
function separarEventosPorTime(lista){const a=[],b=[];(lista||[]).forEach(item=>{ladoEvento(item)==="B"?b.push(item):a.push(item)});return{a,b}}
function contarCartoes(lista){let amarelos=0,vermelhos=0;(lista||[]).forEach(c=>{if(normalizar(campo(c,["tipo","cartao","cor"],"amarelo")).includes("verm"))vermelhos++;else amarelos++});return{amarelos,vermelhos}}
function normalizarTecnico(t){return{nome:campo(t,["nome","nomeCompleto","tecnico","profissional"],""),funcao:campo(t,["funcao","cargo","tipo"],"Técnico"),cpf:campo(t,["cpf","CPF"],""),cref:campo(t,["cref","CREF","registro"],"")}}
function listaComissaoBase(s,time){const base=time==="A"?campo(s,["comissaoA","tecnicosA"],[]):campo(s,["comissaoB","tecnicosB"],[]);let lista=Array.isArray(base)?base.map(normalizarTecnico).filter(t=>t.nome):[];if(!lista.length){const nome=time==="A"?campo(s,["tecnicoA"],""):campo(s,["tecnicoB"],"");const obj=time==="A"?campo(s,["tecnicoAObj"],null):campo(s,["tecnicoBObj"],null);if(obj&&typeof obj==="object")lista.push(normalizarTecnico({...obj,funcao:campo(obj,["funcao"],"Técnico")}));else if(nome)lista.push({nome,funcao:"Técnico",cpf:"",cref:""})}return lista}
function mostrarStatus(msg,tipo="ok"){editStatus.className="edit-status "+tipo;editStatus.textContent=msg;editStatus.style.display="block";setTimeout(()=>editStatus.style.display="none",5000)}
async function carregarPerfil(){if(!usuarioAtual)return null;const refs=[doc(db,"usuarios",usuarioAtual.uid),doc(db,"users",usuarioAtual.uid),doc(db,"admins",usuarioAtual.uid),doc(db,"arbitros",usuarioAtual.uid)];for(const r of refs){try{const s=await getDoc(r);if(s.exists())return{id:s.id,...s.data()}}catch(e){}}return{id:usuarioAtual.uid,email:usuarioAtual.email||"",nome:usuarioAtual.displayName||""}}
function ehAdmin(){const tipo=normalizar(campo(perfilAtual,["tipo","tipoUsuario","perfil","cargo","role"],""));const nivel=normalizar(campo(perfilAtual,["nivel","permissao"],""));return tipo.includes("admin")||nivel.includes("admin")||perfilAtual?.admin===true||perfilAtual?.autorizado===true}
function ehArbitroDoJogo(){if(!usuarioAtual)return false;const uid=String(usuarioAtual.uid||"");const email=normalizar(usuarioAtual.email||perfilAtual?.email||"");const ids=[campo(jogo,["arbitroId","arbitroUid","arbitroUsuarioId"],""),campo(sumula,["arbitroId","arbitroUid","arbitroUsuarioId"],"")].map(String);const emails=[campo(jogo,["arbitroEmail"],""),campo(sumula,["arbitroEmail"],"")].map(normalizar);return ids.includes(uid)||(email&&emails.includes(email))}

function ajustarEscalaSumula(){const scaleBox=document.querySelector(".sumula-scale"),viewport=document.querySelector(".sumula-viewport"),page=document.querySelector(".sumula-page");if(!scaleBox||!viewport||!page)return;if(window.innerWidth<=900){const escala=window.innerWidth/1120;scaleBox.style.setProperty("--escala-mobile",escala);viewport.style.height=(page.offsetHeight*escala+16)+"px"}else{scaleBox.style.removeProperty("--escala-mobile");viewport.style.height="auto"}}

function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}

function renderJogadoresEdit(lista,time){if(!Array.isArray(lista)||!lista.length)return `<tr><td colspan="4" class="line-empty">Nenhum jogador informado.</td></tr>`;const titulares=lista.filter(j=>normalizar(j.tipo||"")!=="suplente");const suplentes=lista.filter(j=>normalizar(j.tipo||"")==="suplente");const row=(j,i)=>`<tr><td class="num"><input class="edit-table-input center" value="${esc(campo(j,["numero","camisa","n"],""))}" onchange="editarJogador('${time}',${i},'numero',this.value)"></td><td><input class="edit-table-input" value="${esc(campo(j,["nome","jogador","jogadorNome","atleta"],""))}" onchange="editarJogador('${time}',${i},'nome',this.value)"></td><td class="posicao"><input class="edit-table-input" value="${esc(campo(j,["posicao","posição","funcao"],""))}" onchange="editarJogador('${time}',${i},'posicao',this.value)"></td><td class="edit-only"><button class="edit-btn edit-btn-red" style="min-height:28px;padding:4px 7px" onclick="removerJogador('${time}',${i})">X</button></td></tr>`;const renderParte=(arr)=>arr.map(j=>row(j,lista.indexOf(j))).join("");return `${renderParte(titulares)}<tr class="sub-row"><td colspan="4">Suplentes</td></tr>${suplentes.length?renderParte(suplentes):`<tr><td colspan="4" class="line-empty">Nenhum suplente informado.</td></tr>`}`}

function renderComissaoEdit(lista,time){if(!lista.length)return `<div class="comissao-vazio">Nenhum técnico informado.</div>`;return lista.map((t,i)=>`<div class="comissao-edit-item"><input class="edit-input" value="${esc(t.funcao||"Técnico")}" onchange="editarComissao('${time}',${i},'funcao',this.value)"><input class="edit-input" value="${esc(t.nome||"")}" onchange="editarComissao('${time}',${i},'nome',this.value)"><input class="edit-input" placeholder="CPF" value="${esc(t.cpf||"")}" onchange="editarComissao('${time}',${i},'cpf',this.value)"><button class="edit-btn edit-btn-red" style="min-height:30px;padding:4px" onclick="removerComissao('${time}',${i})">Remover</button></div>`).join("")}

function renderEventoEdit(lista,tipo,time){if(!lista.length)return `<div class="line-empty">Nenhum ${tipo==="gol"?"gol":"cartão"}.</div>`;return `<div class="event-edit-list">`+lista.map((e,i)=>`<div class="event-edit-item"><input class="edit-input center" value="${esc(campo(e,["minuto","tempo"],""))}" onchange="editarEvento('${tipo}','${time}',${i},'minuto',this.value)"><input class="edit-input" value="${esc(campo(e,["nome","jogador","jogadorNome","atleta"],""))}" onchange="editarEvento('${tipo}','${time}',${i},'nome',this.value)"><button onclick="removerEvento('${tipo}','${time}',${i})">X</button></div>`).join("")+`</div>`}

function addMiniEventoHtml(tipo,time){return `<div class="add-event-mini edit-only"><input id="add_${tipo}_${time}_nome" class="edit-input" placeholder="Nome"><input id="add_${tipo}_${time}_min" class="edit-input center" placeholder="Min"><button onclick="adicionarEvento('${tipo}','${time}')">+</button></div>`}
function addMiniJogadorHtml(time){return `<div class="add-row-mini edit-only"><input id="add_j_${time}_num" class="edit-input center" placeholder="Nº"><input id="add_j_${time}_nome" class="edit-input" placeholder="Jogador"><input id="add_j_${time}_pos" class="edit-input" placeholder="Posição"><button onclick="adicionarJogador('${time}')">+</button></div>`}
function addMiniComissaoHtml(time){return `<div class="add-row-mini edit-only"><input id="add_c_${time}_funcao" class="edit-input" placeholder="Função"><input id="add_c_${time}_nome" class="edit-input" placeholder="Nome"><input id="add_c_${time}_cpf" class="edit-input" placeholder="CPF"><button onclick="adicionarComissao('${time}')">+</button></div>`}

window.editarJogador=function(time,i,campoNome,valor){const lista=time==="A"?estado.jogadoresA:estado.jogadoresB;if(!lista[i])return;lista[i][campoNome]=valor;lista[i].jogador=lista[i].nome;renderizar()}
window.removerJogador=function(time,i){const lista=time==="A"?estado.jogadoresA:estado.jogadoresB;lista.splice(i,1);renderizar()}
window.adicionarJogador=function(time){const num=document.getElementById(`add_j_${time}_num`).value;const nome=document.getElementById(`add_j_${time}_nome`).value;const pos=document.getElementById(`add_j_${time}_pos`).value;if(!nome)return;const item={numero:num,nome,jogador:nome,posicao:pos,tipo:"titular",manual:true,time,lado:time};(time==="A"?estado.jogadoresA:estado.jogadoresB).push(item);renderizar()}

window.editarComissao=function(time,i,campoNome,valor){const lista=time==="A"?estado.comissaoA:estado.comissaoB;if(!lista[i])return;lista[i][campoNome]=valor;renderizar()}
window.removerComissao=function(time,i){const lista=time==="A"?estado.comissaoA:estado.comissaoB;lista.splice(i,1);renderizar()}
window.adicionarComissao=function(time){const funcao=document.getElementById(`add_c_${time}_funcao`).value||"Técnico";const nome=document.getElementById(`add_c_${time}_nome`).value;const cpf=document.getElementById(`add_c_${time}_cpf`).value;if(!nome)return;(time==="A"?estado.comissaoA:estado.comissaoB).push({funcao,nome,cpf,cref:""});renderizar()}

window.editarEvento=function(tipo,time,i,campoNome,valor){const lista=tipo==="gol"?(time==="A"?estado.golsA:estado.golsB):(time==="A"?estado.cartoesA:estado.cartoesB);if(!lista[i])return;lista[i][campoNome]=valor;if(campoNome==="nome")lista[i].jogador=valor;if(campoNome==="minuto")lista[i].tempo=valor;renderizar()}
window.removerEvento=function(tipo,time,i){const lista=tipo==="gol"?(time==="A"?estado.golsA:estado.golsB):(time==="A"?estado.cartoesA:estado.cartoesB);lista.splice(i,1);renderizar()}
window.adicionarEvento=function(tipo,time){const nome=document.getElementById(`add_${tipo}_${time}_nome`).value;const minuto=document.getElementById(`add_${tipo}_${time}_min`).value;if(!nome)return;const item={time,lado:time,timeNome:time==="A"?nomeAAtual():nomeBAtual(),nome,jogador:nome,minuto,tempo:minuto,tipo:tipo==="gol"?"normal":"amarelo",evento:tipo};(tipo==="gol"?(time==="A"?estado.golsA:estado.golsB):(time==="A"?estado.cartoesA:estado.cartoesB)).push(item);renderizar()}

function nomeAAtual(){return document.getElementById("timeANomeEdit")?.value||nomeTime(sumula.timeA,campo(sumula,["timeANome"],"TIME A"))}
function nomeBAtual(){return document.getElementById("timeBNomeEdit")?.value||nomeTime(sumula.timeB,campo(sumula,["timeBNome"],"TIME B"))}

function renderizar(){
  const timeAObj=sumula.timeA||jogo.timeA||{},timeBObj=sumula.timeB||jogo.timeB||{};
  const nomeA=nomeAAtual(),nomeB=nomeBAtual();
  const logoA=campo(sumula,["logoA","escudoTimeA"],escudoTime(timeAObj));
  const logoB=campo(sumula,["logoB","escudoTimeB"],escudoTime(timeBObj));
  const logoCampeonato=campo(sumula,["logoCampeonato","campeonatoLogo","logoCompeticao","escudoCampeonato"],"logo-liga.jfif");
  const cidadeA=campo(sumula,["cidadeA"],cidadeTime(timeAObj,"Goiânia - GO"));
  const cidadeB=campo(sumula,["cidadeB"],cidadeTime(timeBObj,"Goiânia - GO"));
  const totalCartoes=contarCartoes([...estado.cartoesA,...estado.cartoesB]);
  const codigo=codigoSumula(sumula);
  const data=dataBR(campo(sumula,["data","dataJogo","dataHora","criadoEm"],""));
  const fotoMelhor=campo(sumula,["fotoMelhorJogador","fotoMelhor"],"logo-liga.jfif");

  app.innerHTML=`<div class="sumula-viewport"><div class="sumula-scale"><div class="sumula-page">
<header class="header">
  <div class="header-logo"><img src="logo-liga.jfif" alt="Liga Goiana"></div>
  <div class="header-title"><h1>SÚMULA OFICIAL</h1><p>Liga Goiana de Futebol de Base</p><span>Onde o talento encontra o futuro</span></div>
  <div class="header-campeonato-logo"><img src="${logoCampeonato}" onerror="this.src='logo-liga.jfif'" alt="Logo do Campeonato"></div>
  <div class="header-right"><div class="liga-nome"><input id="campeonatoEdit" class="edit-input" value="${esc(campo(sumula,["campeonato","campeonatoNome"],"CAMPEONATO LIGA GOIANA"))}"></div><div class="liga-slogan"><input id="categoriaEdit" class="edit-input" value="${esc(campo(sumula,["categoria"],""))}"></div></div>
</header>

<section class="info-strip">
  <div class="info-box"><i class="fa-regular fa-file-lines"></i><div><small>Súmula Nº</small><input id="numeroSumulaEdit" class="edit-input center" value="${esc(campo(sumula,["numeroSumula"],codigo))}"></div></div>
  <div class="info-box"><i class="fa-solid fa-barcode"></i><div><small>Código da partida</small><strong>${campo(sumula,["codigoPartida","codigo"],id)}</strong></div></div>
  <div class="info-box"><i class="fa-solid fa-trophy"></i><div><small>Fase</small><input id="faseEdit" class="edit-input center" value="${esc(campo(sumula,["fase"],"1ª Fase"))}"></div></div>
  <div class="info-box"><i class="fa-solid fa-list-ol"></i><div><small>Rodada</small><input id="rodadaEdit" class="edit-input center" value="${esc(campo(sumula,["rodada"],"-"))}"></div></div>
  <div class="info-box"><div><small>Status</small><strong class="status-finalizado"><i class="fa-solid fa-check"></i> FINALIZADO</strong></div></div>
</section>

<section class="score-card">
  <div class="team-score"><img src="${logoA}" onerror="this.src='logo-liga.jfif'" alt="${nomeA}"><div class="team-name"><input id="timeANomeEdit" class="edit-input team-name-edit" value="${esc(nomeA)}"><p>${cidadeA}</p></div></div>
  <div class="score-center"><div class="score-inputs"><input id="golsAEdit" value="${placarA()}" type="number" min="0"><span>x</span><input id="golsBEdit" value="${placarB()}" type="number" min="0"></div><span>Placar Final</span></div>
  <div class="team-score away"><img src="${logoB}" onerror="this.src='logo-liga.jfif'" alt="${nomeB}"><div class="team-name"><input id="timeBNomeEdit" class="edit-input team-name-edit" value="${esc(nomeB)}"><p>${cidadeB}</p></div></div>
</section>

<section class="match-strip">
  <div class="match-box"><i class="fa-regular fa-calendar-days"></i><div><small>Data</small><input id="dataEdit" class="edit-input center" value="${esc(data)}"></div></div>
  <div class="match-box"><i class="fa-regular fa-clock"></i><div><small>Horário</small><input id="horaEdit" class="edit-input center" value="${esc(campo(sumula,["hora","horario"],"-"))}"></div></div>
  <div class="match-box"><i class="fa-solid fa-diamond"></i><div><small>Campo</small><input id="localEdit" class="edit-input" value="${esc(campo(sumula,["local","campo","estadio"],"-"))}"></div></div>
  <div class="match-box"><i class="fa-solid fa-whistle"></i><div><small>Árbitro</small><input id="arbitroEdit" class="edit-input" value="${esc(campo(sumula,["arbitro","arbitroNome"],"-"))}"></div></div>
</section>

<section class="lineups"><div class="section-title">Escalações</div><div class="lineups-grid">
  <div class="lineup-card"><div class="lineup-head">${nomeA}<img src="${logoA}" onerror="this.src='logo-liga.jfif'"></div><table class="table"><thead><tr><th class="num">Nº</th><th>Jogador</th><th class="posicao">Posição</th><th class="edit-only">Ação</th></tr></thead><tbody>${renderJogadoresEdit(estado.jogadoresA,"A")}</tbody></table>${addMiniJogadorHtml("A")}</div>
  <div class="lineup-card away"><div class="lineup-head">${nomeB}<img src="${logoB}" onerror="this.src='logo-liga.jfif'"></div><table class="table"><thead><tr><th class="num">Nº</th><th>Jogador</th><th class="posicao">Posição</th><th class="edit-only">Ação</th></tr></thead><tbody>${renderJogadoresEdit(estado.jogadoresB,"B")}</tbody></table>${addMiniJogadorHtml("B")}</div>
</div><div class="legend">(G) Goleiro &nbsp;&nbsp;&nbsp; (C) Capitão</div></section>

<section class="comissao"><div class="section-title">Comissão Técnica</div><div class="comissao-grid">
  <div class="comissao-card"><div class="comissao-head">${nomeA}<img src="${logoA}" onerror="this.src='logo-liga.jfif'"></div><div class="comissao-edit-list">${renderComissaoEdit(estado.comissaoA,"A")}</div>${addMiniComissaoHtml("A")}</div>
  <div class="comissao-card"><div class="comissao-head">${nomeB}<img src="${logoB}" onerror="this.src='logo-liga.jfif'"></div><div class="comissao-edit-list">${renderComissaoEdit(estado.comissaoB,"B")}</div>${addMiniComissaoHtml("B")}</div>
</div></section>

<section class="events-grid">
  <div class="team-events"><h3>${nomeA}</h3><div class="events-columns"><div class="event-col"><h4>Gols</h4>${renderEventoEdit(estado.golsA,"gol","A")}${addMiniEventoHtml("gol","A")}</div><div class="event-col"><h4>Cartões</h4>${renderEventoEdit(estado.cartoesA,"cartao","A")}${addMiniEventoHtml("cartao","A")}</div></div></div>
  <div class="team-events away"><h3>${nomeB}</h3><div class="events-columns"><div class="event-col"><h4>Gols</h4>${renderEventoEdit(estado.golsB,"gol","B")}${addMiniEventoHtml("gol","B")}</div><div class="event-col"><h4>Cartões</h4>${renderEventoEdit(estado.cartoesB,"cartao","B")}${addMiniEventoHtml("cartao","B")}</div></div></div>
</section>

<section class="lower-grid">
  <div class="panel"><h3>Arbitragem</h3>
    <div class="official-row"><div class="official-label"><i class="fa-solid fa-user-tie"></i> Árbitro</div><div class="official-value"><input id="arbitro2Edit" class="edit-input" value="${esc(campo(sumula,["arbitro","arbitroNome"],"-"))}"></div></div>
    <div class="official-row"><div class="official-label"><i class="fa-solid fa-flag"></i> Assistente 1</div><div class="official-value"><input id="assistente1Edit" class="edit-input" value="${esc(campo(sumula,["assistente1"],"-"))}"></div></div>
    <div class="official-row"><div class="official-label"><i class="fa-solid fa-flag"></i> Assistente 2</div><div class="official-value"><input id="assistente2Edit" class="edit-input" value="${esc(campo(sumula,["assistente2"],"-"))}"></div></div>
    <div class="official-row"><div class="official-label"><i class="fa-solid fa-user-shield"></i> 4º Árbitro</div><div class="official-value"><input id="quartoEdit" class="edit-input" value="${esc(campo(sumula,["quartoArbitro","quarto_arbitro"],"-"))}"></div></div>
    <div class="official-row"><div class="official-label"><i class="fa-solid fa-location-dot"></i> Observador</div><div class="official-value"><input id="observadorEdit" class="edit-input" value="${esc(campo(sumula,["observador"],"-"))}"></div></div>
  </div>
  <div class="panel"><h3>Resumo da Partida</h3><div class="summary-grid">
    <div class="summary-box"><i class="fa-solid fa-futbol"></i><span>Gols</span><strong>${estado.golsA.length+estado.golsB.length||placarA()+placarB()}</strong><div class="summary-detail">(${placarA()} x ${placarB()})</div></div>
    <div class="summary-box"><div class="summary-card-icon yellow-card"></div><span>Cartões Amarelos</span><strong>${totalCartoes.amarelos}</strong></div>
    <div class="summary-box"><div class="summary-card-icon red-card"></div><span>Cartões Vermelhos</span><strong>${totalCartoes.vermelhos}</strong></div>
  </div><div class="best-player"><img class="best-photo" src="${fotoMelhor}" onerror="this.src='logo-liga.jfif'"><div><h4>Melhor jogador da partida</h4><input id="melhorEdit" class="edit-input" value="${esc(campo(sumula,["melhorJogador"],"-"))}"><input id="melhorTimeEdit" class="edit-input" value="${esc(campo(sumula,["melhorJogadorTime"],nomeA))}"><input id="melhorDestaqueEdit" class="edit-input" value="${esc(campo(sumula,["melhorJogadorDestaque","melhorDestaque"],"Destaque da partida"))}"></div><div class="trophy">🏆</div></div></div>
</section>

<section class="footer-grid">
  <div class="panel"><h3>Autenticação</h3><div class="auth-box"><img src="${qrUrl()}" alt="QR Code"><div class="auth-text"><strong>Súmula publicada em</strong><p>${campo(sumula,["publicadaEmTexto"],dataHoraBR(campo(sumula,["publicadaEm","finalizadaEm","criadoEm"],"")))}</p><p>Código de verificação</p><div class="auth-code">${codigo}</div><p>Escaneie o QR Code para verificar a autenticidade desta súmula.</p></div></div></div>
  <div class="panel share-panel"><h3>Observações / Salvar</h3><div style="padding:12px"><textarea id="observacoesEdit" class="edit-textarea" placeholder="Observações oficiais">${esc(campo(sumula,["observacoes","observacoesArbitro"],""))}</textarea><div class="buttons" style="padding:12px 0 0"><button class="btn btn-whats" onclick="salvarRascunho()"><i class="fa-solid fa-floppy-disk"></i> Salvar</button><button class="btn btn-email" onclick="finalizarRepublicar()"><i class="fa-solid fa-check"></i> Republicar</button><button class="btn btn-link" onclick="abrirPublica()"><i class="fa-solid fa-eye"></i> Pública</button><button class="btn btn-pdf" onclick="baixarPDF()"><i class="fa-solid fa-file-pdf"></i> PDF</button></div></div></div>

</div></div></div>`;
  setTimeout(ajustarEscalaSumula,100);
  window.addEventListener("resize",ajustarEscalaSumula);
}

function coletarDados(finalizar=false){
  const nomeA=document.getElementById("timeANomeEdit").value;
  const nomeB=document.getElementById("timeBNomeEdit").value;
  const gols=[...estado.golsA.map(g=>({...g,time:"A",lado:"A",timeNome:nomeA})),...estado.golsB.map(g=>({...g,time:"B",lado:"B",timeNome:nomeB}))];
  const cartoes=[...estado.cartoesA.map(c=>({...c,time:"A",lado:"A",timeNome:nomeA})),...estado.cartoesB.map(c=>({...c,time:"B",lado:"B",timeNome:nomeB}))];

  return {
    campeonato:document.getElementById("campeonatoEdit").value,
    campeonatoNome:document.getElementById("campeonatoEdit").value,
    categoria:document.getElementById("categoriaEdit").value,
    numeroSumula:document.getElementById("numeroSumulaEdit").value,
    fase:document.getElementById("faseEdit").value,
    rodada:document.getElementById("rodadaEdit").value,
    data:document.getElementById("dataEdit").value,
    dataJogo:document.getElementById("dataEdit").value,
    hora:document.getElementById("horaEdit").value,
    horario:document.getElementById("horaEdit").value,
    local:document.getElementById("localEdit").value,
    campo:document.getElementById("localEdit").value,
    timeA:{...(sumula.timeA||jogo.timeA||{}),nome:nomeA,nomeTime:nomeA},
    timeB:{...(sumula.timeB||jogo.timeB||{}),nome:nomeB,nomeTime:nomeB},
    timeANome:nomeA,
    timeBNome:nomeB,
    golsA:Number(document.getElementById("golsAEdit").value||0),
    golsB:Number(document.getElementById("golsBEdit").value||0),
    placarA:Number(document.getElementById("golsAEdit").value||0),
    placarB:Number(document.getElementById("golsBEdit").value||0),
    placar:`${document.getElementById("golsAEdit").value||0} x ${document.getElementById("golsBEdit").value||0}`,
    jogadoresA:estado.jogadoresA,
    jogadoresB:estado.jogadoresB,
    escalacaoA:estado.jogadoresA,
    escalacaoB:estado.jogadoresB,
    jogadores:[...estado.jogadoresA,...estado.jogadoresB],
    comissaoA:estado.comissaoA,
    comissaoB:estado.comissaoB,
    tecnicosA:estado.comissaoA,
    tecnicosB:estado.comissaoB,
    gols,
    cartoes,
    golsLista:gols,
    cartoesLista:cartoes,
    arbitro:document.getElementById("arbitroEdit").value,
    arbitroNome:document.getElementById("arbitroEdit").value,
    assistente1:document.getElementById("assistente1Edit").value,
    assistente2:document.getElementById("assistente2Edit").value,
    quartoArbitro:document.getElementById("quartoEdit").value,
    observador:document.getElementById("observadorEdit").value,
    melhorJogador:document.getElementById("melhorEdit").value,
    melhorJogadorTime:document.getElementById("melhorTimeEdit").value,
    melhorJogadorDestaque:document.getElementById("melhorDestaqueEdit").value,
    observacoes:document.getElementById("observacoesEdit").value,
    observacoesArbitro:document.getElementById("observacoesEdit").value,
    status:"finalizado",
    sumulaStatus:"finalizada",
    sumulaFinalizada:true,
    publica:true,
    publico:true,
    publicada:true,
    corrigidaPeloAdm:params.get("adm")==="1"||ehAdmin(),
    atualizadoEm:serverTimestamp(),
    ...(finalizar?{finalizadaEm:serverTimestamp(),publicadaEm:serverTimestamp(),publicadaEmTexto:new Date().toLocaleString("pt-BR")}:{})
  };
}

window.salvarRascunho=async function(){
  if(!id)return;
  try{
    const dados=coletarDados(false);
    await setDoc(doc(db,"sumulas",id),dados,{merge:true});
    await setDoc(doc(db,"jogos",id),{golsA:dados.golsA,golsB:dados.golsB,placarA:dados.placarA,placarB:dados.placarB,placarTexto:dados.placar,gols:dados.gols,cartoes:dados.cartoes,sumulaFinalizada:true,verSumula:true,status:"finalizado",atualizadoEm:serverTimestamp()},{merge:true});
    sumula={...sumula,...dados};
    mostrarStatus("Súmula salva.","ok");
  }catch(e){console.error(e);mostrarStatus("Erro ao salvar súmula.","erro")}
}

window.finalizarRepublicar=async function(){
  if(!confirm("Salvar e republicar a súmula?"))return;
  try{
    const dados=coletarDados(true);
    await setDoc(doc(db,"sumulas",id),dados,{merge:true});
    await setDoc(doc(db,"jogos",id),{golsA:dados.golsA,golsB:dados.golsB,placarA:dados.placarA,placarB:dados.placarB,placarTexto:dados.placar,gols:dados.gols,cartoes:dados.cartoes,sumulaFinalizada:true,verSumula:true,status:"finalizado",atualizadoEm:serverTimestamp()},{merge:true});
    sumula={...sumula,...dados};
    mostrarStatus("Súmula republicada.","ok");
    renderizar();
  }catch(e){console.error(e);mostrarStatus("Erro ao republicar súmula.","erro")}
}

window.abrirPublica=function(){window.open(`sumula-publica.html?id=${encodeURIComponent(id)}`,"_blank")}
window.copiarLink=async()=>{await navigator.clipboard.writeText(window.location.href);alert("Link copiado.")}
window.compartilharWhatsApp=()=>window.open(`https://wa.me/?text=${encodeURIComponent("Súmula oficial: "+window.location.href)}`,"_blank")
window.enviarEmail=()=>{location.href=`mailto:?subject=Súmula Oficial&body=${encodeURIComponent(window.location.href)}`}
window.baixarPDF=()=>{ajustarEscalaSumula();setTimeout(()=>window.print(),300)}

async function carregar(){
  if(!id){app.innerHTML=`<div class="error">Súmula não informada.</div>`;return}
  try{
    let snap=await getDoc(doc(db,"sumulas",id));
    let jogoSnap=await getDoc(doc(db,"jogos",id));

    jogo=jogoSnap.exists()?{id:jogoSnap.id,...jogoSnap.data()}:{};

    if(snap.exists())sumula={id:snap.id,...snap.data()};
    else if(jogoSnap.exists())sumula={id:jogoSnap.id,jogoId:jogoSnap.id,...jogoSnap.data(),sumulaFinalizada:true,publica:true,publico:true,status:"finalizado"};
    else{app.innerHTML=`<div class="error">Súmula não encontrada.</div>`;return}

    const eventosGols=separarEventosPorTime(Array.isArray(sumula.gols)?sumula.gols:[]);
    const eventosCartoes=separarEventosPorTime(Array.isArray(sumula.cartoes)?sumula.cartoes:[]);
    estado.jogadoresA=campo(sumula,["jogadoresA","escalacaoA","elencoA"],[]);
    estado.jogadoresB=campo(sumula,["jogadoresB","escalacaoB","elencoB"],[]);
    estado.comissaoA=listaComissaoBase(sumula,"A");
    estado.comissaoB=listaComissaoBase(sumula,"B");
    estado.golsA=eventosGols.a;
    estado.golsB=eventosGols.b;
    estado.cartoesA=eventosCartoes.a;
    estado.cartoesB=eventosCartoes.b;

    renderizar();
  }catch(error){console.error(error);app.innerHTML=`<div class="error">Erro ao carregar súmula editável.</div>`}
}

onAuthStateChanged(auth,async user=>{
  usuarioAtual=user;
  if(!user){app.innerHTML=`<div class="error">Faça login para editar a súmula.</div>`;return}
  perfilAtual=await carregarPerfil();
  if(!(ehAdmin()||ehArbitroDoJogo())){mostrarStatus("Acesso permitido apenas para ADM ou árbitro vinculado.","erro")}
  await carregar();
});
</script>
