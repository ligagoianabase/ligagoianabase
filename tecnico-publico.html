<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Técnico Público - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --gold:#f7c600;
  --gold2:#ffe45c;
  --muted:#cbd6ea;
  --gold-line:rgba(247,198,0,.45);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
  min-height:100vh;
}

.wrap{
  width:min(100% - 24px,1280px);
  margin:auto;
  padding:22px 0 40px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.18), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.97), rgba(8,23,44,.98));
  border:1px solid var(--gold-line);
  border-radius:22px;
  padding:22px;
  display:grid;
  grid-template-columns:170px 1fr;
  gap:20px;
  align-items:center;
  margin-bottom:16px;
}

.foto{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid var(--gold);
  background:#fff;
}

.hero h1{
  color:var(--gold);
  font-size:36px;
  margin-bottom:8px;
}

.hero p{
  color:var(--muted);
  line-height:1.6;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:12px;
}

.tag{
  background:#1a3f73;
  padding:7px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.stats{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
  margin-bottom:16px;
}

.stat{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.12), transparent 35%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:16px;
  padding:15px;
  text-align:center;
}

.stat strong{
  display:block;
  color:var(--gold);
  font-size:28px;
}

.stat span{
  color:var(--muted);
  font-size:11px;
  font-weight:900;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.panel{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.10), transparent 35%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:18px;
  overflow:hidden;
}

.panel h2{
  color:var(--gold);
  padding:16px;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:20px;
}

.panel-body{
  padding:14px;
}

.item{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.item:last-child{border-bottom:none}

.item span{
  color:var(--muted);
}

.item strong{
  color:#fff;
}

.jogo{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}

.jogo strong{
  display:block;
  margin-bottom:6px;
}

.jogo p{
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}

.loading{
  max-width:700px;
  margin:80px auto;
  background:rgba(16,42,82,.96);
  border:1px solid var(--gold-line);
  color:var(--gold);
  padding:24px;
  border-radius:18px;
  text-align:center;
  font-weight:900;
}

@media(max-width:1000px){
  .stats{
    grid-template-columns:repeat(3,1fr);
  }

  .grid{
    grid-template-columns:1fr;
  }
}

@media(max-width:700px){
  .hero{
    grid-template-columns:1fr;
    text-align:center;
  }

  .foto{
    margin:auto;
  }

  .stats{
    grid-template-columns:1fr 1fr;
  }

  .hero h1{
    font-size:28px;
  }

  .tags{
    justify-content:center;
  }
}

@media(max-width:500px){
  .stats{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="wrap" id="app">
  <div class="loading">
    <i class="fa-solid fa-spinner fa-spin"></i><br>
    Carregando perfil do técnico...
  </div>
</div>

<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";

import {
  collection,
  getDocs,
  getDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("tecnicos");

const app = document.getElementById("app");
const id = new URLSearchParams(location.search).get("id");

let tecnico = null;
let jogos = [];

function val(obj,chaves,f=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== ""){
      return obj[c];
    }
  }
  return f;
}

function n(t){
  return String(t || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();
}

function nomeTecnico(t){
  return val(t,["nome","tecnicoNome","nomeTecnico"],"Técnico");
}

function fotoTecnico(t){
  return val(t,["foto","imagem","avatar","fotoUrl"],"logo-liga.jfif");
}

function timeTecnico(t){
  return val(t,["time","timeNome","equipe"],"-");
}

function categorias(t){
  const cats = val(t,["categorias"],[]);
  if(Array.isArray(cats) && cats.length) return cats;
  const cat = val(t,["categoria","categoriaNome"],"");
  return cat ? [cat] : [];
}

function jogoDoTecnico(j){
  const tecnicoNome = nomeTecnico(tecnico);

  const nomes = [
    val(j,["tecnicoA"],""),
    val(j,["tecnicoB"],""),
    val(j,["tecnicoNome"],"")
  ];

  return nomes.some(x=>n(x) === n(tecnicoNome));
}

function finalizado(j){
  return j.finalizado === true ||
    j.encerrado === true ||
    n(val(j,["status"],"")) === "finalizado";
}

function calcular(){
  let v = 0;
  let e = 0;
  let d = 0;
  let gp = 0;
  let gc = 0;

  const recentes = [];

  jogos.forEach(j=>{

    if(!jogoDoTecnico(j)) return;

    recentes.push(j);

    const golsA = Number(j.golsA || j.placarA || 0);
    const golsB = Number(j.golsB || j.placarB || 0);

    const tecnicoA = n(val(j,["tecnicoA"],""));
    const meuNome = n(nomeTecnico(tecnico));

    const souA = tecnicoA === meuNome;

    const meus = souA ? golsA : golsB;
    const sofridos = souA ? golsB : golsA;

    gp += meus;
    gc += sofridos;

    if(finalizado(j)){
      if(meus > sofridos) v++;
      else if(meus < sofridos) d++;
      else e++;
    }
  });

  const jogosTotal = v + e + d;
  const pontos = (v * 3) + e;

  const aproveitamento = jogosTotal
    ? Math.round((pontos / (jogosTotal * 3)) * 100)
    : 0;

  return {
    jogos:jogosTotal,
    v,e,d,
    gp,gc,
    saldo:gp-gc,
    aproveitamento,
    recentes:recentes.reverse().slice(0,8)
  };
}

function jogoNome(j){
  const a = val(j,["timeANome"], j.timeA?.nome || j.timeA || "Time A");
  const b = val(j,["timeBNome"], j.timeB?.nome || j.timeB || "Time B");
  return `${a} x ${b}`;
}

function render(){

  if(!tecnico){
    app.innerHTML = `<div class="loading">Técnico não encontrado.</div>`;
    return;
  }

  const s = calcular();

  app.innerHTML = `
    <section class="hero">

      <img class="foto" src="${fotoTecnico(tecnico)}" onerror="this.src='logo-liga.jfif'">

      <div>

        <h1>${nomeTecnico(tecnico)}</h1>

        <p>
          Técnico oficial da Liga Goiana de Futebol de Base.<br>
          Time: ${timeTecnico(tecnico)}<br>
          Cidade: ${val(tecnico,["cidade","cidadeNascimento","municipio"],"-")}
        </p>

        <div class="tags">
          <span class="tag">${timeTecnico(tecnico)}</span>
          ${categorias(tecnico).map(c=>`<span class="tag">${c}</span>`).join("")}
          <span class="tag">${val(tecnico,["status"],"ativo")}</span>
        </div>

      </div>

    </section>

    <section class="stats">

      <div class="stat">
        <strong>${s.jogos}</strong>
        <span>Jogos</span>
      </div>

      <div class="stat">
        <strong>${s.v}</strong>
        <span>Vitórias</span>
      </div>

      <div class="stat">
        <strong>${s.e}</strong>
        <span>Empates</span>
      </div>

      <div class="stat">
        <strong>${s.d}</strong>
        <span>Derrotas</span>
      </div>

      <div class="stat">
        <strong>${s.gp}</strong>
        <span>Gols Pró</span>
      </div>

      <div class="stat">
        <strong>${s.gc}</strong>
        <span>Gols Contra</span>
      </div>

    </section>

    <section class="grid">

      <div class="panel">
        <h2><i class="fa-solid fa-chart-line"></i> Estatísticas</h2>

        <div class="panel-body">

          <div class="item">
            <span>Aproveitamento</span>
            <strong>${s.aproveitamento}%</strong>
          </div>

          <div class="item">
            <span>Saldo de gols</span>
            <strong>${s.saldo}</strong>
          </div>

          <div class="item">
            <span>Time atual</span>
            <strong>${timeTecnico(tecnico)}</strong>
          </div>

          <div class="item">
            <span>Status</span>
            <strong>${val(tecnico,["status"],"ativo")}</strong>
          </div>

        </div>
      </div>

      <div class="panel">
        <h2><i class="fa-solid fa-calendar-days"></i> Jogos recentes</h2>

        <div class="panel-body">

          ${
            s.recentes.length
            ? s.recentes.map(j=>`
              <div class="jogo">
                <strong>${jogoNome(j)}</strong>

                <p>
                  Campeonato: ${val(j,["campeonato","campeonatoNome"],"-")}<br>
                  Categoria: ${val(j,["categoria"],"-")}<br>
                  Data: ${val(j,["data","dataJogo","dataHora"],"-")}<br>
                  Status: ${val(j,["status"],"-")}
                </p>
              </div>
            `).join("")
            : `<div class="loading">Nenhum jogo encontrado.</div>`
          }

        </div>
      </div>

    </section>
  `;
}

async function carregar(){

  if(!id){
    app.innerHTML = `<div class="loading">ID do técnico não informado.</div>`;
    return;
  }

  const tecnicoSnap = await getDoc(doc(db,"tecnicos",id));

  if(tecnicoSnap.exists()){
    tecnico = {
      id:tecnicoSnap.id,
      ...tecnicoSnap.data()
    };
  }

  const jogosSnap = await getDocs(collection(db,"jogos"));

  jogos = jogosSnap.docs.map(d=>({
    id:d.id,
    ...d.data()
  }));

  render();
}

carregar();
</script>

</body>
</html>
