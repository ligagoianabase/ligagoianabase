<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;--card:#071d37;--card2:#0d2a52;--gold:#f7c600;--gold2:#ffe45c;
  --white:#fff;--muted:#cbd6ea;--line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);--green:#1b5e20;--yellow:#7a5a00;
  --red:#b42323;--blue:#1a3f73;--shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:linear-gradient(rgba(2,8,20,.88),rgba(2,8,20,.96)),url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none}
select,input{font-family:inherit}

.wrap{width:min(100% - 28px,var(--max));margin:0 auto}
.container{padding:22px 0 34px}

.hero{
  background:radial-gradient(circle at top left,rgba(247,198,0,.16),transparent 34%),linear-gradient(135deg,rgba(16,42,82,.96),rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap}

.hero-logo{
  width:76px;height:76px;border-radius:20px;object-fit:cover;
  border:2px solid var(--gold);background:#fff;
}

.hero-info{flex:1;min-width:260px}

.hero h2{color:var(--gold);font-size:28px;font-weight:900;margin-bottom:6px}
.hero p{color:var(--muted);font-size:14px}

.hero-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}

.hero-tag,.tag{
  background:rgba(26,63,115,.9);
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

select,input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
  outline:none;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
}

.titulo-secao{
  color:var(--gold);
  font-size:22px;
  font-weight:900;
  margin:0 0 12px;
}

.abas,.sub-abas{
  display:flex;
  gap:8px;
  overflow-x:auto;
  scrollbar-width:none;
  margin-bottom:14px;
}

.aba,.sub-aba{
  color:#fff;
  font-weight:900;
  font-size:13px;
  background:linear-gradient(180deg,rgba(16,42,82,.98),rgba(12,33,64,.98));
  padding:10px 13px;
  border-radius:13px;
  border:1px solid rgba(255,255,255,.07);
  white-space:nowrap;
}

.aba.ativa,.sub-aba.ativa{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.cards-resumo{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
  margin-bottom:14px;
}

.card-resumo,.card-item,.ranking-card,.chart-card{
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.card-resumo{text-align:center;min-height:112px}

.card-resumo-icon,.card-icon{
  width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
  margin:0 auto 8px;
}

.card-resumo strong{
  display:block;
  color:var(--gold);
  font-size:12px;
  margin-bottom:5px;
}

.card-resumo span{
  display:block;
  color:#fff;
  font-size:18px;
  font-weight:900;
}

.top3-list{display:grid;gap:3px;margin-top:4px}

.top3-list div{
  font-size:11px;
  color:#fff;
  background:rgba(255,255,255,.05);
  border-radius:8px;
  padding:3px 5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* CONTROLE APP / COMPACTO / SWIPE */
.modo-tabela{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.modo-btn{
  background:linear-gradient(180deg,rgba(16,42,82,.98),rgba(12,33,64,.98));
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:9px 12px;
  font-size:12px;
  font-weight:900;
}

.modo-btn.ativo{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

/* TABELA DESKTOP / SWIPE */
.box-tabela{
  overflow-x:auto;
  border-radius:15px;
  -webkit-overflow-scrolling:touch;
}

.table{
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(8,23,44,.97));
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(247,198,0,.22);
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.row{
  display:flex;
  align-items:center;
  padding:10px 8px;
  border-bottom:1px solid rgba(255,255,255,.08);
  animation:fade .35s ease;
  min-width:1100px;
}

@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.row.header{background:rgba(3,12,29,.78);color:var(--gold);font-weight:900}
.row.top1{background:linear-gradient(90deg,rgba(247,198,0,.26),rgba(16,42,82,.96));border-left:5px solid var(--gold)}
.row.top2{background:linear-gradient(90deg,rgba(192,192,192,.20),rgba(16,42,82,.96));border-left:5px solid #c0c0c0}
.row.top3{background:linear-gradient(90deg,rgba(205,127,50,.20),rgba(16,42,82,.96));border-left:5px solid #cd7f32}

.col-pos{width:45px;text-align:center;font-weight:900}
.col-time{flex:1;padding:0 8px}
.col{width:56px;text-align:center;font-weight:800}
.col-wide{width:135px;text-align:center;font-weight:800}

.team{display:flex;align-items:center;gap:8px;font-weight:900}

.escudo,.photo{
  width:32px;height:32px;object-fit:cover;border-radius:50%;
  background:#fff;border:1px solid var(--gold-line);flex-shrink:0;
}

.forma{display:flex;justify-content:center;gap:3px}

.forma span{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;
}

.f-v{background:var(--green)}
.f-e{background:#777}
.f-d{background:var(--red)}

/* CLASSIFICAÇÃO TIPO APP */
.classificacao-app{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.class-card{
  position:relative;
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:18px;
  padding:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  overflow:hidden;
}

.class-card.top1{border-color:var(--gold)}
.class-card.top1::before{
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;
  width:5px;
  background:var(--gold);
}

.class-head{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}

.class-pos{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;
  flex-shrink:0;
}

.class-team{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
  flex:1;
}

.class-team strong{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:15px;
}

.class-pontos{
  color:var(--gold);
  font-size:24px;
  font-weight:900;
  text-align:right;
}

.class-pontos small{
  display:block;
  color:var(--muted);
  font-size:10px;
}

.metricas{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:7px;
}

.metrica{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  text-align:center;
  padding:7px 4px;
}

.metrica span{
  display:block;
  color:var(--gold);
  font-size:10px;
  font-weight:900;
  margin-bottom:3px;
}

.metrica strong{
  display:block;
  color:#fff;
  font-size:14px;
}

.class-extra{
  margin-top:10px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
}

.aproveitamento{
  color:#fff;
  font-weight:900;
  font-size:13px;
}

.lista-grid,.ranking-lista{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
}

.ranking-lista.ranking-3{
  grid-template-columns:repeat(3,1fr);
}

.card-item{text-align:center}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
}

.status-tag{
  color:#fff;
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.status-finalizado{background:var(--green)}
.status-agendado{background:var(--yellow)}
.status-red{background:var(--red)}

.times-linha{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:8px;
  margin:8px 0 10px;
}

.time-box{display:flex;align-items:center;gap:6px;min-width:0;font-size:13px;font-weight:900}
.time-box.visitante{justify-content:flex-end;text-align:right}
.time-box span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.placar{
  color:var(--gold);
  font-size:17px;
  font-weight:900;
  background:rgba(2,10,24,.72);
  border:1px solid var(--gold-line);
  border-radius:10px;
  padding:6px 9px;
  white-space:nowrap;
}

.info-item{
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
  text-align:center;
  margin:8px 0 10px;
}

.info-item strong{color:#fff}

.btn-ver{
  width:100%;
  padding:9px 12px;
  border-radius:11px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:13px;
}

.ranking-card.lider-ranking{
  border-color:var(--gold);
  background:radial-gradient(circle at top right,rgba(247,198,0,.18),transparent 35%),linear-gradient(180deg,rgba(16,42,82,.98),rgba(8,23,44,.98));
}

.ranking-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.player-box{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}

.pos{width:28px;color:var(--gold);font-weight:900;text-align:center}
.photo{width:44px;height:44px}

.player-info{min-width:0}

.player-info strong{
  display:block;
  color:#fff;
  font-size:13px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.player-info small{
  display:block;
  color:var(--muted);
  font-size:11px;
  margin-top:3px;
}

.numero-destaque{
  color:var(--gold);
  font-size:24px;
  font-weight:900;
  text-align:right;
}

.numero-destaque small{
  display:block;
  color:var(--muted);
  font-size:10px;
  font-weight:800;
}

.cartao-card{
  position:relative;
  overflow:hidden;
  min-height:112px;
}

.cartao-card::after{
  content:"";
  position:absolute;
  right:-24px;
  top:-18px;
  width:68px;
  height:96px;
  border-radius:10px;
  background:linear-gradient(180deg,#f7c600,#e30613);
  opacity:.22;
  transform:rotate(12deg);
}

.cartao-numeros{
  display:flex;
  gap:8px;
  justify-content:flex-end;
  align-items:center;
  font-weight:900;
  z-index:2;
}

.cartao-num{
  display:flex;
  align-items:center;
  gap:4px;
  background:rgba(255,255,255,.07);
  padding:6px 8px;
  border-radius:10px;
}

.suspenso-badge{
  background:rgba(180,35,35,.95);
  color:#fff;
  padding:7px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.duplo{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.vazio{
  color:var(--muted);
  text-align:center;
  padding:18px;
  background:rgba(7,29,55,.9);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
}

@media(max-width:1100px){
  .cards-resumo{grid-template-columns:repeat(3,1fr)}
  .lista-grid,.ranking-lista,.ranking-lista.ranking-3{grid-template-columns:repeat(3,1fr)}
  .classificacao-app{grid-template-columns:1fr}
}

@media(max-width:900px){
  .filtros,.duplo{grid-template-columns:1fr}
  .cards-resumo,.lista-grid,.ranking-lista,.ranking-lista.ranking-3{grid-template-columns:repeat(2,1fr)}
  .hero-logo{width:64px;height:64px;border-radius:16px}
  .classificacao-app{grid-template-columns:1fr}
}

@media(max-width:520px){
  .cards-resumo,.lista-grid,.ranking-lista,.ranking-lista.ranking-3{grid-template-columns:1fr}
}
</style>
</head>

<body>

<main class="wrap container">
  <section class="hero">
    <div class="hero-top">
      <img id="heroLogo" class="hero-logo" src="logo-liga.jfif">
      <div class="hero-info">
        <h2 id="heroTitulo">Tabela da Competição</h2>
        <p id="heroSub">Classificação, jogos e estatísticas geradas automaticamente pelas súmulas finalizadas.</p>
        <div class="hero-tags">
          <div class="hero-tag" id="heroTagCategoria">Categoria: -</div>
          <div class="hero-tag" id="heroTagJogos">Jogos finalizados: 0</div>
          <div class="hero-tag" id="heroTagTimes">Times: 0</div>
          <div class="hero-tag" id="heroTagGols">Gols: 0</div>
        </div>
      </div>

  </section>

  <section class="filtros">
    <select id="filtroCampeonato"><option value="">Todos os campeonatos</option></select>
    <select id="filtroCategoria"><option value="">Todas categorias</option></select>
  </section>

  <h2 class="titulo-secao" id="tituloTabela">Tabela</h2>

  <div class="abas">
    <button class="aba ativa" onclick="trocarAba('detalhes',this)">Detalhes</button>
    <button class="aba" onclick="trocarAba('classificacao',this)">Classificação</button>
    <button class="aba" onclick="trocarAba('casaFora',this)">Casa / Fora</button>
    <button class="aba" onclick="trocarAba('jogos',this)">Jogos</button>
    <button class="aba" onclick="trocarAba('estatisticasTimes',this)">Estatísticas dos Times</button>
    <button class="aba" onclick="trocarAba('artilharia',this)">Artilharia</button>

<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("tabela");

let campeonatos = [];
let times = [];
let jogos = [];
let sumulas = [];
let abaAtual = "detalhes";

const areaTabela = document.getElementById("areaTabela");
const filtroCampeonato = document.getElementById("filtroCampeonato");
const filtroCategoria = document.getElementById("filtroCategoria");
const heroTitulo = document.getElementById("heroTitulo");
const heroSub = document.getElementById("heroSub");
const heroLogo = document.getElementById("heroLogo");
const heroTagCategoria = document.getElementById("heroTagCategoria");
const heroTagJogos = document.getElementById("heroTagJogos");
const heroTagTimes = document.getElementById("heroTagTimes");
const heroTagGols = document.getElementById("heroTagGols");
const tituloTabela = document.getElementById("tituloTabela");

function normalizar(v){
  return String(v || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function campo(obj,chaves,fallback=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== "") return obj[c];
  }
  return fallback;
}

function numero(v){
  const n = Number(v);
  return Number.isFinite(n) ? n : 0;
}

function dataMs(v){
  if(!v) return 0;
  if(typeof v.toDate === "function") return v.toDate().getTime();
  const d = new Date(v).getTime();
  return Number.isFinite(d) ? d : 0;
}

function dataBR(v){
  if(!v) return "-";
  if(typeof v.toDate === "function") v = v.toDate();
  const d = new Date(v);
  if(!isNaN(d.getTime())) return d.toLocaleDateString("pt-BR");
  return String(v);
}

function horaBR(v){
  if(!v) return "";
  if(typeof v.toDate === "function") v = v.toDate();
  const d = new Date(v);
  if(!isNaN(d.getTime())) return d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  return String(v);
}

function nomeTime(obj,fallback="Time"){
  if(obj && typeof obj === "object") return campo(obj,["nome","nomeTime","nomeClube","time","equipe","apelido"],fallback);
  return obj || fallback;
}

function idTime(obj){
  if(obj && typeof obj === "object") return campo(obj,["id","timeId","uid"],"");
  return "";
}

function logoTime(obj,nome=""){
  if(obj && typeof obj === "object"){
    const logo = campo(obj,["logo","escudo","imagem","foto"],"");
    if(logo) return logo;
  }

  const achado = times.find(t =>
    (idTime(obj) && t.id === idTime(obj)) ||
    normalizar(nomeTime(t)) === normalizar(nome)
  );

  return campo(achado,["logo","escudo","imagem","foto"],"logo-liga.jfif");
}

function campeonatoItem(item){
  return campo(item,["campeonato","campeonatoNome","nomeCampeonato","tituloCampeonato"],"");
}

function categoriaItem(item){
  return campo(item,["categoria","categoriaNome"],"");
}

function publicado(item){
  const st = normalizar(campo(item,["status","sumulaStatus"],""));
  return item?.sumulaFinalizada === true ||
    item?.finalizada === true ||
    item?.publica === true ||
    item?.publico === true ||
    item?.verSumula === true ||
    st === "finalizado" || st === "finalizada" || st === "publicado" || st === "publicada";
}

function acharJogo(id){
  if(!id) return null;
  return jogos.find(j => String(j.id) === String(id) || String(j.jogoId || "") === String(id)) || null;
}

function jogoFinalizadoDaSumula(s){
  const j = acharJogo(campo(s,["jogoId","idJogo","id"],""));
  return j && publicado(j);
}

function listaSumulasPublicadas(){
  const mapa = new Map();

  sumulas.forEach(s=>{
    const id = campo(s,["jogoId","idJogo","id"],s.id);
    const j = acharJogo(id) || {};
    if(!publicado(s) && !publicado(j)) return;
    mapa.set(String(id), normalizarSumula({...j,...s,id,jogoId:id}));
  });

  jogos.forEach(j=>{
    if(!publicado(j)) return;
    const id = campo(j,["jogoId","sumulaId","id"],j.id);
    if(!mapa.has(String(id))){
      const s = sumulas.find(x => String(campo(x,["jogoId","idJogo","id"],x.id)) === String(id)) || {};
      mapa.set(String(id), normalizarSumula({...j,...s,id,jogoId:id,status:"finalizado",sumulaFinalizada:true}));
    }
  });

  return Array.from(mapa.values());
}

function timeAObj(s){ return s.timeA || s.timeMandante || s.mandante || {}; }
function timeBObj(s){ return s.timeB || s.timeVisitante || s.visitante || {}; }
function nomeA(s){ return nomeTime(timeAObj(s), campo(s,["timeANome","mandanteNome","timeMandanteNome"],"Mandante")); }
function nomeB(s){ return nomeTime(timeBObj(s), campo(s,["timeBNome","visitanteNome","timeVisitanteNome"],"Visitante")); }

function placarA(s){
  if(s.placar && typeof s.placar === "object") return numero(s.placar.A ?? s.placar.a ?? s.placar.mandante);
  return numero(campo(s,["golsA","placarA","golsMandante"],0));
}

function placarB(s){
  if(s.placar && typeof s.placar === "object") return numero(s.placar.B ?? s.placar.b ?? s.placar.visitante);
  return numero(campo(s,["golsB","placarB","golsVisitante"],0));
}

function normalizarSumula(s){
  return {
    ...s,
    campeonato: campeonatoItem(s),
    categoria: categoriaItem(s),
    timeANome:nomeA(s),
    timeBNome:nomeB(s),
    logoA:campo(s,["logoA","escudoA","escudoTimeA"],logoTime(timeAObj(s),nomeA(s))),
    logoB:campo(s,["logoB","escudoB","escudoTimeB"],logoTime(timeBObj(s),nomeB(s))),
    golsA:placarA(s),
    golsB:placarB(s),
    data:campo(s,["data","dataJogo","dataHora","finalizadaEm","publicadaEm","criadoEm"],""),
    hora:campo(s,["hora","horario"],""),
    local:campo(s,["local","campo","estadio"],"-"),
    status:"finalizado"
  };
}

function sumulasFiltradas(){
  const camp = filtroCampeonato.value;
  const cat = filtroCategoria.value;
  return listaSumulasPublicadas().filter(s=>{
    if(camp && s.campeonato !== camp) return false;
    if(cat && s.categoria !== cat) return false;
    return true;
  });
}

function jogosFiltrados(){
  const camp = filtroCampeonato.value;
  const cat = filtroCategoria.value;
  return jogos.filter(j=>{
    if(camp && campeonatoItem(j) !== camp) return false;
    if(cat && categoriaItem(j) !== cat) return false;
    return true;
  });
}

function golsArray(s){
  const arr = [];
  if(Array.isArray(s.gols)) s.gols.forEach(g=>arr.push({...g,time:campo(g,["timeNome","time","equipe","clube"], g.time === "B" ? s.timeBNome : s.timeANome)}));
  if(Array.isArray(s.golsLista)) s.golsLista.forEach(g=>arr.push({...g,time:campo(g,["timeNome","time","equipe","clube"],"")}));
  return arr;
}

function assistenciasArray(s){
  const arr = [];
  if(Array.isArray(s.assistencias)) s.assistencias.forEach(a=>arr.push(a));
  if(Array.isArray(s.assistenciasLista)) s.assistenciasLista.forEach(a=>arr.push(a));
  return arr;
}

function cartoesArray(s){
  const arr = [];
  if(Array.isArray(s.cartoes)) s.cartoes.forEach(c=>arr.push({...c,time:campo(c,["timeNome","time","equipe","clube"], c.time === "B" ? s.timeBNome : s.timeANome)}));
  if(Array.isArray(s.cartoesLista)) s.cartoesLista.forEach(c=>arr.push({...c,time:campo(c,["timeNome","time","equipe","clube"],"")}));
  return arr;
}

function tipoCartao(c){
  const t = normalizar(campo(c,["tipo","cartao","cor"],"amarelo"));
  return t.includes("verm") ? "vermelho" : "amarelo";
}

function jogadorNome(item){ return campo(item,["nome","jogador","jogadorNome","atleta","nomeJogador"],"Sem nome"); }
function itemTime(item,fallback="-"){ return campo(item,["timeNome","time","clube","equipe"],fallback); }
function jogadorFoto(item){ return campo(item,["foto","imagem","avatar"],"logo-liga.jfif"); }

function tabelaClassificacao(modo="geral"){
  const mapa = {};

  sumulasFiltradas().forEach(s=>{
    const timesJogo = [
      {nome:s.timeANome, logo:s.logoA, gp:s.golsA, gc:s.golsB, lado:"casa"},
      {nome:s.timeBNome, logo:s.logoB, gp:s.golsB, gc:s.golsA, lado:"fora"}
    ];

    timesJogo.forEach(t=>{
      if(modo === "casa" && t.lado !== "casa") return;
      if(modo === "fora" && t.lado !== "fora") return;

      if(!mapa[t.nome]){
        mapa[t.nome] = {time:t.nome,logo:t.logo,p:0,j:0,v:0,e:0,d:0,gp:0,gc:0,ultimos:[]};
      }

      const linha = mapa[t.nome];
      linha.j++;
      linha.gp += t.gp;
      linha.gc += t.gc;

      if(t.gp > t.gc){ linha.v++; linha.p += 3; linha.ultimos.push("V"); }
      else if(t.gp === t.gc){ linha.e++; linha.p += 1; linha.ultimos.push("E"); }
      else{ linha.d++; linha.ultimos.push("D"); }
    });
  });

  return Object.values(mapa).map(t=>({
    ...t,
    sg:t.gp - t.gc,
    aproveitamento:t.j ? Math.round((t.p / (t.j * 3)) * 100) : 0,
    ultimos:t.ultimos.slice(-5)
  })).sort((a,b)=>
    b.p - a.p || b.v - a.v || b.sg - a.sg || b.gp - a.gp || a.time.localeCompare(b.time,"pt-BR")
  );
}

function atualizarFiltros(){
  const campAtual = filtroCampeonato.value;
  const catAtual = filtroCategoria.value;
  const camps = new Map();
  const cats = new Set();

  [...listaSumulasPublicadas(), ...jogos].forEach(item=>{
    const camp = campeonatoItem(item);
    const cat = categoriaItem(item);
    if(camp) camps.set(camp, item);
    if(cat) cats.add(cat);
  });

  filtroCampeonato.innerHTML = `<option value="">Todos os campeonatos</option>` +
    [...camps.keys()].sort((a,b)=>a.localeCompare(b,"pt-BR")).map(c=>`<option value="${c}">${c}</option>`).join("");

  filtroCategoria.innerHTML = `<option value="">Todas categorias</option>` +
    [...cats].sort((a,b)=>a.localeCompare(b,"pt-BR")).map(c=>`<option value="${c}">${c}</option>`).join("");

  if([...camps.keys()].includes(campAtual)) filtroCampeonato.value = campAtual;
  if([...cats].includes(catAtual)) filtroCategoria.value = catAtual;

  const campItem = camps.get(filtroCampeonato.value);
  heroLogo.src = campo(campItem,["logoCampeonato","campeonatoLogo","logo","imagem"],"logo-liga.jfif");
}

function resumoNumeros(){
  const lista = sumulasFiltradas();
  const timesSet = new Set();
  let golsEventos = 0;
  let golsPlacar = 0;
  let cartoes = 0;

  lista.forEach(s=>{
    timesSet.add(s.timeANome);
    timesSet.add(s.timeBNome);
    golsEventos += golsArray(s).length;
    golsPlacar += s.golsA + s.golsB;
    cartoes += cartoesArray(s).length;
  });

  return {lista,times:timesSet.size,gols:golsEventos || golsPlacar,cartoes};
}

function atualizarHero(){
  const r = resumoNumeros();
  heroTitulo.innerText = filtroCampeonato.value || "Tabela da Competição";
  heroSub.innerText = "Classificação, jogos e estatísticas geradas automaticamente pelas súmulas finalizadas.";
  heroTagCategoria.innerText = `Categoria: ${filtroCategoria.value || "Todas"}`;
  heroTagJogos.innerText = `Jogos finalizados: ${r.lista.length}`;
  heroTagTimes.innerText = `Times: ${r.times}`;
  heroTagGols.innerText = `Gols: ${r.gols}`;
}

function cardsResumoHtml(){
  const r = resumoNumeros();
  const tabela = tabelaClassificacao("geral");
  const lider = tabela[0]?.time || "-";
  const artilheiro = rankingPor("gols")[0];
  const cartoes = rankingCartoes()[0];
  const jogosPendentes = jogosFiltrados().filter(j=>!publicado(j)).length;

  return `<div class="cards-resumo">
    <div class="card-resumo"><div class="card-resumo-icon"><i class="fa-solid fa-users"></i></div><strong>Times</strong><span>${r.times}</span></div>
    <div class="card-resumo"><div class="card-resumo-icon"><i class="fa-solid fa-calendar-check"></i></div><strong>Finalizados</strong><span>${r.lista.length}</span></div>
    <div class="card-resumo"><div class="card-resumo-icon"><i class="fa-solid fa-futbol"></i></div><strong>Gols</strong><span>${r.gols}</span></div>
    <div class="card-resumo"><div class="card-resumo-icon"><i class="fa-solid fa-ranking-star"></i></div><strong>Líder</strong><span>${lider}</span></div>
    <div class="card-resumo"><div class="card-resumo-icon"><i class="fa-solid fa-shoe-prints"></i></div><strong>Artilheiro</strong><span>${artilheiro ? artilheiro.nome : "-"}</span></div>
    <div class="card-resumo"><div class="card-resumo-icon"><i class="fa-solid fa-square"></i></div><strong>Cartões</strong><span>${cartoes ? cartoes.total : 0}</span></div>
  </div>`;
}

function formaHtml(ultimos){
  return `<div class="forma">${(ultimos || []).slice(-5).map(x=>`<span class="f-${x.toLowerCase()}">${x}</span>`).join("") || `<span class="f-e">-</span>`}</div>`;
}

function tabelaDesktop(lista){
  if(!lista.length) return `<div class="vazio">Nenhum dado encontrado.</div>`;
  return `<div class="box-tabela"><div class="table">
    <div class="row header">
      <div class="col-pos">#</div><div class="col-time">Time</div><div class="col">P</div><div class="col">J</div><div class="col">V</div><div class="col">E</div><div class="col">D</div><div class="col">GP</div><div class="col">GC</div><div class="col">SG</div><div class="col-wide">Forma</div><div class="col-wide">Aproveit.</div>
    </div>
    ${lista.map((t,i)=>`<div class="row ${i===0?"top1":i===1?"top2":i===2?"top3":""}">
      <div class="col-pos">${i+1}</div>
      <div class="col-time"><div class="team"><img class="escudo" src="${t.logo || "logo-liga.jfif"}" onerror="this.src='logo-liga.jfif'"><span>${t.time}</span></div></div>
      <div class="col">${t.p}</div><div class="col">${t.j}</div><div class="col">${t.v}</div><div class="col">${t.e}</div><div class="col">${t.d}</div><div class="col">${t.gp}</div><div class="col">${t.gc}</div><div class="col">${t.sg}</div><div class="col-wide">${formaHtml(t.ultimos)}</div><div class="col-wide">${t.aproveitamento}%</div>
    </div>`).join("")}
  </div></div>`;
}

function cardsClassificacao(lista){
  if(!lista.length) return `<div class="vazio">Nenhum dado encontrado.</div>`;
  return `<div class="classificacao-app">${lista.map((t,i)=>`<div class="class-card ${i===0?"top1":""}">
    <div class="class-head">
      <div class="class-pos">${i+1}</div>
      <div class="class-team"><img class="escudo" src="${t.logo || "logo-liga.jfif"}" onerror="this.src='logo-liga.jfif'"><strong>${t.time}</strong></div>
      <div class="class-pontos">${t.p}<small>pts</small></div>
    </div>
    <div class="metricas">
      <div class="metrica"><span>J</span><strong>${t.j}</strong></div>
      <div class="metrica"><span>V</span><strong>${t.v}</strong></div>
      <div class="metrica"><span>E</span><strong>${t.e}</strong></div>
      <div class="metrica"><span>D</span><strong>${t.d}</strong></div>
      <div class="metrica"><span>GP</span><strong>${t.gp}</strong></div>
      <div class="metrica"><span>GC</span><strong>${t.gc}</strong></div>
      <div class="metrica"><span>SG</span><strong>${t.sg}</strong></div>
      <div class="metrica"><span>%</span><strong>${t.aproveitamento}</strong></div>
    </div>
    <div class="class-extra"><div class="aproveitamento">Forma</div>${formaHtml(t.ultimos)}</div>
  </div>`).join("")}</div>`;
}

function rankingPor(tipo){
  const mapa = {};
  sumulasFiltradas().forEach(s=>{
    const lista = tipo === "gols" ? golsArray(s) : assistenciasArray(s);
    lista.forEach(item=>{
      const nome = jogadorNome(item);
      const time = itemTime(item,"-");
      const key = `${normalizar(nome)}|${normalizar(time)}`;
      if(!mapa[key]) mapa[key] = {nome,time,total:0,foto:jogadorFoto(item)};
      mapa[key].total++;
    });
  });
  return Object.values(mapa).sort((a,b)=>b.total - a.total || a.nome.localeCompare(b.nome,"pt-BR"));
}

function rankingCartoes(){
  const mapa = {};
  sumulasFiltradas().forEach(s=>{
    cartoesArray(s).forEach(item=>{
      const nome = jogadorNome(item);
      const time = itemTime(item,"-");
      const key = `${normalizar(nome)}|${normalizar(time)}`;
      if(!mapa[key]) mapa[key] = {nome,time,total:0,amarelos:0,vermelhos:0,foto:jogadorFoto(item)};
      if(tipoCartao(item) === "vermelho") mapa[key].vermelhos++;
      else mapa[key].amarelos++;
      mapa[key].total++;
    });
  });
  return Object.values(mapa).sort((a,b)=>b.total - a.total || b.vermelhos - a.vermelhos || a.nome.localeCompare(b.nome,"pt-BR"));
}

function rankingCards(lista,tipo="Gols"){
  if(!lista.length) return `<div class="vazio">Nenhum dado encontrado.</div>`;
  return `<div class="ranking-lista ranking-3">${lista.map((p,i)=>`<div class="ranking-card ${i===0?"lider-ranking":""}">
    <div class="ranking-top">
      <div class="player-box"><div class="pos">${i+1}</div><img class="photo" src="${p.foto || "logo-liga.jfif"}" onerror="this.src='logo-liga.jfif'"><div class="player-info"><strong>${p.nome}</strong><small>${p.time || "-"}</small></div></div>
      <div class="numero-destaque">${p.total}<small>${tipo}</small></div>
    </div>
  </div>`).join("")}</div>`;
}

function cartoesCards(lista){
  if(!lista.length) return `<div class="vazio">Nenhum cartão registrado.</div>`;
  return `<div class="ranking-lista ranking-3">${lista.map((p,i)=>`<div class="ranking-card cartao-card ${i===0?"lider-ranking":""}">
    <div class="ranking-top">
      <div class="player-box"><div class="pos">${i+1}</div><img class="photo" src="${p.foto || "logo-liga.jfif"}" onerror="this.src='logo-liga.jfif'"><div class="player-info"><strong>${p.nome}</strong><small>${p.time || "-"}</small></div></div>
      <div class="cartao-numeros"><div class="cartao-num">🟨 ${p.amarelos}</div><div class="cartao-num">🟥 ${p.vermelhos}</div></div>
    </div>
  </div>`).join("")}</div>`;
}

function jogosCards(){
  const lista = jogosFiltrados().sort((a,b)=>dataMs(campo(b,["dataHora","data","dataJogo"],"")) - dataMs(campo(a,["dataHora","data","dataJogo"],"")));
  if(!lista.length) return `<div class="vazio">Nenhum jogo encontrado.</div>`;

  return `<div class="lista-grid">${lista.map(j=>{
    const jId = j.id;
    const finalizado = publicado(j);
    const a = nomeTime(timeAObj(j),campo(j,["timeANome"],"Time A"));
    const b = nomeTime(timeBObj(j),campo(j,["timeBNome"],"Time B"));
    const la = logoTime(timeAObj(j),a);
    const lb = logoTime(timeBObj(j),b);
    return `<div class="card-item">
      <div class="card-top"><div class="card-icon"><i class="fa-solid fa-calendar-days"></i></div><span class="status-tag ${finalizado?"status-finalizado":"status-agendado"}">${finalizado?"Finalizado":"Agendado"}</span></div>
      <div class="times-linha">
        <div class="time-box"><img class="escudo" src="${la}" onerror="this.src='logo-liga.jfif'"><span>${a}</span></div>
        <div class="placar">${finalizado ? `${placarA(j)} x ${placarB(j)}` : "x"}</div>
        <div class="time-box visitante"><span>${b}</span><img class="escudo" src="${lb}" onerror="this.src='logo-liga.jfif'"></div>
      </div>
      <div class="info-item"><strong>${campeonatoItem(j) || "Campeonato"}</strong><br>${categoriaItem(j) || "-"}<br>${dataBR(campo(j,["dataHora","data","dataJogo"],""))} ${campo(j,["hora","horario"],"")}<br>${campo(j,["local","campo","estadio"],"-")}</div>
      ${finalizado ? `<a class="btn-ver" href="sumula-publica.html?id=${encodeURIComponent(jId)}"><i class="fa-solid fa-eye"></i> Ver Súmula</a>` : ""}
    </div>`;
  }).join("")}</div>`;
}

function suspensosCards(){
  const lista = rankingCartoes().filter(p=>p.vermelhos > 0 || p.amarelos >= 3);
  if(!lista.length) return `<div class="vazio">Nenhum jogador suspenso.</div>`;
  return `<div class="ranking-lista ranking-3">${lista.map((p,i)=>`<div class="ranking-card cartao-card">
    <div class="ranking-top">
      <div class="player-box"><div class="pos">${i+1}</div><img class="photo" src="${p.foto || "logo-liga.jfif"}" onerror="this.src='logo-liga.jfif'"><div class="player-info"><strong>${p.nome}</strong><small>${p.time || "-"}</small></div></div>
      <div class="suspenso-badge">Suspenso</div>
    </div>
    <div class="info-item">${p.vermelhos > 0 ? "Cartão vermelho" : "3 cartões amarelos"}</div>
  </div>`).join("")}</div>`;
}

function historicoHtml(){
  const lista = sumulasFiltradas().sort((a,b)=>dataMs(b.data) - dataMs(a.data));
  if(!lista.length) return `<div class="vazio">Nenhuma súmula finalizada.</div>`;
  return `<div class="lista-grid">${lista.map(s=>`<div class="card-item">
    <div class="card-top"><div class="card-icon"><i class="fa-solid fa-file-lines"></i></div><span class="status-tag status-finalizado">Publicado</span></div>
    <div class="times-linha">
      <div class="time-box"><img class="escudo" src="${s.logoA}" onerror="this.src='logo-liga.jfif'"><span>${s.timeANome}</span></div>
      <div class="placar">${s.golsA} x ${s.golsB}</div>
      <div class="time-box visitante"><span>${s.timeBNome}</span><img class="escudo" src="${s.logoB}" onerror="this.src='logo-liga.jfif'"></div>
    </div>
    <div class="info-item"><strong>${s.campeonato || "Campeonato"}</strong><br>${s.categoria || "-"}<br>${dataBR(s.data)}<br>${s.local || "-"}</div>
    <a class="btn-ver" href="sumula-publica.html?id=${encodeURIComponent(s.jogoId || s.id)}"><i class="fa-solid fa-eye"></i> Ver Súmula</a>
  </div>`).join("")}</div>`;
}

function estatisticasTimesHtml(){
  const lista = tabelaClassificacao("geral");
  if(!lista.length) return `<div class="vazio">Nenhum dado encontrado.</div>`;
  return `<div class="classificacao-app">${lista.map((t,i)=>`<div class="class-card ${i===0?"top1":""}">
    <div class="class-head"><div class="class-pos">${i+1}</div><div class="class-team"><img class="escudo" src="${t.logo || "logo-liga.jfif"}" onerror="this.src='logo-liga.jfif'"><strong>${t.time}</strong></div><div class="class-pontos">${t.aproveitamento}%<small>aprov.</small></div></div>
    <div class="metricas"><div class="metrica"><span>Pontos</span><strong>${t.p}</strong></div><div class="metrica"><span>Jogos</span><strong>${t.j}</strong></div><div class="metrica"><span>Gols Pró</span><strong>${t.gp}</strong></div><div class="metrica"><span>Saldo</span><strong>${t.sg}</strong></div></div>
  </div>`).join("")}</div>`;
}

window.trocarAba = function(aba,btn){
  abaAtual = aba;
  document.querySelectorAll(".aba").forEach(b=>b.classList.remove("ativa"));
  if(btn) btn.classList.add("ativa");
  renderizar();
};

function renderizar(){
  atualizarFiltros();
  atualizarHero();

  const titulos = {
    detalhes:"Detalhes",
    classificacao:"Classificação",
    casaFora:"Casa / Fora",
    jogos:"Jogos",
    estatisticasTimes:"Estatísticas dos Times",
    artilharia:"Artilharia",
    assistencias:"Assistências",
    cartoes:"Cartões",
    suspensos:"Suspensos",
    historico:"Histórico"
  };
  tituloTabela.innerText = titulos[abaAtual] || "Tabela";

  if(abaAtual === "detalhes") areaTabela.innerHTML = cardsResumoHtml() + cardsClassificacao(tabelaClassificacao("geral"));
  if(abaAtual === "classificacao") areaTabela.innerHTML = `<div class="modo-tabela"><button class="modo-btn ativo">Tabela</button><button class="modo-btn">Cards</button></div>` + tabelaDesktop(tabelaClassificacao("geral"));
  if(abaAtual === "casaFora") areaTabela.innerHTML = `<div class="duplo"><div><h2 class="titulo-secao">Mandante</h2>${cardsClassificacao(tabelaClassificacao("casa"))}</div><div><h2 class="titulo-secao">Visitante</h2>${cardsClassificacao(tabelaClassificacao("fora"))}</div></div>`;
  if(abaAtual === "jogos") areaTabela.innerHTML = jogosCards();
  if(abaAtual === "estatisticasTimes") areaTabela.innerHTML = estatisticasTimesHtml();
  if(abaAtual === "artilharia") areaTabela.innerHTML = rankingCards(rankingPor("gols"),"Gols");
  if(abaAtual === "assistencias") areaTabela.innerHTML = rankingCards(rankingPor("assistencias"),"Assist.");
  if(abaAtual === "cartoes") areaTabela.innerHTML = cartoesCards(rankingCartoes());
  if(abaAtual === "suspensos") areaTabela.innerHTML = suspensosCards();
  if(abaAtual === "historico") areaTabela.innerHTML = historicoHtml();
}

function renderizarPreservandoFiltro(){
  renderizar();
}

filtroCampeonato.addEventListener("change",renderizarPreservandoFiltro);
filtroCategoria.addEventListener("change",renderizarPreservandoFiltro);

onSnapshot(collection(db,"campeonatos"),snap=>{
  campeonatos = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderizar();
},err=>console.error("Erro campeonatos:",err));

onSnapshot(collection(db,"times"),snap=>{
  times = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderizar();
},err=>console.error("Erro times:",err));

onSnapshot(collection(db,"jogos"),snap=>{
  jogos = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderizar();
},err=>{
  console.error("Erro jogos:",err);
  areaTabela.innerHTML = `<div class="vazio">Erro ao carregar jogos.</div>`;
});

onSnapshot(collection(db,"sumulas"),snap=>{
  sumulas = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderizar();
},err=>{
  console.error("Erro sumulas:",err);
  areaTabela.innerHTML = `<div class="vazio">Erro ao carregar súmulas.</div>`;
});

renderizar();
</script>
