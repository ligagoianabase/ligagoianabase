<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recuperar Senha - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* pode manter o mesmo CSS do login.html */
</style>
</head>

<body>

<div class="box">
  <img src="logo-liga.jfif" class="logo" onerror="this.style.display='none'">

  <h1>Recuperar Senha</h1>
  <p>Digite seu email para receber o link de redefinição de senha.</p>

  <label for="email">Email</label>
  <input type="email" id="email" placeholder="Digite seu email">

  <button class="btn-principal" id="btnRecuperar" onclick="recuperarSenha()">
    Enviar link
  </button>

  <div id="msgErro" class="msg erro"></div>
  <div id="msgSucesso" class="msg sucesso"></div>

  <div class="links">
    <a href="login.html">← Voltar para o login</a>
    <a href="index.html">← Voltar para o site</a>
  </div>
</div>

<script type="module">
import { auth } from "./firebase.js";
import {
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const msgErro = document.getElementById("msgErro");
const msgSucesso = document.getElementById("msgSucesso");
const btnRecuperar = document.getElementById("btnRecuperar");

function limparMensagens(){
  msgErro.style.display = "none";
  msgErro.innerText = "";
  msgSucesso.style.display = "none";
  msgSucesso.innerText = "";
}

function mostrarErro(texto){
  msgSucesso.style.display = "none";
  msgErro.style.display = "block";
  msgErro.innerText = texto;
}

function mostrarSucesso(texto){
  msgErro.style.display = "none";
  msgSucesso.style.display = "block";
  msgSucesso.innerText = texto;
}

window.recuperarSenha = async function(){
  limparMensagens();

  const email = document.getElementById("email").value.trim().toLowerCase();

  if(!email){
    mostrarErro("Digite seu email.");
    return;
  }

  btnRecuperar.disabled = true;
  btnRecuperar.innerText = "Enviando...";

  try{
    await sendPasswordResetEmail(auth,email);

    mostrarSucesso("Link de redefinição enviado para seu email.");
  }catch(e){
    if(e.code === "auth/invalid-email"){
      mostrarErro("Email inválido.");
    }else{
      mostrarErro("Erro ao enviar o link. Verifique o email e tente novamente.");
    }

    btnRecuperar.disabled = false;
    btnRecuperar.innerText = "Enviar link";
  }
};

document.addEventListener("keydown",e=>{
  if(e.key === "Enter"){
    recuperarSenha();
  }
});
</script>

</body>
</html>
