<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notícias - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

input,
select{
  font-family:inherit;
}

img{
  display:block;
  max-width:100%;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

.hero-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:12px;
}

.hero-tag{
  background:rgba(26,63,115,.9);
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 220px;
  gap:10px;
  margin-bottom:14px;
}

input,
select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
  outline:none;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
}

input:focus,
select:focus{
  outline:2px solid rgba(247,198,0,.65);
}

.titulo-secao{
  color:var(--gold);
  font-size:22px;
  font-weight:900;
  margin:0 0 12px;
}

/* GRID PADRÃO — MÁXIMO 5 POR LINHA */
.lista-grid{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:12px;
}

@media(max-width:1100px){
  .lista-grid{
    grid-template-columns:repeat(4, 1fr);
  }
}

@media(max-width:900px){
  .lista-grid{
    grid-template-columns:repeat(3, 1fr);
  }
}

@media(max-width:650px){
  .lista-grid{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:430px){
  .lista-grid{
    grid-template-columns:1fr;
  }
}

.card-noticia{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.12), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  transition:.25s ease;
  display:flex;
  flex-direction:column;
  min-height:330px;
}

.card-noticia:hover{
  transform:translateY(-2px);
  border-color:var(--gold);
}

.img-box{
  height:135px;
  background:#0d2a52;
  position:relative;
  overflow:hidden;
}

.img-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.badge{
  position:absolute;
  top:9px;
  left:9px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  padding:5px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
}

.card-body{
  padding:12px;
  display:flex;
  flex-direction:column;
  flex:1;
}

.noticia-titulo{
  font-size:15px;
  font-weight:900;
  color:#fff;
  line-height:1.25;
  margin-bottom:7px;
}

.noticia-desc{
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
  flex:1;
}

.noticia-meta{
  display:flex;
  justify-content:space-between;
  gap:8px;
  flex-wrap:wrap;
  color:var(--muted);
  font-size:10px;
  font-weight:800;
  margin:10px 0;
}

.noticia-meta span{
  background:rgba(26,63,115,.9);
  border:1px solid rgba(255,255,255,.08);
  padding:4px 7px;
  border-radius:999px;
}

.btn-ver{
  width:100%;
  padding:10px 12px;
  border-radius:11px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:13px;
}

.vazio{
  color:var(--muted);
  text-align:center;
  padding:18px;
  background:rgba(7,29,55,.9);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  grid-column:1/-1;
}

@media(max-width:900px){
  .filtros{
    grid-template-columns:1fr;
  }

  .hero h2{
    font-size:22px;
  }
}
</style>
</head>

<body>

<main class="wrap container">

  <section class="hero">
    <h2>Notícias</h2>
    <p>Últimas publicações oficiais da Liga Goiana de Futebol de Base.</p>

    <div class="hero-tags">
      <div class="hero-tag" id="tagTotal">Notícias: 0</div>
      <div class="hero-tag" id="tagCategoria">Categoria: Todas</div>
      <div class="hero-tag" id="tagAtualizacao">Atualização automática</div>
    </div>
  </section>

  <section class="filtros">
    <input id="busca" placeholder="Pesquisar notícia, campeonato, categoria ou time...">

    <select id="filtroCategoria">
      <option value="">Todas categorias</option>
    </select>
  </section>

  <h2 class="titulo-secao" id="tituloPagina">Notícias</h2>

  <section class="lista-grid" id="listaNoticias">
    <div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando notícias...</div>
  </section>

</main>

<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import {
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("noticias");

let noticias = [];

function n(txt){
  return String(txt || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function val(obj,chaves,f=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== ""){
      return obj[c];
    }
  }
  return f;
}

function formatarData(valor){
  if(!valor) return "-";

  if(typeof valor.toDate === "function"){
    valor = valor.toDate();
  }

  const data = new Date(valor);

  if(isNaN(data.getTime())){
    return String(valor);
  }

  return data.toLocaleDateString("pt-BR", {
    day:"2-digit",
    month:"2-digit",
    year:"numeric"
  });
}

function dataOrdenacao(item){
  const data =
    item.publicadaEm ||
    item.criadoEm ||
    item.data ||
    item.atualizadoEm ||
    "";

  if(data && typeof data.toDate === "function"){
    return data.toDate().getTime();
  }

  const d = new Date(data).getTime();
  return isNaN(d) ? 0 : d;
}

function preencherCategorias(){
  const select = document.getElementById("filtroCategoria");
  const atual = select.value;
  const set = new Set();

  noticias.forEach(noticia=>{
    const cat = val(noticia,["categoria","tipo","categoriaNoticia"],"");
    if(cat) set.add(cat);
  });

  select.innerHTML = `<option value="">Todas categorias</option>`;

  [...set].sort((a,b)=>a.localeCompare(b,"pt-BR")).forEach(cat=>{
    select.innerHTML += `<option value="${cat}">${cat}</option>`;
  });

  if([...set].includes(atual)){
    select.value = atual;
  }
}

function noticiasFiltradas(){
  const busca = n(document.getElementById("busca").value);
  const categoria = document.getElementById("filtroCategoria").value;

  return noticias.filter(item=>{
    const titulo = val(item,["titulo","title"],"");
    const desc = val(item,["descricao","resumo","subtitulo"],"");
    const cat = val(item,["categoria","tipo","categoriaNoticia"],"");
    const campeonato = val(item,["campeonato","campeonatoNome"],"");
    const time = val(item,["time","timeNome"],"");

    const publicado =
      item.publicado === true ||
      item.publica === true ||
      item.status === "publicado" ||
      item.status === "ativa" ||
      item.status === "ativo" ||
      item.status === undefined;

    if(!publicado) return false;

    if(categoria && cat !== categoria) return false;

    if(busca){
      const texto = n(`${titulo} ${desc} ${cat} ${campeonato} ${time}`);
      if(!texto.includes(busca)) return false;
    }

    return true;
  }).sort((a,b)=>dataOrdenacao(b) - dataOrdenacao(a));
}

function atualizarTopo(lista){
  const categoria = document.getElementById("filtroCategoria").value;

  document.getElementById("tagTotal").innerText = `Notícias: ${lista.length}`;
  document.getElementById("tagCategoria").innerText = `Categoria: ${categoria || "Todas"}`;
  document.getElementById("tituloPagina").innerText =
    `Notícias${categoria ? " - " + categoria : ""}`;
}

function render(){
  const box = document.getElementById("listaNoticias");
  const lista = noticiasFiltradas();

  atualizarTopo(lista);

  if(!noticias.length){
    box.innerHTML = `<div class="vazio">Nenhuma notícia cadastrada no Firebase.</div>`;
    return;
  }

  if(!lista.length){
    box.innerHTML = `<div class="vazio">Nenhuma notícia encontrada.</div>`;
    return;
  }

  box.innerHTML = lista.map(item=>{
    const titulo = val(item,["titulo","title"],"Sem título");
    const desc = val(item,["descricao","resumo","subtitulo"],"");
    const img = val(item,["imagem","foto","capa","image"],"hero-liga.jpeg");
    const cat = val(item,["categoria","tipo","categoriaNoticia"],"Notícia");
    const autor = val(item,["autor","publicadoPor","admin"],"Liga Goiana");
    const data = formatarData(val(item,["publicadaEm","criadoEm","data","atualizadoEm"],""));

    return `
      <article class="card-noticia">
        <div class="img-box">
          <img src="${img}" onerror="this.src='hero-liga.jpeg'">
          <div class="badge">${cat}</div>
        </div>

        <div class="card-body">
          <div class="noticia-titulo">${titulo}</div>

          <div class="noticia-desc">
            ${desc || "Clique para visualizar a notícia completa."}
          </div>

          <div class="noticia-meta">
            <span><i class="fa-regular fa-calendar"></i> ${data}</span>
            <span><i class="fa-solid fa-user"></i> ${autor}</span>
          </div>

          <a class="btn-ver" href="noticia.html?id=${encodeURIComponent(item.id)}">
            <i class="fa-solid fa-eye"></i> Ver notícia
          </a>
        </div>
      </article>
    `;
  }).join("");
}

document.getElementById("busca").addEventListener("input",render);
document.getElementById("filtroCategoria").addEventListener("change",render);

onSnapshot(collection(db,"noticias"),snap=>{
  noticias = snap.docs.map(d=>({id:d.id,...d.data()}));
  preencherCategorias();
  render();
});
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notícia - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --gold-line:rgba(247,198,0,.45);
  --shadow:0 14px 34px rgba(0,0,0,.38);

}

*{margin:0;padding:0;box-sizing:border-box}

body{

    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
}

a{text-decoration:none;color:inherit}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.noticia{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid var(--gold-line);
  border-radius:20px;
  overflow:hidden;
  box-shadow:var(--shadow);
}

.capa{
  width:100%;
  height:360px;
  object-fit:cover;

}

.conteudo{
  padding:22px;
}

.badge{
  display:inline-flex;

  color:#111;
  padding:6px 10px;
  border-radius:999px;

  color:var(--gold);

}

  display:flex;
  gap:8px;
  flex-wrap:wrap;
  color:var(--muted);
  font-size:12px;

}

  background:rgba(26,63,115,.9);
  border:1px solid rgba(255,255,255,.08);

}

  color:#fff;

}

.btn-gold{

@media(max-width:700px){
  .capa{
    height:230px;
  }

  h1{
    font-size:25px;

  .conteudo{

  .acoes{

  }

<body>

<main class="wrap container" id="app">
  <div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando notícia...</div>
</main>

<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("noticias");

const app = document.getElementById("app");
const id = new URLSearchParams(location.search).get("id");

function val(obj,chaves,f=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== ""){
      return obj[c];
    }
  }
  return f;
}

function formatarData(valor){
  if(!valor) return "-";

  if(typeof valor.toDate === "function"){
    valor = valor.toDate();
  }

  const data = new Date(valor);

  if(isNaN(data.getTime())){
    return String(valor);
  }

  return data.toLocaleDateString("pt-BR", {
    day:"2-digit",
    month:"2-digit",
    year:"numeric"
  });
}

window.compartilharWhats = function(){
  const texto = `Notícia da Liga Goiana de Futebol de Base: ${location.href}`;
  window.open("https://wa.me/?text=" + encodeURIComponent(texto), "_blank");
};

window.copiarLink = function(){
  navigator.clipboard.writeText(location.href);
  alert("Link copiado!");
};

async function carregar(){
  if(!id){
    app.innerHTML = `<div class="vazio">Notícia não informada.</div>`;
    return;
  }

  const snap = await getDoc(doc(db,"noticias",id));

  if(!snap.exists()){
    app.innerHTML = `<div class="vazio">Notícia não encontrada.</div>`;
    return;
  }

  const noticia = { id:snap.id, ...snap.data() };

  const publicado =
    noticia.publicado === true ||
    noticia.publica === true ||
    noticia.status === "publicado" ||
    noticia.status === "ativa" ||
    noticia.status === "ativo" ||
    noticia.status === undefined;

  if(!publicado){
    app.innerHTML = `<div class="vazio">Esta notícia ainda não está publicada.</div>`;
    return;
  }

  const titulo = val(noticia,["titulo","title"],"Sem título");
  const resumo = val(noticia,["descricao","resumo","subtitulo"],"");
  const conteudo = val(noticia,["conteudo","texto","materia","body"],resumo);
  const img = val(noticia,["imagem","foto","capa","image"],"hero-liga.jpeg");
  const cat = val(noticia,["categoria","tipo","categoriaNoticia"],"Notícia");
  const autor = val(noticia,["autor","publicadoPor","admin"],"Liga Goiana");
  const data = formatarData(val(noticia,["publicadaEm","criadoEm","data","atualizadoEm"],""));

  document.title = `${titulo} - LIGA GOIANA DE FUTEBOL DE BASE`;

  app.innerHTML = `
    <article class="noticia">
      <img class="capa" src="${img}" onerror="this.src='hero-liga.jpeg'">

      <div class="conteudo">
        <div class="badge">${cat}</div>

        <h1>${titulo}</h1>

        <div class="meta">
          <span><i class="fa-regular fa-calendar"></i> ${data}</span>
          <span><i class="fa-solid fa-user"></i> ${autor}</span>
        </div>

        ${resumo ? `<div class="resumo">${resumo}</div>` : ""}

        <div class="texto">${conteudo}</div>

        <div class="acoes">
          <a class="btn btn-gold" href="noticias.html">
            <i class="fa-solid fa-arrow-left"></i> Notícias
          </a>

          <button class="btn btn-wpp" onclick="compartilharWhats()">
            <i class="fa-brands fa-whatsapp"></i> WhatsApp
          </button>

          <button class="btn btn-blue" onclick="copiarLink()">
            <i class="fa-solid fa-link"></i> Copiar Link
          </button>
        </div>
      </div>
    </article>
  `;
}

carregar();
</script>

</body>
</html>
