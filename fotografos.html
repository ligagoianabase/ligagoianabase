<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fotógrafos - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  min-height:100%;
  overflow-x:hidden;
}

body{
  font-family:Arial,sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
}

a{text-decoration:none;color:inherit}
button,input,select{font-family:inherit}
button{cursor:pointer;border:none}
img{display:block;max-width:100%}

.wrap{
  width:min(100% - 28px,var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

.hero-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:12px;
}

.hero-tag{
  background:rgba(26,63,115,.9);
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 220px;
  gap:10px;
  margin-bottom:14px;
}

input,select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
  outline:none;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
}

.titulo-secao{
  color:var(--gold);
  font-size:22px;
  font-weight:900;
  margin:0 0 12px;
}

.lista-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
}

.foto-card{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.12), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  transition:.25s ease;
}

.foto-card:hover{
  transform:translateY(-2px);
  border-color:var(--gold);
}

.perfil-top{
  padding:16px;
  text-align:center;
}

.avatar{
  width:105px;
  height:105px;
  border-radius:50%;
  object-fit:cover;
  background:#fff;
  border:3px solid var(--gold);
  margin:0 auto 10px;
}

.foto-card strong{
  display:block;
  color:#fff;
  font-size:18px;
  font-weight:900;
  margin-bottom:5px;
}

.foto-card p{
  color:var(--muted);
  font-size:12px;
  line-height:1.5;
}

.badges{
  display:flex;
  gap:5px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:8px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  background:rgba(247,198,0,.12);
  border:1px solid var(--gold-line);
  color:var(--gold);
  padding:5px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
}

.album-mini{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
  padding:0 12px 12px;
}

.album-mini img,
.album-mini video{
  width:100%;
  height:70px;
  object-fit:cover;
  border-radius:8px;
  background:#fff;
}

.card-actions{
  display:grid;
  grid-template-columns:1fr 42px 42px;
  gap:8px;
  padding:12px;
  border-top:1px solid rgba(255,255,255,.08);
}

.btn{
  min-height:40px;
  border-radius:11px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:13px;
}

.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111}
.btn-wpp{background:#25d366;color:#fff}
.btn-blue{background:#1a3f73;color:#fff}
.btn-gray{background:#4b5563;color:#fff}

.perfil-detalhe{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:18px;
  box-shadow:var(--shadow);
}

.detalhe-head{
  display:grid;
  grid-template-columns:150px 1fr;
  gap:18px;
  align-items:center;
  margin-bottom:18px;
}

.detalhe-head .avatar{
  width:140px;
  height:140px;
  margin:0;
}

.detalhe-head h2{
  color:var(--gold);
  font-size:30px;
  margin-bottom:7px;
}

.detalhe-head p{
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}

.detalhe-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}

.albuns-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.album-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  overflow:hidden;
}

.album-card img{
  width:100%;
  height:150px;
  object-fit:cover;
  background:#fff;
}

.album-body{
  padding:12px;
}

.album-body strong{
  color:#fff;
  font-size:14px;
  line-height:1.25;
}

.album-body p{
  color:var(--muted);
  font-size:11px;
  margin-top:6px;
  line-height:1.45;
}

.vazio{
  color:var(--muted);
  text-align:center;
  padding:18px;
  background:rgba(7,29,55,.9);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  grid-column:1/-1;
}

@media(max-width:1100px){
  .lista-grid,.albuns-grid{grid-template-columns:repeat(3,1fr)}
}

@media(max-width:900px){
  .lista-grid,.albuns-grid{grid-template-columns:repeat(2,1fr)}
  .filtros{grid-template-columns:1fr}
  .hero h2{font-size:22px}
  .detalhe-head{grid-template-columns:1fr;text-align:center}
  .detalhe-head .avatar{margin:0 auto}
}

@media(max-width:520px){
  .lista-grid,.albuns-grid{grid-template-columns:1fr}
  .card-actions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<main class="wrap container">

  <section class="hero">
    <h2>Fotógrafos</h2>
    <p>Fotógrafos cadastrados e aprovados na Liga Goiana de Futebol de Base.</p>

    <div class="hero-tags">
      <div class="hero-tag" id="tagTotal">Fotógrafos: 0</div>
      <div class="hero-tag" id="tagCidade">Cidade: Todas</div>
      <div class="hero-tag">Perfis aprovados</div>
    </div>
  </section>

  <section class="filtros" id="filtrosBox">
    <input id="busca" placeholder="Pesquisar fotógrafo, cidade, Instagram ou especialidade...">

    <select id="filtroCidade">
      <option value="">Todas cidades</option>
    </select>
  </section>

  <h2 class="titulo-secao" id="tituloPagina">Fotógrafos</h2>

  <section id="conteudoFotografos" class="lista-grid">
    <div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando fotógrafos...</div>
  </section>

</main>

<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import {
  collection,
  onSnapshot,
  getDocs,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("fotografos");

const idUrl = new URLSearchParams(location.search).get("id");
let fotografos = [];
let galerias = [];

function el(id){return document.getElementById(id)}

function n(txt){
  return String(txt || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function val(obj,chaves,f=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== ""){
      return obj[c];
    }
  }
  return f;
}

function aprovado(f){
  const status = n(val(f,["status","situacao"],"aprovado"));
  return f.aprovado === true ||
    f.autorizado === true ||
    status === "aprovado" ||
    status === "ativo" ||
    status === "";
}

function nomeFotografo(f){
  return val(f,["nome","nomeCompleto","displayName"],"Fotógrafo");
}

function fotoPerfil(f){
  return val(f,["foto","fotoPerfil","avatar","imagem"],"logo-liga.jfif");
}

function cidadeFotografo(f){
  return val(f,["cidade","municipio","local"],"-");
}

function telefoneLimpo(v){
  return String(v || "").replace(/\D/g,"");
}

function linkInstagram(v){
  if(!v) return "";
  if(String(v).startsWith("http")) return v;
  return "https://instagram.com/" + String(v).replace("@","");
}

function galeriasDoFotografo(f){
  const uid = f.uid || f.id;
  const nome = n(nomeFotografo(f));

  return galerias.filter(g=>{
    const statusOk = g.aprovado === true || g.publicado === true || g.status === "aprovado";
    if(!statusOk) return false;

    const gUid = g.fotografoUid || g.criadoPorUid || "";
    const gNome = n(g.fotografo || g.fotografoNome || g.criadoPorNome || "");

    return (uid && gUid === uid) || (nome && gNome === nome);
  });
}

function capaGaleria(g){
  return g.capa || g.imagem || (Array.isArray(g.midias) ? g.midias[0]?.url : "") || "logo-liga.jfif";
}

function preencherCidades(){
  const atual = el("filtroCidade").value;
  const set = new Set();

  fotografos.filter(aprovado).forEach(f=>{
    const cidade = cidadeFotografo(f);
    if(cidade && cidade !== "-") set.add(cidade);
  });

  el("filtroCidade").innerHTML = `<option value="">Todas cidades</option>` +
    [...set].sort((a,b)=>a.localeCompare(b,"pt-BR")).map(c=>`<option value="${c}">${c}</option>`).join("");

  if([...set].includes(atual)) el("filtroCidade").value = atual;
}

function filtrados(){
  const busca = n(el("busca").value);
  const cidade = el("filtroCidade").value;

  return fotografos.filter(f=>{
    if(!aprovado(f)) return false;
    if(cidade && cidadeFotografo(f) !== cidade) return false;

    if(busca){
      const alvo = n(`${nomeFotografo(f)} ${cidadeFotografo(f)} ${f.instagram || ""} ${f.especialidade || ""} ${f.portfolio || ""}`);
      if(!alvo.includes(busca)) return false;
    }

    return true;
  }).sort((a,b)=>nomeFotografo(a).localeCompare(nomeFotografo(b),"pt-BR"));
}

function atualizarTopo(lista){
  el("tagTotal").innerText = `Fotógrafos: ${lista.length}`;
  el("tagCidade").innerText = `Cidade: ${el("filtroCidade").value || "Todas"}`;
}

function renderLista(){
  const lista = filtrados();
  const box = el("conteudoFotografos");
  box.className = "lista-grid";

  atualizarTopo(lista);

  if(!fotografos.length){
    box.innerHTML = `<div class="vazio">Nenhum fotógrafo cadastrado no Firebase.</div>`;
    return;
  }

  if(!lista.length){
    box.innerHTML = `<div class="vazio">Nenhum fotógrafo aprovado encontrado.</div>`;
    return;
  }

  box.innerHTML = lista.map(f=>{
    const albuns = galeriasDoFotografo(f);
    const wpp = telefoneLimpo(val(f,["whatsapp","telefone","celular"],""));
    const insta = linkInstagram(val(f,["instagram"],""));
    const portfolio = val(f,["portfolio","site","linkExterno","link"],"");

    return `
      <article class="foto-card">
        <div class="perfil-top">
          <img class="avatar" src="${fotoPerfil(f)}" onerror="this.src='logo-liga.jfif'">
          <strong>${nomeFotografo(f)}</strong>
          <p>
            ${cidadeFotografo(f)}<br>
            ${val(f,["especialidade","bio","descricao"],"Fotógrafo da Liga Goiana")}
          </p>

          <div class="badges">
            <span class="badge"><i class="fa-solid fa-circle-check"></i> Aprovado</span>
            <span class="badge"><i class="fa-solid fa-images"></i> ${albuns.length} álbum(ns)</span>
          </div>
        </div>

        <div class="album-mini">
          ${
            albuns.slice(0,6).map(g=>`<img src="${capaGaleria(g)}" onerror="this.src='logo-liga.jfif'">`).join("") ||
            `<img src="logo-liga.jfif"><img src="logo-liga.jfif"><img src="logo-liga.jfif">`
          }
        </div>

        <div class="card-actions">
          <a class="btn btn-gold" href="fotografos.html?id=${encodeURIComponent(f.id)}">
            <i class="fa-solid fa-eye"></i> Ver perfil
          </a>

          ${wpp ? `<a class="btn btn-wpp" href="https://wa.me/55${wpp}" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>` : ""}
          ${insta ? `<a class="btn btn-blue" href="${insta}" target="_blank"><i class="fa-brands fa-instagram"></i></a>` : ""}
          ${portfolio ? `<a class="btn btn-gray" href="${portfolio}" target="_blank"><i class="fa-solid fa-globe"></i></a>` : ""}
        </div>
      </article>
    `;
  }).join("");
}

function renderPerfil(f){
  const box = el("conteudoFotografos");
  const albuns = galeriasDoFotografo(f);
  const wpp = telefoneLimpo(val(f,["whatsapp","telefone","celular"],""));
  const insta = linkInstagram(val(f,["instagram"],""));
  const portfolio = val(f,["portfolio","site","linkExterno","link"],"");

  el("filtrosBox").style.display = "none";
  el("tituloPagina").innerText = nomeFotografo(f);
  box.className = "perfil-detalhe";

  box.innerHTML = `
    <div class="detalhe-head">
      <img class="avatar" src="${fotoPerfil(f)}" onerror="this.src='logo-liga.jfif'">

      <div>
        <h2>${nomeFotografo(f)}</h2>
        <p>
          Cidade: ${cidadeFotografo(f)}<br>
          Especialidade: ${val(f,["especialidade"],"Fotografia esportiva")}<br>
          ${val(f,["bio","descricao"],"Fotógrafo cadastrado na Liga Goiana de Futebol de Base.")}
        </p>

        <div class="badges" style="justify-content:flex-start">
          <span class="badge"><i class="fa-solid fa-certificate"></i> Fotógrafo cadastrado</span>
          <span class="badge"><i class="fa-solid fa-images"></i> ${albuns.length} álbum(ns)</span>
        </div>

        <div class="detalhe-actions">
          <a class="btn btn-gold" href="fotografos.html"><i class="fa-solid fa-arrow-left"></i> Fotógrafos</a>
          ${wpp ? `<a class="btn btn-wpp" href="https://wa.me/55${wpp}" target="_blank"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>` : ""}
          ${insta ? `<a class="btn btn-blue" href="${insta}" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram</a>` : ""}
          ${portfolio ? `<a class="btn btn-gray" href="${portfolio}" target="_blank"><i class="fa-solid fa-globe"></i> Portfólio</a>` : ""}
        </div>
      </div>
    </div>

    <h2 class="titulo-secao">Fotos publicadas</h2>

    <div class="albuns-grid">
      ${
        albuns.length
        ? albuns.map(g=>`
          <article class="album-card">
            <img src="${capaGaleria(g)}" onerror="this.src='logo-liga.jfif'">
            <div class="album-body">
              <strong>${g.titulo || "Álbum"}</strong>
              <p>
                ${g.campeonato || "-"}<br>
                ${g.categoria || "-"}<br>
                ${g.data || ""}
              </p>
              <div style="margin-top:10px">
                <a class="btn btn-gold" href="galeria.html?id=${encodeURIComponent(g.id)}">
                  <i class="fa-solid fa-images"></i> Ver álbum
                </a>
              </div>
            </div>
          </article>
        `).join("")
        : `<div class="vazio">Este fotógrafo ainda não possui álbuns publicados.</div>`
      }
    </div>
  `;
}

async function carregarPerfilPorId(){
  try{
    const snap = await getDoc(doc(db,"fotografos",idUrl));

    let f = null;

    if(snap.exists()){
      f = {id:snap.id,...snap.data()};
    }else{
      const alt = fotografos.find(x=>x.id === idUrl);
      if(alt) f = alt;
    }

    if(!f || !aprovado(f)){
      el("conteudoFotografos").innerHTML = `<div class="vazio">Fotógrafo não encontrado ou ainda não aprovado.</div>`;
      return;
    }

    renderPerfil(f);
  }catch(e){
    console.error(e);
    el("conteudoFotografos").innerHTML = `<div class="vazio">Erro ao carregar fotógrafo.</div>`;
  }
}

async function carregarDados(){
  const snapFotografos = await getDocs(collection(db,"fotografos"));
  fotografos = snapFotografos.docs.map(d=>({id:d.id,uid:d.id,...d.data()}));

  const snapUsuarios = await getDocs(collection(db,"usuarios"));
  snapUsuarios.forEach(d=>{
    const u = {id:d.id,uid:d.id,...d.data()};
    const tipo = n(val(u,["tipo","tipoUsuario","perfil","funcao"],""));
    if(tipo.includes("fotografo") || tipo.includes("fotógrafo") || u.fotografo === true){
      if(!fotografos.some(f=>f.id === u.id)) fotografos.push(u);
    }
  });

  const snapGaleria = await getDocs(collection(db,"galeria"));
  galerias = snapGaleria.docs.map(d=>({id:d.id,...d.data()}));

  if(idUrl){
    carregarPerfilPorId();
  }else{
    preencherCidades();
    renderLista();
  }
}

document.getElementById("busca").addEventListener("input",renderLista);
document.getElementById("filtroCidade").addEventListener("change",renderLista);

carregarDados();
</script>

</body>
</html>
