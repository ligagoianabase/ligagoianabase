<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhas Súmulas - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --azul:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#fff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --green:#159447;
  --blue:#1a3f73;
  --yellow:#7a5a00;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88),rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

.wrap{
  width:min(100% - 28px,var(--max));
  margin:auto;
}

.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid rgba(247,198,0,.35);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.card{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.12), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:16px;
  padding:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.status{
  display:inline-flex;
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  margin-bottom:10px;
}

.finalizada{background:var(--green)}
.andamento{background:var(--blue)}
.pendente{background:var(--yellow)}

.card h3{
  color:var(--gold);
  font-size:18px;
  margin-bottom:10px;
}

.placar{
  font-size:28px;
  font-weight:900;
  margin-bottom:10px;
}

.info{
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:14px;
}

.btn{
  padding:10px;
  border-radius:10px;
  font-size:12px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  text-decoration:none;
}

.btn-blue{
  background:#1a3f73;
  color:#fff;
}

.btn-gold{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

@media(max-width:1100px){
  .grid{grid-template-columns:repeat(3,1fr)}
}

@media(max-width:800px){
  .grid{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:500px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<main class="wrap container">

<section class="hero">
<h2>Minhas Súmulas</h2>
<p>Jogos vinculados ao árbitro/admin para preencher, finalizar ou visualizar a súmula.</p>
</section>

<section class="grid">

<article class="card">
<span class="status andamento">Em andamento</span>
<h3>Time A x Time B</h3>
<div class="placar">0 x 0</div>

<div class="info">
Campeonato Liga Goiana<br>
Sub-17 • 11/05/2026<br>
Estádio Municipal<br>
Árbitro: João Silva
</div>

<div class="actions">
<a class="btn btn-blue" href="#"><i class="fa-solid fa-pen"></i> Abrir</a>
<a class="btn btn-gold" href="#"><i class="fa-solid fa-eye"></i> Pública</a>
</div>
</article>

</section>

</main>

</body>
</html>
