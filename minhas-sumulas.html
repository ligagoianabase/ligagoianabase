<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhas Súmulas - Liga Goiana</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">
<style>
:root{--bg:#061427;--card:#071d37;--gold:#f7c600;--gold2:#ffe45c;--white:#fff;--muted:#cbd6ea;--line:rgba(255,255,255,.12);--green:#159447;--blue:#1a3f73;--red:#d94141;--shadow:0 14px 34px rgba(0,0,0,.38);--max:1180px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:linear-gradient(rgba(2,8,20,.88),rgba(2,8,20,.96)),url("fundo.png") center/cover fixed no-repeat;color:#fff;min-height:100vh;overflow-x:hidden}a{text-decoration:none;color:inherit}.wrap{width:min(100% - 28px,var(--max));margin:0 auto}.container{padding:22px 0 34px}.hero,.card{background:linear-gradient(135deg,rgba(16,42,82,.96),rgba(8,23,44,.96));border:1px solid rgba(247,198,0,.35);border-radius:18px;box-shadow:var(--shadow);padding:18px;margin-bottom:14px}.hero h2{color:var(--gold);font-size:28px;margin-bottom:6px}.hero p{color:var(--muted);line-height:1.5}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.sumula-card{background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:14px;padding:14px}.sumula-card h3{font-size:18px;color:var(--gold);margin-bottom:8px}.info{color:var(--muted);font-size:13px;line-height:1.55}.placar{font-size:24px;font-weight:1000;color:#fff;margin:10px 0}.status{display:inline-flex;border-radius:999px;padding:5px 9px;font-weight:900;font-size:11px;margin-bottom:9px}.finalizada{background:var(--green)}.andamento{background:var(--blue)}.pendente{background:#a16207}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:10px;border-radius:10px;font-weight:900;font-size:12px}.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111}.btn-blue{background:var(--blue);color:#fff}.vazio{text-align:center;color:var(--muted);padding:18px}
</style>
</head>
<body>
<script type="module">
import { renderMenu } from "./menu.js";
renderMenu("sumulas");
</script>

<main class="wrap container">
  <section class="hero">
    <h2>Minhas Súmulas</h2>
    <p>Jogos vinculados ao árbitro/admin para preencher, finalizar ou visualizar a súmula.</p>
  </section>
  <section class="grid" id="lista"><div class="card vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando...</div></section>
</main>

<script type="module">
import { db, auth } from "./firebase.js";
import { collection, onSnapshot, getDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

let user = null;
let perfil = null;
let jogos = [];
let sumulas = [];
const lista = document.getElementById("lista");

function campo(o,ks,p=""){for(const k of ks){if(o&&o[k]!==undefined&&o[k]!==null&&o[k]!=="")return o[k]}return p}
function norm(v){return String(v||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
function nomeTime(v,f){return v&&typeof v==="object"?campo(v,["nome","nomeTime","time"],f):(v||f)}
function finalizada(s){const st=norm(campo(s,["status","sumulaStatus"],""));return s?.sumulaFinalizada===true||s?.finalizada===true||s?.publica===true||st.includes("final")}
function ehAdmin(){const t=norm(campo(perfil,["tipo","perfil","cargo","role","nivel"],""));return perfil?.admin===true||t.includes("admin")}
function pertence(j){
  if(ehAdmin()) return true;
  if(!user) return false;
  const uid = String(user.uid||"");
  const email = norm(user.email||"");
  const ids = [campo(j,["arbitroId"],""),campo(j,["arbitroUid"],""),campo(j,["arbitroUsuarioId"],""),campo(j.arbitroObj,["id","uid","usuarioId"],"")].map(String);
  const emails = [campo(j,["arbitroEmail"],""),campo(j.arbitroObj,["email","gmail"],"")].map(norm);
  return ids.includes(uid) || emails.includes(email);
}
function pegarSumula(id){return sumulas.find(s=>String(s.id)===String(id)||String(s.jogoId)===String(id))||{}}
function dataBR(v){if(!v)return "-";if(typeof v.toDate==="function")v=v.toDate();const d=new Date(v);return isNaN(d.getTime())?String(v):d.toLocaleDateString("pt-BR")}
function render(){
  const itens = jogos.filter(pertence).sort((a,b)=>String(campo(b,["data","dataJogo"],"")).localeCompare(String(campo(a,["data","dataJogo"],""))));
  if(!itens.length){lista.innerHTML=`<div class="card vazio">Nenhuma súmula encontrada para você.</div>`;return}
  lista.innerHTML = itens.map(j=>{
    const s = pegarSumula(j.id);
    const fim = finalizada(s) || finalizada(j);
    const stClass = fim ? "finalizada" : (s.id ? "andamento" : "pendente");
    const stText = fim ? "Finalizada" : (s.id ? "Em andamento" : "Pendente");
    const golsA = Number(campo(s,["golsA","placarA"],campo(j,["golsA","placarA"],0)));
    const golsB = Number(campo(s,["golsB","placarB"],campo(j,["golsB","placarB"],0)));
    return `<article class="sumula-card">
      <span class="status ${stClass}">${stText}</span>
      <h3>${nomeTime(j.timeA || campo(j,["timeA","mandante"],""),"Time A")} x ${nomeTime(j.timeB || campo(j,["timeB","visitante"],""),"Time B")}</h3>
      <div class="placar">${golsA} x ${golsB}</div>
      <div class="info">
        ${campo(j,["campeonato","campeonatoNome"],"Campeonato")}<br>
        ${campo(j,["categoria"],"-")} • ${dataBR(campo(j,["data","dataJogo","dataHora"],""))}<br>
        ${campo(j,["local","campo"],"-")}<br>
        Árbitro: ${campo(j,["arbitro","arbitroNome"],"-")}
      </div>
      <div class="actions">
        <a class="btn btn-blue" href="sumula-arbitro.html?id=${encodeURIComponent(j.id)}"><i class="fa-solid fa-pen"></i> Abrir</a>
        <a class="btn btn-gold" href="sumula-publica.html?id=${encodeURIComponent(j.id)}"><i class="fa-solid fa-eye"></i> Pública</a>
      </div>
    </article>`;
  }).join("");
}
async function carregarPerfil(){
  if(!user) return null;
  const refs=[doc(db,"usuarios",user.uid),doc(db,"users",user.uid),doc(db,"arbitros",user.uid),doc(db,"admins",user.uid)];
  for(const r of refs){const s=await getDoc(r);if(s.exists())return{id:s.id,...s.data()}}
  return{id:user.uid,email:user.email||"",nome:user.displayName||""};
}
onAuthStateChanged(auth,async u=>{user=u;perfil=await carregarPerfil();render();});
onSnapshot(collection(db,"jogos"),snap=>{jogos=snap.docs.map(d=>({id:d.id,...d.data()}));render();});
onSnapshot(collection(db,"sumulas"),snap=>{sumulas=snap.docs.map(d=>({id:d.id,...d.data()}));render();});
</script>
</body>
</html>
