<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ranking dos Times - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --muted:#cbd6ea;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.92), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
  min-height:100vh;
}

.container{
  width:min(100% - 24px, 1320px);
  margin:auto;
  padding:22px 0 40px;
}

.topo{
  margin-bottom:20px;
}

.topo h1{
  color:var(--gold);
  font-size:34px;
  margin-bottom:8px;
}

.topo p{
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

.card{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.10), transparent 35%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.25);
  border-radius:18px;
  overflow:hidden;
}

.card-head{
  padding:16px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.card-head h2{
  color:var(--gold);
  font-size:18px;
}

.lista{
  padding:12px;
}

.item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,.04);
  margin-bottom:10px;
}

.pos{
  width:34px;
  height:34px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  flex-shrink:0;
}

.escudo{
  width:54px;
  height:54px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--gold);
  background:#fff;
  flex-shrink:0;
}

.info{
  flex:1;
  min-width:0;
}

.info strong{
  display:block;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.info small{
  display:block;
  color:var(--muted);
  margin-top:4px;
}

.valor{
  color:var(--gold);
  font-size:18px;
  font-weight:900;
}

.vazio{
  text-align:center;
  color:var(--muted);
  padding:18px;
}

@media(max-width:1000px){
  .grid{
    grid-template-columns:1fr 1fr;
  }
}

@media(max-width:700px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="topo">
    <h1>Ranking dos Times</h1>
    <p>Ranking automático baseado nas partidas finalizadas.</p>
  </div>

  <div class="grid">

    <section class="card">
      <div class="card-head">
        <h2><i class="fa-solid fa-fire"></i> Melhor Ataque</h2>
      </div>
      <div class="lista" id="melhorAtaque"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2><i class="fa-solid fa-shield"></i> Melhor Defesa</h2>
      </div>
      <div class="lista" id="melhorDefesa"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2><i class="fa-solid fa-trophy"></i> Mais Vitórias</h2>
      </div>
      <div class="lista" id="vitorias"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2><i class="fa-solid fa-face-frown"></i> Menos Derrotas</h2>
      </div>
      <div class="lista" id="derrotas"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2><i class="fa-solid fa-hand"></i> Mais Disciplinado</h2>
      </div>
      <div class="lista" id="disciplinado"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2><i class="fa-solid fa-chart-line"></i> Aproveitamento</h2>
      </div>
      <div class="lista" id="aproveitamento"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2><i class="fa-solid fa-futbol"></i> Mais Gols</h2>
      </div>
      <div class="lista" id="gols"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2><i class="fa-solid fa-scale-balanced"></i> Saldo de Gols</h2>
      </div>
      <div class="lista" id="saldo"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2><i class="fa-solid fa-users"></i> Jogos</h2>
      </div>
      <div class="lista" id="jogos"></div>
    </section>

  </div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

let times = [];
let jogos = [];
let sumulas = [];

function normalizar(t){
  return String(t || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function finalizado(j){
  return j.finalizado === true ||
    j.encerrado === true ||
    normalizar(j.status) === "finalizado";
}

function criarMapa(){

  const mapa = {};

  times.forEach(t=>{

    mapa[t.id] = {
      id:t.id,
      nome:t.nome || "-",
      escudo:t.escudo || t.logo || "logo-liga.jfif",
      jogos:0,
      vitorias:0,
      derrotas:0,
      empates:0,
      golsPro:0,
      golsContra:0,
      saldo:0,
      amarelos:0,
      vermelhos:0,
      pontos:0
    };
  });

  jogos.filter(finalizado).forEach(j=>{

    const a = j.timeAId || j.timeA || "A";
    const b = j.timeBId || j.timeB || "B";

    if(!mapa[a]){
      mapa[a] = {
        id:a,
        nome:j.timeANome || j.timeA || "Time A",
        escudo:"logo-liga.jfif",
        jogos:0,
        vitorias:0,
        derrotas:0,
        empates:0,
        golsPro:0,
        golsContra:0,
        saldo:0,
        amarelos:0,
        vermelhos:0,
        pontos:0
      };
    }

    if(!mapa[b]){
      mapa[b] = {
        id:b,
        nome:j.timeBNome || j.timeB || "Time B",
        escudo:"logo-liga.jfif",
        jogos:0,
        vitorias:0,
        derrotas:0,
        empates:0,
        golsPro:0,
        golsContra:0,
        saldo:0,
        amarelos:0,
        vermelhos:0,
        pontos:0
      };
    }

    const golsA = Number(j.golsA || j.placarA || 0);
    const golsB = Number(j.golsB || j.placarB || 0);

    mapa[a].jogos++;
    mapa[b].jogos++;

    mapa[a].golsPro += golsA;
    mapa[a].golsContra += golsB;

    mapa[b].golsPro += golsB;
    mapa[b].golsContra += golsA;

    if(golsA > golsB){

      mapa[a].vitorias++;
      mapa[a].pontos += 3;

      mapa[b].derrotas++;

    }else if(golsB > golsA){

      mapa[b].vitorias++;
      mapa[b].pontos += 3;

      mapa[a].derrotas++;

    }else{

      mapa[a].empates++;
      mapa[b].empates++;

      mapa[a].pontos++;
      mapa[b].pontos++;
    }
  });

  sumulas.forEach(s=>{

    (s.cartoes || []).forEach(c=>{

      const time = c.timeId || c.time || "";

      if(!mapa[time]) return;

      if(c.tipo === "amarelo"){
        mapa[time].amarelos++;
      }

      if(c.tipo === "vermelho"){
        mapa[time].vermelhos++;
      }
    });
  });

  Object.values(mapa).forEach(t=>{
    t.saldo = t.golsPro - t.golsContra;

    const totalCartoes =
      t.amarelos + (t.vermelhos * 2);

    t.disciplina = totalCartoes;

    t.aproveitamento =
      t.jogos > 0
        ? Math.round((t.pontos / (t.jogos * 3)) * 100)
        : 0;
  });

  return Object.values(mapa);
}

function renderLista(id,lista,valorFn){

  const box = document.getElementById(id);

  if(!lista.length){
    box.innerHTML = `<div class="vazio">Nenhum dado encontrado.</div>`;
    return;
  }

  box.innerHTML = lista.map((t,i)=>`
    <div class="item">

      <div class="pos">${i + 1}</div>

      <img class="escudo" src="${t.escudo}" onerror="this.src='logo-liga.jfif'">

      <div class="info">
        <strong>${t.nome}</strong>
        <small>${t.jogos} jogos</small>
      </div>

      <div class="valor">
        ${valorFn(t)}
      </div>

    </div>
  `).join("");
}

function render(){

  const lista = criarMapa();

  renderLista(
    "melhorAtaque",
    [...lista].sort((a,b)=>b.golsPro-a.golsPro).slice(0,10),
    t=>t.golsPro
  );

  renderLista(
    "melhorDefesa",
    [...lista].sort((a,b)=>a.golsContra-b.golsContra).slice(0,10),
    t=>t.golsContra
  );

  renderLista(
    "vitorias",
    [...lista].sort((a,b)=>b.vitorias-a.vitorias).slice(0,10),
    t=>t.vitorias
  );

  renderLista(
    "derrotas",
    [...lista].sort((a,b)=>a.derrotas-b.derrotas).slice(0,10),
    t=>t.derrotas
  );

  renderLista(
    "disciplinado",
    [...lista].sort((a,b)=>a.disciplina-b.disciplina).slice(0,10),
    t=>t.disciplina
  );

  renderLista(
    "aproveitamento",
    [...lista].sort((a,b)=>b.aproveitamento-a.aproveitamento).slice(0,10),
    t=>t.aproveitamento + "%"
  );

  renderLista(
    "gols",
    [...lista].sort((a,b)=>b.golsPro-a.golsPro).slice(0,10),
    t=>t.golsPro
  );

  renderLista(
    "saldo",
    [...lista].sort((a,b)=>b.saldo-a.saldo).slice(0,10),
    t=>t.saldo
  );

  renderLista(
    "jogos",
    [...lista].sort((a,b)=>b.jogos-a.jogos).slice(0,10),
    t=>t.jogos
  );
}

onSnapshot(collection(db,"times"),snap=>{
  times = snap.docs.map(d=>({
    id:d.id,
    ...d.data()
  }));

  render();
});

onSnapshot(collection(db,"jogos"),snap=>{
  jogos = snap.docs.map(d=>({
    id:d.id,
    ...d.data()
  }));

  render();
});

onSnapshot(collection(db,"sumulas"),snap=>{
  sumulas = snap.docs.map(d=>({
    id:d.id,
    ...d.data()
  }));

  render();
});

</script>

</body>
</html>
