<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula Oficial - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0b1f3a;
  --card:#102a52;
  --gold:#f7c600;
  --white:#fff;
}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(rgba(0,0,0,.8), rgba(0,0,0,.9)), url("fundo.png");
  color:#fff;
}

/* HEADER FIFA */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  border-bottom:3px solid var(--gold);
  background:#08172c;
}

.logo{
  height:60px;
}

.titulo{
  text-align:center;
  font-weight:bold;
  font-size:22px;
  color:var(--gold);
}

/* INFO JOGO */
.info-jogo{
  text-align:center;
  padding:15px;
}

.placar{
  font-size:32px;
  font-weight:bold;
  margin-top:10px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}
.time{
  background:var(--card);
  padding:15px;
  border-radius:10px;
}

.time h2{
  color:var(--gold);
}

.jogador{
  display:flex;
  gap:10px;
  margin-bottom:8px;
}

.jogador input{
  padding:8px;
  border:none;
  border-radius:6px;
}

/* EVENTOS */
.eventos{
  grid-column:1 / -1;
  background:var(--card);
  padding:15px;
  border-radius:10px;
}
.btn{
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.gol{background:green;}
.amarelo{background:gold;color:black;}
.vermelho{background:red;}

.obs{
  width:100%;
  height:120px;
  margin-top:10px;
  padding:10px;
}

.finalizar{
  background:var(--gold);
  color:black;
  width:100%;
  margin-top:15px;
}
</style>
</head>
<body>

<div class="header">
  <img src="logo-liga.jfif" class="logo">

  <div class="titulo">
    SÚMULA OFICIAL
  </div>

  <img id="logoCampeonato" src="logo-campeonato.png" class="logo">
</div>

<div class="info-jogo">
  <div id="dadosJogo"></div>
  <div class="placar" id="placar">0 x 0</div>
</div>
<div class="container">

  <!-- TIME A -->
  <div class="time">
    <h2 id="timeA">Time A</h2>

    <div id="listaA"></div>

    <button onclick="addJogador('A')">+ Jogador</button>
  </div>

  <!-- TIME B -->
  <div class="time">
    <h2 id="timeB">Time B</h2>

    <div id="listaB"></div>

    <button onclick="addJogador('B')">+ Jogador</button>
  </div>
<div class="eventos">

    <button class="btn gol" onclick="addEvento('gol')">⚽ Gol</button>
    <button class="btn amarelo" onclick="addEvento('amarelo')">🟨 Amarelo</button>
    <button class="btn vermelho" onclick="addEvento('vermelho')">🟥 Vermelho</button>

    <div id="listaEventos"></div>

    <textarea class="obs" id="obs" placeholder="Observações do árbitro"></textarea>

    <button class="btn finalizar" onclick="finalizar()">FINALIZAR SÚMULA</button>

  </div>

</div>
<script type="module">
import { db, auth } from "./firebase.js";
import { doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let jogoId = new URLSearchParams(window.location.search).get("id");

let jogadoresA = [];
let jogadoresB = [];
let eventos = [];
let jogoAtual = null;
function render(lado){
  const lista = document.getElementById(lado === "A" ? "listaA" : "listaB");
  const jogadores = lado === "A" ? jogadoresA : jogadoresB;

  lista.innerHTML = "";

  jogadores.forEach((j,i)=>{
    lista.innerHTML += `
      <div class="jogador">
        <input placeholder="Número" onchange="setNum('${lado}',${i},this.value)">
        <span>${j.nome}</span>
      </div>
    `;
  });
}

window.addJogador = function(lado){
  const nome = prompt("Nome do jogador");
  if(!nome) return;

  if(lado==="A") jogadoresA.push({nome});
  else jogadoresB.push({nome});

  render(lado);
};

window.setNum = function(lado,i,v){
  if(lado==="A") jogadoresA[i].numero = v;
  else jogadoresB[i].numero = v;
};
window.addEvento = function(tipo){
  const numero = prompt("Número do jogador");
  if(!numero) return;

  eventos.push({tipo,numero});

  atualizarPlacar();
};

function atualizarPlacar(){
  let a=0,b=0;

  eventos.forEach(e=>{
    if(e.tipo==="gol"){
      if(confirm("Foi do time A?")) a++;
      else b++;
    }
  });

  document.getElementById("placar").innerText = `${a} x ${b}`;
}
window.finalizar = async function(){

  const dados = {
    jogoId,
    jogadoresA,
    jogadoresB,
    eventos,
    observacoes: document.getElementById("obs").value,
    status:"finalizada",
    data:new Date().toISOString()
  };

  await setDoc(doc(db,"sumulas",jogoId),dados);

  await updateDoc(doc(db,"jogos",jogoId),{
    status:"sumula_enviada"
  });

  alert("Súmula finalizada!");
};

async function init(){
  const snap = await getDoc(doc(db,"jogos",jogoId));
  jogoAtual = snap.data();

  document.getElementById("timeA").innerText = jogoAtual.timeA;
  document.getElementById("timeB").innerText = jogoAtual.timeB;

  document.getElementById("dadosJogo").innerText =
    `${jogoAtual.campeonato} | ${jogoAtual.categoria} | ${jogoAtual.data} | ${jogoAtual.local}`;
}

init();
</script>

</body>
</html>
