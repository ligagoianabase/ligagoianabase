<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula Oficial - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0b1f3a;
  --bg-dark:#08172c;
  --card:#102a52;
  --card-2:#0d2346;
  --gold:#f7c600;
  --gold-2:#ffe45c;
  --gold-soft:rgba(247,198,0,.12);
  --gold-line:rgba(247,198,0,.28);
  --white:#fff;
  --muted:#d8e1ef;
  --danger:#d72638;
  --green:#1f9d55;
  --shadow:0 14px 34px rgba(0,0,0,.35);
  --radius:18px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(3,12,29,.88), rgba(3,12,29,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
}

button,input,textarea{font-family:inherit;}

.page{
  width:min(100% - 24px, 1180px);
  margin:0 auto;
  padding:18px 0 28px;
}

.header{
  background:linear-gradient(180deg, rgba(8,23,44,.98), rgba(3,12,29,.98));
  border:1px solid var(--gold-line);
  border-bottom:3px solid var(--gold);
  border-radius:0 0 24px 24px;
  box-shadow:var(--shadow);
  padding:16px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:16px;
}

.logo{
  width:72px;
  height:72px;
  object-fit:cover;
  border-radius:18px;
  border:2px solid var(--gold);
  background:#fff;
}

.titulo{text-align:center;}

.titulo strong{
  display:block;
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  letter-spacing:.8px;
}

.titulo span{
  display:block;
  margin-top:5px;
  color:var(--muted);
  font-size:14px;
  font-weight:700;
}

.info-jogo{
  margin:18px 0;
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 32%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:24px;
  padding:22px;
  text-align:center;
  box-shadow:var(--shadow);
}

#dadosJogo{
  color:var(--muted);
  font-size:15px;
  line-height:1.6;
  font-weight:700;
}

.placar{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:190px;
  margin-top:16px;
  padding:14px 26px;
  border-radius:20px;
  background:rgba(3,12,29,.72);
  border:1px solid var(--gold-line);
  color:var(--gold);
  font-size:42px;
  font-weight:900;
  box-shadow:0 12px 28px rgba(0,0,0,.28);
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.time,.eventos{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  padding:20px;
  border-radius:var(--radius);
  border:1px solid rgba(247,198,0,.18);
  box-shadow:var(--shadow);
}

.time-head{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.time-logo{
  width:54px;
  height:54px;
  border-radius:14px;
  object-fit:cover;
  background:#fff;
  border:2px solid var(--gold);
}

.time h2,.eventos h2{
  color:var(--gold);
  font-size:22px;
  font-weight:900;
  display:flex;
  align-items:center;
  gap:10px;
}

.lista{
  display:flex;
  flex-direction:column;
  gap:10px;
  min-height:120px;
  margin-bottom:14px;
}

.jogador{
  display:grid;
  grid-template-columns:88px 1fr;
  align-items:center;
  gap:10px;
  background:rgba(3,12,29,.55);
  border:1px solid rgba(255,255,255,.08);
  padding:10px;
  border-radius:14px;
}

.jogador input{
  width:100%;
  padding:10px;
  border:none;
  outline:none;
  border-radius:10px;
  background:#fff;
  color:#111;
  font-weight:800;
  text-align:center;
}

.jogador span{
  font-weight:800;
  color:#fff;
  line-height:1.4;
}

.btn-add{
  width:100%;
  background:linear-gradient(135deg, var(--gold), var(--gold-2));
  color:#111;
  padding:12px 16px;
  border:none;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
}

.eventos{grid-column:1 / -1;}

.eventos-top{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:16px 0;
}

.btn{
  padding:12px 16px;
  border:none;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  color:#fff;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.gol{background:var(--green);}
.amarelo{background:var(--gold);color:#111;}
.vermelho{background:var(--danger);}

#listaEventos{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin:12px 0;
}

.evento-item{
  background:rgba(3,12,29,.55);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
  color:var(--muted);
  font-weight:700;
}

.obs{
  width:100%;
  min-height:130px;
  resize:vertical;
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(3,12,29,.65);
  color:#fff;
  outline:none;
  font-size:15px;
}

.finalizar{
  background:linear-gradient(135deg, var(--gold), var(--gold-2));
  color:#111;
  width:100%;
  margin-top:14px;
  padding:15px;
  border-radius:16px;
  font-size:16px;
}

@media(max-width:900px){
  .container{grid-template-columns:1fr;}
  .placar{font-size:36px;}
}

@media(max-width:600px){
  .page{width:min(100% - 18px, 1180px);padding-top:10px;}

  .header{
    grid-template-columns:60px 1fr 60px;
    gap:8px;
    padding:12px;
    border-radius:0 0 18px 18px;
  }

  .logo{width:54px;height:54px;border-radius:14px;}

  .titulo strong{font-size:18px;line-height:1.15;}
  .titulo span{font-size:11px;}

  .info-jogo{padding:18px;border-radius:20px;}
  #dadosJogo{font-size:13px;}

  .placar{
    font-size:30px;
    min-width:150px;
    padding:12px 20px;
  }

  .time,.eventos{padding:16px;border-radius:18px;}
  .time h2,.eventos h2{font-size:19px;}
  .jogador{grid-template-columns:74px 1fr;}
  .eventos-top{flex-direction:column;}
  .btn{width:100%;}
}
</style>
</head>

<body>

<div class="page">

  <div class="header">
    <img src="logo-liga.jfif" class="logo">

    <div class="titulo">
      <strong>SÚMULA OFICIAL</strong>
      <span>Liga Goiana de Futebol de Base</span>
    </div>

    <img id="logoCampeonato" src="logo-liga.jfif" class="logo" onerror="this.src='logo-liga.jfif'">
  </div>

  <div class="info-jogo">
    <div id="dadosJogo">Carregando dados do jogo...</div>
    <div class="placar" id="placar">0 x 0</div>
  </div>

  <div class="container">

    <div class="time">
      <div class="time-head">
        <img id="logoTimeA" src="logo-liga.jfif" class="time-logo">
        <h2 id="timeA">Time A</h2>
      </div>

      <div id="listaA" class="lista"></div>

      <button class="btn-add" onclick="addJogador('A')">
        <i class="fa-solid fa-user-plus"></i> Adicionar Jogador
      </button>
    </div>

    <div class="time">
      <div class="time-head">
        <img id="logoTimeB" src="logo-liga.jfif" class="time-logo">
        <h2 id="timeB">Time B</h2>
      </div>

      <div id="listaB" class="lista"></div>

      <button class="btn-add" onclick="addJogador('B')">
        <i class="fa-solid fa-user-plus"></i> Adicionar Jogador
      </button>
    </div>

    <div class="eventos">
      <h2><i class="fa-solid fa-clipboard-list"></i> Eventos da Partida</h2>

      <div class="eventos-top">
        <button class="btn gol" onclick="addEvento('gol')">⚽ Gol</button>
        <button class="btn amarelo" onclick="addEvento('amarelo')">🟨 Amarelo</button>
        <button class="btn vermelho" onclick="addEvento('vermelho')">🟥 Vermelho</button>
      </div>

      <div id="listaEventos"></div>

      <textarea class="obs" id="obs" placeholder="Observações do árbitro"></textarea>

      <button class="btn finalizar" onclick="finalizar()">
        <i class="fa-solid fa-check"></i> FINALIZAR SÚMULA
      </button>
    </div>

  </div>
</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let jogoId = new URLSearchParams(window.location.search).get("id");

let jogadoresA = [];
let jogadoresB = [];
let eventos = [];
let jogoAtual = null;

function campo(valor, fallback = ""){
  if(valor === undefined || valor === null || valor === "") return fallback;
  return valor;
}

function render(lado){
  const lista = document.getElementById(lado === "A" ? "listaA" : "listaB");
  const jogadores = lado === "A" ? jogadoresA : jogadoresB;

  lista.innerHTML = "";

  jogadores.forEach((j,i)=>{
    lista.innerHTML += `
      <div class="jogador">
        <input placeholder="Nº" value="${j.numero || ""}" onchange="setNum('${lado}',${i},this.value)">
        <span>${j.nome}</span>
      </div>
    `;
  });
}

function renderEventos(){
  const lista = document.getElementById("listaEventos");

  if(!eventos.length){
    lista.innerHTML = "";
    return;
  }

  lista.innerHTML = eventos.map((e, i) => {
    let icone = "📌";
    let time = e.lado === "A" ? jogoAtual?.timeA : jogoAtual?.timeB;

    if(e.tipo === "gol") icone = "⚽";
    if(e.tipo === "amarelo") icone = "🟨";
    if(e.tipo === "vermelho") icone = "🟥";

    return `<div class="evento-item">${icone} ${e.tipo.toUpperCase()} - Camisa ${e.numero} - ${time || "-"}</div>`;
  }).join("");
}

window.addJogador = function(lado){
  const nome = prompt("Nome do jogador");
  if(!nome) return;

  if(lado==="A") jogadoresA.push({nome});
  else jogadoresB.push({nome});

  render(lado);
};

window.setNum = function(lado,i,v){
  if(lado==="A") jogadoresA[i].numero = v;
  else jogadoresB[i].numero = v;
};

window.addEvento = function(tipo){
  const numero = prompt("Número do jogador");
  if(!numero) return;

  const lado = confirm("Esse evento foi do Time A? OK = Time A / Cancelar = Time B") ? "A" : "B";

  const jogadores = lado === "A" ? jogadoresA : jogadoresB;
  const jogador = jogadores.find(j => String(j.numero || "") === String(numero));

  eventos.push({
    tipo,
    numero,
    lado,
    nome: jogador?.nome || `Camisa ${numero}`,
    minuto: ""
  });

  atualizarPlacar();
  renderEventos();
};

function atualizarPlacar(){
  const golsA = eventos.filter(e => e.tipo==="gol" && e.lado==="A").length;
  const golsB = eventos.filter(e => e.tipo==="gol" && e.lado==="B").length;

  document.getElementById("placar").innerText = `${golsA} x ${golsB}`;
}

function separarEventos(tipo, lado){
  return eventos
    .filter(e => e.tipo === tipo && e.lado === lado)
    .map(e => ({
      nome: e.nome || `Camisa ${e.numero}`,
      numero: e.numero || "",
      minuto: e.minuto || ""
    }));
}

window.finalizar = async function(){
  if(!jogoAtual){
    alert("Jogo não carregado.");
    return;
  }

  const golsDetalhadosA = separarEventos("gol", "A");
  const golsDetalhadosB = separarEventos("gol", "B");

  const amarelosDetalhadosA = separarEventos("amarelo", "A");
  const amarelosDetalhadosB = separarEventos("amarelo", "B");

  const vermelhosDetalhadosA = separarEventos("vermelho", "A");
  const vermelhosDetalhadosB = separarEventos("vermelho", "B");

  const dados = {
    jogoId,

    campeonatoId: jogoAtual?.campeonatoId || "",
    campeonato: jogoAtual?.campeonato || "",
    logoCampeonato: jogoAtual?.logoCampeonato || "",

    categoria: jogoAtual?.categoria || "",
    dataJogo: jogoAtual?.data || "",
    local: jogoAtual?.local || "",
    rodada: jogoAtual?.rodada || "",

    timeAId: jogoAtual?.timeAId || "",
    timeA: jogoAtual?.timeA || "",
    logoTimeA: jogoAtual?.logoTimeA || "",

    timeBId: jogoAtual?.timeBId || "",
    timeB: jogoAtual?.timeB || "",
    logoTimeB: jogoAtual?.logoTimeB || "",

    tecnicoA: jogoAtual?.tecnicoA || "",
    tecnicoB: jogoAtual?.tecnicoB || "",
    assistenteA1: jogoAtual?.assistenteA1 || "",
    assistenteA2: jogoAtual?.assistenteA2 || "",
    assistenteB1: jogoAtual?.assistenteB1 || "",
    assistenteB2: jogoAtual?.assistenteB2 || "",

    arbitro: jogoAtual?.arbitro || "",
    arbitroAuxiliar: jogoAtual?.arbitroAuxiliar || "",
    assistente: jogoAtual?.assistente || "",
    assistente2: jogoAtual?.assistente2 || "",

    golsA: golsDetalhadosA.length,
    golsB: golsDetalhadosB.length,

    jogadoresA,
    jogadoresB,

    golsDetalhadosA,
    golsDetalhadosB,
    amarelosDetalhadosA,
    amarelosDetalhadosB,
    vermelhosDetalhadosA,
    vermelhosDetalhadosB,

    eventos,

    observacoes: document.getElementById("obs").value,
    status:"finalizada",
    finalizadaEm:new Date().toISOString()
  };

  await setDoc(doc(db,"sumulas",jogoId),dados);

  await updateDoc(doc(db,"jogos",jogoId),{
    status:"sumula_enviada",
    sumulaFinalizada:true,
    golsA:golsDetalhadosA.length,
    golsB:golsDetalhadosB.length,
    finalizadoEm:new Date().toISOString()
  });

  alert("Súmula finalizada!");
  window.location.href = "sumula-publica.html?id=" + jogoId;
};

async function init(){
  if(!jogoId){
    document.getElementById("dadosJogo").innerText = "Jogo não informado.";
    return;
  }

  const snap = await getDoc(doc(db,"jogos",jogoId));

  if(!snap.exists()){
    document.getElementById("dadosJogo").innerText = "Jogo não encontrado.";
    return;
  }

  jogoAtual = snap.data();

  document.getElementById("timeA").innerText = campo(jogoAtual.timeA, "Time A");
  document.getElementById("timeB").innerText = campo(jogoAtual.timeB, "Time B");

  document.getElementById("dadosJogo").innerText =
    `${campo(jogoAtual.campeonato, "-")} | ${campo(jogoAtual.categoria, "-")} | ${campo(jogoAtual.data, "-")} | ${campo(jogoAtual.local, "-")}`;

  document.getElementById("logoCampeonato").src = jogoAtual.logoCampeonato || "logo-liga.jfif";
  document.getElementById("logoTimeA").src = jogoAtual.logoTimeA || "logo-liga.jfif";
  document.getElementById("logoTimeB").src = jogoAtual.logoTimeB || "logo-liga.jfif";

  document.getElementById("logoCampeonato").onerror = function(){ this.src = "logo-liga.jfif"; };
  document.getElementById("logoTimeA").onerror = function(){ this.src = "logo-liga.jfif"; };
  document.getElementById("logoTimeB").onerror = function(){ this.src = "logo-liga.jfif"; };
}

init();
</script>

</body>
</html>
