<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmulas - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --yellow:#7a5a00;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

/* HEADER IGUAL AO SITE */
.site-header{
  background:linear-gradient(180deg, rgba(2,10,24,.98), rgba(8,23,44,.96));
  border-bottom:3px solid var(--gold);
}

.header-top{
  min-height:92px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px 0;
}

.header-title{
  font-size:26px;
  font-weight:900;
}

/* MENU IGUAL */
.nav-bar{background:#0d2a52}

.menu{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:14px;
}

.menu a{
  color:#fff;
  font-weight:900;
}

.menu a.ativo{
  background:var(--gold);
  color:#111;
  padding:6px 10px;
  border-radius:6px;
}

/* PÁGINA */
.container{padding:22px 0}

.hero{
  background:#0d2a52;
  padding:20px;
  border-radius:12px;
  margin-bottom:14px;
}

.hero h2{color:var(--gold)}

.lista-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:12px;
}

.card{
  background:var(--card2);
  padding:14px;
  border-radius:12px;
  text-align:center;
  border:1px solid var(--gold-line);
}

.placar{
  color:var(--gold);
  font-size:18px;
  font-weight:900;
  margin:6px 0;
}

.info{
  font-size:12px;
  color:var(--muted);
}

.btn{
  background:var(--gold);
  color:#111;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
  display:block;
  font-weight:900;
}

.vazio{
  text-align:center;
  color:var(--muted);
  padding:20px;
}
</style>
</head>

<body>

<header class="site-header">
  <div class="wrap header-top">
    <div class="header-title">LIGA GOIANA DE FUTEBOL DE BASE</div>
  </div>

  <div class="nav-bar">
    <div class="wrap">
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="campeonatos.html">Campeonatos</a>
        <a href="tabela.html">Tabela</a>
        <a href="jogos.html">Jogos</a>
        <a href="times.html">Times</a>
        <a href="tecnicos.html">Técnicos</a>
        <a href="jogadores.html">Jogadores</a>
        <a href="arbitros.html">Árbitros</a>
        <a href="assistentes.html">Assistente</a>
        <a class="ativo">Súmula</a>
        <a href="noticias.html">Notícias</a>
      </nav>
    </div>
  </div>
</header>

<main class="wrap container">

<section class="hero">
<h2>Súmulas</h2>
<p>Veja todas as súmulas finalizadas automaticamente pelo sistema.</p>
</section>

<section id="lista" class="lista-grid"></section>

</main>

<script type="module">
import { db } from "./firebase.js";
import { collection,getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let jogos=[];

/* 🔥 EXEMPLOS COPA */
const exemplo=[
{
id:"semi1-2002",
campeonato:"Copa do Mundo FIFA 2002",
categoria:"Seleção Principal",
fase:"Semifinal",
data:"2002-06-26",
local:"Saitama",
timeA:"Brasil",
timeB:"Turquia",
golsA:1,golsB:0,
status:"finalizado"
},
{
id:"semi2-2002",
campeonato:"Copa do Mundo FIFA 2002",
categoria:"Seleção Principal",
fase:"Semifinal",
data:"2002-06-25",
local:"Seoul",
timeA:"Alemanha",
timeB:"Coreia do Sul",
golsA:1,golsB:0,
status:"finalizado"
},
{
id:"final-copa-2002",
campeonato:"Copa do Mundo FIFA 2002",
categoria:"Seleção Principal",
fase:"Final",
data:"2002-06-30",
local:"Yokohama",
timeA:"Brasil",
timeB:"Alemanha",
golsA:2,golsB:0,
status:"finalizado"
}
];

function campo(v,f="-"){
  return v||f;
}

function dataBR(d){
  if(!d) return "-";
  const dt=new Date(d);
  return dt.toLocaleDateString("pt-BR");
}

async function carregar(){

try{
const snap=await getDocs(collection(db,"jogos"));
snap.forEach(d=>jogos.push({id:d.id,...d.data()}));
}catch{}

jogos=[...exemplo,...jogos];

/* 🔥 SÓ FINALIZADO */
jogos=jogos.filter(j=>j.status==="finalizado");

render();
}

function render(){

if(!jogos.length){
lista.innerHTML=`<div class="vazio">Nenhuma súmula disponível</div>`;
return;
}

lista.innerHTML=jogos.map(j=>`

<div class="card">

<strong>${campo(j.timeA)} x ${campo(j.timeB)}</strong>

<div class="placar">
${j.golsA||0} x ${j.golsB||0}
</div>

<div class="info">
${campo(j.campeonato)}<br>
${campo(j.categoria)}<br>
${dataBR(j.data)} - ${campo(j.local)}<br>
${campo(j.fase)}
</div>

<a class="btn" href="sumula-publica.html?id=${j.id}">
Ver Súmula
</a>

</div>

`).join("");
}

carregar();
</script>

</body>
</html>
