<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmulas - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --white:#fff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --shadow:0 10px 30px rgba(0,0,0,.3);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial;
  background:
    linear-gradient(rgba(2,8,20,.9), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
}

.wrap{
  width:min(100% - 28px, 1240px);
  margin:auto;
}

/* HEADER PADRÃO */
.site-header{
  background:#08172c;
  border-bottom:3px solid var(--gold);
}

.header-top{
  padding:18px;
  text-align:center;
  font-weight:900;
  font-size:22px;
}

/* MENU PADRÃO */
.nav-bar{background:#0d2a52}

.menu{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:12px;
  flex-wrap:wrap;
}

.menu a{
  color:#fff;
  font-weight:900;
}

.menu .ativo{
  background:var(--gold);
  color:#111;
  padding:6px 10px;
  border-radius:6px;
}

/* CONTEUDO */
.container{padding:20px}

.titulo{
  font-size:26px;
  color:var(--gold);
  margin-bottom:15px;
  font-weight:900;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:12px;
}

.card{
  background:var(--card2);
  border:1px solid var(--line);
  border-radius:12px;
  padding:15px;
  text-align:center;
  box-shadow:var(--shadow);
}

.placar{
  font-size:20px;
  font-weight:900;
  color:var(--gold);
  margin:6px 0;
}

.info{
  font-size:13px;
  color:var(--muted);
  line-height:1.5;
}

.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  background:var(--gold);
  color:#111;
  border-radius:8px;
  font-weight:900;
}

.vazio{
  text-align:center;
  padding:20px;
  color:var(--muted);
}
</style>
</head>

<body>

<header class="site-header">
  <div class="header-top">
    LIGA GOIANA DE FUTEBOL DE BASE
  </div>

  <div class="nav-bar">
    <nav class="menu">
      <a href="index.html">Início</a>
      <a href="campeonatos.html">Campeonatos</a>
      <a href="tabela.html">Tabela</a>
      <a href="jogos.html">Jogos</a>
      <a href="times.html">Times</a>
      <a href="tecnicos.html">Técnicos</a>
      <a href="jogadores.html">Jogadores</a>
      <a href="arbitros.html">Árbitros</a>
      <a href="assistentes.html">Assistente</a>
      <a class="ativo">Súmula</a>
      <a href="noticias.html">Notícias</a>
      <a href="login.html">Login</a>
    </nav>
  </div>
</header>

<main class="wrap container">

<h2 class="titulo">Súmulas dos Jogos</h2>

<div id="lista" class="grid"></div>

</main>

<script type="module">
import { db } from "./firebase.js";
import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let jogos=[];

/* 🔥 DADOS AUTOMÁTICOS DE EXEMPLO */
const exemplos=[
{
id:"semi1-2002",
campeonato:"Copa do Mundo FIFA 2002",
categoria:"Seleção Principal",
fase:"Semifinal",
data:"2002-06-26",
local:"Japão",
timeA:"Brasil",
timeB:"Turquia",
golsA:1,golsB:0,
status:"finalizado"
},
{
id:"semi2-2002",
campeonato:"Copa do Mundo FIFA 2002",
categoria:"Seleção Principal",
fase:"Semifinal",
data:"2002-06-25",
local:"Coreia",
timeA:"Alemanha",
timeB:"Coreia do Sul",
golsA:1,golsB:0,
status:"finalizado"
},
{
id:"final-2002",
campeonato:"Copa do Mundo FIFA 2002",
categoria:"Seleção Principal",
fase:"Final",
data:"2002-06-30",
local:"Yokohama",
timeA:"Brasil",
timeB:"Alemanha",
golsA:2,golsB:0,
status:"finalizado"
}
];

function campo(v){return v||"-"}

function dataBR(d){
if(!d)return"-";
const dt=new Date(d);
return dt.toLocaleDateString("pt-BR");
}

/* 🔥 CARREGAMENTO TOTAL AUTOMÁTICO */
async function carregar(){

try{
const snap=await getDocs(collection(db,"jogos"));
snap.forEach(d=>jogos.push({id:d.id,...d.data()}));
}catch(e){
console.warn("Firebase não carregou, usando exemplo");
}

/* junta com exemplos */
jogos=[...exemplos,...jogos];

/* 🔥 só jogos finalizados */
jogos=jogos.filter(j=>j.status==="finalizado" || j.status==="finalizada");

/* 🔥 ordena por data */
jogos.sort((a,b)=>{
return new Date(b.data||0)-new Date(a.data||0);
});

render();
}

/* 🔥 RENDERIZAÇÃO */
function render(){

if(!jogos.length){
lista.innerHTML=`<div class="vazio">Nenhuma súmula disponível</div>`;
return;
}

lista.innerHTML=jogos.map(j=>`

<div class="card">

<strong>${campo(j.timeA)} x ${campo(j.timeB)}</strong>

<div class="placar">
${j.golsA||0} x ${j.golsB||0}
</div>

<div class="info">
${campo(j.campeonato)}<br>
${campo(j.categoria)}<br>
${dataBR(j.data)} - ${campo(j.local)}<br>
${campo(j.fase)}
</div>

<a class="btn" href="sumula-publica.html?id=${j.id}">
Ver Súmula
</a>

</div>

`).join("");
}

carregar();
</script>

</body>
</html>
