<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assistências - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

button,
input,
select{
  font-family:inherit;
}

button{
  cursor:pointer;
  border:none;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

.hero-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:12px;
}

.hero-tag{
  background:rgba(26,63,115,.9);
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 220px 220px;
  gap:10px;
  margin-bottom:14px;
}

input,
select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
  outline:none;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
}

input:focus,
select:focus{
  outline:2px solid rgba(247,198,0,.65);
}

.titulo-secao{
  color:var(--gold);
  font-size:22px;
  font-weight:900;
  margin:0 0 12px;
}

.tabela-box{
  background:
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:18px;
  box-shadow:var(--shadow);
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:rgba(247,198,0,.14);
  color:var(--gold);
  font-size:13px;
  text-transform:uppercase;
  text-align:left;
  padding:13px 10px;
}

td{
  padding:13px 10px;
  border-top:1px solid rgba(255,255,255,.08);
  color:var(--muted);
  font-size:14px;
}

tbody tr:hover{
  background:rgba(247,198,0,.08);
}

.pos{
  font-weight:900;
  color:#fff;
  text-align:center;
}

.jogador{
  font-weight:900;
  color:#fff;
}

.assistencias{
  font-size:22px;
  color:var(--gold);
  font-weight:900;
  text-align:center;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(26,63,115,.9);
  border:1px solid rgba(255,255,255,.08);
  border-radius:999px;
  padding:5px 9px;
  font-size:12px;
  font-weight:800;
  color:#fff;
}

.vazio{
  padding:22px;
  text-align:center;
  color:var(--muted);
}

@media(max-width:900px){
  .filtros{
    grid-template-columns:1fr;
  }

  .tabela-box{
    overflow-x:auto;
  }

  .hero h2{
    font-size:22px;
  }
}
</style>
</head>

<body>

<main class="wrap container">

  <section class="hero">
    <h2>Assistências</h2>
    <p>Ranking automático dos jogadores com assistências registradas nas súmulas finalizadas.</p>

    <div class="hero-tags">
      <div class="hero-tag" id="tagTotal">Jogadores: 0</div>
      <div class="hero-tag" id="tagAssistencias">Assistências: 0</div>
      <div class="hero-tag">Atualização automática</div>
    </div>
  </section>

  <section class="filtros">
    <input id="busca" placeholder="Pesquisar jogador, time ou categoria...">

    <select id="filtroTime">
      <option value="">Todos os times</option>
    </select>

    <select id="filtroCategoria">
      <option value="">Todas categorias</option>
    </select>
  </section>

  <h2 class="titulo-secao" id="tituloPagina">Ranking de Assistências</h2>

  <section class="tabela-box">
    <table>
      <thead>
        <tr>
          <th style="text-align:center">#</th>
          <th>Jogador</th>
          <th>Time</th>
          <th>Categoria</th>
          <th style="text-align:center">Jogos</th>
          <th style="text-align:center">Assistências</th>
        </tr>
      </thead>

      <tbody id="tbody">
        <tr>
          <td colspan="6" class="vazio">
            <i class="fa-solid fa-spinner fa-spin"></i> Carregando assistências...
          </td>
        </tr>
      </tbody>
    </table>
  </section>

</main>

<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import {
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("assistencias");

let sumulas = [];

const tbody = document.getElementById("tbody");
const busca = document.getElementById("busca");
const filtroTime = document.getElementById("filtroTime");
const filtroCategoria = document.getElementById("filtroCategoria");

function normalizarTexto(texto){
  return String(texto || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function valorCampo(obj,chaves,fallback=""){
  for(const chave of chaves){
    if(obj && obj[chave] !== undefined && obj[chave] !== null && obj[chave] !== ""){
      return obj[chave];
    }
  }

  return fallback;
}

function nomeMandante(s){
  const valor =
    s.timeA ||
    s.timeMandante ||
    s.mandante ||
    s.timeMandanteNome ||
    s.mandanteNome;

  if(valor && typeof valor === "object"){
    return valor.nome || valor.nomeTime || "Mandante";
  }

  return valor || "Mandante";
}

function nomeVisitante(s){
  const valor =
    s.timeB ||
    s.timeVisitante ||
    s.visitante ||
    s.timeVisitanteNome ||
    s.visitanteNome;

  if(valor && typeof valor === "object"){
    return valor.nome || valor.nomeTime || "Visitante";
  }

  return valor || "Visitante";
}

function sumulaPublicada(s){
  return (
    s.sumulaFinalizada === true ||
    s.finalizada === true ||
    s.publica === true ||
    s.publico === true ||
    normalizarTexto(s.status) === "finalizado"
  );
}

function categoriaSumula(s){
  return valorCampo(s,["categoria","categoriaNome"],"-");
}

function assistenciasArray(s){
  const lista = [];

  if(Array.isArray(s.assistencias)){
    s.assistencias.forEach(a => lista.push(a));
  }

  if(Array.isArray(s.assistenciasA)){
    s.assistenciasA.forEach(a => lista.push({
      ...a,
      time: a.time || nomeMandante(s)
    }));
  }

  if(Array.isArray(s.assistenciasB)){
    s.assistenciasB.forEach(a => lista.push({
      ...a,
      time: a.time || nomeVisitante(s)
    }));
  }

  return lista;
}

function montarRanking(){
  const mapa = {};

  sumulas
    .filter(sumulaPublicada)
    .forEach(s=>{
      assistenciasArray(s).forEach(a=>{
        const nome = valorCampo(a,["nome","jogador","jogadorNome","atleta"],"Sem nome");
        const numero = valorCampo(a,["numero","camisa","n"],"");
        const time = valorCampo(a,["time","timeNome","clube","equipe"],"");
        const categoria = valorCampo(a,["categoria"],categoriaSumula(s));
        const chave = `${normalizarTexto(nome)}|${normalizarTexto(time)}|${numero}`;

        if(!mapa[chave]){
          mapa[chave] = {
            nome,
            numero,
            time,
            categoria,
            assistencias:0,
            jogosSet:new Set()
          };
        }

        mapa[chave].assistencias++;
        mapa[chave].jogosSet.add(s.jogoId || s.id || "");
      });
    });

  return Object.values(mapa)
    .map(item=>({
      ...item,
      jogos:item.jogosSet.size
    }))
    .sort((a,b)=>
      b.assistencias - a.assistencias ||
      b.jogos - a.jogos ||
      a.nome.localeCompare(b.nome,"pt-BR")
    );
}

function preencherFiltros(lista){
  const timeAtual = filtroTime.value;
  const categoriaAtual = filtroCategoria.value;

  const times = new Set();
  const categorias = new Set();

  lista.forEach(item=>{
    if(item.time) times.add(item.time);
    if(item.categoria && item.categoria !== "-") categorias.add(item.categoria);
  });

  filtroTime.innerHTML = `<option value="">Todos os times</option>`;

  [...times]
    .sort((a,b)=>a.localeCompare(b,"pt-BR"))
    .forEach(time=>{
      filtroTime.innerHTML += `<option value="${time}">${time}</option>`;
    });

  if([...times].includes(timeAtual)){
    filtroTime.value = timeAtual;
  }

  filtroCategoria.innerHTML = `<option value="">Todas categorias</option>`;

  [...categorias]
    .sort((a,b)=>a.localeCompare(b,"pt-BR"))
    .forEach(categoria=>{
      filtroCategoria.innerHTML += `<option value="${categoria}">${categoria}</option>`;
    });

  if([...categorias].includes(categoriaAtual)){
    filtroCategoria.value = categoriaAtual;
  }
}

function render(){
  const ranking = montarRanking();

  preencherFiltros(ranking);

  const textoBusca = normalizarTexto(busca.value);
  const timeSelecionado = filtroTime.value;
  const categoriaSelecionada = filtroCategoria.value;

  const lista = ranking.filter(item=>{
    if(timeSelecionado && item.time !== timeSelecionado) return false;
    if(categoriaSelecionada && item.categoria !== categoriaSelecionada) return false;

    if(textoBusca){
      const texto = normalizarTexto(`
        ${item.nome}
        ${item.time}
        ${item.categoria}
        ${item.numero}
      `);

      if(!texto.includes(textoBusca)) return false;
    }

    return true;
  });

  document.getElementById("tagTotal").innerText = `Jogadores: ${lista.length}`;
  document.getElementById("tagAssistencias").innerText =
    `Assistências: ${lista.reduce((total,item)=>total + item.assistencias,0)}`;

  document.getElementById("tituloPagina").innerText =
    `Ranking de Assistências${categoriaSelecionada ? " - " + categoriaSelecionada : ""}`;

  if(!lista.length){
    tbody.innerHTML = `
      <tr>
        <td colspan="6" class="vazio">
          Nenhuma assistência registrada em súmulas finalizadas.
        </td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = lista.map((item,index)=>`
    <tr>
      <td class="pos">${index + 1}</td>

      <td>
        <div class="jogador">${item.nome}</div>
        <span class="badge">
          <i class="fa-solid fa-shirt"></i> Nº ${item.numero || "-"}
        </span>
      </td>

      <td>${item.time || "-"}</td>
      <td>${item.categoria || "-"}</td>
      <td style="text-align:center">${item.jogos}</td>
      <td class="assistencias">${item.assistencias}</td>
    </tr>
  `).join("");
}

busca.addEventListener("input",render);
filtroTime.addEventListener("change",render);
filtroCategoria.addEventListener("change",render);

onSnapshot(collection(db,"sumulas"),snap=>{
  sumulas = snap.docs.map(d=>({
    id:d.id,
    ...d.data()
  }));

  render();
});
</script>

</body>
