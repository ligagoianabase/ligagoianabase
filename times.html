<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmulas - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:
    linear-gradient(rgba(2,8,20,.9), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed;
  color:#fff;
}

/* HEADER IGUAL AO TIMES */
.site-header{
  background:linear-gradient(180deg, rgba(2,10,24,.98), rgba(8,23,44,.96));
  border-bottom:3px solid var(--gold);
}

.header-top{
  text-align:center;
  padding:18px 0;
  font-size:26px;
  font-weight:900;
}

/* MENU */
.nav-bar{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.98));
}

.menu{
  display:flex;
  justify-content:center;
  gap:8px;
  padding:14px;
  overflow-x:auto;
}

.menu a{
  background:#0c2140;
  padding:10px 14px;
  border-radius:12px;
  font-weight:900;
  white-space:nowrap;
}

.menu a.ativo{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  padding:20px;
}

/* CARD */
.card{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border-radius:16px;
  padding:14px;
  border:1px solid rgba(247,198,0,.2);
  display:flex;
  flex-direction:column;
  gap:10px;
}

.top{
  font-size:12px;
  color:var(--muted);
  text-align:center;
}

.times{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
}

.time{
  text-align:center;
  font-weight:900;
  font-size:13px;
}

.placar{
  font-size:22px;
  font-weight:900;
  color:var(--gold);
  text-align:center;
}

.btn{
  display:block;
  text-align:center;
  padding:10px;
  border-radius:10px;
  font-weight:900;
  font-size:13px;
}

.btn-ver{
  background:var(--gold);
  color:#111;
}

.btn-edit{
  background:#fff;
  color:#111;
}

/* RESPONSIVO */
@media(max-width:1100px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header class="site-header">
  <div class="header-top">
    LIGA GOIANA DE FUTEBOL DE BASE
  </div>

  <div class="nav-bar">
    <nav class="menu">
      <a href="index.html">Início</a>
      <a href="campeonatos.html">Campeonatos</a>
      <a href="tabela.html">Tabela</a>
      <a href="jogos.html">Jogos</a>
      <a href="times.html">Times</a>
      <a href="tecnicos.html">Técnicos</a>
      <a href="jogadores.html">Jogadores</a>
      <a href="arbitros.html">Árbitros</a>
      <a href="assistentes.html">Assistente</a>
      <a href="sumula.html" class="ativo">Súmula</a>
      <a href="noticias.html">Notícias</a>
    </nav>
  </div>
</header>

<section class="grid" id="grid"></section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let lista = [];

/* 🔥 SIMULAÇÃO (2 RODADAS BRASILEIRÃO) */
const simulacao = [
  {id:"1",camp:"Brasileirão",data:"20/04",A:"Flamengo",B:"Palmeiras",pA:2,pB:1},
  {id:"2",camp:"Brasileirão",data:"20/04",A:"São Paulo",B:"Santos",pA:3,pB:0},
  {id:"3",camp:"Brasileirão",data:"21/04",A:"Corinthians",B:"Grêmio",pA:1,pB:1},
  {id:"4",camp:"Brasileirão",data:"21/04",A:"Cruzeiro",B:"Inter",pA:0,pB:2}
];

async function carregar(){
  try{
    const snap = await getDocs(collection(db,"jogos"));

    snap.forEach(doc=>{
      const d = doc.data();

      lista.push({
        id:doc.id,
        camp:d.campeonato || "",
        data:d.data || "",
        A:d.mandanteNome,
        B:d.visitanteNome,
        pA:d.placarMandante || 0,
        pB:d.placarVisitante || 0
      });
    });

    if(lista.length === 0){
      lista = simulacao;
    }

  }catch{
    lista = simulacao;
  }

  render();
}

function render(){
  const grid = document.getElementById("grid");

  grid.innerHTML = lista.map(j=>`
    <div class="card">

      <div class="top">${j.camp} - ${j.data}</div>

      <div class="times">
        <div class="time">${j.A}</div>

        <div class="placar">${j.pA} x ${j.pB}</div>

        <div class="time">${j.B}</div>
      </div>

      <a class="btn btn-ver"
         href="sumula-publica.html?id=${j.id}">
         Ver Súmula
      </a>

      <a class="btn btn-edit"
         href="sumula-adm.html?id=${j.id}">
         Preencher
      </a>

    </div>
  `).join("");
}

carregar();
</script>

</body>
</html>
