<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogos - Admin</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b1f3a;
      --bg-dark:#08172c;
      --card:#102a52;
      --card-hover:#153766;
      --gold:#f7c600;
      --gold-soft:rgba(247,198,0,.12);
      --gold-line:rgba(247,198,0,.28);
      --white:#ffffff;
      --muted:#d9e3f2;
      --shadow:0 8px 22px rgba(0,0,0,.28);
      --radius:14px;
      --transition:.25s ease;
      --max:1180px;
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:Arial, sans-serif;
      background:
        linear-gradient(rgba(11,31,58,.88), rgba(11,31,58,.94)),
        url("fundo.png") center/cover fixed no-repeat;
      color:var(--white);
    }

    a{text-decoration:none;color:inherit;}

    button{
      font-family:inherit;
      cursor:pointer;
      transition:var(--transition);
      border:none;
    }

    .wrap{
      width:min(100% - 28px, var(--max));
      margin:0 auto;
    }

    header{
      background:rgba(8,23,44,.96);
      border-bottom:3px solid var(--gold);
      box-shadow:var(--shadow);
    }

    .header-inner{
      min-height:84px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding:14px 0;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .header-title{
      flex:1;
      text-align:center;
      font-size:24px;
      font-weight:700;
      color:var(--white);
    }

    .top-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 16px;
      border-radius:10px;
      font-weight:700;
    }

    .btn-light{
      background:#fff4cf;
      color:#111;
    }

    .btn-light:hover{
      background:var(--gold);
      transform:translateY(-2px);
    }

    .btn-gold{
      background:var(--gold);
      color:#111;
    }

    .btn-gold:hover{
      filter:brightness(1.04);
      transform:translateY(-2px);
    }

    .container{
      padding:24px 0 34px;
    }

    .hero-panel{
      background:linear-gradient(180deg, rgba(16,42,82,.95), rgba(10,28,56,.96));
      border:1px solid var(--gold-line);
      border-radius:20px;
      padding:22px;
      box-shadow:var(--shadow);
      margin-bottom:22px;
    }

    .hero-panel h2{
      font-size:28px;
      color:#fff;
      margin-bottom:8px;
    }

    .hero-panel p{
      color:var(--muted);
      line-height:1.6;
    }

    .form-panel,
    .list-panel{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:20px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }

    .bloco-titulo{
      margin:0 0 12px;
      color:var(--gold);
      font-size:18px;
      font-weight:700;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .full{
      grid-column:1 / -1;
    }

    label{
      display:block;
      margin:0 0 6px;
      font-weight:700;
      color:#eef4ff;
      font-size:14px;
    }

    input, select{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      box-sizing:border-box;
      font-size:14px;
      background:#f5f7fb;
      color:#111;
    }

    input:focus, select:focus{
      outline:2px solid rgba(247,198,0,.55);
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .link-btn,
    .action-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      background:var(--gold);
      color:#111;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
    }

    .link-btn:hover,
    .action-btn:hover{
      filter:brightness(1.04);
      transform:translateY(-2px);
    }

    .btn-danger{
      background:#d94141;
      color:#fff;
    }

    .btn-danger:hover{
      background:#b82f2f;
    }

    .lista-jogos{
      display:grid;
      gap:14px;
    }

    .card{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
      padding:16px;
      border-radius:14px;
      transition:var(--transition);
    }

    .card:hover{
      border-color:var(--gold-line);
      transform:translateY(-2px);
    }

    .card strong{
      color:var(--gold);
      font-size:18px;
    }

    .card-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px 16px;
      margin-top:12px;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .card-grid div{
      background:rgba(255,255,255,.03);
      padding:10px;
      border-radius:10px;
    }

    .card-grid span{
      display:block;
      color:#fff;
      font-weight:700;
      margin-bottom:4px;
    }

    .card-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .mensagem-vazia{
      color:var(--muted);
      text-align:center;
      padding:16px 0;
    }

    @media (max-width: 900px){
      .header-title{
        order:3;
        width:100%;
        text-align:center;
      }

      .header-left,
      .header-right{
        width:100%;
        justify-content:center;
      }

      .grid,
      .card-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 600px){
      .top-btn,
      .action-btn,
      .link-btn{
        width:100%;
      }

      .header-left,
      .header-right{
        flex-direction:column;
        align-items:stretch;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="wrap header-inner">
      <div class="header-left">
        <button class="top-btn btn-light" type="button" onclick="voltarPagina()">
          <i class="fa-solid fa-arrow-left"></i> Voltar
        </button>

        <a href="index.html" class="top-btn btn-light">
          <i class="fa-solid fa-house"></i> Página Inicial
        </a>

        <a href="admin.html" class="top-btn btn-light">
          <i class="fa-solid fa-gears"></i> Painel ADM
        </a>
      </div>

      <div class="header-title">Cadastro de Jogos</div>

      <div class="header-right">
        <button class="top-btn btn-gold" type="button" onclick="salvarJogo()">
          <i class="fa-solid fa-floppy-disk"></i> Salvar Jogo
        </button>
      </div>
    </div>
  </header>

  <div class="wrap container">

    <section class="hero-panel">
      <h2>Gestão de Jogos</h2>
      <p>
        Cadastre partidas, vincule campeonato, categoria, times, jogadores, técnicos e arbitragem.
        O jogo já será salvo pronto para abrir a súmula automaticamente.
      </p>
    </section>

    <section class="form-panel">
      <h3 class="bloco-titulo">Informações do Jogo</h3>
      <div class="grid">
        <div>
          <label for="dataJogo">Data e hora</label>
          <input id="dataJogo" type="datetime-local">
        </div>

        <div>
          <label for="localJogo">Local</label>
          <input id="localJogo" placeholder="Ex: Campo 1">
        </div>

        <div>
          <label for="campeonato">Campeonato</label>
          <input id="campeonato" placeholder="Ex: Copa União de Base">
        </div>

        <div>
          <label for="logoCampeonato">Logo do campeonato</label>
          <input id="logoCampeonato" placeholder="Ex: logo-campeonato.png">
        </div>

        <div>
          <label for="rodada">Rodada</label>
          <input id="rodada" placeholder="Ex: 1ª Rodada">
        </div>

        <div>
          <label for="categoria">Categoria</label>
          <select id="categoria">
            <option value="">Selecione</option>
          </select>
        </div>

        <div>
          <label for="timeA">Time mandante</label>
          <select id="timeA">
            <option value="">Selecione</option>
          </select>
        </div>

        <div>
          <label for="timeB">Time visitante</label>
          <select id="timeB">
            <option value="">Selecione</option>
          </select>
        </div>
      </div>
    </section>

    <section class="form-panel">
      <h3 class="bloco-titulo">Arbitragem</h3>
      <div class="grid">
        <div>
          <label for="arbitro">Árbitro</label>
          <select id="arbitro">
            <option value="">Selecione</option>
          </select>
        </div>

        <div>
          <label for="assistente1">Árbitro Assistente 1</label>
          <select id="assistente1">
            <option value="">Selecione</option>
          </select>
        </div>

        <div>
          <label for="assistente2">Árbitro Assistente 2</label>
          <select id="assistente2">
            <option value="">Selecione</option>
          </select>
        </div>

        <div>
          <label for="arbitroAuxiliar">4º Árbitro</label>
          <select id="arbitroAuxiliar">
            <option value="">Selecione</option>
          </select>
        </div>
      </div>

      <div class="top-actions">
        <button class="action-btn" type="button" onclick="salvarJogo()">
          <i class="fa-solid fa-floppy-disk"></i> Salvar Jogo
        </button>
      </div>
    </section>

    <section class="list-panel">
      <h3 class="bloco-titulo">Jogos Cadastrados</h3>
      <div id="listaJogos" class="lista-jogos">
        <div class="mensagem-vazia">Carregando jogos...</div>
      </div>
    </section>
  </div>

  <script type="module">
    import { db } from "./firebase.js";
    import {
      collection,
      addDoc,
      getDocs,
      doc,
      deleteDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    let timesCache = [];
    let jogadoresCache = [];
    let tecnicosCache = [];
    let categoriasCache = [];
    let arbitrosCache = [];
    let assistentesCache = [];

    window.voltarPagina = function(){
      if(window.history.length > 1){
        window.history.back();
      }else{
        window.location.href = "admin.html";
      }
    };

    function normalizar(texto){
      return String(texto || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function buscarTime(id){
      return timesCache.find(t => t.id === id) || null;
    }

    function buscarArbitro(id){
      return arbitrosCache.find(a => a.id === id) || null;
    }

    function buscarAssistente(id){
      return assistentesCache.find(a => a.id === id) || null;
    }

    function formatarJogador(j){
      return {
        id:j.id,
        numero:j.numero || "",
        nome:j.nome || "",
        posicao:j.posicao || "",
        capitao:j.capitao === true,
        goleiro:j.goleiro === true || normalizar(j.posicao) === "goleiro",
        cpf:j.cpf || "",
        nascimento:j.nascimento || j.dataNascimento || "",
        categoria:j.categoria || "",
        timeId:j.timeId || "",
        timeNome:j.timeNome || j.time || ""
      };
    }

    function jogadoresDoTime(timeId, categoria){
      const time = buscarTime(timeId);

      return jogadoresCache
        .filter(j => {
          const mesmoTime =
            j.timeId === timeId ||
            j.timeID === timeId ||
            j.timeNome === time?.nome ||
            j.time === time?.nome;

          const mesmaCategoria =
            !categoria ||
            normalizar(j.categoria) === normalizar(categoria) ||
            (Array.isArray(j.categorias) && j.categorias.some(c => normalizar(c) === normalizar(categoria)));

          return mesmoTime && mesmaCategoria && (j.status || "ativo") !== "inativo";
        })
        .sort((a,b) => Number(a.numero || 999) - Number(b.numero || 999))
        .map(formatarJogador);
    }

    function comissaoDoTime(timeId, categoria){
      const time = buscarTime(timeId);

      return tecnicosCache
        .filter(t => {
          const mesmoTime =
            t.timeId === timeId ||
            t.timeID === timeId ||
            t.timeNome === time?.nome ||
            t.time === time?.nome;

          const mesmaCategoria =
            !categoria ||
            !t.categoria ||
            normalizar(t.categoria) === normalizar(categoria);

          return mesmoTime && mesmaCategoria;
        })
        .map(t => ({
          id:t.id,
          nome:t.nome || "",
          funcao:t.funcao || "Técnico",
          categoria:t.categoria || "",
          timeId:timeId,
          timeNome:time?.nome || ""
        }));
    }

    async function carregarTimes(){
      const selectA = document.getElementById("timeA");
      const selectB = document.getElementById("timeB");

      selectA.innerHTML = '<option value="">Selecione</option>';
      selectB.innerHTML = '<option value="">Selecione</option>';

      const snap = await getDocs(collection(db,"times"));
      timesCache = [];

      snap.forEach(d => timesCache.push({id:d.id,...d.data()}));

      timesCache.sort((a,b)=>(a.nome || "").localeCompare(b.nome || "","pt-BR"));

      timesCache.forEach(t => {
        selectA.innerHTML += `<option value="${t.id}">${t.nome}</option>`;
        selectB.innerHTML += `<option value="${t.id}">${t.nome}</option>`;
      });
    }

    async function carregarCategorias(){
      const select = document.getElementById("categoria");
      select.innerHTML = '<option value="">Selecione</option>';

      const snap = await getDocs(collection(db,"categorias"));
      categoriasCache = [];

      snap.forEach(d => categoriasCache.push({id:d.id,...d.data()}));

      const nomes = new Set();

      categoriasCache.forEach(c => {
        if(c.nome) nomes.add(c.nome);
      });

      if(!nomes.size){
        ["Sub-11","Sub-12","Sub-13","Sub-14","Sub-15","Sub-16","Sub-17","Sub-18"].forEach(c => nomes.add(c));
      }

      Array.from(nomes).sort((a,b)=>a.localeCompare(b,"pt-BR")).forEach(nome => {
        select.innerHTML += `<option value="${nome}">${nome}</option>`;
      });
    }

    async function carregarJogadores(){
      const snap = await getDocs(collection(db,"jogadores"));
      jogadoresCache = [];
      snap.forEach(d => jogadoresCache.push({id:d.id,...d.data()}));
    }

    async function carregarTecnicos(){
      const snap = await getDocs(collection(db,"tecnicos"));
      tecnicosCache = [];
      snap.forEach(d => tecnicosCache.push({id:d.id,...d.data()}));
    }

    async function carregarArbitragem(){
      const arbitro = document.getElementById("arbitro");
      const assistente1 = document.getElementById("assistente1");
      const assistente2 = document.getElementById("assistente2");
      const arbitroAuxiliar = document.getElementById("arbitroAuxiliar");

      arbitro.innerHTML = '<option value="">Selecione</option>';
      assistente1.innerHTML = '<option value="">Selecione</option>';
      assistente2.innerHTML = '<option value="">Selecione</option>';
      arbitroAuxiliar.innerHTML = '<option value="">Selecione</option>';

      const snapArbitros = await getDocs(collection(db,"arbitros"));
      arbitrosCache = [];
      snapArbitros.forEach(d => arbitrosCache.push({id:d.id,...d.data()}));

      const snapAssistentes = await getDocs(collection(db,"assistentes"));
      assistentesCache = [];
      snapAssistentes.forEach(d => assistentesCache.push({id:d.id,...d.data()}));

      arbitrosCache.sort((a,b)=>(a.nome || "").localeCompare(b.nome || "","pt-BR"));
      assistentesCache.sort((a,b)=>(a.nome || "").localeCompare(b.nome || "","pt-BR"));

      arbitrosCache.forEach(a => {
        arbitro.innerHTML += `<option value="${a.id}">${a.nome}</option>`;
        arbitroAuxiliar.innerHTML += `<option value="${a.id}">${a.nome}</option>`;
      });

      assistentesCache.forEach(a => {
        assistente1.innerHTML += `<option value="${a.id}">${a.nome}</option>`;
        assistente2.innerHTML += `<option value="${a.id}">${a.nome}</option>`;
      });
    }

    window.salvarJogo = async function(){
      const data = document.getElementById("dataJogo").value;
      const local = document.getElementById("localJogo").value.trim();
      const campeonato = document.getElementById("campeonato").value.trim();
      const logoCampeonato = document.getElementById("logoCampeonato").value.trim() || "logo-liga.jfif";
      const rodada = document.getElementById("rodada").value.trim();
      const categoria = document.getElementById("categoria").value;

      const timeAId = document.getElementById("timeA").value;
      const timeBId = document.getElementById("timeB").value;

      const arbitroId = document.getElementById("arbitro").value;
      const assistente1Id = document.getElementById("assistente1").value;
      const assistente2Id = document.getElementById("assistente2").value;
      const arbitroAuxiliarId = document.getElementById("arbitroAuxiliar").value;

      if(!data) return alert("Escolha a data e hora.");
      if(!local) return alert("Digite o local.");
      if(!rodada) return alert("Digite a rodada.");
      if(!campeonato) return alert("Digite o campeonato.");
      if(!categoria) return alert("Selecione a categoria.");
      if(!timeAId || !timeBId) return alert("Selecione os times.");
      if(timeAId === timeBId) return alert("Os times não podem ser iguais.");

      const timeAObj = buscarTime(timeAId);
      const timeBObj = buscarTime(timeBId);

      const arbitroObj = buscarArbitro(arbitroId);
      const assistente1Obj = buscarAssistente(assistente1Id);
      const assistente2Obj = buscarAssistente(assistente2Id);
      const arbitroAuxiliarObj = buscarArbitro(arbitroAuxiliarId);

      const titularesA = jogadoresDoTime(timeAId,categoria);
      const titularesB = jogadoresDoTime(timeBId,categoria);

      const comissaoA = comissaoDoTime(timeAId,categoria);
      const comissaoB = comissaoDoTime(timeBId,categoria);

      const jogo = {
        data,
        dataHora:data,
        hora:data.includes("T") ? data.split("T")[1] : "",
        local,
        campo:local,

        campeonato,
        logoCampeonato,
        rodada,
        categoria,
        fase:"Primeira fase",

        timeA:{
          id:timeAObj.id,
          nome:timeAObj.nome || "",
          logo:timeAObj.logo || timeAObj.escudo || "logo-liga.jfif",
          escudo:timeAObj.logo || timeAObj.escudo || "logo-liga.jfif",
          cidade:timeAObj.cidade || ""
        },

        timeB:{
          id:timeBObj.id,
          nome:timeBObj.nome || "",
          logo:timeBObj.logo || timeBObj.escudo || "logo-liga.jfif",
          escudo:timeBObj.logo || timeBObj.escudo || "logo-liga.jfif",
          cidade:timeBObj.cidade || ""
        },

        titularesA,
        titularesB,
        escalacaoA:titularesA,
        escalacaoB:titularesB,
        reservasA:[],
        reservasB:[],

        comissaoA,
        comissaoB,

        tecnicoA:comissaoA.find(t => normalizar(t.funcao).includes("tecnico"))?.nome || "",
        tecnicoB:comissaoB.find(t => normalizar(t.funcao).includes("tecnico"))?.nome || "",

        arbitroId:arbitroId || "",
        arbitro:arbitroObj?.nome || "",

        assistente1Id:assistente1Id || "",
        assistente1:assistente1Obj?.nome || "",

        assistente2Id:assistente2Id || "",
        assistente2:assistente2Obj?.nome || "",

        arbitroAuxiliarId:arbitroAuxiliarId || "",
        arbitroAuxiliar:arbitroAuxiliarObj?.nome || "",
        quartoArbitro:arbitroAuxiliarObj?.nome || "",

        placar:{A:0,B:0},
        golsA:0,
        golsB:0,
        gols:[],
        cartoes:[],
        substituicoes:[],
        observacoes:"",
        observacoesArbitro:"",
        melhorJogador:"",

        status:"agendado",
        sumulaFinalizada:false,

        criadoEm:new Date().toISOString(),
        criadoEmServidor:serverTimestamp()
      };

      const ref = await addDoc(collection(db,"jogos"),jogo);

      alert(
        "Jogo criado com sucesso!\\n\\n" +
        "Súmula ADM: sumula-admin.html?id=" + ref.id + "\\n" +
        "Súmula pública: sumula-publica.html?id=" + ref.id
      );

      location.reload();
    };

    window.excluirJogo = async function(id){
      if(!confirm("Deseja excluir este jogo?")) return;
      await deleteDoc(doc(db,"jogos",id));
      carregarJogos();
    };

    async function carregarJogos(){
      const lista = document.getElementById("listaJogos");
      lista.innerHTML = "";

      const snap = await getDocs(collection(db,"jogos"));
      let jogos = [];
      snap.forEach(d => jogos.push({id:d.id, ...d.data()}));

      jogos.sort((a,b)=>(a.data || "").localeCompare(b.data || ""));

      if(!jogos.length){
        lista.innerHTML = `<div class="mensagem-vazia">Nenhum jogo cadastrado ainda.</div>`;
        return;
      }

      jogos.forEach(j => {
        const nomeA = j.timeA?.nome || j.timeA || "Time A";
        const nomeB = j.timeB?.nome || j.timeB || "Time B";

        lista.innerHTML += `
          <div class="card">
            <strong>${nomeA} x ${nomeB}</strong>

            <div class="card-grid">
              <div><span>Rodada</span>${j.rodada || "-"}</div>
              <div><span>Categoria</span>${j.categoria || "-"}</div>
              <div><span>Campeonato</span>${j.campeonato || "-"}</div>
              <div><span>Data</span>${j.data || "-"}</div>
              <div><span>Local</span>${j.local || "-"}</div>
              <div><span>Status</span>${j.status || "agendado"}</div>
              <div><span>Jogadores Mandante</span>${(j.titularesA || []).length}</div>
              <div><span>Jogadores Visitante</span>${(j.titularesB || []).length}</div>
              <div><span>Árbitro</span>${j.arbitro || "-"}</div>
              <div><span>Assistente 1</span>${j.assistente1 || "-"}</div>
              <div><span>Assistente 2</span>${j.assistente2 || "-"}</div>
              <div><span>Súmula</span>${j.sumulaFinalizada ? "Finalizada" : "Aberta"}</div>
            </div>

            <div class="card-actions">
              <a class="link-btn" href="sumula-admin.html?id=${j.id}">
                <i class="fa-solid fa-file-signature"></i> Súmula ADM
              </a>

              <a class="link-btn" href="sumula-publica.html?id=${j.id}">
                <i class="fa-solid fa-eye"></i> Súmula Pública
              </a>

              <button class="action-btn btn-danger" onclick="excluirJogo('${j.id}')">
                <i class="fa-solid fa-trash"></i> Excluir
              </button>
            </div>
          </div>
        `;
      });
    }

    await carregarTimes();
    await carregarCategorias();
    await carregarJogadores();
    await carregarTecnicos();
    await carregarArbitragem();
    await carregarJogos();
  </script>

</body>
