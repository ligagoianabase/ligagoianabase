<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos - Admin</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0b1f3a;
  --bg-dark:#08172c;
  --card:#102a52;
  --card-hover:#153766;
  --gold:#f7c600;
  --gold-soft:rgba(247,198,0,.12);
  --gold-line:rgba(247,198,0,.28);
  --white:#ffffff;
  --muted:#d9e3f2;
  --shadow:0 8px 22px rgba(0,0,0,.28);
  --max:1180px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(rgba(11,31,58,.88),rgba(11,31,58,.94)),url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none}
.wrap{width:min(100% - 28px,var(--max));margin:0 auto}
header{background:rgba(8,23,44,.96);border-bottom:3px solid var(--gold);box-shadow:var(--shadow)}
.header-inner{min-height:84px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:14px 0}
.header-left,.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.header-title{flex:1;text-align:center;font-size:24px;font-weight:700}
.top-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;font-weight:700}
.btn-light{background:#fff4cf;color:#111}
.btn-gold{background:var(--gold);color:#111}
.container{padding:24px 0 34px}
.hero-panel,.form-panel,.list-panel{
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(12,33,64,.96));
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}
.hero-panel h2{font-size:28px;margin-bottom:8px}
.hero-panel p{color:var(--muted);line-height:1.6}
.bloco-titulo{margin:0 0 12px;color:var(--gold);font-size:18px;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.full{grid-column:1/-1}
label{display:block;margin:0 0 6px;font-weight:700;color:#eef4ff;font-size:14px}
input,select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
}
.top-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.link-btn,.action-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  background:var(--gold);
  color:#111;
  padding:10px 14px;
  border-radius:10px;
  font-weight:700;
}
.btn-danger{background:#d94141;color:#fff}
.lista-jogos{display:grid;gap:14px}
.card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  padding:16px;
  border-radius:14px;
}
.card strong{color:var(--gold);font-size:18px}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-top:12px;color:var(--muted);font-size:14px}
.card-grid div{background:rgba(255,255,255,.03);padding:10px;border-radius:10px}
.card-grid span{display:block;color:#fff;font-weight:700;margin-bottom:4px}
.card-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.mensagem-vazia{color:var(--muted);text-align:center;padding:16px 0}
@media(max-width:900px){
  .header-title{order:3;width:100%;text-align:center}
  .header-left,.header-right{width:100%;justify-content:center}
  .grid,.card-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .top-btn,.action-btn,.link-btn{width:100%}
}
</style>
</head>

<body>

<header>
  <div class="wrap header-inner">
    <div class="header-left">
      <button class="top-btn btn-light" type="button" onclick="voltarPagina()">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </button>
      <a href="index.html" class="top-btn btn-light">
        <i class="fa-solid fa-house"></i> Página Inicial
      </a>
      <a href="admin.html" class="top-btn btn-light">
        <i class="fa-solid fa-gears"></i> Painel ADM
      </a>
    </div>

    <div class="header-title">Cadastro de Jogos</div>

    <div class="header-right">
      <button class="top-btn btn-gold" type="button" onclick="salvarJogo()">
        <i class="fa-solid fa-floppy-disk"></i> Salvar Jogo
      </button>
    </div>
  </div>
</header>

<div class="wrap container">

<section class="hero-panel">
  <h2>Gestão de Jogos</h2>
  <p>Crie o jogo já ligado ao campeonato, categoria, times, jogadores, técnicos, arbitragem e súmulas automáticas.</p>
</section>

<section class="form-panel">
  <h3 class="bloco-titulo">Informações do Jogo</h3>
  <div class="grid">
    <div>
      <label>Data e hora</label>
      <input id="dataJogo" type="datetime-local">
    </div>

    <div>
      <label>Local / Campo</label>
      <input id="localJogo" placeholder="Ex: Campo 1">
    </div>

    <div>
      <label>Campeonato</label>
      <select id="campeonato">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Rodada</label>
      <input id="rodada" placeholder="Ex: 1ª Rodada">
    </div>

    <div>
      <label>Categoria</label>
      <select id="categoria">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Fase</label>
      <input id="fase" placeholder="Ex: Primeira fase">
    </div>

    <div>
      <label>Time mandante</label>
      <select id="timeA">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Time visitante</label>
      <select id="timeB">
        <option value="">Selecione</option>
      </select>
    </div>
  </div>
</section>

<section class="form-panel">
  <h3 class="bloco-titulo">Arbitragem</h3>
  <div class="grid">
    <div>
      <label>Árbitro</label>
      <select id="arbitro">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Assistente 1</label>
      <select id="assistente1">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>Assistente 2</label>
      <select id="assistente2">
        <option value="">Selecione</option>
      </select>
    </div>

    <div>
      <label>4º Árbitro</label>
      <select id="quartoArbitro">
        <option value="">Selecione</option>
      </select>
    </div>
  </div>

  <div class="top-actions">
    <button class="action-btn" type="button" onclick="salvarJogo()">
      <i class="fa-solid fa-floppy-disk"></i> Salvar Jogo
    </button>
  </div>
</section>

<section class="list-panel">
  <h3 class="bloco-titulo">Jogos Cadastrados</h3>
  <div id="listaJogos" class="lista-jogos">
    <div class="mensagem-vazia">Carregando jogos...</div>
  </div>
</section>

</div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs,
  doc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

let campeonatosCache = [];
let categoriasCache = [];
let timesCache = [];
let jogadoresCache = [];
let tecnicosCache = [];
let arbitrosCache = [];
let assistentesCache = [];

window.voltarPagina = function(){
  if(window.history.length > 1){
    window.history.back();
  }else{
    window.location.href = "admin.html";
  }
};

function normalizar(texto){
  return String(texto || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function option(select, value, text){
  const op = document.createElement("option");
  op.value = value;
  op.textContent = text;
  select.appendChild(op);
}

async function carregarCampeonatos(){
  const select = document.getElementById("campeonato");
  select.innerHTML = `<option value="">Selecione</option>`;

  const snap = await getDocs(collection(db,"campeonatos"));
  campeonatosCache = [];

  snap.forEach(d => campeonatosCache.push({ id:d.id, ...d.data() }));

  campeonatosCache.sort((a,b)=>(a.nome || a.campeonato || "").localeCompare(b.nome || b.campeonato || "","pt-BR"));

  campeonatosCache.forEach(c=>{
    option(select,c.id,c.nome || c.campeonato || "Campeonato");
  });
}

async function carregarCategorias(){
  const select = document.getElementById("categoria");
  select.innerHTML = `<option value="">Selecione</option>`;

  const snap = await getDocs(collection(db,"categorias"));
  categoriasCache = [];

  snap.forEach(d => categoriasCache.push({ id:d.id, ...d.data() }));

  categoriasCache.sort((a,b)=>(a.nome || "").localeCompare(b.nome || "","pt-BR"));

  categoriasCache.forEach(c=>{
    option(select,c.nome,c.nome);
  });
}

async function carregarTimes(){
  const selectA = document.getElementById("timeA");
  const selectB = document.getElementById("timeB");

  selectA.innerHTML = `<option value="">Selecione</option>`;
  selectB.innerHTML = `<option value="">Selecione</option>`;

  const snap = await getDocs(collection(db,"times"));
  timesCache = [];

  snap.forEach(d => timesCache.push({ id:d.id, ...d.data() }));

  timesCache.sort((a,b)=>(a.nome || "").localeCompare(b.nome || "","pt-BR"));

  timesCache.forEach(t=>{
    option(selectA,t.id,t.nome || "Time");
    option(selectB,t.id,t.nome || "Time");
  });
}

async function carregarJogadores(){
  const snap = await getDocs(collection(db,"jogadores"));
  jogadoresCache = [];

  snap.forEach(d => jogadoresCache.push({ id:d.id, ...d.data() }));
}

async function carregarTecnicos(){
  const snap = await getDocs(collection(db,"tecnicos"));
  tecnicosCache = [];

  snap.forEach(d => tecnicosCache.push({ id:d.id, ...d.data() }));
}

async function carregarArbitros(){
  const arbitro = document.getElementById("arbitro");
  const assistente1 = document.getElementById("assistente1");
  const assistente2 = document.getElementById("assistente2");
  const quartoArbitro = document.getElementById("quartoArbitro");

  arbitro.innerHTML = `<option value="">Selecione</option>`;
  assistente1.innerHTML = `<option value="">Selecione</option>`;
  assistente2.innerHTML = `<option value="">Selecione</option>`;
  quartoArbitro.innerHTML = `<option value="">Selecione</option>`;

  const snapA = await getDocs(collection(db,"arbitros"));
  arbitrosCache = [];

  snapA.forEach(d => arbitrosCache.push({ id:d.id, ...d.data() }));

  const snapAssist = await getDocs(collection(db,"assistentes"));
  assistentesCache = [];

  snapAssist.forEach(d => assistentesCache.push({ id:d.id, ...d.data() }));

  arbitrosCache.sort((a,b)=>(a.nome || "").localeCompare(b.nome || "","pt-BR"));
  assistentesCache.sort((a,b)=>(a.nome || "").localeCompare(b.nome || "","pt-BR"));

  arbitrosCache.forEach(a=>{
    option(arbitro,a.id,a.nome || "Árbitro");
    option(quartoArbitro,a.id,a.nome || "Árbitro");
  });

  assistentesCache.forEach(a=>{
    option(assistente1,a.id,a.nome || "Assistente");
    option(assistente2,a.id,a.nome || "Assistente");
  });
}

function pegarTime(id){
  return timesCache.find(t=>t.id === id) || null;
}

function pegarCampeonato(id){
  return campeonatosCache.find(c=>c.id === id) || null;
}

function pegarArbitro(id){
  return arbitrosCache.find(a=>a.id === id) || null;
}

function pegarAssistente(id){
  return assistentesCache.find(a=>a.id === id) || null;
}

function jogadoresDoTime(timeId,categoria){
  return jogadoresCache
    .filter(j=>{
      const mesmoTime = j.timeId === timeId || j.timeID === timeId || j.time === timeId || j.timeNome === pegarTime(timeId)?.nome;
      const mesmaCategoria = !categoria || normalizar(j.categoria) === normalizar(categoria);
      return mesmoTime && mesmaCategoria;
    })
    .map(j=>({
      id:j.id,
      numero:j.numero || j.camisa || "",
      nome:j.nome || j.nomeCompleto || "",
      posicao:j.posicao || "",
      capitao:j.capitao === true,
      goleiro:j.goleiro === true || normalizar(j.posicao) === "goleiro",
      cpf:j.cpf || "",
      nascimento:j.nascimento || j.dataNascimento || "",
      categoria:j.categoria || ""
    }));
}

function tecnicosDoTime(timeId,categoria){
  return tecnicosCache
    .filter(t=>{
      const mesmoTime = t.timeId === timeId || t.timeID === timeId || t.time === timeId || t.timeNome === pegarTime(timeId)?.nome;
      const mesmaCategoria = !categoria || !t.categoria || normalizar(t.categoria) === normalizar(categoria);
      return mesmoTime && mesmaCategoria;
    })
    .map(t=>({
      id:t.id,
      nome:t.nome || "",
      funcao:t.funcao || "Técnico",
      categoria:t.categoria || ""
    }));
}

window.salvarJogo = async function(){
  const campeonatoId = document.getElementById("campeonato").value;
  const categoria = document.getElementById("categoria").value;
  const timeAId = document.getElementById("timeA").value;
  const timeBId = document.getElementById("timeB").value;
  const arbitroId = document.getElementById("arbitro").value;
  const assistente1Id = document.getElementById("assistente1").value;
  const assistente2Id = document.getElementById("assistente2").value;
  const quartoArbitroId = document.getElementById("quartoArbitro").value;

  const dataHora = document.getElementById("dataJogo").value;
  const local = document.getElementById("localJogo").value.trim();
  const rodada = document.getElementById("rodada").value.trim();
  const fase = document.getElementById("fase").value.trim();

  if(!dataHora) return alert("Escolha a data e hora.");
  if(!local) return alert("Digite o local.");
  if(!campeonatoId) return alert("Selecione o campeonato.");
  if(!categoria) return alert("Selecione a categoria.");
  if(!timeAId || !timeBId) return alert("Selecione os dois times.");
  if(timeAId === timeBId) return alert("Os times não podem ser iguais.");

  const campeonato = pegarCampeonato(campeonatoId);
  const timeA = pegarTime(timeAId);
  const timeB = pegarTime(timeBId);
  const arbitroObj = pegarArbitro(arbitroId);
  const assist1 = pegarAssistente(assistente1Id);
  const assist2 = pegarAssistente(assistente2Id);
  const quarto = pegarArbitro(quartoArbitroId);

  const titularesA = jogadoresDoTime(timeAId,categoria);
  const titularesB = jogadoresDoTime(timeBId,categoria);
  const comissaoA = tecnicosDoTime(timeAId,categoria);
  const comissaoB = tecnicosDoTime(timeBId,categoria);

  const jogo = {
    campeonatoId:campeonatoId,
    campeonato:campeonato?.nome || campeonato?.campeonato || "",
    logoCampeonato:campeonato?.logo || campeonato?.logoCampeonato || "logo-liga.jfif",

    categoria,
    rodada,
    fase,

    data:dataHora,
    dataHora:dataHora,
    hora:dataHora ? dataHora.split("T")[1] : "",
    local,
    campo:local,

    timeA:{
      id:timeA.id,
      nome:timeA.nome || "",
      logo:timeA.logo || timeA.escudo || "logo-liga.jfif",
      cidade:timeA.cidade || ""
    },

    timeB:{
      id:timeB.id,
      nome:timeB.nome || "",
      logo:timeB.logo || timeB.escudo || "logo-liga.jfif",
      cidade:timeB.cidade || ""
    },

    titularesA,
    titularesB,
    reservasA:[],
    reservasB:[],

    comissaoA,
    comissaoB,

    arbitroId:arbitroId || "",
    arbitro:arbitroObj?.nome || "",

    assistente1Id:assistente1Id || "",
    assistente1:assist1?.nome || "",

    assistente2Id:assistente2Id || "",
    assistente2:assist2?.nome || "",

    quartoArbitroId:quartoArbitroId || "",
    quartoArbitro:quarto?.nome || "",

    placar:{A:0,B:0},
    golsA:0,
    golsB:0,
    gols:[],
    cartoes:[],
    substituicoes:[],
    observacoes:"",
    melhorJogador:"",

    status:"agendado",
    sumulaFinalizada:false,
    criadoEm:new Date().toISOString()
  };

  const ref = await addDoc(collection(db,"jogos"),jogo);

  await alert(
    "Jogo criado com sucesso!\\n\\n" +
    "Súmula ADM: sumula-admin.html?id=" + ref.id + "\\n" +
    "Súmula pública: sumula-publica.html?id=" + ref.id
  );

  location.reload();
};

window.excluirJogo = async function(id){
  if(!confirm("Deseja excluir este jogo?")) return;
  await deleteDoc(doc(db,"jogos",id));
  carregarJogos();
};

async function carregarJogos(){
  const lista = document.getElementById("listaJogos");
  lista.innerHTML = "";

  const snap = await getDocs(collection(db,"jogos"));
  let jogos = [];
  snap.forEach(d=>jogos.push({id:d.id,...d.data()}));

  jogos.sort((a,b)=>(a.data || "").localeCompare(b.data || ""));

  if(!jogos.length){
    lista.innerHTML = `<div class="mensagem-vazia">Nenhum jogo cadastrado ainda.</div>`;
    return;
  }

  jogos.forEach(j=>{
    const nomeA = j.timeA?.nome || j.timeA || "Time A";
    const nomeB = j.timeB?.nome || j.timeB || "Time B";

    lista.innerHTML += `
      <div class="card">
        <strong>${nomeA} x ${nomeB}</strong>

        <div class="card-grid">
          <div><span>Rodada</span>${j.rodada || "-"}</div>
          <div><span>Categoria</span>${j.categoria || "-"}</div>
          <div><span>Campeonato</span>${j.campeonato || "-"}</div>
          <div><span>Data</span>${j.data || "-"}</div>
          <div><span>Local</span>${j.local || "-"}</div>
          <div><span>Status</span>${j.status || "agendado"}</div>
          <div><span>Árbitro</span>${j.arbitro || "-"}</div>
          <div><span>Assistente 1</span>${j.assistente1 || "-"}</div>
          <div><span>Assistente 2</span>${j.assistente2 || "-"}</div>
          <div><span>Jogadores Mandante</span>${(j.titularesA || []).length}</div>
          <div><span>Jogadores Visitante</span>${(j.titularesB || []).length}</div>
          <div><span>Súmula</span>${j.sumulaFinalizada ? "Finalizada" : "Aberta"}</div>
        </div>

        <div class="card-actions">
          <a class="link-btn" href="sumula-admin.html?id=${j.id}">
            <i class="fa-solid fa-file-signature"></i> Súmula ADM
          </a>

          <a class="link-btn" href="sumula-publica.html?id=${j.id}">
            <i class="fa-solid fa-eye"></i> Súmula Pública
          </a>

          <button class="action-btn btn-danger" onclick="excluirJogo('${j.id}')">
            <i class="fa-solid fa-trash"></i> Excluir
          </button>
        </div>
      </div>
    `;
  });
}

await carregarCampeonatos();
await carregarCategorias();
await carregarTimes();
await carregarJogadores();
await carregarTecnicos();
await carregarArbitros();
await carregarJogos();
</script>

</body>
</html>
