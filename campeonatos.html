<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campeonatos - LIGA GOIANA DE FUTEBOL DE BASE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b1f3a;
      --bg-dark:#08172c;
      --card:#102a52;
      --card-hover:#153766;
      --gold:#f7c600;
      --gold-2:#ffe45c;
      --gold-soft:rgba(247,198,0,.12);
      --gold-line:rgba(247,198,0,.30);
      --white:#ffffff;
      --muted:#d8e1ef;
      --shadow:0 14px 34px rgba(0,0,0,.36);
      --transition:.25s ease;
      --max:1240px;
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:Arial, sans-serif;
      background:
        linear-gradient(rgba(3,12,29,.88), rgba(3,12,29,.96)),
        url("fundo.png") center/cover fixed no-repeat;
      color:var(--white);
      min-height:100vh;
      overflow-x:hidden;
    }

    a{text-decoration:none;color:inherit;transition:var(--transition);}
    button{font-family:inherit;cursor:pointer;transition:var(--transition);border:none;background:none;}
    input,select{font-family:inherit;}

    .wrap{
      width:min(100% - 28px, var(--max));
      margin:0 auto;
    }

    header{
      background:linear-gradient(180deg, rgba(2,10,24,.98), rgba(8,23,44,.96));
      border-bottom:3px solid var(--gold);
      box-shadow:var(--shadow);
      position:relative;
      z-index:20;
    }

    .header-top{
      min-height:92px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding:16px 0;
    }

    .header-left,.header-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .header-title{
      flex:1;
      text-align:center;
      font-size:26px;
      font-weight:900;
      color:var(--white);
      letter-spacing:.8px;
      text-transform:uppercase;
      text-shadow:0 4px 16px rgba(0,0,0,.35);
      line-height:1.15;
    }

    .top-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:11px 18px;
      border-radius:14px;
      font-weight:800;
      white-space:nowrap;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 10px 22px rgba(0,0,0,.22);
    }

    .btn-light{
      background:#fff4cf;
      color:#111;
    }

    .btn-light:hover{
      background:linear-gradient(135deg, var(--gold), var(--gold-2));
      transform:translateY(-2px);
    }

    .nav-bar{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.98));
      border-top:1px solid rgba(255,255,255,.06);
      border-bottom:1px solid rgba(255,255,255,.08);
      overflow:hidden;
    }

    .menu{
      display:flex;
      justify-content:center;
      gap:10px;
      padding:14px 8px;
      flex-wrap:nowrap;
      overflow-x:auto;
      overflow-y:hidden;
      scrollbar-width:none;
      -ms-overflow-style:none;
      scroll-behavior:smooth;
    }

    .menu::-webkit-scrollbar{display:none;}

    .menu a{
      color:#fff;
      font-weight:900;
      font-size:15px;
      background:linear-gradient(180deg, rgba(16,42,82,.98), rgba(12,33,64,.98));
      padding:12px 18px;
      border-radius:15px;
      border:1px solid rgba(255,255,255,.07);
      white-space:nowrap;
      flex:0 0 auto;
      box-shadow:0 10px 22px rgba(0,0,0,.24);
    }

    .menu a:hover{
      color:var(--gold);
      background:var(--gold-soft);
      border-color:var(--gold-line);
      transform:translateY(-2px);
    }

    .menu a.ativo{
      background:linear-gradient(135deg, var(--gold), var(--gold-2));
      color:#111;
      border-color:var(--gold);
    }

    .container{padding:30px 0 38px;}

    .hero{
      background:
        radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
        linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
      border:1px solid var(--gold-line);
      border-radius:26px;
      padding:28px;
      margin-bottom:22px;
      box-shadow:var(--shadow);
    }

    .hero h2{
      margin:0 0 8px;
      color:var(--gold);
      font-size:32px;
      font-weight:900;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:16px;
      max-width:850px;
    }

    .filtros{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
      margin-bottom:22px;
    }

    input,select{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      font-size:14px;
      background:#f5f7fb;
      color:#111;
      box-shadow:0 8px 20px rgba(0,0,0,.20);
      outline:none;
    }

    input:focus,select:focus{
      outline:2px solid rgba(247,198,0,.65);
    }

    .lista-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
      gap:16px;
    }

    .card{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
      padding:18px;
      border-radius:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      border:1px solid rgba(247,198,0,.18);
      box-shadow:var(--shadow);
      transition:var(--transition);
      cursor:pointer;
    }

    .card:hover{
      transform:translateY(-3px);
      border-color:var(--gold-line);
    }

    .card:hover .nome-campeonato{
      color:var(--gold);
    }

    .item{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .logo{
      width:72px;
      height:72px;
      border-radius:18px;
      object-fit:cover;
      border:2px solid var(--gold);
      background:#fff;
      flex-shrink:0;
    }

    .item-info{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .nome-campeonato{
      font-weight:900;
      font-size:18px;
      color:#fff;
      transition:var(--transition);
    }

    .item-info small{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .status-tag{
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      display:inline-block;
      color:#fff;
      margin-left:4px;
    }

    .status-ativo{
      background:#1b5e20;
    }

    .status-encerrado{
      background:#7a5a00;
    }

    .tags{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:4px;
    }

    .tag{
      background:rgba(26,63,115,.9);
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      border:1px solid rgba(255,255,255,.08);
      font-weight:800;
    }

    .card-arrow{
      width:42px;
      height:42px;
      border-radius:50%;
      background:linear-gradient(135deg, var(--gold), var(--gold-2));
      color:#111;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      flex-shrink:0;
      box-shadow:0 10px 22px rgba(247,198,0,.18);
    }

    .vazio{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
      padding:30px;
      border-radius:18px;
      text-align:center;
      color:var(--muted);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
      grid-column:1/-1;
      font-weight:700;
    }

    @media (max-width:900px){
      .header-title{
        order:3;
        width:100%;
        text-align:center;
      }

      .header-left,.header-right{
        width:100%;
        justify-content:center;
      }

      .filtros{grid-template-columns:1fr;}

      .card{
        align-items:flex-start;
      }
    }

    @media (max-width:600px){
      .wrap{
        width:min(100% - 20px, var(--max));
      }

      .header-left,.header-right{
        display:none !important;
      }

      .header-top{
        min-height:auto;
        padding:18px 0;
        justify-content:center;
      }

      .header-title{
        order:1 !important;
        width:100%;
        font-size:18px;
        line-height:1.25;
        text-align:center;
      }

      .nav-bar .wrap{
        width:100%;
      }

      .menu{
        justify-content:flex-start;
        padding:14px 14px;
        gap:10px;
      }

      .menu a{
        font-size:14px;
        padding:12px 16px;
        border-radius:14px;
      }

      .container{
        padding:24px 0 34px;
      }

      .hero{
        padding:22px;
        border-radius:22px;
      }

      .hero h2{
        font-size:26px;
      }

      .lista-grid{
        grid-template-columns:1fr;
      }

      .item{
        align-items:flex-start;
      }

      .logo{
        width:64px;
        height:64px;
        border-radius:16px;
      }

      .card-arrow{
        width:38px;
        height:38px;
      }
    }
  </style>
</head>

<body>
<header>
  <div class="wrap header-top">
    <div class="header-left">
      <button class="top-btn btn-light" type="button" onclick="voltarPagina()">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </button>

      <a href="index.html" class="top-btn btn-light">
        <i class="fa-solid fa-house"></i> Página Inicial
      </a>
    </div>

    <div class="header-title">LIGA GOIANA DE FUTEBOL DE BASE</div>

    <div class="header-right"></div>
  </div>

  <div class="nav-bar">
    <div class="wrap">
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="campeonatos.html" class="ativo">Campeonatos</a>
        <a href="tabela.html">Tabela</a>
        <a href="jogos.html">Jogos</a>
        <a href="times.html">Times</a>
        <a href="tecnicos.html">Técnicos</a>
        <a href="jogadores.html">Jogadores</a>
        <a href="arbitros.html">Árbitros</a>
        <a href="assistentes.html">Assistente</a>
        <a href="sumula-publica.html">Súmula</a>
        <a href="noticias.html">Notícias</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </div>
</header>

<main class="wrap container">
  <section class="hero">
    <h2>Campeonatos</h2>
    <p>Veja os campeonatos publicados, acompanhe categorias, jogos, gols e acesse os detalhes oficiais da competição.</p>
  </section>

  <section class="filtros">
    <input id="buscaCampeonato" placeholder="Pesquisar campeonato..." oninput="carregarCampeonatos()">

    <select id="filtroCampeonato" onchange="carregarCampeonatos()">
      <option value="">Todos os campeonatos</option>
    </select>

    <select id="filtroCategoria" onchange="carregarCampeonatos()">
      <option value="">Todas categorias</option>
    </select>
  </section>

  <section class="lista-grid" id="listaCampeonatos"></section>
</main>

<script type="module">
  import { db } from "./firebase.js";
  import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  let campeonatosCache = [];
  let jogosCache = [];
  let sumulasCache = [];

  window.voltarPagina = function(){
    if(document.referrer && document.referrer !== ""){
      window.history.back();
    }else{
      window.location.href = "index.html";
    }
  };

  function statusPublico(status = "") {
    const s = String(status).trim().toLowerCase();
    return ["ativo", "em breve", "publicado", "publico", "público"].includes(s);
  }

  function campeonatoEhPublico(campeonato) {
    if(campeonato.publicado === true) return true;
    if(campeonato.publico === true) return true;
    if(campeonato.visivelPublico === true) return true;
    if(statusPublico(campeonato.status)) return true;
    return false;
  }

  function normalizarTexto(texto) {
    return String(texto || "")
      .trim()
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
  }

  function valorCampo(obj, chaves, fallback = ""){
    for(const chave of chaves){
      if(obj && obj[chave] !== undefined && obj[chave] !== null && obj[chave] !== ""){
        return obj[chave];
      }
    }
    return fallback;
  }

  function obterNomeCampeonato(doc){
    return valorCampo(doc, ["nome", "campeonato", "titulo"], "");
  }

  function obterLogoCampeonato(campeonato){
    return valorCampo(campeonato, ["logo", "logoCampeonato", "imagem", "logoUrl", "urlLogo"], "logo-liga.jfif");
  }

  function categoriaExiste(campeonato, categoriaFiltro){
    if(!categoriaFiltro) return true;

    const categorias = Array.isArray(campeonato.categorias) ? campeonato.categorias : [];

    return categorias.some(cat => {
      if(typeof cat === "string"){
        return normalizarTexto(cat) === normalizarTexto(categoriaFiltro);
      }

      return normalizarTexto(cat.nome || cat.categoria || "") === normalizarTexto(categoriaFiltro);
    });
  }

  function filtrarJogosDoCampeonato(campeonato){
    const idCamp = campeonato.id;
    const nomeCampeonato = obterNomeCampeonato(campeonato);

    return jogosCache.filter(j => {
      const jogoCampId = valorCampo(j, ["campeonatoId"], "");
      const jogoCampNome = valorCampo(j, ["campeonato", "nomeCampeonato"], "");

      return jogoCampId === idCamp ||
        normalizarTexto(jogoCampNome) === normalizarTexto(nomeCampeonato);
    });
  }

  function calcularGolsDoCampeonato(campeonato){
    const nomeCampeonato = obterNomeCampeonato(campeonato);
    const jogos = filtrarJogosDoCampeonato(campeonato);

    let gols = 0;

    jogos.forEach(j => {
      gols += Number(valorCampo(j, ["golsA"], 0) || 0);
      gols += Number(valorCampo(j, ["golsB"], 0) || 0);
    });

    if(gols === 0){
      const sumulas = sumulasCache.filter(s =>
        normalizarTexto(valorCampo(s, ["campeonato"], "")) === normalizarTexto(nomeCampeonato) ||
        valorCampo(s, ["campeonatoId"], "") === campeonato.id
      );

      sumulas.forEach(s => {
        gols += Number(valorCampo(s, ["golsA"], 0) || 0);
        gols += Number(valorCampo(s, ["golsB"], 0) || 0);
      });
    }

    return gols;
  }

  function preencherFiltroCampeonato(){
    const select = document.getElementById("filtroCampeonato");

    const lista = [...new Set(
      campeonatosCache
        .filter(campeonatoEhPublico)
        .map(c => obterNomeCampeonato(c))
        .filter(Boolean)
    )].sort((a,b) => String(a).localeCompare(b, "pt-BR"));

    select.innerHTML = '<option value="">Todos os campeonatos</option>';

    lista.forEach(nome => {
      select.innerHTML += `<option value="${nome}">${nome}</option>`;
    });
  }

  function preencherFiltroCategoria(){
    const select = document.getElementById("filtroCategoria");
    const categorias = new Set();

    campeonatosCache
      .filter(campeonatoEhPublico)
      .forEach(c => {
        (c.categorias || []).forEach(cat => {
          if(typeof cat === "string" && cat) categorias.add(cat);
          if(typeof cat === "object" && (cat.nome || cat.categoria)) categorias.add(cat.nome || cat.categoria);
        });
      });

    select.innerHTML = '<option value="">Todas categorias</option>';

    Array.from(categorias)
      .sort((a,b) => String(a).localeCompare(String(b), "pt-BR"))
      .forEach(cat => {
        select.innerHTML += `<option value="${cat}">${cat}</option>`;
      });
  }

  function classeStatus(status){
    const s = normalizarTexto(status);
    if(s === "ativo" || s === "publicado" || s === "em andamento"){
      return "status-ativo";
    }

    return "status-encerrado";
  }

  function montarCategoriasHtml(campeonato){
    const categorias = Array.isArray(campeonato.categorias) ? campeonato.categorias : [];

    if(!categorias.length){
      return '<span class="tag">Sem categorias</span>';
    }

    return categorias.map(cat => {
      const nome = typeof cat === "string" ? cat : (cat.nome || cat.categoria || "");
      return nome ? `<span class="tag">${nome}</span>` : "";
    }).join("");
  }

  window.carregarCampeonatos = function(){
    const lista = document.getElementById("listaCampeonatos");
    const busca = normalizarTexto(document.getElementById("buscaCampeonato").value || "");
    const campeonatoFiltro = document.getElementById("filtroCampeonato").value;
    const categoriaFiltro = document.getElementById("filtroCategoria").value;

    let campeonatos = campeonatosCache.filter(campeonatoEhPublico);

    if(busca){
      campeonatos = campeonatos.filter(c =>
        normalizarTexto(obterNomeCampeonato(c)).includes(busca) ||
        normalizarTexto(c.temporada).includes(busca) ||
        normalizarTexto(c.status).includes(busca)
      );
    }

    if(campeonatoFiltro){
      campeonatos = campeonatos.filter(c => obterNomeCampeonato(c) === campeonatoFiltro);
    }

    if(categoriaFiltro){
      campeonatos = campeonatos.filter(c => categoriaExiste(c, categoriaFiltro));
    }

    campeonatos.sort((a,b) => {
      const jogosA = filtrarJogosDoCampeonato(a).length;
      const jogosB = filtrarJogosDoCampeonato(b).length;

      if(jogosB !== jogosA) return jogosB - jogosA;

      return obterNomeCampeonato(a).localeCompare(obterNomeCampeonato(b), "pt-BR");
    });

    if(!campeonatos.length){
      lista.innerHTML = `<div class="vazio">Nenhum campeonato publicado encontrado.</div>`;
      return;
    }

    lista.innerHTML = "";

    campeonatos.forEach(campeonato => {
      const nomeCampeonato = obterNomeCampeonato(campeonato);
      const jogosDoCampeonato = filtrarJogosDoCampeonato(campeonato);
      const totalGols = calcularGolsDoCampeonato(campeonato);
      const status = campeonato.status || "-";

      lista.innerHTML += `
        <a class="card" href="campeonato-publico.html?id=${campeonato.id}">
          <div class="item">
            <img
              src="${obterLogoCampeonato(campeonato)}"
              class="logo"
              alt="${nomeCampeonato || 'Campeonato'}"
              onerror="this.src='logo-liga.jfif'"
            >

            <div class="item-info">
              <div class="nome-campeonato">${nomeCampeonato || "-"}</div>
              <small>Temporada: ${campeonato.temporada || "-"}</small>
              <small>
                Status:
                <span class="status-tag ${classeStatus(status)}">${status}</span>
              </small>
              <small>Jogos: ${jogosDoCampeonato.length} | Gols: ${totalGols}</small>
              <div class="tags">${montarCategoriasHtml(campeonato)}</div>
            </div>
          </div>

          <div class="card-arrow">
            <i class="fa-solid fa-arrow-right"></i>
          </div>
        </a>
      `;
    });
  };

  async function iniciarPagina(){
    const lista = document.getElementById("listaCampeonatos");
    lista.innerHTML = `<div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando campeonatos...</div>`;

    try{
      const [snapCampeonatos, snapJogos, snapSumulas] = await Promise.all([
        getDocs(collection(db, "campeonatos")),
        getDocs(collection(db, "jogos")),
        getDocs(collection(db, "sumulas"))
      ]);

      campeonatosCache = [];
      jogosCache = [];
      sumulasCache = [];

      snapCampeonatos.forEach(docSnap => {
        campeonatosCache.push({ id:docSnap.id, ...docSnap.data() });
      });

      snapJogos.forEach(docSnap => {
        jogosCache.push({ id:docSnap.id, ...docSnap.data() });
      });

      snapSumulas.forEach(docSnap => {
        sumulasCache.push({ id:docSnap.id, ...docSnap.data() });
      });

      preencherFiltroCampeonato();
      preencherFiltroCategoria();
      carregarCampeonatos();
    }catch(erro){
      console.error(erro);
      lista.innerHTML = `<div class="vazio">Erro ao carregar os campeonatos.</div>`;
    }
  }

  iniciarPagina();
</script>

</body>
</html>
