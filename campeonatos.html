<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campeonatos - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --yellow:#7a5a00;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

input,
select{
  font-family:inherit;
}

img{
  display:block;
  max-width:100%;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

/* PÁGINA */
.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

/* GRID PADRÃO — MÁXIMO 5 POR LINHA */
.lista-grid{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:12px;
}

@media(max-width:1100px){
  .lista-grid{
    grid-template-columns:repeat(4, 1fr);
  }
}

@media(max-width:900px){
  .lista-grid{
    grid-template-columns:repeat(3, 1fr);
  }
}

@media(max-width:650px){
  .lista-grid{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:430px){
  .lista-grid{
    grid-template-columns:1fr;
  }
}

/* CARD */
.card{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  transition:.25s ease;
  text-align:center;
  min-height:285px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card:hover{
  transform:translateY(-2px);
  border-color:var(--gold);
}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
}

.card-icon{
  width:34px;
  height:34px;
  border-radius:10px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  flex-shrink:0;
}

.status-tag{
  color:#fff;
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.status-ativo{
  background:var(--green);
}

.status-encerrado{
  background:var(--yellow);
}

.status-pendente{
  background:var(--blue);
}

.status-cancelado{
  background:var(--red);
}

.logo{
  width:68px;
  height:68px;
  border-radius:18px;
  object-fit:cover;
  border:2px solid var(--gold);
  background:#fff;
  margin:0 auto 10px;
}

.nome-campeonato{
  font-size:16px;
  font-weight:900;
  color:#fff;
  margin-bottom:8px;
  line-height:1.25;
}

.info-campeonato{
  color:var(--muted);
  font-size:12px;
  margin-bottom:8px;
  line-height:1.5;
}

.tags{
  display:flex;
  justify-content:center;
  gap:5px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.tag{
  background:rgba(26,63,115,.9);
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  color:#fff;
}

.btn-ver{
  width:100%;
  padding:9px;
  border-radius:11px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  font-weight:900;
  display:block;
  font-size:13px;
}

.vazio{
  grid-column:1/-1;
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  padding:22px;
  border-radius:14px;
  text-align:center;
  color:var(--muted);
  border:1px solid rgba(255,255,255,.08);
}

@media(max-width:600px){
  .hero{
    padding:14px;
  }

  .hero h2{
    font-size:22px;
  }
}
</style>
</head>

<body>

<main class="wrap container">

<section class="hero">
  <h2>Campeonatos</h2>
  <p>Veja os campeonatos publicados.</p>
</section>

<section class="lista-grid" id="listaCampeonatos"></section>

</main>

<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("campeonatos");

let campeonatos = [];
let jogos = [];

function normalizar(texto){
  return String(texto || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();
}

function valor(obj, campos, padrao = ""){
  for(const campo of campos){
    if(obj && obj[campo] !== undefined && obj[campo] !== null && obj[campo] !== ""){
      return obj[campo];
    }
  }
  return padrao;
}

function nomeCampeonato(c){
  return valor(c, ["nome", "titulo", "campeonato", "nomeCampeonato"], "Sem nome");
}

function temporadaCampeonato(c){
  return valor(c, ["temporada", "ano", "edicao", "edição"], "-");
}

function categoriaCampeonato(c){
  const categoria = valor(c, ["categoria"], "");
  const categorias = valor(c, ["categorias"], []);

  if(categoria) return categoria;

  if(Array.isArray(categorias) && categorias.length){
    return categorias.join(", ");
  }

  return "Geral";
}

function statusCampeonato(c){
  const status = normalizar(valor(c, ["status", "situacao", "situação"], "ativo"));

  if(status.includes("encerrado") || status.includes("finalizado")){
    return {
      texto:"Encerrado",
      classe:"status-encerrado"
    };
  }

  if(status.includes("pendente") || status.includes("rascunho")){
    return {
      texto:"Pendente",
      classe:"status-pendente"
    };
  }

  if(status.includes("cancelado")){
    return {
      texto:"Cancelado",
      classe:"status-cancelado"
    };
  }

  return {
    texto:"Ativo",
    classe:"status-ativo"
  };
}

function jogosDoCampeonato(campeonato){
  const id = campeonato.id;
  const nome = normalizar(nomeCampeonato(campeonato));

  return jogos.filter(j => {
    const jogoCampId = valor(j, ["campeonatoId", "idCampeonato"], "");
    const jogoCampNome = normalizar(valor(j, ["campeonato", "nomeCampeonato"], ""));

    return jogoCampId === id || jogoCampNome === nome;
  });
}

function contarJogos(campeonato){
  return jogosDoCampeonato(campeonato).length;
}

function calcularGols(campeonato){
  return jogosDoCampeonato(campeonato).reduce((total, j) => {
    const golsA = Number(valor(j, ["golsA", "placarA", "golsMandante", "mandanteGols"], 0));
    const golsB = Number(valor(j, ["golsB", "placarB", "golsVisitante", "visitanteGols"], 0));

    return total + golsA + golsB;
  }, 0);
}

function contarTimes(campeonato){
  const times = new Set();

  jogosDoCampeonato(campeonato).forEach(j => {
    const timeA = valor(j, ["timeA", "mandante", "timeMandante", "nomeTimeA"], "");
    const timeB = valor(j, ["timeB", "visitante", "timeVisitante", "nomeTimeB"], "");

    if(timeA) times.add(normalizar(timeA));
    if(timeB) times.add(normalizar(timeB));
  });

  return times.size;
}

function render(){
  const lista = document.getElementById("listaCampeonatos");

  if(!campeonatos.length){
    lista.innerHTML = `<div class="vazio">Nenhum campeonato cadastrado no Firebase.</div>`;
    return;
  }

  campeonatos.sort((a,b) => {
    return nomeCampeonato(a).localeCompare(nomeCampeonato(b), "pt-BR");
  });

  lista.innerHTML = campeonatos.map(c => {
    const status = statusCampeonato(c);
    const jogosQtd = contarJogos(c);
    const golsQtd = calcularGols(c);
    const timesQtd = contarTimes(c);
    const categoria = categoriaCampeonato(c);
    const temporada = temporadaCampeonato(c);
    const logo = valor(c, ["logo", "imagem", "foto", "escudo"], "logo-liga.jfif");

    return `
      <div class="card">

        <div>
          <div class="card-top">
            <div class="card-icon">
              <i class="fa-solid fa-trophy"></i>
            </div>

            <div class="status-tag ${status.classe}">
              ${status.texto}
            </div>
          </div>

          <img src="${logo}" class="logo" onerror="this.src='logo-liga.jfif'">

          <div class="nome-campeonato">
            ${nomeCampeonato(c)}
          </div>

          <div class="info-campeonato">
            <strong>Temporada:</strong> ${temporada}<br>
            <strong>Categoria:</strong> ${categoria}<br>
            <strong>Times:</strong> ${timesQtd}<br>
            <strong>Jogos:</strong> ${jogosQtd}<br>
            <strong>Gols:</strong> ${golsQtd}
          </div>

          <div class="tags">
            <span class="tag">${categoria}</span>
            <span class="tag">${temporada}</span>
          </div>
        </div>

        <a class="btn-ver" href="campeonato-publico.html?id=${c.id}">
          Ver Campeonato
        </a>

      </div>
    `;
  }).join("");
}

async function carregar(){
  const lista = document.getElementById("listaCampeonatos");
  lista.innerHTML = `<div class="vazio">Carregando campeonatos...</div>`;

  try{
    const snapCamp = await getDocs(collection(db, "campeonatos"));
    const snapJogos = await getDocs(collection(db, "jogos"));

    campeonatos = [];
    jogos = [];

    snapCamp.forEach(docSnap => {
      campeonatos.push({
        id:docSnap.id,
        ...docSnap.data()
      });
    });

    snapJogos.forEach(docSnap => {
      jogos.push({
        id:docSnap.id,
        ...docSnap.data()
      });
    });

    render();

  }catch(erro){
    console.error("Erro ao carregar campeonatos:", erro);
    lista.innerHTML = `<div class="vazio">Erro ao carregar campeonatos.</div>`;
  }
}

carregar();
</script>

</body>
</html>
