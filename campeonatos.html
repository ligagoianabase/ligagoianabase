<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campeonatos - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --yellow:#7a5a00;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

input,
select{
  font-family:inherit;
}

img{
  display:block;
  max-width:100%;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

/* PÁGINA */
.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

.lista-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
  gap:10px;
}

.card{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  transition:.25s ease;
  text-align:center;
}

.card:hover{
  transform:translateY(-2px);
  border-color:var(--gold);
}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
}

.card-icon{
  width:34px;
  height:34px;
  border-radius:10px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

.status-tag{
  color:#fff;
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.status-ativo{background:var(--green);}
.status-encerrado{background:var(--yellow);}
.status-exemplo{background:var(--blue);}

.logo{
  width:68px;
  height:68px;
  border-radius:18px;
  object-fit:cover;
  border:2px solid var(--gold);
  background:#fff;
  margin:0 auto 10px;
}

.nome-campeonato{
  font-size:17px;
  font-weight:900;
  color:#fff;
  margin-bottom:8px;
}

.info-campeonato{
  color:var(--muted);
  font-size:12px;
  margin-bottom:8px;
}

.btn-ver{
  width:100%;
  padding:9px;
  border-radius:11px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  font-weight:900;
  display:block;
}

.vazio{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  padding:22px;
  border-radius:14px;
  text-align:center;
  color:var(--muted);
  border:1px solid rgba(255,255,255,.08);
  grid-column:1/-1;
}

@media(max-width:600px){
  .hero{
    padding:14px;
  }

  .hero h2{
    font-size:22px;
  }

  .lista-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<main class="wrap container">

<section class="hero">
  <h2>Campeonatos</h2>
  <p>Veja os campeonatos publicados.</p>
</section>

<section class="lista-grid" id="listaCampeonatos"></section>

</main>

<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("campeonatos");

const jogosReais = [
  {
    id:"br-rod36-1",
    campeonatoId:"brasileirao-2023",
    campeonato:"Brasileirão 2023",
    categoria:"Profissional",
    timeA:"Flamengo",
    timeB:"Atlético MG",
    golsA:2,
    golsB:1
  },
  {
    id:"br-rod36-2",
    campeonatoId:"brasileirao-2023",
    campeonato:"Brasileirão 2023",
    categoria:"Profissional",
    timeA:"Palmeiras",
    timeB:"Fluminense",
    golsA:1,
    golsB:0
  },
  {
    id:"br-rod37-1",
    campeonatoId:"brasileirao-2023",
    campeonato:"Brasileirão 2023",
    categoria:"Profissional",
    timeA:"Grêmio",
    timeB:"Vasco",
    golsA:1,
    golsB:0
  },
  {
    id:"br-rod37-2",
    campeonatoId:"brasileirao-2023",
    campeonato:"Brasileirão 2023",
    categoria:"Profissional",
    timeA:"Corinthians",
    timeB:"Internacional",
    golsA:2,
    golsB:2
  },
  {
    id:"br-rod38-1",
    campeonatoId:"brasileirao-2023",
    campeonato:"Brasileirão 2023",
    categoria:"Profissional",
    timeA:"Palmeiras",
    timeB:"Cruzeiro",
    golsA:1,
    golsB:1
  },
  {
    id:"br-rod38-2",
    campeonatoId:"brasileirao-2023",
    campeonato:"Brasileirão 2023",
    categoria:"Profissional",
    timeA:"Atlético MG",
    timeB:"Bahia",
    golsA:4,
    golsB:1
  }
];

let campeonatos = [];
let jogos = [];

function normalizar(texto){
  return String(texto || "").toLowerCase();
}

function calcularGols(campeonato){
  return jogos
    .filter(j =>
      normalizar(j.campeonato) === normalizar(campeonato.nome) ||
      j.campeonatoId === campeonato.id
    )
    .reduce((total, j) => total + Number(j.golsA || 0) + Number(j.golsB || 0), 0);
}

function contarJogos(campeonato){
  return jogos.filter(j =>
    normalizar(j.campeonato) === normalizar(campeonato.nome) ||
    j.campeonatoId === campeonato.id
  ).length;
}

function render(){
  const lista = document.getElementById("listaCampeonatos");

  if(!campeonatos.length){
    lista.innerHTML = `<div class="vazio">Nenhum campeonato encontrado.</div>`;
    return;
  }

  lista.innerHTML = campeonatos.map(c => {
    const jogosQtd = contarJogos(c);
    const gols = calcularGols(c);

    return `
      <div class="card">
        <div class="card-top">
          <div class="card-icon"><i class="fa-solid fa-trophy"></i></div>
          <div class="status-tag status-ativo">Ativo</div>
        </div>

        <img src="${c.logo || c.imagem || "logo-liga.jfif"}" class="logo" onerror="this.src='logo-liga.jfif'">

        <div class="nome-campeonato">${c.nome || c.titulo || "Sem nome"}</div>

        <div class="info-campeonato">
          <strong>Temporada:</strong> ${c.temporada || c.ano || "-"}<br>
          <strong>Jogos:</strong> ${jogosQtd}<br>
          <strong>Gols:</strong> ${gols}
        </div>

        <a class="btn-ver" href="campeonato-publico.html?id=${c.id}">
          Ver Campeonato
        </a>
      </div>
    `;
  }).join("");
}

async function carregar(){
  try{
    const snapCamp = await getDocs(collection(db, "campeonatos"));
    const snapJogos = await getDocs(collection(db, "jogos"));

    campeonatos = [];
    jogos = [];

    snapCamp.forEach(docSnap => {
      campeonatos.push({
        id:docSnap.id,
        ...docSnap.data()
      });
    });

    snapJogos.forEach(docSnap => {
      jogos.push({
        id:docSnap.id,
        ...docSnap.data()
      });
    });

  }catch(e){
    console.error("Erro ao carregar campeonatos:", e);
  }

  if(!campeonatos.some(c => c.id === "brasileirao-2023")){
    campeonatos.push({
      id:"brasileirao-2023",
      nome:"Brasileirão 2023",
      temporada:"2023"
    });
  }

  jogos = [...jogosReais, ...jogos];

  render();
}

carregar();
</script>

</body>
</html>
