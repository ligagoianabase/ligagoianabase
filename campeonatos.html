<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;

  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);

}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

input,
select{
  font-family:inherit;
}

img{
  display:block;
  max-width:100%;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

/* HEADER PADRÃO */
.site-header{
  background:linear-gradient(180deg, rgba(2,10,24,.98), rgba(8,23,44,.96));
  border-bottom:3px solid var(--gold);
  box-shadow:var(--shadow);
}

.header-top{
  min-height:92px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px 0;
}

.header-title{
  text-align:center;
  font-size:26px;
  font-weight:900;
  letter-spacing:.8px;
  text-transform:uppercase;
  line-height:1.15;
}

/* MENU PADRÃO JOGOS/SÚMULAS */
.nav-bar{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.98));
  border-top:1px solid rgba(255,255,255,.06);
  overflow:hidden;
}

.menu{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:clamp(4px, .55vw, 10px);
  padding:14px 6px;
  flex-wrap:nowrap;
  overflow:hidden;
}

.menu a{
  color:#fff;
  font-weight:900;
  font-size:clamp(11px, .92vw, 15px);
  background:linear-gradient(180deg, rgba(16,42,82,.98), rgba(12,33,64,.98));
  padding:clamp(8px, .75vw, 12px) clamp(9px, 1vw, 18px);
  border-radius:clamp(10px, .9vw, 15px);
  border:1px solid rgba(255,255,255,.07);
  white-space:nowrap;
  flex:0 1 auto;
  box-shadow:0 10px 22px rgba(0,0,0,.24);
  transition:.25s ease;
}

.menu a:hover{
  color:var(--gold);
  border-color:var(--gold-line);
}

.menu a.ativo{
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
}

/* PÁGINA */
.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

.exemplo-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:12px;
  margin-bottom:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.exemplo-bar span{
  color:var(--muted);
  font-size:13px;
  line-height:1.45;
}

.exemplo-bar strong{
  color:var(--gold);
}

.exemplo-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.btn-mini{
  padding:9px 12px;
  border-radius:11px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:13px;
}

.btn-gold{
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
}

.btn-red{
  background:var(--red);
  color:#fff;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

input,
select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
  outline:none;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
}

input:focus,
select:focus{
  outline:2px solid rgba(247,198,0,.65);
}

.lista-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
  gap:10px;
}
/* CARD */
.card{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  transition:.25s ease;
  text-align:center;
}

.card:hover{
  transform:translateY(-2px);
  border-color:var(--gold);
}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
}

.card-icon{
  width:34px;
  height:34px;
  border-radius:10px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

.status-tag{
  color:#fff;
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.status-ativo{background:var(--green);}
.status-encerrado{background:var(--yellow);}
.status-exemplo{background:var(--blue);}

.logo{
  width:68px;
  height:68px;
  border-radius:18px;
  object-fit:cover;
  border:2px solid var(--gold);
  background:#fff;
  margin:0 auto 10px;
}

.nome-campeonato{
  font-size:17px;
  font-weight:900;
  color:#fff;
  margin-bottom:8px;
}

.info-campeonato{
  color:var(--muted);
  font-size:12px;
  margin-bottom:8px;
}

.tags{
  display:flex;
  justify-content:center;
  gap:5px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.tag{
  background:rgba(26,63,115,.9);
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
}

.btn-ver{
  width:100%;
  padding:9px;
  border-radius:11px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  font-weight:900;
}

/* MENU CORRIGIDO */
.menu a[href="sumula-publica.html"]{
  display:none;

<main class="wrap container">

<section class="hero">
  <h2>Campeonatos</h2>
  <p>Veja os campeonatos publicados.</p>
</section>

<section class="lista-grid" id="listaCampeonatos"></section>
<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* =========================
   🔥 JOGOS REAIS (BR 2023 - últimas rodadas)
========================= */

const jogosReais = [
  {
    id:"br-rod36-1",
    campeonatoId:"brasileirao-2023",
    campeonato:"Brasileirão 2023",
    categoria:"Profissional",
    timeA:"Flamengo",
    timeB:"Atlético MG",
    golsA:2,
    golsB:1
  },
  {
    id:"br-rod36-2",
    campeonatoId:"brasileirao-2023",
    campeonato:"Brasileirão 2023",
    categoria:"Profissional",
    timeA:"Palmeiras",
    timeB:"Fluminense",
    golsA:1,
    golsB:0
  },
  {
    id:"br-rod37-1",
    campeonatoId:"brasileirao-2023",
    campeonato:"Brasileirão 2023",
    categoria:"Profissional",
    timeA:"Grêmio",
    timeB:"Vasco",
    golsA:1,
    golsB:0
  },
  {
    id:"br-rod37-2",
    campeonatoId:"brasileirao-2023",
    campeonato:"Brasileirão 2023",
    categoria:"Profissional",
    timeA:"Corinthians",
    timeB:"Internacional",
    golsA:2,
    golsB:2
  },
  {
    id:"br-rod38-1",
    campeonatoId:"brasileirao-2023",
    campeonato:"Brasileirão 2023",
    categoria:"Profissional",
    timeA:"Palmeiras",
    timeB:"Cruzeiro",
    golsA:1,
    golsB:1
  },
  {
    id:"br-rod38-2",
    campeonatoId:"brasileirao-2023",
    campeonato:"Brasileirão 2023",
    categoria:"Profissional",
    timeA:"Atlético MG",
    timeB:"Bahia",
    golsA:4,
    golsB:1
  }
];

let campeonatos = [];
let jogos = [];

function normalizar(texto){
  return String(texto || "").toLowerCase();
}

function calcularGols(campeonato){
  return jogos
    .filter(j => normalizar(j.campeonato) === normalizar(campeonato.nome))
    .reduce((total, j) => total + (j.golsA || 0) + (j.golsB || 0), 0);
}

function contarJogos(campeonato){
  return jogos.filter(j =>
    normalizar(j.campeonato) === normalizar(campeonato.nome)
  ).length;
}

function render(){
  const lista = document.getElementById("listaCampeonatos");

  if(!campeonatos.length){
    lista.innerHTML = `<div class="vazio">Nenhum campeonato encontrado</div>`;
    return;
  }

  lista.innerHTML = campeonatos.map(c => {

    const jogosQtd = contarJogos(c);
    const gols = calcularGols(c);

    return `
      <div class="card">
        <div class="card-top">
          <div class="card-icon"><i class="fa-solid fa-trophy"></i></div>
          <div class="status-tag status-ativo">Ativo</div>
        </div>

        <img src="logo-liga.jfif" class="logo">

        <div class="nome-campeonato">${c.nome}</div>

        <div class="info-campeonato">
          <strong>Temporada:</strong> ${c.temporada || "2023"}<br>
          <strong>Jogos:</strong> ${jogosQtd}<br>
          <strong>Gols:</strong> ${gols}
        </div>

        <a class="btn-ver" href="campeonato-publico.html?id=${c.id}">
          Ver Campeonato
        </a>
      </div>
    `;
  }).join("");
}

/* =========================
   🔥 FIREBASE + AUTO INTEGRAÇÃO
========================= */

async function carregar(){
  try{
    const snapCamp = await getDocs(collection(db, "campeonatos"));
    const snapJogos = await getDocs(collection(db, "jogos"));

    campeonatos = [];
    jogos = [];

    snapCamp.forEach(doc => {
      campeonatos.push({ id:doc.id, ...doc.data() });
    });

    snapJogos.forEach(doc => {
      jogos.push({ id:doc.id, ...doc.data() });
    });

  }catch(e){
    console.log("Firebase erro, usando fallback");
  }

  /* 🔥 INJEÇÃO AUTOMÁTICA */
  campeonatos.push({
    id:"brasileirao-2023",
    nome:"Brasileirão 2023",
    temporada:"2023"
  });

  jogos = [...jogosReais, ...jogos];

  render();
}

carregar();
</script>
