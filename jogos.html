<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogos - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --yellow:#7a5a00;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none}
input,select{font-family:inherit}

img{
  display:block;
  max-width:100%;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

/* PÁGINA */
.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

.hero-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:12px;
}

.hero-tag{
  background:rgba(26,63,115,.9);
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

input,
select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
  outline:none;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
}

input:focus,
select:focus{
  outline:2px solid rgba(247,198,0,.65);
}

.titulo-secao{
  color:var(--gold);
  font-size:22px;
  font-weight:900;
  margin:0 0 12px;
}

/* GRID PADRÃO — MÁXIMO 5 POR LINHA */
.lista-grid{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:12px;
}

@media(max-width:1100px){
  .lista-grid{
    grid-template-columns:repeat(4, 1fr);
  }
}

@media(max-width:900px){
  .lista-grid{
    grid-template-columns:repeat(3, 1fr);
  }
}

@media(max-width:650px){
  .lista-grid{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:430px){
  .lista-grid{
    grid-template-columns:1fr;
  }
}

/* CARD PADRÃO FIFA */
.card-jogo{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.12), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  transition:.25s ease;
  text-align:center;
  min-height:205px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card-jogo:hover{
  transform:translateY(-1px);
  border-color:var(--gold);
}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  margin-bottom:8px;
}

.card-icon{
  width:30px;
  height:30px;
  border-radius:9px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  flex-shrink:0;
}

.status-area{
  display:flex;
  justify-content:flex-end;
  gap:5px;
  flex-wrap:wrap;
}

.status-tag{
  color:#fff;
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.status-finalizado{background:var(--green)}
.status-agendado{background:var(--yellow)}
.status-aberto{background:var(--blue)}
.status-nova{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.times-linha{
  display:grid;
  grid-template-columns:1fr 58px 1fr;
  align-items:center;
  gap:6px;
  margin:6px 0 8px;
}

.time-box{
  display:flex;
  align-items:center;
  gap:5px;
  min-width:0;
  font-size:12px;
  font-weight:900;
}

.time-box.visitante{
  justify-content:flex-end;
  text-align:right;
  flex-direction:row-reverse;
}

.time-box span{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.escudo{
  width:26px;
  height:26px;
  border-radius:50%;
  border:1px solid var(--gold);
  object-fit:cover;
  background:#fff;
  flex-shrink:0;
}

.placar{
  color:var(--gold);
  font-size:15px;
  font-weight:900;
  background:rgba(2,10,24,.9);
  border:1px solid var(--gold-line);
  border-radius:8px;
  width:58px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.info-jogo{
  color:var(--muted);
  font-size:11px;
  line-height:1.3;
  text-align:center;
  margin:6px 0 8px;
}

.info-jogo strong{
  color:#fff;
}

.tags{
  display:flex;
  justify-content:center;
  gap:5px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.tag{
  background:rgba(26,63,115,.9);
  padding:4px 6px;
  border-radius:999px;
  font-size:10px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.acoes{
  display:grid;
  grid-template-columns:1fr;
  gap:6px;
  margin-top:auto;
}

.acoes.duas{
  grid-template-columns:1fr 1fr;
}

.btn-acao{
  width:100%;
  padding:8px 8px;
  border-radius:9px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  font-size:12px;
}

.btn-ver{
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
}

.btn-secundario{
  background:#1a3f73;
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
}

.btn-wpp{
  background:#25d366;
  color:#fff;
}

/* DETALHE DO JOGO */
.detalhe-jogo{
  display:none;
  margin-top:18px;
  padding:18px;
  border:2px solid var(--gold);
  border-radius:16px;
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  text-align:center;
  box-shadow:var(--shadow);
}

.detalhe-jogo h2{
  color:var(--gold);
  font-size:24px;
  margin-bottom:12px;
}

.detalhe-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:14px;
}

.detalhe-item{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:12px;
  color:var(--muted);
  font-size:13px;
  line-height:1.45;
}

.detalhe-item strong{
  display:block;
  color:var(--gold);
  margin-bottom:5px;
}

.vazio{
  color:var(--muted);
  text-align:center;
  padding:18px;
  background:rgba(7,29,55,.9);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  grid-column:1/-1;
}

/* CELULAR */
@media(max-width:900px){
  .filtros{grid-template-columns:1fr}
  .detalhe-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<main class="wrap container">

  <section class="hero">
    <h2>Jogos</h2>
    <p>Acompanhe os jogos publicados, placares finalizados e súmulas oficiais.</p>

    <div class="hero-tags">
      <div class="hero-tag" id="tagTotal">Jogos: 0</div>
      <div class="hero-tag" id="tagFinalizados">Finalizados: 0</div>
      <div class="hero-tag" id="tagAgendados">Agendados: 0</div>
    </div>
  </section>

  <section class="filtros">
    <input id="buscaJogo" placeholder="Pesquisar time, campeonato, árbitro ou local...">

    <select id="filtroCampeonato">
      <option value="">Todos os campeonatos</option>
    </select>

    <select id="filtroCategoria">
      <option value="">Todas categorias</option>
    </select>
  </section>

  <h2 class="titulo-secao" id="tituloPagina">Jogos</h2>

  <section class="lista-grid" id="listaJogos">
    <div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando jogos...</div>
  </section>

  <section class="detalhe-jogo" id="detalheJogo"></section>

</main>
<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import {
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("jogos");

let jogos = [];
let sumulas = [];
let campeonatos = [];

function normalizarTexto(texto){
  return String(texto || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function valorCampo(obj, chaves, fallback = ""){
  for(const chave of chaves){
    if(obj && obj[chave] !== undefined && obj[chave] !== null && obj[chave] !== ""){
      return obj[chave];
    }
  }
  return fallback;
}

function formatarDataHora(valor){
  if(!valor) return "-";
  if(typeof valor.toDate === "function") valor = valor.toDate();

  const data = new Date(valor);
  if(isNaN(data.getTime())) return String(valor);

  return data.toLocaleString("pt-BR", {
    day:"2-digit",
    month:"2-digit",
    year:"numeric",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function pegarSumula(jogoId){
  return sumulas.find(s => s.id === jogoId || s.jogoId === jogoId) || null;
}

function sumulaFinalizada(jogo){
  const s = pegarSumula(jogo.id);

  return (
    jogo.sumulaFinalizada === true ||
    jogo.status === "finalizado" ||
    s?.sumulaFinalizada === true ||
    s?.publica === true ||
    s?.publico === true ||
    normalizarTexto(s?.status) === "finalizado"
  );
}

function pegarTimeA(j){
  if(j.timeA && typeof j.timeA === "object") return j.timeA.nome || "Time A";
  return valorCampo(j, ["timeA", "mandante", "timeMandanteNome", "mandanteNome"], "Time A");
}

function pegarTimeB(j){
  if(j.timeB && typeof j.timeB === "object") return j.timeB.nome || "Time B";
  return valorCampo(j, ["timeB", "visitante", "timeVisitanteNome", "visitanteNome"], "Time B");
}

function pegarLogoA(j){
  if(j.timeA && typeof j.timeA === "object") return j.timeA.logo || j.timeA.escudo || "logo-liga.jfif";
  return valorCampo(j, ["logoTimeA", "escudoA", "logoA", "timeALogo", "mandanteLogo"], "logo-liga.jfif");
}

function pegarLogoB(j){
  if(j.timeB && typeof j.timeB === "object") return j.timeB.logo || j.timeB.escudo || "logo-liga.jfif";
  return valorCampo(j, ["logoTimeB", "escudoB", "logoB", "timeBLogo", "visitanteLogo"], "logo-liga.jfif");
}

function pegarPlacarA(j){
  const s = pegarSumula(j.id);

  if(s?.placar && typeof s.placar === "object"){
    return s.placar.A ?? s.placar.a ?? s.placar.mandante ?? 0;
  }

  if(j.placar && typeof j.placar === "object"){
    return j.placar.A ?? j.placar.a ?? j.placar.mandante ?? 0;
  }

  return Number(valorCampo(s, ["golsA", "placarA", "golsMandante"], valorCampo(j, ["golsA", "placarA", "golsMandante"], 0)));
}

function pegarPlacarB(j){
  const s = pegarSumula(j.id);

  if(s?.placar && typeof s.placar === "object"){
    return s.placar.B ?? s.placar.b ?? s.placar.visitante ?? 0;
  }

  if(j.placar && typeof j.placar === "object"){
    return j.placar.B ?? j.placar.b ?? j.placar.visitante ?? 0;
  }

  return Number(valorCampo(s, ["golsB", "placarB", "golsVisitante"], valorCampo(j, ["golsB", "placarB", "golsVisitante"], 0)));
}

function obterCampeonato(j){
  return valorCampo(j, ["campeonato", "campeonatoNome", "nomeCampeonato"], "Campeonato");
}

function obterCategoria(j){
  return valorCampo(j, ["categoria"], "-");
}

function obterRodada(j){
  return valorCampo(j, ["rodada", "fase"], "Jogo");
}

function obterLocal(j){
  return valorCampo(j, ["local", "campo", "estadio"], "-");
}

function obterData(j){
  return valorCampo(j, ["data", "dataHora", "dataJogo"], "");
}

function obterArbitro(j){
  return valorCampo(j, ["arbitro"], "Árbitro");
}

function classeStatus(j){
  if(sumulaFinalizada(j)) return "status-finalizado";

  const status = normalizarTexto(j.status);

  if(status === "aberto" || status === "em andamento") return "status-aberto";

  return "status-agendado";
}

function textoStatus(j){
  if(sumulaFinalizada(j)) return "Finalizado";

  const status = normalizarTexto(j.status);

  if(status === "aberto") return "Aberto";
  if(status === "em andamento") return "Em andamento";

  return "Agendado";
}

function preencherFiltros(){
  const filtroCampeonato = document.getElementById("filtroCampeonato");
  const filtroCategoria = document.getElementById("filtroCategoria");

  const campeonatoAtual = filtroCampeonato.value;
  const categoriaAtual = filtroCategoria.value;

  const campeonatosSet = new Set();

  campeonatos.forEach(c=>{
    const nome = c.nome || c.campeonato || c.titulo || "";
    if(nome) campeonatosSet.add(nome);
  });

  jogos.forEach(j=>{
    const nome = obterCampeonato(j);
    if(nome && nome !== "Campeonato") campeonatosSet.add(nome);
  });

  filtroCampeonato.innerHTML = `<option value="">Todos os campeonatos</option>`;

  [...campeonatosSet].sort((a,b)=>a.localeCompare(b,"pt-BR")).forEach(nome=>{
    filtroCampeonato.innerHTML += `<option value="${nome}">${nome}</option>`;
  });

  if([...campeonatosSet].includes(campeonatoAtual)){
    filtroCampeonato.value = campeonatoAtual;
  }

  const categorias = new Set();

  jogos.forEach(j=>{
    if(filtroCampeonato.value && obterCampeonato(j) !== filtroCampeonato.value) return;

    const categoria = obterCategoria(j);
    if(categoria && categoria !== "-") categorias.add(categoria);
  });

  filtroCategoria.innerHTML = `<option value="">Todas categorias</option>`;

  [...categorias].sort((a,b)=>a.localeCompare(b,"pt-BR")).forEach(nome=>{
    filtroCategoria.innerHTML += `<option value="${nome}">${nome}</option>`;
  });

  if([...categorias].includes(categoriaAtual)){
    filtroCategoria.value = categoriaAtual;
  }
}

function jogosFiltrados(){
  const busca = normalizarTexto(document.getElementById("buscaJogo").value);
  const campeonatoSelecionado = document.getElementById("filtroCampeonato").value;
  const categoriaSelecionada = document.getElementById("filtroCategoria").value;

  return jogos.filter(j=>{
    const timeA = pegarTimeA(j);
    const timeB = pegarTimeB(j);
    const campeonato = obterCampeonato(j);
    const categoria = obterCategoria(j);
    const local = obterLocal(j);
    const arbitro = obterArbitro(j);
    const rodada = obterRodada(j);

    if(campeonatoSelecionado && campeonato !== campeonatoSelecionado) return false;
    if(categoriaSelecionada && categoria !== categoriaSelecionada) return false;

    if(busca){
      const texto = normalizarTexto(`${timeA} ${timeB} ${campeonato} ${categoria} ${local} ${arbitro} ${rodada}`);
      if(!texto.includes(busca)) return false;
    }

    return true;
  });
}

function atualizarTopo(){
  const filtrados = jogosFiltrados();
  const finalizados = filtrados.filter(sumulaFinalizada);
  const agendados = filtrados.filter(j => !sumulaFinalizada(j));

  const campeonatoSelecionado = document.getElementById("filtroCampeonato").value;
  const categoriaSelecionada = document.getElementById("filtroCategoria").value;

  document.getElementById("tagTotal").innerText = `Jogos: ${filtrados.length}`;
  document.getElementById("tagFinalizados").innerText = `Finalizados: ${finalizados.length}`;
  document.getElementById("tagAgendados").innerText = `Agendados: ${agendados.length}`;

  document.getElementById("tituloPagina").innerText =
    `Jogos${categoriaSelecionada ? " - " + categoriaSelecionada : ""}${campeonatoSelecionado ? " | " + campeonatoSelecionado : ""}`;
}

function ehNovo(j){
  const s = pegarSumula(j.id);
  const data = s?.finalizadaEm || s?.dataFinalizacao || j.criadoEmServidor || j.criadoEm || "";
  if(!data) return false;

  let d = data;
  if(typeof d.toDate === "function") d = d.toDate();

  const time = new Date(d).getTime();
  if(isNaN(time)) return false;

  const dias = (Date.now() - time) / (1000 * 60 * 60 * 24);
  return dias <= 3;
}

window.compartilharSumula = function(id,event){
  event.stopPropagation();

  const base = location.origin + location.pathname.replace("jogos.html","");
  const url = `${base}sumula-publica.html?id=${encodeURIComponent(id)}`;
  const texto = `Súmula oficial da Liga Goiana de Futebol de Base: ${url}`;

  window.open("https://wa.me/?text=" + encodeURIComponent(texto), "_blank");
};

window.abrirJogo = function(id){
  const j = jogos.find(item => item.id === id);
  if(!j) return;

  const detalhe = document.getElementById("detalheJogo");
  const finalizado = sumulaFinalizada(j);
  const placar = finalizado ? `${pegarPlacarA(j)} x ${pegarPlacarB(j)}` : "x";

  detalhe.style.display = "block";

  detalhe.innerHTML = `
    <h2>${pegarTimeA(j)} ${placar} ${pegarTimeB(j)}</h2>

    <div class="detalhe-grid">
      <div class="detalhe-item">
        <strong>Campeonato</strong>
        ${obterCampeonato(j)}
      </div>

      <div class="detalhe-item">
        <strong>Categoria</strong>
        ${obterCategoria(j)}
      </div>

      <div class="detalhe-item">
        <strong>Data</strong>
        ${formatarDataHora(obterData(j))}
      </div>

      <div class="detalhe-item">
        <strong>Local</strong>
        ${obterLocal(j)}
      </div>

      <div class="detalhe-item">
        <strong>Rodada/Fase</strong>
        ${obterRodada(j)}
      </div>

      <div class="detalhe-item">
        <strong>Árbitro</strong>
        ${obterArbitro(j)}
      </div>

      <div class="detalhe-item">
        <strong>Status</strong>
        ${textoStatus(j)}
      </div>

      <div class="detalhe-item">
        <strong>Súmula</strong>
        ${finalizado ? "Publicada" : "Aguardando finalização"}
      </div>
    </div>
  `;

  detalhe.scrollIntoView({
    behavior:"smooth",
    block:"start"
  });
};

function renderizarJogos(){
  const lista = document.getElementById("listaJogos");
  const filtrados = jogosFiltrados();

  atualizarTopo();

  if(!filtrados.length){
    lista.innerHTML = `<div class="vazio">Nenhum jogo encontrado.</div>`;
    return;
  }

  const ordenados = [...filtrados].sort((a,b)=>{
    const dataA = String(obterData(a));
    const dataB = String(obterData(b));
    return dataA.localeCompare(dataB);
  });

  lista.innerHTML = ordenados.map(j=>{
    const finalizado = sumulaFinalizada(j);

    const timeA = pegarTimeA(j);
    const timeB = pegarTimeB(j);

    const logoA = pegarLogoA(j);
    const logoB = pegarLogoB(j);

    const placar = finalizado ? `${pegarPlacarA(j)} x ${pegarPlacarB(j)}` : "x";

    const campeonato = obterCampeonato(j);
    const categoria = obterCategoria(j);
    const data = formatarDataHora(obterData(j));
    const local = obterLocal(j);
    const rodada = obterRodada(j);
    const arbitro = obterArbitro(j);

    return `
      <article class="card-jogo">
        <div class="card-top">
          <div class="card-icon">
            <i class="fa-solid fa-calendar-days"></i>
          </div>

          <div class="status-area">
            ${ehNovo(j) ? `<div class="status-tag status-nova">Novo</div>` : ""}
            <div class="status-tag ${classeStatus(j)}">
              ${textoStatus(j)}
            </div>
          </div>
        </div>

        <div class="times-linha">
          <div class="time-box">
            <img src="${logoA}" class="escudo" onerror="this.src='logo-liga.jfif'">
            <span>${timeA}</span>
          </div>

          <div class="placar">${placar}</div>

          <div class="time-box visitante">
            <span>${timeB}</span>
            <img src="${logoB}" class="escudo" onerror="this.src='logo-liga.jfif'">
          </div>
        </div>

        <div class="info-jogo">
          <strong>${campeonato}</strong><br>
          ${categoria}<br>
          ${data}<br>
          ${local}
        </div>

        <div class="tags">
          <span class="tag">${rodada}</span>
          <span class="tag">${arbitro}</span>
        </div>

        <div class="acoes ${finalizado ? "duas" : ""}">
          <button class="btn-acao btn-ver" onclick="abrirJogo('${j.id}')">
            <i class="fa-solid fa-eye"></i> Ver
          </button>

          ${
            finalizado
              ? `
                <a class="btn-acao btn-secundario" href="sumula-publica.html?id=${encodeURIComponent(j.id)}">
                  <i class="fa-solid fa-file-lines"></i> Súmula
                </a>
              `
              : ""
          }

          ${
            finalizado
              ? `
                <button class="btn-acao btn-wpp" onclick="compartilharSumula('${j.id}', event)">
                  <i class="fa-brands fa-whatsapp"></i> Enviar
                </button>
              `
              : ""
          }
        </div>
      </article>
    `;
  }).join("");
}

document.getElementById("buscaJogo").addEventListener("input", renderizarJogos);

document.getElementById("filtroCampeonato").addEventListener("change", ()=>{
  preencherFiltros();
  document.getElementById("filtroCategoria").value = "";
  renderizarJogos();
});

document.getElementById("filtroCategoria").addEventListener("change", renderizarJogos);

function iniciarTempoReal(){
  onSnapshot(collection(db,"jogos"),snap=>{
    jogos = snap.docs.map(d=>({id:d.id,...d.data()}));
    preencherFiltros();
    renderizarJogos();
  });

  onSnapshot(collection(db,"sumulas"),snap=>{
    sumulas = snap.docs.map(d=>({id:d.id,...d.data()}));
    preencherFiltros();
    renderizarJogos();
  });

  onSnapshot(collection(db,"campeonatos"),snap=>{
    campeonatos = snap.docs.map(d=>({id:d.id,...d.data()}));
    preencherFiltros();
    renderizarJogos();
  });
}

iniciarTempoReal();
</script>
