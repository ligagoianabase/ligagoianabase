function normalizarTexto(texto){
  return String(texto || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function valorCampo(obj, chaves, fallback = ""){
  for(const chave of chaves){
    if(obj && obj[chave] !== undefined && obj[chave] !== null && obj[chave] !== ""){
      return obj[chave];
    }
  }
  return fallback;
}

function obterIdCampeonato(c){
  return valorCampo(c, ["id", "campeonatoId"], "");
}

function obterNomeCampeonato(c){
  return valorCampo(c, ["nome", "campeonato", "titulo"], "");
}

function formatarDataHora(valor){
  if(!valor) return "-";

  const data = new Date(valor);

  if(isNaN(data.getTime())){
    return String(valor);
  }

  return data.toLocaleString("pt-BR", {
    day:"2-digit",
    month:"2-digit",
    year:"numeric",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function pegarEscudo(nomeTime, direto){
  if(direto) return direto;

  const time = times.find(t =>
    normalizarTexto(valorCampo(t, ["nome"], "")) === normalizarTexto(nomeTime)
  );

  return valorCampo(time, ["escudo", "logo", "logoUrl"], "logo-liga.jfif");
}

function jogoFinalizado(j){
  const status = normalizarTexto(valorCampo(j, ["status"], ""));
  return status === "finalizado" || status === "sumula_enviada";
}

function textoStatus(j){
  if(jogoFinalizado(j)) return "Finalizado";
  return "Agendado";
}

function classeStatus(j){
  if(jogoFinalizado(j)) return "status-finalizado";
  return "status-agendado";
}

async function carregarDados(){
  try{
    const [snapJogos, snapTimes, snapCampeonatos] = await Promise.all([
      getDocs(collection(db, "jogos")),
      getDocs(collection(db, "times")),
      getDocs(collection(db, "campeonatos"))
    ]);

    jogos = [];
    times = [];
    campeonatos = [];

    snapJogos.forEach(docSnap => {
      jogos.push({ id:docSnap.id, ...docSnap.data() });
    });

    snapTimes.forEach(docSnap => {
      times.push({ id:docSnap.id, ...docSnap.data() });
    });

    snapCampeonatos.forEach(docSnap => {
      campeonatos.push({ id:docSnap.id, ...docSnap.data() });
    });

  }catch(erro){
    console.error(erro);
    jogos = [];
    times = [];
    campeonatos = [];
  }

  if(exemplosAtivos){
    campeonatos = [...campeonatosExemplo, ...campeonatos];
    times = [...timesExemplo, ...times];
    jogos = [...jogosExemplo, ...jogos];
  }

  if(!campeonatos.length){
    campeonatos = campeonatosExemplo;
  }

  if(!times.length){
    times = timesExemplo;
  }

  if(!jogos.length){
    jogos = jogosExemplo;
  }
}

function preencherCampeonatos(){
  const select = document.getElementById("filtroCampeonato");

  select.innerHTML = `<option value="">Todos os campeonatos</option>`;

  const usados = new Set();

  campeonatos
    .filter(c => obterNomeCampeonato(c))
    .sort((a,b)=>obterNomeCampeonato(a).localeCompare(obterNomeCampeonato(b), "pt-BR"))
    .forEach(c => {
      const id = obterIdCampeonato(c);
      const nome = obterNomeCampeonato(c);

      if(usados.has(id || nome)) return;
      usados.add(id || nome);

      const option = document.createElement("option");
      option.value = id || nome;
      option.textContent = nome;
      select.appendChild(option);
    });
}

function preencherCategorias(){
  const select = document.getElementById("filtroCategoria");
  const campeonatoSelecionado = document.getElementById("filtroCampeonato").value;

  select.innerHTML = `<option value="">Todas categorias</option>`;

  const categorias = new Set();

  jogos.forEach(j => {
    const campId = valorCampo(j, ["campeonatoId"], "");
    const campNome = valorCampo(j, ["campeonato", "nomeCampeonato"], "");
    const categoria = valorCampo(j, ["categoria"], "");

    if(!categoria) return;

    if(!campeonatoSelecionado){
      categorias.add(categoria);
      return;
    }

    if(campId === campeonatoSelecionado || campNome === campeonatoSelecionado){
      categorias.add(categoria);
    }
  });

  Array.from(categorias)
    .sort((a,b)=>a.localeCompare(b, "pt-BR"))
    .forEach(cat => {
      const option = document.createElement("option");
      option.value = cat;
      option.textContent = cat;
      select.appendChild(option);
    });
}

function jogosFiltrados(){
  const busca = normalizarTexto(document.getElementById("buscaJogo").value);
  const campeonatoSelecionado = document.getElementById("filtroCampeonato").value;
  const categoriaSelecionada = document.getElementById("filtroCategoria").value;

  return jogos.filter(j => {
    const campeonatoId = valorCampo(j, ["campeonatoId"], "");
    const campeonatoNome = valorCampo(j, ["campeonato", "nomeCampeonato"], "");
    const categoria = valorCampo(j, ["categoria"], "");
    const timeA = valorCampo(j, ["timeA"], "");
    const timeB = valorCampo(j, ["timeB"], "");
    const local = valorCampo(j, ["local"], "");

    if(campeonatoSelecionado){
      const mesmoCamp =
        campeonatoId === campeonatoSelecionado ||
        campeonatoNome === campeonatoSelecionado;

      if(!mesmoCamp) return false;
    }

    if(categoriaSelecionada && categoria !== categoriaSelecionada){
      return false;
    }

    if(busca){
      const texto = normalizarTexto(`${timeA} ${timeB} ${local} ${campeonatoNome} ${categoria}`);
      if(!texto.includes(busca)) return false;
    }

    return true;
  });
}

window.excluirExemplos = function(){
  localStorage.setItem("ocultarExemplosJogos", "sim");
  exemplosAtivos = false;

  jogos = jogos.filter(j => !j.exemplo);
  campeonatos = campeonatos.filter(c => !c.exemplo);
  times = times.filter(t => !t.exemplo);

  preencherCampeonatos();
  preencherCategorias();
  carregarJogos();
};

window.restaurarExemplos = async function(){
  localStorage.removeItem("ocultarExemplosJogos");
  exemplosAtivos = true;
  await carregarDados();
  preencherCampeonatos();
  preencherCategorias();
  carregarJogos();
};

window.abrirJogo = function(id){
  const j = jogos.find(item => item.id === id);
  if(!j) return;

  const detalhe = document.getElementById("detalheJogo");
  const finalizado = jogoFinalizado(j);

  detalhe.style.display = "block";

  detalhe.innerHTML = `
    <h2>${valorCampo(j, ["timeA"], "-")} ${finalizado ? `${Number(valorCampo(j, ["golsA"], 0))} x ${Number(valorCampo(j, ["golsB"], 0))}` : "x"} ${valorCampo(j, ["timeB"], "-")}</h2>

    <div class="detalhe-grid">
      <div class="detalhe-item">
        <strong>Campeonato</strong>
        ${valorCampo(j, ["campeonato", "nomeCampeonato"], "-")}
      </div>

      <div class="detalhe-item">
        <strong>Categoria</strong>
        ${valorCampo(j, ["categoria"], "-")}
      </div>

      <div class="detalhe-item">
        <strong>Data</strong>
        ${formatarDataHora(valorCampo(j, ["data"], ""))}
      </div>

      <div class="detalhe-item">
        <strong>Local</strong>
        ${valorCampo(j, ["local"], "-")}
      </div>

      <div class="detalhe-item">
        <strong>Rodada/Fase</strong>
        ${valorCampo(j, ["rodada", "fase"], "-")}
      </div>

      <div class="detalhe-item">
        <strong>Árbitro</strong>
        ${valorCampo(j, ["arbitro"], "-")}
      </div>

      <div class="detalhe-item">
        <strong>Status</strong>
        ${textoStatus(j)}
      </div>

      <div class="detalhe-item">
        <strong>Origem</strong>
        ${j.exemplo ? "Dado de exemplo" : "Firebase"}
      </div>
    </div>
  `;

  detalhe.scrollIntoView({
    behavior:"smooth",
    block:"start"
  });
};

window.carregarJogos = function(){
  const lista = document.getElementById("listaJogos");
  const titulo = document.getElementById("tituloPagina");
  const filtrados = jogosFiltrados();

  const campeonatoSelecionado = document.getElementById("filtroCampeonato").value;
  const categoriaSelecionada = document.getElementById("filtroCategoria").value;

  const campObj = campeonatos.find(c =>
    obterIdCampeonato(c) === campeonatoSelecionado ||
    obterNomeCampeonato(c) === campeonatoSelecionado
  );

  const campNome = campObj ? obterNomeCampeonato(campObj) : "";

  titulo.textContent =
    `Jogos${categoriaSelecionada ? " - " + categoriaSelecionada : ""}${campNome ? " | " + campNome : ""}`;

  if(!filtrados.length){
    lista.innerHTML = `<div class="vazio">Nenhum jogo encontrado.</div>`;
    return;
  }

  const ordenados = [...filtrados].sort((a,b) => {
    const dataA = String(valorCampo(a, ["data"], ""));
    const dataB = String(valorCampo(b, ["data"], ""));
    return dataA.localeCompare(dataB);
  });

  lista.innerHTML = ordenados.map(j => {
    const finalizado = jogoFinalizado(j);
    const placar = finalizado
      ? `${Number(valorCampo(j, ["golsA"], 0))} x ${Number(valorCampo(j, ["golsB"], 0))}`
      : "x";

    const timeA = valorCampo(j, ["timeA"], "-");
    const timeB = valorCampo(j, ["timeB"], "-");
    const campeonato = valorCampo(j, ["campeonato", "nomeCampeonato"], "-");
    const categoria = valorCampo(j, ["categoria"], "-");
    const local = valorCampo(j, ["local"], "-");
    const data = formatarDataHora(valorCampo(j, ["data"], ""));
    const escudoA = pegarEscudo(timeA, valorCampo(j, ["logoTimeA", "escudoA", "logoA"], ""));
    const escudoB = pegarEscudo(timeB, valorCampo(j, ["logoTimeB", "escudoB", "logoB"], ""));

    return `
      <article class="card-jogo">
        <div class="card-top">
          <div class="card-icon">
            <i class="fa-solid fa-calendar-days"></i>
          </div>

          <div class="status-tag ${classeStatus(j)}">
            ${textoStatus(j)}
          </div>
        </div>

        <div class="times-linha">
          <div class="time-box">
            <img src="${escudoA}" class="escudo" onerror="this.src='logo-liga.jfif'">
            <span>${timeA}</span>
          </div>

          <div class="placar">${placar}</div>

          <div class="time-box visitante">
            <span>${timeB}</span>
            <img src="${escudoB}" class="escudo" onerror="this.src='logo-liga.jfif'">
          </div>
        </div>

        <div class="info-jogo">
          <strong>${campeonato}</strong><br>
          ${categoria}<br>
          ${data}<br>
          ${local}
        </div>

        <div class="tags">
          ${j.exemplo ? `<span class="tag">Exemplo</span>` : `<span class="tag">Firebase</span>`}
          <span class="tag">${valorCampo(j, ["rodada", "fase"], "Jogo")}</span>
        </div>

        <div class="acoes">
          <button class="btn-acao btn-ver" onclick="abrirJogo('${j.id}')">
            <i class="fa-solid fa-eye"></i> Ver Jogo
          </button>

          ${
            finalizado
              ? `
                <a class="btn-acao btn-secundario" href="sumula-publica.html?id=${j.id}">
                  <i class="fa-solid fa-file-lines"></i> Ver Súmula
                </a>
              `
              : ""
          }

          ${
            j.exemplo
              ? `
                <button class="btn-acao btn-danger" onclick="excluirExemplos()">
                  <i class="fa-solid fa-trash"></i> Excluir Exemplos
                </button>
              `
              : ""
          }
        </div>
      </article>
    `;
  }).join("");
};

document.getElementById("buscaJogo").addEventListener("input", carregarJogos);

document.getElementById("filtroCampeonato").addEventListener("change", () => {
  preencherCategorias();
  document.getElementById("filtroCategoria").value = "";
  carregarJogos();
});

document.getElementById("filtroCategoria").addEventListener("change", carregarJogos);

async function iniciarPagina(){
  const lista = document.getElementById("listaJogos");
  lista.innerHTML = `<div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando jogos...</div>`;

  await carregarDados();
  preencherCampeonatos();
  preencherCategorias();
  carregarJogos();
}

iniciarPagina();
</script>

</body>
</html>
