<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
/* MANTÉM TODO SEU CSS ATUAL SEM ALTERAR */
</style>
</head>

<body>

<main class="wrap container">

  <section class="hero">
    <div class="hero-top">
      <img id="heroLogo" class="hero-logo" src="logo-liga.jfif">

      <div class="hero-info">
        <h2 id="heroTitulo">Tabela da Competição</h2>

        <p id="heroSub">
          Classificação, jogos e estatísticas geradas automaticamente pelas súmulas finalizadas.
        </p>

        <div class="hero-tags">
          <div class="hero-tag" id="heroTagCategoria">
            Categoria: -
          </div>

          <div class="hero-tag" id="heroTagJogos">
            Jogos finalizados: 0
          </div>

          <div class="hero-tag" id="heroTagTimes">
            Times: 0
          </div>

          <div class="hero-tag" id="heroTagGols">
            Gols: 0
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="filtros">
    <select id="filtroCampeonato">
      <option value="">Todos os campeonatos</option>
    </select>

    <select id="filtroCategoria">
      <option value="">Todas categorias</option>
    </select>
  </section>

  <h2 class="titulo-secao" id="tituloTabela">
    Tabela
  </h2>

  <div class="abas">

    <button class="aba ativa"
      onclick="trocarAba('detalhes',this)">
      Detalhes
    </button>

    <button class="aba"
      onclick="trocarAba('classificacao',this)">
      Classificação
    </button>

    <button class="aba"
      onclick="trocarAba('casaFora',this)">
      Casa / Fora
    </button>

    <button class="aba"
      onclick="trocarAba('jogos',this)">
      Jogos
    </button>

    <button class="aba"
      onclick="trocarAba('estatisticasTimes',this)">
      Estatísticas dos Times
    </button>

    <button class="aba"
      onclick="trocarAba('artilharia',this)">
      Artilharia
    </button>

    <button class="aba"
      onclick="trocarAba('assistencias',this)">
      Assistências
    </button>

    <button class="aba"
      onclick="trocarAba('cartoes',this)">
      Cartões
    </button>

    <button class="aba"
      onclick="trocarAba('suspensos',this)">
      Suspensos
    </button>

    <button class="aba"
      onclick="trocarAba('historico',this)">
      Histórico
    </button>

  </div>

  <div id="areaTabela">

    <div class="vazio">
      <i class="fa-solid fa-spinner fa-spin"></i>
      Carregando...
    </div>

  </div>

</main>

<script type="module" src="tabela.js"></script>

</body>
</html>
