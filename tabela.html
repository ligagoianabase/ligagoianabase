<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;--card:#071d37;--card2:#0d2a52;--gold:#f7c600;--gold2:#ffe45c;
  --white:#fff;--muted:#cbd6ea;--line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);--green:#1b5e20;--yellow:#7a5a00;
  --red:#b42323;--blue:#1a3f73;--shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:linear-gradient(rgba(2,8,20,.88),rgba(2,8,20,.96)),url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none}
select,input{font-family:inherit}

.wrap{width:min(100% - 28px,var(--max));margin:0 auto}
.container{padding:22px 0 34px}

.hero{
  background:radial-gradient(circle at top left,rgba(247,198,0,.16),transparent 34%),linear-gradient(135deg,rgba(16,42,82,.96),rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap}

.hero-logo{
  width:76px;height:76px;border-radius:20px;object-fit:cover;
  border:2px solid var(--gold);background:#fff;
}

.hero-info{flex:1;min-width:260px}

.hero h2{color:var(--gold);font-size:28px;font-weight:900;margin-bottom:6px}
.hero p{color:var(--muted);font-size:14px}

.hero-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}

.hero-tag,.tag{
  background:rgba(26,63,115,.9);
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

select,input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
  outline:none;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
}

.titulo-secao{
  color:var(--gold);
  font-size:22px;
  font-weight:900;
  margin:0 0 12px;
}

.abas,.sub-abas{
  display:flex;
  gap:8px;
  overflow-x:auto;
  scrollbar-width:none;
  margin-bottom:14px;
}

.aba,.sub-aba{
  color:#fff;
  font-weight:900;
  font-size:13px;
  background:linear-gradient(180deg,rgba(16,42,82,.98),rgba(12,33,64,.98));
  padding:10px 13px;
  border-radius:13px;
  border:1px solid rgba(255,255,255,.07);
  white-space:nowrap;
}

.aba.ativa,.sub-aba.ativa{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.cards-resumo{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
  margin-bottom:14px;
}

.card-resumo,.card-item,.ranking-card,.chart-card{
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.card-resumo{text-align:center;min-height:112px}

.card-resumo-icon,.card-icon{
  width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
  margin:0 auto 8px;
}

.card-resumo strong{
  display:block;
  color:var(--gold);
  font-size:12px;
  margin-bottom:5px;
}

.card-resumo span{
  display:block;
  color:#fff;
  font-size:18px;
  font-weight:900;
}

.top3-list{display:grid;gap:3px;margin-top:4px}

.top3-list div{
  font-size:11px;
  color:#fff;
  background:rgba(255,255,255,.05);
  border-radius:8px;
  padding:3px 5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* CONTROLE APP / COMPACTO / SWIPE */
.modo-tabela{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.modo-btn{
  background:linear-gradient(180deg,rgba(16,42,82,.98),rgba(12,33,64,.98));
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:9px 12px;
  font-size:12px;
  font-weight:900;
}

.modo-btn.ativo{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

/* TABELA DESKTOP / SWIPE */
.box-tabela{
  overflow-x:auto;
  border-radius:15px;
  -webkit-overflow-scrolling:touch;
}

.table{
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(8,23,44,.97));
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(247,198,0,.22);
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.row{
  display:flex;
  align-items:center;
  padding:10px 8px;
  border-bottom:1px solid rgba(255,255,255,.08);
  animation:fade .35s ease;
  min-width:1100px;
}

@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.row.header{background:rgba(3,12,29,.78);color:var(--gold);font-weight:900}
.row.top1{background:linear-gradient(90deg,rgba(247,198,0,.26),rgba(16,42,82,.96));border-left:5px solid var(--gold)}
.row.top2{background:linear-gradient(90deg,rgba(192,192,192,.20),rgba(16,42,82,.96));border-left:5px solid #c0c0c0}
.row.top3{background:linear-gradient(90deg,rgba(205,127,50,.20),rgba(16,42,82,.96));border-left:5px solid #cd7f32}

.col-pos{width:45px;text-align:center;font-weight:900}
.col-time{flex:1;padding:0 8px}
.col{width:56px;text-align:center;font-weight:800}
.col-wide{width:135px;text-align:center;font-weight:800}

.team{display:flex;align-items:center;gap:8px;font-weight:900}

.escudo,.photo{
  width:32px;height:32px;object-fit:cover;border-radius:50%;
  background:#fff;border:1px solid var(--gold-line);flex-shrink:0;
}

.forma{display:flex;justify-content:center;gap:3px}

.forma span{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;
}

.f-v{background:var(--green)}
.f-e{background:#777}
.f-d{background:var(--red)}

/* CLASSIFICAÇÃO TIPO APP */
.classificacao-app{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.class-card{
  position:relative;
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:18px;
  padding:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  overflow:hidden;
}

.class-card.top1{border-color:var(--gold)}
.class-card.top1::before{
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;
  width:5px;
  background:var(--gold);
}

.class-head{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}

.class-pos{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;
  flex-shrink:0;
}

.class-team{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
  flex:1;
}

.class-team strong{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:15px;
}

.class-pontos{
  color:var(--gold);
  font-size:24px;
  font-weight:900;
  text-align:right;
}

.class-pontos small{
  display:block;
  color:var(--muted);
  font-size:10px;
}

.metricas{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:7px;
}

.metrica{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  text-align:center;
  padding:7px 4px;
}

.metrica span{
  display:block;
  color:var(--gold);
  font-size:10px;
  font-weight:900;
  margin-bottom:3px;
}

.metrica strong{
  display:block;
  color:#fff;
  font-size:14px;
}

.class-extra{
  margin-top:10px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
}

.aproveitamento{
  color:#fff;
  font-weight:900;
  font-size:13px;
}

.lista-grid,.ranking-lista{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
}

.ranking-lista.ranking-3{
  grid-template-columns:repeat(3,1fr);
}

.card-item{text-align:center}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
}

.status-tag{
  color:#fff;
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.status-finalizado{background:var(--green)}
.status-agendado{background:var(--yellow)}
.status-red{background:var(--red)}

.times-linha{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:8px;
  margin:8px 0 10px;
}

.time-box{display:flex;align-items:center;gap:6px;min-width:0;font-size:13px;font-weight:900}
.time-box.visitante{justify-content:flex-end;text-align:right}
.time-box span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.placar{
  color:var(--gold);
  font-size:17px;
  font-weight:900;
  background:rgba(2,10,24,.72);
  border:1px solid var(--gold-line);
  border-radius:10px;
  padding:6px 9px;
  white-space:nowrap;
}

.info-item{
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
  text-align:center;
  margin:8px 0 10px;
}

.info-item strong{color:#fff}

.btn-ver{
  width:100%;
  padding:9px 12px;
  border-radius:11px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:13px;
}

.ranking-card.lider-ranking{
  border-color:var(--gold);
  background:radial-gradient(circle at top right,rgba(247,198,0,.18),transparent 35%),linear-gradient(180deg,rgba(16,42,82,.98),rgba(8,23,44,.98));
}

.ranking-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.player-box{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}

.pos{width:28px;color:var(--gold);font-weight:900;text-align:center}
.photo{width:44px;height:44px}

.player-info{min-width:0}

.player-info strong{
  display:block;
  color:#fff;
  font-size:13px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.player-info small{
  display:block;
  color:var(--muted);
  font-size:11px;
  margin-top:3px;
}

.numero-destaque{
  color:var(--gold);
  font-size:24px;
  font-weight:900;
  text-align:right;
}

.numero-destaque small{
  display:block;
  color:var(--muted);
  font-size:10px;
  font-weight:800;
}

.cartao-card{
  position:relative;
  overflow:hidden;
  min-height:112px;
}

.cartao-card::after{
  content:"";
  position:absolute;
  right:-24px;
  top:-18px;
  width:68px;
  height:96px;
  border-radius:10px;
  background:linear-gradient(180deg,#f7c600,#e30613);
  opacity:.22;
  transform:rotate(12deg);
}

.cartao-numeros{
  display:flex;
  gap:8px;
  justify-content:flex-end;
  align-items:center;
  font-weight:900;
  z-index:2;
}

.cartao-num{
  display:flex;
  align-items:center;
  gap:4px;
  background:rgba(255,255,255,.07);
  padding:6px 8px;
  border-radius:10px;
}

.suspenso-badge{
  background:rgba(180,35,35,.95);
  color:#fff;
  padding:7px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.duplo{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.vazio{
  color:var(--muted);
  text-align:center;
  padding:18px;
  background:rgba(7,29,55,.9);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
}

@media(max-width:1100px){
  .cards-resumo{grid-template-columns:repeat(3,1fr)}
  .lista-grid,.ranking-lista,.ranking-lista.ranking-3{grid-template-columns:repeat(3,1fr)}
  .classificacao-app{grid-template-columns:1fr}
}

@media(max-width:900px){
  .filtros,.duplo{grid-template-columns:1fr}
  .cards-resumo,.lista-grid,.ranking-lista,.ranking-lista.ranking-3{grid-template-columns:repeat(2,1fr)}
  .hero-logo{width:64px;height:64px;border-radius:16px}
  .classificacao-app{grid-template-columns:1fr}
}

@media(max-width:520px){
  .cards-resumo,.lista-grid,.ranking-lista,.ranking-lista.ranking-3{grid-template-columns:1fr}
}

/* ===== PADRÃO FIFA / eFOOTBALL ===== */

.hero-logo,
.escudo,
.photo{
  object-fit:contain !important;
  border:none !important;
  border-radius:0 !important;
  background:transparent !important;
  padding:0 !important;

  filter:
    drop-shadow(0 0 8px rgba(247,198,0,.35))
    drop-shadow(0 8px 18px rgba(0,0,0,.50));
}

.hero-logo{
  width:95px !important;
  height:95px !important;
}

.escudo{
  width:38px !important;
  height:38px !important;
}

.photo{
  width:48px !important;
  height:48px !important;
}


/* ===== GRUPOS / FASE FINAL ===== */
.filtros.filtros-3{
  grid-template-columns:1fr 1fr 220px;
}
.grupo-titulo{
  color:var(--gold);
  font-size:18px;
  font-weight:900;
  margin:16px 0 8px;
}
.grupo-bloco{
  margin-bottom:16px;
}
.classificado{
  box-shadow:inset 5px 0 0 var(--green);
}
.fase-final-box{
  display:flex;
  gap:14px;
  overflow-x:auto;
  padding-bottom:8px;
  -webkit-overflow-scrolling:touch;
}
.fase-coluna{
  min-width:230px;
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:12px;
}
.fase-coluna h3{
  color:var(--gold);
  font-size:16px;
  margin-bottom:10px;
  text-align:center;
}
.fase-jogo{
  background:#081c36;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
}
.fase-jogo strong{
  display:block;
  text-align:center;
  color:#fff;
  font-size:13px;
  line-height:1.35;
}
.fase-jogo small{
  display:block;
  text-align:center;
  color:var(--muted);
  font-size:11px;
  margin-top:5px;
}
@media(max-width:900px){
  .filtros.filtros-3{grid-template-columns:1fr}
}

</style>
</head>

<body>

<main class="wrap container">
  <section class="hero">
    <div class="hero-top">
      <img id="heroLogo" class="hero-logo" src="logo-liga.jfif" referrerpolicy="no-referrer" onerror="this.src='logo-liga.jfif'">
      <div class="hero-info">
        <h2 id="heroTitulo">Tabela da Competição</h2>
        <p id="heroSub">Classificação, jogos e estatísticas geradas automaticamente pelas súmulas finalizadas.</p>
        <div class="hero-tags">
          <div class="hero-tag" id="heroTagCategoria">Categoria: -</div>
          <div class="hero-tag" id="heroTagJogos">Jogos finalizados: 0</div>
          <div class="hero-tag" id="heroTagTimes">Times: 0</div>
          <div class="hero-tag" id="heroTagGols">Gols: 0</div>
        </div>
      </div>
    </div>
  </section>

  <section class="filtros filtros-3">
    <select id="filtroCampeonato"><option value="">Todos os campeonatos</option></select>
    <select id="filtroCategoria"><option value="">Todas categorias</option></select>
    <select id="filtroGrupo"><option value="">Todos os grupos</option></select>
  </section>

  <h2 class="titulo-secao" id="tituloTabela">Tabela</h2>

  <div class="abas">
    <button class="aba ativa" onclick="trocarAba('geral',this)">Classificação Geral</button>
    <button class="aba" onclick="trocarAba('grupos',this)">Grupos</button>
    <button class="aba" onclick="trocarAba('jogos',this)">Jogos</button>
    <button class="aba" onclick="trocarAba('faseFinal',this)">Fase Final</button>
    <button class="aba" onclick="trocarAba('artilharia',this)">Artilharia</button>
    <button class="aba" onclick="trocarAba('assistencias',this)">Assistências</button>
    <button class="aba" onclick="trocarAba('cartoes',this)">Cartões</button>
  </div>

  <div id="areaTabela">
    <div class="vazio">
      <i class="fa-solid fa-spinner fa-spin"></i> Carregando...
    </div>
  </div>
</main>

<script type="module">
import { renderMenu } from "./menu.js";
renderMenu("tabela");
</script>


<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

let campeonatos = [];
let jogos = [];
let times = [];
let jogadores = [];
let abaAtual = "geral";

const area = document.getElementById("areaTabela");
const filtroCampeonato = document.getElementById("filtroCampeonato");
const filtroCategoria = document.getElementById("filtroCategoria");
const filtroGrupo = document.getElementById("filtroGrupo");

function txt(v){ return String(v ?? "").trim(); }
function norm(v){
  return txt(v).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
function esc(v){
  return txt(v).replace(/[&<>"']/g,m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m]));
}
function logoTime(t){
  return t?.logo || t?.escudo || t?.foto || t?.imagem || "logo-liga.jfif";
}
function nomeTime(t){
  return t?.nome || t?.nomeTime || t?.time || t?.equipe || "-";
}
function idTime(t){
  return txt(t?.id || t?.timeId || t?.idTime || t?.nome || t?.nomeTime);
}
function getCampeonatoId(obj){
  return txt(obj.campeonatoId || obj.idCampeonato || obj.campeonato || obj.campeonato_id || obj.competicaoId);
}
function getCategoria(obj){
  return txt(obj.categoria || obj.categoriaNome || obj.nomeCategoria);
}
function getGrupo(obj){
  return txt(obj.grupo || obj.nomeGrupo || obj.chaveGrupo || obj.grupoNome);
}
function statusFinalizado(j){
  const s = norm(j.status || j.situacao || j.estado);
  return s.includes("final") || s.includes("encerr") || s.includes("conclu");
}
function num(v){ const n = Number(v); return Number.isFinite(n) ? n : 0; }

function timeNomePorIdOuNome(valor){
  const v = txt(valor);
  if(!v) return "";
  const n = norm(v);
  const achado = times.find(t=>norm(t.id)===n || norm(t.nome)===n || norm(t.nomeTime)===n || norm(t.time)===n);
  return nomeTime(achado || {nome:v});
}
function timeObjPorNome(nome){
  const n = norm(nome);
  return times.find(t=>norm(nomeTime(t))===n || norm(t.id)===n) || {nome};
}

function getCasa(j){ return j.mandante || j.timeCasa || j.casa || j.timeA || j.mandanteNome || j.time1 || j.equipeA; }
function getFora(j){ return j.visitante || j.timeFora || j.fora || j.timeB || j.visitanteNome || j.time2 || j.equipeB; }
function getGolsCasa(j){ return num(j.golsMandante ?? j.placarMandante ?? j.golsCasa ?? j.placarCasa ?? j.golsTimeA ?? j.placarA ?? j.gols1); }
function getGolsFora(j){ return num(j.golsVisitante ?? j.placarVisitante ?? j.golsFora ?? j.placarFora ?? j.golsTimeB ?? j.placarB ?? j.gols2); }

function configCat(camp, categoria){
  const cfg = camp?.configPorCategoria || camp?.categoriasConfig || camp?.configuracaoCategorias || {};
  return cfg[categoria] || cfg[txt(categoria)] || Object.entries(cfg).find(([k])=>norm(k)===norm(categoria))?.[1] || {};
}

function timesDaCategoria(camp, categoria){
  const cfg = configCat(camp,categoria);
  const saida = [];
  const add = (nome, grupo="")=>{
    nome = timeNomePorIdOuNome(nome);
    if(!nome) return;
    const ja = saida.find(x=>norm(x.nome)===norm(nome));
    if(ja){ if(grupo && !ja.grupo) ja.grupo = grupo; return; }
    saida.push({nome, grupo});
  };

  if(Array.isArray(cfg.times)){
    cfg.times.forEach(t=>{
      if(typeof t === "string") add(t, t.grupo || "");
      else add(t.nome || t.nomeTime || t.time || t.id || t.timeId, t.grupo || t.nomeGrupo || "");
    });
  }
  if(Array.isArray(cfg.timesParticipantes)) cfg.timesParticipantes.forEach(t=>add(t,""));
  if(Array.isArray(cfg.grupos)){
    cfg.grupos.forEach(g=>{
      const gn = g.nome || g.grupo || g.nomeGrupo || "";
      (g.times || []).forEach(t=>add(typeof t==="string" ? t : (t.nome || t.nomeTime || t.time || t.id || t.timeId), gn));
    });
  }

  // fallback para modelo antigo
  if(!saida.length && Array.isArray(camp.grupos)){
    camp.grupos.forEach(g=>{
      const gn = g.nome || g.grupo || "";
      (g.times || []).forEach(t=>add(typeof t==="string" ? t : (t.nome || t.nomeTime || t.time), gn));
    });
  }
  if(!saida.length && Array.isArray(camp.timesParticipantes)) camp.timesParticipantes.forEach(t=>add(t,""));

  return saida;
}

function categoriasDoCampeonato(camp){
  const cats = Array.isArray(camp?.categorias) ? camp.categorias : [];
  const cfg = camp?.configPorCategoria || {};
  return Array.from(new Set([...cats, ...Object.keys(cfg)])).filter(Boolean);
}

async function carregarTudo(){
  area.innerHTML = `<div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando tabela...</div>`;
  const [campSnap,jogosSnap,timesSnap,jogadoresSnap] = await Promise.all([
    getDocs(collection(db,"campeonatos")),
    getDocs(collection(db,"jogos")),
    getDocs(collection(db,"times")).catch(()=>({forEach:()=>{}})),
    getDocs(collection(db,"jogadores")).catch(()=>({forEach:()=>{}}))
  ]);

  campeonatos = [];
  campSnap.forEach(d=>campeonatos.push({id:d.id,...d.data()}));

  jogos = [];
  jogosSnap.forEach(d=>jogos.push({id:d.id,...d.data()}));

  times = [];
  timesSnap.forEach(d=>times.push({id:d.id,...d.data()}));

  jogadores = [];
  jogadoresSnap.forEach(d=>jogadores.push({id:d.id,...d.data()}));

  montarFiltros();
  renderizarTudo();
}

function montarFiltros(){
  filtroCampeonato.innerHTML = `<option value="">Todos os campeonatos</option>` +
    campeonatos.sort((a,b)=>txt(a.nome).localeCompare(txt(b.nome),"pt-BR"))
      .map(c=>`<option value="${c.id}">${esc(c.nome || "Sem nome")} ${c.temporada ? " - "+esc(c.temporada) : ""}</option>`).join("");

  atualizarCategorias();
}

function atualizarCategorias(){
  const camp = campeonatos.find(c=>c.id===filtroCampeonato.value);
  let cats = [];
  if(camp) cats = categoriasDoCampeonato(camp);
  else campeonatos.forEach(c=>cats.push(...categoriasDoCampeonato(c)));
  cats = Array.from(new Set(cats)).sort((a,b)=>a.localeCompare(b,"pt-BR"));

  const atual = filtroCategoria.value;
  filtroCategoria.innerHTML = `<option value="">Todas categorias</option>` + cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("");
  if(cats.includes(atual)) filtroCategoria.value = atual;
  atualizarGrupos();
}

function atualizarGrupos(){
  const grupos = new Set();
  campeonatosFiltrados().forEach(c=>{
    categoriasFiltradas(c).forEach(cat=>{
      const cfg = configCat(c,cat);
      if(Array.isArray(cfg.grupos)) cfg.grupos.forEach(g=>{ if(g.nome) grupos.add(g.nome); });
      timesDaCategoria(c,cat).forEach(t=>{ if(t.grupo) grupos.add(t.grupo); });
    });
  });
  jogosFiltradosBase().forEach(j=>{ const g = getGrupo(j); if(g) grupos.add(g); });

  const atual = filtroGrupo.value;
  filtroGrupo.innerHTML = `<option value="">Todos os grupos</option>` +
    Array.from(grupos).sort((a,b)=>a.localeCompare(b,"pt-BR")).map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join("");
  if(Array.from(grupos).includes(atual)) filtroGrupo.value = atual;
}

function campeonatosFiltrados(){
  return campeonatos.filter(c=>!filtroCampeonato.value || c.id===filtroCampeonato.value);
}
function categoriasFiltradas(camp){
  const cats = categoriasDoCampeonato(camp);
  return cats.filter(c=>!filtroCategoria.value || norm(c)===norm(filtroCategoria.value));
}
function jogosFiltradosBase(){
  return jogos.filter(j=>{
    if(filtroCampeonato.value && getCampeonatoId(j) && getCampeonatoId(j)!==filtroCampeonato.value) return false;
    if(filtroCategoria.value && getCategoria(j) && norm(getCategoria(j))!==norm(filtroCategoria.value)) return false;
    if(filtroGrupo.value && getGrupo(j) && norm(getGrupo(j))!==norm(filtroGrupo.value)) return false;
    return true;
  });
}

function criarLinhaBase(nome, grupo=""){
  return {nome,grupo,J:0,V:0,E:0,D:0,GP:0,GC:0,SG:0,PTS:0,ultimos:[]};
}

function calcularClassificacao(camp,categoria,grupoFiltro=""){
  const mapa = new Map();
  timesDaCategoria(camp,categoria).forEach(t=>{
    if(grupoFiltro && norm(t.grupo)!==norm(grupoFiltro)) return;
    mapa.set(norm(t.nome), criarLinhaBase(t.nome,t.grupo));
  });

  const js = jogos.filter(j=>{
    if(getCampeonatoId(j) && getCampeonatoId(j)!==camp.id) return false;
    if(getCategoria(j) && norm(getCategoria(j))!==norm(categoria)) return false;
    if(grupoFiltro && getGrupo(j) && norm(getGrupo(j))!==norm(grupoFiltro)) return false;
    return statusFinalizado(j);
  });

  js.forEach(j=>{
    const casa = timeNomePorIdOuNome(getCasa(j));
    const fora = timeNomePorIdOuNome(getFora(j));
    if(!casa || !fora) return;
    const grupoJogo = getGrupo(j);

    if(!mapa.has(norm(casa))) mapa.set(norm(casa), criarLinhaBase(casa,grupoJogo));
    if(!mapa.has(norm(fora))) mapa.set(norm(fora), criarLinhaBase(fora,grupoJogo));

    const a = mapa.get(norm(casa));
    const b = mapa.get(norm(fora));
    const gc = getGolsCasa(j);
    const gf = getGolsFora(j);

    a.J++; b.J++;
    a.GP += gc; a.GC += gf;
    b.GP += gf; b.GC += gc;

    if(gc > gf){ a.V++; b.D++; a.PTS += 3; a.ultimos.unshift("V"); b.ultimos.unshift("D"); }
    else if(gc < gf){ b.V++; a.D++; b.PTS += 3; b.ultimos.unshift("V"); a.ultimos.unshift("D"); }
    else { a.E++; b.E++; a.PTS++; b.PTS++; a.ultimos.unshift("E"); b.ultimos.unshift("E"); }

    if(!a.grupo && grupoJogo) a.grupo = grupoJogo;
    if(!b.grupo && grupoJogo) b.grupo = grupoJogo;
  });

  const arr = Array.from(mapa.values()).map(t=>({...t,SG:t.GP-t.GC, AP:t.J ? Math.round((t.PTS/(t.J*3))*100) : 0, ultimos:t.ultimos.slice(0,5)}));
  arr.sort((a,b)=> b.PTS-a.PTS || b.V-a.V || b.SG-a.SG || b.GP-a.GP || a.GC-b.GC || a.nome.localeCompare(b.nome,"pt-BR"));
  return arr;
}

function tabelaHTML(lista, titulo="", classificados=0){
  if(!lista.length) return `<div class="vazio">Nenhum time encontrado nesta configuração.</div>`;
  return `
    ${titulo ? `<h3 class="grupo-titulo">${esc(titulo)}</h3>` : ""}
    <div class="box-tabela">
      <div class="table">
        <div class="row header">
          <div class="col-pos">#</div><div class="col-time">Time</div><div class="col">PTS</div><div class="col">J</div><div class="col">V</div><div class="col">E</div><div class="col">D</div><div class="col">GP</div><div class="col">GC</div><div class="col">SG</div><div class="col">%</div><div class="col-wide">Últimos 5</div>
        </div>
        ${lista.map((t,i)=>{
          const obj = timeObjPorNome(t.nome);
          const classe = i===0 ? "top1" : i===1 ? "top2" : i===2 ? "top3" : "";
          const classificado = classificados && i < classificados ? " classificado" : "";
          return `<div class="row ${classe}${classificado}">
            <div class="col-pos">${i+1}</div>
            <div class="col-time"><div class="team"><img class="escudo" src="${esc(logoTime(obj))}" onerror="this.src='logo-liga.jfif'"><span>${esc(t.nome)}</span>${t.grupo ? `<span class="tag">${esc(t.grupo)}</span>` : ""}</div></div>
            <div class="col">${t.PTS}</div><div class="col">${t.J}</div><div class="col">${t.V}</div><div class="col">${t.E}</div><div class="col">${t.D}</div><div class="col">${t.GP}</div><div class="col">${t.GC}</div><div class="col">${t.SG}</div><div class="col">${t.AP}%</div>
            <div class="col-wide"><div class="forma">${(t.ultimos.length?t.ultimos:["-","-","-","-","-"]).slice(0,5).map(r=>`<span class="f-${String(r).toLowerCase()}">${esc(r)}</span>`).join("")}</div></div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
}

function renderGeral(){
  let html = "";
  campeonatosFiltrados().forEach(camp=>{
    categoriasFiltradas(camp).forEach(cat=>{
      const geral = calcularClassificacao(camp,cat,"");
      if(filtroGrupo.value){
        const porGrupo = geral.filter(t=>norm(t.grupo)===norm(filtroGrupo.value));
        html += tabelaHTML(porGrupo, `${camp.nome || "Campeonato"} - ${cat} - ${filtroGrupo.value}`);
      }else{
        html += tabelaHTML(geral, `${camp.nome || "Campeonato"} - ${cat} - Classificação Geral`);
      }
    });
  });
  area.innerHTML = html || `<div class="vazio">Nenhum campeonato/categoria encontrado.</div>`;
}

function renderGrupos(){
  let html = "";
  campeonatosFiltrados().forEach(camp=>{
    categoriasFiltradas(camp).forEach(cat=>{
      const cfg = configCat(camp,cat);
      let grupos = [];
      timesDaCategoria(camp,cat).forEach(t=>{ if(t.grupo && !grupos.includes(t.grupo)) grupos.push(t.grupo); });
      if(Array.isArray(cfg.grupos)) cfg.grupos.forEach(g=>{ if(g.nome && !grupos.includes(g.nome)) grupos.push(g.nome); });
      jogos.forEach(j=>{ if(getCampeonatoId(j)===camp.id && norm(getCategoria(j))===norm(cat) && getGrupo(j) && !grupos.includes(getGrupo(j))) grupos.push(getGrupo(j)); });

      if(filtroGrupo.value) grupos = grupos.filter(g=>norm(g)===norm(filtroGrupo.value));
      if(!grupos.length) grupos = ["Grupo Único"];

      html += `<h2 class="titulo-secao">${esc(camp.nome || "Campeonato")} - ${esc(cat)}</h2>`;
      grupos.forEach(g=>{
        const lista = g==="Grupo Único" ? calcularClassificacao(camp,cat,"") : calcularClassificacao(camp,cat,g);
        html += `<div class="grupo-bloco">${tabelaHTML(lista,g,Number(cfg.classificadosPorGrupo||0))}</div>`;
      });
    });
  });
  area.innerHTML = html || `<div class="vazio">Nenhum grupo encontrado.</div>`;
}

function renderJogos(){
  const js = jogosFiltradosBase();
  if(!js.length){ area.innerHTML = `<div class="vazio">Nenhum jogo encontrado.</div>`; return; }
  area.innerHTML = `<div class="lista-grid">${js.map(j=>{
    const casa = timeNomePorIdOuNome(getCasa(j));
    const fora = timeNomePorIdOuNome(getFora(j));
    const oc = timeObjPorNome(casa), of = timeObjPorNome(fora);
    return `<div class="card-item">
      <div class="card-top"><span class="status-tag ${statusFinalizado(j)?"status-finalizado":"status-agendado"}">${esc(j.status || j.situacao || "Agendado")}</span><span class="tag">${esc(getGrupo(j)||getCategoria(j)||"")}</span></div>
      <div class="times-linha"><div class="time-box"><img class="escudo" src="${esc(logoTime(oc))}" onerror="this.src='logo-liga.jfif'"><span>${esc(casa)}</span></div><div class="placar">${statusFinalizado(j)?`${getGolsCasa(j)} x ${getGolsFora(j)}`:"x"}</div><div class="time-box visitante"><span>${esc(fora)}</span><img class="escudo" src="${esc(logoTime(of))}" onerror="this.src='logo-liga.jfif'"></div></div>
      <div class="info-item">${esc(j.data || j.dataJogo || "")} ${esc(j.hora || j.horario || "")}<br><strong>${esc(j.local || j.campo || "")}</strong></div>
    </div>`;
  }).join("")}</div>`;
}

function renderFaseFinal(){
  let html = "";
  campeonatosFiltrados().forEach(camp=>{
    categoriasFiltradas(camp).forEach(cat=>{
      const cfg = configCat(camp,cat);
      const fase = cfg.tipoFaseFinal || cfg.faseFinal || camp.tipoFaseFinal || "nenhuma";
      const cruz = cfg.cruzamentosFaseFinal || camp.cruzamentosFaseFinal || [];
      html += `<div class="fase-coluna" style="margin-bottom:12px"><h3>${esc(camp.nome)} - ${esc(cat)}</h3>
      <div class="fase-jogo"><strong>Fase final: ${esc(fase)}</strong><small>Classificados por grupo: ${esc(cfg.classificadosPorGrupo || camp.classificadosPorGrupo || 0)}</small></div>
      ${Array.isArray(cruz) && cruz.length ? cruz.map(c=>`<div class="fase-jogo"><strong>${esc(c)}</strong></div>`).join("") : `<div class="vazio">Fase final ainda não configurada ou sem jogos gerados.</div>`}
      </div>`;
    });
  });
  area.innerHTML = `<div class="fase-final-box">${html}</div>` || `<div class="vazio">Sem fase final.</div>`;
}

function renderSimples(nome){
  area.innerHTML = `<div class="vazio">${nome} continua vindo das súmulas/jogadores. Nesta atualização foi organizada a Classificação Geral e por Grupos.</div>`;
}

function atualizarHero(){
  const camp = campeonatos.find(c=>c.id===filtroCampeonato.value) || campeonatosFiltrados()[0] || {};
  document.getElementById("heroTitulo").textContent = camp.nome ? `Tabela - ${camp.nome}` : "Tabela da Competição";
  document.getElementById("heroLogo").src = logoSeguraTabela(camp.logo || camp.logoCampeonato || "logo-liga.jfif");
  document.getElementById("heroTagCategoria").textContent = `Categoria: ${filtroCategoria.value || "Todas"}`;

  let totalTimes = 0;
  campeonatosFiltrados().forEach(c=>categoriasFiltradas(c).forEach(cat=>totalTimes += timesDaCategoria(c,cat).length));
  const jogosF = jogosFiltradosBase().filter(statusFinalizado);
  const gols = jogosF.reduce((s,j)=>s+getGolsCasa(j)+getGolsFora(j),0);
  document.getElementById("heroTagJogos").textContent = `Jogos finalizados: ${jogosF.length}`;
  document.getElementById("heroTagTimes").textContent = `Times: ${totalTimes}`;
  document.getElementById("heroTagGols").textContent = `Gols: ${gols}`;
}

window.trocarAba = function(aba,btn){
  abaAtual = aba;
  document.querySelectorAll(".aba").forEach(b=>b.classList.remove("ativa"));
  btn?.classList.add("ativa");
  renderizarTudo();
};

window.renderizarTudo = function(){
  atualizarHero();
  if(abaAtual==="geral") renderGeral();
  else if(abaAtual==="grupos") renderGrupos();
  else if(abaAtual==="jogos") renderJogos();
  else if(abaAtual==="faseFinal") renderFaseFinal();
  else renderSimples(abaAtual);
  setTimeout(()=>{ if(window.corrigirLogosTabela) window.corrigirLogosTabela(); },50);
};

filtroCampeonato.addEventListener("change",()=>{ atualizarCategorias(); renderizarTudo(); });
filtroCategoria.addEventListener("change",()=>{ atualizarGrupos(); renderizarTudo(); });
filtroGrupo.addEventListener("change",renderizarTudo);

carregarTudo().catch(e=>{
  console.error(e);
  area.innerHTML = `<div class="vazio">Erro ao carregar tabela: ${esc(e.message || e)}</div>`;
});
</script>


<script>
function logoSeguraTabela(valor){
  const logo = String(valor || "").trim();
  if(!logo || logo.startsWith("data:image/")) return "logo-liga.jfif";
  return logo;
}

function corrigirLogosTabela(){
  document.querySelectorAll("img.hero-logo, img.escudo, img.photo, img.logo").forEach(img=>{
    const src = String(img.getAttribute("src") || "").trim();
    if(!src || src.startsWith("data:image/")) img.src = "logo-liga.jfif";
    img.referrerPolicy = "no-referrer";
    img.onerror = function(){ this.onerror=null; this.src="logo-liga.jfif"; };
  });
}

window.logoSeguraTabela = logoSeguraTabela;
window.corrigirLogosTabela = corrigirLogosTabela;
document.addEventListener("DOMContentLoaded",corrigirLogosTabela);
setInterval(corrigirLogosTabela,1200);
</script>
