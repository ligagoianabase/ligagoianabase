<script type="module">

import { db } from "./firebase.js";
import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

let jogos = [];
let sumulas = [];
let jogadores = [];
let times = [];
let campeonatos = [];
let historico = [];
let abaAtual = "detalhes";

const $ = id => document.getElementById(id);

const norm = txt =>
  String(txt || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");

const nomeTime = t =>
  typeof t === "object"
    ? (t?.nome || t?.nomeTime || "")
    : (t || "");

const logoTime = t =>
  typeof t === "object"
    ? (t?.logo || t?.escudo || "logo-liga.jfif")
    : "logo-liga.jfif";

const dataValor = v =>
  v?.toDate ? v.toDate() : new Date(v || 0);

function getSumula(id){
  return sumulas.find(s => s.id === id || s.jogoId === id) || null;
}

function sumulaFinalizada(s){
  return !!s && (
    s.sumulaFinalizada === true ||
    s.publica === true ||
    s.publico === true ||
    norm(s.status) === "finalizado" ||
    norm(s.sumulaStatus) === "finalizada"
  );
}

function finalizado(j){
  const s = getSumula(j.id);

  return (
    j.sumulaFinalizada === true ||
    norm(j.status) === "finalizado" ||
    sumulaFinalizada(s)
  );
}

function campItem(x){
  return x.campeonatoId || x.campeonato || x.campeonatoNome || "";
}

function catItem(x){
  return x.categoria || "";
}

function filtroCamp(){
  return $("filtroCampeonato")?.value || "";
}

function filtroCat(){
  return $("filtroCategoria")?.value || "";
}

function passaFiltro(x){
  if(
    filtroCamp() &&
    norm(campItem(x)) !== norm(filtroCamp())
  ) return false;

  if(
    filtroCat() &&
    norm(catItem(x)) !== norm(filtroCat())
  ) return false;

  return true;
}

function jogosFiltrados(){
  return jogos.filter(passaFiltro);
}

function sumulasFiltradas(){
  return sumulas
    .filter(s => sumulaFinalizada(s))
    .filter(passaFiltro);
}

function escudoPorNome(nome){
  const t = times.find(x =>
    norm(x.nome) === norm(nome) ||
    norm(x.timeNome) === norm(nome)
  );

  return t?.logo || t?.escudo || "logo-liga.jfif";
}

function partidaBase(j){

  const s = getSumula(j.id) || j;

  return {
    id: j.id,
    campeonato:
      s.campeonato ||
      j.campeonato ||
      "",

    categoria:
      s.categoria ||
      j.categoria ||
      "",

    timeA: s.timeA || j.timeA,
    timeB: s.timeB || j.timeB,

    golsA: Number(
      s.placar?.A ??
      s.golsA ??
      j.golsA ??
      0
    ),

    golsB: Number(
      s.placar?.B ??
      s.golsB ??
      j.golsB ??
      0
    ),

    finalizado: finalizado(j)
  };
}

function partidasFinalizadas(){

  return jogosFiltrados()
    .filter(finalizado)
    .map(partidaBase);
}

function baseTime(nome,logo){

  return {
    nome,
    logo,

    pontos:0,
    jogos:0,
    vitorias:0,
    empates:0,
    derrotas:0,
    golsPro:0,
    golsContra:0,
    saldo:0
  };
}

function atualizarStats(gp,gc,alvo){

  alvo.jogos++;

  alvo.golsPro += gp;
  alvo.golsContra += gc;

  alvo.saldo =
    alvo.golsPro -
    alvo.golsContra;

  if(gp > gc){

    alvo.vitorias++;
    alvo.pontos += 3;

  }else if(gp < gc){

    alvo.derrotas++;

  }else{

    alvo.empates++;
    alvo.pontos++;
  }
}

function calcularTabela(){

  const mapa = {};

  partidasFinalizadas().forEach(p=>{

    const A = nomeTime(p.timeA);
    const B = nomeTime(p.timeB);

    if(!A || !B) return;

    if(!mapa[A]){
      mapa[A] = baseTime(
        A,
        logoTime(p.timeA)
      );
    }

    if(!mapa[B]){
      mapa[B] = baseTime(
        B,
        logoTime(p.timeB)
      );
    }

    atualizarStats(
      p.golsA,
      p.golsB,
      mapa[A]
    );

    atualizarStats(
      p.golsB,
      p.golsA,
      mapa[B]
    );
  });

  return Object.values(mapa)
    .sort((a,b)=>

      b.pontos - a.pontos ||

      b.vitorias - a.vitorias ||

      b.saldo - a.saldo ||

      b.golsPro - a.golsPro
    );
}

function renderClassificacao(){

  const area = $("areaTabela");

  if(!area) return;

  const lista = calcularTabela();

  area.innerHTML = `
    <div class="box-tabela">

      <div class="table">

        <div class="row header">
          <div>#</div>
          <div>Time</div>
          <div>P</div>
          <div>J</div>
          <div>V</div>
          <div>E</div>
          <div>D</div>
          <div>GP</div>
          <div>GC</div>
          <div>SG</div>
        </div>

        ${lista.map((t,i)=>`

          <div class="row">

            <div>${i+1}</div>

            <div class="team">

              <img
                class="escudo"
                src="${t.logo}"
                onerror="this.src='logo-liga.jfif'"
              >

              ${t.nome}

            </div>

            <div>${t.pontos}</div>
            <div>${t.jogos}</div>
            <div>${t.vitorias}</div>
            <div>${t.empates}</div>
            <div>${t.derrotas}</div>
            <div>${t.golsPro}</div>
            <div>${t.golsContra}</div>
            <div>${t.saldo}</div>

          </div>

        `).join("")}

      </div>

    </div>
  `;
}

function atualizarTela(){
  renderClassificacao();
}

function ouvir(nome,setter){

  onSnapshot(
    collection(db,nome),

    snap=>{

      setter(
        snap.docs.map(d=>({
          id:d.id,
          ...d.data()
        }))
      );

      atualizarTela();
    }
  );
}

ouvir("jogos",v=>jogos=v);
ouvir("sumulas",v=>sumulas=v);
ouvir("times",v=>times=v);
ouvir("campeonatos",v=>campeonatos=v);

</script>
