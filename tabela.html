<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabela - Liga Goiana</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#061d44;
      color:#fff;
    }

    .page{
      max-width:1200px;
      margin:auto;
      padding:20px;
    }

    h1,h2{
      color:#f7c600;
      text-align:center;
    }

    .filtros{
      display:flex;
      gap:10px;
      margin:20px 0;
      flex-wrap:wrap;
      justify-content:center;
    }

    select{
      padding:12px;
      border-radius:10px;
      border:0;
      font-weight:bold;
    }

    .hero{
      background:#08285c;
      border:1px solid rgba(247,198,0,.4);
      border-radius:18px;
      padding:20px;
      text-align:center;
      margin-bottom:20px;
    }

    .tags{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .tags span{
      background:#f7c600;
      color:#061d44;
      padding:8px 12px;
      border-radius:999px;
      font-weight:bold;
    }

    .abas{
      display:flex;
      gap:8px;
      overflow-x:auto;
      margin-bottom:20px;
      padding-bottom:8px;
    }

    .aba{
      border:0;
      background:#f7c600;
      color:#061d44;
      padding:10px 14px;
      border-radius:999px;
      font-weight:bold;
      white-space:nowrap;
      cursor:pointer;
    }

    .aba.ativa{
      background:#fff;
    }

    .box-tabela{
      overflow-x:auto;
      background:#fff;
      color:#061d44;
      border-radius:16px;
      padding:10px;
    }

    .table{
      min-width:900px;
    }

    .row{
      display:grid;
      grid-template-columns:60px 1fr repeat(9,70px);
      align-items:center;
      gap:6px;
      padding:10px;
      border-bottom:1px solid #ddd;
      font-weight:bold;
    }

    .row.header{
      background:#061d44;
      color:#f7c600;
      border-radius:10px;
    }

    .team{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .escudo{
      width:32px;
      height:32px;
      object-fit:cover;
      border-radius:50%;
    }

    .vazio{
      background:#fff;
      color:#061d44;
      padding:30px;
      border-radius:16px;
      text-align:center;
      font-weight:bold;
    }
  </style>
</head>

<body>

<main class="page">

  <h1>Tabela da Competição</h1>

  <section class="hero">
    <h2 id="heroTitulo">Tabela da Competição</h2>
    <p id="heroSub">Classificação, jogos e estatísticas geradas automaticamente.</p>

    <div class="tags">
      <span id="heroTagCategoria">Categoria: Todas</span>
      <span id="heroTagJogos">Jogos finalizados: 0</span>
      <span id="heroTagTimes">Times: 0</span>
      <span id="heroTagGols">Gols: 0</span>
    </div>
  </section>

  <div class="filtros">
    <select id="filtroCampeonato">
      <option value="">Todos os campeonatos</option>
    </select>

    <select id="filtroCategoria">
      <option value="">Todas categorias</option>
    </select>
  </div>

  <div class="abas">
    <button class="aba ativa" onclick="trocarAba('detalhes',this)">Detalhes</button>
    <button class="aba" onclick="trocarAba('classificacao',this)">Classificação</button>
    <button class="aba" onclick="trocarAba('jogos',this)">Jogos</button>
  </div>

  <h2 id="tituloTabela">Tabela</h2>

  <div id="areaTabela">
    <div class="vazio">Carregando tabela...</div>
  </div>

</main>

<script type="module">
import { db } from "./firebase.js";
import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

let jogos = [];
let sumulas = [];
let times = [];
let campeonatos = [];
let abaAtual = "detalhes";

const $ = id => document.getElementById(id);

const norm = txt =>
  String(txt || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");

const nomeTime = t =>
  typeof t === "object" ? (t?.nome || t?.nomeTime || "") : (t || "");

const logoTime = t =>
  typeof t === "object" ? (t?.logo || t?.escudo || "logo-liga.jfif") : "logo-liga.jfif";

function filtroCamp(){ return $("filtroCampeonato")?.value || ""; }
function filtroCat(){ return $("filtroCategoria")?.value || ""; }

function getSumula(id){
  return sumulas.find(s => s.id === id || s.jogoId === id) || null;
}

function sumulaFinalizada(s){
  return !!s && (
    s.sumulaFinalizada === true ||
    s.publica === true ||
    s.publico === true ||
    norm(s.status) === "finalizado" ||
    norm(s.sumulaStatus) === "finalizada"
  );
}

function finalizado(j){
  const s = getSumula(j.id);
  return j?.sumulaFinalizada === true || norm(j?.status) === "finalizado" || sumulaFinalizada(s);
}

function campItem(x){
  return x?.campeonatoId || x?.campeonato || x?.campeonatoNome || "";
}

function catItem(x){
  return x?.categoria || "";
}

function passaFiltro(x){
  if(filtroCamp() && norm(campItem(x)) !== norm(filtroCamp())) return false;
  if(filtroCat() && norm(catItem(x)) !== norm(filtroCat())) return false;
  return true;
}

function partidaBase(j){
  const s = getSumula(j.id) || j;

  return {
    id:j.id,
    campeonato:s.campeonato || j.campeonato || j.campeonatoNome || "",
    categoria:s.categoria || j.categoria || "",
    data:s.data || s.dataHora || j.data || j.dataHora || "",
    local:s.local || s.campo || j.local || j.campo || "",
    timeA:s.timeA || j.timeA,
    timeB:s.timeB || j.timeB,
    golsA:Number(s.placar?.A ?? s.golsA ?? j.golsA ?? 0),
    golsB:Number(s.placar?.B ?? s.golsB ?? j.golsB ?? 0),
    finalizado:finalizado(j)
  };
}

function partidasFinalizadas(){
  return jogos.filter(passaFiltro).filter(finalizado).map(partidaBase);
}

function baseTime(nome,logo){
  return {
    nome,
    logo,
    pontos:0,
    jogos:0,
    vitorias:0,
    empates:0,
    derrotas:0,
    golsPro:0,
    golsContra:0,
    saldo:0,
    aproveitamento:0
  };
}

function atualizarStats(gp,gc,t){
  t.jogos++;
  t.golsPro += gp;
  t.golsContra += gc;
  t.saldo = t.golsPro - t.golsContra;

  if(gp > gc){
    t.vitorias++;
    t.pontos += 3;
  }else if(gp < gc){
    t.derrotas++;
  }else{
    t.empates++;
    t.pontos++;
  }

  t.aproveitamento = t.jogos ? Math.round((t.pontos / (t.jogos * 3)) * 100) : 0;
}

function calcularTabela(){
  const mapa = {};

  partidasFinalizadas().forEach(p=>{
    const A = nomeTime(p.timeA);
    const B = nomeTime(p.timeB);

    if(!A || !B) return;

    if(!mapa[A]) mapa[A] = baseTime(A,logoTime(p.timeA));
    if(!mapa[B]) mapa[B] = baseTime(B,logoTime(p.timeB));

    atualizarStats(p.golsA,p.golsB,mapa[A]);
    atualizarStats(p.golsB,p.golsA,mapa[B]);
  });

  return Object.values(mapa).sort((a,b)=>
    b.pontos - a.pontos ||
    b.vitorias - a.vitorias ||
    b.saldo - a.saldo ||
    b.golsPro - a.golsPro
  );
}

function preencherFiltros(){
  const campAtual = filtroCamp();
  const catAtual = filtroCat();

  const camps = new Map();

  [...campeonatos,...jogos,...sumulas].forEach(x=>{
    const id = x?.id && x?.nome ? x.id : campItem(x);
    const nome = x?.nome || x?.campeonato || x?.campeonatoNome || id;
    if(id && nome) camps.set(id,nome);
  });

  $("filtroCampeonato").innerHTML =
    `<option value="">Todos os campeonatos</option>` +
    [...camps.entries()].map(([id,n])=>`<option value="${id}">${n}</option>`).join("");

  $("filtroCampeonato").value = campAtual;

  const cats = new Set();

  [...jogos,...sumulas].forEach(x=>{
    if((!filtroCamp() || norm(campItem(x)) === norm(filtroCamp())) && x?.categoria){
      cats.add(x.categoria);
    }
  });

  $("filtroCategoria").innerHTML =
    `<option value="">Todas categorias</option>` +
    [...cats].sort().map(c=>`<option value="${c}">${c}</option>`).join("");

  $("filtroCategoria").value = catAtual;
}

function atualizarHero(){
  const tabela = calcularTabela();
  const partidas = partidasFinalizadas();
  const gols = partidas.reduce((s,p)=>s+p.golsA+p.golsB,0);

  $("heroTagCategoria").innerText = `Categoria: ${filtroCat() || "Todas"}`;
  $("heroTagJogos").innerText = `Jogos finalizados: ${partidas.length}`;
  $("heroTagTimes").innerText = `Times: ${tabela.length}`;
  $("heroTagGols").innerText = `Gols: ${gols}`;
}

function renderDetalhes(){
  const tabela = calcularTabela();
  const partidas = partidasFinalizadas();

  $("areaTabela").innerHTML = `
    <div class="vazio">
      Times: ${tabela.length}<br>
      Jogos finalizados: ${partidas.length}<br>
      Gols: ${partidas.reduce((s,p)=>s+p.golsA+p.golsB,0)}
    </div>
  `;
}

function renderClassificacao(){
  const lista = calcularTabela();

  if(!lista.length){
    $("areaTabela").innerHTML = `<div class="vazio">Nenhum jogo finalizado.</div>`;
    return;
  }

  $("areaTabela").innerHTML = `
    <div class="box-tabela">
      <div class="table">
        <div class="row header">
          <div>#</div>
          <div>Time</div>
          <div>P</div>
          <div>J</div>
          <div>V</div>
          <div>E</div>
          <div>D</div>
          <div>GP</div>
          <div>GC</div>
          <div>SG</div>
          <div>%</div>
        </div>

        ${lista.map((t,i)=>`
          <div class="row">
            <div>${i+1}</div>
            <div class="team">
              <img class="escudo" src="${t.logo}" onerror="this.src='logo-liga.jfif'">
              ${t.nome}
            </div>
            <div>${t.pontos}</div>
            <div>${t.jogos}</div>
            <div>${t.vitorias}</div>
            <div>${t.empates}</div>
            <div>${t.derrotas}</div>
            <div>${t.golsPro}</div>
            <div>${t.golsContra}</div>
            <div>${t.saldo}</div>
            <div>${t.aproveitamento}%</div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function renderJogos(){
  const lista = jogos.filter(passaFiltro).map(partidaBase);

  if(!lista.length){
    $("areaTabela").innerHTML = `<div class="vazio">Nenhum jogo encontrado.</div>`;
    return;
  }

  $("areaTabela").innerHTML = `
    <div class="box-tabela">
      <div class="table">
        ${lista.map(p=>`
          <div class="row">
            <div>${p.finalizado ? "✅" : "🕒"}</div>
            <div>${nomeTime(p.timeA)} ${p.finalizado ? p.golsA : ""} x ${p.finalizado ? p.golsB : ""} ${nomeTime(p.timeB)}</div>
            <div>${p.categoria || "-"}</div>
            <div>${p.data || "-"}</div>
            <div>${p.local || "-"}</div>
            <div>${p.finalizado ? `<a href="sumula-publica.html?id=${p.id}">Súmula</a>` : "-"}</div>
            <div></div><div></div><div></div><div></div><div></div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

window.trocarAba = (nome,btn)=>{
  abaAtual = nome;
  document.querySelectorAll(".aba").forEach(b=>b.classList.remove("ativa"));
  btn.classList.add("ativa");
  atualizarTela();
};

function atualizarTela(){
  atualizarHero();

  if(abaAtual === "detalhes") renderDetalhes();
  if(abaAtual === "classificacao") renderClassificacao();
  if(abaAtual === "jogos") renderJogos();
}

$("filtroCampeonato").addEventListener("change",()=>{
  preencherFiltros();
  atualizarTela();
});

$("filtroCategoria").addEventListener("change",atualizarTela);

function ouvir(nome,setter,refreshFiltro=false){
  onSnapshot(collection(db,nome),snap=>{
    setter(snap.docs.map(d=>({id:d.id,...d.data()})));
    if(refreshFiltro) preencherFiltros();
    atualizarTela();
  });
}

ouvir("jogos",v=>jogos=v,true);
ouvir("sumulas",v=>sumulas=v,true);
ouvir("times",v=>times=v);
ouvir("campeonatos",v=>campeonatos=v,true);
</script>

</body>
</html>
