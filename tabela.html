<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabela - Liga Goiana</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#061d44;
      color:#fff;
    }

    .page{
      max-width:1200px;
      margin:auto;
      padding:20px;
    }

    h1{
      color:#f7c600;
      text-align:center;
    }

    .filtros{
      display:flex;
      gap:10px;
      margin:20px 0;
      flex-wrap:wrap;
      justify-content:center;
    }

    select{
      padding:12px;
      border-radius:10px;
      border:0;
      font-weight:bold;
    }

    .hero{
      background:#08285c;
      border:1px solid rgba(247,198,0,.4);
      border-radius:18px;
      padding:20px;
      text-align:center;
      margin-bottom:20px;
    }

    .tags{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .tags span{
      background:#f7c600;
      color:#061d44;
      padding:8px 12px;
      border-radius:999px;
      font-weight:bold;
    }

    .abas{
      display:flex;
      gap:8px;
      overflow-x:auto;
      margin-bottom:20px;
      padding-bottom:8px;
    }

    .aba{
      border:0;
      background:#f7c600;
      color:#061d44;
      padding:10px 14px;
      border-radius:999px;
      font-weight:bold;
      white-space:nowrap;
      cursor:pointer;
    }

    .aba.ativa{
      background:#fff;
    }

    .box-tabela{
      overflow-x:auto;
      background:#fff;
      color:#061d44;
      border-radius:16px;
      padding:10px;
    }

    .table{
      min-width:900px;
    }

    .row{
      display:grid;
      grid-template-columns:60px 1fr repeat(9,70px);
      align-items:center;
      gap:6px;
      padding:10px;
      border-bottom:1px solid #ddd;
      font-weight:bold;
    }

    .row.header{
      background:#061d44;
      color:#f7c600;
      border-radius:10px;
    }

    .team{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .escudo{
      width:32px;
      height:32px;
      object-fit:cover;
      border-radius:50%;
    }

    .vazio{
      background:#fff;
      color:#061d44;
      padding:30px;
      border-radius:16px;
      text-align:center;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <main class="page">

    <h1>Tabela da Competição</h1>

    <section class="hero">
      <h2 id="heroTitulo">Tabela da Competição</h2>
      <p id="heroSub">Classificação, jogos e estatísticas geradas automaticamente.</p>

      <div class="tags">
        <span id="heroTagCategoria">Categoria: Todas</span>
        <span id="heroTagJogos">Jogos finalizados: 0</span>
        <span id="heroTagTimes">Times: 0</span>
        <span id="heroTagGols">Gols: 0</span>
      </div>
    </section>

    <div class="filtros">
      <select id="filtroCampeonato">
        <option value="">Todos os campeonatos</option>
      </select>

      <select id="filtroCategoria">
        <option value="">Todas categorias</option>
      </select>
    </div>

    <div class="abas">
      <button class="aba ativa" onclick="trocarAba('detalhes',this)">Detalhes</button>
      <button class="aba" onclick="trocarAba('classificacao',this)">Classificação</button>
      <button class="aba" onclick="trocarAba('jogos',this)">Jogos</button>
      <button class="aba" onclick="trocarAba('artilharia',this)">Artilharia</button>
      <button class="aba" onclick="trocarAba('assistencias',this)">Assistências</button>
      <button class="aba" onclick="trocarAba('cartoes',this)">Cartões</button>
    </div>

    <h2 id="tituloTabela">Tabela</h2>

    <div id="areaTabela">
      <div class="vazio">Carregando tabela...</div>
    </div>

  </main>

  <!-- COLE O CÓDIGO JS DA TABELA AQUI DENTRO -->

    // cola aqui o código que começa com:
    // import { db } from "./firebase.js";

  </script>

</body>
</html>
