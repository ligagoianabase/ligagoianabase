<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula Oficial</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#eef2f7}
.container{max-width:1100px;margin:auto;background:#fff;padding:20px}

.topo{text-align:center;border-bottom:4px solid #0A1F3D;padding-bottom:10px}
.titulo{font-size:28px;font-weight:900}
.sub{font-size:14px}

.placar-box{display:flex;justify-content:space-between;align-items:center;margin:20px 0}
.time{text-align:center;width:40%}
.time img{width:70px}
.nome{font-weight:900}
.placar{font-size:50px;font-weight:900;color:#0A1F3D}

.info{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;font-size:13px}

.secao{margin-top:20px}
.titulo-secao{background:#0A1F3D;color:#fff;padding:8px;font-weight:900}

.tabela{width:100%;border-collapse:collapse}
.tabela td{border:1px solid #ccc;padding:6px}

.duplo{display:flex;gap:20px}

.btns{display:flex;gap:10px;margin-top:20px}
.btn{padding:10px;border:none;border-radius:6px;font-weight:900;color:#fff;cursor:pointer}
.whats{background:#25d366}
.email{background:#007bff}
.print{background:#000}
</style>
</head>

<body>

<div class="container">

<div class="topo">
<div class="titulo">SÚMULA OFICIAL</div>
<div class="sub" id="campeonato"></div>
<div class="sub" id="categoria"></div>
</div>

<div class="placar-box">

<div class="time">
<img id="logoA">
<div class="nome" id="timeA"></div>
</div>

<div class="placar" id="placar"></div>

<div class="time">
<img id="logoB">
<div class="nome" id="timeB"></div>
</div>

</div>

<div style="text-align:center">
<canvas id="qr"></canvas>
</div>

<div class="info" id="info"></div>

<div class="secao">
<div class="titulo-secao">ESCALAÇÃO</div>

<div class="duplo">

<div style="flex:1">
<strong id="tituloA"></strong>
<table class="tabela" id="titA"></table>
<table class="tabela" id="resA"></table>
</div>

<div style="flex:1">
<strong id="tituloB"></strong>
<table class="tabela" id="titB"></table>
<table class="tabela" id="resB"></table>
</div>

</div>
</div>

<div class="secao">
<div class="titulo-secao">EVENTOS</div>

<div class="duplo">

<div style="flex:1">
<h4>⚽ Gols</h4>
<table class="tabela" id="golsA"></table>

<h4>🟨 Cartões</h4>
<table class="tabela" id="cartA"></table>
</div>

<div style="flex:1">
<h4>⚽ Gols</h4>
<table class="tabela" id="golsB"></table>

<h4>🟨 Cartões</h4>
<table class="tabela" id="cartB"></table>
</div>

</div>
</div>

<div class="secao">
<div class="titulo-secao">ARBITRAGEM</div>
<div id="arb"></div>
</div>

<div class="secao">
<div class="titulo-secao">RESUMO DA PARTIDA</div>
<div id="resumo"></div>
</div>

<div class="secao">
<div class="titulo-secao">⭐ MELHOR EM CAMPO</div>
<div id="melhor"></div>
</div>

<div class="btns">
<button class="btn whats" onclick="wpp()">WhatsApp</button>
<button class="btn email" onclick="mail()">Email</button>
<button class="btn print" onclick="window.print()">PDF</button>
</div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const id=new URLSearchParams(location.search).get("id");

function esc(lista){
return (lista||[]).map(j=>{
let n=j.nome;
if(j.posicao==="Goleiro")n+=" (G)";
if(j.capitao)n+=" (C)";
return `<tr><td>${j.numero}</td><td>${n}</td></tr>`;
}).join("");
}

function fil(lista,t){return (lista||[]).filter(x=>x.time===t)}

function gols(l){
return l.map(g=>`<tr><td>⚽ ${g.tempo}'</td><td>${g.nome}</td></tr>`).join("");
}

function cart(l){
return l.map(c=>{
let i=c.tipo==="vermelho"?"🟥":"🟨";
return `<tr><td>${i} ${c.tempo}'</td><td>${c.nome}</td></tr>`;
}).join("");
}

async function load(){

const s=await getDoc(doc(db,"jogos",id));
if(!s.exists())return;

const j=s.data();

timeA.innerText=j.timeA.nome;
timeB.innerText=j.timeB.nome;

logoA.src=j.timeA.logo;
logoB.src=j.timeB.logo;

placar.innerText=`${j.placar.A} x ${j.placar.B}`;

campeonato.innerText=j.campeonato;
categoria.innerText=j.categoria;

tituloA.innerText=j.timeA.nome;
tituloB.innerText=j.timeB.nome;

titA.innerHTML=esc(j.titularesA);
resA.innerHTML=esc(j.reservasA);

titB.innerHTML=esc(j.titularesB);
resB.innerHTML=esc(j.reservasB);

golsA.innerHTML=gols(fil(j.gols,"A"));
golsB.innerHTML=gols(fil(j.gols,"B"));

cartA.innerHTML=cart(fil(j.cartoes,"A"));
cartB.innerHTML=cart(fil(j.cartoes,"B"));

arb.innerHTML=`
Árbitro: ${j.arbitro||"-"}<br>
Assistente 1: ${j.assistente1||"-"}<br>
Assistente 2: ${j.assistente2||"-"}
`;

resumo.innerHTML=`
⚽ ${(j.gols||[]).length} gols |
🟨 ${(j.cartoes||[]).filter(c=>c.tipo==="amarelo").length} |
🟥 ${(j.cartoes||[]).filter(c=>c.tipo==="vermelho").length}
`;

melhor.innerText=j.melhorJogador||"-";

QRCode.toCanvas(document.getElementById("qr"),location.href);

}

load();

function wpp(){window.open("https://wa.me/?text="+location.href)}
function mail(){location.href="mailto:?body="+location.href}
</script>

</body>
</html>
