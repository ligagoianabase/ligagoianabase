<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula Pública - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0b1f3a;
  --card:#102a52;
  --gold:#f7c600;
  --white:#fff;
}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(rgba(0,0,0,.85), rgba(0,0,0,.95)), url("fundo.png");
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  border-bottom:3px solid var(--gold);
  background:#08172c;
}

.logo{
  height:60px;
}

.titulo{
  text-align:center;
  font-weight:bold;
  font-size:22px;
  color:var(--gold);
}

/* INFO */
.info{
  text-align:center;
  padding:15px;
}

.placar{
  font-size:34px;
  font-weight:bold;
  margin-top:10px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
}

/* TIMES */
.jogador{
  padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}

/* EVENTOS */
.evento{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.obs{
  margin-top:15px;
  padding:15px;
  background:var(--card);
  border-radius:10px;
}

</style>
</head>

<body>

<div class="header">
  <img src="logo-liga.jfif" class="logo">

  <div class="titulo">SÚMULA OFICIAL</div>

  <img id="logoCampeonato" class="logo">
</div>

<div class="info">
  <div id="dados"></div>
  <div class="placar" id="placar">0 x 0</div>
</div>

<div class="container">

  <!-- TIME A -->
  <div class="card">
    <h2 id="timeA"></h2>
    <div id="listaA"></div>
  </div>

  <!-- TIME B -->
  <div class="card">
    <h2 id="timeB"></h2>
    <div id="listaB"></div>
  </div>

  <!-- EVENTOS -->
  <div class="card" style="grid-column:1/-1;">
    <h3 style="color:var(--gold)">Eventos da Partida</h3>
    <div id="eventos"></div>
  </div>

  <!-- OBS -->
  <div class="obs" id="obs"></div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const jogoId = new URLSearchParams(window.location.search).get("id");

async function carregar(){

  const snap = await getDoc(doc(db,"sumulas",jogoId));

  if(!snap.exists()){
    alert("Súmula não encontrada");
    return;
  }

  const s = snap.data();

  // topo
  document.getElementById("dados").innerText =
    `${s.campeonato} | ${s.categoria} | ${s.data} | ${s.local}`;

  document.getElementById("placar").innerText =
    `${s.golsA} x ${s.golsB}`;

  document.getElementById("timeA").innerText = s.timeA;
  document.getElementById("timeB").innerText = s.timeB;

  document.getElementById("logoCampeonato").src =
    s.logoCampeonato || "logo-liga.jfif";

  // jogadores
  document.getElementById("listaA").innerHTML =
    (s.jogadoresA || []).map(j =>
      `<div class="jogador">#${j.numero} - ${j.nome}</div>`
    ).join("");

  document.getElementById("listaB").innerHTML =
    (s.jogadoresB || []).map(j =>
      `<div class="jogador">#${j.numero} - ${j.nome}</div>`
    ).join("");

  // eventos
  document.getElementById("eventos").innerHTML =
    (s.golsDetalhadosA || []).map(e =>
      `<div class="evento">⚽ ${e.nome} (${s.timeA})</div>`
    ).join("")
    +
    (s.golsDetalhadosB || []).map(e =>
      `<div class="evento">⚽ ${e.nome} (${s.timeB})</div>`
    ).join("")
    +
    (s.amarelosDetalhadosA || []).map(e =>
      `<div class="evento">🟨 ${e.nome} (${s.timeA})</div>`
    ).join("")
    +
    (s.amarelosDetalhadosB || []).map(e =>
      `<div class="evento">🟨 ${e.nome} (${s.timeB})</div>`
    ).join("")
    +
    (s.vermelhosDetalhadosA || []).map(e =>
      `<div class="evento">🟥 ${e.nome} (${s.timeA})</div>`
    ).join("")
    +
    (s.vermelhosDetalhadosB || []).map(e =>
      `<div class="evento">🟥 ${e.nome} (${s.timeB})</div>`
    ).join("");

  // obs
  document.getElementById("obs").innerText =
    s.observacoes || "Sem observações do árbitro.";
}

carregar();
</script>

</body>
</html>
