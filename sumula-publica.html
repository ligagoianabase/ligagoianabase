<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súmula Oficial - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --azul:#061d44;
  --azul2:#08285c;
  --azul3:#0a2b63;
  --verde:#069447;
  --dourado:#f7c600;
  --linha:#cfd7e3;
  --texto:#071833;
  --muted:#4b5563;
  --bg:#dfe6ef;
  --white:#fff;
  --cinza:#f5f7fb;
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  min-height:100%;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--texto);
  min-height:100vh;
  overflow-x:auto;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

#app{
  width:100%;
}

/* ÁREA COM ESCALA AUTOMÁTICA */
.sumula-wrap{
  width:100%;
  max-width:1120px;
  margin:14px auto;
}

.sumula-scale{
  width:1120px;
  transform-origin:top left;
}

.sumula-page{
  width:1120px;
  background:#fff;
  border:1px solid #b9c4d4;
  border-radius:7px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.16);
}

/* CABEÇALHO */
.header{
  display:grid;
  grid-template-columns:145px 1fr 210px;
  align-items:center;
  gap:10px;
  padding:14px 16px 8px;
  border-bottom:1px solid #e4e9f1;
}

.header-logo{
  display:flex;
  justify-content:center;
  align-items:center;
}

.header-logo img{
  width:96px;
  height:96px;
  object-fit:contain;
}

.header-title{
  text-align:center;
}

.header-title h1{
  color:var(--azul);
  font-size:52px;
  font-weight:900;
  letter-spacing:1px;
  line-height:.95;
  text-transform:uppercase;
  white-space:nowrap;
}

.header-title p{
  margin-top:8px;
  color:var(--azul);
  font-size:21px;
  font-weight:900;
  text-transform:uppercase;
}

.header-right{
  text-align:center;
  color:var(--azul);
  font-weight:900;
  line-height:1.08;
  text-transform:uppercase;
}

.header-right .liga-nome{
  font-size:21px;
}

.header-right .liga-slogan{
  margin-top:6px;
  color:var(--dourado);
  font-size:15px;
  font-weight:900;
}

/* BARRA INFO */
.info-strip{
  margin:10px 16px 12px;
  display:grid;
  grid-template-columns:1.1fr 1.45fr .86fr .72fr 1.05fr;
  border:1px solid var(--linha);
  border-radius:5px;
  overflow:hidden;
}

.info-box{
  min-height:70px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:9px 12px;
  border-right:1px solid var(--linha);
  background:#fff;
}

.info-box:last-child{border-right:none}

.info-box i{
  width:36px;
  color:var(--azul);
  font-size:30px;
  text-align:center;
  flex-shrink:0;
}

.info-box small{
  display:block;
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  color:#111;
  margin-bottom:4px;
}

.info-box strong{
  display:block;
  color:var(--azul);
  font-size:17px;
  font-weight:900;
}

.status-finalizado{
  display:inline-flex !important;
  align-items:center;
  justify-content:center;
  gap:7px;
  background:var(--verde);
  color:#fff !important;
  padding:8px 15px;
  border-radius:8px;
  font-size:15px !important;
  font-weight:900;
}

.status-finalizado i{
  color:#fff !important;
  font-size:18px !important;
  width:auto !important;
}

/* PLACAR */
.score-card{
  margin:0 16px 12px;
  display:grid;
  grid-template-columns:1fr 250px 1fr;
  min-height:132px;
  border:1px solid var(--linha);
  border-radius:5px;
  overflow:hidden;
}

.team-score{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  padding:13px;
  background:#fff;
}

.team-score.away{
  flex-direction:row-reverse;
}

.team-score img{
  width:104px;
  height:104px;
  object-fit:contain;
}

.team-name{
  text-align:center;
}

.team-name h2{
  color:var(--azul);
  font-size:31px;
  font-weight:900;
  text-transform:uppercase;
  line-height:1.05;
}

.team-name p{
  margin-top:8px;
  color:var(--azul);
  font-size:16px;
  font-weight:800;
}

.score-center{
  background:linear-gradient(135deg,var(--azul),var(--azul2));
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-left:1px solid var(--linha);
  border-right:1px solid var(--linha);
}

.score-number{
  font-size:74px;
  font-weight:900;
  letter-spacing:5px;
  line-height:1;
  white-space:nowrap;
}

.score-center span{
  margin-top:8px;
  text-transform:uppercase;
  font-size:14px;
  font-weight:900;
}

/* DADOS JOGO */
.match-strip{
  margin:0 16px 12px;
  display:grid;
  grid-template-columns:1fr 1fr 1.2fr 1.1fr;
  border:1px solid var(--linha);
  border-radius:5px;
  overflow:hidden;
}

.match-box{
  display:flex;
  align-items:center;
  gap:12px;
  min-height:64px;
  padding:10px 12px;
  border-right:1px solid var(--linha);
  background:#fff;
}

.match-box:last-child{border-right:none}

.match-box i{
  width:34px;
  color:var(--azul);
  font-size:30px;
  text-align:center;
}

.match-box small{
  display:block;
  color:var(--azul);
  text-transform:uppercase;
  font-weight:900;
  font-size:12px;
  margin-bottom:3px;
}

.match-box strong{
  display:block;
  color:#111;
  font-size:15px;
  font-weight:900;
}

/* TÍTULOS */
.section-title{
  background:linear-gradient(135deg,var(--azul),var(--azul2));
  color:#fff;
  text-align:center;
  padding:8px 10px;
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
  border-radius:5px 5px 0 0;
}

.line-empty{
  color:#777;
  font-size:13px;
  text-align:center;
  padding:12px;
}

/* ESCALAÇÕES */
.lineups{
  margin:0 16px 12px;
}

.lineups-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.lineup-card{
  border:1px solid var(--linha);
  border-radius:0 0 5px 5px;
  overflow:hidden;
  background:#fff;
}

.lineup-head{
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:var(--azul);
  background:#fff;
  border-bottom:1px solid var(--linha);
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.lineup-head img{
  width:28px;
  height:28px;
  object-fit:contain;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th{
  background:#f5f7fb;
  color:var(--azul);
  font-size:12px;
  text-transform:uppercase;
  padding:7px 8px;
  border-bottom:1px solid var(--linha);
  text-align:left;
}

.table td{
  color:#111;
  font-size:13px;
  padding:5px 8px;
  border-bottom:1px solid #e5eaf1;
}

.table tr:last-child td{
  border-bottom:none;
}

.table .num{
  width:48px;
  text-align:center;
}

.table .posicao{
  width:160px;
}

.sub-row td{
  background:#f8fafc;
  color:var(--azul);
  text-align:center;
  font-weight:900;
  text-transform:uppercase;
  padding:7px;
}

.legend{
  margin-top:8px;
  padding:7px;
  text-align:center;
  color:#111;
  font-size:14px;
  background:#fff;
}

/* EVENTOS */
.events-grid{
  margin:0 16px 12px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}

.team-events{
  border:1px solid var(--linha);
  border-radius:5px;
  overflow:hidden;
  background:#fff;
}

.team-events h3{
  color:#fff;
  background:linear-gradient(135deg,var(--azul),var(--azul2));
  text-align:center;
  padding:8px;
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.events-columns{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.event-col{
  min-height:130px;
  padding:12px;
  border-right:1px solid var(--linha);
}

.event-col:last-child{border-right:none}

.event-col h4{
  color:var(--azul);
  text-align:center;
  font-size:17px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:10px;
}

.event-item{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
  color:#111;
  font-size:14px;
  line-height:1.2;
}

.event-minute{
  color:var(--azul);
  font-weight:900;
  width:42px;
  flex:0 0 auto;
}

.event-name{
  flex:1;
}

.ball{
  font-size:18px;
  width:20px;
  text-align:center;
}

.yellow-card,
.red-card{
  width:14px;
  height:19px;
  border-radius:3px;
  display:inline-block;
  flex:0 0 auto;
}

.yellow-card{background:#f7c600}
.red-card{background:#e30613}

/* ARBITRAGEM + RESUMO */
.lower-grid{
  margin:0 16px 12px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:24px;
}

.panel{
  border:1px solid var(--linha);
  border-radius:5px;
  overflow:hidden;
  background:#fff;
}

.panel h3{
  background:linear-gradient(135deg,var(--azul),var(--azul2));
  color:#fff;
  text-align:center;
  padding:8px;
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
}

.official-row{
  display:grid;
  grid-template-columns:165px 1fr;
  min-height:44px;
  border-bottom:1px solid var(--linha);
  align-items:center;
}

.official-row:last-child{border-bottom:none}

.official-label{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--azul);
  font-size:13px;
  font-weight:900;
  text-transform:uppercase;
  padding:10px 12px;
}

.official-value{
  color:#111;
  font-size:14px;
  padding:10px 12px;
}

.summary-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  border-bottom:1px solid var(--linha);
}

.summary-box{
  text-align:center;
  padding:15px 10px;
  border-right:1px solid var(--linha);
}

.summary-box:last-child{border-right:none}

.summary-box i{
  color:var(--azul);
  font-size:28px;
  margin-bottom:6px;
}

.summary-box span{
  display:block;
  color:var(--azul);
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
}

.summary-box strong{
  display:block;
  color:var(--azul);
  font-size:31px;
  font-weight:900;
  margin-top:4px;
}

.summary-detail{
  color:#111;
  font-size:12px;
  margin-top:2px;
}

.summary-card-icon{
  margin:0 auto 7px;
  width:18px;
  height:24px;
  border-radius:3px;
}

/* MELHOR JOGADOR */
.best-player{
  display:grid;
  grid-template-columns:110px 1fr 90px;
  align-items:center;
  gap:12px;
  padding:12px;
}

.best-photo{
  width:86px;
  height:86px;
  border-radius:50%;
  object-fit:cover;
  background:#eef2f7;
  border:3px solid var(--dourado);
  margin:auto;
}

.best-player h4{
  color:var(--azul);
  font-size:14px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:8px;
}

.best-player strong{
  display:block;
  color:#111;
  font-size:18px;
  font-weight:900;
}

.best-player span{
  display:block;
  color:var(--azul);
  font-size:13px;
  margin-top:4px;
}

.trophy{
  text-align:center;
  font-size:58px;
}

/* AUTENTICAÇÃO E BOTÕES */
.footer-grid{
  margin:0 16px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:24px;
}

.auth-box{
  display:grid;
  grid-template-columns:110px 1fr;
  gap:12px;
  align-items:center;
  padding:12px;
}

.auth-box img{
  width:98px;
  height:98px;
}

.auth-text strong{
  display:block;
  color:var(--azul);
  font-size:14px;
  font-weight:900;
  text-transform:uppercase;
}

.auth-text p{
  color:#111;
  font-size:12px;
  line-height:1.35;
}

.auth-code{
  color:var(--azul);
  font-size:17px;
  font-weight:900;
  margin:4px 0;
}

.share-panel{
  padding:0;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:18px;
}

.btn{
  min-height:58px;
  border-radius:8px;
  color:#fff;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  text-align:center;
  font-size:13px;
  padding:10px;
}

.btn i{
  font-size:24px;
}

.btn-whats{background:#0ca84a}
.btn-email{background:#2563eb}
.btn-link{background:#4b5563}
.btn-pdf{background:#dc2626}

.final-footer{
  margin-top:12px;
  background:linear-gradient(135deg,var(--azul),var(--azul2));
  color:#fff;
  text-align:center;
  padding:9px;
  font-size:13px;
  line-height:1.35;
}

.error{
  max-width:760px;
  margin:80px auto;
  background:#fff;
  border:1px solid #cfd7e3;
  color:#b42323;
  padding:24px;
  border-radius:10px;
  text-align:center;
  font-size:18px;
  font-weight:900;
}

/* CELULAR: NÃO EMPILHA. DIMINUI A SÚMULA INTEIRA */
@media(max-width:1120px){
  .sumula-wrap{
    width:100vw;
    max-width:100vw;
    margin:0;
    overflow:hidden;
  }

  .sumula-scale{
    transform:scale(calc(100vw / 1120));
  }

  body{
    background:#fff;
    overflow-x:hidden;
  }
}

/* PDF */
@media print{
  @page{
    size:A4 portrait;
    margin:5mm;
  }

  html,body{
    background:#fff !important;
    width:210mm;
    min-height:297mm;
    overflow:visible !important;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }

  .sumula-wrap{
    width:200mm !important;
    max-width:200mm !important;
    margin:0 auto !important;
    overflow:visible !important;
  }

  .sumula-scale{
    width:1120px !important;
    transform:scale(.67) !important;
    transform-origin:top left !important;
  }

  .sumula-page{
    width:1120px !important;
    margin:0 !important;
    border:1px solid #b9c4d4 !important;
    border-radius:0 !important;
    box-shadow:none !important;
  }

  .buttons,
  .share-panel{
    display:none !important;
  }

  .lineup-card,
  .team-events,
  .panel,
  .score-card,
  .match-strip,
  .info-strip{
    break-inside:avoid;
    page-break-inside:avoid;
  }
}
</style>
</head>

<body>
<div id="app">
  <div class="error">
    <i class="fa-solid fa-spinner fa-spin"></i><br>
    Carregando súmula oficial...
  </div>
</div>
<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = document.getElementById("app");
const id = new URLSearchParams(window.location.search).get("id");

/* ================= UTIL ================= */
function campo(obj, chaves, fallback = ""){
  for(const chave of chaves){
    if(obj && obj[chave] !== undefined && obj[chave] !== null && obj[chave] !== ""){
      return obj[chave];
    }
  }
  return fallback;
}

function texto(v, f="-"){
  return v === undefined || v === null || v === "" ? f : v;
}

function normalizar(v){
  return String(v || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function nomeTime(v, fallback="TIME"){
  if(v && typeof v === "object"){
    return campo(v,["nome","nomeTime","time","equipe"],fallback);
  }
  return texto(v,fallback);
}

function escudoTime(v){
  if(v && typeof v === "object"){
    return campo(v,["escudo","logo","imagem","foto"],"logo-liga.jfif");
  }
  return "logo-liga.jfif";
}

function cidadeTime(v, fallback="-"){
  if(v && typeof v === "object"){
    return campo(v,["cidade","municipio","local"],fallback);
  }
  return fallback;
}

function dataBR(v){
  if(!v) return "-";
  if(typeof v.toDate === "function") v = v.toDate();
  const d = new Date(v);
  if(!isNaN(d.getTime())) return d.toLocaleDateString("pt-BR");
  return String(v);
}

function dataHoraBR(v){
  if(!v) return "-";
  if(typeof v.toDate === "function") v = v.toDate();
  const d = new Date(v);
  if(!isNaN(d.getTime())){
    return d.toLocaleDateString("pt-BR") + " às " + d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  }
  return String(v);
}

function placarA(s){return Number(campo(s,["golsA","placarA","golsMandante"],0))}
function placarB(s){return Number(campo(s,["golsB","placarB","golsVisitante"],0))}

function codigoSumula(s){
  return campo(s,["codigoVerificacao","hash","numeroSumula","codigoPartida","codigo"],String(id || "LG").slice(0,12).toUpperCase());
}

function qrUrl(){
  return `https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=${encodeURIComponent(window.location.href)}`;
}

/* ================= EVENTOS ================= */
function separarEventosPorTime(lista){
  const a = [];
  const b = [];

  lista.forEach(item=>{
    const time = normalizar(item.time || item.lado || item.equipe || "");
    if(time.includes("b") || time.includes("visit")){
      b.push(item);
    }else{
      a.push(item);
    }
  });

  return {a,b};
}

function renderJogadores(lista){
  if(!Array.isArray(lista) || !lista.length){
    return `<tr><td colspan="3" class="line-empty">Nenhum jogador informado.</td></tr>`;
  }

  const titulares = lista.filter(j => normalizar(j.tipo || "") !== "suplente");
  const suplentes = lista.filter(j => normalizar(j.tipo || "") === "suplente");

  return `
    ${titulares.map(j=>`
      <tr>
        <td class="num">${campo(j,["numero","camisa","n"],"-")}</td>
        <td>${campo(j,["nome","jogador","atleta"],"-")}</td>
        <td class="posicao">${campo(j,["posicao","funcao"],"-")}</td>
      </tr>
    `).join("")}

    <tr class="sub-row"><td colspan="3">Suplentes</td></tr>

    ${
      suplentes.length
      ? suplentes.map(j=>`
        <tr>
          <td class="num">${campo(j,["numero","camisa","n"],"-")}</td>
          <td>${campo(j,["nome","jogador","atleta"],"-")}</td>
          <td class="posicao">${campo(j,["posicao","funcao"],"-")}</td>
        </tr>
      `).join("")
      : `<tr><td colspan="3" class="line-empty">Nenhum suplente informado.</td></tr>`
    }
  `;
}

function renderGols(lista){
  if(!lista.length) return `<div class="line-empty">Nenhum gol.</div>`;

  return lista.map(g=>`
    <div class="event-item">
      <span class="ball">⚽</span>
      <span class="event-minute">${campo(g,["minuto","tempo"],"-")}'</span>
      <span class="event-name">${campo(g,["nome","jogador","atleta"],"-")}</span>
    </div>
  `).join("");
}

function renderCartoes(lista){
  if(!lista.length) return `<div class="line-empty">Nenhum cartão.</div>`;

  return lista.map(c=>{
    const vermelho = normalizar(campo(c,["tipo","cartao","cor"],"")).includes("verm");
    return `
      <div class="event-item">
        <span class="${vermelho ? "red-card" : "yellow-card"}"></span>
        <span class="event-minute">${campo(c,["minuto","tempo"],"-")}'</span>
        <span class="event-name">${campo(c,["nome","jogador","atleta"],"-")}</span>
      </div>
    `;
  }).join("");
}

function contarCartoes(lista){
  let amarelos = 0, vermelhos = 0;
  lista.forEach(c=>{
    if(normalizar(c.tipo).includes("verm")) vermelhos++;
    else amarelos++;
  });
  return {amarelos, vermelhos};
}
