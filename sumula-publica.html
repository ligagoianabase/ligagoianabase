<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
const app=document.getElementById("app");const id=new URLSearchParams(window.location.search).get("id");
function campo(obj,chaves,fallback=""){for(const chave of chaves){if(obj&&obj[chave]!==undefined&&obj[chave]!==null&&obj[chave]!=="")return obj[chave]}return fallback}
function texto(v,f="-"){return v===undefined||v===null||v===""?f:v}function normalizar(v){return String(v||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
function nomeTime(v,fallback="TIME"){if(v&&typeof v==="object")return campo(v,["nome","nomeTime","time","equipe"],fallback);return texto(v,fallback)}function escudoTime(v){if(v&&typeof v==="object")return campo(v,["escudo","logo","imagem","foto"],"logo-liga.jfif");return "logo-liga.jfif"}function cidadeTime(v,fallback="-"){if(v&&typeof v==="object")return campo(v,["cidade","municipio","local"],fallback);return fallback}
function dataBR(v){if(!v)return "-";if(typeof v.toDate==="function")v=v.toDate();const d=new Date(v);if(!isNaN(d.getTime()))return d.toLocaleDateString("pt-BR");return String(v)}function dataHoraBR(v){if(!v)return "-";if(typeof v.toDate==="function")v=v.toDate();const d=new Date(v);if(!isNaN(d.getTime()))return d.toLocaleDateString("pt-BR")+" às "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});return String(v)}
function placarA(s){return Number(campo(s,["golsA","placarA","golsMandante"],0))}function placarB(s){return Number(campo(s,["golsB","placarB","golsVisitante"],0))}function codigoSumula(s){return campo(s,["codigoVerificacao","hash","numeroSumula","codigoPartida","codigo"],String(id||"LG").slice(0,12).toUpperCase())}function qrUrl(){return `https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=${encodeURIComponent(window.location.href)}`}
function separarEventosPorTime(lista){const a=[],b=[];(lista||[]).forEach(item=>{const time=normalizar(item.time||item.lado||item.equipe||"");if(time==="b"||time==="visitante"||time==="timeb"||time==="time b")b.push(item);else a.push(item)});return{a,b}}
function renderJogadores(lista){if(!Array.isArray(lista)||!lista.length)return `<tr><td colspan="3" class="line-empty">Nenhum jogador informado.</td></tr>`;const titulares=lista.filter(j=>normalizar(j.tipo||"")!=="suplente");const suplentes=lista.filter(j=>normalizar(j.tipo||"")==="suplente");return `${titulares.map(j=>`<tr><td class="num">${campo(j,["numero","camisa","n"],"-")}</td><td>${campo(j,["nome","jogador","jogadorNome","atleta"],"-")}</td><td class="posicao">${campo(j,["posicao","posição","funcao"],"-")}</td></tr>`).join("")}<tr class="sub-row"><td colspan="3">Suplentes</td></tr>${suplentes.length?suplentes.map(j=>`<tr><td class="num">${campo(j,["numero","camisa","n"],"-")}</td><td>${campo(j,["nome","jogador","jogadorNome","atleta"],"-")}</td><td class="posicao">${campo(j,["posicao","posição","funcao"],"-")}</td></tr>`).join(""):`<tr><td colspan="3" class="line-empty">Nenhum suplente informado.</td></tr>`}`}
function normalizarTecnico(t){return{nome:campo(t,["nome","nomeCompleto","tecnico","profissional"],""),funcao:campo(t,["funcao","cargo","tipo"],"Técnico"),cpf:campo(t,["cpf","CPF"],""),cref:campo(t,["cref","CREF","registro"],"")}}
function listaComissao(sumula,time){const base=time==="A"?campo(sumula,["comissaoA","tecnicosA"],[]):campo(sumula,["comissaoB","tecnicosB"],[]);let lista=Array.isArray(base)?base.map(normalizarTecnico).filter(t=>t.nome):[];if(!lista.length){const nome=time==="A"?campo(sumula,["tecnicoA"],""):campo(sumula,["tecnicoB"],"");const obj=time==="A"?campo(sumula,["tecnicoAObj"],null):campo(sumula,["tecnicoBObj"],null);if(obj&&typeof obj==="object")lista.push(normalizarTecnico({...obj,funcao:campo(obj,["funcao"],"Técnico")}));else if(nome)lista.push({nome,funcao:"Técnico",cpf:"",cref:""})}return lista}
function renderComissao(lista){if(!lista.length)return `<div class="comissao-vazio">Nenhum técnico informado.</div>`;return lista.map(t=>{const funcao=t.funcao||"Técnico";const nf=normalizar(funcao);const icon=nf.includes("mass")?"fa-hand-holding-medical":nf.includes("prepar")?"fa-briefcase-medical":nf.includes("aux")?"fa-user-group":"fa-user-tie";return `<div class="comissao-item"><div class="comissao-icone"><i class="fa-solid ${icon}"></i></div><div class="comissao-info"><small>${funcao}</small><strong>${t.nome||"-"}</strong>${t.cpf?`<em>CPF: ${t.cpf}</em>`:""}${t.cref?`<em>CREF: ${t.cref}</em>`:""}</div></div>`}).join("")}
function renderGols(lista){if(!lista.length)return `<div class="line-empty">Nenhum gol.</div>`;return lista.map(g=>`<div class="event-item"><span class="ball">⚽</span><span class="event-minute">${campo(g,["minuto","tempo"],"-")}'</span><span class="event-name">${campo(g,["nome","jogador","jogadorNome","atleta"],"-")}</span></div>`).join("")}
function renderCartoes(lista){if(!lista.length)return `<div class="line-empty">Nenhum cartão.</div>`;return lista.map(c=>{const vermelho=normalizar(campo(c,["tipo","cartao","cor"],"amarelo")).includes("verm");const vermelhoTipo=campo(c,["vermelhoTipo"],"");const extra=vermelho?`<small>${vermelhoTipo==="segundo_amarelo"?"2º amarelo":"vermelho direto"}</small>`:"";return `<div class="event-item"><span class="${vermelho?"red-card":"yellow-card"}"></span><span class="event-minute">${campo(c,["minuto","tempo"],"-")}'</span><span class="event-name">${campo(c,["nome","jogador","jogadorNome","atleta"],"-")}${extra}</span></div>`}).join("")}
