<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --bg:#061427;
  --card:#0d2a52;
  --gold:#f7c600;
  --white:#fff;
  --muted:#cbd6ea;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial;
  background:linear-gradient(rgba(2,8,20,.9), rgba(2,8,20,.96)), url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
}

.wrap{
  width:min(100% - 28px, 1100px);
  margin:auto;
}

/* HEADER PADRÃO */
.site-header{
  background:#08172c;
  border-bottom:3px solid var(--gold);
}

.header-top{
  padding:18px;
  text-align:center;
  font-weight:900;
  font-size:22px;
}

.nav-bar{background:#0d2a52}

.menu{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:12px;
  flex-wrap:wrap;
}

.menu a{color:#fff;font-weight:900}
.menu .ativo{
  background:var(--gold);
  color:#111;
  padding:6px 10px;
  border-radius:6px;
}

/* SUMULA */
.container{padding:20px}

.card{
  background:var(--card);
  border-radius:16px;
  padding:20px;
}

.titulo{
  text-align:center;
  color:var(--gold);
  font-size:24px;
  font-weight:900;
  margin-bottom:10px;
}

.placar{
  text-align:center;
  font-size:38px;
  color:var(--gold);
  font-weight:900;
  margin:15px 0;
}

.times{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.time{
  text-align:center;
  font-weight:900;
}

.secao{
  margin-top:20px;
}

.secao h3{
  color:var(--gold);
  margin-bottom:8px;
}

.lista{
  font-size:14px;
  color:var(--muted);
}

.btn{
  display:block;
  margin-top:20px;
  padding:12px;
  background:var(--gold);
  color:#111;
  text-align:center;
  border-radius:10px;
  font-weight:900;
}
</style>
</head>

<body>

<header class="site-header">
  <div class="header-top">
    LIGA GOIANA DE FUTEBOL DE BASE
  </div>

  <div class="nav-bar">
    <nav class="menu">
      <a href="index.html">Início</a>
      <a href="campeonatos.html">Campeonatos</a>
      <a href="tabela.html">Tabela</a>
      <a href="jogos.html">Jogos</a>
      <a href="sumulas.html" class="ativo">Súmula</a>
    </nav>
  </div>
</header>

<main class="wrap container">

<div id="area" class="card"></div>

<a class="btn" href="sumulas.html">← Voltar</a>

</main>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const area=document.getElementById("area");

function getId(){
  return new URLSearchParams(location.search).get("id");
}

/* EXEMPLO COMPLETO */
const exemplo={
id:"final-2002",
timeA:"Brasil",
timeB:"Alemanha",
golsA:2,
golsB:0,
categoria:"Seleção Principal",
campeonato:"Copa do Mundo 2002",
local:"Yokohama",
data:"2002-06-30",
golsDetalhadosA:[
{nome:"Ronaldo",minuto:67},
{nome:"Ronaldo",minuto:79}
],
amarelosDetalhadosA:[
{nome:"Rivaldo",minuto:90}
]
};

function campo(v){return v||"-"}

function dataBR(d){
if(!d)return"-";
return new Date(d).toLocaleDateString("pt-BR");
}

function lista(arr){
if(!arr||!arr.length)return "Nenhum";
return arr.map(i=>`${i.nome} (${i.minuto}')`).join("<br>");
}

async function carregar(){

let s=null;

try{
const snap=await getDoc(doc(db,"sumulas",getId()));
if(snap.exists()) s=snap.data();
}catch{}

if(!s) s=exemplo;

render(s);
}

function render(s){

area.innerHTML=`

<div class="titulo">
SÚMULA OFICIAL
</div>

<div class="times">
<div class="time">${campo(s.timeA)}</div>
<div class="time">${campo(s.timeB)}</div>
</div>

<div class="placar">
${s.golsA||0} x ${s.golsB||0}
</div>

<div class="secao">
<h3>Dados do jogo</h3>
<div class="lista">
${campo(s.campeonato)}<br>
${campo(s.categoria)}<br>
${dataBR(s.data)} - ${campo(s.local)}
</div>
</div>

<div class="secao">
<h3>Gols</h3>
<div class="lista">
${lista(s.golsDetalhadosA)}<br><br>
${lista(s.golsDetalhadosB)}
</div>
</div>

<div class="secao">
<h3>Cartões</h3>
<div class="lista">
${lista(s.amarelosDetalhadosA)}<br><br>
${lista(s.amarelosDetalhadosB)}
</div>
</div>

<div class="secao">
<h3>Observações</h3>
<div class="lista">
${campo(s.observacoes)}
</div>
</div>

`;
}

carregar();
</script>

</body>
</html>
