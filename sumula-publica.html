<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súmula Oficial - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --azul:#0A1F3D;
  --vermelho:#d90429;
  --verde:#069447;
  --dourado:#f7c600;
  --linha:#d6dde8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#e6edf6;
}

.container{
  max-width:1100px;
  margin:10px auto;
  background:#fff;
  border:1px solid #ccc;
}

/* HEADER */
.header{
  display:grid;
  grid-template-columns:120px 1fr 120px;
  align-items:center;
  padding:10px;
  border-bottom:2px solid var(--azul);
}
.header img{width:90px}
.title{text-align:center}
.title h1{font-size:36px;color:var(--azul)}
.title p{font-weight:900}

/* INFO */
.info{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  border-bottom:1px solid #ccc;
}
.info div{
  padding:8px;
  border-right:1px solid #ccc;
  font-size:13px;
}
.info div:last-child{border-right:none}

/* PLACAR */
.placar{
  display:grid;
  grid-template-columns:1fr 200px 1fr;
  text-align:center;
  align-items:center;
}
.score{
  background:var(--azul);
  color:#fff;
  font-size:48px;
  font-weight:900;
  padding:10px 0;
}

/* EVENTOS */
.events{
  display:grid;
  grid-template-columns:1fr 1fr;
  border-top:2px solid var(--azul);
}
.col{
  padding:10px;
  font-size:14px;
}

/* RESUMO */
.summary{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  text-align:center;
  border-top:2px solid var(--azul);
}
.summary div{padding:10px;font-weight:900}

/* ARBITRAGEM */
.ref{
  padding:10px;
  border-top:1px solid #ccc;
  font-size:14px;
}

/* MVP */
.mvp{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-top:1px solid #ccc;
}
.mvp img{
  width:70px;
  height:70px;
  border-radius:50%;
  border:3px solid var(--dourado);
}

/* QR */
.qr{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-top:1px solid #ccc;
}

/* BOTÕES */
.btns{
  display:flex;
  gap:10px;
  padding:10px;
}
button{
  padding:10px;
  border:none;
  color:#fff;
  font-weight:900;
  cursor:pointer;
}
.whats{background:#25d366}
.email{background:#2563eb}
.pdf{background:#dc2626}

@media print{
  button{display:none}
}
</style>
</head>

<body>

<div id="app">Carregando...</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const id = new URLSearchParams(location.search).get("id");
const app = document.getElementById("app");

function qr(){
  return "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + location.href;
}

function separar(lista){
  const a=[], b=[];
  lista.forEach(e=>{
    if((e.time || "A") === "B") b.push(e);
    else a.push(e);
  });
  return {a,b};
}

function renderGols(lista){
  if(!lista.length) return "Nenhum";
  return lista.map(g => "⚽ " + (g.nome||"-") + " (" + (g.minuto||"-") + "')").join("<br>");
}

function renderCartoes(lista){
  if(!lista.length) return "Nenhum";
  return lista.map(c => {
    const icon = c.tipo === "vermelho" ? "🟥" : "🟨";
    return icon + " " + (c.nome||"-") + " (" + (c.minuto||"-") + "')";
  }).join("<br>");
}

async function load(){
  if(!id){
    app.innerHTML = "Súmula não informada";
    return;
  }

  const snap = await getDoc(doc(db,"sumulas",id));

  if(!snap.exists()){
    app.innerHTML = "Súmula não encontrada";
    return;
  }

  const s = snap.data();

  const g = separar(s.gols || []);
  const c = separar(s.cartoes || []);

  app.innerHTML = `
  <div class="container">

    <div class="header">
      <img src="logo-liga.jfif">
      <div class="title">
        <h1>SÚMULA OFICIAL</h1>
        <p>${s.campeonato || "-"}</p>
      </div>
      <img src="logo-liga.jfif">
    </div>

    <div class="info">
      <div>Nº ${id}</div>
      <div>Rodada ${s.rodada || "-"}</div>
      <div>Fase ${s.fase || "-"}</div>
      <div>${s.data || "-"}</div>
      <div>FINALIZADO</div>
    </div>

    <div class="placar">
      <div>${s.timeA || "-"}</div>
      <div class="score">${s.golsA || 0} x ${s.golsB || 0}</div>
      <div>${s.timeB || "-"}</div>
    </div>

    <div class="events">
      <div class="col">
        <b>${s.timeA || "-"}</b><br>
        Gols:<br>${renderGols(g.a)}<br><br>
        Cartões:<br>${renderCartoes(c.a)}
      </div>

      <div class="col">
        <b>${s.timeB || "-"}</b><br>
        Gols:<br>${renderGols(g.b)}<br><br>
        Cartões:<br>${renderCartoes(c.b)}
      </div>
    </div>

    <div class="summary">
      <div>Gols<br>${(s.golsA||0)+(s.golsB||0)}</div>
      <div>Amarelos<br>${(s.cartoes||[]).filter(c=>c.tipo!=="vermelho").length}</div>
      <div>Vermelhos<br>${(s.cartoes||[]).filter(c=>c.tipo==="vermelho").length}</div>
    </div>

    <div class="ref">
      Árbitro: ${s.arbitro || "-"}<br>
      Assistente 1: ${s.ass1 || "-"}<br>
      Assistente 2: ${s.ass2 || "-"}
    </div>

    <div class="mvp">
      <img src="${s.fotoMelhor || 'logo-liga.jfif'}">
      <div>
        <b>Melhor Jogador</b><br>
        ${s.melhorJogador || "-"}
      </div>
    </div>

    <div class="qr">
      <div>Código: ${id}</div>
      <img src="${qr()}">
    </div>

    <div class="btns">
      <button class="whats" onclick="window.open('https://wa.me/?text='+location.href)">Whats</button>
      <button class="email" onclick="location.href='mailto:?body='+location.href">Email</button>
      <button class="pdf" onclick="window.print()">PDF</button>
    </div>

  </div>
  `;
}

load();
</script>

</body>
</html>
