<head>

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#42e85f;
  --yellow:#ffd400;
  --red:#ff2738;
  --blue:#4d8dff;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

img{
  display:block;
  max-width:100%;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

/* HEADER PADRÃO */
.site-header{
  background:linear-gradient(180deg, rgba(2,10,24,.98), rgba(8,23,44,.96));
  border-bottom:3px solid var(--gold);
  box-shadow:var(--shadow);
}

.header-top{
  min-height:92px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px 0;
}

.header-title{
  text-align:center;
  font-size:26px;
  font-weight:900;
  letter-spacing:.8px;
  text-transform:uppercase;
  line-height:1.15;
}

/* MENU FINAL PADRÃO */
.nav-bar{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.98));
  border-top:1px solid rgba(255,255,255,.06);
  overflow:hidden;
}

.menu{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:clamp(4px, .55vw, 10px);
  padding:14px 6px;
  flex-wrap:nowrap;
  overflow:hidden;
}

.menu a{
  color:#fff;
  font-weight:900;
  font-size:clamp(11px, .92vw, 15px);

  padding:clamp(8px, .75vw, 12px) clamp(9px, 1vw, 18px);

  transition:.25s ease;
}

.menu a:hover{
  color:var(--gold);
  border-color:var(--gold-line);
}

.menu a.ativo{
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
}

/* PÁGINA */
.container{
  padding:22px 0 34px;
}

#areaSumula{
  background:
    radial-gradient(circle at top center, rgba(24,72,130,.55), transparent 38%),
    linear-gradient(180deg, rgba(2,12,28,.98), rgba(3,13,28,.98));
  border:2px solid var(--gold);
  border-radius:18px;
  box-shadow:var(--shadow);
  overflow:hidden;
}

.sumula-header{
  display:grid;
  grid-template-columns:96px 1fr 96px;
  align-items:center;
  gap:14px;
  padding:18px 22px;
  border-bottom:2px solid var(--gold);
}

.logo-oficial{
  width:82px;
  height:82px;
  object-fit:cover;
  border-radius:18px;
  border:2px solid var(--gold);
  background:#fff;
}

.logo-oficial.right{
  justify-self:end;
}

.titulo-oficial{
  text-align:center;
}

.titulo-oficial strong{
  display:block;
  color:var(--gold);
  font-size:38px;
  font-weight:900;
  letter-spacing:1px;
  line-height:1;
}

.titulo-oficial span{
  display:block;
  margin-top:9px;
  color:#fff;
  font-size:16px;
  font-weight:900;
  letter-spacing:.5px;
}

.meta-bar{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  padding:13px 16px;
  border-bottom:1px solid var(--line);
  background:rgba(3,12,29,.55);
  font-weight:900;
  color:#fff;
}

.meta-item{
  display:flex;
  align-items:center;
  gap:7px;
  white-space:nowrap;
  font-size:13px;
}

.meta-item i{
  color:var(--gold);
}
<style>

.grid-2{

/* EVENTOS */
.evento{
  display:flex;

  align-items:center;

.minuto{

/* TIPOS */
.gol i{color:var(--green);}

/* LISTA JOGADORES */
.lista-jogadores{

.jogador{

/* OBSERVAÇÕES */
.obs{

/* AÇÕES */
.acoes{
  display:flex;

  flex-wrap:wrap;
  padding:18px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:12px;
  font-weight:900;

}

.btn-whats{

  color:#fff;
}

.btn-email{

.btn-pdf{

  .grid-2,

    grid-template-columns:1fr;
  }

}

</style>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const area = document.getElementById("areaSumula");

function getId(){
  return new URLSearchParams(window.location.search).get("id");
}

function campo(valor, fallback = "-"){
  if(valor === undefined || valor === null || valor === "") return fallback;
  return valor;
}

function normalizar(valor){
  return String(valor || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function dataBR(valor){
  if(!valor) return "-";

  const d = new Date(valor);

  if(isNaN(d.getTime())){
    return String(valor);
  }

  return d.toLocaleString("pt-BR", {
    day:"2-digit",
    month:"2-digit",
    year:"numeric",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function evento(item, tipo){
  const nome = campo(item.nome || item.jogador, "Jogador");
  const numero = item.numero ? `#${item.numero}` : "";
  const minuto = campo(item.minuto || item.tempo || item.min, "");

  let icon = "fa-futbol";
  if(tipo === "amarelo") icon = "fa-square";
  if(tipo === "vermelho") icon = "fa-square";

  return `
    <div class="evento ${tipo}">
      <span><i class="fa-solid ${icon}"></i> ${numero} ${nome}</span>
      <div class="minuto">${minuto ? minuto + "'" : ""}</div>
    </div>
  `;
}

function listaEventos(lista, tipo){
  if(!lista || !lista.length){
    return `<div class="evento"><span>Nenhum</span></div>`;
  }

  return lista.map(item => evento(item, tipo)).join("");
}

function jogadorLinha(j){
  const numero = campo(j.numero, "-");
  const nome = campo(j.nome, "Jogador");

  return `
    <div class="jogador">
      ${numero} - ${nome}
    </div>
  `;
}

function listaJogadores(lista){
  if(!lista || !lista.length){
    return `<div class="jogador">Nenhum jogador informado.</div>`;
  }

  return lista.map(jogadorLinha).join("");
}

function montarSumula(s){
  const timeA = campo(s.timeA, "Time A");
  const timeB = campo(s.timeB, "Time B");

  const golsA = Number(s.golsA || (s.golsDetalhadosA || []).length || 0);
  const golsB = Number(s.golsB || (s.golsDetalhadosB || []).length || 0);

  const logoA = s.logoTimeA || s.escudoA || s.logoA || "logo-liga.jfif";
  const logoB = s.logoTimeB || s.escudoB || s.logoB || "logo-liga.jfif";
  const logoCamp = s.logoCampeonato || "logo-liga.jfif";

  const campeonato = campo(s.campeonato || s.nomeCampeonato, "Campeonato");
  const categoria = campo(s.categoria, "Categoria");
  const data = dataBR(s.dataJogo || s.data);
  const local = campo(s.local, "Local");
  const rodada = campo(s.rodada || s.fase, "Jogo");
  const arbitro = campo(s.arbitro || s.arbitroPrincipal, "Não informado");
  const assistente1 = campo(s.assistente1 || s.assistenteA, "Não informado");
  const assistente2 = campo(s.assistente2 || s.assistenteB, "Não informado");

  area.innerHTML = `
    <div class="sumula-header">
      <img src="logo-liga.jfif" class="logo-oficial" onerror="this.src='logo-liga.jfif'">

      <div class="titulo-oficial">
        <strong>SÚMULA OFICIAL</strong>
        <span>LIGA GOIANA DE FUTEBOL DE BASE</span>
      </div>

      <img src="${logoCamp}" class="logo-oficial right" onerror="this.src='logo-liga.jfif'">
    </div>

    <div class="meta-bar">
      <div class="meta-item"><i class="fa-solid fa-trophy"></i> ${campeonato}</div>
      <div class="meta-item"><i class="fa-solid fa-users"></i> ${categoria}</div>
      <div class="meta-item"><i class="fa-solid fa-calendar-days"></i> ${data}</div>
      <div class="meta-item"><i class="fa-solid fa-location-dot"></i> ${local}</div>
      <div class="meta-item"><i class="fa-solid fa-flag"></i> ${rodada}</div>
    </div>

    <section class="score-board">
      <div class="time">
        <img src="${logoA}" class="escudo" onerror="this.src='logo-liga.jfif'">
        <div class="nome-time">${timeA}</div>
      </div>

      <div class="placar">${golsA} x ${golsB}</div>

      <div class="time visitante">
        <img src="${logoB}" class="escudo" onerror="this.src='logo-liga.jfif'">
        <div class="nome-time">${timeB}</div>
      </div>
    </section>

    <section class="section">
      <h3><i class="fa-solid fa-user-tie"></i> Arbitragem</h3>
      <div class="grid-2">
        <div class="evento"><span>Árbitro</span><div>${arbitro}</div></div>
        <div class="evento"><span>Assistente 1</span><div>${assistente1}</div></div>
        <div class="evento"><span>Assistente 2</span><div>${assistente2}</div></div>
        <div class="evento"><span>Status</span><div>${campo(s.status, "Finalizada")}</div></div>
      </div>
    </section>
<section class="section">
      <h3><i class="fa-solid fa-users"></i> Jogadores Relacionados</h3>

      <div class="grid-2">
        <div>
          <h3 style="font-size:14px;">${timeA}</h3>
          <div class="lista-jogadores">
            ${listaJogadores(s.jogadoresA || s.elencoA || [])}
          </div>
        </div>

        <div>
          <h3 style="font-size:14px;">${timeB}</h3>
          <div class="lista-jogadores">
            ${listaJogadores(s.jogadoresB || s.elencoB || [])}
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <h3><i class="fa-solid fa-futbol"></i> Gols</h3>

      <div class="grid-2">
        <div>
          <h3 style="font-size:14px;">${timeA}</h3>
          ${listaEventos(s.golsDetalhadosA || [], "gol")}
        </div>

        <div>
          <h3 style="font-size:14px;">${timeB}</h3>
          ${listaEventos(s.golsDetalhadosB || [], "gol")}
        </div>
      </div>
    </section>

    <section class="section">
      <h3><i class="fa-solid fa-square"></i> Cartões Amarelos</h3>

      <div class="grid-2">
        <div>
          <h3 style="font-size:14px;">${timeA}</h3>
          ${listaEventos(s.amarelosDetalhadosA || [], "amarelo")}
        </div>

        <div>
          <h3 style="font-size:14px;">${timeB}</h3>
          ${listaEventos(s.amarelosDetalhadosB || [], "amarelo")}
        </div>
      </div>
    </section>

    <section class="section">
      <h3><i class="fa-solid fa-square"></i> Cartões Vermelhos</h3>

      <div class="grid-2">
        <div>
          <h3 style="font-size:14px;">${timeA}</h3>
          ${listaEventos(s.vermelhosDetalhadosA || [], "vermelho")}
        </div>

        <div>
          <h3 style="font-size:14px;">${timeB}</h3>
          ${listaEventos(s.vermelhosDetalhadosB || [], "vermelho")}
        </div>
      </div>
    </section>

    <section class="section">
      <h3><i class="fa-solid fa-clipboard"></i> Observações do Árbitro</h3>
      <div class="obs">
        ${campo(s.observacoes || s.obs || s.observacao, "Sem observações do árbitro.")}
      </div>
    </section>

    <div class="acoes">
      <button class="btn btn-pdf" onclick="baixarImagem()">
        <i class="fa-solid fa-image"></i> Baixar Imagem
      </button>

      <button class="btn btn-pdf" onclick="baixarPDF()">
        <i class="fa-solid fa-file-pdf"></i> Baixar PDF
      </button>

      <button class="btn btn-whats" onclick="compartilharWhatsApp()">
        <i class="fa-brands fa-whatsapp"></i> WhatsApp
      </button>

      <button class="btn btn-email" onclick="compartilharEmail()">
        <i class="fa-solid fa-envelope"></i> E-mail
      </button>

      <a class="btn btn-voltar" href="jogos.html">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </a>
    </div>
  `;
}

const sumulaExemplo = {
  id:"final-copa-2002",
  campeonato:"Copa do Mundo FIFA 2002",
  categoria:"Seleção Principal",
  dataJogo:"2002-06-30T08:00:00",
  local:"International Stadium Yokohama",
  rodada:"Final",
  timeA:"Brasil",
  timeB:"Alemanha",
  golsA:2,
  golsB:0,
  logoTimeA:"logo-liga.jfif",
  logoTimeB:"logo-liga.jfif",
  logoCampeonato:"logo-liga.jfif",
  arbitro:"Pierluigi Collina",
  assistente1:"Leif Lindberg",
  assistente2:"Philip Sharp",
  status:"Finalizada",
  jogadoresA:[
    {numero:1,nome:"Marcos"},
    {numero:2,nome:"Cafu"},
    {numero:3,nome:"Lúcio"},
    {numero:4,nome:"Roque Júnior"},
    {numero:6,nome:"Roberto Carlos"},
    {numero:5,nome:"Edmílson"},
    {numero:8,nome:"Gilberto Silva"},
    {numero:11,nome:"Ronaldinho"},
    {numero:10,nome:"Rivaldo"},
    {numero:7,nome:"Kléberson"},
    {numero:9,nome:"Ronaldo"}
  ],
  jogadoresB:[
    {numero:1,nome:"Oliver Kahn"},
    {numero:2,nome:"Thomas Linke"},
    {numero:5,nome:"Carsten Ramelow"},
    {numero:6,nome:"Christian Ziege"},
    {numero:8,nome:"Dietmar Hamann"},
    {numero:11,nome:"Miroslav Klose"},
    {numero:13,nome:"Michael Ballack"},
    {numero:16,nome:"Jens Jeremies"},
    {numero:19,nome:"Bernd Schneider"},
    {numero:21,nome:"Christoph Metzelder"},
    {numero:22,nome:"Torsten Frings"}
  ],
  golsDetalhadosA:[
    {numero:9,nome:"Ronaldo",minuto:"67"},
    {numero:9,nome:"Ronaldo",minuto:"79"}
  ],
  golsDetalhadosB:[],
  amarelosDetalhadosA:[
    {numero:10,nome:"Rivaldo",minuto:"90"}
  ],
  amarelosDetalhadosB:[
    {numero:5,nome:"Carsten Ramelow",minuto:"9"},
    {numero:11,nome:"Miroslav Klose",minuto:"74"}
  ],
  vermelhosDetalhadosA:[],
  vermelhosDetalhadosB:[],
  observacoes:"Súmula demonstrativa da final da Copa do Mundo FIFA 2002 para visualização do sistema."
};

async function carregar(){
  const id = getId();

  try{
    if(!id || id === "final-copa-2002"){
      montarSumula(sumulaExemplo);
      return;
    }

    const snap = await getDoc(doc(db, "sumulas", id));

    if(!snap.exists()){
      area.innerHTML = `<div style="padding:22px;text-align:center;">Súmula não encontrada.</div>`;
      return;
    }

    montarSumula({id:snap.id, ...snap.data()});
  }catch(erro){
    console.error(erro);
    montarSumula(sumulaExemplo);
  }
}

window.baixarImagem = async function(){
  const canvas = await html2canvas(area, {
    scale:2,
    useCORS:true,
    backgroundColor:"#061427"
  });

  const link = document.createElement("a");
  link.download = "sumula-oficial.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
};

window.baixarPDF = async function(){
  const canvas = await html2canvas(area, {
    scale:2,
    useCORS:true,
    backgroundColor:"#061427"
  });

  const img = canvas.toDataURL("image/png");
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p", "mm", "a4");

  const pageWidth = 210;
  const margin = 8;
  const imgWidth = pageWidth - margin * 2;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  pdf.addImage(img, "PNG", margin, 8, imgWidth, imgHeight);
  pdf.save("sumula-oficial.pdf");
};

window.compartilharWhatsApp = function(){
  const texto = encodeURIComponent(
    `Súmula oficial da Liga Goiana de Futebol de Base:\n${window.location.href}`
  );

  window.open(`https://wa.me/?text=${texto}`, "_blank");
};

window.compartilharEmail = function(){
  const assunto = encodeURIComponent("Súmula oficial");
  const corpo = encodeURIComponent(
    `Súmula oficial da Liga Goiana de Futebol de Base:\n${window.location.href}`
  );

  window.location.href = `mailto:?subject=${assunto}&body=${corpo}`;
};

carregar();
</script>
