<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula Oficial - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --azul:#061d44;
  --azul2:#08285c;
  --azul3:#0c3d86;
  --vermelho:#e30613;
  --verde:#069447;
  --dourado:#f7c600;
  --cinza:#eef2f7;
  --linha:#cfd7e3;
  --texto:#071833;
  --muted:#4b5563;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#dfe6ef;
  color:var(--texto);
  min-height:100vh;
}

#app{
  width:100%;
}

.sumula-page{
  width:min(100% - 20px, 1180px);
  margin:12px auto;
  background:#fff;
  border:1px solid #b9c4d4;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.16);
}

.header{
  display:grid;
  grid-template-columns:150px 1fr 210px;
  align-items:center;
  gap:10px;
  padding:16px 18px 8px;
}

.header-logo{
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-logo img{
  width:94px;
  height:94px;
  object-fit:contain;
}

.header-title{
  text-align:center;
}

.header-title h1{
  color:var(--azul);
  font-size:56px;
  font-weight:900;
  letter-spacing:1px;
  line-height:.95;
}

.header-title p{
  margin-top:8px;
  color:var(--azul);
  font-size:21px;
  font-weight:900;
  text-transform:uppercase;
}

.header-right{
  text-align:center;
}

.header-brand-title{
  color:var(--azul);
  font-size:19px;
  font-weight:900;
  line-height:1.08;
  text-transform:uppercase;
}

.header-brand-sub{
  margin-top:6px;
  color:var(--dourado);
  font-size:14px;
  font-weight:900;
  line-height:1.1;
}

.info-strip{
  margin:8px 18px 14px;
  display:grid;
  grid-template-columns:1.1fr 1.35fr .85fr .85fr 1.05fr;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.info-box{
  min-height:70px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border-right:1px solid var(--linha);
  background:#fff;
}

.info-box:last-child{
  border-right:none;
}

.info-box i{
  width:36px;
  color:var(--azul);
  font-size:30px;
  text-align:center;
}

.info-box small{
  display:block;
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  color:#111;
  margin-bottom:4px;
}

.info-box strong{
  display:block;
  color:var(--azul);
  font-size:17px;
  font-weight:900;
}

.status-finalizado{
  display:inline-flex !important;
  align-items:center;
  justify-content:center;
  gap:7px;
  background:var(--verde);
  color:#fff !important;
  padding:8px 15px;
  border-radius:8px;
  font-size:16px !important;
}

.score-card{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:1fr 260px 1fr;
  min-height:140px;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.team-score{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  padding:14px;
  background:#fff;
}

.team-score.away{
  flex-direction:row-reverse;
}

.team-score img{
  width:108px;
  height:108px;
  object-fit:contain;
}

.team-name{
  text-align:center;
}

.team-name h2{
  color:var(--azul);
  font-size:34px;
  font-weight:900;
  text-transform:uppercase;
  line-height:1.05;
}

.team-name p{
  margin-top:8px;
  color:var(--azul);
  font-size:16px;
  font-weight:800;
}

.score-center{
  background:var(--azul);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-left:1px solid var(--linha);
  border-right:1px solid var(--linha);
}

.score-number{
  font-size:76px;
  font-weight:900;
  letter-spacing:5px;
  line-height:1;
}

.score-center span{
  margin-top:8px;
  text-transform:uppercase;
  font-size:14px;
  font-weight:900;
}

.match-strip{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:1fr 1fr 1.2fr 1.1fr;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.match-box{
  display:flex;
  align-items:center;
  gap:12px;
  min-height:64px;
  padding:10px 12px;
  border-right:1px solid var(--linha);
  background:#fff;
}

.match-box:last-child{
  border-right:none;
}

.match-box i{
  width:34px;
  color:var(--azul);
  font-size:30px;
  text-align:center;
}

.match-box small{
  display:block;
  color:var(--azul);
  text-transform:uppercase;
  font-weight:900;
  font-size:12px;
  margin-bottom:3px;
}

.match-box strong{
  display:block;
  color:#111;
  font-size:15px;
  font-weight:900;
}

.section-title{
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:8px 10px;
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.line-empty{
  color:#777;
  font-size:13px;
  text-align:center;
  padding:12px;
}

.lineups{
  margin:0 18px 12px;
  background:#fff;
}

.lineups-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}

.lineup-panel{
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
  background:#fff;
}

.lineup-head{
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:#fff;
  background:var(--azul);
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.lineup-panel.away .lineup-head{
  background:var(--vermelho);
}

.lineup-head img{
  width:28px;
  height:28px;
  object-fit:contain;
  background:#fff;
  border-radius:50%;
  padding:2px;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th{
  background:#f5f7fb;
  color:var(--azul);
  font-size:12px;
  text-transform:uppercase;
  padding:7px 8px;
  border-bottom:1px solid var(--linha);
  text-align:left;
}

.table td{
  color:#111;
  font-size:13px;
  padding:5px 8px;
  border-bottom:1px solid #e5eaf1;
}

.table tr:last-child td{
  border-bottom:none;
}

.table .num{
  width:48px;
  text-align:center;
}

.table .posicao{
  width:170px;
}

.sub-row td{
  background:#f8fafc;
  color:var(--azul);
  text-align:center;
  font-weight:900;
  text-transform:uppercase;
  padding:7px;
}

.legend{
  margin-top:10px;
  padding:9px;
  text-align:center;
  color:#111;
  font-size:14px;
  border:1px solid var(--linha);
  border-radius:6px;
  background:#fff;
}

.events-grid{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}

.team-events{
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
  background:#fff;
}

.team-events h3{
  color:#fff;
  background:var(--azul);
  text-align:center;
  padding:8px;
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.team-events.away h3{
  background:var(--vermelho);
}

.events-columns{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.event-col{
  min-height:130px;
  padding:12px;
  border-right:1px solid var(--linha);
}

.event-col:last-child{
  border-right:none;
}

.event-col h4{
  color:var(--azul);
  text-align:center;
  font-size:17px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:10px;
}

.event-item{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
  color:#111;
  font-size:14px;
  line-height:1.2;
}

.event-minute{
  color:var(--azul);
  font-weight:900;
  width:42px;
  flex:0 0 auto;
}

.event-name{
  flex:1;
}

.ball{
  font-size:18px;
  width:20px;
  text-align:center;
}

.yellow-card,
.red-card{
  width:14px;
  height:19px;
  border-radius:3px;
  display:inline-block;
  flex:0 0 auto;
}

.yellow-card{
  background:#f7c600;
}

.red-card{
  background:#e30613;
}

.lower-grid{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:24px;
}

.panel{
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
  background:#fff;
}

.panel h3{
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:8px;
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
}

.official-row{
  display:grid;
  grid-template-columns:165px 1fr;
  min-height:44px;
  border-bottom:1px solid var(--linha);
  align-items:center;
}

.official-row:last-child{
  border-bottom:none;
}

.official-label{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--azul);
  font-size:13px;
  font-weight:900;
  text-transform:uppercase;
  padding:10px 12px;
}

.official-value{
  color:#111;
  font-size:14px;
  padding:10px 12px;
}

.summary-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  border-bottom:1px solid var(--linha);
}

.summary-box{
  text-align:center;
  padding:15px 10px;
  border-right:1px solid var(--linha);
}

.summary-box:last-child{
  border-right:none;
}

.summary-box i{
  color:var(--azul);
  font-size:28px;
  margin-bottom:6px;
}

.summary-box span{
  display:block;
  color:var(--azul);
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
}

.summary-box strong{
  display:block;
  color:var(--azul);
  font-size:31px;
  font-weight:900;
  margin-top:4px;
}

.summary-detail{
  color:#111;
  font-size:12px;
  margin-top:2px;
}

.summary-card-icon{
  margin:0 auto 7px;
  width:18px;
  height:24px;
  border-radius:3px;
}

.best-player{
  display:grid;
  grid-template-columns:110px 1fr 90px;
  align-items:center;
  gap:12px;
  padding:12px;
}

.best-photo{
  width:86px;
  height:86px;
  border-radius:50%;
  object-fit:cover;
  background:#eef2f7;
  border:3px solid var(--dourado);
  margin:auto;
}

.best-player h4{
  color:var(--azul);
  font-size:14px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:8px;
}

.best-player strong{
  display:block;
  color:#111;
  font-size:18px;
  font-weight:900;
}

.best-player span{
  display:block;
  color:var(--azul);
  font-size:13px;
  margin-top:4px;
}

.trophy{
  text-align:center;
  font-size:58px;
}

.footer-grid{
  margin:0 18px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:24px;
}

.auth-box{
  display:grid;
  grid-template-columns:110px 1fr;
  gap:12px;
  align-items:center;
  padding:12px;
}

.auth-box img{
  width:98px;
  height:98px;
}

.auth-text strong{
  display:block;
  color:var(--azul);
  font-size:14px;
  font-weight:900;
  text-transform:uppercase;
}

.auth-text p{
  color:#111;
  font-size:12px;
  line-height:1.35;
}

.auth-code{
  color:var(--azul);
  font-size:17px;
  font-weight:900;
  margin:4px 0;
}

.share-panel{
  padding:18px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.btn{
  min-height:58px;
  border-radius:8px;
  color:#fff;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  text-align:center;
  font-size:13px;
  padding:10px;
  cursor:pointer;
  border:none;
}

.btn i{
  font-size:24px;
}

.btn-whats{background:#0ca84a}
.btn-email{background:#2563eb}
.btn-link{background:#4b5563}
.btn-pdf{background:#dc2626}

.final-footer{
  margin-top:12px;
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:9px;
  font-size:13px;
  line-height:1.35;
}

.error{
  max-width:760px;
  margin:80px auto;
  background:#fff;
  border:1px solid #cfd7e3;
  color:#b42323;
  padding:24px;
  border-radius:10px;
  text-align:center;
  font-size:18px;
  font-weight:900;
}

@media print{
  @page{
    size:A4 portrait;
    margin:7mm;
  }

  html,
  body{
    width:210mm;
    background:#fff;
    -webkit-print-color-adjust:exact !important;
    print-color-adjust:exact !important;
  }

  .sumula-page{
    width:100%;
    margin:0;
    border:none;
    border-radius:0;
    box-shadow:none;
    overflow:visible;
  }

  .buttons{
    display:none;
  }

  .header,
  .info-strip,
  .score-card,
  .match-strip,
  .lineups,
  .lineup-panel,
  .team-events,
  .panel,
  .footer-grid{
    break-inside:avoid;
    page-break-inside:avoid;
  }

  .final-footer{
    margin-top:8px;
  }
}

@media(max-width:900px){
  .sumula-page{
    width:100%;
    margin:0;
    border-radius:0;
  }

  .header,
  .info-strip,
  .score-card,
  .match-strip,
  .lineups-grid,
  .events-grid,
  .events-columns,
  .lower-grid,
  .summary-grid,
  .best-player,
  .footer-grid,
  .buttons{
    grid-template-columns:1fr;
  }

  .header{
    padding:14px;
  }

  .header-title h1{
    font-size:36px;
  }

  .header-title p{
    font-size:15px;
  }

  .header-brand-title{
    font-size:18px;
  }

  .header-brand-sub{
    font-size:13px;
  }

  .score-number{
    font-size:56px;
  }

  .team-score,
  .team-score.away{
    flex-direction:column;
  }

  .info-box,
  .match-box,
  .event-col,
  .summary-box{
    border-right:none;
  }

  .official-row{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div id="app">
  <div class="error">
    <i class="fa-solid fa-spinner fa-spin"></i><br>
    Carregando súmula oficial...
  </div>
</div>
<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = document.getElementById("app");
const id = new URLSearchParams(window.location.search).get("id");

/* ========= FUNÇÕES ========= */

function texto(v,f=""){return v===undefined||v===null||v===""?f:v}

function normalizar(v){
  return String(v||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function campo(obj,chs,f=""){
  for(const c of chs){
    if(obj && obj[c]!==undefined && obj[c]!==null && obj[c]!=="") return obj[c];
  }
  return f;
}

function nomeTime(v,f="TIME"){
  if(v && typeof v==="object") return campo(v,["nome","nomeTime","time","equipe"],f);
  return texto(v,f);
}

function escudoTime(v){
  if(v && typeof v==="object") return campo(v,["escudo","logo","imagem","foto"],"logo-liga.jfif");
  return "logo-liga.jfif";
}

function cidadeTime(v,f="-"){
  if(v && typeof v==="object") return campo(v,["cidade","municipio","local"],f);
  return f;
}

function dataBR(v){
  if(!v) return "-";
  if(typeof v.toDate==="function") v=v.toDate();
  const d=new Date(v);
  if(!isNaN(d.getTime())) return d.toLocaleDateString("pt-BR");
  return String(v);
}

function placarA(s){return Number(campo(s,["golsA","placarA"],0))}
function placarB(s){return Number(campo(s,["golsB","placarB"],0))}

function codigoSumula(s){
  return campo(s,["codigoVerificacao","numeroSumula","codigo"],String(id||"LG").slice(0,12).toUpperCase());
}

function qrUrl(){
  return `https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=${encodeURIComponent(window.location.href)}`;
}

function separar(lista){
  const a=[],b=[];
  lista.forEach(i=>{
    const t=normalizar(i.time||"");
    if(t==="b") b.push(i); else a.push(i);
  });
  return {a,b};
}

function renderJogadores(lista){
  if(!lista.length) return `<tr><td colspan="3" class="line-empty">Sem jogadores</td></tr>`;
  return lista.map(j=>`
    <tr>
      <td class="num">${campo(j,["numero"],"-")}</td>
      <td>${campo(j,["nome"],"-")}</td>
      <td class="posicao">${campo(j,["posicao"],"-")}</td>
    </tr>
  `).join("");
}

function renderGols(lista){
  if(!lista.length) return `<div class="line-empty">Nenhum gol</div>`;
  return lista.map(g=>`
    <div class="event-item">
      ⚽ ${campo(g,["minuto"],"-")}' - ${campo(g,["nome"],"-")}
    </div>
  `).join("");
}

function renderCartoes(lista){
  if(!lista.length) return `<div class="line-empty">Nenhum cartão</div>`;
  return lista.map(c=>{
    const verm=normalizar(c.tipo).includes("verm");
    return `
      <div class="event-item">
        <span class="${verm?"red-card":"yellow-card"}"></span>
        ${campo(c,["minuto"],"-")}' - ${campo(c,["nome"],"-")}
      </div>
    `;
  }).join("");
}

/* ========= AÇÕES ========= */

window.baixarPDF = ()=>window.print();
window.copiarLink = ()=>navigator.clipboard.writeText(window.location.href);

/* ========= CARREGAR ========= */

async function carregar(){
  if(!id){
    app.innerHTML=`<div class="error">ID não informado</div>`;
    return;
  }

  const snap = await getDoc(doc(db,"sumulas",id));
  if(!snap.exists()){
    app.innerHTML=`<div class="error">Súmula não encontrada</div>`;
    return;
  }

  const s={id:snap.id,...snap.data()};

  const nomeA=nomeTime(s.timeA);
  const nomeB=nomeTime(s.timeB);

  const logoA=escudoTime(s.timeA);
  const logoB=escudoTime(s.timeB);

  const gols=s.gols||[];
  const cartoes=s.cartoes||[];

  const g=separar(gols);
  const c=separar(cartoes);

  app.innerHTML=`
  <div class="sumula-page">

    <header class="header">
      <div class="header-logo">
        <img src="logo-liga.jfif">
      </div>

      <div class="header-title">
        <h1>SÚMULA OFICIAL</h1>
        <p>${campo(s,["campeonato"],"Liga Goiana")} ${campo(s,["categoria"],"")}</p>
      </div>

      <div class="header-right">
        <div class="header-brand-title">
          LIGA GOIANA<br>DE FUTEBOL DE BASE
        </div>
        <div class="header-brand-sub">
          Onde o talento encontra o futuro
        </div>
      </div>
    </header>

    <section class="score-card">
      <div class="team-score">
        <img src="${logoA}">
        <div class="team-name">
          <h2>${nomeA}</h2>
        </div>
      </div>

      <div class="score-center">
        <div class="score-number">${placarA(s)} x ${placarB(s)}</div>
        <span>Placar Final</span>
      </div>

      <div class="team-score away">
        <img src="${logoB}">
        <div class="team-name">
          <h2>${nomeB}</h2>
        </div>
      </div>
    </section>

    <section class="lineups">
      <div class="section-title">Escalações</div>

      <div class="lineups-grid">
        <div class="lineup-panel">
          <div class="lineup-head">${nomeA}</div>
          <table class="table">
            ${renderJogadores(s.jogadoresA||[])}
          </table>
        </div>

        <div class="lineup-panel away">
          <div class="lineup-head">${nomeB}</div>
          <table class="table">
            ${renderJogadores(s.jogadoresB||[])}
          </table>
        </div>
      </div>
    </section>

    <section class="events-grid">
      <div class="team-events">
        <h3>${nomeA}</h3>
        ${renderGols(g.a)}
        ${renderCartoes(c.a)}
      </div>

      <div class="team-events away">
        <h3>${nomeB}</h3>
        ${renderGols(g.b)}
        ${renderCartoes(c.b)}
      </div>
    </section>

    <section class="footer-grid">
      <div class="panel">
        <h3>Autenticação</h3>
        <div class="auth-box">
          <img src="${qrUrl()}">
          <div>
            Código: ${codigoSumula(s)}
          </div>
        </div>
      </div>

      <div class="panel share-panel">
        <button class="btn btn-pdf" onclick="baixarPDF()">Baixar PDF</button>
      </div>
    </section>

  </div>
  `;
}

carregar();
</script>

</body>
</html>
