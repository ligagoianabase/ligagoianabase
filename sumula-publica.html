<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula do Árbitro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#061427;
  --card:#0d2a52;
  --gold:#f7c600;
  --white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial;
  background:var(--bg);
  color:var(--white);
}

.container{
  max-width:1100px;
  margin:20px auto;
  padding:20px;
}

h1{
  color:var(--gold);
  margin-bottom:20px;
}

.box{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:6px;
}

button{
  background:var(--gold);
  border:none;
  padding:12px;
  width:100%;
  font-weight:bold;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

.erro{
  text-align:center;
  margin-top:80px;
  color:red;
  font-size:20px;
}
</style>
</head>

<body>

<div id="app" class="container"></div>

<script type="module">
import { db, auth } from "./firebase.js";
import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const app = document.getElementById("app");
const id = new URLSearchParams(location.search).get("id");

if(!id){
  app.innerHTML = "<div class='erro'>Jogo não informado</div>";
}

/* ================= VALIDAÇÃO ================= */

onAuthStateChanged(auth, async(user)=>{

  if(!user){
    app.innerHTML = "<div class='erro'>Faça login primeiro</div>";
    return;
  }

  const jogoSnap = await getDoc(doc(db,"jogos",id));

  if(!jogoSnap.exists()){
    app.innerHTML = "<div class='erro'>Jogo não encontrado</div>";
    return;
  }

  const jogo = jogoSnap.data();

  /* 🔒 BLOQUEIO DE ACESSO */
  if(user.uid !== jogo.arbitroId && jogo.tipoUsuario !== "admin"){
    app.innerHTML = `
      <div class='erro'>
        Acesso negado<br>
        Você não é o árbitro desta partida
      </div>
    `;
    return;
  }

  /* ================= SE PASSOU AQUI = PODE USAR ================= */

  renderTela(jogo);

});

/* ================= TELA ================= */

function renderTela(jogo){

  app.innerHTML = `
    <h1>Súmula da Partida</h1>

    <div class="box">
      <strong>${jogo.timeA?.nome || "Time A"} x ${jogo.timeB?.nome || "Time B"}</strong><br>
      ${jogo.categoria || "-"}<br>
      ${jogo.campeonato || "-"}
    </div>

    <div class="box">
      <label>Placar Time A</label>
      <input id="golsA" type="number">

      <label>Placar Time B</label>
      <input id="golsB" type="number">
    </div>

    <div class="box">
      <label>Melhor jogador</label>
      <input id="melhor">
    </div>

    <button onclick="proximaEtapa()">Continuar</button>
  `;
}

/* ================= CONTROLE ================= */

window.proximaEtapa = function(){
  alert("Próxima etapa chegando...");
};

</script>

</body>
</html>
