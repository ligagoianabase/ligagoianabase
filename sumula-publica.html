<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula Oficial - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --azul:#0A1F3D;
  --azul2:#102a52;
  --azul3:#0c3d86;
  --vermelho:#d90429;
  --verde:#069447;
  --dourado:#f7c600;
  --cinza:#f5f7fb;
  --linha:#d6dde8;
  --texto:#071833;
  --muted:#4b5563;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#dfe6ef;
  color:var(--texto);
  min-height:100vh;
}

#app{
  width:100%;
}

.sumula-page{
  width:min(100% - 20px, 1180px);
  margin:12px auto;
  background:#fff;
  border:1px solid #b9c4d4;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.16);
}

.header{
  display:grid;
  grid-template-columns:150px 1fr 150px;
  align-items:center;
  gap:10px;
  padding:16px 18px 8px;
}

.header-logo,
.header-right{
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-logo img,
.header-right img{
  width:94px;
  height:94px;
  object-fit:contain;
}

.header-title{
  text-align:center;
}

.header-title h1{
  color:var(--azul);
  font-size:56px;
  font-weight:900;
  letter-spacing:1px;
  line-height:.95;
}

.header-title p{
  margin-top:8px;
  color:var(--azul);
  font-size:21px;
  font-weight:900;
  text-transform:uppercase;
}

.info-strip{
  margin:8px 18px 14px;
  display:grid;
  grid-template-columns:1.1fr 1.35fr .85fr .85fr 1.05fr;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.info-box{
  min-height:70px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border-right:1px solid var(--linha);
  background:#fff;
}

.info-box:last-child{
  border-right:none;
}

.info-box i{
  width:36px;
  color:var(--azul);
  font-size:30px;
  text-align:center;
}

.info-box small{
  display:block;
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  color:#111;
  margin-bottom:4px;
}

.info-box strong{
  display:block;
  color:var(--azul);
  font-size:17px;
  font-weight:900;
}

.status-finalizado{
  display:inline-flex !important;
  align-items:center;
  justify-content:center;
  gap:7px;
  background:var(--verde);
  color:#fff !important;
  padding:8px 15px;
  border-radius:8px;
  font-size:16px !important;
}

.score-card{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:1fr 260px 1fr;
  min-height:140px;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.team-score{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  padding:14px;
  background:#fff;
}

.team-score.away{
  flex-direction:row-reverse;
}

.team-score img{
  width:108px;
  height:108px;
  object-fit:contain;
}

.team-name{
  text-align:center;
}

.team-name h2{
  color:var(--azul);
  font-size:34px;
  font-weight:900;
  text-transform:uppercase;
  line-height:1.05;
}

.team-name p{
  margin-top:8px;
  color:var(--azul);
  font-size:16px;
  font-weight:800;
}

.score-center{
  background:var(--azul);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-left:1px solid var(--linha);
  border-right:1px solid var(--linha);
  box-shadow:0 6px 16px rgba(0,0,0,.18);
}

.score-number{
  font-size:76px;
  font-weight:900;
  letter-spacing:5px;
  line-height:1;
}

.score-center span{
  margin-top:8px;
  text-transform:uppercase;
  font-size:14px;
  font-weight:900;
}

.match-strip{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:1fr 1fr 1.2fr 1.1fr;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.match-box{
  display:flex;
  align-items:center;
  gap:12px;
  min-height:64px;
  padding:10px 12px;
  border-right:1px solid var(--linha);
  background:#fff;
}

.match-box:last-child{
  border-right:none;
}

.match-box i{
  width:34px;
  color:var(--azul);
  font-size:30px;
  text-align:center;
}

.match-box small{
  display:block;
  color:var(--azul);
  text-transform:uppercase;
  font-weight:900;
  font-size:12px;
  margin-bottom:3px;
}

.match-box strong{
  display:block;
  color:#111;
  font-size:15px;
  font-weight:900;
}

.section-title{
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:8px 10px;
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.line-empty{
  color:#777;
  font-size:13px;
  text-align:center;
  padding:12px;
}

.lineups{
  margin:0 18px 12px;
  background:#fff;
}

.lineups-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}

.lineup-card{
  border:1px solid var(--linha);
  border-radius:8px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 5px 14px rgba(0,0,0,.08);
}

.lineup-head{
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:#fff;
  background:var(--azul);
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.lineup-card.away .lineup-head{
  background:var(--vermelho);
}

.lineup-head img{
  width:28px;
  height:28px;
  object-fit:contain;
  background:#fff;
  border-radius:50%;
  padding:2px;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th{
  background:#f5f7fb;
  color:var(--azul);
  font-size:12px;
  text-transform:uppercase;
  padding:7px 8px;
  border-bottom:1px solid var(--linha);
  text-align:left;
}

.table td{
  color:#111;
  font-size:13px;
  padding:5px 8px;
  border-bottom:1px solid #e5eaf1;
}

.table tr:last-child td{
  border-bottom:none;
}

.table .num{
  width:48px;
  text-align:center;
}

.table .posicao{
  width:170px;
}

.sub-row td{
  background:#f8fafc;
  color:var(--azul);
  text-align:center;
  font-weight:900;
  text-transform:uppercase;
  padding:7px;
}

.legend{
  margin-top:10px;
  padding:9px;
  text-align:center;
  color:#111;
  font-size:14px;
  border:1px solid var(--linha);
  border-radius:6px;
  background:#fff;
}

.events-grid{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}

.team-events{
  border:1px solid var(--linha);
  border-radius:8px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 5px 14px rgba(0,0,0,.08);
}

.team-events h3{
  color:#fff;
  background:var(--azul);
  text-align:center;
  padding:8px;
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.team-events.away h3{
  background:var(--vermelho);
}

.events-columns{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.event-col{
  min-height:130px;
  padding:12px;
  border-right:1px solid var(--linha);
}

.event-col:last-child{
  border-right:none;
}

.event-col h4{
  color:var(--azul);
  text-align:center;
  font-size:17px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:10px;
}

.event-item{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
  color:#111;
  font-size:14px;
  line-height:1.2;
}

.event-minute{
  color:var(--azul);
  font-weight:900;
  width:42px;
  flex:0 0 auto;
}

.event-name{
  flex:1;
}

.ball{
  font-size:18px;
  width:20px;
  text-align:center;
}

.yellow-card,
.red-card{
  width:14px;
  height:19px;
  border-radius:3px;
  display:inline-block;
  flex:0 0 auto;
}

.yellow-card{
  background:#f7c600;
}

.red-card{
  background:#e30613;
}

.lower-grid{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:24px;
}

.panel{
  border:1px solid var(--linha);
  border-radius:8px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 5px 14px rgba(0,0,0,.08);
}

.panel h3{
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:8px;
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
}

.official-row{
  display:grid;
  grid-template-columns:165px 1fr;
  min-height:44px;
  border-bottom:1px solid var(--linha);
  align-items:center;
}

.official-row:last-child{
  border-bottom:none;
}

.official-label{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--azul);
  font-size:13px;
  font-weight:900;
  text-transform:uppercase;
  padding:10px 12px;
}

.official-value{
  color:#111;
  font-size:14px;
  padding:10px 12px;
}

.summary-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  border-bottom:1px solid var(--linha);
}

.summary-box{
  text-align:center;
  padding:15px 10px;
  border-right:1px solid var(--linha);
}

.summary-box:last-child{
  border-right:none;
}

.summary-box i{
  color:var(--azul);
  font-size:28px;
  margin-bottom:6px;
}

.summary-box span{
  display:block;
  color:var(--azul);
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
}

.summary-box strong{
  display:block;
  color:var(--azul);
  font-size:31px;
  font-weight:900;
  margin-top:4px;
}

.summary-detail{
  color:#111;
  font-size:12px;
  margin-top:2px;
}

.summary-card-icon{
  margin:0 auto 7px;
  width:18px;
  height:24px;
  border-radius:3px;
}

.best-player{
  display:grid;
  grid-template-columns:110px 1fr 90px;
  align-items:center;
  gap:12px;
  padding:12px;
}

.best-photo{
  width:86px;
  height:86px;
  border-radius:50%;
  object-fit:cover;
  background:#eef2f7;
  border:3px solid var(--dourado);
  margin:auto;
}

.best-player h4{
  color:var(--azul);
  font-size:14px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:8px;
}

.best-player strong{
  display:block;
  color:#111;
  font-size:18px;
  font-weight:900;
}

.best-player span{
  display:block;
  color:var(--azul);
  font-size:13px;
  margin-top:4px;
}

.trophy{
  text-align:center;
  font-size:58px;
}

.footer-grid{
  margin:0 18px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:24px;
}

.auth-box{
  display:grid;
  grid-template-columns:110px 1fr;
  gap:12px;
  align-items:center;
  padding:12px;
}

.auth-box img{
  width:98px;
  height:98px;
}

.auth-text strong{
  display:block;
  color:var(--azul);
  font-size:14px;
  font-weight:900;
  text-transform:uppercase;
}

.auth-text p{
  color:#111;
  font-size:12px;
  line-height:1.35;
}

.auth-code{
  color:var(--azul);
  font-size:17px;
  font-weight:900;
  margin:4px 0;
}

.share-panel{
  padding:18px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.btn{
  min-height:58px;
  border-radius:8px;
  color:#fff;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  text-align:center;
  font-size:13px;
  padding:10px;
  cursor:pointer;
  border:none;
}

.btn i{
  font-size:24px;
}

.btn-whats{background:#0ca84a}
.btn-email{background:#2563eb}
.btn-link{background:#4b5563}
.btn-pdf{background:#dc2626}

.final-footer{
  margin-top:12px;
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:9px;
  font-size:13px;
  line-height:1.35;
}

.error{
  max-width:760px;
  margin:80px auto;
  background:#fff;
  border:1px solid #cfd7e3;
  color:#b42323;
  padding:24px;
  border-radius:10px;
  text-align:center;
  font-size:18px;
  font-weight:900;
}

@media print{
  @page{
    size:A4 portrait;
    margin:7mm;
  }

  body{
    background:#fff;
  }

  .sumula-page{
    width:100%;
    margin:0;
    border:none;
    border-radius:0;
    box-shadow:none;
  }

  .buttons{
    display:none;
  }

  .lineup-card,
  .team-events,
  .panel,
  .score-card,
  .match-strip,
  .info-strip{
    break-inside:avoid;
    page-break-inside:avoid;
  }

  .final-footer{
    margin-top:8px;
  }
}

@media(max-width:900px){
  .header,
  .info-strip,
  .score-card,
  .match-strip,
  .lineups-grid,
  .events-grid,
  .events-columns,
  .lower-grid,
  .summary-grid,
  .best-player,
  .footer-grid,
  .buttons{
    grid-template-columns:1fr;
  }

  .header-title h1{
    font-size:36px;
  }

  .header-title p{
    font-size:15px;
  }

  .score-number{
    font-size:56px;
  }

  .team-score,
  .team-score.away{
    flex-direction:column;
  }

  .info-box,
  .match-box,
  .event-col,
  .summary-box{
    border-right:none;
  }

  .official-row{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div id="app">
  <div class="error">
    <i class="fa-solid fa-spinner fa-spin"></i><br>
    Carregando súmula oficial...
  </div>
</div>
<script type="module">
import { db } from "./firebase.js";
import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = document.getElementById("app");
const id = new URLSearchParams(window.location.search).get("id");

function texto(v,f=""){return v===undefined||v===null||v===""?f:v}
function normalizar(v){
  return String(v||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
function campo(obj,chs,f=""){
  for(const c of chs){
    if(obj && obj[c]!==undefined && obj[c]!==null && obj[c]!=="") return obj[c];
  }
  return f;
}
function nomeTime(v,f="TIME"){
  if(v && typeof v==="object") return campo(v,["nome","nomeTime","time","equipe"],f);
  return texto(v,f);
}
function escudoTime(v){
  if(v && typeof v==="object") return campo(v,["escudo","logo","imagem","foto"],"logo-liga.jfif");
  return "logo-liga.jfif";
}
function cidadeTime(v,f="-"){
  if(v && typeof v==="object") return campo(v,["cidade","municipio","local"],f);
  return f;
}
function dataBR(v){
  if(!v) return "-";
  if(typeof v.toDate==="function") v=v.toDate();
  const d=new Date(v);
  if(!isNaN(d.getTime())) return d.toLocaleDateString("pt-BR");
  return String(v);
}
function placarA(s){return Number(campo(s,["golsA","placarA","golsMandante"],0))}
function placarB(s){return Number(campo(s,["golsB","placarB","golsVisitante"],0))}
function codigoSumula(s){
  return campo(s,["codigoVerificacao","hash","numeroSumula","codigoPartida","codigo"], String(id||"LG").slice(0,12).toUpperCase());
}
function qrUrl(){
  return `https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=${encodeURIComponent(window.location.href)}`;
}
function separarEventosPorTime(lista){
  const a=[], b=[];
  lista.forEach(it=>{
    const t=normalizar(it.time||it.lado||"");
    if(t==="b"||t==="visitante") b.push(it); else a.push(it);
  });
  return {a,b};
}
function renderJogadores(lista){
  if(!Array.isArray(lista)||!lista.length){
    return `<tr><td colspan="3" class="line-empty">Nenhum jogador informado.</td></tr>`;
  }
  const titulares=lista.filter(j=>normalizar(j.tipo||"")!=="suplente");
  const suplentes=lista.filter(j=>normalizar(j.tipo||"")==="suplente");

  const t1=`
    <tr class="sub-row"><td colspan="3">Titulares</td></tr>
    ${titulares.map(j=>`
      <tr>
        <td class="num">${campo(j,["numero","camisa","n"],"-")}</td>
        <td>${campo(j,["nome","jogador","jogadorNome","atleta"],"-")}</td>
        <td class="posicao">${campo(j,["posicao","posição","funcao"],"-")}</td>
      </tr>
    `).join("")}
  `;
  const t2=suplentes.length?`
    <tr class="sub-row"><td colspan="3">Suplentes</td></tr>
    ${suplentes.map(j=>`
      <tr>
        <td class="num">${campo(j,["numero","camisa","n"],"-")}</td>
        <td>${campo(j,["nome","jogador","jogadorNome","atleta"],"-")}</td>
        <td class="posicao">${campo(j,["posicao","posição","funcao"],"-")}</td>
      </tr>
    `).join("")}
  `:"";
  return t1+t2;
}
function renderGols(lista){
  if(!lista.length) return `<div class="line-empty">Nenhum gol.</div>`;
  return lista.map(g=>`
    <div class="event-item">
      <span class="ball">⚽</span>
      <span class="event-minute">${campo(g,["minuto","tempo"],"-")}'</span>
      <span class="event-name">
        ${campo(g,["nome","jogador","jogadorNome","atleta"],"-")}
        ${campo(g,["numero"],"")?`Nº ${campo(g,["numero"],"")}`:""}
      </span>
    </div>
  `).join("");
}
function renderCartoes(lista){
  if(!lista.length) return `<div class="line-empty">Nenhum cartão.</div>`;
  return lista.map(c=>{
    const verm=normalizar(campo(c,["tipo","cartao","cor"],"amarelo")).includes("verm");
    const vt=campo(c,["vermelhoTipo"],"");
    const extra=verm?` <small>${vt==="segundo_amarelo"?"2º amarelo":"vermelho direto"}</small>`:"";
    return `
      <div class="event-item">
        <span class="${verm?"red-card":"yellow-card"}"></span>
        <span class="event-minute">${campo(c,["minuto","tempo"],"-")}'</span>
        <span class="event-name">
          ${campo(c,["nome","jogador","jogadorNome","atleta"],"-")}
          ${campo(c,["numero"],"")?`Nº ${campo(c,["numero"],"")}`:""}
          ${extra}
        </span>
      </div>
    `;
  }).join("");
}
function contarCartoes(lista){
  let amarelos=0, vermelhos=0;
  lista.forEach(c=>{
    if(normalizar(campo(c,["tipo","cartao","cor"],"amarelo")).includes("verm")) vermelhos++;
    else amarelos++;
  });
  return {amarelos,vermelhos};
}

window.copiarLink=()=>{navigator.clipboard.writeText(window.location.href); alert("Link copiado.");}
window.compartilharWhatsApp=()=>{window.open(`https://wa.me/?text=${encodeURIComponent("Súmula oficial: "+window.location.href)}`,"_blank");}
window.enviarEmail=()=>{window.location.href=`mailto:?subject=Súmula Oficial&body=${encodeURIComponent(window.location.href)}`;}
window.baixarPDF=()=>{window.print();}

async function carregar(){
  if(!id){
    app.innerHTML=`<div class="error">Súmula não informada.</div>`;
    return;
  }
  try{
    const snap=await getDoc(doc(db,"sumulas",id));
    if(!snap.exists()){
      app.innerHTML=`<div class="error">Súmula não encontrada.</div>`;
      return;
    }
    const s={id:snap.id,...snap.data()};
    if(!s.sumulaFinalizada && s.status!=="finalizado"){
      app.innerHTML=`<div class="error">Esta súmula ainda não foi finalizada.</div>`;
      return;
    }

    const A=s.timeA||{}, B=s.timeB||{};
    const nomeA=nomeTime(A, campo(s,["timeANome","mandante"],"MANDANTE"));
    const nomeB=nomeTime(B, campo(s,["timeBNome","visitante"],"VISITANTE"));
    const logoA=campo(s,["logoA","escudoTimeA"], escudoTime(A));
    const logoB=campo(s,["logoB","escudoTimeB"], escudoTime(B));
    const cidadeA=campo(s,["cidadeA"], cidadeTime(A,"Goiânia - GO"));
    const cidadeB=campo(s,["cidadeB"], cidadeTime(B,"Goiânia - GO"));

    const gols=Array.isArray(s.gols)?s.gols:[];
    const cartoes=Array.isArray(s.cartoes)?s.cartoes:[];
    const gpt=separarEventosPorTime(gols);
    const cpt=separarEventosPorTime(cartoes);
    const totC=contarCartoes(cartoes);

    const jogadoresA=campo(s,["jogadoresA","escalacaoA","elencoA"],[]);
    const jogadoresB=campo(s,["jogadoresB","escalacaoB","elencoB"],[]);

    const codigo=codigoSumula(s);
    const data=dataBR(campo(s,["data","dataJogo","dataHora","criadoEm"],""));
    const hora=campo(s,["hora","horario"],"-");
    const campoJ=campo(s,["local","campo","estadio"],"-");
    const arbitro=campo(s,["arbitro","arbitroNome"],"-");

    const melhor=campo(s,["melhorJogador"],"-");
    const melhorTime=campo(s,["melhorJogadorTime"], nomeA);
    const fotoMelhor=campo(s,["fotoMelhorJogador","fotoMelhor"],"logo-liga.jfif");

    app.innerHTML=`
      <div class="sumula-page">

        <header class="header">
          <div class="header-logo">
            <img src="logo-liga.jfif" alt="Liga Goiana">
          </div>

          <div class="header-title">
            <h1>SÚMULA OFICIAL</h1>
            <p>${campo(s,["campeonato","campeonatoNome"],"CAMPEONATO LIGA GOIANA")} ${campo(s,["categoria"],"")}</p>
          </div>

          <!-- ALTERADO: logo no lugar de "Futebol é paixão" -->
          <div class="header-right">
            <img src="logo-liga.jfif" alt="Liga Goiana">
          </div>
        </header>

        <section class="info-strip">
          <div class="info-box">
            <i class="fa-regular fa-file-lines"></i>
            <div>
              <small>Súmula Nº</small>
              <strong>${campo(s,["numeroSumula"],codigo)}</strong>
            </div>
          </div>

          <div class="info-box">
            <i class="fa-solid fa-barcode"></i>
            <div>
              <small>Código da partida</small>
              <strong>${campo(s,["codigoPartida","codigo"],id)}</strong>
            </div>
          </div>

          <div class="info-box">
            <i class="fa-solid fa-trophy"></i>
            <div>
              <small>Fase</small>
              <strong>${campo(s,["fase"],"1ª Fase")}</strong>
            </div>
          </div>

          <div class="info-box">
            <i class="fa-solid fa-list-ol"></i>
            <div>
              <small>Rodada</small>
              <strong>${campo(s,["rodada"],"-")}</strong>
            </div>
          </div>

          <div class="info-box">
            <div>
              <small>Status</small>
              <strong class="status-finalizado"><i class="fa-solid fa-check"></i> FINALIZADO</strong>
            </div>
          </div>
        </section>

        <section class="score-card">
          <div class="team-score">
            <img src="${logoA}" onerror="this.src='logo-liga.jfif'">
            <div class="team-name">
              <h2>${nomeA}</h2>
              <p>${cidadeA}</p>
            </div>
          </div>

          <div class="score-center">
            <div class="score-number">${placarA(s)} x ${placarB(s)}</div>
            <span>Placar Final</span>
          </div>

          <div class="team-score away">
            <img src="${logoB}" onerror="this.src='logo-liga.jfif'">
            <div class="team-name">
              <h2>${nomeB}</h2>
              <p>${cidadeB}</p>
            </div>
          </div>
        </section>

        <section class="match-strip">
          <div class="match-box">
            <i class="fa-regular fa-calendar-days"></i>
            <div><small>Data</small><strong>${data}</strong></div>
          </div>
          <div class="match-box">
            <i class="fa-regular fa-clock"></i>
            <div><small>Horário</small><strong>${hora}</strong></div>
          </div>
          <div class="match-box">
            <i class="fa-solid fa-diamond"></i>
            <div><small>Campo</small><strong>${campoJ}</strong></div>
          </div>
          <div class="match-box">
            <i class="fa-solid fa-whistle"></i>
            <div><small>Árbitro</small><strong>${arbitro}</strong></div>
          </div>
        </section>

        <!-- ESCALAÇÕES EM CARDS (cada time no seu quadrado) -->
        <section class="lineups">
          <div class="section-title">Escalações</div>

          <div class="lineups-grid">
            <div class="lineup-card">
              <div class="lineup-head">
                ${nomeA}
                <img src="${logoA}" onerror="this.src='logo-liga.jfif'">
              </div>

              <table class="table">
                <thead>
                  <tr>
                    <th class="num">Nº</th>
                    <th>Jogador</th>
                    <th class="posicao">Posição</th>
                  </tr>
                </thead>
                <tbody>${renderJogadores(jogadoresA)}</tbody>
              </table>
            </div>

            <div class="lineup-card away">
              <div class="lineup-head">
                ${nomeB}
                <img src="${logoB}" onerror="this.src='logo-liga.jfif'">
              </div>

              <table class="table">
                <thead>
                  <tr>
                    <th class="num">Nº</th>
                    <th>Jogador</th>
                    <th class="posicao">Posição</th>
                  </tr>
                </thead>
                <tbody>${renderJogadores(jogadoresB)}</tbody>
              </table>
            </div>
          </div>

          <div class="legend">Dados públicos da súmula. CPF e nascimento não são exibidos.</div>
        </section>

        <section class="events-grid">
          <div class="team-events">
            <h3>${nomeA}</h3>
            <div class="events-columns">
              <div class="event-col">
                <h4>Gols</h4>
                ${renderGols(gpt.a)}
              </div>
              <div class="event-col">
                <h4>Cartões</h4>
                ${renderCartoes(cpt.a)}
              </div>
            </div>
          </div>

          <div class="team-events away">
            <h3>${nomeB}</h3>
            <div class="events-columns">
              <div class="event-col">
                <h4>Gols</h4>
                ${renderGols(gpt.b)}
              </div>
              <div class="event-col">
                <h4>Cartões</h4>
                ${renderCartoes(cpt.b)}
              </div>
            </div>
          </div>
        </section>

        <section class="lower-grid">
          <div class="panel">
            <h3>Arbitragem</h3>
            <div class="official-row">
              <div class="official-label"><i class="fa-solid fa-user-tie"></i> Árbitro</div>
              <div class="official-value">${arbitro}</div>

            <div class="official-row">
              <div class="official-label"><i class="fa-solid fa-flag"></i> Assistente 1</div>

            <div class="official-row">
              <div class="official-label"><i class="fa-solid fa-flag"></i> Assistente 2</div>
              <div class="official-value">${campo(s,["assistente2"],"-")}</div>
            </div>
            <div class="official-row">
              <div class="official-label"><i class="fa-solid fa-location-dot"></i> Observador</div>
              <div class="official-value">${campo(s,["observador"],"-")}</div>
            </div>
          </div>

          <div class="panel">
            <h3>Resumo da Partida</h3>

            <div class="summary-grid">
              <div class="summary-box">
                <i class="fa-solid fa-futbol"></i>
                <span>Gols</span>
                <strong>${gols.length || (placarA(s)+placarB(s))}</strong>
                <div class="summary-detail">(${placarA(s)} x ${placarB(s)})</div>
              </div>

              <div class="summary-box">
                <div class="summary-card-icon yellow-card"></div>
                <span>Cartões Amarelos</span>
                <strong>${totC.amarelos}</strong>
              </div>

              <div class="summary-box">
                <div class="summary-card-icon red-card"></div>
                <span>Cartões Vermelhos</span>
                <strong>${totC.vermelhos}</strong>
              </div>
            </div>

            <div class="best-player">
              <img class="best-photo" src="${fotoMelhor}" onerror="this.src='logo-liga.jfif'">
              <div>
                <h4>Melhor jogador da partida</h4>
                <strong>${melhor}</strong>
                <span>${melhorTime}</span>
              </div>
              <div class="trophy">🏆</div>
            </div>
          </div>
        </section>

        <section class="footer-grid">
          <div class="panel">
            <h3>Autenticação</h3>
            <div class="auth-box">
              <img src="${qrUrl()}" alt="QR Code">
              <div class="auth-text">
                <strong>Súmula publicada em</strong>
                <p>${campo(s,["publicadaEmTexto"],data)}</p>
                <p>Código de verificação</p>
                <div class="auth-code">${codigo}</div>
                <p>Escaneie o QR Code para verificar a autenticidade desta súmula.</p>
              </div>
            </div>
          </div>

          <div class="panel share-panel">
            <h3>Compartilhar</h3>
            <div class="buttons">
              <button class="btn btn-whats" onclick="compartilharWhatsApp()"><i class="fa-brands fa-whatsapp"></i> Compartilhar WhatsApp</button>
              <button class="btn btn-email" onclick="enviarEmail()"><i class="fa-solid fa-envelope"></i> Enviar por E-mail</button>
              <button class="btn btn-link" onclick="copiarLink()"><i class="fa-solid fa-link"></i> Copiar Link</button>
              <button class="btn btn-pdf" onclick="baixarPDF()"><i class="fa-solid fa-file-pdf"></i> Baixar PDF</button>
            </div>
          </div>
        </section>

        <footer class="final-footer">
          <div>Documento oficial gerado pelo sistema Liga Goiana</div>
          <div>Todos os direitos reservados © 2026</div>
        </footer>

      </div>
    `;
  }catch(e){
    console.error(e);
    app.innerHTML=`<div class="error">Erro ao carregar súmula oficial.</div>`;
  }
}

carregar();
</script>
</body>
</html>
