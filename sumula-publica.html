<style>
:root{

  --green:#1b5e20;

}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(3,12,29,.88), rgba(3,12,29,.96)),

  overflow-x:hidden;
}

a{
  text-decoration:none;

}

button{
  font-family:inherit;
  cursor:pointer;
  transition:var(--transition);
  border:none;
  background:none;
}

input,
select{

}

.wrap{

}

/* HEADER PADRÃO */
header{

}

.header-top{
  min-height:84px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px 0;
}

.header-title{
  text-align:center;

  font-weight:900;
  color:var(--white);
  text-transform:uppercase;

}

/* MENU PADRÃO COMPATÍVEL PC / TABLET / CELULAR */
.nav-bar{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.98));

}

.menu{
  display:flex;
  justify-content:center;

  padding:14px 6px;

}

.menu a{
  color:#fff;
  font-weight:900;
  font-size:clamp(11px, .92vw, 15px);
  background:linear-gradient(180deg, rgba(16,42,82,.98), rgba(12,33,64,.98));
  padding:clamp(8px, .75vw, 12px) clamp(9px, 1vw, 18px);
  border-radius:clamp(10px, .9vw, 15px);
  border:1px solid rgba(255,255,255,.07);
  white-space:nowrap;
  flex:0 1 auto;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
}

.menu a:hover{
  color:var(--gold);
  border-color:var(--gold-line);
}

.menu a.ativo{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  border-color:var(--gold);
}

/* PÁGINA */
.container{
  padding:26px 0 36px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:26px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:30px;
  font-weight:900;
  margin-bottom:8px;
}

.hero p{
  color:var(--muted);

  font-size:15px;

}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  margin-bottom:20px;

  border-radius:20px;

}

input,
select{

}

input:focus,
select:focus{

}

.titulo{
  font-size:24px;
  font-weight:900;
  color:var(--gold);
  margin-bottom:16px;
}

.lista-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
  gap:14px;
}
.card{
  position:relative;
  background:
    radial-gradient(circle at top right, rgba(0,140,255,.18), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));

  border:1px solid rgba(247,198,0,.18);
  box-shadow:var(--shadow);

}

.card:hover{
  transform:translateY(-2px);

}

.card-top{
  display:flex;
  justify-content:space-between;

  gap:10px;

}

.icon-box{
  width:42px;

}

.status{
  display:inline-flex;

}

.times{
  display:grid;

}

.time{

}

.time.visitante{

}

.time span{
  overflow:hidden;

}

.escudo{
  width:32px;

}

.placar{
  min-width:72px;

.tag{

  border:1px solid rgba(255,255,255,.08);
  color:#dbeafe;
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
  font-weight:900;
}

.actions{
  display:flex;
  flex-direction:column;
  gap:9px;
}

.btn-acao{
  width:100%;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:11px 14px;
  border-radius:13px;
  font-weight:900;
  font-size:13px;
  cursor:pointer;
  text-align:center;
}

.btn-ver{
  background:linear-gradient(135deg,var(--gold),var(--gold2));

}

.btn-ver:hover{

  transform:translateY(-1px);
}

.btn-secundario{

}

.btn-danger{
  background:linear-gradient(180deg, #ef4444, #b91c1c);
  color:#fff;
}

.vazio{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  padding:30px;
  border-radius:18px;
  text-align:center;
  color:var(--muted);
  box-shadow:var(--shadow);
  border:1px solid rgba(255,255,255,.06);
  font-weight:700;

}

@media(max-width:900px){
  .header-title{

  .filtros{

  .menu{

    overflow-x:auto;
    scrollbar-width:none;
    -ms-overflow-style:none;

  }

  .menu::-webkit-scrollbar{

}

@media(max-width:600px){

  .header-top{

  }

  .time{

  }

  .escudo{
    width:30px;
    height:30px;
  }
}

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let jogosCache = [];
let sumulasCache = [];
let campeonatosCache = [];
let timesCache = [];
let ocultarExemplos = localStorage.getItem("ocultarExemplosSumula") === "sim";

const jogosExemplo = [
  {
    id:"final-copa-2002",
    campeonatoId:"copa-mundo-2002",
    campeonato:"Copa do Mundo FIFA 2002",
    categoria:"Seleção Principal",
    data:"2002-06-30T08:00:00",
    local:"International Stadium Yokohama",
    timeA:"Brasil",
    timeB:"Alemanha",
    golsA:2,
    golsB:0,
    status:"finalizado",
    exemplo:true
  },
  {
    id:"jogo-exemplo-2",
    campeonatoId:"liga-goiana-elite",
    campeonato:"Liga Goiana Elite",
    categoria:"Sub-13",
    data:"2025-05-17T15:30:00",
    local:"Campo 1",
    timeA:"Goiás",
    timeB:"Anápolis",
    golsA:1,
    golsB:1,
    status:"finalizado",
    exemplo:true
  },
  {
    id:"jogo-exemplo-3",
    campeonatoId:"copa-uniao-base",
    campeonato:"Copa União de Base",
    categoria:"Sub-15",
    data:"2025-05-18T16:00:00",
    local:"Serra Dourada",
    timeA:"Atlético GO",
    timeB:"Vila Nova",
    golsA:2,
    golsB:1,
    status:"finalizado",
    exemplo:true
  },
  {
    id:"jogo-exemplo-4",
    campeonatoId:"copa-uniao-base",
    campeonato:"Copa União de Base",
    categoria:"Sub-17",
    data:"2025-05-16T19:00:00",
    local:"Estádio Olímpico",
    timeA:"Cruzeiro",
    timeB:"Goianésia",
    golsA:3,
    golsB:0,
    status:"finalizado",
    exemplo:true
  }
];

const sumulasExemplo = jogosExemplo.map(j => ({
  id:j.id,
  jogoId:j.id,
  campeonatoId:j.campeonatoId,
  campeonato:j.campeonato,
  categoria:j.categoria,
  timeA:j.timeA,
  timeB:j.timeB,
  golsA:j.golsA,
  golsB:j.golsB,
  dataJogo:j.data,
  local:j.local,
  status:"Finalizada",
  exemplo:true
}));

const campeonatosExemplo = [
  {id:"copa-mundo-2002", nome:"Copa do Mundo FIFA 2002", categorias:["Seleção Principal"], exemplo:true},
  {id:"liga-goiana-elite", nome:"Liga Goiana Elite", categorias:["Sub-13"], exemplo:true},
  {id:"copa-uniao-base", nome:"Copa União de Base", categorias:["Sub-15","Sub-17"], exemplo:true}
];

function normalizarTexto(texto){
  return String(texto || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function valorCampo(obj, chaves, fallback=""){
  for(const chave of chaves){
    if(obj && obj[chave] !== undefined && obj[chave] !== null && obj[chave] !== ""){
      return obj[chave];
    }
  }
  return fallback;
}

function obterIdCampeonato(c){
  return valorCampo(c, ["id", "campeonatoId"], "");
}

function obterNomeCampeonato(c){
  return valorCampo(c, ["nome", "campeonato", "titulo"], "");
}

function getParametro(nome){
  return new URLSearchParams(window.location.search).get(nome);
}

function formatarDataHora(valor){
  if(!valor) return "-";

  const d = new Date(valor);

  if(isNaN(d.getTime())){
    return String(valor);
  }

  const data = d.toLocaleDateString("pt-BR");
  const hora = d.toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"});

  return `${data}, ${hora}`;
}

function buscarSumulaDoJogo(jogo){
  return sumulasCache.find(s =>
    s.id === jogo.id ||
    valorCampo(s, ["jogoId", "idJogo", "partidaId"], "") === jogo.id
  ) || null;
}

function jogoFinalizado(jogo){
  const status = normalizarTexto(valorCampo(jogo, ["status"], ""));
  const existeSumula = buscarSumulaDoJogo(jogo);

  return status === "finalizado" ||
    status === "sumula_enviada" ||
    status === "súmula enviada" ||
    jogo.sumulaFinalizada === true ||
    !!existeSumula;
}

function pegarEscudo(nomeTime, jogo, lado){
  const direto = lado === "A"
    ? valorCampo(jogo, ["logoTimeA", "escudoA", "logoA"], "")
    : valorCampo(jogo, ["logoTimeB", "escudoB", "logoB"], "");

  if(direto) return direto;

  const time = timesCache.find(t =>
    normalizarTexto(valorCampo(t, ["nome", "time"], "")) === normalizarTexto(nomeTime)
  );

  return valorCampo(time, ["escudo", "logo", "logoUrl", "urlLogo", "imagem"], "logo-liga.jfif");
}

function preencherCampeonatos(){
  const select = document.getElementById("filtroCampeonato");
  select.innerHTML = `<option value="">Todos os campeonatos</option>`;

  campeonatosCache
    .sort((a,b)=>obterNomeCampeonato(a).localeCompare(obterNomeCampeonato(b), "pt-BR"))
    .forEach(c => {
      const id = obterIdCampeonato(c);
      const nome = obterNomeCampeonato(c);

      if(!id || !nome) return;

      const option = document.createElement("option");
      option.value = id;
      option.textContent = nome;
      select.appendChild(option);
    });
}

function preencherCategorias(){
  const select = document.getElementById("filtroCategoria");
  const campId = document.getElementById("filtroCampeonato").value;
  const categorias = new Set();

  select.innerHTML = `<option value="">Todas categorias</option>`;

  if(campId){
    const camp = campeonatosCache.find(c => obterIdCampeonato(c) === campId);
    const cats = valorCampo(camp, ["categorias"], []);

    if(Array.isArray(cats)){
      cats.forEach(cat => {
        if(typeof cat === "string" && cat) categorias.add(cat);
        if(typeof cat === "object" && (cat.nome || cat.categoria)) categorias.add(cat.nome || cat.categoria);
      });
    }

    jogosCache.forEach(j => {
      const mesmoCamp = valorCampo(j, ["campeonatoId"], "") === campId;
      if(mesmoCamp && j.categoria) categorias.add(j.categoria);
    });
  }else{
    jogosCache.forEach(j => {
      if(j.categoria) categorias.add(j.categoria);
    });
  }

  Array.from(categorias)
    .sort((a,b)=>String(a).localeCompare(String(b), "pt-BR"))
    .forEach(cat => {
      const option = document.createElement("option");
      option.value = cat;
      option.textContent = cat;
      select.appendChild(option);
    });
}

function aplicarFiltrosURL(){
  const campeonatoURL = getParametro("campeonato");
  const categoriaURL = getParametro("categoria");

  if(campeonatoURL){
    const camp = campeonatosCache.find(c =>
      normalizarTexto(obterNomeCampeonato(c)) === normalizarTexto(campeonatoURL) ||
      obterIdCampeonato(c) === campeonatoURL
    );

    if(camp){
      document.getElementById("filtroCampeonato").value = obterIdCampeonato(camp);
      preencherCategorias();
    }
  }

  if(categoriaURL){
    const select = document.getElementById("filtroCategoria");
    const opcao = Array.from(select.options).find(o =>
      normalizarTexto(o.value) === normalizarTexto(categoriaURL)
    );

    if(opcao) select.value = opcao.value;
  }
}

function jogosComSumula(){
  const busca = normalizarTexto(document.getElementById("busca").value || "");
  const campId = document.getElementById("filtroCampeonato").value;
  const categoria = document.getElementById("filtroCategoria").value;

  return jogosCache.filter(j => {
    if(!jogoFinalizado(j)) return false;

    const sumula = buscarSumulaDoJogo(j);

    const jogoCampId =
      valorCampo(j, ["campeonatoId"], "") ||
      valorCampo(sumula, ["campeonatoId"], "");

    const jogoCategoria =
      valorCampo(j, ["categoria"], "") ||
      valorCampo(sumula, ["categoria"], "");

    if(campId && jogoCampId !== campId) return false;
    if(categoria && jogoCategoria !== categoria) return false;

    if(busca){
      const texto = normalizarTexto([
        valorCampo(j, ["timeA"], ""),
        valorCampo(j, ["timeB"], ""),
        valorCampo(j, ["local"], ""),
        valorCampo(j, ["campeonato", "nomeCampeonato"], ""),
        valorCampo(j, ["categoria"], "")
      ].join(" "));

      if(!texto.includes(busca)) return false;
    }

    return true;
  }).sort((a,b) => String(valorCampo(b, ["data"], "")).localeCompare(String(valorCampo(a, ["data"], ""))));
}

function carregarSumulas(){
  const lista = document.getElementById("listaSumulas");
  const jogos = jogosComSumula();

  if(!jogos.length){
    lista.innerHTML = `<div class="vazio">Nenhuma súmula finalizada encontrada.</div>`;
    return;
  }

  lista.innerHTML = jogos.map(j => {
    const sumula = buscarSumulaDoJogo(j) || {};
    const timeA = valorCampo(j, ["timeA"], valorCampo(sumula, ["timeA"], "-"));
    const timeB = valorCampo(j, ["timeB"], valorCampo(sumula, ["timeB"], "-"));
    const golsA = Number(valorCampo(sumula, ["golsA"], valorCampo(j, ["golsA"], 0)) || 0);
    const golsB = Number(valorCampo(sumula, ["golsB"], valorCampo(j, ["golsB"], 0)) || 0);
    const campeonato = valorCampo(j, ["campeonato", "nomeCampeonato"], valorCampo(sumula, ["campeonato"], "-"));
    const categoria = valorCampo(j, ["categoria"], valorCampo(sumula, ["categoria"], "-"));
    const data = valorCampo(j, ["data"], valorCampo(sumula, ["dataJogo", "data"], ""));
    const local = valorCampo(j, ["local"], valorCampo(sumula, ["local"], "-"));
    const linkId = valorCampo(sumula, ["id"], j.id);

    return `
      <article class="card">
        <div class="card-top">
          <div class="icon-box">
            <i class="fa-solid fa-file-signature"></i>
          </div>

          <div class="status">
            <i class="fa-solid fa-check"></i> Finalizada
          </div>
        </div>

        <div class="times">
          <div class="time">
            <img src="${pegarEscudo(timeA, j, "A")}" class="escudo" onerror="this.src='logo-liga.jfif'">
            <span>${timeA}</span>
          </div>

          <div class="placar">${golsA} x ${golsB}</div>

          <div class="time visitante">
            <span>${timeB}</span>
            <img src="${pegarEscudo(timeB, j, "B")}" class="escudo" onerror="this.src='logo-liga.jfif'">
          </div>
        </div>

        <div class="info">
          <strong>${campeonato}</strong>
          <span>${categoria}</span>
          <span>${formatarDataHora(data)}</span>
          <span>${local}</span>
        </div>

        <div class="tags">
          ${j.exemplo ? `<span class="tag">Exemplo</span>` : `<span class="tag">Firebase</span>`}
          <span class="tag">Súmula</span>
        </div>

        <div class="actions">
          <a class="btn-acao btn-ver" href="sumula-publica.html?id=${encodeURIComponent(linkId)}">
            <i class="fa-solid fa-eye"></i> Ver Súmula
          </a>

          <a class="btn-acao btn-secundario" href="jogos.html">
            <i class="fa-solid fa-calendar-days"></i> Ver Jogos
          </a>

          ${
            j.exemplo
            ? `
              <button class="btn-acao btn-danger" onclick="excluirExemplos()">
                <i class="fa-solid fa-trash"></i> Excluir Exemplos
              </button>
            `
            : ""
          }
        </div>
      </article>
    `;
  }).join("");
}

window.excluirExemplos = function(){
  localStorage.setItem("ocultarExemplosSumula", "sim");
  ocultarExemplos = true;

  jogosCache = jogosCache.filter(j => !j.exemplo);
  sumulasCache = sumulasCache.filter(s => !s.exemplo);
  campeonatosCache = campeonatosCache.filter(c => !c.exemplo);

  preencherCampeonatos();
  preencherCategorias();
  carregarSumulas();
};

async function carregarDados(){
  const lista = document.getElementById("listaSumulas");
  lista.innerHTML = `<div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando súmulas...</div>`;

  try{
    const [snapJogos, snapSumulas, snapCampeonatos, snapTimes] = await Promise.all([
      getDocs(collection(db, "jogos")),
      getDocs(collection(db, "sumulas")),
      getDocs(collection(db, "campeonatos")),
      getDocs(collection(db, "times"))
    ]);

    jogosCache = [];
    sumulasCache = [];
    campeonatosCache = [];
    timesCache = [];

    snapJogos.forEach(d => jogosCache.push({id:d.id, ...d.data()}));
    snapSumulas.forEach(d => sumulasCache.push({id:d.id, ...d.data()}));
    snapCampeonatos.forEach(d => campeonatosCache.push({id:d.id, ...d.data()}));
    snapTimes.forEach(d => timesCache.push({id:d.id, ...d.data()}));

  }catch(erro){
    console.error(erro);
  }

  if(!ocultarExemplos){
    const idsJogos = new Set(jogosCache.map(j => j.id));
    const idsSumulas = new Set(sumulasCache.map(s => s.id));
    const idsCamp = new Set(campeonatosCache.map(c => c.id));

    jogosExemplo.forEach(j => {
      if(!idsJogos.has(j.id)) jogosCache.push(j);
    });

    sumulasExemplo.forEach(s => {
      if(!idsSumulas.has(s.id)) sumulasCache.push(s);
    });

    campeonatosExemplo.forEach(c => {
      if(!idsCamp.has(c.id)) campeonatosCache.push(c);
    });
  }

  preencherCampeonatos();
  preencherCategorias();
  aplicarFiltrosURL();
  carregarSumulas();
}

document.getElementById("busca").addEventListener("input", carregarSumulas);

document.getElementById("filtroCampeonato").addEventListener("change", () => {
  preencherCategorias();
  document.getElementById("filtroCategoria").value = "";
  carregarSumulas();
});

document.getElementById("filtroCategoria").addEventListener("change", carregarSumulas);

carregarDados();
</script>

</body>
</html>
