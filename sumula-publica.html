<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula Oficial - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --azul:#0A1F3D;
  --azul2:#102a52;
  --azul3:#0c3d86;
  --vermelho:#d90429;
  --verde:#069447;
  --dourado:#f7c600;
  --cinza:#f5f7fb;
  --linha:#d6dde8;
  --texto:#071833;
  --muted:#4b5563;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#dfe6ef;
  color:var(--texto);
  min-height:100vh;
}

#app{
  width:100%;
}

.sumula-page{
  width:min(100% - 20px, 1180px);
  margin:12px auto;
  background:#fff;
  border:1px solid #b9c4d4;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.16);
}

.header{
  display:grid;
  grid-template-columns:150px 1fr 180px;
  align-items:center;
  gap:10px;
  padding:16px 18px 8px;
}

.header-logo{
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-logo img{
  width:94px;
  height:94px;
  object-fit:contain;
}

.header-title{
  text-align:center;
}

.header-title h1{
  color:var(--azul);
  font-size:56px;
  font-weight:900;
  letter-spacing:1px;
  line-height:.95;
}

.header-title p{
  margin-top:8px;
  color:var(--azul);
  font-size:21px;
  font-weight:900;
  text-transform:uppercase;
}

.header-right{
  text-align:center;
  color:var(--azul);
  font-weight:900;
  line-height:1.15;
}

.header-right .liga-nome{
  font-size:21px;
  text-transform:uppercase;
}

.header-right .liga-slogan{
  margin-top:6px;
  color:var(--dourado);
  font-size:15px;
  font-weight:900;
}

.info-strip{
  margin:8px 18px 14px;
  display:grid;
  grid-template-columns:1.1fr 1.35fr .85fr .85fr 1.05fr;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.info-box{
  min-height:70px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border-right:1px solid var(--linha);
  background:#fff;
}

.info-box:last-child{
  border-right:none;
}

.info-box i{
  width:36px;
  color:var(--azul);
  font-size:30px;
  text-align:center;
}

.info-box small{
  display:block;
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  color:#111;
  margin-bottom:4px;
}

.info-box strong{
  display:block;
  color:var(--azul);
  font-size:17px;
  font-weight:900;
}

.status-finalizado{
  display:inline-flex !important;
  align-items:center;
  justify-content:center;
  gap:7px;
  background:var(--verde);
  color:#fff !important;
  padding:8px 15px;
  border-radius:8px;
  font-size:16px !important;
}

.score-card{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:1fr 260px 1fr;
  min-height:140px;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.team-score{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  padding:14px;
  background:#fff;
}

.team-score.away{
  flex-direction:row-reverse;
}

.team-score img{
  width:108px;
  height:108px;
  object-fit:contain;
}

.team-name{
  text-align:center;
}

.team-name h2{
  color:var(--azul);
  font-size:34px;
  font-weight:900;
  text-transform:uppercase;
  line-height:1.05;
}

.team-name p{
  margin-top:8px;
  color:var(--azul);
  font-size:16px;
  font-weight:800;
}

.score-center{
  background:var(--azul);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-left:1px solid var(--linha);
  border-right:1px solid var(--linha);
  box-shadow:0 6px 16px rgba(0,0,0,.18);
}

.score-number{
  font-size:76px;
  font-weight:900;
  letter-spacing:5px;
  line-height:1;
}

.score-center span{
  margin-top:8px;
  text-transform:uppercase;
  font-size:14px;
  font-weight:900;
}

.match-strip{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:1fr 1fr 1.2fr 1.1fr;
  border:1px solid var(--linha);
  border-radius:6px;
  overflow:hidden;
}

.match-box{
  display:flex;
  align-items:center;
  gap:12px;
  min-height:64px;
  padding:10px 12px;
  border-right:1px solid var(--linha);
  background:#fff;
}

.match-box:last-child{
  border-right:none;
}

.match-box i{
  width:34px;
  color:var(--azul);
  font-size:30px;
  text-align:center;
}

.match-box small{
  display:block;
  color:var(--azul);
  text-transform:uppercase;
  font-weight:900;
  font-size:12px;
  margin-bottom:3px;
}

.match-box strong{
  display:block;
  color:#111;
  font-size:15px;
  font-weight:900;
}

.section-title{
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:8px 10px;
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.line-empty{
  color:#777;
  font-size:13px;
  text-align:center;
  padding:12px;
}

.lineups{
  margin:0 18px 12px;
  background:#fff;
}

.lineups-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}

.lineup-card{
  border:1px solid var(--linha);
  border-radius:8px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 5px 14px rgba(0,0,0,.08);
}

.lineup-head{
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:#fff;
  background:var(--azul);
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.lineup-card.away .lineup-head{
  background:var(--vermelho);
}

.lineup-head img{
  width:28px;
  height:28px;
  object-fit:contain;
  background:#fff;
  border-radius:50%;
  padding:2px;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th{
  background:#f5f7fb;
  color:var(--azul);
  font-size:12px;
  text-transform:uppercase;
  padding:7px 8px;
  border-bottom:1px solid var(--linha);
  text-align:left;
}

.table td{
  color:#111;
  font-size:13px;
  padding:5px 8px;
  border-bottom:1px solid #e5eaf1;
}

.table tr:last-child td{
  border-bottom:none;
}

.table .num{
  width:48px;
  text-align:center;
}

.table .posicao{
  width:170px;
}

.sub-row td{
  background:#f8fafc;
  color:var(--azul);
  text-align:center;
  font-weight:900;
  text-transform:uppercase;
  padding:7px;
}

.legend{
  margin-top:10px;
  padding:9px;
  text-align:center;
  color:#111;
  font-size:14px;
  border:1px solid var(--linha);
  border-radius:6px;
  background:#fff;
}

.events-grid{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}

.team-events{
  border:1px solid var(--linha);
  border-radius:8px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 5px 14px rgba(0,0,0,.08);
}

.team-events h3{
  color:#fff;
  background:var(--azul);
  text-align:center;
  padding:8px;
  font-size:20px;
  font-weight:900;
  text-transform:uppercase;
}

.team-events.away h3{
  background:var(--vermelho);
}

.events-columns{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.event-col{
  min-height:130px;
  padding:12px;
  border-right:1px solid var(--linha);
}

.event-col:last-child{
  border-right:none;
}

.event-col h4{
  color:var(--azul);
  text-align:center;
  font-size:17px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:10px;
}

.event-item{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
  color:#111;
  font-size:14px;
  line-height:1.2;
}

.event-minute{
  color:var(--azul);
  font-weight:900;
  width:42px;
  flex:0 0 auto;
}

.event-name{
  flex:1;
}

.ball{
  font-size:18px;
  width:20px;
  text-align:center;
}

.yellow-card,
.red-card{
  width:14px;
  height:19px;
  border-radius:3px;
  display:inline-block;
  flex:0 0 auto;
}

.yellow-card{
  background:#f7c600;
}

.red-card{
  background:#e30613;
}

.lower-grid{
  margin:0 18px 12px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:24px;
}

.panel{
  border:1px solid var(--linha);
  border-radius:8px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 5px 14px rgba(0,0,0,.08);
}

.panel h3{
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:8px;
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
}

.official-row{
  display:grid;
  grid-template-columns:165px 1fr;
  min-height:44px;
  border-bottom:1px solid var(--linha);
  align-items:center;
}

.official-row:last-child{
  border-bottom:none;
}

.official-label{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--azul);
  font-size:13px;
  font-weight:900;
  text-transform:uppercase;
  padding:10px 12px;
}

.official-value{
  color:#111;
  font-size:14px;
  padding:10px 12px;
}

.summary-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  border-bottom:1px solid var(--linha);
}

.summary-box{
  text-align:center;
  padding:15px 10px;
  border-right:1px solid var(--linha);
}

.summary-box:last-child{
  border-right:none;
}

.summary-box i{
  color:var(--azul);
  font-size:28px;
  margin-bottom:6px;
}

.summary-box span{
  display:block;
  color:var(--azul);
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
}

.summary-box strong{
  display:block;
  color:var(--azul);
  font-size:31px;
  font-weight:900;
  margin-top:4px;
}

.summary-detail{
  color:#111;
  font-size:12px;
  margin-top:2px;
}

.summary-card-icon{
  margin:0 auto 7px;
  width:18px;
  height:24px;
  border-radius:3px;
}

.best-player{
  display:grid;
  grid-template-columns:110px 1fr 90px;
  align-items:center;
  gap:12px;
  padding:12px;
}

.best-photo{
  width:86px;
  height:86px;
  border-radius:50%;
  object-fit:cover;
  background:#eef2f7;
  border:3px solid var(--dourado);
  margin:auto;
}

.best-player h4{
  color:var(--azul);
  font-size:14px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:8px;
}

.best-player strong{
  display:block;
  color:#111;
  font-size:18px;
  font-weight:900;
}

.best-player span{
  display:block;
  color:var(--azul);
  font-size:13px;
  margin-top:4px;
}

.trophy{
  text-align:center;
  font-size:58px;
}

.footer-grid{
  margin:0 18px;
  display:grid;
  grid-template-columns:.8fr 1.35fr;
  gap:24px;
}

.auth-box{
  display:grid;
  grid-template-columns:110px 1fr;
  gap:12px;
  align-items:center;
  padding:12px;
}

.auth-box img{
  width:98px;
  height:98px;
}

.auth-text strong{
  display:block;
  color:var(--azul);
  font-size:14px;
  font-weight:900;
  text-transform:uppercase;
}

.auth-text p{
  color:#111;
  font-size:12px;
  line-height:1.35;
}

.auth-code{
  color:var(--azul);
  font-size:17px;
  font-weight:900;
  margin:4px 0;
}

.share-panel{
  padding:18px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.btn{
  min-height:58px;
  border-radius:8px;
  color:#fff;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  text-align:center;
  font-size:13px;
  padding:10px;
  cursor:pointer;
  border:none;
}

.btn i{
  font-size:24px;
}

.btn-whats{background:#0ca84a}
.btn-email{background:#2563eb}
.btn-link{background:#4b5563}
.btn-pdf{background:#dc2626}

.final-footer{
  margin-top:12px;
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:9px;
  font-size:13px;
  line-height:1.35;
}

.error{
  max-width:760px;
  margin:80px auto;
  background:#fff;
  border:1px solid #cfd7e3;
  color:#b42323;
  padding:24px;
  border-radius:10px;
  text-align:center;
  font-size:18px;
  font-weight:900;
}

@media print{
  @page{
    size:A4 landscape;
    margin:5mm;
  }

  body{
    background:#fff;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }

  #app{
    width:100%;
    min-width:0;
  }

  .sumula-page{
    width:100%;
    margin:0;
    border:none;
    border-radius:0;
    box-shadow:none;
  }

  .buttons{
    display:none;
  }

  .lineup-card,
  .team-events,
  .panel,
  .score-card,
  .match-strip,
  .info-strip{
    break-inside:avoid;
    page-break-inside:avoid;
  }

  .final-footer{
    margin-top:8px;
  }
}

@media(max-width:900px){
  body{
    overflow-x:auto;
  }

  #app{
    min-width:1180px;
  }

  .sumula-page{
    width:1180px;
  }
}
</style>
</head>

<body>
<div id="app">
  <div class="error">
    <i class="fa-solid fa-spinner fa-spin"></i><br>
    Carregando súmula oficial...
  </div>
</div>
<script type="module">
import { db } from "./firebase.js";
import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = document.getElementById("app");
const id = new URLSearchParams(window.location.search).get("id");

function texto(v,f=""){return v===undefined||v===null||v===""?f:v}
function normalizar(v){
  return String(v||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
function campo(obj,chs,f=""){
  for(const c of chs){
    if(obj && obj[c]!==undefined && obj[c]!==null && obj[c]!=="") return obj[c];
  }
  return f;
}
function nomeTime(v,f="TIME"){
  if(v && typeof v==="object") return campo(v,["nome","nomeTime","time","equipe"],f);
  return texto(v,f);
}
function escudoTime(v){
  if(v && typeof v==="object") return campo(v,["escudo","logo","imagem","foto"],"logo-liga.jfif");
  return "logo-liga.jfif";
}
function cidadeTime(v,f="-"){
  if(v && typeof v==="object") return campo(v,["cidade","municipio","local"],f);
  return f;
}
function dataBR(v){
  if(!v) return "-";
  if(typeof v.toDate==="function") v=v.toDate();
  const d=new Date(v);
  if(!isNaN(d.getTime())) return d.toLocaleDateString("pt-BR");
  return String(v);
}
function placarA(s){return Number(campo(s,["golsA","placarA","golsMandante"],0))}
function placarB(s){return Number(campo(s,["golsB","placarB","golsVisitante"],0))}
function codigoSumula(s){
  return campo(s,["codigoVerificacao","hash","numeroSumula","codigoPartida","codigo"], String(id||"LG").slice(0,12).toUpperCase());
}
function qrUrl(){
  return `https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=${encodeURIComponent(window.location.href)}`;
}
function separarEventosPorTime(lista){
  const a=[], b=[];
  lista.forEach(it=>{
    const t=normalizar(it.time||it.lado||"");
    if(t==="b"||t==="visitante") b.push(it); else a.push(it);
  });
  return {a,b};
}

function renderJogadores(lista){
  if(!Array.isArray(lista)||!lista.length){
    return `<tr><td colspan="3" class="line-empty">Nenhum jogador informado.</td></tr>`;
  }

  const titulares=lista.filter(j=>normalizar(j.tipo||"")!=="suplente");
  const suplentes=lista.filter(j=>normalizar(j.tipo||"")==="suplente");

  return `
    <tr class="sub-row"><td colspan="3">Titulares</td></tr>
    ${titulares.map(j=>`
      <tr>
        <td class="num">${campo(j,["numero","camisa"],"-")}</td>
        <td>${campo(j,["nome"],"-")}</td>
        <td class="posicao">${campo(j,["posicao"],"-")}</td>
      </tr>
    `).join("")}

    ${suplentes.length ? `
      <tr class="sub-row"><td colspan="3">Suplentes</td></tr>
      ${suplentes.map(j=>`
        <tr>
          <td class="num">${campo(j,["numero","camisa"],"-")}</td>
          <td>${campo(j,["nome"],"-")}</td>
          <td class="posicao">${campo(j,["posicao"],"-")}</td>
        </tr>
      `).join("")}
    ` : ""}
  `;
}

function renderGols(lista){
  if(!lista.length) return `<div class="line-empty">Nenhum gol.</div>`;
  return lista.map(g=>`
    <div class="event-item">
      <span class="ball">⚽</span>
      <span class="event-minute">${campo(g,["minuto"],"-")}'</span>
      <span class="event-name">${campo(g,["nome"],"-")}</span>
    </div>
  `).join("");
}

function renderCartoes(lista){
  if(!lista.length) return `<div class="line-empty">Nenhum cartão.</div>`;
  return lista.map(c=>{
    const verm=normalizar(c.tipo).includes("verm");
    return `
      <div class="event-item">
        <span class="${verm?"red-card":"yellow-card"}"></span>
        <span class="event-minute">${campo(c,["minuto"],"-")}'</span>
        <span class="event-name">${campo(c,["nome"],"-")}</span>
      </div>
    `;
  }).join("");
}

window.baixarPDF=()=>window.print();

async function carregar(){
  if(!id){
    app.innerHTML=`<div class="error">Súmula não informada.</div>`;
    return;
  }

  try{
    const snap=await getDoc(doc(db,"sumulas",id));

    if(!snap.exists()){
      app.innerHTML=`<div class="error">Súmula não encontrada.</div>`;
      return;
    }

    const s={id:snap.id,...snap.data()};

    const A=s.timeA||{}, B=s.timeB||{};
    const nomeA=nomeTime(A,"MANDANTE");
    const nomeB=nomeTime(B,"VISITANTE");

    const logoA=escudoTime(A);
    const logoB=escudoTime(B);

    const jogadoresA=s.jogadoresA||[];
    const jogadoresB=s.jogadoresB||[];

    const gols=s.gols||[];
    const cartoes=s.cartoes||[];

    const gpt=separarEventosPorTime(gols);
    const cpt=separarEventosPorTime(cartoes);

    app.innerHTML=`
    <div class="sumula-page">

      <header class="header">
        <div class="header-logo">
          <img src="logo-liga.jfif">
        </div>

        <div class="header-title">
          <h1>SÚMULA OFICIAL</h1>
          <p>LIGA GOIANA DE FUTEBOL DE BASE</p>
        </div>

        <div class="header-right">
          <div class="liga-nome">Liga Goiana de Futebol de Base</div>
          <div class="liga-slogan">Onde o talento encontra o futuro</div>
        </div>
      </header>

      <section class="score-card">
        <div class="team-score">
          <img src="${logoA}">
          <div class="team-name">
            <h2>${nomeA}</h2>
          </div>
        </div>

        <div class="score-center">
          <div class="score-number">${placarA(s)} x ${placarB(s)}</div>
          <span>Placar Final</span>
        </div>

        <div class="team-score away">
          <img src="${logoB}">
          <div class="team-name">
            <h2>${nomeB}</h2>
          </div>
        </div>
      </section>

      <section class="lineups">
        <div class="section-title">Escalações</div>

        <div class="lineups-grid">

          <div class="lineup-card">
            <div class="lineup-head">${nomeA}</div>
            <table class="table">
              <tbody>${renderJogadores(jogadoresA)}</tbody>
            </table>
          </div>

          <div class="lineup-card away">
            <div class="lineup-head">${nomeB}</div>
            <table class="table">
              <tbody>${renderJogadores(jogadoresB)}</tbody>
            </table>
          </div>

        </div>
      </section>

      <section class="events-grid">

        <div class="team-events">
          <h3>${nomeA}</h3>
          <div class="events-columns">
            <div class="event-col">
              <h4>Gols</h4>
              ${renderGols(gpt.a)}
            </div>
            <div class="event-col">
              <h4>Cartões</h4>
              ${renderCartoes(cpt.a)}
            </div>
          </div>
        </div>

        <div class="team-events away">
          <h3>${nomeB}</h3>
          <div class="events-columns">
            <div class="event-col">
              <h4>Gols</h4>
              ${renderGols(gpt.b)}
            </div>
            <div class="event-col">
              <h4>Cartões</h4>
              ${renderCartoes(cpt.b)}
            </div>
          </div>
        </div>

      </section>

      <div style="padding:20px;text-align:center">
        <button onclick="baixarPDF()" style="padding:12px 20px;background:#dc2626;color:#fff;border:none;border-radius:6px;font-weight:900;">
          BAIXAR PDF
        </button>
      </div>

    </div>
    `;
  }catch(e){
    console.error(e);
    app.innerHTML=`<div class="error">Erro ao carregar súmula.</div>`;
  }
}

carregar();
</script>
</body>
</html>
