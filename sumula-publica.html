<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súmulas - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#fff;
  --muted:#cbd6ea;
  --gold-line:rgba(247,198,0,.45);
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial,sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88),rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;border:none;}
img{max-width:100%;display:block;}

.wrap{
  width:min(100% - 28px,var(--max));
  margin:0 auto;
}

/* HEADER */
.site-header{
  background:linear-gradient(180deg,rgba(2,10,24,.98),rgba(8,23,44,.96));
  border-bottom:3px solid var(--gold);
  box-shadow:var(--shadow);
}

.header-top{
  min-height:92px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px 0;
}

.header-title{
  text-align:center;
  font-size:26px;
  font-weight:900;
  letter-spacing:.8px;
  text-transform:uppercase;
  line-height:1.15;
}

/* MENU RESPONSIVO PADRÃO */
.nav-bar{
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(8,23,44,.98));
  border-top:1px solid rgba(255,255,255,.06);
  overflow:hidden;
}

.menu{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:clamp(4px, .55vw, 10px);
  padding:14px 6px;
  flex-wrap:nowrap;
  overflow:hidden;
}

.menu a{
  color:#fff;
  font-weight:900;
  font-size:clamp(11px, .92vw, 15px);
  background:linear-gradient(180deg,rgba(16,42,82,.98),rgba(12,33,64,.98));
  padding:clamp(8px, .75vw, 12px) clamp(9px, 1vw, 18px);
  border-radius:clamp(10px, .9vw, 15px);
  border:1px solid rgba(255,255,255,.07);
  white-space:nowrap;
  flex:0 1 auto;
  box-shadow:0 10px 22px rgba(0,0,0,.24);
}

.menu a.ativo{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

/* PÁGINA */
.page{
  width:min(100% - 22px,1120px);
  margin:0 auto;
  padding:22px 0 28px;
}

.hero{
  background:
    radial-gradient(circle at top left,rgba(247,198,0,.16),transparent 34%),
    linear-gradient(135deg,rgba(16,42,82,.96),rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h1{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

/* CARDS */
.sumulas-lista{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
  margin-bottom:18px;
}

.sumula-card{
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:10px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.sumula-card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:8px;
}

.sumula-icon{
  width:34px;
  height:34px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

.sumula-status{
  background:#1b5e20;
  color:#fff;
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.sumula-times{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:8px;
  margin:8px 0;
}

.sumula-time{
  display:flex;
  align-items:center;
  gap:6px;
  font-weight:900;
  font-size:13px;
  min-width:0;
}

.sumula-time.right{
  justify-content:flex-end;
  text-align:right;
}

.sumula-time span{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.sumula-time img{
  width:28px;
  height:28px;
  border-radius:50%;
  border:1px solid var(--gold);
  object-fit:cover;
  background:#fff;
}

.sumula-placar{
  color:var(--gold);
  font-size:16px;
  font-weight:900;
  background:rgba(2,10,24,.72);
  border:1px solid var(--gold-line);
  border-radius:10px;
  padding:6px 9px;
}

.sumula-info{
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
  text-align:center;
  margin-top:8px;
}

.btn-ver-sumula{
  width:100%;
  margin-top:9px;
  padding:9px 12px;
  border-radius:11px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:13px;
}

#areaSumula{
  display:none;
  margin-top:18px;
  padding:20px;
  border:2px solid var(--gold);
  border-radius:16px;
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(8,23,44,.97));
  text-align:center;
  box-shadow:var(--shadow);
}

#areaSumula h2{
  color:var(--gold);
  margin-bottom:10px;
}

.vazio{
  color:var(--muted);
  text-align:center;
  padding:18px;
  background:rgba(7,29,55,.9);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  grid-column:1/-1;
}

/* CELULAR */
@media(max-width:900px){
  .header-title{
    font-size:20px;
  }

  .menu{
    justify-content:flex-start;
    overflow-x:auto;
    overflow-y:hidden;
    padding:14px;
    gap:10px;
    scrollbar-width:none;
    -ms-overflow-style:none;
  }

  .menu::-webkit-scrollbar{
    display:none;
  }

  .menu a{
    flex:0 0 auto;
    font-size:15px;
    padding:12px 18px;
    border-radius:15px;
  }

  .sumulas-lista{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header class="site-header">
  <div class="wrap header-top">
    <div class="header-title">LIGA GOIANA DE FUTEBOL DE BASE</div>
  </div>

  <div class="nav-bar">
    <div class="wrap">
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="campeonatos.html">Campeonatos</a>
        <a href="tabela.html">Tabela</a>
        <a href="jogos.html">Jogos</a>
        <a href="times.html">Times</a>
        <a href="tecnicos.html">Técnicos</a>
        <a href="jogadores.html">Jogadores</a>
        <a href="arbitros.html">Árbitros</a>
        <a href="assistentes.html">Assistente</a>
        <a href="sumula-publica.html" class="ativo">Súmula</a>
        <a href="noticias.html">Notícias</a>
      </nav>
    </div>
  </div>
</header>

<div class="page">

  <section class="hero">
    <h1>Súmulas Oficiais</h1>
    <p>Veja as súmulas finalizadas. Clique em “Ver Súmula” para abrir na mesma página.</p>
  </section>

  <section class="sumulas-lista" id="listaSumulas"></section>

  <section id="areaSumula"></section>

</div>

<script>
const SUMULAS_EXEMPLO = [
  {
    id:"1",
    campeonato:"Copa do Mundo FIFA 2002",
    categoria:"Seleção Principal",
    data:"30/06/2002 - 08:00",
    local:"International Stadium Yokohama",
    timeA:"Brasil",
    timeB:"Alemanha",
    golsA:2,
    golsB:0,
    logoA:"logo-liga.jfif",
    logoB:"logo-liga.jfif"
  },
  {
    id:"2",
    campeonato:"Copa União de Base",
    categoria:"Sub-15",
    data:"18/05/2025 - 16:00",
    local:"Serra Dourada",
    timeA:"Atlético GO",
    timeB:"Vila Nova",
    golsA:2,
    golsB:1,
    logoA:"logo-liga.jfif",
    logoB:"logo-liga.jfif"
  },
  {
    id:"3",
    campeonato:"Liga Goiana Elite",
    categoria:"Sub-13",
    data:"17/05/2025 - 15:30",
    local:"Campo 1",
    timeA:"Goiás",
    timeB:"Anápolis",
    golsA:1,
    golsB:1,
    logoA:"logo-liga.jfif",
    logoB:"logo-liga.jfif"
  },
  {
    id:"4",
    campeonato:"Copa União de Base",
    categoria:"Sub-17",
    data:"16/05/2025 - 19:00",
    local:"Estádio Olímpico",
    timeA:"Cruzeiro",
    timeB:"Goianésia",
    golsA:3,
    golsB:0,
    logoA:"logo-liga.jfif",
    logoB:"logo-liga.jfif"
  },
  {
    id:"5",
    campeonato:"Liga Goiana Elite",
    categoria:"Sub-11",
    data:"15/05/2025 - 09:00",
    local:"Campo Society 2",
    timeA:"Aparecidense",
    timeB:"Trindade",
    golsA:0,
    golsB:0,
    logoA:"logo-liga.jfif",
    logoB:"logo-liga.jfif"
  }
];

function renderLista(){
  const lista = document.getElementById("listaSumulas");

  lista.innerHTML = SUMULAS_EXEMPLO.map(j => `
    <article class="sumula-card">
      <div class="sumula-card-top">
        <div class="sumula-icon">
          <i class="fa-solid fa-file-signature"></i>
        </div>
        <div class="sumula-status">Finalizada</div>
      </div>

      <div class="sumula-times">
        <div class="sumula-time">
          <img src="${j.logoA}" onerror="this.src='logo-liga.jfif'">
          <span>${j.timeA}</span>
        </div>

        <div class="sumula-placar">${j.golsA} x ${j.golsB}</div>

        <div class="sumula-time right">
          <span>${j.timeB}</span>
          <img src="${j.logoB}" onerror="this.src='logo-liga.jfif'">
        </div>
      </div>

      <div class="sumula-info">
        <strong>${j.campeonato}</strong><br>
        ${j.categoria}<br>
        ${j.data}<br>
        ${j.local}
      </div>

      <button class="btn-ver-sumula" onclick="abrirSumula('${j.id}')">
        <i class="fa-solid fa-eye"></i> Ver Súmula
      </button>
    </article>
  `).join("");
}

function abrirSumula(id){
  const s = SUMULAS_EXEMPLO.find(x => x.id === id);
  const area = document.getElementById("areaSumula");

  area.style.display = "block";

  area.innerHTML = `
    <h2>SÚMULA OFICIAL</h2>
    <p><strong>${s.timeA}</strong> ${s.golsA} x ${s.golsB} <strong>${s.timeB}</strong></p>
    <p>${s.campeonato}</p>
    <p>${s.categoria}</p>
    <p>${s.data}</p>
    <p>${s.local}</p>
  `;

  area.scrollIntoView({behavior:"smooth",block:"start"});
}

renderLista();
</script>

</body>
</html>
