<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmulas - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#42e85f;
  --yellow:#ffd400;
  --red:#ff2738;
  --blue:#4d8dff;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

/* MENU PADRÃO */
.site-header{
  background:linear-gradient(180deg, rgba(2,10,24,.98), rgba(8,23,44,.96));
  border-bottom:3px solid var(--gold);
  box-shadow:var(--shadow);
}

.header-top{
  min-height:92px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  padding:16px 0;
}

.header-left,
.header-right{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.header-title{
  flex:1;
  text-align:center;
  font-size:26px;
  font-weight:900;
  color:#fff;
  letter-spacing:.8px;
  text-transform:uppercase;
  line-height:1.15;
}

.top-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:11px 18px;
  border-radius:14px;
  font-weight:800;
  white-space:nowrap;
  background:#fff4cf;
  color:#111;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 10px 22px rgba(0,0,0,.22);
}

.nav-bar{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.98));
  border-top:1px solid rgba(255,255,255,.06);
  overflow:hidden;
}

.menu{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:14px 8px;
  flex-wrap:nowrap;
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
  -ms-overflow-style:none;
  scroll-behavior:smooth;
}

.menu::-webkit-scrollbar{
  display:none;
}

.menu a{
  color:#fff;
  font-weight:900;
  font-size:15px;
  background:linear-gradient(180deg, rgba(16,42,82,.98), rgba(12,33,64,.98));
  padding:12px 18px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,.07);
  white-space:nowrap;
  flex:0 0 auto;
  box-shadow:0 10px 22px rgba(0,0,0,.24);
}

.menu a.ativo{
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
}

/* PÁGINA */
.page{
  width:min(100% - 22px, 1120px);
  margin:0 auto;
  padding:22px 0 28px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h1{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

/* LISTA DE SÚMULAS COMPACTA */
.sumulas-lista{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
  margin-bottom:18px;
}

.sumula-card{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:10px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  transition:.25s ease;
}

.sumula-card:hover{
  transform:translateY(-2px);
  border-color:var(--gold);
}

.sumula-card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
}

.sumula-icon{
  width:34px;
  height:34px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  flex-shrink:0;
}

.sumula-status{
  background:#1b5e20;
  color:#fff;
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.sumula-times{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:8px;
  margin:8px 0;
}

.sumula-time{
  display:flex;
  align-items:center;
  gap:6px;
  font-weight:900;
  min-width:0;
  font-size:13px;
}

.sumula-time.right{
  justify-content:flex-end;
  text-align:right;
}

.sumula-time span{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.sumula-time img{
  width:28px;
  height:28px;
  object-fit:cover;
  border-radius:50%;
  background:#fff;
  border:1px solid var(--gold);
  flex-shrink:0;
}

.sumula-placar{
  color:var(--gold);
  font-size:16px;
  font-weight:900;
  background:rgba(2,10,24,.72);
  border:1px solid var(--gold-line);
  border-radius:10px;
  padding:6px 9px;
  white-space:nowrap;
}

.sumula-info{
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
  text-align:center;
  margin-top:8px;
}

.btn-ver-sumula{
  width:100%;
  margin-top:9px;
  padding:9px 12px;
  border-radius:11px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:13px;
}

.vazio{
  color:var(--muted);
  text-align:center;
  padding:18px;
  background:rgba(7,29,55,.9);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  grid-column:1/-1;
}

/* SÚMULA ABERTA */
#areaSumula{
  background:
    radial-gradient(circle at top center, rgba(24,72,130,.55), transparent 38%),
    linear-gradient(180deg, rgba(2,12,28,.98), rgba(3,13,28,.98));
  border:2px solid var(--gold);
  border-radius:12px;
  box-shadow:var(--shadow);
  overflow:hidden;
  display:none;
}

.header{
  display:grid;
  grid-template-columns:120px 1fr 120px;
  align-items:center;
  gap:14px;
  padding:18px 24px;
  border-bottom:2px solid var(--gold);
}

.logo{
  width:92px;
  height:92px;
  object-fit:cover;
  border-radius:18px;
  border:2px solid var(--gold);
  background:#fff;
}

.logo.right{
  justify-self:end;
}

.titulo{
  text-align:center;
}

.titulo strong{
  display:block;
  color:var(--gold);
  font-size:46px;
  font-weight:900;
  letter-spacing:1px;
  line-height:1;
}

.titulo span{
  display:block;
  margin-top:10px;
  color:#fff;
  font-size:20px;
  font-weight:800;
}
.meta-bar{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:22px;
  flex-wrap:wrap;
  padding:14px 18px;
  border-bottom:1px solid var(--line);
  background:rgba(3,12,29,.55);
  font-weight:800;
}

.meta-item{
  display:flex;
  align-items:center;
  gap:8px;
}

.meta-item i{
  color:var(--gold);
}

.score-area{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:18px;
  padding:26px 28px;
}

.team-head{
  display:flex;
  align-items:center;
  gap:18px;
}

.team-head.right{
  justify-content:flex-end;
}

.team-logo{
  width:108px;
  height:108px;
  border-radius:50%;
  object-fit:cover;
  background:#fff;
  border:3px solid rgba(255,255,255,.20);
}

.team-name{
  font-size:28px;
  font-weight:900;
}

.team-sub{
  font-size:15px;
  font-weight:800;
  color:var(--muted);
}

.score{
  min-width:240px;
  padding:16px 24px;
  border-radius:14px;
  border:1px solid var(--gold);
  text-align:center;
  color:var(--gold);
  font-size:58px;
  font-weight:900;
}

.content{
  padding:20px;
}

/* RESPONSIVO */
@media(max-width:700px){
  .sumulas-lista{
    grid-template-columns:1fr 1fr;
  }
}

@media(max-width:500px){
  .sumulas-lista{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header class="site-header">
  <div class="wrap header-top">
    <div class="header-left">
      <a href="index.html" class="top-btn">
        <i class="fa-solid fa-house"></i> Início
      </a>
    </div>

    <div class="header-title">
      LIGA GOIANA DE FUTEBOL DE BASE
    </div>

    <div class="header-right"></div>
  </div>

  <div class="nav-bar">
    <div class="wrap">
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="campeonatos.html">Campeonatos</a>
        <a href="tabela.html">Tabela</a>
        <a href="jogos.html">Jogos</a>
        <a href="times.html">Times</a>
        <a href="tecnicos.html">Técnicos</a>
        <a href="jogadores.html">Jogadores</a>
        <a href="arbitros.html">Árbitros</a>
        <a href="assistentes.html">Assistente</a>
        <a class="ativo">Súmula</a>
        <a href="noticias.html">Notícias</a>
      </nav>
    </div>
  </div>
</header>

<div class="page">

  <div class="hero">
    <h1>Súmulas Oficiais</h1>
    <p>Veja as súmulas finalizadas. Clique em "Ver Súmula" para abrir na mesma página.</p>
  </div>

  <div id="listaSumulas" class="sumulas-lista"></div>

  <!-- SÚMULA COMPLETA -->
  <div id="areaSumula">

    <div class="header">
      <img src="logo-liga.jfif" class="logo">

      <div class="titulo">
        <strong>SÚMULA OFICIAL</strong>
        <span>LIGA GOIANA DE FUTEBOL DE BASE</span>
      </div>

      <img id="logoCampeonato" src="logo-liga.jfif" class="logo right">
    </div>

    <div class="meta-bar">
      <div class="meta-item"><i class="fa-solid fa-trophy"></i><span id="metaCampeonato"></span></div>
      <div class="meta-item"><i class="fa-solid fa-users"></i><span id="metaCategoria"></span></div>
      <div class="meta-item"><i class="fa-solid fa-calendar-days"></i><span id="metaData"></span></div>
      <div class="meta-item"><i class="fa-solid fa-location-dot"></i><span id="metaLocal"></span></div>
    </div>

    <div class="score-area">
      <div class="team-head">
        <img id="escudoA" class="team-logo">
        <div>
          <div class="team-name" id="nomeTimeA"></div>
          <div class="team-sub">Mandante</div>
        </div>
      </div>

      <div class="score" id="placar"></div>

      <div class="team-head right">
        <div>
          <div class="team-name" id="nomeTimeB"></div>
          <div class="team-sub">Visitante</div>
        </div>
        <img id="escudoB" class="team-logo">
      </div>
    </div>

    <div class="content">
      <div id="obs"></div>
    </div>

  </div>

</div>
<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let sumulas = [];

const sumulasExemplo = [
  {
    id:"exemplo-1",
    campeonato:"Copa do Mundo FIFA 2002",
    categoria:"Seleção Principal",
    dataJogo:"30/06/2002 - 08:00",
    local:"International Stadium Yokohama",
    timeA:"Brasil",
    timeB:"Alemanha",
    golsA:2,
    golsB:0,
    logoTimeA:"logo-liga.jfif",
    logoTimeB:"logo-liga.jfif",
    logoCampeonato:"logo-liga.jfif",
    observacoes:"Súmula de exemplo para visualizar o funcionamento."
  },
  {
    id:"exemplo-2",
    campeonato:"Copa União de Base",
    categoria:"Sub-15",
    dataJogo:"18/05/2025 - 16:00",
    local:"Estádio Serra Dourada",
    timeA:"Atlético GO",
    timeB:"Vila Nova",
    golsA:2,
    golsB:1,
    logoTimeA:"logo-liga.jfif",
    logoTimeB:"logo-liga.jfif",
    logoCampeonato:"logo-liga.jfif",
    observacoes:"Jogo finalizado sem ocorrências graves."
  },
  {
    id:"exemplo-3",
    campeonato:"Liga Goiana Elite",
    categoria:"Sub-13",
    dataJogo:"17/05/2025 - 15:30",
    local:"Campo 1",
    timeA:"Goiás",
    timeB:"Anápolis",
    golsA:1,
    golsB:1,
    logoTimeA:"logo-liga.jfif",
    logoTimeB:"logo-liga.jfif",
    logoCampeonato:"logo-liga.jfif",
    observacoes:"Partida equilibrada."
  },
  {
    id:"exemplo-4",
    campeonato:"Copa União de Base",
    categoria:"Sub-17",
    dataJogo:"16/05/2025 - 19:00",
    local:"Estádio Olímpico",
    timeA:"Cruzeiro",
    timeB:"Goiânia",
    golsA:3,
    golsB:0,
    logoTimeA:"logo-liga.jfif",
    logoTimeB:"logo-liga.jfif",
    logoCampeonato:"logo-liga.jfif",
    observacoes:"Súmula gerada automaticamente."
  },
  {
    id:"exemplo-5",
    campeonato:"Liga Goiana Elite",
    categoria:"Sub-11",
    dataJogo:"15/05/2025 - 09:00",
    local:"Campo Society 2",
    timeA:"Aparecidense",
    timeB:"Trindade",
    golsA:0,
    golsB:0,
    logoTimeA:"logo-liga.jfif",
    logoTimeB:"logo-liga.jfif",
    logoCampeonato:"logo-liga.jfif",
    observacoes:"Empate sem gols."
  }
];

function campo(valor, fallback="-"){
  if(valor === undefined || valor === null || valor === "") return fallback;
  return valor;
}

function renderLista(){
  const lista = document.getElementById("listaSumulas");

  if(!sumulas.length){
    lista.innerHTML = `<div class="vazio">Nenhuma súmula encontrada.</div>`;
    return;
  }

  lista.innerHTML = sumulas.map(s => `
    <div class="sumula-card">
      <div class="sumula-card-top">
        <div class="sumula-icon">
          <i class="fa-solid fa-file-signature"></i>
        </div>

        <div class="sumula-status">Finalizada</div>
      </div>

      <div class="sumula-times">
        <div class="sumula-time">
          <img src="${campo(s.logoTimeA, "logo-liga.jfif")}" onerror="this.src='logo-liga.jfif'">
          <span>${campo(s.timeA)}</span>
        </div>

        <div class="sumula-placar">
          ${Number(s.golsA || 0)} x ${Number(s.golsB || 0)}
        </div>

        <div class="sumula-time right">
          <span>${campo(s.timeB)}</span>
          <img src="${campo(s.logoTimeB, "logo-liga.jfif")}" onerror="this.src='logo-liga.jfif'">
        </div>
      </div>

      <div class="sumula-info">
        <strong>${campo(s.campeonato)}</strong><br>
        ${campo(s.categoria)}<br>
        ${campo(s.dataJogo || s.data)}<br>
        ${campo(s.local)}
      </div>

      <button class="btn-ver-sumula" onclick="abrirSumula('${s.id}')">
        <i class="fa-solid fa-eye"></i> Ver Súmula
      </button>
    </div>
  `).join("");
}

window.abrirSumula = function(id){
  const s = sumulas.find(item => item.id === id);
  if(!s) return;

  document.getElementById("metaCampeonato").textContent = campo(s.campeonato);
  document.getElementById("metaCategoria").textContent = campo(s.categoria);
  document.getElementById("metaData").textContent = campo(s.dataJogo || s.data);
  document.getElementById("metaLocal").textContent = campo(s.local);

  document.getElementById("nomeTimeA").textContent = campo(s.timeA);
  document.getElementById("nomeTimeB").textContent = campo(s.timeB);

  document.getElementById("escudoA").src = campo(s.logoTimeA, "logo-liga.jfif");
  document.getElementById("escudoB").src = campo(s.logoTimeB, "logo-liga.jfif");
  document.getElementById("logoCampeonato").src = campo(s.logoCampeonato, "logo-liga.jfif");

  document.getElementById("placar").textContent =
    `${Number(s.golsA || 0)} x ${Number(s.golsB || 0)}`;

  document.getElementById("obs").innerHTML = `
    <div class="vazio">
      <strong>Observações:</strong><br>
      ${campo(s.observacoes, "Sem observações do árbitro.")}
    </div>
  `;

  document.getElementById("areaSumula").style.display = "block";

  document.getElementById("areaSumula").scrollIntoView({
    behavior:"smooth",
    block:"start"
  });
};

async function carregar(){
  const lista = document.getElementById("listaSumulas");
  lista.innerHTML = `<div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando súmulas...</div>`;

  try{
    const snap = await getDocs(collection(db, "sumulas"));

    sumulas = [];
    snap.forEach(docSnap => {
      sumulas.push({
        id:docSnap.id,
        ...docSnap.data()
      });
    });

    if(!sumulas.length){
      sumulas = sumulasExemplo;
    }

    renderLista();
  }catch(erro){
    console.error(erro);
    sumulas = sumulasExemplo;
    renderLista();
  }
}

carregar();
</script>

</body>
</html>
