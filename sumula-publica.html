<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súmula Oficial</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#eef2f7}
.container{max-width:1100px;margin:auto;background:#fff;padding:20px;border-radius:10px}

.topo{text-align:center;border-bottom:4px solid #0A1F3D;padding-bottom:10px}
.titulo{font-size:30px;font-weight:900}

.status{display:none;background:#1b5e20;color:#fff;padding:10px;text-align:center;font-weight:900;border-radius:6px;margin-bottom:10px}

.placar-box{display:flex;justify-content:space-between;align-items:center;margin:20px 0}
.time{text-align:center;width:40%}
.time img{width:80px}
.nome{font-weight:900}
.placar{font-size:56px;font-weight:900;color:#0A1F3D}

.secao{margin-top:20px}
.titulo-secao{background:#0A1F3D;color:#fff;padding:8px;font-weight:900;border-radius:6px}

.tabela{width:100%;border-collapse:collapse}
.tabela td{border:1px solid #ccc;padding:6px}

.duplo{display:flex;gap:20px}

.highlight{background:#f7c600;padding:10px;font-weight:900;text-align:center;border-radius:8px}

.btns{display:flex;gap:10px;margin-top:20px}
.btn{padding:10px;border:none;border-radius:6px;font-weight:900;color:#fff;cursor:pointer}
.whats{background:#25d366}
.email{background:#007bff}
.print{background:#000}
</style>
</head>

<body>

<div class="container">

<div class="status" id="statusFinalizada">SÚMULA FINALIZADA</div>

<div class="topo">
<div class="titulo">SÚMULA OFICIAL</div>
<div id="campeonato"></div>
<div id="categoria"></div>
</div>

<div class="placar-box">
<div class="time">
<img id="logoA">
<div class="nome" id="timeA"></div>
</div>

<div class="placar" id="placar"></div>

<div class="time">
<img id="logoB">
<div class="nome" id="timeB"></div>
</div>
</div>

<canvas id="qr"></canvas>

<div class="secao">
<div class="titulo-secao">ESCALAÇÃO</div>

<div class="duplo">
<div style="flex:1">
<table class="tabela" id="titA"></table>
</div>

<div style="flex:1">
<table class="tabela" id="titB"></table>
</div>
</div>

</div>

<div class="secao">
<div class="titulo-secao">EVENTOS</div>

<div class="duplo">
<div style="flex:1">
<table class="tabela" id="golsA"></table>
<table class="tabela" id="cartA"></table>
</div>

<div style="flex:1">
<table class="tabela" id="golsB"></table>
<table class="tabela" id="cartB"></table>
</div>
</div>

</div>

<div class="secao">
<div class="titulo-secao">⭐ MELHOR EM CAMPO</div>
<div id="melhor" class="highlight"></div>
</div>

<div class="secao">
<div class="titulo-secao">📊 ESTATÍSTICAS</div>
<div id="stats"></div>
</div>

<div class="btns">
<button class="btn whats" onclick="wpp()">WhatsApp</button>
<button class="btn email" onclick="mail()">Email</button>
<button class="btn print" onclick="window.print()">PDF</button>
<button class="btn print" id="btnFinalizar">Finalizar Súmula</button>
</div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const id=new URLSearchParams(location.search).get("id");

// ===== FUNÇÕES =====
function esc(l){return (l||[]).map(j=>{
let n=j.nome||"-"
if(j.posicao==="Goleiro")n+=" (G)"
if(j.capitao)n+=" (C)"
return `<tr><td>${j.numero||"-"}</td><td>${n}</td></tr>`
}).join("")}

function fil(l,t){return (l||[]).filter(x=>x.time===t)}

function gols(l){return l.map(g=>`<tr><td>⚽ ${g.tempo}'</td><td>${g.nome}</td></tr>`).join("")}
function cart(l){return l.map(c=>{
let i=c.tipo==="vermelho"?"🟥":"🟨"
return `<tr><td>${i} ${c.tempo}'</td><td>${c.nome}</td></tr>`
}).join("")}

// ===== LOAD =====
async function load(){

const snap=await getDoc(doc(db,"jogos",id))
const j=snap.data()

timeA.innerText=j.timeA.nome
timeB.innerText=j.timeB.nome

logoA.src=j.timeA.logo
logoB.src=j.timeB.logo

placar.innerText=`${j.placar.A} x ${j.placar.B}`

campeonato.innerText=j.campeonato
categoria.innerText=j.categoria

titA.innerHTML=esc(j.titularesA)
titB.innerHTML=esc(j.titularesB)

golsA.innerHTML=gols(fil(j.gols,"A"))
golsB.innerHTML=gols(fil(j.gols,"B"))

cartA.innerHTML=cart(fil(j.cartoes,"A"))
cartB.innerHTML=cart(fil(j.cartoes,"B"))

melhor.innerText=j.melhorJogador

QRCode.toCanvas(document.getElementById("qr"),location.href)

// ===== PUXA ESTATÍSTICAS =====
let statsHTML=""

const jogadores=await getDocs(collection(db,"jogadores"))
jogadores.forEach(d=>{
let p=d.data()
if(p.nome===j.melhorJogador){
statsHTML+=`👤 ${p.nome} - ⚽ ${p.gols||0} gols | 🟨 ${p.cartoesAmarelos||0}<br>`
}
})

const times=await getDocs(collection(db,"times"))
times.forEach(d=>{
let t=d.data()
if(t.nome===j.timeA.nome||t.nome===j.timeB.nome){
statsHTML+=`🛡️ ${t.nome} - 🏆 ${t.vitorias||0} vitórias<br>`
}
})

stats.innerHTML=statsHTML

}

load()

// ===== FINALIZAR =====
btnFinalizar.onclick=async()=>{

const ref=doc(db,"jogos",id)
const snap=await getDoc(ref)
const j=snap.data()

await updateDoc(ref,{status:"finalizado",sumulaFinalizada:true})

// JOGADORES
const jogadores=await getDocs(collection(db,"jogadores"))

jogadores.forEach(async(d)=>{
let data=d.data()

for(const g of j.gols||[]){
if(data.nome===g.nome){
await updateDoc(doc(db,"jogadores",d.id),{
gols:(data.gols||0)+1,
jogos:(data.jogos||0)+1
})
}
}

for(const c of j.cartoes||[]){
if(data.nome===c.nome){
if(c.tipo==="amarelo"){
await updateDoc(doc(db,"jogadores",d.id),{
cartoesAmarelos:(data.cartoesAmarelos||0)+1
})
}else{
await updateDoc(doc(db,"jogadores",d.id),{
cartoesVermelhos:(data.cartoesVermelhos||0)+1
})
}
}
}

})

// TIMES
const times=await getDocs(collection(db,"times"))

times.forEach(async(d)=>{
let t=d.data()

if(t.nome===j.timeA.nome||t.nome===j.timeB.nome){

await updateDoc(doc(db,"times",d.id),{
jogos:(t.jogos||0)+1,
golsPro:(t.golsPro||0)+ (t.nome===j.timeA.nome?j.placar.A:j.placar.B),
golsContra:(t.golsContra||0)+ (t.nome===j.timeA.nome?j.placar.B:j.placar.A)
})

}

})

// ÁRBITRO
const arbitros=await getDocs(collection(db,"arbitros"))

arbitros.forEach(async(d)=>{
let a=d.data()

if(a.nome===j.arbitro){
await updateDoc(doc(db,"arbitros",d.id),{
jogos:(a.jogos||0)+1
})
}
})

// TÉCNICO
const tecnicos=await getDocs(collection(db,"tecnicos"))

tecnicos.forEach(async(d)=>{
let t=d.data()

if(t.nome===j.tecnico){
await updateDoc(doc(db,"tecnicos",d.id),{
jogos:(t.jogos||0)+1
})
}
})

alert("Sistema completo atualizado automático")
location.reload()

}

function wpp(){window.open("https://wa.me/?text="+location.href)}
function mail(){location.href="mailto:?body="+location.href}
</script>

</body>
</html>
