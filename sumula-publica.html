<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súmula Oficial</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#eef2f7}
.container{max-width:1200px;margin:auto;background:#fff;padding:20px;border-radius:10px}

.titulo{text-align:center;font-size:40px;font-weight:900}

.card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1);padding:15px;margin-top:15px}

.placar{display:flex;justify-content:space-between;align-items:center;text-align:center}
.time{width:35%}
.time img{width:90px}
.placar-centro{font-size:50px;font-weight:900}

.status{background:#1b5e20;color:#fff;padding:10px;border-radius:6px;text-align:center;font-weight:900;margin-top:10px}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.item{background:#f4f6fa;padding:10px;border-radius:6px;text-align:center}

.duplo{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px}

.tabela{width:100%;border-collapse:collapse}
.tabela td{border:1px solid #ccc;padding:6px;font-size:13px}

.highlight{background:#f7c600;padding:10px;border-radius:8px;text-align:center;font-weight:900}

.btns{display:flex;gap:10px;margin-top:15px}
.btn{flex:1;padding:12px;border:none;border-radius:6px;color:#fff;font-weight:900}
.whats{background:#25d366}
.email{background:#007bff}
.print{background:#000}

@media(max-width:800px){
.duplo{grid-template-columns:1fr}
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">

<div class="titulo">SÚMULA OFICIAL</div>

<div id="status" class="status"></div>

<div class="card placar">
<div class="time">
<img id="logoA">
<div id="timeA"></div>
</div>

<div class="placar-centro" id="placar"></div>

<div class="time">
<img id="logoB">
<div id="timeB"></div>
</div>
</div>

<div class="grid">
<div class="item"><i class="fa fa-calendar"></i> <span id="data"></span></div>
<div class="item"><i class="fa fa-clock"></i> <span id="hora"></span></div>
<div class="item"><i class="fa fa-map"></i> <span id="local"></span></div>
<div class="item">Código: <span id="codigo"></span></div>
</div>

<div class="duplo">

<div class="card">
<table class="tabela" id="escA"></table>
</div>

<div class="card">
<table class="tabela" id="escB"></table>
</div>

</div>

<div class="duplo">

<div class="card">
<table class="tabela" id="golsA"></table>
<table class="tabela" id="cartA"></table>
</div>

<div class="card">
<table class="tabela" id="golsB"></table>
<table class="tabela" id="cartB"></table>
</div>

</div>

<div class="duplo">

<div class="card">
<div id="arb"></div>
</div>

<div class="card">
<div class="highlight" id="melhor"></div>
</div>

</div>

<canvas id="qr"></canvas>

<div class="btns">
<button class="btn whats" onclick="wpp()">WhatsApp</button>
<button class="btn email" onclick="mail()">Email</button>
<button class="btn print" onclick="window.print()">PDF</button>
</div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const id=new URLSearchParams(location.search).get("id");

function fil(l,t){return (l||[]).filter(x=>x.time===t)}

function esc(l){
return (l||[]).map(j=>{
let n=j.nome
if(j.posicao==="Goleiro")n+=" (G)"
if(j.capitao)n+=" (C)"
return `<tr><td>${j.numero}</td><td>${n}</td></tr>`
}).join("")
}

function gols(l){
return l.map(g=>`<tr><td>⚽ ${g.tempo}'</td><td>${g.nome}</td></tr>`).join("")
}

function cart(l){
return l.map(c=>{
let cor=c.tipo==="vermelho"?"red":"gold"
return `<tr><td><i class="fa fa-square" style="color:${cor}"></i> ${c.tempo}'</td><td>${c.nome}</td></tr>`
}).join("")
}

async function load(){

const snap=await getDoc(doc(db,"jogos",id))

if(!snap.exists()){
document.body.innerHTML="<h2>Súmula não encontrada</h2>"
return
}

const j=snap.data()

// 🔒 BLOQUEIO PÚBLICO
if(!j.sumulaFinalizada){
document.body.innerHTML="<h2 style='text-align:center;margin-top:40px'>Súmula ainda não finalizada</h2>"
return
}

// STATUS
status.innerText="FINALIZADO"

// DADOS
timeA.innerText=j.timeA.nome
timeB.innerText=j.timeB.nome

logoA.src=j.timeA.logo
logoB.src=j.timeB.logo

placar.innerText=`${j.placar.A} x ${j.placar.B}`

data.innerText=j.data
hora.innerText=j.hora
local.innerText=j.local

codigo.innerText=j.codigo || id

escA.innerHTML=esc(j.titularesA)
escB.innerHTML=esc(j.titularesB)

golsA.innerHTML=gols(fil(j.gols,"A"))
golsB.innerHTML=gols(fil(j.gols,"B"))

cartA.innerHTML=cart(fil(j.cartoes,"A"))
cartB.innerHTML=cart(fil(j.cartoes,"B"))

arb.innerHTML=`👨‍⚖️ ${j.arbitro}`

melhor.innerText="⭐ "+j.melhorJogador

// QR COM VALIDAÇÃO
const url=location.origin+"/validar.html?id="+id
QRCode.toCanvas(document.getElementById("qr"),url)

}

load()

function wpp(){window.open("https://wa.me/?text="+location.href)}
function mail(){location.href="mailto:?body="+location.href}
</script>

</body>
</html>
