<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmula Oficial - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --azul:#0A1F3D;
  --azul2:#102a52;
  --vermelho:#d90429;
  --dourado:#f7c600;
  --cinza:#f5f7fb;
  --linha:#d6dde8;
  --texto:#071833;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#e9eef6;
  color:var(--texto);
}

.sumula{
  max-width:1180px;
  margin:10px auto;
  background:#fff;
  border-radius:10px;
  box-shadow:0 8px 25px rgba(0,0,0,.15);
  overflow:hidden;
}

/* HEADER */
.header{
  display:grid;
  grid-template-columns:120px 1fr 120px;
  align-items:center;
  padding:15px;
}

.header img{
  width:90px;
}

.header-center{
  text-align:center;
}

.header-center h1{
  font-size:48px;
  font-weight:900;
  color:var(--azul);
}

.header-center p{
  font-size:18px;
  font-weight:900;
  margin-top:5px;
}

/* INFO STRIP */
.info{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  border-top:1px solid var(--linha);
  border-bottom:1px solid var(--linha);
}

.info-box{
  padding:12px;
  border-right:1px solid var(--linha);
  text-align:center;
}

.info-box:last-child{border-right:none}

.info-box small{
  display:block;
  font-weight:900;
  font-size:12px;
}

.info-box strong{
  font-size:16px;
}

/* PLACAR */
.placar{
  display:grid;
  grid-template-columns:1fr 260px 1fr;
  align-items:center;
  padding:15px;
}

.time{
  text-align:center;
}

.time img{
  width:90px;
}

.time h2{
  font-size:28px;
  font-weight:900;
}

.score{
  background:var(--azul);
  color:#fff;
  border-radius:8px;
  text-align:center;
  padding:20px;
  font-size:50px;
  font-weight:900;
}

/* MATCH INFO */
.match{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-top:1px solid var(--linha);
}

.match div{
  padding:10px;
  border-right:1px solid var(--linha);
  text-align:center;
}

.match div:last-child{border-right:none}

/* ESCALAÇÕES */
.section-title{
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:10px;
  font-weight:900;
}

.lineups{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.card{
  border:1px solid var(--linha);
  border-radius:8px;
  overflow:hidden;
}

.card-header{
  background:var(--azul);
  color:#fff;
  padding:8px;
  font-weight:900;
  text-align:center;
}

.card-header.vermelho{
  background:var(--vermelho);
}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:6px;
  border-bottom:1px solid var(--linha);
  font-size:13px;
}

/* EVENTOS */
.eventos{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.event-card{
  border:1px solid var(--linha);
  border-radius:8px;
  overflow:hidden;
}

.event-card h3{
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:8px;
}

.event-card.vermelho h3{
  background:var(--vermelho);
}

/* RODAPÉ */
.footer{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.panel{
  border:1px solid var(--linha);
  border-radius:8px;
  padding:10px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.btn{
  padding:10px;
  border-radius:6px;
  border:none;
  color:#fff;
  font-weight:900;
}

.whats{background:#25d366}
.email{background:#2563eb}
.link{background:#555}
.pdf{background:#dc2626}

</style>
</head>

<body>

<div id="app" class="sumula">
  <div style="padding:40px;text-align:center;font-weight:900">
    Carregando...
  </div>
</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = document.getElementById("app");
const id = new URLSearchParams(location.search).get("id");

function campo(o,k,f=""){
  for(const c of k){
    if(o && o[c]) return o[c];
  }
  return f;
}

function nome(t){
  return typeof t === "object" ? campo(t,["nome"],"Time") : t;
}

function logo(t){
  return typeof t === "object" ? campo(t,["logo","escudo"],"logo-liga.jfif") : "logo-liga.jfif";
}

function render(sumula){
const A = sumula.timeA || {};
  const B = sumula.timeB || {};

  const nomeA = nome(A) || campo(sumula,["timeANome"],"ATLÉTICO GO");
  const nomeB = nome(B) || campo(sumula,["timeBNome"],"VILA NOVA");

  const logoA = logo(A);
  const logoB = logo(B);

  const golsA = Number(campo(sumula,["golsA","placarA"],0));
  const golsB = Number(campo(sumula,["golsB","placarB"],0));

  const jogadoresA = campo(sumula,["jogadoresA","escalacaoA"],[]);
  const jogadoresB = campo(sumula,["jogadoresB","escalacaoB"],[]);

  const gols = campo(sumula,["gols"],[]);
  const cartoes = campo(sumula,["cartoes"],[]);

  function linhasJogadores(lista){
    if(!Array.isArray(lista) || !lista.length){
      return `<tr><td colspan="3" style="text-align:center">Nenhum jogador informado</td></tr>`;
    }

    const titulares = lista.filter(j => j.tipo !== "suplente");
    const suplentes = lista.filter(j => j.tipo === "suplente");

    return `
      <tr><td colspan="3" style="text-align:center;font-weight:900;color:var(--azul)">TITULARES</td></tr>
      ${titulares.map(j=>`
        <tr>
          <td>${campo(j,["numero","camisa"],"-")}</td>
          <td>${campo(j,["nome","jogador"],"-")}</td>
          <td>${campo(j,["posicao"],"-")}</td>
        </tr>
      `).join("")}

      <tr><td colspan="3" style="text-align:center;font-weight:900;color:var(--azul)">SUPLENTES</td></tr>
      ${suplentes.map(j=>`
        <tr>
          <td>${campo(j,["numero","camisa"],"-")}</td>
          <td>${campo(j,["nome","jogador"],"-")}</td>
          <td>${campo(j,["posicao"],"-")}</td>
        </tr>
      `).join("")}
    `;
  }

  function eventosTime(time,tipo){
    const lista = tipo === "gol"
      ? gols.filter(e => e.time === time)
      : cartoes.filter(e => e.time === time);

    if(!lista.length) return `<p style="padding:10px;text-align:center">Nenhum registro.</p>`;

    return lista.map(e=>`
      <p style="padding:6px 12px;font-size:14px">
        ${tipo === "gol" ? "⚽" : e.tipo === "vermelho" ? "🟥" : "🟨"}
        <strong>${campo(e,["minuto","tempo"],"-")}'</strong>
        ${campo(e,["nome","jogador"],"-")}
        ${campo(e,["numero"],"") ? "Nº " + campo(e,["numero"],"") : ""}
      </p>
    `).join("");
  }

  const amarelos = cartoes.filter(c=>c.tipo === "amarelo").length;
  const vermelhos = cartoes.filter(c=>c.tipo === "vermelho").length;

  app.innerHTML = `
    <header class="header">
      <img src="logo-liga.jfif">

      <div class="header-center">
        <h1>SÚMULA OFICIAL</h1>
        <p>${campo(sumula,["campeonato"],"CAMPEONATO LIGA GOIANA")} ${campo(sumula,["categoria"],"")}</p>
      </div>

      <img src="logo-liga.jfif">
    </header>

    <section class="info">
      <div class="info-box">
        <small>SÚMULA Nº</small>
        <strong>${campo(sumula,["numeroSumula"],"2025-00125")}</strong>
      </div>

      <div class="info-box">
        <small>CÓDIGO DA PARTIDA</small>
        <strong>${campo(sumula,["codigoPartida","codigo"],id)}</strong>
      </div>

      <div class="info-box">
        <small>FASE</small>
        <strong>${campo(sumula,["fase"],"1ª FASE")}</strong>
      </div>

      <div class="info-box">
        <small>RODADA</small>
        <strong>${campo(sumula,["rodada"],"-")}</strong>
      </div>

      <div class="info-box">
        <small>STATUS</small>
        <strong style="color:var(--verde)">✓ FINALIZADO</strong>
      </div>
    </section>

    <section class="placar">
      <div class="time">
        <img src="${logoA}" onerror="this.src='logo-liga.jfif'">
        <h2>${nomeA}</h2>
        <p>Goiânia - GO</p>
      </div>

      <div class="score">
        ${golsA} x ${golsB}
        <div style="font-size:13px;margin-top:6px">PLACAR FINAL</div>
      </div>

      <div class="time">
        <img src="${logoB}" onerror="this.src='logo-liga.jfif'">
        <h2>${nomeB}</h2>
        <p>Goiânia - GO</p>
      </div>
    </section>

    <section class="match">
      <div><strong>DATA</strong><br>${campo(sumula,["data","dataJogo"],"-")}</div>
      <div><strong>HORÁRIO</strong><br>${campo(sumula,["hora","horario"],"-")}</div>
      <div><strong>CAMPO</strong><br>${campo(sumula,["local","campo"],"-")}</div>
      <div><strong>ÁRBITRO</strong><br>${campo(sumula,["arbitro","arbitroNome"],"-")}</div>
    </section>

    <div class="section-title">ESCALAÇÕES</div>

    <section class="lineups">
      <div class="card">
        <div class="card-header">
          ${nomeA}
          <img src="${logoA}" style="width:24px;vertical-align:middle;margin-left:8px" onerror="this.src='logo-liga.jfif'">
        </div>

        <table>
          <thead>
            <tr>
              <th>Nº</th>
              <th>Jogador</th>
              <th>Posição</th>
            </tr>
          </thead>
          <tbody>
            ${linhasJogadores(jogadoresA)}
          </tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-header vermelho">
          ${nomeB}
          <img src="${logoB}" style="width:24px;vertical-align:middle;margin-left:8px" onerror="this.src='logo-liga.jfif'">
        </div>

        <table>
          <thead>
            <tr>
              <th>Nº</th>
              <th>Jogador</th>
              <th>Posição</th>
            </tr>
          </thead>
          <tbody>
            ${linhasJogadores(jogadoresB)}
          </tbody>
        </table>
      </div>
    </section>

    <section class="eventos">
      <div class="event-card">
        <h3>${nomeA}</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr">
          <div>
            <h4 style="text-align:center;padding:10px;color:var(--azul)">GOLS</h4>
            ${eventosTime("A","gol")}
          </div>
          <div>
            <h4 style="text-align:center;padding:10px;color:var(--azul)">CARTÕES</h4>
            ${eventosTime("A","cartao")}
          </div>
        </div>
      </div>

      <div class="event-card vermelho">
        <h3>${nomeB}</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr">
          <div>
            <h4 style="text-align:center;padding:10px;color:var(--azul)">GOLS</h4>
            ${eventosTime("B","gol")}
          </div>
          <div>
            <h4 style="text-align:center;padding:10px;color:var(--azul)">CARTÕES</h4>
            ${eventosTime("B","cartao")}
          </div>
        </div>
      </div>
    </section>

    <section class="footer">
      <div class="panel">
        <h3 style="background:var(--azul);color:#fff;padding:8px;text-align:center">ARBITRAGEM</h3>
        <p><strong>Árbitro:</strong> ${campo(sumula,["arbitro","arbitroNome"],"-")}</p>
        <p><strong>Assistente 1:</strong> ${campo(sumula,["assistente1"],"-")}</p>
        <p><strong>Assistente 2:</strong> ${campo(sumula,["assistente2"],"-")}</p>
        <p><strong>Observador:</strong> ${campo(sumula,["observador"],"-")}</p>
      </div>

      <div class="panel">
        <h3 style="background:var(--azul);color:#fff;padding:8px;text-align:center">RESUMO DA PARTIDA</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;padding:15px">
          <div><strong style="font-size:32px;color:var(--azul)">${golsA + golsB}</strong><br>GOLS</div>
          <div><strong style="font-size:32px;color:var(--azul)">${amarelos}</strong><br>AMARELOS</div>
          <div><strong style="font-size:32px;color:var(--azul)">${vermelhos}</strong><br>VERMELHOS</div>
        </div>
      </div>
    </section>

    <section class="footer">
      <div class="panel">
        <h3 style="color:var(--azul)">AUTENTICAÇÃO</h3>
        <p><strong>Código:</strong> ${campo(sumula,["codigoVerificacao","hash"],id)}</p>
        <p>Documento oficial gerado pelo sistema Liga Goiana.</p>
      </div>

      <div class="panel">
        <h3 style="color:var(--azul)">COMPARTILHAR</h3>
        <div class="buttons">
          <button class="btn whats" onclick="window.open('https://wa.me/?text=' + encodeURIComponent(location.href))">WhatsApp</button>
          <button class="btn email" onclick="location.href='mailto:?subject=Súmula Oficial&body='+encodeURIComponent(location.href)">E-mail</button>
          <button class="btn link" onclick="navigator.clipboard.writeText(location.href);alert('Link copiado')">Copiar</button>
          <button class="btn pdf" onclick="window.print()">PDF</button>
        </div>
      </div>
    </section>

    <footer style="background:var(--azul);color:#fff;text-align:center;padding:10px">
      Documento oficial gerado pelo sistema Liga Goiana
    </footer>
  `;
}

async function carregar(){
  if(!id){
    app.innerHTML = `<div style="padding:40px;text-align:center;font-weight:900;color:red">Súmula não informada.</div>`;
    return;
  }

  const snap = await getDoc(doc(db,"sumulas",id));

  if(!snap.exists()){
    app.innerHTML = `<div style="padding:40px;text-align:center;font-weight:900;color:red">Súmula não encontrada.</div>`;
    return;
  }

  render({id:snap.id,...snap.data()});
}

carregar();
</script>

</body>
</html>
