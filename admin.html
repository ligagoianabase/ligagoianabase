<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - LIGA GOIANA DE FUTEBOL DE BASE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b1f3a;
      --bg-dark:#08172c;
      --card:#102a52;
      --card-hover:#153766;
      --gold:#f7c600;
      --gold-line:rgba(247,198,0,.30);
      --white:#ffffff;
      --muted:#d6def0;
      --shadow:0 8px 22px rgba(0,0,0,.28);
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:Arial;
      background:
        linear-gradient(rgba(11,31,58,.88), rgba(11,31,58,.94)),
        url("fundo.png") center/cover fixed no-repeat;
      color:var(--white);
    }

    .wrap{width:min(100% - 30px,1280px);margin:0 auto;}

    header{
      background:#08172c;
      border-bottom:3px solid var(--gold);
    }

    .header-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 0;
      flex-wrap:wrap;
    }

    .header-left,.header-right{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .header-title{
      flex:1;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .top-btn{
      padding:10px 16px;
      border-radius:10px;
      font-weight:bold;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .btn-light{background:#fff4cf;color:#111;}
    .btn-gold{background:var(--gold);color:#111;}

    .mobile-btn{display:none;}

    @media (max-width:600px){

      .header-left{display:none;}

      .header-right{
        width:100%;
        justify-content:center;
        flex-direction:row;
        gap:8px;
      }

      .mobile-btn{
        display:flex;
      }

      .top-btn span{
        display:none;
      }

      .top-btn{
        width:auto;
        padding:10px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="wrap header-inner">

    <div class="header-left">
      <button class="top-btn btn-light" onclick="history.back()">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </button>

      <a href="./index.html" class="top-btn btn-light">
        <i class="fa-solid fa-house"></i> Página Inicial
      </a>
    </div>

    <div class="header-title">Painel do Administrador</div>

    <div class="header-right">

      <!-- MOBILE BOTÕES -->
      <a href="./index.html" class="top-btn btn-light mobile-btn">
        <i class="fa-solid fa-house"></i>
      </a>

      <a href="./admin.html" class="top-btn btn-light mobile-btn">
        <i class="fa-solid fa-house-user"></i>
      </a>

      <!-- SAIR (FUNCIONA EM TODOS) -->
      <button class="top-btn btn-gold" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Sair</span>
      </button>

    </div>

  </div>
</header>

<script type="module">
  import { auth } from "./firebase.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  window.logout = function(){
    signOut(auth).then(()=>{
      window.location.href = "login.html";
    });
  }
</script>

</body>
</html>
