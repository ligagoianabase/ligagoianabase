<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - LIGA GOIANA DE FUTEBOL DE BASE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b1f3a;
      --bg-dark:#08172c;
      --card:#102a52;
      --card-hover:#153766;
      --gold:#f7c600;
      --gold-soft:rgba(247,198,0,.12);
      --gold-line:rgba(247,198,0,.30);
      --white:#ffffff;
      --muted:#d6def0;
      --shadow:0 8px 22px rgba(0,0,0,.28);
      --radius:14px;
      --transition:.25s ease;
      --max:1280px;
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:Arial, sans-serif;
      background:
        linear-gradient(rgba(11,31,58,.88), rgba(11,31,58,.94)),
        url("fundo.png") center/cover fixed no-repeat;
      color:var(--white);
      min-height:100vh;
    }

    a{text-decoration:none;color:inherit;}
    button{font-family:inherit;cursor:pointer;transition:var(--transition);border:none;}

    .wrap{
      width:min(100% - 30px, var(--max));
      margin:0 auto;
    }

    header{
      background:rgba(8,23,44,.96);
      border-bottom:3px solid var(--gold);
      box-shadow:var(--shadow);
    }

    .header-inner{
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding:14px 0;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .header-title{
      flex:1;
      text-align:center;
      font-size:22px;
      font-weight:700;
    }

    .top-btn{
      padding:10px 16px;
      border-radius:10px;
      font-weight:bold;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .btn-light{background:#fff4cf;color:#111;}
    .btn-light:hover{background:var(--gold);transform:translateY(-2px);}

    .btn-gold{background:var(--gold);color:#111;}
    .btn-gold:hover{filter:brightness(1.05);transform:translateY(-2px);}

    .container{padding:22px 0 30px;}

    .hero-panel{
      background:linear-gradient(180deg, rgba(16,42,82,.95), rgba(10,28,56,.96));
      border:1px solid var(--gold-line);
      border-radius:20px;
      padding:22px;
      box-shadow:var(--shadow);
      margin-bottom:22px;
    }

    .hero-panel h2{font-size:28px;margin-bottom:8px;}
    .hero-panel p{color:var(--muted);}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:14px;
      margin-bottom:24px;
    }

    .card{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      border-radius:16px;
      padding:18px;
      text-align:center;
      box-shadow:var(--shadow);
    }

    .card h3{font-size:34px;color:var(--gold);}
    .card p{margin-top:10px;color:var(--muted);}

    .section-title{font-size:20px;color:var(--gold);margin-bottom:14px;}

    .menu{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
      gap:14px;
    }

    .menu a{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      padding:15px;
      border-radius:14px;
      display:flex;
      align-items:center;
      gap:12px;
      box-shadow:var(--shadow);
    }

    .menu a:hover{
      background:var(--card-hover);
      color:var(--gold);
    }

    .admin-block{
      background:rgba(16,42,82,.45);
      border-radius:18px;
      padding:18px;
      margin-bottom:18px;
    }

    /* RESPONSIVO */

    @media (max-width: 900px){
      .header-title{order:3;width:100%;text-align:center;}
      .header-left,.header-right{width:100%;justify-content:center;}
    }

    @media (max-width: 600px){

      /* 🔥 AQUI ESTÁ A CORREÇÃO */
      .header-left,
      .header-right{
        display:none !important;
      }

      .menu{grid-template-columns:1fr;}
      .grid{grid-template-columns:1fr 1fr;}
    }

  </style>
</head>

<body>

<header>
  <div class="wrap header-inner">

    <div class="header-left">
      <button class="top-btn btn-light" onclick="history.back()">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </button>

      <a href="index.html" class="top-btn btn-light">
        <i class="fa-solid fa-house"></i> Página Inicial
      </a>
    </div>

    <div class="header-title">Painel do Administrador</div>

    <div class="header-right">
      <button class="top-btn btn-gold">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
      </button>
    </div>

  </div>
</header>

</body>
</html>
