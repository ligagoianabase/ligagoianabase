<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detalhe do Time - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --yellow:#7a5a00;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.team-hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.18), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:22px;
  padding:26px 20px 0;
  margin-bottom:14px;
  box-shadow:var(--shadow);
  overflow:hidden;
  text-align:center;
}

.team-logo{
  width:118px;
  height:118px;
  object-fit:contain;
  background:#fff;
  border:3px solid var(--gold);
  border-radius:28px;
  margin:0 auto 13px;
  box-shadow:0 14px 30px rgba(0,0,0,.35);
}

.team-name{
  font-size:34px;
  font-weight:900;
  text-transform:uppercase;
  color:#fff;
  text-shadow:0 3px 0 rgba(0,0,0,.35);
  line-height:1.1;
}

.team-sub{
  color:var(--muted);
  font-size:15px;
  margin-top:6px;
  margin-bottom:22px;
}

.main-tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:0;
  border-top:1px solid rgba(255,255,255,.08);
  background:rgba(6,20,39,.35);
  margin:0 -20px;
}

.main-tabs button{
  padding:17px 8px 15px;
  font-size:16px;
  font-weight:900;
  color:#fff;
  border-bottom:4px solid transparent;
  text-transform:uppercase;
}

.main-tabs button.ativo{
  color:var(--gold);
  border-bottom-color:var(--gold);
}

.sub-tabs{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:12px;
  margin-bottom:16px;
  border-radius:16px;
  background:rgba(13,42,82,.96);
  border:1px solid rgba(255,255,255,.08);
  scrollbar-width:none;
}

.sub-tabs::-webkit-scrollbar{display:none}

.sub-tabs button{
  flex:0 0 auto;
  padding:9px 18px;
  border-radius:999px;
  background:transparent;
  color:var(--muted);
  font-size:14px;
  font-weight:900;
  border:1px solid transparent;
}

.sub-tabs button.ativo{
  color:#111;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-color:var(--gold-line);
}

.grid-main{
  display:grid;
  grid-template-columns:1.15fr .85fr;
  gap:14px;
  align-items:start;
}

.card{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.10), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:18px;
  padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  margin-bottom:14px;
  overflow:hidden;
}

.card-title{
  color:var(--gold);
  font-size:20px;
  font-weight:900;
  margin-bottom:13px;
}

.details-main{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  padding:8px 0 16px;
  border-bottom:1px solid rgba(255,255,255,.13);
}

.person-box{
  text-align:center;
  padding:10px;
  border-right:1px solid rgba(255,255,255,.13);
}

.person-box:last-child{border-right:none}

.person-box img{
  width:82px;
  height:82px;
  object-fit:contain;
  background:#fff;
  border-radius:22px;
  border:2px solid var(--gold);
  margin:0 auto 8px;
}

.person-box.round img{
  border-radius:50%;
  object-fit:cover;
}

.person-box strong{
  display:block;
  font-size:18px;
  color:#fff;
}

.person-box span{
  color:var(--muted);
  display:block;
  margin-top:4px;
  font-size:13px;
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-top:14px;
}

.stat-box{
  text-align:center;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:10px 6px;
}

.stat-box strong{
  color:var(--gold);
  display:block;
  font-size:23px;
}

.stat-box span{
  color:var(--muted);
  display:block;
  font-size:12px;
  margin-top:3px;
  font-weight:800;
}

.match-strip{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}

.match-mini{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:10px 6px;
  text-align:center;
}

.match-mini small{
  color:var(--muted);
  display:block;
  font-size:11px;
  margin-bottom:6px;
}

.match-mini strong{
  color:#fff;
  display:block;
  font-size:14px;
  margin-bottom:7px;
}

.badge-score{
  display:inline-flex;
  padding:5px 12px;
  border-radius:999px;
  border:1px solid var(--gold-line);
  color:var(--gold);
  font-weight:900;
  font-size:13px;
}

.link-more{
  display:block;
  text-align:center;
  color:var(--gold);
  font-weight:900;
  font-size:13px;
  margin-top:12px;
}

.list-row{
  display:grid;
  grid-template-columns:42px 52px 1fr auto;
  gap:10px;
  align-items:center;
  padding:12px 0;
  border-top:1px solid rgba(255,255,255,.08);
}

.list-row:first-of-type{border-top:none}

.rank{
  color:var(--muted);
  font-weight:900;
  text-align:center;
}

.list-row img{
  width:48px;
  height:48px;
  border-radius:50%;
  object-fit:cover;
  background:#fff;
  border:1px solid rgba(247,198,0,.45);
}

.list-main strong{
  display:block;
  color:#fff;
  font-size:15px;
}

.list-main span{
  display:block;
  color:var(--muted);
  font-size:12px;
  margin-top:3px;
}

.list-value{
  color:#fff;
  font-size:20px;
  font-weight:900;
}

.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.info-item{
  display:flex;
  gap:10px;
  align-items:flex-start;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:13px;
  padding:12px;
}

.info-icon{
  width:34px;
  height:34px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.info-item strong{
  display:block;
  font-size:12px;
  color:var(--gold);
  margin-bottom:4px;
}

.info-item span{
  color:#fff;
  font-size:13px;
  font-weight:800;
}

.trophy-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.trophy-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
  text-align:center;
}

.trophy-card i{
  color:var(--gold);
  font-size:27px;
  margin-bottom:7px;
}

.trophy-card strong{
  display:block;
  color:#fff;
  font-size:13px;
}

.trophy-card span{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
}

.match-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}

.match-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  color:var(--muted);
  font-size:12px;
  font-weight:900;
  margin-bottom:10px;
}

.match-line{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:10px;
  text-align:center;
  color:#fff;
  font-weight:900;
  font-size:14px;
}

.score{
  color:var(--gold);
  font-size:22px;
}

.tabela{
  width:100%;
  border-collapse:collapse;
  min-width:620px;
}

.table-wrap{
  overflow-x:auto;
}

.tabela th,
.tabela td{
  padding:11px 8px;
  border-bottom:1px solid rgba(255,255,255,.08);
  text-align:left;
  font-size:13px;
}

.tabela th{
  color:var(--gold);
  font-size:12px;
}

.tabela td{
  color:var(--muted);
}

.position-title{
  background:rgba(247,198,0,.12);
  color:var(--gold);
  padding:10px 12px;
  border-radius:12px;
  font-size:15px;
  font-weight:900;
  margin-bottom:8px;
}

.news-card{
  min-height:210px;
  background:
    linear-gradient(rgba(8,23,44,.22), rgba(8,23,44,.94)),
    url("fundo.png") center/cover no-repeat;
  border-radius:18px;
  border:1px solid var(--gold-line);
  padding:18px;
  display:flex;
  align-items:flex-end;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}

.news-card h3{
  font-size:22px;
  margin-bottom:8px;
}

.empty{
  color:var(--muted);
  text-align:center;
  padding:18px;
}

@media(max-width:980px){
  .grid-main{
    grid-template-columns:1fr;
  }
}

@media(max-width:700px){
  .wrap{
    width:min(100% - 18px, var(--max));
  }

  .container{
    padding:16px 0 28px;
  }

  .team-hero{
    padding:16px 12px 0;
    border-radius:18px;
  }

  .team-logo{
    width:84px;
    height:84px;
    border-radius:20px;
  }

  .team-name{
    font-size:24px;
  }

  .main-tabs button{
    font-size:13px;
    padding:13px 4px 11px;
  }

  .sub-tabs{
    border-radius:14px;
    padding:10px;
  }

  .details-main{
    grid-template-columns:1fr;
    border-bottom:none;
  }

  .person-box{
    border-right:none;
    border-bottom:1px solid rgba(255,255,255,.12);
  }

  .person-box:last-child{
    border-bottom:none;
  }

  .stats-grid{
    grid-template-columns:repeat(3,1fr);
  }

  .match-strip{
    grid-template-columns:repeat(2,1fr);
  }

  .info-grid,
  .trophy-grid{
    grid-template-columns:1fr;
  }

  .list-row{
    grid-template-columns:28px 48px 1fr auto;
  }

  .card{
    padding:14px;
    border-radius:16px;
  }
}
</style>
</head>

<body>

<script type="module">
import { renderMenu } from "./menu.js";
renderMenu("times");
</script>

<main class="wrap container">

  <section class="team-hero">
    <img id="logo" class="team-logo" src="logo-liga.jfif">
    <div class="team-name" id="nome">Carregando...</div>
    <div class="team-sub" id="info">Liga Goiana de Futebol de Base</div>

    <nav class="main-tabs">
      <button id="tabTemporada" class="ativo" onclick="trocarPrincipal('temporada')">Temporada</button>
      <button id="tabBuzz" onclick="trocarPrincipal('buzz')">Buzz</button>
      <button id="tabElenco" onclick="trocarPrincipal('elenco')">Elenco</button>
    </nav>
  </section>

  <div id="subTabs" class="sub-tabs"></div>
  <div id="conteudo"></div>

</main>

<script type="module">
import { db } from "./firebase.js";
import {
  doc,
  getDoc,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const id = new URLSearchParams(location.search).get("id");

let time = {};
let jogadores = [];
let jogos = [];
let tecnicos = [];
let principal = "temporada";
let sub = "detalhes";

function campo(obj, chaves, padrao=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== "") return obj[c];
  }
  return padrao;
}

function normalizar(t){
  return String(t || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function nomeTime(){
  return campo(time,["nome","nomeTime","timeNome"],"Time");
}

function logoTime(){
  return campo(time,["logo","escudo","imagem","foto"],"logo-liga.jfif");
}

function cidadeTime(){
  return campo(time,["cidade","municipio","local"],"");
}

function categoriasTime(){
  const arr = campo(time,["categorias"],[]);
  if(Array.isArray(arr) && arr.length) return arr.join(", ");
  return campo(time,["categoria","categoriaNome"],"");
}

function tecnicoPrincipal(){
  const tecnicoPorTime = tecnicos.find(t=>{
    const tid = campo(t,["timeId"],"");
    const tnome = normalizar(campo(t,["time","nomeTime","timeNome"],""));
    return tid === id || tnome === normalizar(nomeTime());
  });
  return campo(tecnicoPorTime || time,["nome","tecnico","tecnicoNome","treinador"],"Técnico não cadastrado");
}

function jogadoresDoTime(){
  const nome = normalizar(nomeTime());
  return jogadores.filter(j=>{
    return campo(j,["timeId"],"") === id ||
      normalizar(campo(j,["time","nomeTime","timeNome"],"")) === nome;
  });
}

function jogosDoTime(){
  const nome = normalizar(nomeTime());
  return jogos.filter(j=>{
    const timeA = normalizar(campo(j,["timeA","mandante","timeMandante","nomeTimeA"],""));
    const timeB = normalizar(campo(j,["timeB","visitante","timeVisitante","nomeTimeB"],""));
    return timeA === nome || timeB === nome;
  });
}

function placarA(j){
  return Number(campo(j,["golsA","placarA","golsMandante","mandanteGols"],0));
}

function placarB(j){
  return Number(campo(j,["golsB","placarB","golsVisitante","visitanteGols"],0));
}

function calcularStats(){
  let jogosQtd = 0, vitorias = 0, empates = 0, derrotas = 0, gp = 0, gc = 0;
  const nome = normalizar(nomeTime());

  jogosDoTime().forEach(j=>{
    jogosQtd++;
    const a = placarA(j);
    const b = placarB(j);
    const ehA = normalizar(campo(j,["timeA","mandante","timeMandante","nomeTimeA"],"")) === nome;

    const golsPro = ehA ? a : b;
    const golsContra = ehA ? b : a;

    gp += golsPro;
    gc += golsContra;

    if(golsPro > golsContra) vitorias++;
    else if(golsPro === golsContra) empates++;
    else derrotas++;
  });

  return {
    jogos:jogosQtd,
    vitorias,
    empates,
    derrotas,
    gols:gp,
    golsContra:gc,
    saldo:gp-gc,
    pontos:vitorias*3+empates
  };
}

function dataBR(v){
  if(!v) return "-";
  const d = new Date(v);
  if(isNaN(d.getTime())) return String(v);
  return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
}

function renderHeader(){
  document.getElementById("nome").textContent = nomeTime();
  document.getElementById("logo").src = logoTime();
  document.getElementById("logo").onerror = function(){this.src="logo-liga.jfif"};
  document.getElementById("info").textContent = cidadeTime() || categoriasTime() || "Liga Goiana de Futebol de Base";
  document.title = nomeTime() + " - Liga Goiana";
}

function setActive(){
  document.getElementById("tabTemporada").classList.toggle("ativo",principal==="temporada");
  document.getElementById("tabBuzz").classList.toggle("ativo",principal==="buzz");
  document.getElementById("tabElenco").classList.toggle("ativo",principal==="elenco");
}

function montarSubtabs(){
  const box = document.getElementById("subTabs");

  const tabs = principal === "temporada"
    ? [["detalhes","Detalhes"],["jogos","Jogos"],["classificacao","Classificação"],["estatisticas","Estatísticas"],["titulos","Títulos"]]
    : principal === "buzz"
      ? [["noticias","Notícias"],["chat","Chat"],["destaques","Destaques"]]
      : [["elenco","Elenco"],["gestao","Gestão"],["estatisticasElenco","Estatísticas"]];

  if(!tabs.some(t=>t[0] === sub)) sub = tabs[0][0];

  box.innerHTML = tabs.map(t=>`
    <button class="${sub===t[0]?"ativo":""}" onclick="trocarSub('${t[0]}')">${t[1]}</button>
  `).join("");
}

function cardDetalhes(){
  const st = calcularStats();
  const elenco = jogadoresDoTime();

  return `
    <div class="grid-main">
      <section class="card">
        <div class="card-title">Detalhes do time</div>

        <div class="details-main">
          <div class="person-box">
            <img src="${logoTime()}" onerror="this.src='logo-liga.jfif'">
            <strong>${nomeTime()}</strong>
            <span>${cidadeTime() || "Cidade não cadastrada"}</span>
          </div>

          <div class="person-box">
            <img src="logo-liga.jfif">
            <strong>${categoriasTime() || "Categoria"}</strong>
            <span>Competição principal</span>
          </div>

          <div class="person-box round">
            <img src="logo-liga.jfif">
            <strong>${tecnicoPrincipal()}</strong>
            <span>Técnico</span>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-box"><strong>${elenco.length}</strong><span>Jogadores</span></div>
          <div class="stat-box"><strong>${st.jogos}</strong><span>Jogos</span></div>
          <div class="stat-box"><strong>${st.vitorias}</strong><span>Vitórias</span></div>
          <div class="stat-box"><strong>${st.saldo}</strong><span>Saldo</span></div>
          <div class="stat-box"><strong>${st.pontos}</strong><span>Pontos</span></div>
        </div>
      </section>

      <section class="card">
        <div class="card-title">Últimas partidas</div>
        <div class="match-strip">
          ${jogosDoTime().slice(0,5).map(j=>`
            <div class="match-mini">
              <small>${dataBR(campo(j,["data","dataJogo"],""))}</small>
              <strong>${campo(j,["timeB","visitante","timeA","mandante"],"-")}</strong>
              <span class="badge-score">${placarA(j)} - ${placarB(j)}</span>
            </div>
          `).join("") || `<div class="empty">Nenhum jogo.</div>`}
        </div>
        <a class="link-more" href="#" onclick="trocarSub('jogos');return false;">Ver todos os jogos</a>
      </section>
    </div>

    <div class="grid-main">
      ${cardEstatisticas(true)}
      ${cardElencoDestaque()}
    </div>

    <section class="card">
      <div class="card-title">Informações do time</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-icon"><i class="fa-solid fa-shield"></i></div><div><strong>Nome completo</strong><span>${nomeTime()}</span></div></div>
        <div class="info-item"><div class="info-icon"><i class="fa-solid fa-location-dot"></i></div><div><strong>Cidade</strong><span>${cidadeTime() || "-"}</span></div></div>
        <div class="info-item"><div class="info-icon"><i class="fa-solid fa-layer-group"></i></div><div><strong>Categorias</strong><span>${categoriasTime() || "-"}</span></div></div>
        <div class="info-item"><div class="info-icon"><i class="fa-solid fa-user-tie"></i></div><div><strong>Técnico</strong><span>${tecnicoPrincipal()}</span></div></div>
      </div>
    </section>

    <section class="card">
      <div class="card-title">Títulos conquistados</div>
      <div class="trophy-grid">
        <div class="trophy-card"><i class="fa-solid fa-trophy"></i><strong>Campeonatos</strong><span>0</span></div>
        <div class="trophy-card"><i class="fa-solid fa-medal"></i><strong>Copas</strong><span>0</span></div>
        <div class="trophy-card"><i class="fa-solid fa-award"></i><strong>Prêmios</strong><span>0</span></div>
        <div class="trophy-card"><i class="fa-solid fa-star"></i><strong>Destaques</strong><span>0</span></div>
      </div>
    </section>
  `;
}

function cardJogos(){
  const lista = jogosDoTime();

  if(!lista.length){
    return `<section class="card"><div class="empty">Nenhum jogo cadastrado para este time.</div></section>`;
  }

  return `
    <section class="card">
      <div class="card-title">Jogos</div>
      ${lista.map(j=>`
        <div class="match-card">
          <div class="match-head">
            <span>${campo(j,["campeonato","nomeCampeonato"],"Competição")}</span>
            <span>${dataBR(campo(j,["data","dataJogo"],""))}</span>

function grupoPosicao(j){
  const pos = normalizar(campo(j,["posicao","posição","funcao"],""));
  if(pos.includes("goleiro")) return "Goleiros";
  if(pos.includes("zagueiro") || pos.includes("lateral") || pos.includes("defensor")) return "Defensores";
  if(pos.includes("volante") || pos.includes("meia") || pos.includes("camp")) return "Meio-campistas";
  if(pos.includes("atac") || pos.includes("ponta") || pos.includes("centroavante")) return "Atacantes";
  return "Elenco";
}

function cardElenco(){
  const lista = jogadoresDoTime();

  if(!lista.length){
    return `<section class="card"><div class="empty">Nenhum jogador cadastrado para este time.</div></section>`;
  }

  const grupos = {};

  lista.forEach(j=>{
    const g = grupoPosicao(j);
    if(!grupos[g]) grupos[g] = [];
    grupos[g].push(j);
  });

  return Object.keys(grupos).map(g=>`
    <section class="card">
      <div class="position-title">${g}</div>

      ${grupos[g].map((j,idx)=>`
        <div class="list-row">
          <div class="rank">${campo(j,["numero","camisa"],idx+1)}</div>
          <img src="${campo(j,["foto","fotoPerfil","imagem"],"logo-liga.jfif")}" onerror="this.src='logo-liga.jfif'">

          <div class="list-main">
            <strong>${campo(j,["nome","nomeCompleto"],"Jogador")}</strong>
            <span>${campo(j,["posicao","posição","funcao"],"Jogador")}</span>
          </div>

          <div class="list-value">${Number(campo(j,["gols"],0))}</div>
        </div>
      `).join("")}
    </section>
  `).join("");
}

function render(){
  renderHeader();
  setActive();
  montarSubtabs();

  let html = "";

  if(principal === "temporada"){
    if(sub === "detalhes") html = cardDetalhes();
    if(sub === "jogos") html = cardJogos();
    if(sub === "classificacao") html = cardClassificacao();
    if(sub === "estatisticas") html = cardEstatisticas();
    if(sub === "titulos") html = cardTitulos();
  }

  if(principal === "buzz"){
    html = cardBuzz();
  }

  if(principal === "elenco"){
    if(sub === "gestao") html = cardGestao();
    else if(sub === "estatisticasElenco") html = cardEstatisticas();
    else html = cardGestao() + cardElenco();
  }

  document.getElementById("conteudo").innerHTML = html;
}

window.trocarPrincipal = function(n){
  principal = n;
  sub = n === "temporada" ? "detalhes" : n === "buzz" ? "noticias" : "elenco";
  render();
};

window.trocarSub = function(n){
  sub = n;
  render();
};

async function carregarTime(){
  if(!id){
    document.getElementById("conteudo").innerHTML = `<section class="card"><div class="empty">Time não encontrado.</div></section>`;
    return;
  }

  const snap = await getDoc(doc(db,"times",id));

  if(!snap.exists()){
    document.getElementById("conteudo").innerHTML = `<section class="card"><div class="empty">Time não encontrado.</div></section>`;
    return;
  }

  time = {id:snap.id,...snap.data()};
  render();
}

onSnapshot(collection(db,"jogadores"), snap=>{
  jogadores = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

onSnapshot(collection(db,"jogos"), snap=>{
  jogos = snap.docs.map(d=>({id:d.id,...d.data()}));

});

onSnapshot(collection(db,"tecnicos"), snap=>{

});

carregarTime();
