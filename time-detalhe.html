<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detalhe do Time - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --yellow:#7a5a00;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.hero-time{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
  text-align:center;
}

.top-icons{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.icon-btn{
  width:42px;
  height:42px;
  border-radius:50%;
  background:rgba(255,255,255,.06);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  border:1px solid rgba(255,255,255,.08);
}

.top-right{
  display:flex;
  gap:8px;
}

.team-logo{
  width:92px;
  height:92px;
  border-radius:50%;
  object-fit:contain;
  background:#fff;
  border:3px solid var(--gold);
  margin:0 auto 10px;
  box-shadow:0 10px 24px rgba(0,0,0,.28);
}

.team-name{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  text-transform:uppercase;
  line-height:1.15;
}

.team-sub{
  color:var(--muted);
  font-size:14px;
  margin-top:6px;
}

.main-tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:18px;
}

.main-tabs button{
  background:rgba(13,35,70,.95);
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px 8px;
  font-size:15px;
  font-weight:900;
  transition:.25s ease;
}

.main-tabs button.ativo{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.sub-tabs{
  display:flex;
  gap:8px;
  overflow-x:auto;
  margin-bottom:14px;
  padding-bottom:4px;
  scrollbar-width:none;
}

.sub-tabs::-webkit-scrollbar{display:none}

.sub-tabs button{
  flex:0 0 auto;
  background:rgba(13,35,70,.95);
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
  border-radius:999px;
  padding:9px 14px;
  font-size:13px;
  font-weight:900;
  white-space:nowrap;
}

.sub-tabs button.ativo{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.card{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  margin-bottom:14px;
}

.card-title{
  color:var(--gold);
  font-size:20px;
  font-weight:900;
  margin-bottom:12px;
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.stat-box{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:12px 8px;
  text-align:center;
}

.stat-box strong{
  display:block;
  color:var(--gold);
  font-size:23px;
  margin-bottom:4px;
}

.stat-box span{
  color:var(--muted);
  font-size:12px;
  font-weight:800;
}

.details-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.detail-box{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:14px;
  text-align:center;
}

.detail-box img{
  width:72px;
  height:72px;
  border-radius:50%;
  object-fit:cover;
  background:#fff;
  margin:0 auto 8px;
  border:2px solid var(--gold);
}

.detail-box strong{
  display:block;
  color:#fff;
  font-size:17px;
}

.detail-box span{
  color:var(--muted);
  font-size:13px;
  display:block;
  margin-top:4px;
}

.list-row{
  display:grid;
  grid-template-columns:52px 1fr auto;
  gap:10px;
  align-items:center;
  padding:12px 0;
  border-top:1px solid rgba(255,255,255,.08);
}

.list-row:first-child{border-top:none}

.list-row img{
  width:48px;
  height:48px;
  border-radius:50%;
  object-fit:cover;
  background:#fff;
  border:1px solid rgba(247,198,0,.45);
}

.list-main strong{
  display:block;
  color:#fff;
  font-size:15px;
}

.list-main span{
  display:block;
  color:var(--muted);
  font-size:12px;
  margin-top:3px;
}

.list-value{
  color:var(--gold);
  font-size:18px;
  font-weight:900;
}

.match-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}

.match-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  color:var(--muted);
  font-size:12px;
  font-weight:900;
  margin-bottom:10px;
}

.match-line{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:10px;
  text-align:center;
  color:#fff;
  font-weight:900;
  font-size:14px;
}

.score{
  color:var(--gold);
  font-size:22px;
}

.tabela{
  width:100%;
  border-collapse:collapse;
  overflow:hidden;
}

.tabela th,
.tabela td{
  padding:10px 8px;
  border-bottom:1px solid rgba(255,255,255,.08);
  text-align:left;
  font-size:13px;
}

.tabela th{
  color:var(--gold);
  font-size:12px;
}

.tabela td{
  color:var(--muted);
}

.position-title{
  background:rgba(247,198,0,.12);
  color:var(--gold);
  padding:10px 12px;
  border-radius:12px;
  font-size:15px;
  font-weight:900;
  margin-bottom:8px;
}

.empty{
  color:var(--muted);
  text-align:center;
  padding:18px;
}

@media(max-width:700px){
  .wrap{
    width:min(100% - 18px, var(--max));
  }

  .container{
    padding:16px 0 28px;
  }

  .hero-time{
    padding:14px;
  }

  .team-logo{
    width:76px;
    height:76px;
  }

  .team-name{
    font-size:22px;
  }

  .main-tabs{
    gap:6px;
  }

  .main-tabs button{
    font-size:13px;
    padding:10px 5px;
  }

  .stats-grid{
    grid-template-columns:repeat(2,1fr);
  }

  .details-grid{
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  .detail-box{
    padding:10px 6px;
  }

  .detail-box img{
    width:58px;
    height:58px;
  }

  .match-line{
    font-size:12px;
    gap:6px;
  }

  .score{
    font-size:19px;
  }
}
</style>
</head>

<script type="module">
import { renderMenu } from "./menu.js";
renderMenu("times");
</script>

<main class="wrap container">

  <section class="hero-time">
    <div class="top-icons">
      <button class="icon-btn" onclick="history.back()" title="Voltar">
        <i class="fa-solid fa-arrow-left"></i>
      </button>

      <div class="top-right">
        <button class="icon-btn" title="Notificações"><i class="fa-regular fa-bell"></i></button>
        <button class="icon-btn" title="Favorito"><i class="fa-regular fa-star"></i></button>
        <button class="icon-btn" onclick="compartilharTime()" title="Compartilhar"><i class="fa-solid fa-share-nodes"></i></button>
      </div>
    </div>

    <img id="logo" class="team-logo" src="logo-liga.jfif">
    <div class="team-name" id="nome">Carregando...</div>
    <div class="team-sub" id="info">Liga Goiana de Futebol de Base</div>

    <nav class="main-tabs">
      <button id="tabTemporada" class="ativo" onclick="trocarPrincipal('temporada')">Temporada</button>
      <button id="tabBuzz" onclick="trocarPrincipal('buzz')">Buzz</button>
      <button id="tabElenco" onclick="trocarPrincipal('elenco')">Elenco</button>
    </nav>
  </section>

  <div id="subTabs" class="sub-tabs"></div>
  <div id="conteudo"></div>

</main>

<script type="module">
import { db } from "./firebase.js";
import {
  doc,
  getDoc,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const id = new URLSearchParams(location.search).get("id");

let time = {};
let jogadores = [];
let jogos = [];
let tecnicos = [];
let principal = "temporada";
let sub = "detalhes";

function campo(obj, chaves, padrao=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== "") return obj[c];
  }
  return padrao;
}

function normalizar(t){
  return String(t || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function nomeTime(){
  return campo(time,["nome","nomeTime","timeNome"],"Time");
}

function logoTime(){
  return campo(time,["logo","escudo","imagem","foto"],"logo-liga.jfif");
}

function cidadeTime(){
  return campo(time,["cidade","municipio","local"],"");
}

function categoriasTime(){
  const arr = campo(time,["categorias"],[]);
  if(Array.isArray(arr) && arr.length) return arr.join(", ");
  return campo(time,["categoria","categoriaNome"],"");
}

function tecnicoPrincipal(){
  const tecnicoPorTime = tecnicos.find(t=>{
    const tid = campo(t,["timeId"],"");
    const tnome = normalizar(campo(t,["time","nomeTime","timeNome"],""));
    return tid === id || tnome === normalizar(nomeTime());
  });
  return campo(tecnicoPorTime || time,["nome","tecnico","tecnicoNome","treinador"],"Técnico não cadastrado");
}

function jogadoresDoTime(){
  const nome = normalizar(nomeTime());
  return jogadores.filter(j=>{
    return campo(j,["timeId"],"") === id ||
      normalizar(campo(j,["time","nomeTime","timeNome"],"")) === nome;
  });
}

function jogosDoTime(){
  const nome = normalizar(nomeTime());
  return jogos.filter(j=>{
    const timeA = normalizar(campo(j,["timeA","mandante","timeMandante","nomeTimeA"],""));
    const timeB = normalizar(campo(j,["timeB","visitante","timeVisitante","nomeTimeB"],""));
    return timeA === nome || timeB === nome;
  });
}

function placarA(j){
  return Number(campo(j,["golsA","placarA","golsMandante","mandanteGols"],0));
}

function placarB(j){
  return Number(campo(j,["golsB","placarB","golsVisitante","visitanteGols"],0));
}

function calcularStats(){
  let jogosQtd = 0, vitorias = 0, empates = 0, derrotas = 0, gp = 0, gc = 0;
  const nome = normalizar(nomeTime());

  jogosDoTime().forEach(j=>{
    jogosQtd++;
    const a = placarA(j);
    const b = placarB(j);
    const ehA = normalizar(campo(j,["timeA","mandante","timeMandante","nomeTimeA"],"")) === nome;

    const golsPro = ehA ? a : b;
    const golsContra = ehA ? b : a;

    gp += golsPro;
    gc += golsContra;

    if(golsPro > golsContra) vitorias++;
    else if(golsPro === golsContra) empates++;
    else derrotas++;
  });

  return {
    jogos:jogosQtd,
    vitorias,
    empates,
    derrotas,
    gols:gp,
    golsContra:gc,
    saldo:gp-gc,
    pontos:vitorias*3+empates
  };
}

function dataBR(v){
  if(!v) return "-";
  const d = new Date(v);
  if(isNaN(d.getTime())) return String(v);
  return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
}

function renderHeader(){
  document.getElementById("nome").textContent = nomeTime();
  document.getElementById("logo").src = logoTime();
  document.getElementById("logo").onerror = function(){this.src="logo-liga.jfif"};
  document.getElementById("info").textContent = cidadeTime() || categoriasTime() || "Liga Goiana de Futebol de Base";
  document.title = nomeTime() + " - Liga Goiana";
}

function setActive(){
  document.getElementById("tabTemporada").classList.toggle("ativo",principal==="temporada");
  document.getElementById("tabBuzz").classList.toggle("ativo",principal==="buzz");
  document.getElementById("tabElenco").classList.toggle("ativo",principal==="elenco");
}

function montarSubtabs(){
  const box = document.getElementById("subTabs");

  const tabs = principal === "temporada"
    ? [["detalhes","Detalhes"],["jogos","Jogos"],["classificacao","Classificação"],["estatisticas","Estatísticas"],["titulos","Títulos"]]
    : principal === "buzz"
      ? [["noticias","Notícias"],["chat","Chat"],["destaques","Destaques"]]
      : [["elenco","Elenco"],["gestao","Gestão"],["estatisticasElenco","Estatísticas"]];

  if(!tabs.some(t=>t[0] === sub)) sub = tabs[0][0];

  box.innerHTML = tabs.map(t=>`
    <button class="${sub===t[0]?"ativo":""}" onclick="trocarSub('${t[0]}')">${t[1]}</button>
  `).join("");
}

function cardDetalhes(){
  const st = calcularStats();
  const elenco = jogadoresDoTime();

  return `
    <section class="card">
      <div class="card-title">Detalhes do Time</div>

      <div class="details-grid">
        <div class="detail-box">
          <img src="${logoTime()}" onerror="this.src='logo-liga.jfif'">
          <strong>${nomeTime()}</strong>
          <span>${categoriasTime() || "Categoria"}</span>
        </div>

        <div class="detail-box">
          <img src="logo-liga.jfif">
          <strong>${tecnicoPrincipal()}</strong>
          <span>Técnico</span>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-title">Resumo da Temporada</div>

      <div class="stats-grid">
        <div class="stat-box"><strong>${elenco.length}</strong><span>Jogadores</span></div>
        <div class="stat-box"><strong>${st.jogos}</strong><span>Jogos</span></div>
        <div class="stat-box"><strong>${st.vitorias}</strong><span>Vitórias</span></div>
        <div class="stat-box"><strong>${st.pontos}</strong><span>Pontos</span></div>
      </div>
    </section>
  `;
}

function cardJogos(){
  const lista = jogosDoTime();

  if(!lista.length){
    return `<section class="card"><div class="empty">Nenhum jogo cadastrado para este time.</div></section>`;
  }

  return `
    <section class="card">
      <div class="card-title">Jogos</div>
      ${lista.map(j=>`
        <div class="match-card">
          <div class="match-head">
            <span>${campo(j,["campeonato","nomeCampeonato"],"Competição")}</span>
            <span>${dataBR(campo(j,["data","dataJogo"],""))}</span>
          </div>

          <div class="match-line">
            <div>${campo(j,["timeA","mandante"],"-")}</div>
            <div class="score">${placarA(j)} x ${placarB(j)}</div>
            <div>${campo(j,["timeB","visitante"],"-")}</div>
          </div>
        </div>
      `).join("")}
    </section>
  `;
}

function cardClassificacao(){
  const st = calcularStats();

  return `
    <section class="card">
      <div class="card-title">Classificação</div>

      <table class="tabela">
        <tr>
          <th>Time</th>
          <th>J</th>
          <th>V</th>
          <th>E</th>
          <th>D</th>
          <th>SG</th>
          <th>P</th>
        </tr>

        <tr>
          <td>${nomeTime()}</td>
          <td>${st.jogos}</td>
          <td>${st.vitorias}</td>
          <td>${st.empates}</td>
          <td>${st.derrotas}</td>
          <td>${st.saldo}</td>
          <td>${st.pontos}</td>
        </tr>
      </table>
    </section>
  `;
}

function cardEstatisticas(){
  const st = calcularStats();

  return `
    <section class="card">
      <div class="card-title">Estatísticas</div>

      <div class="stats-grid">
        <div class="stat-box"><strong>${st.gols}</strong><span>Gols Pró</span></div>
        <div class="stat-box"><strong>${st.golsContra}</strong><span>Gols Contra</span></div>
        <div class="stat-box"><strong>${st.saldo}</strong><span>Saldo</span></div>
        <div class="stat-box"><strong>${st.jogos ? (st.gols/st.jogos).toFixed(1) : "0"}</strong><span>Média de Gols</span></div>
      </div>
    </section>
  `;
}

function cardTitulos(){
  return `
    <section class="card">
      <div class="card-title">Títulos</div>
      <div class="empty">Títulos ainda não cadastrados para este time.</div>
    </section>
  `;
}

function grupoPosicao(j){
  const pos = normalizar(campo(j,["posicao","posição","funcao"],""));
  if(pos.includes("goleiro")) return "Goleiros";
  if(pos.includes("zagueiro") || pos.includes("lateral") || pos.includes("defensor")) return "Defensores";
  if(pos.includes("volante") || pos.includes("meia") || pos.includes("camp")) return "Meio-campistas";
  if(pos.includes("atac") || pos.includes("ponta") || pos.includes("centroavante")) return "Atacantes";
  return "Elenco";
}

function cardElenco(){
  const lista = jogadoresDoTime();

  if(!lista.length){
    return `<section class="card"><div class="empty">Nenhum jogador cadastrado para este time.</div></section>`;
  }

  const grupos = {};

  lista.forEach(j=>{
    const g = grupoPosicao(j);
    if(!grupos[g]) grupos[g] = [];
    grupos[g].push(j);
  });

  return Object.keys(grupos).map(g=>`
    <section class="card">
      <div class="position-title">${g}</div>

      ${grupos[g].map(j=>`
        <div class="list-row">
          <img src="${campo(j,["foto","fotoPerfil","imagem"],"logo-liga.jfif")}" onerror="this.src='logo-liga.jfif'">

          <div class="list-main">
            <strong>${campo(j,["nome","nomeCompleto"],"Jogador")}</strong>
            <span>${campo(j,["posicao","posição","funcao"],"Jogador")}</span>
          </div>

          <div class="list-value">${campo(j,["numero","camisa"],"")}</div>
        </div>
      `).join("")}
    </section>
  `).join("");
}

function cardGestao(){
  return `
    <section class="card">
      <div class="card-title">Gestão</div>

      <div class="list-row">
        <img src="logo-liga.jfif">
        <div class="list-main">
          <strong>${tecnicoPrincipal()}</strong>
          <span>Técnico</span>
        </div>
        <div></div>
      </div>
    </section>
  `;
}

function cardBuzz(){
  return `
    <section class="card">
      <div class="card-title">${sub === "chat" ? "Chat" : sub === "destaques" ? "Destaques" : "Notícias"}</div>
      <div class="empty">Área preparada para ${sub === "chat" ? "chat do time" : sub === "destaques" ? "destaques do time" : "notícias do time"}.</div>
    </section>
  `;
}

function render(){
  renderHeader();
  setActive();
  montarSubtabs();

  let html = "";

  if(principal === "temporada"){
    if(sub === "detalhes") html = cardDetalhes();
    if(sub === "jogos") html = cardJogos();
    if(sub === "classificacao") html = cardClassificacao();
    if(sub === "estatisticas") html = cardEstatisticas();
    if(sub === "titulos") html = cardTitulos();
  }

  if(principal === "buzz"){
    html = cardBuzz();
  }

  if(principal === "elenco"){
    if(sub === "gestao") html = cardGestao();
    else if(sub === "estatisticasElenco") html = cardEstatisticas();
    else html = cardGestao() + cardElenco();
  }

  document.getElementById("conteudo").innerHTML = html;
}

window.trocarPrincipal = function(n){
  principal = n;
  sub = n === "temporada" ? "detalhes" : n === "buzz" ? "noticias" : "elenco";
  render();
};

window.trocarSub = function(n){
  sub = n;
  render();
};

window.compartilharTime = function(){
  const url = location.href;

  if(navigator.share){
    navigator.share({title:nomeTime(),url});
  }else{
    navigator.clipboard.writeText(url);
    alert("Link copiado!");
  }
};

async function carregarTime(){
  if(!id){
