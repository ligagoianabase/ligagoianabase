<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Time Detalhe - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --azul-fundo:#020b1a;
  --azul:#061d44;
  --azul2:#08285c;
  --azul3:#0d3578;
  --azul-card:#071d37;
  --azul-card2:#0d2a52;
  --dourado:#f7c600;
  --dourado2:#ffe45c;
  --branco:#ffffff;
  --texto:#dfe8f7;
  --muted:#9fb0c9;
  --linha:rgba(255,255,255,.10);
  --linha-dourada:rgba(247,198,0,.35);
  --verde:#38b449;
  --vermelho:#df3434;
  --amarelo:#ffc400;
  --sombra:0 18px 42px rgba(0,0,0,.42);
  --max:1420px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.82), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--branco);
  min-height:100vh;
  overflow-x:hidden;
}

button{
  font-family:inherit;
  border:none;
  background:none;
  color:inherit;
  cursor:pointer;
}

a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}

.time-page{
  width:min(100% - 34px, var(--max));
  margin:0 auto;
  padding:12px 0 44px;
}

.time-layout{
  display:grid;
  grid-template-columns:1fr;
  gap:22px;
  align-items:start;
}

/* HERO */
.team-hero{
  background:
    linear-gradient(rgba(5,20,48,.35),rgba(5,20,48,.88)),
    url("fundo.png") center/cover no-repeat;
  border:1px solid var(--linha-dourada);
  border-radius:24px 24px 0 0;
  overflow:hidden;
  box-shadow:var(--sombra);
}

.team-hero-top{
  text-align:center;
  padding:30px 18px 25px;
}

.team-logo{
  width:130px;
  height:130px;
  object-fit:contain;
  background:#fff;
  border:3px solid var(--dourado);
  border-radius:28px;
  padding:8px;
  margin:0 auto 15px;
  box-shadow:0 15px 35px rgba(0,0,0,.42);
}

.team-name{
  font-size:44px;
  font-weight:1000;
  text-transform:uppercase;
  line-height:1.05;
  color:#fff;
  text-shadow:0 4px 0 rgba(0,0,0,.35);
}

.team-city{
  color:#fff;
  font-size:20px;
  font-weight:700;
  margin-top:9px;
}

/* ABAS */
.main-tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  background:rgba(7,29,55,.91);
  border-top:1px solid rgba(255,255,255,.08);
}

.main-tabs button{
  padding:18px 8px 15px;
  color:#fff;
  font-size:21px;
  font-weight:1000;
  text-transform:uppercase;
  border-bottom:4px solid transparent;
}

.main-tabs button.ativo{
  color:var(--dourado);
  border-bottom-color:var(--dourado);
}

.sub-tabs{
  display:flex;
  gap:8px;
  align-items:center;
  overflow-x:auto;
  scrollbar-width:none;
  background:rgba(13,42,82,.97);
  border:1px solid rgba(255,255,255,.08);
  border-radius:0 0 13px 13px;
  padding:13px 14px;
  margin-bottom:14px;
}

.sub-tabs::-webkit-scrollbar{display:none}

.sub-tabs button{
  flex:1;
  min-width:112px;
  color:var(--muted);
  font-size:15px;
  font-weight:900;
  padding:9px 13px;
  border-radius:999px;
  white-space:nowrap;
}

.sub-tabs button.ativo{
  color:var(--dourado);
  outline:2px solid var(--dourado);
  background:rgba(247,198,0,.11);
}

/* CARDS */
.card-time{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.09), transparent 34%),
    linear-gradient(180deg,rgba(13,42,82,.97),rgba(7,29,55,.98));
  border:1px solid rgba(247,198,0,.20);
  border-radius:16px;
  box-shadow:0 10px 24px rgba(0,0,0,.30);
  margin-bottom:14px;
  overflow:hidden;
}

.card-title{
  font-size:21px;
  font-weight:1000;
  padding:18px 22px 12px;
}

.card-body{
  padding:18px 22px;
}

/* DETALHES */
.details-main{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  border-bottom:1px solid rgba(255,255,255,.16);
  padding-bottom:20px;
}

.person-box{
  text-align:center;
  padding:12px 18px;
  border-right:1px solid rgba(255,255,255,.16);
}

.person-box:last-child{border-right:0}

.person-box img{
  width:96px;
  height:96px;
  object-fit:contain;
  background:#fff;
  border-radius:24px;
  border:2px solid var(--dourado);
  margin:0 auto 10px;
}

.person-box.round img{
  border-radius:50%;
  object-fit:cover;
}

.person-box strong{
  display:block;
  font-size:19px;
  line-height:1.18;
  font-weight:1000;
}

.person-box span{
  display:block;
  color:var(--muted);
  font-size:14px;
  margin-top:5px;
}

.bottom-stats{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-top:18px;
}

.mini-stat{
  text-align:center;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:12px 8px;
}

.mini-stat strong{
  display:block;
  color:#fff;
  font-size:26px;
  line-height:1;
  font-weight:1000;
}

.mini-stat span{
  display:block;
  color:var(--muted);
  margin-top:5px;
  font-size:13px;
}

/* ÚLTIMAS PARTIDAS */
.matches-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.match-mini{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:12px 8px;
  text-align:center;
}

.match-mini small{
  color:#fff;
  font-weight:800;
  font-size:13px;
}

.match-mini img{
  width:50px;
  height:50px;
  object-fit:contain;
  margin:9px auto;
}

.match-mini strong{
  display:block;
  color:#fff;
  font-size:18px;
}

.score-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:76px;
  margin-top:9px;
  padding:5px 12px;
  border-radius:999px;
  border:2px solid var(--verde);
  color:#fff;
  font-weight:1000;
}

.result-dot{
  display:inline-flex;
  width:22px;
  height:22px;
  border-radius:50%;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:11px;
  font-weight:1000;
  margin-top:8px;
}

.win{background:var(--verde)}
.draw{background:var(--amarelo);color:#111}
.loss{background:var(--vermelho)}

.link-more{
  display:block;
  text-align:center;
  color:var(--dourado);
  font-weight:1000;
  font-size:14px;
  padding-top:14px;
  margin-top:12px;
  border-top:1px solid rgba(255,255,255,.10);
}

/* RANKINGS */
.two-col{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.small-tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  border-bottom:1px solid rgba(255,255,255,.12);
  padding:0 0 12px;
  margin-bottom:8px;
}

.small-tabs span{
  text-align:center;
  color:var(--muted);
  font-size:14px;
  font-weight:900;
  padding-bottom:8px;
}

.small-tabs span:first-child{
  color:var(--dourado);
  border-bottom:2px solid var(--dourado);
}

.rank-row{
  display:grid;
  grid-template-columns:26px 56px 1fr auto;
  gap:10px;
  align-items:center;
  padding:13px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.rank-row:last-child{border-bottom:0}

.rank-number{
  color:#fff;
  font-weight:1000;
  font-size:15px;
}

.rank-row img{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
  background:#fff;
  border:1px solid rgba(247,198,0,.40);
}

.rank-info strong{
  display:block;
  color:#fff;
  font-size:16px;
  font-weight:1000;
}

.rank-info span{
  display:block;
  color:var(--muted);
  margin-top:3px;
  font-size:13px;
}

.rank-value{
  color:#fff;
  font-size:24px;
  font-weight:1000;
}

/* INFO TIME */
.extra-details{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:16px;
  align-items:stretch;
}

.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.info-item{
  display:grid;
  grid-template-columns:36px 1fr;
  gap:10px;
  align-items:center;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:12px;
}

.info-icon{
  width:36px;
  height:36px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--dourado),var(--dourado2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
}

.info-item small{
  color:var(--muted);
  display:block;
  font-weight:800;
}

.info-item strong{
  color:#fff;
  display:block;
  margin-top:2px;
  font-size:13px;
}

.shirt-box{
  min-height:220px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at center, rgba(247,198,0,.18), transparent 42%),
    linear-gradient(135deg,rgba(8,35,75,.75),rgba(5,18,43,.8));
  display:flex;
  align-items:center;
  justify-content:center;
}

.shirt{
  width:150px;
  height:190px;
  border-radius:22px 22px 35px 35px;
  background:
    repeating-linear-gradient(90deg,#111 0 24px,#f7c600 24px 48px);
  box-shadow:0 20px 40px rgba(0,0,0,.35);
  border:3px solid rgba(255,255,255,.18);
  position:relative;
}

.shirt:before{
  content:"";
  position:absolute;
  left:50%;
  top:14px;
  width:48px;
  height:30px;
  transform:translateX(-50%);
  background:#111;
  border-radius:0 0 22px 22px;
}

/* TÍTULOS */
.trophy-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.trophy-card{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:14px 10px;
  text-align:center;
}

.trophy-card i{
  color:var(--dourado);
  font-size:32px;
  margin-bottom:8px;
}

.trophy-card small{
  display:block;
  color:#fff;
  min-height:32px;
}

.trophy-card strong{
  display:block;
  color:var(--dourado);
  font-size:34px;
  margin-top:4px;
}

/* OUTRAS ABAS */
.full-match{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  margin-bottom:10px;
  overflow:hidden;
}

.full-match-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  background:rgba(0,0,0,.16);
  padding:12px 14px;
  color:var(--muted);
  font-weight:900;
  font-size:13px;
}

.full-match-line{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:14px;
  align-items:center;
  text-align:center;
  padding:18px 14px;
  font-weight:1000;
  color:#fff;
}

.full-score{
  color:var(--dourado);
  font-size:28px;
}

.table-wrap{overflow:auto}

.class-table{
  width:100%;
  border-collapse:collapse;
  min-width:720px;
}

.class-table th,
.class-table td{
  padding:12px 10px;
  border-bottom:1px solid rgba(255,255,255,.08);
  text-align:left;
}

.class-table th{
  color:var(--dourado);
  font-size:12px;
}

.class-table td{
  color:#fff;
  font-size:14px;
}

.position-title{
  background:rgba(247,198,0,.12);
  color:var(--dourado);
  padding:12px 14px;
  border-radius:12px;
  margin:8px 0;
  font-weight:1000;
}

.news-box{
  min-height:245px;
  border-radius:18px;
  border:1px solid var(--linha-dourada);
  background:
    linear-gradient(rgba(8,23,44,.15), rgba(8,23,44,.95)),
    url("fundo.png") center/cover no-repeat;
  display:flex;
  align-items:flex-end;
  padding:22px;
  margin-bottom:14px;
}

.news-box h3{
  font-size:26px;
  margin:0 0 8px;
}

.empty-box{
  color:var(--muted);
  text-align:center;
  padding:20px;
}

/* RESPONSIVO REAL */
@media(max-width:1100px){
  .time-layout{grid-template-columns:1fr}
  .phone-preview{display:none}
}

@media(max-width:720px){
  .time-page{
    width:min(100% - 18px, var(--max));
    padding-top:10px;
  }

  .team-hero{border-radius:18px 18px 0 0}
  .team-hero-top{padding:18px 12px 15px}
  .team-logo{width:88px;height:88px;border-radius:20px}
  .team-name{font-size:26px}
  .team-city{font-size:14px}
  .main-tabs button{font-size:13px;padding:13px 4px 10px}
  .sub-tabs{padding:10px}
  .sub-tabs button{flex:0 0 auto;min-width:auto;font-size:12px;padding:8px 12px}
  .details-main{grid-template-columns:1fr}
  .person-box{border-right:0;border-bottom:1px solid rgba(255,255,255,.12)}
  .person-box:last-child{border-bottom:0}
  .bottom-stats{grid-template-columns:repeat(3,1fr)}
  .matches-row{grid-template-columns:repeat(2,1fr)}
  .two-col,
  .extra-details,
  .info-grid,
  .trophy-grid{grid-template-columns:1fr}
  .card-title{font-size:18px;padding:16px 14px 10px}
  .card-body{padding:14px}
  .rank-row{grid-template-columns:24px 46px 1fr auto}
  .rank-value{font-size:18px}
}
</style>
</head>

<body>

<script type="module">
import { renderMenu } from "./menu.js";
renderMenu("times");
</script>

<main class="time-page">
  <section class="time-layout">
    <div id="desktopArea"></div>
  </section>
</main>

<script type="module">
import { db } from "./firebase.js";
import {
  doc,
  getDoc,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const id = new URLSearchParams(location.search).get("id");

let time = {};
let jogadores = [];
let jogos = [];
let tecnicos = [];
let principal = "temporada";
let sub = "detalhes";

function campo(obj, chaves, padrao=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== "") return obj[c];
  }
  return padrao;
}

function normalizar(t){
  return String(t || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function nomeTime(){
  return campo(time,["nome","nomeTime","timeNome"],"Time");
}

function logoTime(){
  return campo(time,["logo","escudo","imagem","foto"],"logo-liga.jfif");
}

function cidadeTime(){
  return campo(time,["cidade","municipio","local"],"");
}

function categoriasTime(){
  const arr = campo(time,["categorias"],[]);
  if(Array.isArray(arr) && arr.length) return arr.join(", ");
  return campo(time,["categoria","categoriaNome"],"");
}

function tecnicoPrincipal(){
  const tecnicoPorTime = tecnicos.find(t=>{
    const tid = campo(t,["timeId"],"");
    const tnome = normalizar(campo(t,["time","nomeTime","timeNome"],""));
    return tid === id || tnome === normalizar(nomeTime());
  });
  return campo(tecnicoPorTime || time,["nome","tecnico","tecnicoNome","treinador"],"");
}

function jogadoresDoTime(){
  const nome = normalizar(nomeTime());
  return jogadores.filter(j=>{
    return campo(j,["timeId"],"") === id ||
      normalizar(campo(j,["time","nomeTime","timeNome"],"")) === nome;
  });
}

function jogosDoTime(){
  const nome = normalizar(nomeTime());
  return jogos.filter(j=>{
    const timeA = normalizar(campo(j,["timeA","mandante","timeMandante","nomeTimeA"],""));
    const timeB = normalizar(campo(j,["timeB","visitante","timeVisitante","nomeTimeB"],""));
    return timeA === nome || timeB === nome;
  });
}

function placarA(j){
  return Number(campo(j,["golsA","placarA","golsMandante","mandanteGols"],0));
}

function placarB(j){
  return Number(campo(j,["golsB","placarB","golsVisitante","visitanteGols"],0));
}

function calcularStats(){
  let jogosQtd = 0, vitorias = 0, empates = 0, derrotas = 0, gp = 0, gc = 0;
  const nome = normalizar(nomeTime());

  jogosDoTime().forEach(j=>{
    jogosQtd++;
    const a = placarA(j);
    const b = placarB(j);
    const ehA = normalizar(campo(j,["timeA","mandante","timeMandante","nomeTimeA"],"")) === nome;

    const golsPro = ehA ? a : b;
    const golsContra = ehA ? b : a;

    gp += golsPro;
    gc += golsContra;

    if(golsPro > golsContra) vitorias++;
    else if(golsPro === golsContra) empates++;
    else derrotas++;
  });

  return {
    jogos:jogosQtd,
    vitorias,
    empates,
    derrotas,
    gols:gp,
    golsContra:gc,
    saldo:gp-gc,
    pontos:vitorias*3+empates
  };
}

function dataBR(v){
  if(!v) return "-";
  const d = new Date(v);
  if(isNaN(d.getTime())) return String(v);
  return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
}

/* MENUS DA FOTO */
function submenus(){
  if(principal === "temporada"){
    return [
      ["detalhes","Detalhes"],
      ["jogos","Jogos"],
      ["classificacao","Classificação"],
      ["estatisticas","Estatísticas"],
      ["titulos","Títulos"]
    ];
  }

  if(principal === "buzz"){
    return [
      ["noticias","Notícias"],
      ["chat","Chat"],
      ["destaques","Destaques"]
    ];
  }

  return [
    ["elenco","Elenco"],
    ["gestao","Gestão"],
    ["estatisticas","Estatísticas"]
  ];
}

function headerHtml(){
  return `
    <section class="team-hero">
      <div class="team-hero-top">
        <img class="team-logo" src="${logoTime()}" onerror="this.src='logo-liga.jfif'">
        <div class="team-name">${nomeTime()}</div>
        <div class="team-city">${cidadeTime() || "Cidade não cadastrada"}</div>
      </div>

      <nav class="main-tabs">
        <button class="${principal === "temporada" ? "ativo" : ""}" onclick="trocarPrincipal('temporada')">Temporada</button>
        <button class="${principal === "buzz" ? "ativo" : ""}" onclick="trocarPrincipal('buzz')">Buzz</button>
        <button class="${principal === "elenco" ? "ativo" : ""}" onclick="trocarPrincipal('elenco')">Elenco</button>
      </nav>
    </section>

    <nav class="sub-tabs">
      ${submenus().map(item=>`
        <button class="${sub === item[0] ? "ativo" : ""}" onclick="trocarSub('${item[0]}')">${item[1]}</button>
      `).join("")}
    </nav>
  `;
}

function detalhesCard(){
  const st = calcularStats();
  const elenco = jogadoresDoTime();

  return `
    <section class="card-time">
      <div class="card-title">Detalhes do time</div>
      <div class="card-body">
        <div class="details-main">
          <div class="person-box">
            <img src="${logoTime()}" onerror="this.src='logo-liga.jfif'">
            <strong>${nomeTime()}</strong>
            <span>${cidadeTime() || "Cidade não cadastrada"}</span>
          </div>

          <div class="person-box">
            <img src="logo-liga.jfif">
            <strong>${categoriasTime() || "Categoria não cadastrada"}</strong>
            <span>Categoria / competição</span>
          </div>

          <div class="person-box round">
            <img src="logo-liga.jfif">
            <strong>${tecnicoPrincipal() || "Técnico não cadastrado"}</strong>
            <span>Técnico</span>
          </div>
        </div>

        <div class="bottom-stats">
          <div class="mini-stat"><strong>${campo(time,["fundacao","fundação","anoFundacao"],"-")}</strong><span>Fundação</span></div>
          <div class="mini-stat"><strong>${cidadeTime().split("-")[0].trim() || "-"}</strong><span>Cidade</span></div>
          <div class="mini-stat"><strong>${campo(time,["apelido"],"-")}</strong><span>Apelido</span></div>
          <div class="mini-stat"><strong>${campo(time,["mediaIdade"],"-")}</strong><span>Média de idade</span></div>
          <div class="mini-stat"><strong>${campo(time,["titulos","totalTitulos"],0)}</strong><span>Títulos</span></div>
        </div>
      </div>
    </section>

function ultimasPartidasCard(){
  const listaReal = jogosDoTime().slice(0,5);
  const lista = listaReal.length ? listaReal : [];

  if(!lista.length){
    return `
      <section class="card-time">
        <div class="card-title">Últimas partidas</div>
        <div class="card-body">
          <div class="empty-box">Nenhum jogo cadastrado para este time.</div>
        </div>
      </section>
    `;
  }

  return `
    <section class="card-time">
      <div class="card-title">Últimas partidas</div>
      <div class="card-body">
        <div class="matches-row">
          ${lista.map((j)=>{
            const a = placarA(j);
            const b = placarB(j);
            const res = a > b ? "V" : a === b ? "E" : "D";
            return `
              <div class="match-mini">
                <small>${dataBR(campo(j,["data","dataJogo"],""))}</small>
                <img src="logo-liga.jfif">
                <strong>${campo(j,["timeB","visitante","timeA","mandante"],"ADV")}</strong>
                <div class="score-pill">${a} - ${b}</div>
                <div class="result-dot ${res==="V"?"win":res==="E"?"draw":"loss"}">${res}</div>
              </div>
            `;
          }).join("")}
        </div>

        <a class="link-more" href="#" onclick="trocarSub('jogos');return false;">Ver todos os jogos</a>
      </div>
    </section>
  `;
}

function temporadaDetalhes(){
  return `

  if(!lista.length){

  const st = calcularStats();

        <table class="class-table">

            <th>Time</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th><th>P</th>

            <td>${nomeTime()}</td>
            <td>${st.jogos}</td>
            <td>${st.vitorias}</td>

            <td>${st.gols}</td>

function estatisticasJogadorCard(){
  return destaqueJogadoresCard();
}

function estatisticasTimesCard(){
  return `
    <div class="two-col">
      ${destaqueTimesCard()}
      ${classificacaoCard()}
    </div>
  `;
}

function grupoPosicao(j){
  const pos = normalizar(campo(j,["posicao","posição","funcao"],""));
  if(pos.includes("goleiro")) return "Goleiros";
  if(pos.includes("zagueiro") || pos.includes("lateral") || pos.includes("defensor")) return "Defensores";
  if(pos.includes("volante") || pos.includes("meia") || pos.includes("camp")) return "Meio Campistas";
  if(pos.includes("atac") || pos.includes("ponta") || pos.includes("centroavante")) return "Atacantes";
  return "Elenco";
}

function elencoCard(){
  const lista = jogadoresDoTime();

  if(!lista.length){
    return `<section class="card-time"><div class="empty-box">Nenhum jogador cadastrado para este time.</div></section>`;
  }

  const grupos = {};
  lista.forEach(j=>{
    const g = grupoPosicao(j);
    if(!grupos[g]) grupos[g] = [];
    grupos[g].push(j);
  });

  return Object.keys(grupos).map(g=>`
    <section class="card-time">
      <div class="card-title">${g}</div>
      <div class="card-body">
        ${grupos[g].map((j,idx)=>`
          <div class="rank-row">
            <div class="rank-number">${campo(j,["numero","camisa"],idx+1)}</div>
            <img src="${campo(j,["foto","fotoPerfil","imagem"],"logo-liga.jfif")}" onerror="this.src='logo-liga.jfif'">
            <div class="rank-info">
              <strong>${campo(j,["nome","nomeCompleto"],"Jogador")}</strong>
              <span>${campo(j,["posicao","posição","funcao"],"Atleta")}</span>
            </div>
            <div class="rank-value">${campo(j,["gols"],"")}</div>
          </div>
        `).join("")}
      </div>
    </section>
  `).join("");
}

function gestaoCard(){
  return `
    <section class="card-time">
      <div class="card-title">Gestão</div>
      <div class="card-body">
        <div class="rank-row">
          <div class="rank-number"><i class="fa-solid fa-user-tie"></i></div>
          <img src="logo-liga.jfif">
          <div class="rank-info">
            <strong>${tecnicoPrincipal()}</strong>
            <span>Técnico</span>
          </div>
          <div></div>
        </div>
      </div>
    </section>
  `;
}

function buzzCard(){
  return `
    <section class="news-box">
      <div>
        <h3>${sub === "chat" ? "Chat do time" : sub === "destaques" ? "Destaques do time" : "Notícias do time"}</h3>
        <p style="color:var(--muted);font-weight:800;">Área preparada para publicações e novidades do ${nomeTime()}.</p>
      </div>
    </section>
  `;
}

function conteudoAtual(){
  if(principal === "temporada"){
    if(sub === "detalhes") return temporadaDetalhes();
    if(sub === "jogos") return jogosCard();
    if(sub === "classificacao") return classificacaoCard();
    if(sub === "estatisticas") return estatisticasJogadorCard() + estatisticasTimesCard();
    if(sub === "titulos") return titulosCard();
  }

  if(principal === "buzz"){
    return buzzCard();
  }

  if(principal === "elenco"){
    if(sub === "gestao") return gestaoCard();
    if(sub === "estatisticas") return estatisticasJogadorCard() + estatisticasTimesCard();
    return gestaoCard() + elencoCard();
  }

  return temporadaDetalhes();
}

function montarTela(){
  return headerHtml() + conteudoAtual();
}

function render(){
  if(!time || !Object.keys(time).length){
    return;
  }

  document.title = nomeTime() + " - Liga Goiana";
  const html = montarTela();

  document.getElementById("desktopArea").innerHTML = html;
}

window.trocarPrincipal = function(n){
  principal = n;
  sub = n === "temporada" ? "detalhes" : n === "buzz" ? "noticias" : "elenco";
  render();
};

window.trocarSub = function(n){
  sub = n;
  render();
};

async function carregarTime(){
  if(!id){
    document.getElementById("desktopArea").innerHTML = `<section class="card-time"><div class="empty-box">Time não encontrado.</div></section>`;
    return;
  }

  const snap = await getDoc(doc(db,"times",id));

  if(!snap.exists()){
    document.getElementById("desktopArea").innerHTML = `<section class="card-time"><div class="empty-box">Time não encontrado.</div></section>`;
    return;
  }

  time = {id:snap.id,...snap.data()};
  render();
}

onSnapshot(collection(db,"jogadores"), snap=>{
  jogadores = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

onSnapshot(collection(db,"jogos"), snap=>{
  jogos = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

onSnapshot(collection(db,"tecnicos"), snap=>{
  tecnicos = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

carregarTime();
</script>
