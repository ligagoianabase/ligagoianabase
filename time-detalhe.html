<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detalhe do Time - LIGA GOIANA</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --white:#fff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
}

body{
  font-family:Arial;
  background:
    linear-gradient(rgba(2,8,20,.9), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
}

.wrap{
  width:min(100% - 28px, 1240px);
  margin:auto;
}

.container{padding:20px}

/* TOPO */
.topo{
  display:flex;
  gap:20px;
  align-items:center;
  background:linear-gradient(135deg,#0d2a52,#08172c);
  border:1px solid rgba(247,198,0,.3);
  border-radius:18px;
  padding:20px;
  margin-bottom:14px;
}

.logo{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  background:#fff;
  border:3px solid var(--gold);
}

.nome{
  font-size:26px;
  font-weight:900;
  color:var(--gold);
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:14px;
}

.box{
  background:#071d37;
  padding:14px;
  border-radius:12px;
  text-align:center;
}

.box strong{
  font-size:20px;
  color:var(--gold);
}

/* TABS */
.tabs{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.tabs button{
  padding:10px 14px;
  border-radius:10px;
  background:#1a3f73;
  color:#fff;
  font-weight:700;
}

.tabs .ativo{
  background:var(--gold);
  color:#111;
}

/* LISTAS */
.card{
  background:#071d37;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

.tabela{
  width:100%;
  border-collapse:collapse;
}

.tabela th{
  background:#123b7a;
  color:var(--gold);
  padding:10px;
}

.tabela td{
  padding:10px;
  border-top:1px solid var(--line);
  color:var(--muted);
}
</style>
</head>

<body>

<script type="module">
import { renderMenu } from "./menu.js";
renderMenu("times");
</script>

<main class="wrap container">

<!-- TOPO -->
<div class="topo">
<img id="logo" class="logo">
<div>
<div class="nome" id="nome"></div>
<div id="info"></div>
</div>
</div>

<!-- STATS -->
<div class="stats">
<div class="box"><strong id="jogos">0</strong><br>Jogos</div>
<div class="box"><strong id="vitorias">0</strong><br>Vitórias</div>
<div class="box"><strong id="gols">0</strong><br>Gols</div>
<div class="box"><strong id="saldo">0</strong><br>Saldo</div>
</div>

<!-- TABS -->
<div class="tabs">
<button class="ativo" onclick="trocar('elenco')">Elenco</button>
<button onclick="trocar('jogos')">Jogos</button>
<button onclick="trocar('estatisticas')">Estatísticas</button>
</div>

<div id="conteudo"></div>

</main>

<script type="module">
import { db } from "./firebase.js";
import {
  doc,
  getDoc,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const id = new URLSearchParams(location.search).get("id");

let time = {};
let jogadores = [];
let jogos = [];
let aba = "elenco";

/* ================= TIME ================= */
async function carregarTime(){
  const snap = await getDoc(doc(db,"times",id));

  if(!snap.exists()) return;

  time = snap.data();

  document.getElementById("nome").innerText = time.nome || "Time";
  document.getElementById("logo").src = time.logo || "logo-liga.jfif";

  document.getElementById("info").innerText =
    `${time.cidade || ""} • ${time.categoria || ""}`;
}

/* ================= JOGADORES ================= */
onSnapshot(collection(db,"jogadores"), snap=>{
  jogadores = snap.docs
    .map(d=>d.data())
    .filter(j=>j.timeId === id);

  render();
});

/* ================= JOGOS ================= */
onSnapshot(collection(db,"jogos"), snap=>{
  jogos = snap.docs.map(d=>d.data());
  render();
});

/* ================= STATS ================= */
function calcularStats(){
  let j=0,v=0,gp=0,gc=0;

  jogos.forEach(x=>{
    if(x.timeA === time.nome || x.timeB === time.nome){
      j++;

      const gm = x.golsMandante || 0;
      const gv = x.golsVisitante || 0;

      if(x.timeA === time.nome){
        gp+=gm; gc+=gv;
        if(gm>gv) v++;
      }else{
        gp+=gv; gc+=gm;
        if(gv>gm) v++;
      }
    }
  });

  document.getElementById("jogos").innerText=j;
  document.getElementById("vitorias").innerText=v;
  document.getElementById("gols").innerText=gp;
  document.getElementById("saldo").innerText=gp-gc;
}

/* ================= RENDER ================= */
function render(){
  calcularStats();

  if(aba==="elenco"){
    document.getElementById("conteudo").innerHTML = jogadores.map(j=>`
      <div class="card">
        ${j.nome} - Nº ${j.numero}
      </div>
    `).join("");
  }

  if(aba==="jogos"){
    document.getElementById("conteudo").innerHTML = `
    <table class="tabela">
    <tr><th>Jogo</th><th>Placar</th></tr>
    ${jogos.map(j=>`
      <tr>
        <td>${j.timeA} x ${j.timeB}</td>
        <td>${j.golsMandante || 0} x ${j.golsVisitante || 0}</td>
      </tr>
    `).join("")}
    </table>`;
  }

  if(aba==="estatisticas"){
    document.getElementById("conteudo").innerHTML = `
      <div class="card">Estatísticas automáticas baseadas nos jogos</div>
    `;
  }
}

window.trocar = function(n){
  aba = n;

  document.querySelectorAll(".tabs button")
    .forEach(b=>b.classList.remove("ativo"));

  event.target.classList.add("ativo");

  render();
};

carregarTime();
</script>

</body>
</html>
