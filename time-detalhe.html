<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Time Detalhe - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --td-bg:#061427;
  --td-card:#071d37;
  --td-card2:#0d2a52;
  --td-card3:#102f62;
  --td-gold:#f7c600;
  --td-gold2:#ffe45c;
  --td-white:#ffffff;
  --td-muted:#cbd6ea;
  --td-line:rgba(255,255,255,.12);
  --td-gold-line:rgba(247,198,0,.45);
  --td-green:#46b948;
  --td-red:#e53935;
  --td-yellow:#f7c600;
  --td-shadow:0 16px 36px rgba(0,0,0,.42);
  --td-max:1420px;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.86), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--td-white);
  overflow-x:hidden;
}

button{
  font-family:inherit;
}

.td-page{
  width:min(100% - 34px, var(--td-max));
  margin:0 auto;
  padding:10px 0 38px;
}

.td-layout{
  display:grid;
  grid-template-columns:minmax(0, 1fr) 340px;
  gap:22px;
  align-items:start;
}

.td-left{
  min-width:0;
}

.td-phone{
  position:sticky;
  top:82px;
  border:2px solid rgba(255,255,255,.65);
  border-radius:30px;
  background:
    linear-gradient(rgba(4,16,38,.78), rgba(4,16,38,.96)),
    url("fundo.png") center/cover no-repeat;
  padding:14px;
  min-height:720px;
  max-height:calc(100vh - 100px);
  overflow:auto;
  box-shadow:var(--td-shadow);
}

.td-phone::-webkit-scrollbar{
  width:4px;
}

.td-phone::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.28);
  border-radius:999px;
}

.td-phone-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:#fff;
  font-size:13px;
  font-weight:900;
  margin-bottom:12px;
}

.td-hero{
  background:
    linear-gradient(rgba(4,20,47,.22),rgba(4,20,47,.88)),
    url("fundo.png") center/cover no-repeat;
  border:1px solid var(--td-gold-line);
  border-radius:24px 24px 0 0;
  overflow:hidden;
  box-shadow:var(--td-shadow);
}

.td-hero-inner{
  text-align:center;
  padding:26px 22px 22px;
}

.td-logo{
  width:134px;
  height:134px;
  object-fit:contain;
  background:#fff;
  border:3px solid var(--td-gold);
  border-radius:28px;
  padding:8px;
  margin:0 auto 16px;
  box-shadow:0 14px 26px rgba(0,0,0,.35);
}

.td-team-name{
  font-size:44px;
  line-height:1.05;
  font-weight:1000;
  text-transform:uppercase;
  letter-spacing:.5px;
  color:#fff;
  text-shadow:0 4px 0 rgba(0,0,0,.35);
}

.td-team-sub{
  color:#fff;
  font-size:20px;
  margin-top:9px;
  font-weight:700;
}

.td-main-tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  background:rgba(7,29,55,.88);
  border-top:1px solid rgba(255,255,255,.08);
}

.td-main-tabs button{
  border:0;
  background:transparent;
  color:#fff;
  padding:18px 8px 15px;
  font-size:21px;
  font-weight:1000;
  text-transform:uppercase;
  cursor:pointer;
  border-bottom:4px solid transparent;
}

.td-main-tabs button.td-active{
  color:var(--td-gold);
  border-bottom-color:var(--td-gold);
}

.td-subtabs{
  display:flex;
  gap:8px;
  align-items:center;
  overflow-x:auto;
  scrollbar-width:none;
  background:rgba(13,42,82,.97);
  border:1px solid rgba(255,255,255,.08);
  border-radius:0 0 12px 12px;
  padding:13px 14px;
  margin-bottom:14px;
}

.td-subtabs::-webkit-scrollbar{
  display:none;
}

.td-subtabs button{
  flex:1;
  min-width:112px;
  border:0;
  background:transparent;
  color:var(--td-muted);
  font-size:15px;
  font-weight:900;
  padding:9px 13px;
  border-radius:999px;
  cursor:pointer;
  white-space:nowrap;
}

.td-subtabs button.td-active{
  background:rgba(247,198,0,.12);
  color:var(--td-gold);
  outline:2px solid var(--td-gold);
}

.td-card{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.09), transparent 34%),
    linear-gradient(180deg,rgba(13,42,82,.97),rgba(7,29,55,.98));
  border:1px solid rgba(247,198,0,.20);
  border-radius:16px;
  box-shadow:0 10px 24px rgba(0,0,0,.30);
  margin-bottom:14px;
  overflow:hidden;
}

.td-card-title{
  font-size:21px;
  font-weight:1000;
  color:#fff;
  padding:18px 22px 13px;
}

.td-card-body{
  padding:18px 22px;
}

.td-details-main{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:0;
  border-bottom:1px solid rgba(255,255,255,.16);
  padding-bottom:20px;
}

.td-person{
  text-align:center;
  padding:12px 18px;
  border-right:1px solid rgba(255,255,255,.16);
}

.td-person:last-child{
  border-right:0;
}

.td-person img{
  width:96px;
  height:96px;
  object-fit:contain;
  background:#fff;
  border-radius:24px;
  border:2px solid var(--td-gold);
  margin:0 auto 10px;
}

.td-person.td-round img{
  border-radius:50%;
  object-fit:cover;
}

.td-person strong{
  display:block;
  font-size:19px;
  line-height:1.18;
  color:#fff;
  font-weight:1000;
}

.td-person span{
  display:block;
  color:var(--td-muted);
  font-size:14px;
  margin-top:5px;
}

.td-bottom-stats{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-top:18px;
}

.td-mini-stat{
  text-align:center;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:12px 8px;
}

.td-mini-stat strong{
  display:block;
  color:#fff;
  font-size:26px;
  line-height:1;
  font-weight:1000;
}

.td-mini-stat span{
  display:block;
  color:var(--td-muted);
  margin-top:5px;
  font-size:13px;
}

.td-matches{
  position:relative;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.td-match-mini{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:12px 8px;
  text-align:center;
}

.td-match-mini small{
  color:#fff;
  font-weight:800;
  font-size:13px;
}

.td-match-mini img{
  width:50px;
  height:50px;
  object-fit:contain;
  margin:9px auto;
}

.td-match-mini strong{
  display:block;
  color:#fff;
  font-size:18px;
}

.td-score-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:76px;
  margin-top:9px;
  padding:5px 12px;
  border-radius:999px;
  border:2px solid var(--td-green);
  color:#fff;
  font-weight:1000;
}

.td-result-dot{
  display:inline-flex;
  width:22px;
  height:22px;
  border-radius:50%;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:11px;
  font-weight:1000;
  margin-top:8px;
}

.td-win{background:var(--td-green)}
.td-draw{background:var(--td-yellow);color:#111}
.td-loss{background:var(--td-red)}

.td-link-more{
  display:block;
  text-align:center;
  color:var(--td-gold);
  font-weight:1000;
  font-size:14px;
  padding-top:14px;
  margin-top:12px;
  border-top:1px solid rgba(255,255,255,.10);
}

.td-two-col{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.td-small-tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  border-bottom:1px solid rgba(255,255,255,.12);
  padding:0 0 12px;
  margin-bottom:8px;
}

.td-small-tabs span{
  text-align:center;
  color:var(--td-muted);
  font-size:14px;
  font-weight:900;
  padding-bottom:8px;
}

.td-small-tabs span:first-child{
  color:var(--td-gold);
  border-bottom:2px solid var(--td-gold);
}

.td-row{
  display:grid;
  grid-template-columns:26px 56px 1fr auto;
  gap:10px;
  align-items:center;
  padding:13px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.td-row:last-child{
  border-bottom:0;
}

.td-rank{
  color:#fff;
  font-weight:1000;
  font-size:15px;
}

.td-row img{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
  background:#fff;
  border:1px solid rgba(247,198,0,.40);
}

.td-row-info strong{
  display:block;
  color:#fff;
  font-size:16px;
  font-weight:1000;
}

.td-row-info span{
  display:block;
  color:var(--td-muted);
  margin-top:3px;
  font-size:13px;
}

.td-row-value{
  color:#fff;
  font-size:24px;
  font-weight:1000;
}

.td-extra-details{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:16px;
  align-items:stretch;
}

.td-info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.td-info-item{
  display:grid;
  grid-template-columns:36px 1fr;
  gap:10px;
  align-items:center;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:12px;
}

.td-info-icon{
  width:36px;
  height:36px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--td-gold),var(--td-gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
}

.td-info-item small{
  color:var(--td-muted);
  display:block;
  font-weight:800;
}

.td-info-item strong{
  color:#fff;
  display:block;
  margin-top:2px;
  font-size:13px;
}

.td-shirt{
  min-height:220px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at center, rgba(247,198,0,.18), transparent 42%),
    linear-gradient(135deg,rgba(8,35,75,.75),rgba(5,18,43,.8));
  display:flex;
  align-items:center;
  justify-content:center;
}

.td-shirt-icon{
  width:150px;
  height:190px;
  border-radius:22px 22px 35px 35px;
  background:
    repeating-linear-gradient(90deg,#111 0 24px,#f7c600 24px 48px);
  box-shadow:0 20px 40px rgba(0,0,0,.35);
  border:3px solid rgba(255,255,255,.18);
  position:relative;
}

.td-shirt-icon:before{
  content:"";
  position:absolute;
  left:50%;
  top:14px;
  width:48px;
  height:30px;
  transform:translateX(-50%);
  background:#111;
  border-radius:0 0 22px 22px;
}

.td-trophy-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.td-trophy{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:14px 10px;
  text-align:center;
}

.td-trophy i{
  color:var(--td-gold);
  font-size:32px;
  margin-bottom:8px;
}

.td-trophy small{
  display:block;
  color:#fff;
  min-height:32px;
}

.td-trophy strong{
  display:block;
  color:var(--td-gold);
  font-size:34px;
  margin-top:4px;
}

.td-match-full{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  margin-bottom:10px;
  overflow:hidden;
}

.td-match-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  background:rgba(0,0,0,.16);
  padding:12px 14px;
  color:var(--td-muted);
  font-weight:900;
  font-size:13px;
}

.td-match-line{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:14px;
  align-items:center;
  text-align:center;
  padding:18px 14px;
  font-weight:1000;
  color:#fff;
}

.td-full-score{
  color:var(--td-gold);
  font-size:28px;
}

.td-table-wrap{
  overflow:auto;
}

.td-table{
  width:100%;
  border-collapse:collapse;
  min-width:720px;
}

.td-table th,
.td-table td{
  padding:12px 10px;
  border-bottom:1px solid rgba(255,255,255,.08);
  text-align:left;
}

.td-table th{
  color:var(--td-gold);
  font-size:12px;
}

.td-table td{
  color:#fff;
  font-size:14px;
}

.td-position-title{
  background:rgba(247,198,0,.12);
  color:var(--td-gold);
  padding:12px 14px;
  border-radius:12px;
  margin:8px 0;
  font-weight:1000;
}

.td-news{
  min-height:245px;
  border-radius:18px;
  border:1px solid var(--td-gold-line);
  background:
    linear-gradient(rgba(8,23,44,.15), rgba(8,23,44,.95)),
    url("fundo.png") center/cover no-repeat;
  display:flex;
  align-items:flex-end;
  padding:22px;
  margin-bottom:14px;
}

.td-news h3{
  font-size:26px;
  margin:0 0 8px;
}

.td-empty{
  color:var(--td-muted);
  text-align:center;
  padding:20px;
}

/* MOBILE PHONE PREVIEW */
.td-phone .td-hero{
  border-radius:20px 20px 0 0;
}

.td-phone .td-hero-inner{
  padding:22px 10px 16px;
}

.td-phone .td-logo{
  width:86px;
  height:86px;
  border-radius:20px;
}

.td-phone .td-team-name{
  font-size:26px;
}

.td-phone .td-team-sub{
  font-size:13px;
}

.td-phone .td-main-tabs button{
  font-size:12px;
  padding:13px 3px 10px;
}

.td-phone .td-subtabs{
  padding:9px;
  gap:5px;
  border-radius:0 0 12px 12px;
}

.td-phone .td-subtabs button{
  min-width:auto;
  font-size:9px;
  padding:6px 7px;
}

.td-phone .td-card{
  border-radius:14px;
  margin-bottom:10px;
}

.td-phone .td-card-title{
  font-size:15px;
  padding:13px 13px 8px;
}

.td-phone .td-card-body{
  padding:12px;
}

.td-phone .td-details-main{
  display:block;
}

.td-phone .td-person{
  border-right:0;
  border-bottom:1px solid rgba(255,255,255,.12);
  display:grid;
  grid-template-columns:54px 1fr;
  text-align:left;
  gap:10px;
  align-items:center;
  padding:10px 0;
}

.td-phone .td-person:last-child{
  border-bottom:0;
}

.td-phone .td-person img{
  width:52px;
  height:52px;
  margin:0;
  border-radius:12px;
}

.td-phone .td-person.td-round img{
  border-radius:50%;
}

.td-phone .td-person strong{
  font-size:13px;
}

.td-phone .td-person span{
  font-size:11px;
}

.td-phone .td-bottom-stats{
  grid-template-columns:repeat(3,1fr);
  gap:5px;
}

.td-phone .td-mini-stat{
  padding:8px 4px;
}

.td-phone .td-mini-stat strong{
  font-size:17px;
}

.td-phone .td-mini-stat span{
  font-size:9px;
}

.td-phone .td-matches{
  grid-template-columns:repeat(5,1fr);
  gap:5px;
  overflow:hidden;
}

.td-phone .td-match-mini{
  padding:6px 3px;
}

.td-phone .td-match-mini small{
  font-size:9px;
}

.td-phone .td-match-mini img{
  width:32px;
  height:32px;
}

.td-phone .td-match-mini strong{
  font-size:10px;
}

.td-phone .td-score-pill{
  min-width:34px;
  font-size:9px;
  padding:3px 4px;
}

.td-phone .td-two-col,
.td-phone .td-extra-details,
.td-phone .td-info-grid,
.td-phone .td-trophy-grid{
  grid-template-columns:1fr;
}

.td-phone .td-row{
  grid-template-columns:20px 40px 1fr auto;
  gap:7px;
  padding:9px 0;
}

.td-phone .td-row img{
  width:38px;
  height:38px;
}

.td-phone .td-row-info strong{
  font-size:11px;
}

.td-phone .td-row-info span{
  font-size:9px;
}

.td-phone .td-row-value{
  font-size:15px;
}

.td-phone .td-shirt{
  display:none;
}

@media(max-width:1100px){
  .td-layout{
    grid-template-columns:1fr;
  }

  .td-phone{
    display:none;
  }
}

@media(max-width:720px){
  .td-page{
    width:min(100% - 18px, var(--td-max));
    padding-top:10px;
  }

  .td-hero{
    border-radius:18px 18px 0 0;
  }

  .td-hero-inner{
    padding:18px 12px 15px;
  }

  .td-logo{
    width:88px;
    height:88px;
    border-radius:20px;
  }

  .td-team-name{
    font-size:26px;
  }

  .td-team-sub{
    font-size:14px;
  }

  .td-main-tabs button{
    font-size:13px;
    padding:13px 4px 10px;
  }

  .td-subtabs{
    padding:10px;
  }

  .td-subtabs button{
    flex:0 0 auto;
    min-width:auto;
    font-size:12px;
    padding:8px 12px;
  }

  .td-details-main{
    grid-template-columns:1fr;
  }

  .td-person{
    border-right:0;
    border-bottom:1px solid rgba(255,255,255,.12);
  }

  .td-person:last-child{
    border-bottom:0;
  }

  .td-bottom-stats{
    grid-template-columns:repeat(3,1fr);
  }

  .td-matches{
    grid-template-columns:repeat(2,1fr);
  }

  .td-two-col,
  .td-extra-details,
  .td-info-grid,
  .td-trophy-grid{
    grid-template-columns:1fr;
  }

  .td-card-title{
    font-size:18px;
    padding:16px 14px 10px;
  }

  .td-card-body{
    padding:14px;
  }

  .td-row{
    grid-template-columns:24px 46px 1fr auto;
  }

  .td-row-value{
    font-size:18px;
  }
}
</style>
</head>

<body>

<script type="module">
import { renderMenu } from "./menu.js";
renderMenu("times");
</script>

<main class="td-page">
  <section class="td-layout">
    <div class="td-left">
      <div id="tdDesktop"></div>
    </div>

    <aside class="td-phone">
      <div class="td-phone-top">
        <span>21:45</span>
        <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
      </div>
      <div id="tdPhone"></div>
    </aside>
  </section>
</main>

<script type="module">
import { db } from "./firebase.js";
import {
  doc,
  getDoc,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const id = new URLSearchParams(location.search).get("id");

let time = {};
let jogadores = [];
let jogos = [];
let tecnicos = [];
let principal = "temporada";
let sub = "detalhes";

function campo(obj, chaves, padrao=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== "") return obj[c];
  }
  return padrao;
}

function normalizar(t){
  return String(t || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function nomeTime(){
  return campo(time,["nome","nomeTime","timeNome"],"Instituto Set");
}

function logoTime(){
  return campo(time,["logo","escudo","imagem","foto"],"logo-liga.jfif");
}

function cidadeTime(){
  return campo(time,["cidade","municipio","local"],"Goiânia - GO");
}

function categoriasTime(){
  const arr = campo(time,["categorias"],[]);
  if(Array.isArray(arr) && arr.length) return arr.join(", ");
  return campo(time,["categoria","categoriaNome"],"Liga Goianense");
}

function tecnicoPrincipal(){
  const tecnicoPorTime = tecnicos.find(t=>{
    const tid = campo(t,["timeId"],"");
    const tnome = normalizar(campo(t,["time","nomeTime","timeNome"],""));
    return tid === id || tnome === normalizar(nomeTime());
  });
  return campo(tecnicoPorTime || time,["nome","tecnico","tecnicoNome","treinador"],"Carlos Vicens");
}

function jogadoresDoTime(){
  const nome = normalizar(nomeTime());
  return jogadores.filter(j=>{
    return campo(j,["timeId"],"") === id ||
      normalizar(campo(j,["time","nomeTime","timeNome"],"")) === nome;
  });
}

function jogosDoTime(){
  const nome = normalizar(nomeTime());
  return jogos.filter(j=>{
    const timeA = normalizar(campo(j,["timeA","mandante","timeMandante","nomeTimeA"],""));
    const timeB = normalizar(campo(j,["timeB","visitante","timeVisitante","nomeTimeB"],""));
    return timeA === nome || timeB === nome;
  });
}

function placarA(j){
  return Number(campo(j,["golsA","placarA","golsMandante","mandanteGols"],0));
}

function placarB(j){
  return Number(campo(j,["golsB","placarB","golsVisitante","visitanteGols"],0));
}

function calcularStats(){
  let jogosQtd = 0, vitorias = 0, empates = 0, derrotas = 0, gp = 0, gc = 0;
  const nome = normalizar(nomeTime());

  jogosDoTime().forEach(j=>{
    jogosQtd++;
    const a = placarA(j);
    const b = placarB(j);
    const ehA = normalizar(campo(j,["timeA","mandante","timeMandante","nomeTimeA"],"")) === nome;

    const golsPro = ehA ? a : b;
    const golsContra = ehA ? b : a;

    gp += golsPro;
    gc += golsContra;

    if(golsPro > golsContra) vitorias++;
    else if(golsPro === golsContra) empates++;
    else derrotas++;
  });

  return {
    jogos:jogosQtd,
    vitorias,
    empates,
    derrotas,
    gols:gp,
    golsContra:gc,
    saldo:gp-gc,
    pontos:vitorias*3+empates
  };
}

function dataBR(v){
  if(!v) return "-";
  const d = new Date(v);
  if(isNaN(d.getTime())) return String(v);
  return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
}

function grupoPosicao(j){
  const pos = normalizar(campo(j,["posicao","posição","funcao"],""));
  if(pos.includes("goleiro")) return "Goleiros";
  if(pos.includes("zagueiro") || pos.includes("lateral") || pos.includes("defensor")) return "Defensores";
  if(pos.includes("volante") || pos.includes("meia") || pos.includes("camp")) return "Meio Campistas";
  if(pos.includes("atac") || pos.includes("ponta") || pos.includes("centroavante")) return "Atacantes";
  return "Elenco";
}

  const grupos = {};

async function carregarTime(){
  if(!id){
    time = {
      nome:"Instituto Set",
      cidade:"Goiânia - GO",
      logo:"logo-liga.jfif",
      categorias:["Liga Goianense"]
    };
    render();
    return;
  }

  const snap = await getDoc(doc(db,"times",id));

  if(!snap.exists()){
    time = {
      nome:"Instituto Set",
      cidade:"Goiânia - GO",
      logo:"logo-liga.jfif",
      categorias:["Liga Goianense"]
    };
    render();
    return;
  }

  time = {id:snap.id,...snap.data()};
  render();
}

onSnapshot(collection(db,"jogadores"), snap=>{
  jogadores = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

onSnapshot(collection(db,"jogos"), snap=>{
  jogos = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

onSnapshot(collection(db,"tecnicos"), snap=>{
  tecnicos = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

carregarTime();
</script>
