<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Técnicos ADM - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0b1f3a;
  --card:#102a52;
  --gold:#f7c600;
  --white:#fff;
  --muted:#d8e1ef;
}

body{
  font-family:Arial;
  background:linear-gradient(rgba(11,31,58,.9),rgba(11,31,58,.95)),url("fundo.png") center/cover fixed;
  color:#fff;
}

.wrap{max-width:1200px;margin:auto;padding:20px}

/* MENU PADRÃO */
.menu{
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-bottom:20px;
}

.menu a{
  background:#0d2346;
  padding:10px 14px;
  border-radius:10px;
  white-space:nowrap;
  font-weight:700;
}

.menu a.ativo{
  background:var(--gold);
  color:#000;
}

/* PAINEL */
.panel{
  background:#102a52;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

/* INPUTS */
input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:6px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.full{grid-column:1/-1}

/* CARD */
.card{
  background:#102a52;
  padding:15px;
  border-radius:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.info{
  display:flex;
  align-items:center;
  gap:12px;
}

.info img{
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
  background:#fff;
}

.btn{
  background:var(--gold);
  padding:8px 12px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

.btn-danger{
  background:#d94141;
  color:#fff;
}
</style>
</head>

<body>

<div class="wrap">

<!-- MENU PADRÃO IGUAL TODOS -->
<div class="menu">
<a href="admin.html">Painel</a>
<a href="campeonatos-admin.html">Campeonatos</a>
<a href="jogos-admin.html">Jogos</a>
<a href="times-admin.html">Times</a>
<a href="tecnicos-admin.html" class="ativo">Técnicos</a>
<a href="jogadores-admin.html">Jogadores</a>
<a href="arbitros-admin.html">Árbitros</a>
<a href="assistentes-admin.html">Assistentes</a>
<a href="sumulas-admin.html">Súmulas</a>
</div>

<!-- FORM -->
<div class="panel">

<h2>Novo Técnico</h2>

<div class="grid">

<div>
<input id="nome" placeholder="Nome do técnico">
</div>

<div>
<input id="cpf" placeholder="CPF">
</div>

<div>
<select id="time"></select>
</div>

<div>
<select id="categoria"></select>
</div>

<div>
<select id="funcao">
<option value="Técnico">Técnico</option>
<option value="Auxiliar">Auxiliar</option>
<option value="Preparador">Preparador</option>
</select>
</div>

<div class="full">
<input type="file" id="fotoFile">
</div>

</div>

<br>

<button class="btn" onclick="salvar()">Salvar Técnico</button>

</div>

<!-- LISTA -->
<div id="lista"></div>

</div>

<script type="module">
import { db } from "./firebase.js";
import {
collection, addDoc, getDocs, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

const storage = getStorage();

let timesCache = [];

/* ===== CARREGAR TIMES ===== */
async function carregarTimes(){
const select = document.getElementById("time");
select.innerHTML = `<option value="">Selecione o time</option>`;

const snap = await getDocs(collection(db,"times"));

timesCache = [];
snap.forEach(d=>{
timesCache.push({id:d.id,...d.data()});
});

timesCache.sort((a,b)=>a.nome.localeCompare(b.nome,"pt-BR"));

timesCache.forEach(t=>{
select.innerHTML += `<option value="${t.id}">${t.nome}</option>`;
});
}

/* ===== CATEGORIAS FIXAS ===== */
const categorias = [
"Sub-11","Sub-12","Sub-13","Sub-14","Sub-15",
"Sub-16","Sub-17","Sub-18","Sub-19","Sub-20","Sub-21"
];

const catSelect = document.getElementById("categoria");
categorias.forEach(c=>{
catSelect.innerHTML += `<option value="${c}">${c}</option>`;
});

/* ===== SALVAR ===== */
window.salvar = async function(){

let file = document.getElementById("fotoFile").files[0];

let foto = "logo-liga.jfif";

if(file){
let r = ref(storage,"tecnicos/"+Date.now());
await uploadBytes(r,file);
foto = await getDownloadURL(r);
}

await addDoc(collection(db,"tecnicos"),{
nome:document.getElementById("nome").value,
cpf:document.getElementById("cpf").value,
timeId:document.getElementById("time").value,
timeNome:timesCache.find(t=>t.id === document.getElementById("time").value)?.nome || "",
categoria:document.getElementById("categoria").value,
funcao:document.getElementById("funcao").value,
foto,
status:"ativo",
criadoEm:new Date().toISOString()
});

alert("Técnico salvo!");
carregar();
};

/* ===== LISTAR ===== */
async function carregar(){

const lista = document.getElementById("lista");
lista.innerHTML="";

const snap = await getDocs(collection(db,"tecnicos"));

snap.forEach(d=>{
let t = d.data();

lista.innerHTML += `
<div class="card">

<div class="info">
<img src="${t.foto || 'logo-liga.jfif'}">

<div>
<b>${t.nome}</b><br>
${t.funcao}<br>
${t.timeNome || "-"}<br>
${t.categoria || "-"}
</div>
</div>

<div>
<button class="btn-danger" onclick="del('${d.id}')">Excluir</button>
</div>

</div>
`;
});

}

/* ===== EXCLUIR ===== */
window.del = async function(id){
await deleteDoc(doc(db,"tecnicos",id));
carregar();
};

/* INIT */
await carregarTimes();
carregar();

</script>

</body>
</html>
