<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmulas - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --yellow:#7a5a00;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

input,
select{
  font-family:inherit;
}

img{
  display:block;
  max-width:100%;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

.hero-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:12px;
}

.hero-tag{
  background:rgba(26,63,115,.9);
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

input,
select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
  outline:none;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
}

input:focus,
select:focus{
  outline:2px solid rgba(247,198,0,.65);
}

.titulo-secao{
  color:var(--gold);
  font-size:22px;
  font-weight:900;
  margin:0 0 12px;
}

/* GRID PADRÃO — MÁXIMO 5 POR LINHA */
.lista-grid{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:12px;
}

@media(max-width:1100px){
  .lista-grid{
    grid-template-columns:repeat(4, 1fr);
  }
}

@media(max-width:900px){
  .lista-grid{
    grid-template-columns:repeat(3, 1fr);
  }
}

@media(max-width:650px){
  .lista-grid{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:430px){
  .lista-grid{
    grid-template-columns:1fr;
  }
}

.card-sumula{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.12), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  transition:.25s ease;
  text-align:center;
  min-height:285px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card-sumula:hover{
  transform:translateY(-2px);
  border-color:var(--gold);
}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
}

.card-icon{
  width:34px;
  height:34px;
  border-radius:10px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  flex-shrink:0;
}

.status-area{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.status-tag{
  color:#fff;
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  background:var(--green);
}

.status-nova{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.times-linha{
  display:grid;
  grid-template-columns:1fr 58px 1fr;
  align-items:center;
  gap:6px;
  margin:8px 0 10px;
}

.time-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
  min-width:0;
  font-size:12px;
  font-weight:900;
}

.time-box span{
  width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.escudo{
  width:42px;
  height:42px;
  border-radius:50%;
  border:2px solid var(--gold);
  object-fit:cover;
  background:#fff;
  flex-shrink:0;
}

.placar{
  color:var(--gold);
  font-size:15px;
  font-weight:900;
  background:rgba(2,10,24,.9);
  border:1px solid var(--gold-line);
  border-radius:9px;
  width:58px;
  min-height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.info-jogo{
  color:var(--muted);
  font-size:11px;
  line-height:1.4;
  text-align:center;
  margin:8px 0 10px;
}

.info-jogo strong{
  color:#fff;
}

.tags{
  display:flex;
  justify-content:center;
  gap:5px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.tag{
  background:rgba(26,63,115,.9);
  padding:4px 7px;
  border-radius:999px;
  font-size:10px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.card-actions{
  display:grid;
  grid-template-columns:1fr 42px;
  gap:8px;
}

.btn-ver,
.btn-wpp{
  width:100%;
  padding:9px 8px;
  border-radius:11px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:12px;
}

.btn-ver{
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
}

.btn-wpp{
  background:#25d366;
  color:#fff;
}

.vazio{
  color:var(--muted);
  text-align:center;
  padding:18px;
  background:rgba(7,29,55,.9);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  grid-column:1/-1;
}

@media(max-width:900px){
  .filtros{
    grid-template-columns:1fr;
  }

  .hero h2{
    font-size:22px;
  }
}
</style>
</head>

<body>

<main class="wrap container">

  <section class="hero">
    <h2>Súmulas</h2>
    <p>Súmulas oficiais publicadas automaticamente após a finalização pelo árbitro.</p>

    <div class="hero-tags">
      <div class="hero-tag" id="tagTotal">Publicadas: 0</div>
      <div class="hero-tag" id="tagCampeonato">Campeonato: Todos</div>
      <div class="hero-tag" id="tagCategoria">Categoria: Todas</div>
      <div class="hero-tag" id="tagAtualizacao">Tempo real</div>
    </div>
  </section>

  <section class="filtros">
    <input id="busca" placeholder="Pesquisar time, campeonato, categoria, árbitro ou local...">

    <select id="filtroCampeonato">
      <option value="">Todos os campeonatos</option>
    </select>

    <select id="filtroCategoria">
      <option value="">Todas categorias</option>
    </select>
  </section>

  <h2 class="titulo-secao" id="tituloPagina">Súmulas</h2>

  <section class="lista-grid" id="listaSumulas">
    <div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando súmulas...</div>
  </section>

</main>
<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("sumulas");

let jogos = [];
let sumulas = [];

const $ = id => document.getElementById(id);

const norm = txt => String(txt || "")
  .trim()
  .toLowerCase()
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g,"");

function campo(obj, chaves, fallback=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== "") return obj[c];
  }
  return fallback;
}

function sumulaFinalizada(s){
  return s.sumulaFinalizada === true ||
    s.publica === true ||
    s.publico === true ||
    norm(s.status) === "finalizado" ||
    norm(s.sumulaStatus) === "finalizada";
}

function pegarJogo(id){
  return jogos.find(j => j.id === id || j.id === String(id)) || {};
}

function nomeTime(obj, fallback){
  if(obj && typeof obj === "object") return campo(obj,["nome","nomeTime","time","equipe"],fallback);
  return obj || fallback;
}

function logoTime(obj){
  if(obj && typeof obj === "object") return campo(obj,["logo","escudo","imagem"],"logo-liga.jfif");
  return "logo-liga.jfif";
}

function dataMs(v){
  if(!v) return 0;
  if(typeof v.toDate === "function") return v.toDate().getTime();
  const d = new Date(v).getTime();
  return isNaN(d) ? 0 : d;
}

function dataBR(v){
  if(!v) return "-";
  if(typeof v.toDate === "function") v = v.toDate();
  const d = new Date(v);
  if(isNaN(d.getTime())) return String(v);
  return d.toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
}

function itemCompleto(s){
  const id = s.jogoId || s.id;
  const j = pegarJogo(id);

  return {
    id,
    campeonato: campo(s,["campeonato","campeonatoNome"], campo(j,["campeonato","campeonatoNome"],"Campeonato")),
    categoria: campo(s,["categoria"], campo(j,["categoria"],"-")),
    rodada: campo(s,["rodada","fase"], campo(j,["rodada","fase"],"Súmula")),
    local: campo(s,["local","campo","estadio"], campo(j,["local","campo","estadio"],"-")),
    data: campo(s,["finalizadaEm","publicadaEm","data","dataHora"], campo(j,["data","dataHora"],"")),
    arbitro: campo(s,["arbitro","arbitroNome"], campo(j,["arbitro","arbitroNome"],"Árbitro")),
    timeA: s.timeA || j.timeA || {},
    timeB: s.timeB || j.timeB || {},
    golsA: Number(campo(s,["golsA","placarA"], campo(j,["golsA","placarA"],0))),
    golsB: Number(campo(s,["golsB","placarB"], campo(j,["golsB","placarB"],0))),
    raw:s
  };
}

function listaPublicada(){
  return sumulas.filter(sumulaFinalizada).map(itemCompleto);
}

function preencherFiltros(){
  const campAtual = $("filtroCampeonato").value;
  const catAtual = $("filtroCategoria").value;

  const camps = [...new Set(listaPublicada().map(x=>x.campeonato).filter(Boolean))].sort();
  $("filtroCampeonato").innerHTML = `<option value="">Todos os campeonatos</option>` +
    camps.map(c=>`<option value="${c}">${c}</option>`).join("");

  if(camps.includes(campAtual)) $("filtroCampeonato").value = campAtual;

  const cats = [...new Set(listaPublicada()
    .filter(x => !$("filtroCampeonato").value || x.campeonato === $("filtroCampeonato").value)
    .map(x=>x.categoria)
    .filter(Boolean)
  )].sort();

  $("filtroCategoria").innerHTML = `<option value="">Todas categorias</option>` +
    cats.map(c=>`<option value="${c}">${c}</option>`).join("");

  if(cats.includes(catAtual)) $("filtroCategoria").value = catAtual;
}

function filtradas(){
  const busca = norm($("busca").value);
  const camp = $("filtroCampeonato").value;
  const cat = $("filtroCategoria").value;

  return listaPublicada().filter(x=>{
    if(camp && x.campeonato !== camp) return false;
    if(cat && x.categoria !== cat) return false;

    if(busca){
      const texto = norm(`${nomeTime(x.timeA,"")} ${nomeTime(x.timeB,"")} ${x.campeonato} ${x.categoria} ${x.local} ${x.rodada} ${x.arbitro}`);
      if(!texto.includes(busca)) return false;
    }

    return true;
  }).sort((a,b)=>dataMs(b.data)-dataMs(a.data));
}

function atualizarTopo(){
  const lista = filtradas();
  $("tagTotal").innerText = `Publicadas: ${lista.length}`;
  $("tagCampeonato").innerText = `Campeonato: ${$("filtroCampeonato").value || "Todos"}`;
  $("tagCategoria").innerText = `Categoria: ${$("filtroCategoria").value || "Todas"}`;
  $("tituloPagina").innerText = `Súmulas${$("filtroCategoria").value ? " - " + $("filtroCategoria").value : ""}`;
}

window.abrirSumula = id => location.href = `sumula-publica.html?id=${encodeURIComponent(id)}`;

window.compartilharSumula = function(id,event){
  event.stopPropagation();
  const base = location.href.split("/").slice(0,-1).join("/");
  const url = `${base}/sumula-publica.html?id=${encodeURIComponent(id)}`;
  window.open("https://wa.me/?text=" + encodeURIComponent("Súmula oficial: " + url), "_blank");
};

function renderizar(){
  atualizarTopo();

  const lista = filtradas();
  const box = $("listaSumulas");

  if(!lista.length){
    box.innerHTML = `<div class="vazio">Nenhuma súmula publicada encontrada.</div>`;
    return;
  }

  box.innerHTML = lista.map(x=>{
    const nomeA = nomeTime(x.timeA,"Time A");
    const nomeB = nomeTime(x.timeB,"Time B");
    const logoA = logoTime(x.timeA);
    const logoB = logoTime(x.timeB);

    const nova = (Date.now() - dataMs(x.data)) / 86400000 <= 3;

    return `
      <article class="card-sumula" onclick="abrirSumula('${x.id}')">
        <div>
          <div class="card-top">
            <div class="card-icon"><i class="fa-solid fa-file-lines"></i></div>
            <div class="status-area">
              ${nova ? `<div class="status-tag status-nova">Nova</div>` : ""}
              <div class="status-tag">Publicada</div>
            </div>
          </div>

          <div class="times-linha">
            <div class="time-box">
              <img src="${logoA}" class="escudo" onerror="this.src='logo-liga.jfif'">
              <span>${nomeA}</span>
            </div>

            <div class="placar">${x.golsA} x ${x.golsB}</div>

            <div class="time-box">
              <img src="${logoB}" class="escudo" onerror="this.src='logo-liga.jfif'">
              <span>${nomeB}</span>
            </div>
          </div>

          <div class="info-jogo">
            <strong>${x.campeonato}</strong><br>
            ${x.categoria}<br>
            ${dataBR(x.data)}<br>
            ${x.local}
          </div>

          <div class="tags">
            <span class="tag">${x.rodada}</span>
            <span class="tag">${x.arbitro}</span>
          </div>
        </div>

        <div class="card-actions">
          <a class="btn-ver" href="sumula-publica.html?id=${encodeURIComponent(x.id)}" onclick="event.stopPropagation()">
            <i class="fa-solid fa-eye"></i> Ver Súmula
          </a>

          <button class="btn-wpp" onclick="compartilharSumula('${x.id}', event)">
            <i class="fa-brands fa-whatsapp"></i>
          </button>
        </div>
      </article>
    `;
  }).join("");
}

$("busca").addEventListener("input",renderizar);

$("filtroCampeonato").addEventListener("change",()=>{
  preencherFiltros();
  $("filtroCategoria").value = "";
  renderizar();
});

$("filtroCategoria").addEventListener("change",renderizar);

onSnapshot(collection(db,"jogos"),snap=>{
  jogos = snap.docs.map(d=>({id:d.id,...d.data()}));
  preencherFiltros();
  renderizar();
});

onSnapshot(collection(db,"sumulas"),snap=>{
  sumulas = snap.docs.map(d=>({id:d.id,...d.data()}));
  preencherFiltros();
  renderizar();
});
</script>

</body>
</html>
