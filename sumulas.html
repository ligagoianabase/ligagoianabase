<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Súmulas - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --yellow:#7a5a00;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

input,
select{
  font-family:inherit;
}

img{
  display:block;
  max-width:100%;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

.hero-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:12px;
}

.hero-tag{
  background:rgba(26,63,115,.9);
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

input,
select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
  outline:none;
  box-shadow:0 8px 18px rgba(0,0,0,.22);
}

input:focus,
select:focus{
  outline:2px solid rgba(247,198,0,.65);
}

.titulo-secao{
  color:var(--gold);
  font-size:22px;
  font-weight:900;
  margin:0 0 12px;
}

/* GRID PADRÃO — MÁXIMO 5 POR LINHA */
.lista-grid{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:12px;
}

@media(max-width:1100px){
  .lista-grid{
    grid-template-columns:repeat(4, 1fr);
  }
}

@media(max-width:900px){
  .lista-grid{
    grid-template-columns:repeat(3, 1fr);
  }
}

@media(max-width:650px){
  .lista-grid{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:430px){
  .lista-grid{
    grid-template-columns:1fr;
  }
}

.card-sumula{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.12), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:15px;
  padding:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  transition:.25s ease;
  text-align:center;
  min-height:285px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card-sumula:hover{
  transform:translateY(-2px);
  border-color:var(--gold);
}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
}

.card-icon{
  width:34px;
  height:34px;
  border-radius:10px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  flex-shrink:0;
}

.status-area{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.status-tag{
  color:#fff;
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  background:var(--green);
}

.status-nova{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.times-linha{
  display:grid;
  grid-template-columns:1fr 58px 1fr;
  align-items:center;
  gap:6px;
  margin:8px 0 10px;
}

.time-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
  min-width:0;
  font-size:12px;
  font-weight:900;
}

.time-box span{
  width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.escudo{
  width:42px;
  height:42px;
  border-radius:50%;
  border:2px solid var(--gold);
  object-fit:cover;
  background:#fff;
  flex-shrink:0;
}

.placar{
  color:var(--gold);
  font-size:15px;
  font-weight:900;
  background:rgba(2,10,24,.9);
  border:1px solid var(--gold-line);
  border-radius:9px;
  width:58px;
  min-height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.info-jogo{
  color:var(--muted);
  font-size:11px;
  line-height:1.4;
  text-align:center;
  margin:8px 0 10px;
}

.info-jogo strong{
  color:#fff;
}

.tags{
  display:flex;
  justify-content:center;
  gap:5px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.tag{
  background:rgba(26,63,115,.9);
  padding:4px 7px;
  border-radius:999px;
  font-size:10px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.card-actions{
  display:grid;
  grid-template-columns:1fr 42px;
  gap:8px;
}

.btn-ver,
.btn-wpp{
  width:100%;
  padding:9px 8px;
  border-radius:11px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:12px;
}

.btn-ver{
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
}

.btn-wpp{
  background:#25d366;
  color:#fff;
}

.vazio{
  color:var(--muted);
  text-align:center;
  padding:18px;
  background:rgba(7,29,55,.9);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  grid-column:1/-1;
}

@media(max-width:900px){
  .filtros{
    grid-template-columns:1fr;
  }

  .hero h2{
    font-size:22px;
  }
}
</style>
</head>

<body>

<main class="wrap container">

  <section class="hero">
    <h2>Súmulas</h2>
    <p>Súmulas oficiais publicadas automaticamente após a finalização pelo árbitro.</p>

    <div class="hero-tags">
      <div class="hero-tag" id="tagTotal">Publicadas: 0</div>
      <div class="hero-tag" id="tagCampeonato">Campeonato: Todos</div>
      <div class="hero-tag" id="tagCategoria">Categoria: Todas</div>
      <div class="hero-tag" id="tagAtualizacao">Tempo real</div>
    </div>
  </section>

  <section class="filtros">
    <input id="busca" placeholder="Pesquisar time, campeonato, categoria, árbitro ou local...">

    <select id="filtroCampeonato">
      <option value="">Todos os campeonatos</option>
    </select>

    <select id="filtroCategoria">
      <option value="">Todas categorias</option>
    </select>
  </section>

  <h2 class="titulo-secao" id="tituloPagina">Súmulas</h2>

  <section class="lista-grid" id="listaSumulas">
    <div class="vazio"><i class="fa-solid fa-spinner fa-spin"></i> Carregando súmulas...</div>
  </section>

</main>
<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import {
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("sumulas");

let jogos = [];
let sumulas = [];

function normalizarTexto(texto){
  return String(texto || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function valorCampo(obj, chaves, fallback = ""){
  for(const chave of chaves){
    if(obj && obj[chave] !== undefined && obj[chave] !== null && obj[chave] !== ""){
      return obj[chave];
    }
  }
  return fallback;
}

function formatarDataHora(valor){
  if(!valor) return "-";

  if(typeof valor.toDate === "function"){
    valor = valor.toDate();
  }

  const data = new Date(valor);

  if(isNaN(data.getTime())){
    return String(valor);
  }

  return data.toLocaleString("pt-BR", {
    day:"2-digit",
    month:"2-digit",
    year:"numeric",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function dataOrdenacao(valor){
  if(!valor) return 0;

  if(typeof valor.toDate === "function"){
    return valor.toDate().getTime();
  }

  const data = new Date(valor).getTime();
  return isNaN(data) ? 0 : data;
}

function pegarJogo(id){
  return jogos.find(j => j.id === id || j.id === String(id)) || {};
}

function pegarTimeA(j){
  if(j.timeA && typeof j.timeA === "object"){
    return j.timeA.nome || j.timeA.time || "Time A";
  }

  return valorCampo(j, [
    "timeA",
    "mandante",
    "timeMandanteNome",
    "mandanteNome",
    "nomeTimeA"
  ], "Time A");
}

function pegarTimeB(j){
  if(j.timeB && typeof j.timeB === "object"){
    return j.timeB.nome || j.timeB.time || "Time B";
  }

  return valorCampo(j, [
    "timeB",
    "visitante",
    "timeVisitanteNome",
    "visitanteNome",
    "nomeTimeB"
  ], "Time B");
}

function pegarLogoA(j){
  if(j.timeA && typeof j.timeA === "object"){
    return j.timeA.logo || j.timeA.escudo || j.timeA.imagem || "logo-liga.jfif";
  }

  return valorCampo(j, [
    "logoTimeA",
    "escudoA",
    "logoA",
    "timeALogo",
    "mandanteLogo"
  ], "logo-liga.jfif");
}

function pegarLogoB(j){
  if(j.timeB && typeof j.timeB === "object"){
    return j.timeB.logo || j.timeB.escudo || j.timeB.imagem || "logo-liga.jfif";
  }

  return valorCampo(j, [
    "logoTimeB",
    "escudoB",
    "logoB",
    "timeBLogo",
    "visitanteLogo"
  ], "logo-liga.jfif");
}

function pegarPlacarA(s,j){
  if(s.placar && typeof s.placar === "object"){
    return s.placar.A ?? s.placar.a ?? s.placar.mandante ?? 0;
  }

  if(j.placar && typeof j.placar === "object"){
    return j.placar.A ?? j.placar.a ?? j.placar.mandante ?? 0;
  }

  return Number(
    valorCampo(s, ["golsA", "placarA", "golsMandante"],
    valorCampo(j, ["golsA", "placarA", "golsMandante"], 0))
  );
}

function pegarPlacarB(s,j){
  if(s.placar && typeof s.placar === "object"){
    return s.placar.B ?? s.placar.b ?? s.placar.visitante ?? 0;
  }

  if(j.placar && typeof j.placar === "object"){
    return j.placar.B ?? j.placar.b ?? j.placar.visitante ?? 0;
  }

  return Number(
    valorCampo(s, ["golsB", "placarB", "golsVisitante"],
    valorCampo(j, ["golsB", "placarB", "golsVisitante"], 0))
  );
}

function obterCampeonato(item,jogo={}){
  return valorCampo(item, [
    "campeonato",
    "campeonatoNome",
    "nomeCampeonato"
  ], valorCampo(jogo, [
    "campeonato",
    "campeonatoNome",
    "nomeCampeonato"
  ], "Campeonato"));
}

function obterCategoria(item,jogo={}){
  return valorCampo(item, ["categoria","categoriaNome"], valorCampo(jogo, ["categoria","categoriaNome"], "-"));
}

function obterRodada(item,jogo={}){
  return valorCampo(item, ["rodada", "fase"], valorCampo(jogo, ["rodada", "fase"], "Súmula"));
}

function obterLocal(item,jogo={}){
  return valorCampo(item, ["local", "campo", "estadio"], valorCampo(jogo, ["local", "campo", "estadio"], "-"));
}

function obterData(item,jogo={}){
  return valorCampo(item, [
    "dataFinalizacao",
    "finalizadaEm",
    "publicadaEm",
    "data",
    "dataHora",
    "dataJogo"
  ], valorCampo(jogo, [
    "data",
    "dataHora",
    "dataJogo"
  ], ""));
}

function obterArbitro(item,jogo={}){
  return valorCampo(item, ["arbitro","arbitroNome"], valorCampo(jogo, ["arbitro","arbitroNome"], "Árbitro"));
}

function sumulasPublicadas(){
  return sumulas.filter(s =>
    s.sumulaFinalizada === true ||
    s.publica === true ||
    s.publico === true ||
    normalizarTexto(s.status) === "finalizado"
  );
}

function preencherFiltros(){
  const filtroCampeonato = document.getElementById("filtroCampeonato");
  const filtroCategoria = document.getElementById("filtroCategoria");

  const campeonatoAtual = filtroCampeonato.value;
  const categoriaAtual = filtroCategoria.value;

  const campeonatos = new Set();

  sumulasPublicadas().forEach(s=>{
    const j = pegarJogo(s.jogoId || s.id);
    const nome = obterCampeonato(s,j);

    if(nome && nome !== "Campeonato"){
      campeonatos.add(nome);
    }
  });

  filtroCampeonato.innerHTML = `<option value="">Todos os campeonatos</option>`;

  [...campeonatos].sort((a,b)=>a.localeCompare(b,"pt-BR")).forEach(nome=>{
    filtroCampeonato.innerHTML += `<option value="${nome}">${nome}</option>`;
  });

  if([...campeonatos].includes(campeonatoAtual)){
    filtroCampeonato.value = campeonatoAtual;
  }

  const categorias = new Set();

  sumulasPublicadas().forEach(s=>{
    const j = pegarJogo(s.jogoId || s.id);
    const campeonato = obterCampeonato(s,j);

    if(filtroCampeonato.value && campeonato !== filtroCampeonato.value) return;

    const categoria = obterCategoria(s,j);

    if(categoria && categoria !== "-"){
      categorias.add(categoria);
    }
  });

  filtroCategoria.innerHTML = `<option value="">Todas categorias</option>`;

  [...categorias].sort((a,b)=>a.localeCompare(b,"pt-BR")).forEach(nome=>{
    filtroCategoria.innerHTML += `<option value="${nome}">${nome}</option>`;
  });

  if([...categorias].includes(categoriaAtual)){
    filtroCategoria.value = categoriaAtual;
  }
}

function sumulasFiltradas(){
  const busca = normalizarTexto(document.getElementById("busca").value);
  const campeonatoSelecionado = document.getElementById("filtroCampeonato").value;
  const categoriaSelecionada = document.getElementById("filtroCategoria").value;

  return sumulasPublicadas().filter(s=>{
    const j = pegarJogo(s.jogoId || s.id);

    const baseA = s.timeA ? s : j;
    const baseB = s.timeB ? s : j;

    const timeA = pegarTimeA(baseA);
    const timeB = pegarTimeB(baseB);
    const campeonato = obterCampeonato(s,j);
    const categoria = obterCategoria(s,j);
    const local = obterLocal(s,j);
    const rodada = obterRodada(s,j);
    const arbitro = obterArbitro(s,j);

    if(campeonatoSelecionado && campeonato !== campeonatoSelecionado) return false;
    if(categoriaSelecionada && categoria !== categoriaSelecionada) return false;

    if(busca){
      const texto = normalizarTexto(`${timeA} ${timeB} ${campeonato} ${categoria} ${local} ${rodada} ${arbitro}`);

      if(!texto.includes(busca)) return false;
    }

    return true;
  });
}

function atualizarTopo(){
  const filtradas = sumulasFiltradas();
  const campeonatoSelecionado = document.getElementById("filtroCampeonato").value;
  const categoriaSelecionada = document.getElementById("filtroCategoria").value;

  document.getElementById("tagTotal").innerText = `Publicadas: ${filtradas.length}`;
  document.getElementById("tagCampeonato").innerText = `Campeonato: ${campeonatoSelecionado || "Todos"}`;
  document.getElementById("tagCategoria").innerText = `Categoria: ${categoriaSelecionada || "Todas"}`;

  document.getElementById("tituloPagina").innerText =
    `Súmulas${categoriaSelecionada ? " - " + categoriaSelecionada : ""}${campeonatoSelecionado ? " | " + campeonatoSelecionado : ""}`;
}

function ehNova(s){
  const data =
    s.finalizadaEm ||
    s.dataFinalizacao ||
    s.publicadaEm ||
    s.atualizadoEm ||
    s.criadoEmServidor ||
    "";

  const time = dataOrdenacao(data);

  if(!time) return false;

  const dias = (Date.now() - time) / (1000 * 60 * 60 * 24);

  return dias <= 3;
}

function abrirWhatsApp(id){
  const base = location.origin + location.pathname.replace("sumulas.html","");
  const url = `${base}sumula-publica.html?id=${encodeURIComponent(id)}`;
  const texto = `Súmula oficial da Liga Goiana de Futebol de Base: ${url}`;

  window.open("https://wa.me/?text=" + encodeURIComponent(texto), "_blank");
}

window.compartilharSumula = function(id,event){
  event.stopPropagation();
  abrirWhatsApp(id);
};

window.abrirSumula = function(id){
  window.location.href = `sumula-publica.html?id=${encodeURIComponent(id)}`;
};

function renderizarSumulas(){
  const lista = document.getElementById("listaSumulas");
  const filtradas = sumulasFiltradas();

  atualizarTopo();

  if(!filtradas.length){
    lista.innerHTML = `<div class="vazio">Nenhuma súmula publicada encontrada.</div>`;
    return;
  }

  const ordenadas = [...filtradas].sort((a,b)=>{
    const jogoA = pegarJogo(a.jogoId || a.id);
    const jogoB = pegarJogo(b.jogoId || b.id);

    return dataOrdenacao(obterData(b,jogoB)) - dataOrdenacao(obterData(a,jogoA));
  });

  lista.innerHTML = ordenadas.map(s=>{
    const id = s.jogoId || s.id;
    const j = pegarJogo(id);

    const baseA = s.timeA ? s : j;
    const baseB = s.timeB ? s : j;

    const timeA = pegarTimeA(baseA);
    const timeB = pegarTimeB(baseB);
    const logoA = pegarLogoA(baseA);
    const logoB = pegarLogoB(baseB);

    const golsA = pegarPlacarA(s,j);
    const golsB = pegarPlacarB(s,j);

    const campeonato = obterCampeonato(s,j);
    const categoria = obterCategoria(s,j);
    const data = formatarDataHora(obterData(s,j));
    const local = obterLocal(s,j);
    const rodada = obterRodada(s,j);
    const arbitro = obterArbitro(s,j);

    return `
      <article class="card-sumula" onclick="abrirSumula('${id}')">
        <div>
          <div class="card-top">
            <div class="card-icon">
              <i class="fa-solid fa-file-lines"></i>
            </div>

            <div class="status-area">
              ${ehNova(s) ? `<div class="status-tag status-nova">Nova</div>` : ""}
              <div class="status-tag">Publicada</div>
            </div>
          </div>

          <div class="times-linha">
            <div class="time-box">
              <img src="${logoA}" class="escudo" onerror="this.src='logo-liga.jfif'">
              <span>${timeA}</span>
            </div>

            <div class="placar">${golsA} x ${golsB}</div>

            <div class="time-box">
              <img src="${logoB}" class="escudo" onerror="this.src='logo-liga.jfif'">
              <span>${timeB}</span>
            </div>
          </div>

          <div class="info-jogo">
            <strong>${campeonato}</strong><br>
            ${categoria}<br>
            ${data}<br>
            ${local}
          </div>

          <div class="tags">
            <span class="tag">${rodada}</span>
            <span class="tag">${arbitro}</span>
          </div>
        </div>

        <div class="card-actions">
          <a class="btn-ver" href="sumula-publica.html?id=${encodeURIComponent(id)}" onclick="event.stopPropagation()">
            <i class="fa-solid fa-eye"></i> Ver Súmula
          </a>

          <button class="btn-wpp" onclick="compartilharSumula('${id}', event)">
            <i class="fa-brands fa-whatsapp"></i>
          </button>
        </div>
      </article>
    `;
  }).join("");
}

document.getElementById("busca").addEventListener("input", renderizarSumulas);

document.getElementById("filtroCampeonato").addEventListener("change", ()=>{
  preencherFiltros();
  document.getElementById("filtroCategoria").value = "";
  renderizarSumulas();
});

document.getElementById("filtroCategoria").addEventListener("change", renderizarSumulas);

onSnapshot(collection(db,"jogos"),snap=>{
  jogos = snap.docs.map(d=>({id:d.id,...d.data()}));
  preencherFiltros();
  renderizarSumulas();
});

onSnapshot(collection(db,"sumulas"),snap=>{
  sumulas = snap.docs.map(d=>({id:d.id,...d.data()}));

});
