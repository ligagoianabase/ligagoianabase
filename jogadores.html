<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogadores - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --gold-line:rgba(247,198,0,.45);
  --shadow:0 14px 34px rgba(0,0,0,.38);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed;
  color:#fff;
}

.wrap{width:min(100% - 28px,1240px);margin:auto;}
.container{padding:22px 0;}

.hero{
  background:linear-gradient(135deg,#102a52,#08172c);
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
}

.hero h2{color:var(--gold);font-size:28px;}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

input,select{
  padding:12px;
  border-radius:10px;
  border:none;
  background:#f5f7fb;
}

/* 🔥 GRID 3 POR LINHA */
.lista{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

.card{
  border-radius:16px;
  background:linear-gradient(180deg,#0d2a52,#061427);
  border:1px solid var(--gold);
  overflow:hidden;
}

.photo{
  width:100%;
  height:200px;
  object-fit:cover;
}

.content{
  padding:10px;
  text-align:center;
}

.nome{font-weight:900;}
.time{color:var(--gold);font-size:12px;}

.btn{
  margin-top:8px;
  display:block;
  padding:10px;
  border:1px solid var(--gold);
  border-radius:10px;
  text-align:center;
}

.btn:hover{
  background:var(--gold);
  color:#111;
}

/* RESPONSIVO */
@media(max-width:900px){
  .lista{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
  .lista{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<main class="wrap container">

<section class="hero">
<h2>Jogadores</h2>
<p>Lista automática integrada com Firebase.</p>
</section>

<div class="filtros">
<input id="busca" placeholder="Buscar jogador...">

<select id="filtroTime">
<option value="">Todos os times</option>
</select>

<select id="filtroCategoria">
<option value="">Todas categorias</option>
</select>
</div>

<div class="lista" id="lista"></div>

</main>

<script type="module">
import { db } from "./firebase.js";
import { collection,getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

let jogadores=[];
let times=[];

function n(t){return String(t||"").toLowerCase()}

function val(o,k,f=""){
for(const c of k){if(o[c]) return o[c];}
return f;
}

function nome(j){return val(j,["nome"],"-")}
function time(j){return val(j,["time"],"-")}
function foto(j){return val(j,["foto"],"logo-liga.jfif")}

async function carregar(){
jogadores=(await getDocs(collection(db,"jogadores"))).docs.map(d=>({id:d.id,...d.data()}));
times=(await getDocs(collection(db,"times"))).docs.map(d=>d.data());

preencherTimes();
render();
}

function preencherTimes(){
const select=document.getElementById("filtroTime");
const set=new Set();

jogadores.forEach(j=>set.add(time(j)));

select.innerHTML=`<option value="">Todos os times</option>`;
set.forEach(t=>select.innerHTML+=`<option>${t}</option>`);
}

function filtrar(){
const busca=n(document.getElementById("busca").value);
const tsel=document.getElementById("filtroTime").value;

return jogadores.filter(j=>{
if(tsel && time(j)!==tsel) return false;
if(busca && !n(nome(j)).includes(busca)) return false;
return true;
});
}

function render(){
const lista=document.getElementById("lista");
const dados=filtrar();

if(!dados.length){
lista.innerHTML=`<div>Nenhum jogador</div>`;
return;
}

lista.innerHTML=dados.map(j=>`
<div class="card">
<img src="${foto(j)}" class="photo">

<div class="content">
<div class="nome">${nome(j)}</div>
<div class="time">${time(j)}</div>

<a class="btn" href="jogador-publico.html?id=${j.id}">
Ver Perfil
</a>
</div>
</div>
`).join("");
}

document.getElementById("busca").addEventListener("input",render);
document.getElementById("filtroTime").addEventListener("change",render);

carregar();
</script>

</body>
</html>
