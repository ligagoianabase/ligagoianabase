<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

let jogadoresCache = [];
let jogosCache = [];
let campeonatosCache = [];

window.voltarPagina = function(){
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = "index.html";
  }
};

// ================= UTIL =================
function n(txt){
  return String(txt || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();
}

function val(obj, keys, fallback=""){
  for(const k of keys){
    if(obj && obj[k] !== undefined && obj[k] !== null && obj[k] !== ""){
      return obj[k];
    }
  }
  return fallback;
}

// ================= FIREBASE =================
async function carregarDados(){
  const [jogSnap, jogsSnap, campSnap] = await Promise.all([
    getDocs(collection(db,"jogadores")),
    getDocs(collection(db,"jogos")),
    getDocs(collection(db,"campeonatos"))
  ]);

  jogadoresCache = jogSnap.docs.map(d=>({id:d.id,...d.data()}));
  jogosCache = jogsSnap.docs.map(d=>({id:d.id,...d.data()}));
  campeonatosCache = campSnap.docs.map(d=>({id:d.id,...d.data()}));
}

// ================= FILTROS =================
function preencherFiltroCampeonato(){
  const select = document.getElementById("filtroCampeonato");

  select.innerHTML = `<option value="">Selecione o campeonato</option>`;

  campeonatosCache.forEach(c=>{
    select.innerHTML += `<option value="${c.id}">${val(c,["nome"],"-")}</option>`;
  });
}

function preencherFiltroCategoria(){
  const select = document.getElementById("filtroCategoria");
  select.innerHTML = `<option value="">Selecione a categoria</option>`;

  const categorias = new Set();

  jogadoresCache.forEach(j=>{
    const cats = val(j,["categorias"],[]);
    if(Array.isArray(cats)){
      cats.forEach(c=>categorias.add(c));
    }
  });

  categorias.forEach(c=>{
    select.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

// ================= RENDER =================
window.carregarJogadores = function(){

  const lista = document.getElementById("listaJogadores");
  const busca = n(document.getElementById("buscaJogador").value);

  let jogadores = [...jogadoresCache];

  // BUSCA
  if(busca){
    jogadores = jogadores.filter(j =>
      n(val(j,["nome"])).includes(busca) ||
      n(val(j,["time"])).includes(busca) ||
      n(val(j,["posicao"])).includes(busca)
    );
  }

  if(!jogadores.length){
    lista.innerHTML = `<div class="vazio">Nenhum jogador encontrado.</div>`;
    return;
  }

  lista.innerHTML = jogadores.map(j => {

    const nome = val(j,["nome"],"-");
    const numero = val(j,["numero"],"-");
    const time = val(j,["time"],"-");
    const posicao = val(j,["posicao"],"-");
    const foto = val(j,["foto","imagem"],"logo-liga.jfif");

    return `
      <div class="card">
        <div class="player">
          <img src="${foto}" class="photo" onerror="this.src='logo-liga.jfif'">

          <div class="player-info">
            <div class="nome-jogador">
              ${numero} - ${nome}
            </div>

            <small>Time: ${time}</small>
            <small>Posição: ${posicao}</small>
          </div>
        </div>

        <div class="actions">
          <a class="btn-acao btn-ver" href="jogador-publico.html?id=${j.id}">
            <i class="fa-solid fa-eye"></i> Ver Jogador
          </a>
        </div>
      </div>
    `;
  }).join("");
};

// ================= EVENTOS =================
document.getElementById("buscaJogador")
  .addEventListener("input", carregarJogadores);

// ================= INIT =================
async function iniciar(){
  document.getElementById("listaJogadores").innerHTML =
    `<div class="vazio">Carregando...</div>`;

  await carregarDados();
  preencherFiltroCampeonato();
  preencherFiltroCategoria();
  carregarJogadores();
}

iniciar();
</script>
