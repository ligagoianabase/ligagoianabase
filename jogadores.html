<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let jogadores = [];
let jogos = [];
let campeonatos = [];
let sumulas = [];

const jogadoresExemplo = [
  { id:"jogador-exemplo-1", nome:"Ronaldo", time:"Brasil", numero:9, gols:8, posicao:"Atacante", categorias:["Seleção Principal"], jogos:1, assistencias:0, amarelos:0, vermelhos:0, foto:"logo-liga.jfif", exemplo:true },
  { id:"jogador-exemplo-2", nome:"Rivaldo", time:"Brasil", numero:10, gols:5, posicao:"Meia", categorias:["Seleção Principal"], jogos:1, assistencias:0, amarelos:0, vermelhos:0, foto:"logo-liga.jfif", exemplo:true },
  { id:"jogador-exemplo-3", nome:"Ronaldinho", time:"Brasil", numero:11, gols:2, posicao:"Meia", categorias:["Seleção Principal"], jogos:1, assistencias:0, amarelos:0, vermelhos:0, foto:"logo-liga.jfif", exemplo:true },
  { id:"jogador-exemplo-4", nome:"Cafu", time:"Brasil", numero:2, gols:0, posicao:"Lateral", categorias:["Seleção Principal"], jogos:1, assistencias:0, amarelos:0, vermelhos:0, foto:"logo-liga.jfif", exemplo:true },
  { id:"jogador-exemplo-5", nome:"Roberto Carlos", time:"Brasil", numero:6, gols:1, posicao:"Lateral", categorias:["Seleção Principal"], jogos:1, assistencias:0, amarelos:0, vermelhos:0, foto:"logo-liga.jfif", exemplo:true },
  { id:"jogador-exemplo-6", nome:"Klose", time:"Alemanha", numero:11, gols:5, posicao:"Atacante", categorias:["Seleção Principal"], jogos:1, assistencias:0, amarelos:0, vermelhos:0, foto:"logo-liga.jfif", exemplo:true },
  { id:"jogador-exemplo-7", nome:"Oliver Kahn", time:"Alemanha", numero:1, gols:0, posicao:"Goleiro", categorias:["Seleção Principal"], jogos:1, assistencias:0, amarelos:0, vermelhos:0, foto:"logo-liga.jfif", exemplo:true }
];

const jogoExemplo = {
  id:"final-copa-2002",
  campeonatoId:"copa-mundo-2002",
  campeonato:"Copa do Mundo FIFA 2002",
  categoria:"Seleção Principal",
  timeA:"Brasil",
  timeB:"Alemanha",
  status:"finalizado"
};

const campeonatoExemplo = {
  id:"copa-mundo-2002",
  nome:"Copa do Mundo FIFA 2002",
  categorias:["Seleção Principal"]
};

function n(txt){
  return String(txt || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function val(obj, chaves, f=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== ""){
      return obj[c];
    }
  }
  return f;
}

function mesmoJogador(jogador, item){
  const jogadorId = val(jogador,["id"]);
  const jogadorCpf = val(jogador,["cpf"]);
  const jogadorNome = n(val(jogador,["nome"]));

  const itemId = val(item,["jogadorId","idJogador","id"]);
  const itemCpf = val(item,["cpf"]);
  const itemNome = n(val(item,["nome","jogador","nomeJogador"]));

  return (
    (jogadorId && itemId && jogadorId === itemId) ||
    (jogadorCpf && itemCpf && jogadorCpf === itemCpf) ||
    (jogadorNome && itemNome && jogadorNome === itemNome)
  );
}

function calcularStats(jogador){
  let jogosCount = Number(val(jogador,["jogos","jogosDisputados"],0));
  let gols = Number(val(jogador,["gols"],0));
  let assistencias = Number(val(jogador,["assistencias"],0));
  let amarelos = Number(val(jogador,["amarelos","cartoesAmarelos"],0));
  let vermelhos = Number(val(jogador,["vermelhos","cartoesVermelhos"],0));

  sumulas.forEach(s=>{
    const escalacao = [
      ...(val(s,["escalacao"],[])),
      ...(val(s,["jogadores"],[])),
      ...(s.timeA?.jogadores || []),
      ...(s.timeB?.jogadores || [])
    ];

    if(escalacao.some(p=>mesmoJogador(jogador,p))){
      jogosCount++;
    }

    const eventos = [
      ...(val(s,["eventos"],[])),
      ...(val(s,["gols"],[])),
      ...(val(s,["cartoes"],[])
    ];

    eventos.forEach(ev=>{
      if(!mesmoJogador(jogador,ev)) return;

      const tipo = n(val(ev,["tipo","evento","acao"]));

      if(tipo.includes("gol")) gols++;
      if(tipo.includes("assist")) assistencias++;
      if(tipo.includes("amarelo")) amarelos++;
      if(tipo.includes("vermelho")) vermelhos++;
    });
  });

  return { jogosCount, gols, assistencias, amarelos, vermelhos };
}

function getCampSelecionado(){
  const id = document.getElementById("filtroCampeonato").value;
  return campeonatos.find(c => c.id === id);
}

function jogoDoCamp(jogo, camp){
  if(!camp) return false;

  const campIdJogo = val(jogo,["campeonatoId","idCampeonato"]);
  const campNomeJogo = val(jogo,["campeonato","nomeCampeonato"]);
  const campNome = val(camp,["nome","campeonato","titulo"]);

  return campIdJogo === camp.id || n(campNomeJogo) === n(campNome);
}

function preencherCampeonatos(){
  const select = document.getElementById("filtroCampeonato");

  select.innerHTML = `<option value="">Selecione o campeonato</option>`;

  campeonatos
    .sort((a,b)=>val(a,["nome","campeonato","titulo"]).localeCompare(val(b,["nome","campeonato","titulo"]),"pt-BR"))
    .forEach(c=>{
      select.innerHTML += `
        <option value="${c.id}">
          ${val(c,["nome","campeonato","titulo"],"-")}
        </option>
      `;
    });
}

function preencherCategorias(){
  const select = document.getElementById("filtroCategoria");
  const camp = getCampSelecionado();

  select.innerHTML = `<option value="">Todas categorias</option>`;

  const categorias = new Set();

  if(camp){
    const catsCamp = val(camp,["categorias"],[]);
    if(Array.isArray(catsCamp)){
      catsCamp.forEach(c=>categorias.add(c));
    }

    jogos.forEach(j=>{
      if(jogoDoCamp(j,camp) && j.categoria){
        categorias.add(j.categoria);
      }
    });
  }

  jogadores.forEach(j=>{
    const cats = val(j,["categorias"],[]);
    if(Array.isArray(cats)){
      cats.forEach(c=>categorias.add(c));
    }

    if(j.categoria){
      categorias.add(j.categoria);
    }
  });

  Array.from(categorias)
    .sort((a,b)=>String(a).localeCompare(String(b),"pt-BR"))
    .forEach(cat=>{
      select.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
}

function selecionarPadrao(){
  const selectCamp = document.getElementById("filtroCampeonato");

  if(campeonatos.some(c=>c.id === "copa-mundo-2002")){
    selectCamp.value = "copa-mundo-2002";
  }else if(campeonatos.length){
    selectCamp.value = campeonatos[0].id;
  }

  preencherCategorias();

  const selectCat = document.getElementById("filtroCategoria");

  if([...selectCat.options].some(op=>op.value === "Seleção Principal")){
    selectCat.value = "Seleção Principal";
  }
}

function filtrarJogadores(){
  const camp = getCampSelecionado();
  const categoria = document.getElementById("filtroCategoria").value;
  const busca = n(document.getElementById("busca").value);

  if(!camp) return [];

  const timesDoCampeonato = new Set();

  jogos.forEach(j=>{
    if(!jogoDoCamp(j,camp)) return;
    if(categoria && j.categoria !== categoria) return;

    const timeA = val(j,["timeA","mandante","timeMandante","nomeTimeA"]);
    const timeB = val(j,["timeB","visitante","timeVisitante","nomeTimeB"]);

    if(timeA) timesDoCampeonato.add(n(timeA));
    if(timeB) timesDoCampeonato.add(n(timeB));
  });

  return jogadores.filter(j=>{
    const nome = val(j,["nome"]);
    const time = val(j,["time","timeNome","nomeTime"]);
    const posicao = val(j,["posicao"]);
    const cpf = val(j,["cpf"]);

    const jogadorCampId = val(j,["campeonatoId","idCampeonato"]);
    const jogadorCampNome = val(j,["campeonato","nomeCampeonato"]);
    const campNome = val(camp,["nome","campeonato","titulo"]);

    const pertencePorCamp =
      jogadorCampId === camp.id ||
      n(jogadorCampNome) === n(campNome);

    const pertencePorTime = timesDoCampeonato.size
      ? timesDoCampeonato.has(n(time))
      : true;

    if(!pertencePorCamp && !pertencePorTime) return false;

    if(categoria){
      const cats = val(j,["categorias"],[]);
      const catUnica = val(j,["categoria"]);

      if(Array.isArray(cats) && cats.length){
        if(!cats.includes(categoria)) return false;
      }else if(catUnica && catUnica !== categoria){
        return false;
      }
    }

    if(busca){
      const textoBusca = n(`${nome} ${time} ${posicao} ${cpf}`);
      if(!textoBusca.includes(busca)) return false;
    }

    return true;
  }).sort((a,b)=>{
    const na = Number(val(a,["numero","camisa"],999));
    const nb = Number(val(b,["numero","camisa"],999));

    if(na !== nb) return na - nb;

    return val(a,["nome"]).localeCompare(val(b,["nome"]),"pt-BR");
  });
}

function render(){
  const box = document.getElementById("lista");
  const campId = document.getElementById("filtroCampeonato").value;
  const lista = filtrarJogadores();

  if(!campId){
    box.innerHTML = `<div class="vazio">Selecione um campeonato.</div>`;
    return;
  }

  if(!lista.length){
    box.innerHTML = `<div class="vazio">Nenhum jogador encontrado.</div>`;
    return;
  }

  box.innerHTML = lista.map(j=>{
    const nome = val(j,["nome"],"-");
    const numero = val(j,["numero","camisa"],"-");
    const time = val(j,["time","timeNome","nomeTime"],"-");
    const posicao = val(j,["posicao"],"-");
    const foto = val(j,["foto","imagem","fotoUrl"],"logo-liga.jfif");
    const cats = val(j,["categorias"],[]);
    const catUnica = val(j,["categoria"]);

    const stats = calcularStats(j);

    return `
      <div class="card">
        <div class="player">
          <img src="${foto}" class="photo" onerror="this.src='logo-liga.jfif'">

          <div class="info">
            <div class="nome">${numero} - ${nome}</div>
            <div class="sub">Time: ${time}</div>
            <div class="sub">Posição: ${posicao}</div>

            <div class="stats">
              Jogos: ${stats.jogosCount} |
              Gols: ${stats.gols} |
              Assist: ${stats.assistencias}<br>
              Amarelos: ${stats.amarelos} |
              Vermelhos: ${stats.vermelhos}
            </div>

            <div class="tags">
              ${
                Array.isArray(cats) && cats.length
                ? cats.map(c=>`<span class="tag">${c}</span>`).join("")
                : catUnica
                  ? `<span class="tag">${catUnica}</span>`
                  : `<span class="tag">Sem categoria</span>`
              }

              ${j.exemplo ? `<span class="tag">Exemplo</span>` : `<span class="tag">Firebase</span>`}
            </div>
          </div>
        </div>

        <div class="actions">
          <a class="btn-ver" href="jogador-publico.html?id=${j.id}">
            <i class="fa-solid fa-eye"></i> Ver Jogador
          </a>
        </div>
      </div>
    `;
  }).join("");
}

async function carregarColecao(nome){
  try{
    const snap = await getDocs(collection(db, nome));
    const dados = [];

    snap.forEach(docSnap=>{
      dados.push({
        id:docSnap.id,
        ...docSnap.data()
      });
    });

    return dados;
  }catch(e){
    console.warn("Erro ao carregar coleção:", nome, e);
    return [];
  }
}

async function carregarDados(){
  const box = document.getElementById("lista");
  box.innerHTML = `<div class="vazio">Carregando jogadores...</div>`;

  jogadores = await carregarColecao("jogadores");
  jogos = await carregarColecao("jogos");
  campeonatos = await carregarColecao("campeonatos");
  sumulas = await carregarColecao("sumulas");

  if(!campeonatos.length){
    campeonatos = [campeonatoExemplo];
  }

  if(!jogos.length){
    jogos = [jogoExemplo];
  }

  if(!jogadores.length){
    jogadores = [...jogadoresExemplo];
  }

  preencherCampeonatos();
  selecionarPadrao();
  render();
}

window.ativarExemplo = function(){
  const temCamp = campeonatos.some(c=>c.id === campeonatoExemplo.id);
  const temJogo = jogos.some(j=>j.id === jogoExemplo.id);
  const temJogadores = jogadores.some(j=>j.exemplo);

  if(!temCamp){
    campeonatos.unshift(campeonatoExemplo);
  }

  if(!temJogo){
    jogos.unshift(jogoExemplo);
  }

  if(!temJogadores){
    jogadores = [...jogadoresExemplo, ...jogadores];
  }

  preencherCampeonatos();
  selecionarPadrao();
  render();
};

window.removerExemplo = function(){
  jogadores = jogadores.filter(j=>!j.exemplo);
  jogos = jogos.filter(j=>j.id !== jogoExemplo.id);
  campeonatos = campeonatos.filter(c=>c.id !== campeonatoExemplo.id);

  preencherCampeonatos();
  selecionarPadrao();
  render();
};

document.getElementById("busca").addEventListener("input", render);

document.getElementById("filtroCampeonato").addEventListener("change", ()=>{
  preencherCategorias();
  render();
});

document.getElementById("filtroCategoria").addEventListener("change", render);

carregarDados();
