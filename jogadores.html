<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogadores - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --yellow:#7a5a00;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

input,
select{
  font-family:inherit;
}

img{
  display:block;
  max-width:100%;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

.hero-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:12px;
}

.hero-tag{
  background:rgba(26,63,115,.9);
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

input,
select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:13px;
  background:#f5f7fb;
  color:#111;
}

input:focus,
select:focus{
  outline:2px solid rgba(247,198,0,.55);
}

.titulo-secao{
  color:var(--gold);
  font-size:22px;
  font-weight:900;
  margin:0 0 12px;
}

/* VISUAL ANTIGO — FOTO REDONDA DO LADO / ATÉ 3 POR LINHA */
.lista{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:14px;
}

.card{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.10), transparent 36%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:16px;
  padding:15px;
  min-height:210px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  transition:.25s ease;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:12px;
}

.card:hover{
  transform:translateY(-2px);
  border-color:var(--gold);
}

.card-main{
  display:flex;
  align-items:flex-start;
  gap:12px;
}

.photo{
  width:78px;
  height:78px;
  border-radius:50%;
  object-fit:cover;
  background:#1a3f73;
  border:2px solid var(--gold);
  flex-shrink:0;
}

.player-info{
  flex:1;
  min-width:0;
}

.nome{
  font-weight:900;
  font-size:17px;
  color:#fff;
  line-height:1.25;
  margin-bottom:5px;
}

.sub{
  font-size:12px;
  color:var(--muted);
  line-height:1.45;
}

.time-nome{
  color:var(--gold);
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:4px;
}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
}

.numero-card{
  color:var(--gold);
  font-size:14px;
  font-weight:900;
}

.status{
  padding:5px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
  color:#fff;
}

.status.aprovado{background:rgba(27,94,32,.88);}
.status.pendente{background:rgba(122,90,0,.88);}
.status.reprovado{background:rgba(180,35,35,.88);}

.tags{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  margin-top:8px;
}

.tag{
  background:rgba(26,63,115,.95);
  padding:4px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.08);
}

.tag.ok{
  background:rgba(27,94,32,.92);
}

.tag.alerta{
  background:rgba(122,90,0,.95);
}

.tag.red{
  background:rgba(180,35,35,.92);
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-top:10px;
}

.stat{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  border-radius:9px;
  padding:7px 4px;
  text-align:center;
}

.stat strong{
  color:var(--gold);
  display:block;
  font-size:14px;
  line-height:1;
}

.stat span{
  color:var(--muted);
  font-size:8px;
  font-weight:900;
}

.stats-extra{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:6px;
}

.stat-extra{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  border-radius:9px;
  padding:6px 4px;
  text-align:center;
}

.stat-extra strong{
  color:var(--gold);
  display:block;
  font-size:12px;
}

.stat-extra span{
  color:var(--muted);
  font-size:8px;
  font-weight:900;
}

.redes{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:8px;
}

.rede{
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1a3f73;
  color:#fff;
  font-size:13px;
  border:1px solid rgba(255,255,255,.08);
}

.rede:hover{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.actions{
  display:flex;
  align-items:center;
  justify-content:center;
}

.btn-ver{
  width:100%;
  padding:10px 8px;
  border-radius:10px;
  font-weight:900;
  font-size:12px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  text-align:center;
  transition:.2s ease;
}

.btn-ver:hover{
  filter:brightness(1.05);
  transform:translateY(-1px);
}

.vazio{
  grid-column:1/-1;
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  padding:22px;
  border-radius:14px;
  text-align:center;
  color:var(--muted);
  border:1px solid rgba(255,255,255,.08);
}

@media(max-width:1100px){
  .lista{
    grid-template-columns:repeat(3,1fr);
  }
}

@media(max-width:900px){
  .filtros{
    grid-template-columns:1fr;
  }

  .lista{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:650px){
  .lista{
    grid-template-columns:1fr;
  }

  .card-main{
    align-items:center;
  }
}

@media(max-width:600px){
  .hero{
    padding:14px;
  }

  .hero h2{
    font-size:22px;
  }
}
</style>
</head>

<body>

<main class="wrap container">

  <section class="hero">
    <h2>Jogadores</h2>
    <p>Atletas cadastrados com estatísticas automáticas puxadas de jogos e súmulas finalizadas. O CPF é usado apenas para vínculo interno e nunca aparece no público.</p>

    <div class="hero-tags">
      <div class="hero-tag" id="tagTotal">Jogadores: 0</div>
      <div class="hero-tag" id="tagGols">Gols: 0</div>
      <div class="hero-tag" id="tagAssistencias">Assistências: 0</div>
      <div class="hero-tag" id="tagCartoes">Cartões: 0</div>
    </div>
  </section>

  <div class="filtros">
    <input id="busca" placeholder="Buscar jogador, time ou posição...">

    <select id="filtroTime">
      <option value="">Todos os times</option>
    </select>

    <select id="filtroCategoria">
      <option value="">Todas categorias</option>
    </select>
  </div>

  <h2 class="titulo-secao" id="tituloPagina">Jogadores</h2>

  <div class="lista" id="lista"></div>

</main>

<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("jogadores");

let jogadores = [];
let jogos = [];
let times = [];
let sumulas = [];

function n(txt){
  return String(txt || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();
}

function val(obj, chaves, f=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== ""){
      return obj[c];
    }
  }
  return f;
}


function textoRegistro(v,f="-"){
  if(v && typeof v === "object"){
    return val(v,["nome","nomeTime","time","equipe","clube"],f);
  }
  return v || f;
}

function nomeTimeRegistroJogo(j,lado){
  const obj = lado === "A"
    ? val(j,["timeA","mandante","timeMandante"],null)
    : val(j,["timeB","visitante","timeVisitante"],null);

  const direto = lado === "A"
    ? val(j,["timeANome","nomeTimeA","mandanteNome","timeMandanteNome"],"")
    : val(j,["timeBNome","nomeTimeB","visitanteNome","timeVisitanteNome"],"");

  return textoRegistro(obj,direto || (lado === "A" ? "Time A" : "Time B"));
}

function idTimeRegistroJogo(j,lado){
  const obj = lado === "A"
    ? val(j,["timeA","mandante","timeMandante"],null)
    : val(j,["timeB","visitante","timeVisitante"],null);

  const direto = lado === "A"
    ? val(j,["timeAId","mandanteId","timeMandanteId"],"")
    : val(j,["timeBId","visitanteId","timeVisitanteId"],"");

  return String(direto || obj?.id || obj?.timeId || "");
}

function timeIdJogador(j){
  const obj = val(j,["time","timeObj","equipe","clube"],null);
  return String(val(j,["timeId","equipeId","clubeId","idTime"],"") || obj?.id || obj?.timeId || "");
}

function listaEscalacaoSumula(s){
  return [
    ...(Array.isArray(val(s,["escalacao"],[])) ? val(s,["escalacao"],[]) : []),
    ...(Array.isArray(val(s,["jogadores"],[])) ? val(s,["jogadores"],[]) : []),
    ...(Array.isArray(val(s,["jogadoresA"],[])) ? val(s,["jogadoresA"],[]) : []),
    ...(Array.isArray(val(s,["jogadoresB"],[])) ? val(s,["jogadoresB"],[]) : []),
    ...(Array.isArray(val(s,["escalacaoA"],[])) ? val(s,["escalacaoA"],[]) : []),
    ...(Array.isArray(val(s,["escalacaoB"],[])) ? val(s,["escalacaoB"],[]) : []),
    ...(s.timeA?.jogadores || []),
    ...(s.timeB?.jogadores || []),
    ...(s.mandante?.jogadores || []),
    ...(s.visitante?.jogadores || [])
  ];
}

function listaEventosSumula(s){
  return [
    ...(Array.isArray(val(s,["eventos"],[])) ? val(s,["eventos"],[]) : []),
    ...(Array.isArray(val(s,["gols"],[])) ? val(s,["gols"],[]) : []),
    ...(Array.isArray(val(s,["golsLista"],[])) ? val(s,["golsLista"],[]) : []),
    ...(Array.isArray(val(s,["golsA"],[])) ? val(s,["golsA"],[]).map(g=>({...g,time:"A"})) : []),
    ...(Array.isArray(val(s,["golsB"],[])) ? val(s,["golsB"],[]).map(g=>({...g,time:"B"})) : []),
    ...(Array.isArray(val(s,["eventosA"],[])) ? val(s,["eventosA"],[]).map(g=>({...g,time:"A"})) : []),
    ...(Array.isArray(val(s,["eventosB"],[])) ? val(s,["eventosB"],[]).map(g=>({...g,time:"B"})) : []),
    ...(Array.isArray(val(s,["cartoes"],[])) ? val(s,["cartoes"],[]) : []),
    ...(Array.isArray(val(s,["cartoesLista"],[])) ? val(s,["cartoesLista"],[]) : []),
    ...(Array.isArray(val(s,["cartoesA"],[])) ? val(s,["cartoesA"],[]).map(g=>({...g,time:"A"})) : []),
    ...(Array.isArray(val(s,["cartoesB"],[])) ? val(s,["cartoesB"],[]).map(g=>({...g,time:"B"})) : []),
    ...(Array.isArray(val(s,["assistencias"],[])) ? val(s,["assistencias"],[]) : []),
    ...(Array.isArray(val(s,["assistenciasLista"],[])) ? val(s,["assistenciasLista"],[]) : []),
    ...(Array.isArray(val(s,["assistenciasA"],[])) ? val(s,["assistenciasA"],[]).map(g=>({...g,time:"A"})) : []),
    ...(Array.isArray(val(s,["assistenciasB"],[])) ? val(s,["assistenciasB"],[]).map(g=>({...g,time:"B"})) : [])
  ];
}

function jogadorDaSumulaParaCadastro(item,s){
  const timeLetra = val(item,["time","lado","timeLetra"],"");
  const nomeTime = val(item,["timeNome","nomeTime","equipe"],"") ||
    (String(timeLetra).toUpperCase() === "A" ? nomeTimeRegistroJogo(s,"A") : String(timeLetra).toUpperCase() === "B" ? nomeTimeRegistroJogo(s,"B") : "-");

  const timeId = val(item,["timeId","equipeId","clubeId"],"") ||
    (String(timeLetra).toUpperCase() === "A" ? idTimeRegistroJogo(s,"A") : String(timeLetra).toUpperCase() === "B" ? idTimeRegistroJogo(s,"B") : "");

  return {
    id:val(item,["id","uid","jogadorId","idJogador","atletaId"],""),
    nome:val(item,["nome","nomeCompleto","jogador","jogadorNome","atleta"],"Sem nome"),
    numero:val(item,["numero","camisa","numeroCamisa"],"-"),
    posicao:val(item,["posicao","função","funcao"],"-"),
    categoria:val(item,["categoria","categoriaNome"], val(s,["categoria","categoriaNome"],"Sem categoria")),
    categorias:[val(item,["categoria","categoriaNome"], val(s,["categoria","categoriaNome"],"Sem categoria"))],
    time: nomeTime,
    timeNome: nomeTime,
    nomeTime: nomeTime,
    timeId: timeId,
    foto:val(item,["foto","imagem","fotoUrl","avatar"],"logo-liga.jfif"),
    status:"aprovado",
    origem:"sumula"
  };
}

function incluirJogadoresDaSumula(){
  const mapa = new Map();

  jogadores.forEach(j=>{
    const chave = chaveJogadorUnica(j);
    mapa.set(chave,j);
  });

  sumulas.forEach(s=>{
    listaEscalacaoSumula(s).forEach(item=>{
      const j = jogadorDaSumulaParaCadastro(item,s);
      const chave = chaveJogadorUnica(j);

      if(!mapa.has(chave)){
        mapa.set(chave,j);
      }else{
        mapa.set(chave,preferirJogador(mapa.get(chave),j));
      }
    });

    listaEventosSumula(s).forEach(item=>{
      const j = jogadorDaSumulaParaCadastro(item,s);
      if(!j.nome || j.nome === "Sem nome") return;

      const chave = chaveJogadorUnica(j);

      if(!mapa.has(chave)){
        mapa.set(chave,j);
      }else{
        mapa.set(chave,preferirJogador(mapa.get(chave),j));
      }
    });
  });

  jogadores = Array.from(mapa.values());
  deduplicarJogadores();
}

function numero(v){
  const n = Number(v);
  return Number.isFinite(n) ? n : 0;
}

function mesmoJogador(jogador, item){
  const jogadorId = val(jogador,["id"]);
  const jogadorCpf = val(jogador,["cpf","cpfJogador","documento"]);
  const jogadorNome = n(val(jogador,["nome"]));

  const itemId = val(item,["jogadorId","idJogador","id","atletaId"]);
  const itemCpf = val(item,["cpf","cpfJogador","documento"]);
  const itemNome = n(val(item,["nome","jogador","nomeJogador","atleta"]));

  return (
    (jogadorId && itemId && jogadorId === itemId) ||
    (jogadorCpf && itemCpf && jogadorCpf === itemCpf) ||
    (jogadorNome && itemNome && jogadorNome === itemNome)
  );
}

function nomeJogador(j){
  return val(j,["nome","nomeCompleto","jogador"],"Sem nome");
}

function fotoJogador(j){
  return val(j,["foto","imagem","fotoUrl","avatar"],"logo-liga.jfif");
}

function nomeTimeDoc(t){
  return val(t,["nome","timeNome","nomeTime","equipe"],"");
}


function timeDocPorId(id){
  if(!id) return null;
  return times.find(t => String(t.id || "") === String(id || "")) || null;
}

function nomeTimeAtual(j){
  const tid = timeIdJogador(j);
  const timeDoc = timeDocPorId(tid);

  if(timeDoc){
    return nomeTimeDoc(timeDoc) || "-";
  }

  return timeJogador(j);
}

function escudoTimeAtual(j){
  const tid = timeIdJogador(j);
  const timeDoc = timeDocPorId(tid);

  if(timeDoc){
    return val(timeDoc,["logo","escudo","imagem","foto"],"logo-liga.jfif");
  }

  return escudoPorTime(timeJogador(j));
}

function chaveJogadorUnica(j){
  const id = String(val(j,["id","uid","jogadorId","idJogador","atletaId"],"")).trim();
  const cpf = String(val(j,["cpf","cpfJogador","documento","CPF"],"")).trim();
  const nome = n(nomeJogador(j));
  const numero = String(numeroCamisa(j)).trim();
  const timeId = String(timeIdJogador(j)).trim();
  const timeNome = n(nomeTimeAtual(j));

  if(id) return "id:" + id;
  if(cpf) return "cpf:" + cpf;
  if(timeId) return `nome:${nome}|timeId:${timeId}|num:${numero}`;
  return `nome:${nome}|time:${timeNome}|num:${numero}`;
}

function preferirJogador(a,b){
  const origemA = val(a,["origem"],"");
  const origemB = val(b,["origem"],"");

  if(origemA !== "sumula" && origemB === "sumula") return a;
  if(origemA === "sumula" && origemB !== "sumula") return b;

  return {
    ...a,
    ...b,
    jogos:Math.max(numero(val(a,["jogos","jogosDisputados"],0)), numero(val(b,["jogos","jogosDisputados"],0))),
    gols:Math.max(numero(val(a,["gols"],0)), numero(val(b,["gols"],0))),
    assistencias:Math.max(numero(val(a,["assistencias"],0)), numero(val(b,["assistencias"],0))),
    amarelos:Math.max(numero(val(a,["amarelos","cartoesAmarelos"],0)), numero(val(b,["amarelos","cartoesAmarelos"],0))),
    vermelhos:Math.max(numero(val(a,["vermelhos","cartoesVermelhos"],0)), numero(val(b,["vermelhos","cartoesVermelhos"],0)))
  };
}

function deduplicarJogadores(){
  const mapa = new Map();

  jogadores.forEach(j=>{
    const chave = chaveJogadorUnica(j);
    if(!mapa.has(chave)){
      mapa.set(chave,j);
    }else{
      mapa.set(chave,preferirJogador(mapa.get(chave),j));
    }
  });

  jogadores = Array.from(mapa.values());
}


function escudoPorTime(nome){
  const encontrado = times.find(t => n(nomeTimeDoc(t)) === n(nome));
  return val(encontrado,["logo","escudo","imagem","foto"],"logo-liga.jfif");
}

function escudoJogador(j){
  const direto = val(j,["escudo","logoTime","timeLogo","logo"],"");
  if(direto) return direto;
  return escudoTimeAtual(j);
}

function timeJogador(j){
  return textoRegistro(val(j,["time","timeObj","equipe","clube"],""), val(j,["timeNome","nomeTime","equipeNome","clubeNome"],"-"));
}

function posicaoJogador(j){
  return val(j,["posicao","função","funcao"],"-");
}

function numeroCamisa(j){
  return val(j,["numero","camisa","numeroCamisa"],"-");
}

function statusJogador(j){
  return n(val(j,["status"],"pendente"));
}

function categoriaJogador(j){
  const catUnica = val(j,["categoria","categoriaNome"]);
  const cats = val(j,["categorias"],[]);

  if(catUnica) return catUnica;

  if(Array.isArray(cats) && cats.length){
    return cats[0];
  }

  return "Sem categoria";
}

function categoriasJogador(j){
  const catUnica = val(j,["categoria","categoriaNome"]);
  const cats = val(j,["categorias"],[]);

  if(Array.isArray(cats) && cats.length) return cats;
  if(catUnica) return [catUnica];

  return ["Sem categoria"];
}

function instagramJogador(j){
  return val(j,["instagram","insta","linkInstagram"],"");
}

function facebookJogador(j){
  return val(j,["facebook","face","linkFacebook"],"");
}

function temDocumento(j){
  return !!val(j,["cpf","cpfJogador","documento"],"");
}

function linkRede(valor,tipo){
  if(!valor) return "";

  let v = String(valor).trim();

  if(v.startsWith("http://") || v.startsWith("https://")){
    return v;
  }

  v = v.replace("@","");

  if(tipo === "instagram"){
    return `https://instagram.com/${v}`;
  }

  if(tipo === "facebook"){
    return `https://facebook.com/${v}`;
  }

  return "#";
}

function timeA(j){
  if(j.timeA && typeof j.timeA === "object") return val(j.timeA,["nome","timeNome"],"");
  return val(j,["timeA","mandante","timeMandante","nomeTimeA","mandanteNome"],"");
}

function timeB(j){
  if(j.timeB && typeof j.timeB === "object") return val(j.timeB,["nome","timeNome"],"");
  return val(j,["timeB","visitante","timeVisitante","nomeTimeB","visitanteNome"],"");
}

function placarA(j){
  if(j.placar && typeof j.placar === "object"){
    return numero(j.placar.A ?? j.placar.a ?? j.placar.mandante ?? 0);
  }
  return numero(val(j,["golsA","placarA","golsMandante","mandanteGols"],0));
}

function placarB(j){
  if(j.placar && typeof j.placar === "object"){
    return numero(j.placar.B ?? j.placar.b ?? j.placar.visitante ?? 0);
  }
  return numero(val(j,["golsB","placarB","golsVisitante","visitanteGols"],0));
}

function jogoFinalizado(j){
  return (
    j.status === "finalizado" ||
    j.finalizado === true ||
    j.sumulaFinalizada === true
  );
}

function calcularStats(jogador){
  let jogosCount = numero(val(jogador,["jogos","jogosDisputados"],0));
  let participacoesSumula = 0;
  let gols = numero(val(jogador,["gols"],0));
  let assistencias = numero(val(jogador,["assistencias"],0));
  let amarelos = numero(val(jogador,["amarelos","cartoesAmarelos"],0));
  let vermelhos = numero(val(jogador,["vermelhos","cartoesVermelhos"],0));
  let vitorias = 0;
  let empates = 0;
  let derrotas = 0;
  let golsProTime = 0;
  let golsContraTime = 0;

  const nomeTime = n(timeJogador(jogador));

  sumulas.forEach(s=>{
    const escalacao = listaEscalacaoSumula(s);

    const participou = escalacao.some(p=>mesmoJogador(jogador,p));

    if(participou){
      participacoesSumula++;
    }

    const eventos = listaEventosSumula(s);

    eventos.forEach(ev=>{
      if(!mesmoJogador(jogador,ev)) return;

      const tipo = n(val(ev,["tipo","evento","acao","categoria"]));

      if(tipo.includes("gol") && !tipo.includes("contra")) gols++;
      if(tipo.includes("assist")) assistencias++;
      if(tipo.includes("amarelo")) amarelos++;
      if(tipo.includes("vermelho")) vermelhos++;
    });
  });

  jogos.forEach(j=>{
    const a = n(timeA(j));
    const b = n(timeB(j));

    if(nomeTime && (a === nomeTime || b === nomeTime)){
      const finalizado = jogoFinalizado(j) || sumulas.some(s => s.jogoId === j.id && n(s.status) === "finalizado");

      if(finalizado){
        const ga = placarA(j);
        const gb = placarB(j);

        if(a === nomeTime){
          golsProTime += ga;
          golsContraTime += gb;

          if(ga > gb) vitorias++;
          else if(ga === gb) empates++;
          else derrotas++;
        }

        if(b === nomeTime){
          golsProTime += gb;
          golsContraTime += ga;

          if(gb > ga) vitorias++;
          else if(gb === ga) empates++;
          else derrotas++;
        }
      }
    }
  });

  jogosCount = Math.max(jogosCount, participacoesSumula);

  const totalResultados = vitorias + empates + derrotas;
  const pontos = (vitorias * 3) + empates;
  const aproveitamento = totalResultados ? Math.round((pontos / (totalResultados * 3)) * 100) : 0;
  const mediaGols = jogosCount ? (gols / jogosCount).toFixed(2) : "0.00";
  const saldoTime = golsProTime - golsContraTime;

  const suspenso =
    val(jogador,["suspenso"],false) === true ||
    vermelhos > 0 ||
    amarelos >= 3;

  return {
    jogosCount,
    participacoesSumula,
    gols,
    assistencias,
    amarelos,
    vermelhos,
    vitorias,
    empates,
    derrotas,
    golsProTime,
    golsContraTime,
    saldoTime,
    pontos,
    aproveitamento,
    mediaGols,
    suspenso
  };
}

function preencherTimes(){
  const select = document.getElementById("filtroTime");
  const mapa = new Map();

  times.forEach(t=>{
    const nome = nomeTimeDoc(t);
    if(nome){
      mapa.set(String(t.id || nome), nome);
    }
  });

  jogadores.forEach(j=>{
    const tid = timeIdJogador(j);
    const nome = nomeTimeAtual(j);

    if(nome && nome !== "-"){
      mapa.set(String(tid || nome), nome);
    }
  });

  select.innerHTML = `<option value="">Todos os times</option>`;

  Array.from(mapa.entries())
    .sort((a,b)=>String(a[1]).localeCompare(String(b[1]),"pt-BR"))
    .forEach(([id,nome])=>{
      select.innerHTML += `<option value="${id}">${nome}</option>`;
    });
}

function preencherCategorias(){
  const select = document.getElementById("filtroCategoria");
  const categorias = new Set();

  jogadores.forEach(j=>{
    categoriasJogador(j).forEach(c=>{
      if(c) categorias.add(c);
    });
  });

  jogos.forEach(j=>{
    if(j.categoria) categorias.add(j.categoria);
  });

  select.innerHTML = `<option value="">Todas categorias</option>`;

  Array.from(categorias)
    .sort((a,b)=>String(a).localeCompare(String(b),"pt-BR"))
    .forEach(cat=>{
      select.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
}

function filtrarJogadores(){
  const timeSelecionado = document.getElementById("filtroTime").value;
  const categoria = document.getElementById("filtroCategoria").value;
  const busca = n(document.getElementById("busca").value);

  return jogadores.filter(j=>{
    const nome = nomeJogador(j);
    const time = nomeTimeAtual(j);
    const posicao = posicaoJogador(j);
    const tid = timeIdJogador(j);

    if(timeSelecionado && String(tid || time) !== String(timeSelecionado) && n(time) !== n(timeSelecionado)){
      return false;
    }

    if(categoria && !categoriasJogador(j).includes(categoria)){
      return false;
    }

    if(busca){
      const textoBusca = n(`${nome} ${time} ${posicao}`);
      if(!textoBusca.includes(busca)) return false;
    }

    return true;
  }).sort((a,b)=>{
    const catA = categoriaJogador(a);
    const catB = categoriaJogador(b);

    const comparaCategoria = String(catA).localeCompare(String(catB),"pt-BR");

    if(comparaCategoria !== 0){
      return comparaCategoria;
    }

    const timeAOrdenar = nomeTimeAtual(a);
    const timeBOrdenar = nomeTimeAtual(b);
    const comparaTime = String(timeAOrdenar).localeCompare(String(timeBOrdenar),"pt-BR");

    if(comparaTime !== 0){
      return comparaTime;
    }

    return nomeJogador(a).localeCompare(nomeJogador(b),"pt-BR");
  });
}

function statusClasse(status){
  if(status === "aprovado") return "aprovado";
  if(status === "reprovado") return "reprovado";
  return "pendente";
}

function statusTexto(status){
  if(status === "aprovado") return "Aprovado";
  if(status === "reprovado") return "Reprovado";
  return "Pendente";
}

function atualizarTopo(lista){
  let gols = 0;
  let assistencias = 0;
  let cartoes = 0;

  lista.forEach(j=>{
    const s = calcularStats(j);
    gols += s.gols;
    assistencias += s.assistencias;
    cartoes += s.amarelos + s.vermelhos;
  });

  document.getElementById("tagTotal").innerText = `Jogadores: ${lista.length}`;
  document.getElementById("tagGols").innerText = `Gols: ${gols}`;
  document.getElementById("tagAssistencias").innerText = `Assistências: ${assistencias}`;
  document.getElementById("tagCartoes").innerText = `Cartões: ${cartoes}`;

  const categoria = document.getElementById("filtroCategoria").value;
  const timeSelect = document.getElementById("filtroTime");
  const time = timeSelect.value ? timeSelect.options[timeSelect.selectedIndex].text : "";

  document.getElementById("tituloPagina").innerText =
    `Jogadores${categoria ? " - " + categoria : ""}${time ? " | " + time : ""}`;
}

function render(){
  const box = document.getElementById("lista");
  const lista = filtrarJogadores();

  atualizarTopo(lista);

  if(!jogadores.length){
    box.innerHTML = `<div class="vazio">Nenhum jogador cadastrado no Firebase.</div>`;
    return;
  }

  if(!lista.length){
    box.innerHTML = `<div class="vazio">Nenhum jogador encontrado.</div>`;
    return;
  }

  box.innerHTML = lista.map(j=>{
    const nome = nomeJogador(j);
    const numero = numeroCamisa(j);
    const time = nomeTimeAtual(j);
    const posicao = posicaoJogador(j);
    const foto = fotoJogador(j);
    const cats = categoriasJogador(j);
    const status = statusJogador(j);
    const stats = calcularStats(j);
    const instagram = instagramJogador(j);
    const facebook = facebookJogador(j);

    return `
      <div class="card">

        <div class="card-top">
          <div class="numero-card">Nº ${numero}</div>

          <div class="status ${statusClasse(status)}">
            ${statusTexto(status)}
          </div>
        </div>

        <div class="card-main">
          <img src="${foto}" class="photo" onerror="this.src='logo-liga.jfif'">

          <div class="player-info">
            <div class="nome">${nome}</div>
            <div class="time-nome">${time}</div>
            <div class="sub">Posição: ${posicao}</div>

            <div class="tags">
              ${
                cats.map(c=>`<span class="tag">${c}</span>`).join("")
              }

              ${
                temDocumento(j)
                ? `<span class="tag ok"><i class="fa-solid fa-check"></i> Documento verificado</span>`
                : `<span class="tag alerta">Documento pendente</span>`
              }

              ${
                stats.suspenso
                ? `<span class="tag red">Suspenso</span>`
                : `<span class="tag ok">Liberado</span>`
              }
            </div>

            <div class="redes">
              ${
                instagram
                ? `<a class="rede" href="${linkRede(instagram,"instagram")}" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>`
                : ""
              }

              ${
                facebook
                ? `<a class="rede" href="${linkRede(facebook,"facebook")}" target="_blank" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>`
                : ""
              }
            </div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat">
            <strong>${stats.jogosCount}</strong>
            <span>JOGOS</span>
          </div>

          <div class="stat">
            <strong>${stats.gols}</strong>
            <span>GOLS</span>
          </div>

          <div class="stat">
            <strong>${stats.assistencias}</strong>
            <span>ASSIST.</span>
          </div>

          <div class="stat">
            <strong>${stats.mediaGols}</strong>
            <span>MÉDIA</span>
          </div>
        </div>

        <div class="stats-extra">
          <div class="stat-extra">
            <strong>${stats.amarelos}</strong>
            <span>AMAR.</span>
          </div>

          <div class="stat-extra">
            <strong>${stats.vermelhos}</strong>
            <span>VERM.</span>
          </div>

          <div class="stat-extra">
            <strong>${stats.aproveitamento}%</strong>
            <span>APROV.</span>
          </div>
        </div>

        <div class="actions">
          <a class="btn-ver" href="jogador-publico.html?id=${j.id}">
            <i class="fa-solid fa-eye"></i> Ver Perfil
          </a>
        </div>
      </div>
    `;
  }).join("");
}

async function carregarColecao(nome){
  try{
    const snap = await getDocs(collection(db, nome));
    const dados = [];

    snap.forEach(docSnap=>{
      dados.push({
        id:docSnap.id,
        ...docSnap.data()
      });
    });

    return dados;
  }catch(e){
    console.warn("Erro ao carregar coleção:", nome, e);
    return [];
  }
}

async function carregarDados(){
  const box = document.getElementById("lista");
  box.innerHTML = `<div class="vazio">Carregando jogadores...</div>`;

  jogadores = await carregarColecao("jogadores");
  jogos = await carregarColecao("jogos");
  times = await carregarColecao("times");
  sumulas = await carregarColecao("sumulas");

  incluirJogadoresDaSumula();
  deduplicarJogadores();

  preencherTimes();
  preencherCategorias();
  render();
}

document.getElementById("busca").addEventListener("input", render);
document.getElementById("filtroTime").addEventListener("change", render);
document.getElementById("filtroCategoria").addEventListener("change", render);

carregarDados();
</script>
