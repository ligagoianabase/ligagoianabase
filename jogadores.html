<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogadores - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --green:#1b5e20;
  --yellow:#7a5a00;
  --red:#b42323;
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

input,
select{
  font-family:inherit;
}

img{
  display:block;
  max-width:100%;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

.hero-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:12px;
}

.hero-tag{
  background:rgba(26,63,115,.9);
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

input,
select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:13px;
  background:#f5f7fb;
  color:#111;
}

input:focus,
select:focus{
  outline:2px solid rgba(247,198,0,.55);
}

.titulo-secao{
  color:var(--gold);
  font-size:22px;
  font-weight:900;
  margin:0 0 12px;
}

/* GRID PADRÃO — MÁXIMO 5 POR LINHA */
.lista{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:12px;
}

@media(max-width:1100px){
  .lista{
    grid-template-columns:repeat(4, 1fr);
  }
}

@media(max-width:900px){
  .lista{
    grid-template-columns:repeat(3, 1fr);
  }
}

@media(max-width:650px){
  .lista{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:430px){
  .lista{
    grid-template-columns:1fr;
  }
}

.card{
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:10px;
  padding:12px;
  min-height:390px;
  border-radius:14px;
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.12), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid rgba(247,198,0,.18);
  box-shadow:0 8px 18px rgba(0,0,0,.25);
}

.card:hover{
  border-color:var(--gold);
  transform:translateY(-2px);
  transition:.25s ease;
}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

.card-icon{
  width:32px;
  height:32px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
}

.status{
  padding:5px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
  color:#fff;
}

.status.aprovado{background:var(--green);}
.status.pendente{background:var(--yellow);}
.status.reprovado{background:var(--red);}

.player{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:8px;
}

.photo{
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--gold);
  background:#1a3f73;
}

.info{
  display:flex;
  flex-direction:column;
  gap:4px;
  width:100%;
}

.nome{
  font-weight:900;
  font-size:14px;
  color:#fff;
  line-height:1.25;
}

.sub{
  font-size:12px;
  color:var(--muted);
}

.tags{
  display:flex;
  justify-content:center;
  gap:5px;
  flex-wrap:wrap;
}

.tag{
  background:#1a3f73;
  padding:4px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:800;
  border:1px solid rgba(255,255,255,.08);
}

.tag.ok{
  background:var(--green);
}

.tag.alerta{
  background:var(--yellow);
}

.tag.red{
  background:var(--red);
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:8px;
}

.stat{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:9px;
  padding:7px 4px;
  text-align:center;
}

.stat strong{
  color:var(--gold);
  display:block;
  font-size:15px;
  line-height:1;
}

.stat span{
  color:var(--muted);
  font-size:9px;
  font-weight:800;
}

.redes{
  display:flex;
  justify-content:center;
  gap:6px;
  flex-wrap:wrap;
  margin-top:8px;
}

.rede{
  width:31px;
  height:31px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1a3f73;
  color:#fff;
  font-size:14px;
  border:1px solid rgba(255,255,255,.08);
}

.rede:hover{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.actions{
  display:flex;
  align-items:center;
  justify-content:center;
}

.btn-ver{
  width:100%;
  padding:10px 8px;
  border-radius:10px;
  font-weight:900;
  font-size:12px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  text-align:center;
}

.vazio{
  grid-column:1/-1;
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  padding:22px;
  border-radius:14px;
  text-align:center;
  color:var(--muted);
  border:1px solid rgba(255,255,255,.08);
}

@media(max-width:900px){
  .filtros{
    grid-template-columns:1fr;
  }
}

@media(max-width:600px){
  .hero{
    padding:14px;
  }

  .hero h2{
    font-size:22px;
  }
}
</style>
</head>

<body>

<main class="wrap container">

  <section class="hero">
    <h2>Jogadores</h2>
    <p>Atletas cadastrados com estatísticas automáticas puxadas de jogos e súmulas finalizadas. O CPF é usado apenas para vínculo interno e nunca aparece no público.</p>

    <div class="hero-tags">
      <div class="hero-tag" id="tagTotal">Jogadores: 0</div>
      <div class="hero-tag" id="tagGols">Gols: 0</div>
      <div class="hero-tag" id="tagAssistencias">Assistências: 0</div>
      <div class="hero-tag" id="tagCartoes">Cartões: 0</div>
    </div>
  </section>

  <div class="filtros">
    <input id="busca" placeholder="Buscar jogador, time ou posição...">

    <select id="filtroCampeonato">
      <option value="">Todos os campeonatos</option>
    </select>

    <select id="filtroCategoria">
      <option value="">Todas categorias</option>
    </select>
  </div>

  <h2 class="titulo-secao" id="tituloPagina">Jogadores</h2>

  <div class="lista" id="lista"></div>

</main>

<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("jogadores");

let jogadores = [];
let jogos = [];
let campeonatos = [];
let sumulas = [];

function n(txt){
  return String(txt || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\\u0300-\\u036f]/g,"")
    .trim();
}

function val(obj, chaves, f=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== ""){
      return obj[c];
    }
  }
  return f;
}

function numero(v){
  const n = Number(v);
  return Number.isFinite(n) ? n : 0;
}

function mesmoJogador(jogador, item){
  const jogadorId = val(jogador,["id"]);
  const jogadorCpf = val(jogador,["cpf","cpfJogador","documento"]);
  const jogadorNome = n(val(jogador,["nome"]));

  const itemId = val(item,["jogadorId","idJogador","id","atletaId"]);
  const itemCpf = val(item,["cpf","cpfJogador","documento"]);
  const itemNome = n(val(item,["nome","jogador","nomeJogador","atleta"]));

  return (
    (jogadorId && itemId && jogadorId === itemId) ||
    (jogadorCpf && itemCpf && jogadorCpf === itemCpf) ||
    (jogadorNome && itemNome && jogadorNome === itemNome)
  );
}

function nomeJogador(j){
  return val(j,["nome","nomeCompleto","jogador"],"Sem nome");
}

function fotoJogador(j){
  return val(j,["foto","imagem","fotoUrl","avatar"],"logo-liga.jfif");
}

function timeJogador(j){
  return val(j,["time","timeNome","nomeTime","equipe"],"-");
}

function posicaoJogador(j){
  return val(j,["posicao","função","funcao"],"-");
}

function numeroCamisa(j){
  return val(j,["numero","camisa","numeroCamisa"],"-");
}

function statusJogador(j){
  return n(val(j,["status"],"pendente"));
}

function categoriaJogador(j){
  const catUnica = val(j,["categoria","categoriaNome"]);
  const cats = val(j,["categorias"],[]);

  if(catUnica) return catUnica;

  if(Array.isArray(cats) && cats.length){
    return cats[0];
  }

  return "Sem categoria";
}

function categoriasJogador(j){
  const catUnica = val(j,["categoria","categoriaNome"]);
  const cats = val(j,["categorias"],[]);

  if(Array.isArray(cats) && cats.length) return cats;
  if(catUnica) return [catUnica];

  return ["Sem categoria"];
}

function instagramJogador(j){
  return val(j,["instagram","insta","linkInstagram"],"");
}

function facebookJogador(j){
  return val(j,["facebook","face","linkFacebook"],"");
}

function temDocumento(j){
  return !!val(j,["cpf","cpfJogador","documento"],"");
}

function linkRede(valor,tipo){
  if(!valor) return "";

  let v = String(valor).trim();

  if(v.startsWith("http://") || v.startsWith("https://")){
    return v;
  }

  v = v.replace("@","");

  if(tipo === "instagram"){
    return `https://instagram.com/${v}`;
  }

  if(tipo === "facebook"){
    return `https://facebook.com/${v}`;
  }

  return "#";
}

function getCampSelecionado(){
  const id = document.getElementById("filtroCampeonato").value;
  return campeonatos.find(c => c.id === id);
}

function nomeCampeonato(c){
  return val(c,["nome","campeonato","titulo","nomeCampeonato"],"");
}

function jogoDoCamp(jogo, camp){
  if(!camp) return false;

  const campIdJogo = val(jogo,["campeonatoId","idCampeonato"]);
  const campNomeJogo = val(jogo,["campeonato","nomeCampeonato"]);
  const campNome = nomeCampeonato(camp);

  return campIdJogo === camp.id || n(campNomeJogo) === n(campNome);
}

function timeA(j){
  if(j.timeA && typeof j.timeA === "object") return val(j.timeA,["nome","timeNome"],"");
  return val(j,["timeA","mandante","timeMandante","nomeTimeA","mandanteNome"],"");
}

function timeB(j){
  if(j.timeB && typeof j.timeB === "object") return val(j.timeB,["nome","timeNome"],"");
  return val(j,["timeB","visitante","timeVisitante","nomeTimeB","visitanteNome"],"");
}

function placarA(j){
  if(j.placar && typeof j.placar === "object"){
    return numero(j.placar.A ?? j.placar.a ?? j.placar.mandante ?? 0);
  }
  return numero(val(j,["golsA","placarA","golsMandante","mandanteGols"],0));
}

function placarB(j){
  if(j.placar && typeof j.placar === "object"){
    return numero(j.placar.B ?? j.placar.b ?? j.placar.visitante ?? 0);
  }
  return numero(val(j,["golsB","placarB","golsVisitante","visitanteGols"],0));
}

function jogoFinalizado(j){
  return (
    j.status === "finalizado" ||
    j.finalizado === true ||
    j.sumulaFinalizada === true
  );
}

function calcularStats(jogador){
  let jogosCount = numero(val(jogador,["jogos","jogosDisputados"],0));
  let participacoesSumula = 0;
  let gols = numero(val(jogador,["gols"],0));
  let assistencias = numero(val(jogador,["assistencias"],0));
  let amarelos = numero(val(jogador,["amarelos","cartoesAmarelos"],0));
  let vermelhos = numero(val(jogador,["vermelhos","cartoesVermelhos"],0));
  let vitorias = 0;
  let empates = 0;
  let derrotas = 0;
  let golsProTime = 0;
  let golsContraTime = 0;

  const nomeTime = n(timeJogador(jogador));

  sumulas.forEach(s=>{
    const escalacao = [
      ...(val(s,["escalacao"],[])),
      ...(val(s,["jogadores"],[])),
      ...(s.timeA?.jogadores || []),
      ...(s.timeB?.jogadores || []),
      ...(s.mandante?.jogadores || []),
      ...(s.visitante?.jogadores || [])
    ];

    const participou = escalacao.some(p=>mesmoJogador(jogador,p));

    if(participou){
      participacoesSumula++;
    }

    const eventos = [
      ...(val(s,["eventos"],[])),
      ...(val(s,["gols"],[])),
      ...(val(s,["cartoes"],[])),
      ...(val(s,["assistencias"],[]))
    ];

    eventos.forEach(ev=>{
      if(!mesmoJogador(jogador,ev)) return;

      const tipo = n(val(ev,["tipo","evento","acao","categoria"]));

      if(tipo.includes("gol") && !tipo.includes("contra")) gols++;
      if(tipo.includes("assist")) assistencias++;
      if(tipo.includes("amarelo")) amarelos++;
      if(tipo.includes("vermelho")) vermelhos++;
    });
  });

  jogos.forEach(j=>{
    const a = n(timeA(j));
    const b = n(timeB(j));

    if(nomeTime && (a === nomeTime || b === nomeTime)){
      const finalizado = jogoFinalizado(j) || sumulas.some(s => s.jogoId === j.id && n(s.status) === "finalizado");

      if(finalizado){
        const ga = placarA(j);
        const gb = placarB(j);

        if(a === nomeTime){
          golsProTime += ga;
          golsContraTime += gb;

          if(ga > gb) vitorias++;
          else if(ga === gb) empates++;
          else derrotas++;
        }

        if(b === nomeTime){
          golsProTime += gb;
          golsContraTime += ga;

          if(gb > ga) vitorias++;
          else if(gb === ga) empates++;
          else derrotas++;
        }
      }
    }
  });

  jogosCount = Math.max(jogosCount, participacoesSumula);

  const totalResultados = vitorias + empates + derrotas;
  const pontos = (vitorias * 3) + empates;
  const aproveitamento = totalResultados ? Math.round((pontos / (totalResultados * 3)) * 100) : 0;
  const mediaGols = jogosCount ? (gols / jogosCount).toFixed(2) : "0.00";
  const saldoTime = golsProTime - golsContraTime;

  const suspenso =
    val(jogador,["suspenso"],false) === true ||
    vermelhos > 0 ||
    amarelos >= 3;

  return {
    jogosCount,
    participacoesSumula,
    gols,
    assistencias,
    amarelos,
    vermelhos,
    vitorias,
    empates,
    derrotas,
    golsProTime,
    golsContraTime,
    saldoTime,
    pontos,
    aproveitamento,
    mediaGols,
    suspenso
  };
}

function preencherCampeonatos(){
  const select = document.getElementById("filtroCampeonato");

  select.innerHTML = `<option value="">Todos os campeonatos</option>`;

  campeonatos
    .sort((a,b)=>nomeCampeonato(a).localeCompare(nomeCampeonato(b),"pt-BR"))
    .forEach(c=>{
      select.innerHTML += `
        <option value="${c.id}">
          ${nomeCampeonato(c) || "-"}
        </option>
      `;
    });
}

function preencherCategorias(){
  const select = document.getElementById("filtroCategoria");
  const categorias = new Set();

  jogadores.forEach(j=>{
    categoriasJogador(j).forEach(c=>{
      if(c) categorias.add(c);
    });
  });

  jogos.forEach(j=>{
    if(j.categoria) categorias.add(j.categoria);
  });

  select.innerHTML = `<option value="">Todas categorias</option>`;

  Array.from(categorias)
    .sort((a,b)=>String(a).localeCompare(String(b),"pt-BR"))
    .forEach(cat=>{
      select.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
}

function filtrarJogadores(){
  const camp = getCampSelecionado();
  const categoria = document.getElementById("filtroCategoria").value;
  const busca = n(document.getElementById("busca").value);

  let timesDoCampeonato = new Set();

  if(camp){
    jogos.forEach(j=>{
      if(!jogoDoCamp(j,camp)) return;
      if(categoria && j.categoria && j.categoria !== categoria) return;

      const a = timeA(j);
      const b = timeB(j);

      if(a) timesDoCampeonato.add(n(a));
      if(b) timesDoCampeonato.add(n(b));
    });
  }

  return jogadores.filter(j=>{
    const nome = nomeJogador(j);
    const time = timeJogador(j);
    const posicao = posicaoJogador(j);

    if(camp){
      const jogadorCampId = val(j,["campeonatoId","idCampeonato"]);
      const jogadorCampNome = val(j,["campeonato","nomeCampeonato"]);
      const campNome = nomeCampeonato(camp);

      const pertencePorCamp =
        jogadorCampId === camp.id ||
        n(jogadorCampNome) === n(campNome);

      const pertencePorTime = timesDoCampeonato.size
        ? timesDoCampeonato.has(n(time))
        : true;

      if(!pertencePorCamp && !pertencePorTime) return false;
    }

    if(categoria && !categoriasJogador(j).includes(categoria)){
      return false;
    }

    if(busca){
      const textoBusca = n(`${nome} ${time} ${posicao}`);
      if(!textoBusca.includes(busca)) return false;
    }

    return true;
  }).sort((a,b)=>{
    const catA = categoriaJogador(a);
    const catB = categoriaJogador(b);

    const comparaCategoria = String(catA).localeCompare(String(catB),"pt-BR");

    if(comparaCategoria !== 0){
      return comparaCategoria;
    }

    return nomeJogador(a).localeCompare(nomeJogador(b),"pt-BR");
  });
}

function statusClasse(status){
  if(status === "aprovado") return "aprovado";
  if(status === "reprovado") return "reprovado";
  return "pendente";
}

function statusTexto(status){
  if(status === "aprovado") return "Aprovado";
  if(status === "reprovado") return "Reprovado";
  return "Pendente";
}

function atualizarTopo(lista){
  let gols = 0;
  let assistencias = 0;
  let cartoes = 0;

  lista.forEach(j=>{
    const s = calcularStats(j);
    gols += s.gols;
    assistencias += s.assistencias;
    cartoes += s.amarelos + s.vermelhos;
  });

  document.getElementById("tagTotal").innerText = `Jogadores: ${lista.length}`;
  document.getElementById("tagGols").innerText = `Gols: ${gols}`;
  document.getElementById("tagAssistencias").innerText = `Assistências: ${assistencias}`;
  document.getElementById("tagCartoes").innerText = `Cartões: ${cartoes}`;

  const categoria = document.getElementById("filtroCategoria").value;
  const camp = getCampSelecionado();

  document.getElementById("tituloPagina").innerText =
    `Jogadores${categoria ? " - " + categoria : ""}${camp ? " | " + nomeCampeonato(camp) : ""}`;
}

function render(){
  const box = document.getElementById("lista");
  const lista = filtrarJogadores();

  atualizarTopo(lista);

  if(!jogadores.length){
    box.innerHTML = `<div class="vazio">Nenhum jogador cadastrado no Firebase.</div>`;
    return;
  }

  if(!lista.length){
    box.innerHTML = `<div class="vazio">Nenhum jogador encontrado.</div>`;
    return;
  }

  box.innerHTML = lista.map(j=>{
    const nome = nomeJogador(j);
    const numero = numeroCamisa(j);
    const time = timeJogador(j);

async function carregarColecao(nome){
  try{
    const snap = await getDocs(collection(db, nome));
    const dados = [];

    snap.forEach(docSnap=>{
      dados.push({
        id:docSnap.id,
        ...docSnap.data()
      });
    });

    return dados;
  }catch(e){
    console.warn("Erro ao carregar coleção:", nome, e);
    return [];
  }
}

async function carregarDados(){
  const box = document.getElementById("lista");
  box.innerHTML = `<div class="vazio">Carregando jogadores...</div>`;

  jogadores = await carregarColecao("jogadores");
  jogos = await carregarColecao("jogos");
  campeonatos = await carregarColecao("campeonatos");
  sumulas = await carregarColecao("sumulas");

  preencherCampeonatos();
  preencherCategorias();
  render();
}

document.getElementById("busca").addEventListener("input", render);
document.getElementById("filtroCampeonato").addEventListener("change", render);
document.getElementById("filtroCategoria").addEventListener("change", render);

carregarDados();
</script>
