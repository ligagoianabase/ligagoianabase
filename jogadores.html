<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogadores - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.12);
  --gold-line:rgba(247,198,0,.45);
  --blue:#1a3f73;
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:1240px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

input,
select{
  font-family:inherit;
}

img{
  display:block;
  max-width:100%;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.site-header{
  background:linear-gradient(180deg, rgba(2,10,24,.98), rgba(8,23,44,.96));
  border-bottom:3px solid var(--gold);
  box-shadow:var(--shadow);
}

.header-top{
  min-height:92px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px 0;
}

.header-title{
  text-align:center;
  font-size:26px;
  font-weight:900;
  letter-spacing:.8px;
  text-transform:uppercase;
  line-height:1.15;
}

.nav-bar{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.98));
  border-top:1px solid rgba(255,255,255,.06);
  overflow:hidden;
}

.menu{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:clamp(4px, .55vw, 10px);
  padding:14px 6px;
  flex-wrap:nowrap;
  overflow:hidden;
}

.menu a{
  color:#fff;
  font-weight:900;
  font-size:clamp(11px, .92vw, 15px);
  background:linear-gradient(180deg, rgba(16,42,82,.98), rgba(12,33,64,.98));
  padding:clamp(8px, .75vw, 12px) clamp(9px, 1vw, 18px);
  border-radius:clamp(10px, .9vw, 15px);
  border:1px solid rgba(255,255,255,.07);
  white-space:nowrap;
  flex:0 1 auto;
  box-shadow:0 10px 22px rgba(0,0,0,.24);
  transition:.25s ease;
}

.menu a:hover{
  color:var(--gold);
  border-color:var(--gold-line);
}

.menu a.ativo{
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
}

.container{
  padding:22px 0 34px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid var(--gold-line);
  border-radius:20px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero h2{
  color:var(--gold);
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.hero p{
  color:var(--muted);
  line-height:1.5;
  font-size:14px;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

input,
select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:13px;
  background:#f5f7fb;
  color:#111;
}

input:focus,
select:focus{
  outline:2px solid rgba(247,198,0,.55);
}

.lista{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:12px;
}

.card{
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:10px;
  padding:12px;
  min-height:245px;
  border-radius:14px;
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.96));
  border:1px solid rgba(247,198,0,.18);
  box-shadow:0 8px 18px rgba(0,0,0,.25);
}

.player{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:8px;
}

.photo{
  width:62px;
  height:62px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid rgba(255,255,255,.15);
  background:#1a3f73;
}

.info{
  display:flex;
  flex-direction:column;
  gap:4px;
  width:100%;
}

.nome{
  font-weight:900;
  font-size:14px;
  color:#fff;
}

.sub{
  font-size:12px;
  color:var(--muted);
}

.tags{
  display:flex;
  justify-content:center;
  gap:5px;
  flex-wrap:wrap;
}

.tag{
  background:#1a3f73;
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
}

.stats{
  font-size:12px;
  color:var(--muted);
  line-height:1.4;
}

.actions{
  display:flex;
  align-items:center;
  justify-content:center;
}

.btn-ver{
  width:100%;
  padding:10px 8px;
  border-radius:10px;
  font-weight:900;
  font-size:12px;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  color:#111;
  text-align:center;
}

.vazio{
  grid-column:1/-1;
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  padding:22px;
  border-radius:14px;
  text-align:center;
  color:var(--muted);
  border:1px solid rgba(255,255,255,.08);
}

@media(max-width:1100px){
  .lista{
    grid-template-columns:repeat(4, 1fr);
  }
}

@media(max-width:900px){
  .filtros{
    grid-template-columns:1fr;
  }

  .lista{
    grid-template-columns:repeat(3, 1fr);
  }
}

@media(max-width:650px){
  .lista{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:430px){
  .lista{
    grid-template-columns:1fr;
  }
}

@media(max-width:600px){
  .header-title{
    font-size:16px;
  }

  .menu{
    justify-content:flex-start;
    overflow-x:auto;
  }

  .hero{
    padding:14px;
  }

  .hero h2{
    font-size:22px;
  }
}
</style>
</head>

<body>

<header class="site-header">
  <div class="wrap header-top">
    <div class="header-title">
      LIGA GOIANA DE FUTEBOL DE BASE
    </div>
  </div>

  <div class="nav-bar">
    <div class="wrap">
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="campeonatos.html">Campeonatos</a>
        <a href="tabela.html">Tabela</a>
        <a href="jogos.html">Jogos</a>
        <a href="times.html">Times</a>
        <a href="tecnicos.html">Técnicos</a>
        <a href="jogadores.html" class="ativo">Jogadores</a>
        <a href="arbitros.html">Árbitros</a>
        <a href="assistente.html">Assistente</a>
        <a href="sumulas.html">Súmula</a>
        <a href="noticias.html">Notícias</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </div>
</header>

<main class="wrap container">

  <section class="hero">
    <h2>Jogadores</h2>
    <p>Visualize atletas por campeonato, categoria, time e desempenho completo.</p>
  </section>

  <div class="filtros">
    <input id="busca" placeholder="Buscar jogador, time, CPF ou posição...">

    <select id="filtroCampeonato">
      <option value="">Carregando campeonatos...</option>
    </select>

    <select id="filtroCategoria">
      <option value="">Todas categorias</option>
    </select>
  </div>

  <div class="lista" id="lista"></div>

</main>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let jogadores = [];
let jogos = [];
let campeonatos = [];
let sumulas = [];

function n(txt){
  return String(txt || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function val(obj, chaves, f=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== ""){
      return obj[c];
    }
  }
  return f;
}

function mesmoJogador(jogador, item){
  const jogadorId = val(jogador,["id"]);
  const jogadorCpf = val(jogador,["cpf"]);
  const jogadorNome = n(val(jogador,["nome"]));

  const itemId = val(item,["jogadorId","idJogador","id"]);
  const itemCpf = val(item,["cpf"]);
  const itemNome = n(val(item,["nome","jogador","nomeJogador"]));

  return (
    (jogadorId && itemId && jogadorId === itemId) ||
    (jogadorCpf && itemCpf && jogadorCpf === itemCpf) ||
    (jogadorNome && itemNome && jogadorNome === itemNome)
  );
}

function calcularStats(jogador){
  let jogosCount = Number(val(jogador,["jogos","jogosDisputados"],0));
  let gols = Number(val(jogador,["gols"],0));
  let assistencias = Number(val(jogador,["assistencias"],0));
  let amarelos = Number(val(jogador,["amarelos","cartoesAmarelos"],0));
  let vermelhos = Number(val(jogador,["vermelhos","cartoesVermelhos"],0));

  sumulas.forEach(s=>{
    const escalacao = [
      ...(val(s,["escalacao"],[])),
      ...(val(s,["jogadores"],[])),
      ...(s.timeA?.jogadores || []),
      ...(s.timeB?.jogadores || [])
    ];

    if(escalacao.some(p=>mesmoJogador(jogador,p))){
      jogosCount++;
    }

    const eventos = [
      ...(val(s,["eventos"],[])),
      ...(val(s,["gols"],[])),
      ...(val(s,["cartoes"],[])
    ];

    eventos.forEach(ev=>{
      if(!mesmoJogador(jogador,ev)) return;

      const tipo = n(val(ev,["tipo","evento","acao"]));

      if(tipo.includes("gol")) gols++;
      if(tipo.includes("assist")) assistencias++;
      if(tipo.includes("amarelo")) amarelos++;
      if(tipo.includes("vermelho")) vermelhos++;
    });
  });

  return { jogosCount, gols, assistencias, amarelos, vermelhos };
}

function getCategoriaJogador(jogador){
  const catUnica = val(jogador,["categoria"]);
  const cats = val(jogador,["categorias"],[]);

  if(catUnica) return catUnica;

  if(Array.isArray(cats) && cats.length){
    return cats[0];
  }

  return "Sem categoria";
}

function getCampSelecionado(){
  const id = document.getElementById("filtroCampeonato").value;
  return campeonatos.find(c => c.id === id);
}

function jogoDoCamp(jogo, camp){
  if(!camp) return false;

  const campIdJogo = val(jogo,["campeonatoId","idCampeonato"]);
  const campNomeJogo = val(jogo,["campeonato","nomeCampeonato"]);
  const campNome = val(camp,["nome","campeonato","titulo"]);

  return campIdJogo === camp.id || n(campNomeJogo) === n(campNome);
}

function preencherCampeonatos(){
  const select = document.getElementById("filtroCampeonato");

  select.innerHTML = `<option value="">Todos os campeonatos</option>`;

  campeonatos
    .sort((a,b)=>val(a,["nome","campeonato","titulo"]).localeCompare(val(b,["nome","campeonato","titulo"]),"pt-BR"))
    .forEach(c=>{
      select.innerHTML += `
        <option value="${c.id}">
          ${val(c,["nome","campeonato","titulo"],"-")}
        </option>
      `;
    });
}

function preencherCategorias(){
  const select = document.getElementById("filtroCategoria");
  const categorias = new Set();

  jogadores.forEach(j=>{
    const catUnica = val(j,["categoria"]);
    const cats = val(j,["categorias"],[]);

    if(catUnica) categorias.add(catUnica);

    if(Array.isArray(cats)){
      cats.forEach(c=>categorias.add(c));
    }
  });

  jogos.forEach(j=>{
    if(j.categoria) categorias.add(j.categoria);
  });

  select.innerHTML = `<option value="">Todas categorias</option>`;

  Array.from(categorias)
    .sort((a,b)=>String(a).localeCompare(String(b),"pt-BR"))
    .forEach(cat=>{
      select.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
}

function filtrarJogadores(){
  const camp = getCampSelecionado();
  const categoria = document.getElementById("filtroCategoria").value;
  const busca = n(document.getElementById("busca").value);

  let timesDoCampeonato = new Set();

  if(camp){
    jogos.forEach(j=>{
      if(!jogoDoCamp(j,camp)) return;
      if(categoria && j.categoria && j.categoria !== categoria) return;

      const timeA = val(j,["timeA","mandante","timeMandante","nomeTimeA"]);
      const timeB = val(j,["timeB","visitante","timeVisitante","nomeTimeB"]);

      if(timeA) timesDoCampeonato.add(n(timeA));
      if(timeB) timesDoCampeonato.add(n(timeB));
    });
  }

  return jogadores.filter(j=>{
    const nome = val(j,["nome"]);
    const time = val(j,["time","timeNome","nomeTime"]);
    const posicao = val(j,["posicao"]);
    const cpf = val(j,["cpf"]);

    if(camp){
      const jogadorCampId = val(j,["campeonatoId","idCampeonato"]);
      const jogadorCampNome = val(j,["campeonato","nomeCampeonato"]);
      const campNome = val(camp,["nome","campeonato","titulo"]);

      const pertencePorCamp =
        jogadorCampId === camp.id ||
        n(jogadorCampNome) === n(campNome);

      const pertencePorTime = timesDoCampeonato.size
        ? timesDoCampeonato.has(n(time))
        : true;

      if(!pertencePorCamp && !pertencePorTime) return false;
    }

    if(categoria){
      const cats = val(j,["categorias"],[]);
      const catUnica = val(j,["categoria"]);

      if(Array.isArray(cats) && cats.length){
        if(!cats.includes(categoria)) return false;
      }else if(catUnica && catUnica !== categoria){
        return false;
      }else if(!catUnica){
        return false;
      }
    }

    if(busca){
      const textoBusca = n(`${nome} ${time} ${posicao} ${cpf}`);
      if(!textoBusca.includes(busca)) return false;
    }

    return true;
  }).sort((a,b)=>{
    const catA = getCategoriaJogador(a);
    const catB = getCategoriaJogador(b);

    const comparaCategoria = String(catA).localeCompare(String(catB),"pt-BR");

    if(comparaCategoria !== 0){
      return comparaCategoria;
    }

    return val(a,["nome"],"").localeCompare(val(b,["nome"],""),"pt-BR");
  });
}

function render(){
  const box = document.getElementById("lista");
  const lista = filtrarJogadores();

  if(!jogadores.length){
    box.innerHTML = `<div class="vazio">Nenhum jogador cadastrado no Firebase.</div>`;
    return;
  }

  if(!lista.length){
    box.innerHTML = `<div class="vazio">Nenhum jogador encontrado.</div>`;
    return;
  }

  box.innerHTML = lista.map(j=>{
    const nome = val(j,["nome"],"-");
    const numero = val(j,["numero","camisa"],"-");
    const time = val(j,["time","timeNome","nomeTime"],"-");
    const posicao = val(j,["posicao"],"-");
    const foto = val(j,["foto","imagem","fotoUrl"],"logo-liga.jfif");
    const cats = val(j,["categorias"],[]);
    const catUnica = val(j,["categoria"]);

    const stats = calcularStats(j);

    return `
      <div class="card">
        <div class="player">
          <img src="${foto}" class="photo" onerror="this.src='logo-liga.jfif'">

          <div class="info">
            <div class="nome">${nome}</div>
            <div class="sub">Nº ${numero}</div>
            <div class="sub">Time: ${time}</div>
            <div class="sub">Posição: ${posicao}</div>

            <div class="stats">
              Jogos: ${stats.jogosCount}<br>
              Gols: ${stats.gols} |
              Assist: ${stats.assistencias}<br>
              Amarelos: ${stats.amarelos} |
              Vermelhos: ${stats.vermelhos}
            </div>

            <div class="tags">
              ${
                Array.isArray(cats) && cats.length
                ? cats.map(c=>`<span class="tag">${c}</span>`).join("")
                : catUnica
                  ? `<span class="tag">${catUnica}</span>`
                  : `<span class="tag">Sem categoria</span>`
              }
            </div>
          </div>
        </div>

        <div class="actions">
          <a class="btn-ver" href="jogador-publico.html?id=${j.id}">
            <i class="fa-solid fa-eye"></i> Ver Jogador
          </a>
        </div>
      </div>
    `;
  }).join("");
}

async function carregarColecao(nome){
  try{
    const snap = await getDocs(collection(db, nome));
    const dados = [];

    snap.forEach(docSnap=>{
      dados.push({
        id:docSnap.id,
        ...docSnap.data()
      });
    });

    return dados;
  }catch(e){
    console.warn("Erro ao carregar coleção:", nome, e);
    return [];
  }
}

async function carregarDados(){
  const box = document.getElementById("lista");
  box.innerHTML = `<div class="vazio">Carregando jogadores...</div>`;

  jogadores = await carregarColecao("jogadores");
  jogos = await carregarColecao("jogos");
  campeonatos = await carregarColecao("campeonatos");
  sumulas = await carregarColecao("sumulas");

  preencherCampeonatos();
  preencherCategorias();
  render();
}

document.getElementById("busca").addEventListener("input", render);
document.getElementById("filtroCampeonato").addEventListener("change", render);
document.getElementById("filtroCategoria").addEventListener("change", render);

carregarDados();
</script>

</body>
</html>
