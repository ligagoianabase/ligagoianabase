<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notícia - LIGA GOIANA DE FUTEBOL DE BASE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --gold-line:rgba(247,198,0,.45);
  --shadow:0 14px 34px rgba(0,0,0,.38);
  --max:980px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  font-family:inherit;
  cursor:pointer;
  border:none;
}

.wrap{
  width:min(100% - 28px, var(--max));
  margin:0 auto;
}

.container{
  padding:22px 0 34px;
}

.noticia{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.16), transparent 34%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid var(--gold-line);
  border-radius:20px;
  overflow:hidden;
  box-shadow:var(--shadow);
}

.capa{
  width:100%;
  height:360px;
  object-fit:cover;
  background:#0d2a52;
}

.conteudo{
  padding:22px;
}

.badge{
  display:inline-flex;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  margin-bottom:12px;
}

h1{
  color:var(--gold);
  font-size:34px;
  line-height:1.15;
  margin-bottom:10px;
}

.meta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  margin-bottom:18px;
}

.meta span{
  background:rgba(26,63,115,.9);
  border:1px solid rgba(255,255,255,.08);
  padding:5px 8px;
  border-radius:999px;
}

.resumo{
  color:#fff;
  font-size:17px;
  line-height:1.6;
  font-weight:700;
  margin-bottom:18px;
}

.texto{
  color:var(--muted);
  font-size:15px;
  line-height:1.75;
  white-space:pre-line;
}

.acoes{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:22px;
}

.btn{
  padding:12px;
  border-radius:12px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-size:14px;
}

.btn-gold{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.btn-blue{
  background:#1a3f73;
  color:#fff;
}

.btn-wpp{
  background:#25d366;
  color:#fff;
}

.vazio{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid var(--gold-line);
  border-radius:18px;
  padding:25px;
  color:var(--muted);
  text-align:center;
}

@media(max-width:700px){
  .capa{
    height:230px;
  }

  h1{
    font-size:25px;
  }

  .conteudo{
    padding:16px;
  }

  .acoes{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<main class="wrap container" id="app">
  <div class="vazio">
    <i class="fa-solid fa-spinner fa-spin"></i> Carregando notícia...
  </div>
</main>

<script type="module">
import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";
import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("noticias");

const app = document.getElementById("app");
const id = new URLSearchParams(location.search).get("id");

function val(obj,chaves,f=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== ""){
      return obj[c];
    }
  }
  return f;
}

function formatarData(valor){
  if(!valor) return "-";

  if(typeof valor.toDate === "function"){
    valor = valor.toDate();
  }

  const data = new Date(valor);

  if(isNaN(data.getTime())){
    return String(valor);
  }

  return data.toLocaleDateString("pt-BR", {
    day:"2-digit",
    month:"2-digit",
    year:"numeric"
  });
}

window.compartilharWhats = function(){
  const texto = `Notícia da Liga Goiana de Futebol de Base: ${location.href}`;
  window.open("https://wa.me/?text=" + encodeURIComponent(texto), "_blank");
};

window.copiarLink = function(){
  navigator.clipboard.writeText(location.href);
  alert("Link copiado!");
};

async function carregar(){
  if(!id){
    app.innerHTML = `<div class="vazio">Notícia não informada.</div>`;
    return;
  }

  const snap = await getDoc(doc(db,"noticias",id));

  if(!snap.exists()){
    app.innerHTML = `<div class="vazio">Notícia não encontrada.</div>`;
    return;
  }

  const noticia = {
    id:snap.id,
    ...snap.data()
  };

  const publicado =
    noticia.publicado === true ||
    noticia.publica === true ||
    noticia.status === "publicado" ||
    noticia.status === "ativa" ||
    noticia.status === "ativo" ||
    noticia.status === undefined;

  if(!publicado){
    app.innerHTML = `<div class="vazio">Esta notícia ainda não está publicada.</div>`;
    return;
  }

  const titulo = val(noticia,["titulo","title"],"Sem título");
  const resumo = val(noticia,["descricao","resumo","subtitulo"],"");
  const conteudo = val(noticia,["conteudo","texto","materia","body"],resumo);
  const img = val(noticia,["imagem","foto","capa","image"],"hero-liga.jpeg");
  const cat = val(noticia,["categoria","tipo","categoriaNoticia"],"Notícia");
  const autor = val(noticia,["autor","publicadoPor","admin"],"Liga Goiana");
  const data = formatarData(val(noticia,["publicadaEm","criadoEm","data","atualizadoEm"],""));

  document.title = `${titulo} - LIGA GOIANA DE FUTEBOL DE BASE`;

  app.innerHTML = `
    <article class="noticia">
      <img class="capa" src="${img}" onerror="this.src='hero-liga.jpeg'">

      <div class="conteudo">
        <div class="badge">${cat}</div>

        <h1>${titulo}</h1>

        <div class="meta">
          <span><i class="fa-regular fa-calendar"></i> ${data}</span>
          <span><i class="fa-solid fa-user"></i> ${autor}</span>
        </div>

        ${resumo ? `<div class="resumo">${resumo}</div>` : ""}

        <div class="texto">${conteudo}</div>

        <div class="acoes">
          <a class="btn btn-gold" href="noticias.html">
            <i class="fa-solid fa-arrow-left"></i> Notícias
          </a>

          <button class="btn btn-wpp" onclick="compartilharWhats()">
            <i class="fa-brands fa-whatsapp"></i> WhatsApp
          </button>

          <button class="btn btn-blue" onclick="copiarLink()">
            <i class="fa-solid fa-link"></i> Copiar Link
          </button>
        </div>
      </div>
    </article>
  `;
}

carregar();
</script>

</body>
</html>
