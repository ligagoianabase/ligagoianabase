<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários ADM - LIGA GOIANA DE FUTEBOL DE BASE</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg:#0b1f3a;
      --bg-dark:#08172c;
      --card:#102a52;
      --card-hover:#153766;
      --gold:#f7c600;
      --gold-soft:rgba(247,198,0,.12);
      --gold-line:rgba(247,198,0,.30);
      --white:#ffffff;
      --muted:#d6def0;
      --danger:#c62828;
      --success:#1f8b4c;
      --shadow:0 8px 22px rgba(0,0,0,.28);
      --transition:.25s ease;
      --max:1280px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:
        linear-gradient(rgba(11,31,58,.88), rgba(11,31,58,.94)),
        url("fundo.png") center/cover fixed no-repeat;
      color:var(--white);
      min-height:100vh;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    button, input, select{
      font-family:inherit;
    }

    .wrap{
      width:min(100% - 30px, var(--max));
      margin:0 auto;
    }

    header{
      background:rgba(8,23,44,.96);
      border-bottom:3px solid var(--gold);
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }

    .header-inner{
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding:14px 0;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .header-title{
      flex:1;
      text-align:center;
      font-size:22px;
      font-weight:700;
      color:var(--white);
    }

    .top-btn{
      border:none;
      padding:10px 16px;
      border-radius:10px;
      font-weight:bold;
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      transition:var(--transition);
    }

    .btn-light{
      background:#fff4cf;
      color:#111;
    }

    .btn-light:hover{
      background:var(--gold);
      transform:translateY(-2px);
    }

    .btn-gold{
      background:var(--gold);
      color:#111;
    }

    .btn-gold:hover{
      filter:brightness(1.05);
      transform:translateY(-2px);
    }

    .container{
      padding:0 0 30px;
    }

    .hero-panel,
    .admin-block{
      background:linear-gradient(180deg, rgba(16,42,82,.95), rgba(10,28,56,.96));
      border:1px solid var(--gold-line);
      border-radius:20px;
      padding:22px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }

    .hero-panel h2,
    .section-title{
      font-size:24px;
      color:var(--gold);
      margin-bottom:10px;
      font-weight:700;
    }

    .hero-panel p{
      color:var(--muted);
      line-height:1.6;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:12px;
      margin-top:16px;
    }

    .field label{
      display:block;
      margin-bottom:6px;
      color:#fff;
      font-weight:700;
      font-size:14px;
    }

    .field input,
    .field select{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#f4f7fb;
      color:#111;
      font-size:14px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    .actions-form{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .btn-action{
      border:none;
      padding:12px 16px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
      transition:var(--transition);
    }

    .btn-save{
      background:var(--gold);
      color:#111;
    }

    .btn-save:hover{
      transform:translateY(-2px);
    }

    .btn-clear{
      background:#d9e2f2;
      color:#111;
    }

    .btn-clear:hover{
      transform:translateY(-2px);
    }

    .filtros{
      display:grid;
      grid-template-columns:1.2fr .8fr .8fr;
      gap:12px;
      margin-top:14px;
    }

    .lista{
      display:grid;
      gap:14px;
      margin-top:16px;
    }

    .user-card{
      background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(12,33,64,.96));
      border:1px solid rgba(255,255,255,.06);
      border-radius:16px;
      padding:16px;
      box-shadow:var(--shadow);
    }

    .user-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      flex-wrap:wrap;
    }

    .user-info h3{
      color:#fff;
      font-size:20px;
      margin-bottom:6px;
    }

    .user-info p{
      color:var(--muted);
      line-height:1.55;
      font-size:14px;
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .tag{
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:1px solid rgba(255,255,255,.08);
      background:#14335f;
      color:#fff;
    }

    .tag.success{
      background:rgba(31,139,76,.18);
      color:#a8ffd0;
      border-color:rgba(31,139,76,.35);
    }

    .tag.danger{
      background:rgba(198,40,40,.18);
      color:#ffb7b7;
      border-color:rgba(198,40,40,.35);
    }

    .tag.gold{
      background:rgba(247,198,0,.14);
      color:#ffe479;
      border-color:rgba(247,198,0,.35);
    }

    .user-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .mini-btn{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
      transition:var(--transition);
    }

    .mini-btn:hover{
      transform:translateY(-2px);
    }

    .mini-edit{
      background:var(--gold);
      color:#111;
    }

    .mini-approve{
      background:var(--success);
      color:#fff;
    }

    .mini-block{
      background:#8b5e00;
      color:#fff;
    }

    .mini-delete{
      background:var(--danger);
      color:#fff;
    }

    .msg{
      margin-top:14px;
      padding:12px;
      border-radius:12px;
      font-weight:700;
      display:none;
    }

    .msg.error{
      background:rgba(198,40,40,.18);
      color:#ffb7b7;
      border:1px solid rgba(198,40,40,.35);
    }

    .msg.success{
      background:rgba(31,139,76,.18);
      color:#a8ffd0;
      border:1px solid rgba(31,139,76,.35);
    }

    .vazio{
      text-align:center;
      color:var(--muted);
      padding:24px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.06);
      background:rgba(255,255,255,.03);
    }

    @media (max-width: 980px){
      .form-grid,
      .filtros{
        grid-template-columns:1fr;
      }

      .header-title{
        order:3;
        width:100%;
      }

      .header-left,
      .header-right{
        width:100%;
        justify-content:center;
      }
    }

    @media (max-width: 600px){
      .top-btn{
        width:100%;
        justify-content:center;
      }

      .header-left,
      .header-right{
        flex-direction:column;
        align-items:stretch;
      }

      .actions-form,
      .user-actions{
        flex-direction:column;
      }

      .mini-btn,
      .btn-action{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap header-inner">
      <div class="header-left">
        <button class="top-btn btn-light" type="button" onclick="voltarPagina()">
          <i class="fa-solid fa-arrow-left"></i> Voltar
        </button>

        <a href="admin.html" class="top-btn btn-light">
          <i class="fa-solid fa-house"></i> Painel ADM
        </a>
      </div>

      <div class="header-title">Usuários e Permissões</div>

      <div class="header-right">
        <button class="top-btn btn-gold" onclick="limparFormulario()">
          <i class="fa-solid fa-user-plus"></i> Novo Usuário
        </button>
      </div>
    </div>
  </header>

  <div class="wrap container">

    <section class="hero-panel">
      <h2>Cadastro e Controle de Usuários</h2>
      <p>
        Aqui o administrador cria, edita, autoriza, bloqueia e organiza os usuários do sistema.
      </p>

      <div id="msgErro" class="msg error"></div>
      <div id="msgSucesso" class="msg success"></div>

      <div class="form-grid">
        <div class="field">
          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Digite o nome">
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Digite o email">
        </div>

        <div class="field">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" placeholder="Digite o CPF">
        </div>

        <div class="field">
          <label for="tipoUsuario">Tipo de usuário</label>
          <select id="tipoUsuario">
            <option value="torcedor">Torcedor</option>
            <option value="pai_atleta">Pai de Atleta</option>
            <option value="jogador">Jogador</option>
            <option value="tecnico">Técnico</option>
            <option value="assistente">Assistente</option>
            <option value="arbitro">Árbitro</option>
            <option value="admin">Administrador</option>
          </select>
        </div>

        <div class="field">
          <label for="time">Time</label>
          <input type="text" id="time" placeholder="Nome do time">
        </div>

        <div class="field">
          <label for="status">Status</label>
          <select id="status">
            <option value="ativo">Ativo</option>
            <option value="bloqueado">Bloqueado</option>
          </select>
        </div>

        <div class="field full">
          <label for="uidUsuario">UID do usuário (se já existir no Auth)</label>
          <input type="text" id="uidUsuario" placeholder="Opcional - se tiver UID do Firebase Auth">
        </div>
      </div>

      <div class="actions-form">
        <button class="btn-action btn-save" onclick="salvarUsuario()">
          <i class="fa-solid fa-floppy-disk"></i> Salvar Usuário
        </button>

        <button class="btn-action btn-clear" onclick="limparFormulario()">
          <i class="fa-solid fa-eraser"></i> Limpar
        </button>
      </div>
    </section>

    <section class="admin-block">
      <h3 class="section-title">Filtros</h3>

      <div class="filtros">
        <div class="field">
          <label for="buscaUsuario">Buscar</label>
          <input type="text" id="buscaUsuario" placeholder="Nome, email ou CPF" oninput="renderUsuarios()">
        </div>

        <div class="field">
          <label for="filtroTipo">Tipo</label>
          <select id="filtroTipo" onchange="renderUsuarios()">
            <option value="">Todos</option>
            <option value="admin">Administrador</option>
            <option value="arbitro">Árbitro</option>
            <option value="assistente">Assistente</option>
            <option value="tecnico">Técnico</option>
            <option value="jogador">Jogador</option>
            <option value="pai_atleta">Pai de Atleta</option>
            <option value="torcedor">Torcedor</option>
          </select>
        </div>

        <div class="field">
          <label for="filtroAutorizado">Autorização</label>
          <select id="filtroAutorizado" onchange="renderUsuarios()">
            <option value="">Todos</option>
            <option value="sim">Autorizados</option>
            <option value="nao">Não autorizados</option>
          </select>
        </div>
      </div>

      <div class="lista" id="listaUsuarios">
        <div class="vazio">Carregando usuários...</div>
      </div>
    </section>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      collection,
      getDocs,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    let usuarioEditandoId = "";
    let usuariosCache = [];

    const msgErro = document.getElementById("msgErro");
    const msgSucesso = document.getElementById("msgSucesso");

    function mostrarErro(texto){
      msgSucesso.style.display = "none";
      msgErro.style.display = "block";
      msgErro.innerText = texto;
    }

    function mostrarSucesso(texto){
      msgErro.style.display = "none";
      msgSucesso.style.display = "block";
      msgSucesso.innerText = texto;
    }

    function limparMensagens(){
      msgErro.style.display = "none";
      msgSucesso.style.display = "none";
      msgErro.innerText = "";
      msgSucesso.innerText = "";
    }

    function normalizarTexto(texto){
      return String(texto || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function normalizarTipo(tipo){
      const valor = normalizarTexto(tipo);

      if(valor === "publico" || valor === "publico_geral" || valor === "torcedor") return "torcedor";
      if(valor === "pai_atleta") return "pai_atleta";
      if(valor === "jogador") return "jogador";
      if(valor === "tecnico" || valor === "tecnico") return "tecnico";
      if(valor === "assistente") return "assistente";
      if(valor === "arbitro" || valor === "arbitro") return "arbitro";
      if(valor === "admin" || valor === "administrador") return "admin";

      return valor;
    }

    function tipoLabel(tipo){
      const valor = normalizarTipo(tipo);
      if(valor === "admin") return "Administrador";
      if(valor === "arbitro") return "Árbitro";
      if(valor === "assistente") return "Assistente";
      if(valor === "tecnico") return "Técnico";
      if(valor === "jogador") return "Jogador";
      if(valor === "pai_atleta") return "Pai de Atleta";
      return "Torcedor";
    }

    function voltarPagina(){
      if(window.history.length > 1){
        window.history.back();
      }else{
        window.location.href = "admin.html";
      }
    }

    window.voltarPagina = voltarPagina;

    async function validarAcessoAdmin(user){
      if(!user) return false;

      const usuarioRef = doc(db, "usuarios", user.uid);
      const usuarioSnap = await getDoc(usuarioRef);

      if(!usuarioSnap.exists()) return false;

      const dados = usuarioSnap.data();
      const tipo = normalizarTipo(dados.tipoUsuario || dados.tipo || "");
      return tipo === "admin";
    }

    function obterDadosFormulario(){
      return {
        nome: document.getElementById("nome").value.trim(),
        email: document.getElementById("email").value.trim().toLowerCase(),
        cpf: document.getElementById("cpf").value.trim(),
        tipoUsuario: normalizarTipo(document.getElementById("tipoUsuario").value),
        time: document.getElementById("time").value.trim(),
        status: document.getElementById("status").value,
        uidUsuario: document.getElementById("uidUsuario").value.trim()
      };
    }

    window.limparFormulario = function(){
      usuarioEditandoId = "";
      document.getElementById("nome").value = "";
      document.getElementById("email").value = "";
      document.getElementById("cpf").value = "";
      document.getElementById("tipoUsuario").value = "torcedor";
      document.getElementById("time").value = "";
      document.getElementById("status").value = "ativo";
      document.getElementById("uidUsuario").value = "";
      limparMensagens();
    };

    window.salvarUsuario = async function(){
      limparMensagens();

      const dados = obterDadosFormulario();

      if(!dados.nome){
        mostrarErro("Digite o nome do usuário.");
        return;
      }

      if(!dados.email){
        mostrarErro("Digite o email do usuário.");
        return;
      }

      const autorizadoAutomatico = dados.tipoUsuario === "admin";
      const aprovadoAutomatico = !["admin", "arbitro", "assistente"].includes(dados.tipoUsuario) ? true : autorizadoAutomatico;

      const payload = {
        nome: dados.nome,
        email: dados.email,
        cpf: dados.cpf,
        tipoUsuario: dados.tipoUsuario,
        time: dados.time,
        status: dados.status,
        autorizado: autorizadoAutomatico,
        aprovado: aprovadoAutomatico,
        atualizadoEm: new Date().toISOString()
      };

      try{
        if(usuarioEditandoId){
          await updateDoc(doc(db, "usuarios", usuarioEditandoId), payload);
          mostrarSucesso("Usuário atualizado com sucesso.");
        }else{
          const idDocumento = dados.uidUsuario || crypto.randomUUID();

          await setDoc(doc(db, "usuarios", idDocumento), {
            ...payload,
            criadoEm: new Date().toISOString()
          });

          mostrarSucesso("Usuário criado com sucesso.");
        }

        limparFormulario();
        await carregarUsuarios();
      }catch(erro){
        console.error(erro);
        mostrarErro("Erro ao salvar usuário.");
      }
    };

    window.editarUsuario = function(id){
      const usuario = usuariosCache.find(u => u.id === id);
      if(!usuario) return;

      usuarioEditandoId = id;
      document.getElementById("nome").value = usuario.nome || "";
      document.getElementById("email").value = usuario.email || "";
      document.getElementById("cpf").value = usuario.cpf || "";
      document.getElementById("tipoUsuario").value = normalizarTipo(usuario.tipoUsuario || usuario.tipo || "torcedor");
      document.getElementById("time").value = usuario.time || "";
      document.getElementById("status").value = usuario.status || "ativo";
      document.getElementById("uidUsuario").value = usuario.id || "";

      window.scrollTo({ top: 0, behavior: "smooth" });
      mostrarSucesso("Usuário carregado para edição.");
    };

    window.autorizarUsuario = async function(id, valor){
      try{
        await updateDoc(doc(db, "usuarios", id), {
          autorizado: valor,
          aprovado: valor,
          atualizadoEm: new Date().toISOString()
        });

        await carregarUsuarios();
        mostrarSucesso(valor ? "Usuário autorizado com sucesso." : "Usuário desautorizado com sucesso.");
      }catch(erro){
        console.error(erro);
        mostrarErro("Erro ao alterar autorização.");
      }
    };

    window.bloquearUsuario = async function(id, status){
      try{
        await updateDoc(doc(db, "usuarios", id), {
          status: status,
          atualizadoEm: new Date().toISOString()
        });

        await carregarUsuarios();
        mostrarSucesso("Status atualizado com sucesso.");
      }catch(erro){
        console.error(erro);
        mostrarErro("Erro ao alterar status.");
      }
    };

    window.excluirUsuario = async function(id){
      const confirmar = confirm("Deseja realmente excluir este usuário?");
      if(!confirmar) return;

      try{
        await deleteDoc(doc(db, "usuarios", id));
        await carregarUsuarios();
        mostrarSucesso("Usuário excluído com sucesso.");
      }catch(erro){
        console.error(erro);
        mostrarErro("Erro ao excluir usuário.");
      }
    };

    window.renderUsuarios = function(){
      const lista = document.getElementById("listaUsuarios");
      const busca = normalizarTexto(document.getElementById("buscaUsuario").value);
      const filtroTipo = normalizarTipo(document.getElementById("filtroTipo").value);
      const filtroAutorizado = document.getElementById("filtroAutorizado").value;

      let usuarios = [...usuariosCache];

      if(busca){
        usuarios = usuarios.filter(u => {
          return normalizarTexto(u.nome).includes(busca)
            || normalizarTexto(u.email).includes(busca)
            || normalizarTexto(u.cpf).includes(busca);
        });
      }

      if(filtroTipo){
        usuarios = usuarios.filter(u => normalizarTipo(u.tipoUsuario || u.tipo) === filtroTipo);
      }

      if(filtroAutorizado === "sim"){
        usuarios = usuarios.filter(u => u.autorizado === true);
      }

      if(filtroAutorizado === "nao"){
        usuarios = usuarios.filter(u => u.autorizado !== true);
      }

      usuarios.sort((a,b) => String(a.nome || "").localeCompare(String(b.nome || ""), "pt-BR"));

      if(!usuarios.length){
        lista.innerHTML = `<div class="vazio">Nenhum usuário encontrado.</div>`;
        return;
      }

      lista.innerHTML = usuarios.map(usuario => {
        const tipo = normalizarTipo(usuario.tipoUsuario || usuario.tipo || "");
        const autorizado = usuario.autorizado === true;
        const status = usuario.status || "ativo";

        return `
          <div class="user-card">
            <div class="user-top">
              <div class="user-info">
                <h3>${usuario.nome || "Sem nome"}</h3>
                <p><strong>Email:</strong> ${usuario.email || "-"}</p>
                <p><strong>CPF:</strong> ${usuario.cpf || "-"}</p>
                <p><strong>Time:</strong> ${usuario.time || "-"}</p>
                <p><strong>ID:</strong> ${usuario.id}</p>
              </div>
            </div>

            <div class="tags">
              <span class="tag gold">${tipoLabel(tipo)}</span>
              <span class="tag ${autorizado ? "success" : "danger"}">${autorizado ? "Autorizado" : "Não autorizado"}</span>
              <span class="tag ${status === "ativo" ? "success" : "danger"}">${status}</span>
            </div>

            <div class="user-actions">
              <button class="mini-btn mini-edit" onclick="editarUsuario('${usuario.id}')">
                <i class="fa-solid fa-pen"></i> Editar
              </button>

              <button class="mini-btn mini-approve" onclick="autorizarUsuario('${usuario.id}', true)">
                <i class="fa-solid fa-user-check"></i> Autorizar
              </button>

              <button class="mini-btn mini-block" onclick="autorizarUsuario('${usuario.id}', false)">
                <i class="fa-solid fa-user-slash"></i> Desautorizar
              </button>

              <button class="mini-btn mini-block" onclick="bloquearUsuario('${usuario.id}', 'bloqueado')">
                <i class="fa-solid fa-ban"></i> Bloquear
              </button>

              <button class="mini-btn mini-approve" onclick="bloquearUsuario('${usuario.id}', 'ativo')">
                <i class="fa-solid fa-check"></i> Ativar
              </button>

              <button class="mini-btn mini-delete" onclick="excluirUsuario('${usuario.id}')">
                <i class="fa-solid fa-trash"></i> Excluir
              </button>
            </div>
          </div>
        `;
      }).join("");
    };

    async function carregarUsuarios(){
      const lista = document.getElementById("listaUsuarios");
      lista.innerHTML = `<div class="vazio">Carregando usuários...</div>`;

      try{
        const snap = await getDocs(collection(db, "usuarios"));
        usuariosCache = [];

        snap.forEach(docSnap => {
          usuariosCache.push({ id: docSnap.id, ...docSnap.data() });
        });

        window.renderUsuarios();
      }catch(erro){
        console.error(erro);
        lista.innerHTML = `<div class="vazio">Erro ao carregar usuários.</div>`;
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if(!user){
        window.location.href = "login.html";
        return;
      }

      const acessoLiberado = await validarAcessoAdmin(user);

      if(!acessoLiberado){
        alert("Acesso restrito ao administrador.");
        window.location.href = "index.html";
        return;
      }

      await carregarUsuarios();
    });
  </script>

</body>
</html>
