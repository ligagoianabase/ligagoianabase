<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - LIGA GOIANA DE FUTEBOL DE BASE</title>
</head>
<body>
<!-- ARQUIVO GERADO -->
<script>
function regrasDePermissao(tipoUsuario){

  // ENTRAM DIRETO
  if(
    tipoUsuario === "torcedor" ||
    tipoUsuario === "pai_atleta"
  ){
    return {
      autorizado:true,
      aprovado:true,
      status:"ativo"
    };
  }

  // TODOS OS OUTROS FICAM PENDENTES
  return {
    autorizado:false,
    aprovado:false,
    status:"pendente"
  };
}
</script>
</body>
</html>
