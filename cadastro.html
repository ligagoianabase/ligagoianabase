<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Liga Goiana</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(rgba(2,10,25,.75), rgba(2,10,25,.9)), url("fundo.png");
      background-size:cover;
      background-position:center;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      padding:20px 0;
    }

    .box{
      width:100%;
      max-width:460px;
      background:rgba(3,16,34,.92);
      border:1px solid rgba(255,230,0,.18);
      border-radius:18px;
      padding:28px;
      box-shadow:0 12px 28px rgba(0,0,0,.35);
    }

    h1{
      margin:0 0 8px;
      color:#ffe600;
      text-align:center;
      text-transform:uppercase;
      font-size:28px;
    }

    p{
      margin:0 0 20px;
      text-align:center;
      color:#dbe3ee;
      line-height:1.5;
    }

    label{
      display:block;
      margin:12px 0 6px;
      font-weight:bold;
    }

    input, select{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      box-sizing:border-box;
      font-size:14px;
    }

    button{
      width:100%;
      margin-top:18px;
      padding:13px;
      border:none;
      border-radius:10px;
      background:linear-gradient(to bottom, #fff04d, #ffd000);
      color:#111;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
    }

    button:hover{
      filter:brightness(1.04);
    }

    .voltar{
      display:block;
      margin-top:14px;
      text-align:center;
      color:#ffe600;
      font-weight:bold;
      text-decoration:none;
    }

    .msg{
      margin-top:14px;
      padding:12px;
      border-radius:10px;
      display:none;
      font-weight:bold;
      line-height:1.5;
    }

    .erro{
      background:rgba(180,0,0,.22);
      color:#ffb0b0;
      border:1px solid rgba(255,120,120,.25);
    }

    .sucesso{
      background:rgba(0,120,40,.22);
      color:#b8ffd1;
      border:1px solid rgba(120,255,170,.25);
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Cadastro</h1>
    <p>Crie sua conta para acessar o sistema</p>

    <label for="nome">Nome completo</label>
    <input type="text" id="nome" placeholder="Digite seu nome completo">

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Digite seu email">

    <label for="cpf">CPF</label>
    <input type="text" id="cpf" placeholder="Digite seu CPF">

    <label for="tipoUsuario">Tipo de usuário</label>
    <select id="tipoUsuario">
      <option value="torcedor">Torcedor</option>
      <option value="pai_atleta">Pai de Atleta</option>
      <option value="jogador">Jogador</option>
      <option value="tecnico">Técnico</option>
      <option value="assistente">Assistente</option>
      <option value="arbitro">Árbitro</option>
      <option value="admin">Administrador</option>
    </select>

    <label for="time">Time</label>
    <input type="text" id="time" placeholder="Digite o nome do time, se tiver">

    <label for="senha">Senha</label>
    <input type="password" id="senha" placeholder="Digite sua senha">

    <label for="confirmarSenha">Confirmar senha</label>
    <input type="password" id="confirmarSenha" placeholder="Confirme sua senha">

    <button onclick="cadastrar()">Criar conta</button>

    <div id="msgErro" class="msg erro"></div>
    <div id="msgSucesso" class="msg sucesso"></div>

    <a href="login.html" class="voltar">Já tenho conta</a>
    <a href="index.html" class="voltar">← Voltar para o site</a>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import {
      createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const msgErro = document.getElementById("msgErro");
    const msgSucesso = document.getElementById("msgSucesso");

    function limparMensagens(){
      msgErro.style.display = "none";
      msgErro.innerText = "";
      msgSucesso.style.display = "none";
      msgSucesso.innerText = "";
    }

    function mostrarErro(texto){
      msgSucesso.style.display = "none";
      msgErro.style.display = "block";
      msgErro.innerText = texto;
    }

    function mostrarSucesso(texto){
      msgErro.style.display = "none";
      msgSucesso.style.display = "block";
      msgSucesso.innerText = texto;
    }

    function normalizarTipo(tipo){
      if(!tipo) return "torcedor";

      const valor = String(tipo).trim().toLowerCase();

      if(valor === "publico" || valor === "público" || valor === "publico_geral" || valor === "torcedor") return "torcedor";
      if(valor === "pai_atleta") return "pai_atleta";
      if(valor === "jogador") return "jogador";
      if(valor === "tecnico" || valor === "técnico") return "tecnico";
      if(valor === "assistente") return "assistente";
      if(valor === "arbitro" || valor === "árbitro") return "arbitro";
      if(valor === "admin" || valor === "administrador") return "admin";

      return "torcedor";
    }

    function regrasDePermissao(tipoUsuario){
      if(tipoUsuario === "admin"){
        return {
          autorizado: true,
          aprovado: true,
          status: "ativo"
        };
      }

      if(tipoUsuario === "arbitro"){
        return {
          autorizado: false,
          aprovado: false,
          status: "pendente"
        };
      }

      if(tipoUsuario === "assistente"){
        return {
          autorizado: false,
          aprovado: false,
          status: "pendente"
        };
      }

      if(tipoUsuario === "tecnico"){
        return {
          autorizado: false,
          aprovado: false,
          status: "pendente"
        };
      }

      if(tipoUsuario === "jogador"){
        return {
          autorizado: false,
          aprovado: false,
          status: "pendente"
        };
      }

      if(tipoUsuario === "pai_atleta"){
        return {
          autorizado: false,
          aprovado: true,
          status: "ativo"
        };
      }

      return {
        autorizado: false,
        aprovado: true,
        status: "ativo"
      };
    }

    window.cadastrar = async function(){
      limparMensagens();

      const nome = document.getElementById("nome").value.trim();
      const email = document.getElementById("email").value.trim().toLowerCase();
      const cpf = document.getElementById("cpf").value.trim();
      const tipoUsuario = normalizarTipo(document.getElementById("tipoUsuario").value);
      const time = document.getElementById("time").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const confirmarSenha = document.getElementById("confirmarSenha").value.trim();

      if(!nome){
        mostrarErro("Digite seu nome completo.");
        return;
      }

      if(!email){
        mostrarErro("Digite seu email.");
        return;
      }

      if(!cpf){
        mostrarErro("Digite seu CPF.");
        return;
      }

      if(!senha){
        mostrarErro("Digite sua senha.");
        return;
      }

      if(senha.length < 6){
        mostrarErro("A senha precisa ter pelo menos 6 caracteres.");
        return;
      }

      if(senha !== confirmarSenha){
        mostrarErro("As senhas não conferem.");
        return;
      }

      try{
        const cred = await createUserWithEmailAndPassword(auth, email, senha);
        const uid = cred.user.uid;

        const regras = regrasDePermissao(tipoUsuario);

        await setDoc(doc(db, "usuarios", uid), {
          nome,
          email,
          cpf,
          tipoUsuario,
          time,
          status: regras.status,
          autorizado: regras.autorizado,
          aprovado: regras.aprovado,
          criadoEm: new Date().toISOString(),
          atualizadoEm: new Date().toISOString()
        });

        if(tipoUsuario === "admin"){
          mostrarSucesso("Conta de administrador criada com sucesso. Redirecionando...");
        }else if(tipoUsuario === "arbitro"){
          mostrarSucesso("Cadastro realizado. Seu acesso de árbitro ficará pendente até autorização do administrador. Redirecionando...");
        }else if(tipoUsuario === "assistente"){
          mostrarSucesso("Cadastro realizado. Seu acesso de assistente ficará pendente de aprovação. Redirecionando...");
        }else if(tipoUsuario === "tecnico"){
          mostrarSucesso("Cadastro realizado. Seu acesso de técnico ficará pendente de aprovação e será vinculado ao CPF. Redirecionando...");
        }else if(tipoUsuario === "jogador"){
          mostrarSucesso("Cadastro realizado. Seu acesso de jogador ficará pendente de aprovação e será vinculado ao CPF. Redirecionando...");
        }else if(tipoUsuario === "pai_atleta"){
          mostrarSucesso("Cadastro realizado com sucesso. Seu acesso já está aprovado. Redirecionando...");
        }else{
          mostrarSucesso("Cadastro realizado com sucesso. Seu acesso já está aprovado. Redirecionando...");
        }

        setTimeout(() => {
          window.location.href = "index.html";
        }, 1600);

      }catch(e){
        if(e.code === "auth/email-already-in-use"){
          mostrarErro("Este email já está em uso.");
        }else if(e.code === "auth/invalid-email"){
          mostrarErro("Email inválido.");
        }else if(e.code === "auth/weak-password"){
          mostrarErro("Senha muito fraca.");
        }else{
          mostrarErro("Erro ao cadastrar: " + e.message);
        }
      }
    };
  </script>

</body>
</html>
