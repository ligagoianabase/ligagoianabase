<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escalas ADM - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0b1f3a;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --muted:#d9e3f2;
  --line:rgba(255,255,255,.10);
  --gold-line:rgba(247,198,0,.34);
  --shadow:0 8px 22px rgba(0,0,0,.28);
  --max:1280px;
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  min-height:100%;
  overflow-x:hidden;
}

body{
  font-family:Arial,sans-serif;
  background:
    linear-gradient(rgba(11,31,58,.90),rgba(11,31,58,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
}

a{text-decoration:none;color:inherit}
button,input,select{font-family:inherit}
button{cursor:pointer;border:none}

.wrap{
  width:min(100% - 28px,var(--max));
  margin:0 auto;
}

header{
  background:rgba(8,23,44,.96);
  border-bottom:3px solid var(--gold);
  box-shadow:var(--shadow);
}

.header-inner{
  min-height:84px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  padding:14px 0;
}

.header-left,
.header-right{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.header-title{
  flex:1;
  text-align:center;
  font-size:24px;
  font-weight:900;
  text-transform:uppercase;
}

.top-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:10px 16px;
  border-radius:10px;
  font-weight:900;
}

.btn-light{
  background:#fff4cf;
  color:#111;
}

.btn-gold{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.container{
  padding:24px 0 34px;
}

.hero-panel,
.filter-panel,
.list-panel{
  background:linear-gradient(180deg,rgba(16,42,82,.96),rgba(12,33,64,.96));
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}

.hero-panel h2{
  font-size:28px;
  color:var(--gold);
  margin-bottom:8px;
}

.hero-panel p{
  color:var(--muted);
  line-height:1.6;
}

.bloco-titulo{
  margin:0 0 14px;
  color:var(--gold);
  font-size:18px;
  font-weight:900;
  display:flex;
  align-items:center;
  gap:8px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

label{
  display:block;
  margin:0 0 6px;
  font-weight:900;
  color:#eef4ff;
  font-size:13px;
}

input,select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:14px;
  background:#f5f7fb;
  color:#111;
  outline:none;
}

.lista{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(310px,1fr));
  gap:14px;
}

.card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:14px;
}

.card strong{
  display:block;
  color:var(--gold);
  font-size:17px;
  margin-bottom:8px;
}

.card p{
  color:var(--muted);
  font-size:13px;
  line-height:1.65;
}

.tag{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:5px 8px;
  border-radius:999px;
  background:rgba(247,198,0,.12);
  border:1px solid var(--gold-line);
  color:var(--gold);
  font-size:11px;
  font-weight:900;
  margin-top:8px;
}

.mensagem-vazia{
  color:var(--muted);
  text-align:center;
  padding:16px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  grid-column:1/-1;
}

.status{
  display:none;
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  font-weight:900;
  font-size:13px;
}

.status-erro{
  display:block;
  background:rgba(217,65,65,.18);
  color:#ffb7b7;
  border:1px solid rgba(217,65,65,.35);
}

@media(max-width:900px){
  .header-title{
    order:3;
    width:100%;
    text-align:center;
    font-size:19px;
  }

  .header-left,
  .header-right{
    width:100%;
    justify-content:center;
  }

  .grid{
    grid-template-columns:1fr;
  }
}

@media(max-width:600px){
  .top-btn{
    width:100%;
  }

  .hero-panel h2{
    font-size:23px;
  }

  .hero-panel,
  .filter-panel,
  .list-panel{
    padding:16px;
  }
}
</style>
</head>

<body>

<header>
  <div class="wrap header-inner">
    <div class="header-left">
      <button class="top-btn btn-light" type="button" onclick="voltarPagina()">
        <i class="fa-solid fa-arrow-left"></i> Voltar
      </button>

      <a href="index.html" class="top-btn btn-light">
        <i class="fa-solid fa-house"></i> Página Inicial
      </a>

      <a href="admin.html" class="top-btn btn-light">
        <i class="fa-solid fa-gears"></i> Painel ADM
      </a>
    </div>

    <div class="header-title">Escalas ADM</div>

    <div class="header-right">
      <button class="top-btn btn-gold" type="button" onclick="carregarJogos()">
        <i class="fa-solid fa-rotate"></i> Atualizar
      </button>
    </div>
  </div>
</header>

<div class="wrap container">

<section class="hero-panel">
  <h2>Escalas dos Jogos</h2>
  <p>
    Veja qual árbitro foi designado para cada jogo, com detalhes de campeonato, categoria, data, horário e local.
    A escala vem dos dados cadastrados na criação do jogo.
  </p>
  <div id="statusBox" class="status"></div>
</section>

<section class="filter-panel">
  <h3 class="bloco-titulo">
    <i class="fa-solid fa-filter"></i> Filtros
  </h3>

  <div class="grid">
    <div>
      <label>Buscar jogo / time / árbitro</label>
      <input id="busca" placeholder="Digite para filtrar" oninput="renderJogos()">
    </div>

    <div>
      <label>Status</label>
      <select id="filtroStatus" onchange="renderJogos()">
        <option value="">Todos</option>
        <option value="agendado">Agendado</option>
        <option value="pendente">Pendente</option>
        <option value="finalizado">Finalizado</option>
      </select>
    </div>

    <div>
      <label>Mostrar</label>
      <select id="filtroArbitro" onchange="renderJogos()">
        <option value="">Todos os jogos</option>
        <option value="com">Com árbitro definido</option>
        <option value="sem">Sem árbitro definido</option>
      </select>
    </div>
  </div>
</section>

<section class="list-panel">
  <h3 class="bloco-titulo">
    <i class="fa-solid fa-whistle"></i> Jogos e Árbitros
  </h3>

  <div id="listaJogos" class="lista">
    <div class="mensagem-vazia">Carregando jogos...</div>
  </div>
</section>

</div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

let jogosCache = [];

function el(id){
  return document.getElementById(id);
}

function texto(v){
  return String(v || "").trim();
}

function normalizar(v){
  return texto(v).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function mostrarErro(msg){
  const box = el("statusBox");
  box.className = "status status-erro";
  box.innerText = msg;
}

window.voltarPagina = function(){
  if(window.history.length > 1){
    window.history.back();
  }else{
    window.location.href = "admin.html";
  }
};

function nomeTimeA(j){
  return j.timeA_nome || j.timeA || j.mandanteNome || j.mandante || j.timeCasaNome || "Time A";
}

function nomeTimeB(j){
  return j.timeB_nome || j.timeB || j.visitanteNome || j.visitante || j.timeForaNome || "Time B";
}

function nomeArbitro(j){
  return j.arbitroNome || j.nomeArbitro || j.arbitro || j.arbitroPrincipalNome || "";
}

function nomeAssistente1(j){
  return j.assistente1Nome || j.nomeAssistente1 || j.assistente1 || "";
}

function nomeAssistente2(j){
  return j.assistente2Nome || j.nomeAssistente2 || j.assistente2 || "";
}

function statusJogo(j){
  return j.status || j.statusJogo || "agendado";
}

function dataHora(j){
  const data = j.data || j.dataJogo || "";
  const hora = j.hora || j.horario || "";
  return [data,hora].filter(Boolean).join(" às ");
}

function ordenarJogos(lista){
  return [...lista].sort((a,b)=>{
    const da = String(a.data || a.dataJogo || "");
    const db = String(b.data || b.dataJogo || "");
    if(da !== db) return da.localeCompare(db);
    return String(a.hora || a.horario || "").localeCompare(String(b.hora || b.horario || ""));
  });
}

window.renderJogos = function(){
  const lista = el("listaJogos");
  const busca = normalizar(el("busca").value);
  const st = el("filtroStatus").value;
  const filtroArbitro = el("filtroArbitro").value;

  let jogos = jogosCache.filter(j=>{
    const arbitro = nomeArbitro(j);
    const temArbitro = !!texto(arbitro);

    if(st && statusJogo(j) !== st) return false;
    if(filtroArbitro === "com" && !temArbitro) return false;
    if(filtroArbitro === "sem" && temArbitro) return false;

    if(busca){
      const alvo = normalizar([
        nomeTimeA(j),
        nomeTimeB(j),
        arbitro,
        nomeAssistente1(j),
        nomeAssistente2(j),
        j.campeonatoNome,
        j.campeonato,
        j.categoria,
        j.local,
        j.estadio,
        j.campo
      ].join(" "));
      if(!alvo.includes(busca)) return false;
    }

    return true;
  });

  jogos = ordenarJogos(jogos);

  if(!jogos.length){
    lista.innerHTML = `<div class="mensagem-vazia">Nenhum jogo encontrado.</div>`;
    return;
  }

  lista.innerHTML = jogos.map(j=>{
    const arbitro = nomeArbitro(j) || "Árbitro não definido";
    const assist1 = nomeAssistente1(j) || "Não definido";
    const assist2 = nomeAssistente2(j) || "Não definido";
    const local = j.local || j.estadio || j.campo || "-";
    const campeonato = j.campeonatoNome || j.campeonato || j.nomeCampeonato || "-";
    const categoria = j.categoria || "-";
    const status = statusJogo(j);

    return `
      <div class="card">
        <strong><i class="fa-solid fa-futbol"></i> ${nomeTimeA(j)} x ${nomeTimeB(j)}</strong>
        <p>
          <i class="fa-solid fa-trophy"></i> Campeonato: ${campeonato}<br>
          <i class="fa-solid fa-layer-group"></i> Categoria: ${categoria}<br>
          <i class="fa-solid fa-calendar-days"></i> Data/Hora: ${dataHora(j) || "-"}<br>
          <i class="fa-solid fa-location-dot"></i> Local: ${local}<br><br>
          <i class="fa-solid fa-whistle"></i> Árbitro: ${arbitro}<br>
          <i class="fa-solid fa-flag"></i> Assistente 1: ${assist1}<br>
          <i class="fa-solid fa-flag"></i> Assistente 2: ${assist2}
        </p>
        <span class="tag"><i class="fa-solid fa-circle-check"></i> ${status}</span>
      </div>
    `;
  }).join("");
};

window.carregarJogos = async function(){
  const lista = el("listaJogos");
  lista.innerHTML = `<div class="mensagem-vazia">Carregando jogos...</div>`;

  try{
    const snap = await getDocs(collection(db,"jogos"));
    jogosCache = [];
    snap.forEach(d=>jogosCache.push({id:d.id,...d.data()}));
    renderJogos();
  }catch(e){
    console.error(e);
    mostrarErro("Erro ao carregar jogos. Confira Firebase e a coleção jogos.");
    lista.innerHTML = `<div class="mensagem-vazia">Erro ao carregar jogos.</div>`;
  }
};

carregarJogos();
</script>

</body>
</html>
