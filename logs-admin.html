<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Logs ADM - LIGA GOIANA</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#061427;
  --card:#071d37;
  --card2:#0d2a52;
  --gold:#f7c600;
  --gold2:#ffe45c;
  --white:#ffffff;
  --muted:#cbd6ea;
  --line:rgba(255,255,255,.10);
  --green:#1b5e20;
  --red:#b42323;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.92), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:var(--white);
  min-height:100vh;
}

.container{
  max-width:1300px;
  margin:auto;
  padding:20px;
}

.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

h1{
  color:var(--gold);
  font-size:30px;
}

.btn{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.painel{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.30);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

.filtros{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

label{
  display:block;
  margin-bottom:6px;
  font-weight:900;
  font-size:13px;
}

input,
select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#f5f7fb;
}

.lista{
  display:grid;
  gap:14px;
}

.card{
  background:linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
}

.card h3{
  color:var(--gold);
  margin-bottom:8px;
}

.card p{
  color:var(--muted);
  line-height:1.6;
  margin:3px 0;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.tag{
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  background:#14335f;
}

.tag.ok{
  background:rgba(27,94,32,.28);
}

.tag.red{
  background:rgba(180,35,35,.28);
}

.vazio{
  text-align:center;
  padding:30px;
  color:var(--muted);
}

@media(max-width:900px){
  .filtros{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="topo">
    <h1>Logs Administrativos</h1>

    <button class="btn" onclick="window.location.href='admin.html'">
      Voltar ADM
    </button>
  </div>

  <div class="painel">

    <div class="filtros">

      <div>
        <label>Ação</label>
        <select id="filtroAcao" onchange="renderLogs()">
          <option value="">Todas</option>
          <option value="aprovar_usuario">Aprovar usuário</option>
          <option value="bloquear_usuario">Bloquear usuário</option>
          <option value="ativar_usuario">Ativar usuário</option>
          <option value="editar_usuario">Editar usuário</option>
          <option value="excluir_usuario">Excluir usuário</option>
          <option value="usuario_pendente">Usuário pendente</option>
          <option value="fotografo_oficial">Fotógrafo oficial</option>
        </select>
      </div>

      <div>
        <label>Admin UID</label>
        <input id="filtroAdmin" oninput="renderLogs()" placeholder="UID do admin">
      </div>

      <div>
        <label>Usuário afetado</label>
        <input id="filtroUsuario" oninput="renderLogs()" placeholder="Nome do usuário">
      </div>

      <div>
        <label>Data</label>
        <input type="date" id="filtroData" onchange="renderLogs()">
      </div>

    </div>

  </div>

  <div class="lista" id="listaLogs">
    <div class="vazio">Carregando logs...</div>
  </div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {
  collection,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

let logsCache = [];

function normalizar(txt){
  return String(txt || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function formatarData(data){

  if(!data) return "-";

  try{

    if(data.seconds){
      return new Date(data.seconds * 1000)
        .toLocaleString("pt-BR");
    }

    return new Date(data)
      .toLocaleString("pt-BR");

  }catch{
    return "-";
  }
}

function acaoBonita(acao){

  const mapa = {
    aprovar_usuario:"Usuário aprovado",
    bloquear_usuario:"Usuário bloqueado",
    ativar_usuario:"Usuário ativado",
    editar_usuario:"Usuário editado",
    excluir_usuario:"Usuário excluído",
    usuario_pendente:"Usuário pendente",
    fotografo_oficial:"Fotógrafo oficial"
  };

  return mapa[acao] || acao;
}

async function carregarLogs(){

  const lista = document.getElementById("listaLogs");

  try{

    const q = query(
      collection(db,"logs_admin"),
      orderBy("data","desc")
    );

    const snap = await getDocs(q);

    logsCache = [];

    snap.forEach(docSnap=>{

      logsCache.push({
        id:docSnap.id,
        ...docSnap.data()
      });
    });

    renderLogs();

  }catch(e){

    console.error(e);

    lista.innerHTML = `
      <div class="vazio">
        Erro ao carregar logs.
      </div>
    `;
  }
}

window.renderLogs = function(){

  const lista = document.getElementById("listaLogs");

  const filtroAcao =
    document.getElementById("filtroAcao").value;

  const filtroAdmin =
    normalizar(document.getElementById("filtroAdmin").value);

  const filtroUsuario =
    normalizar(document.getElementById("filtroUsuario").value);

  const filtroData =
    document.getElementById("filtroData").value;

  let logs = [...logsCache];

  if(filtroAcao){
    logs = logs.filter(l=>l.acao === filtroAcao);
  }

  if(filtroAdmin){
    logs = logs.filter(l=>
      normalizar(l.adminUid).includes(filtroAdmin)
    );
  }

  if(filtroUsuario){
    logs = logs.filter(l=>
      normalizar(l.usuarioAlvoNome).includes(filtroUsuario)
    );
  }

  if(filtroData){

    logs = logs.filter(l=>{

      if(!l.data?.seconds) return false;

      const d = new Date(l.data.seconds * 1000);

      const dataLog =
        d.getFullYear() + "-" +
        String(d.getMonth()+1).padStart(2,"0") + "-" +
        String(d.getDate()).padStart(2,"0");

      return dataLog === filtroData;
    });
  }

  if(!logs.length){

    lista.innerHTML = `
      <div class="vazio">
        Nenhum log encontrado.
      </div>
    `;

    return;
  }

  lista.innerHTML = logs.map(log=>`

    <div class="card">

      <h3>${acaoBonita(log.acao)}</h3>

      <p>
        <strong>Usuário afetado:</strong>
        ${log.usuarioAlvoNome || "-"}
      </p>

      <p>
        <strong>Tipo:</strong>
        ${log.usuarioAlvoTipo || "-"}
      </p>

      <p>
        <strong>Admin UID:</strong>
        ${log.adminUid || "-"}
      </p>

      <p>
        <strong>Data:</strong>
        ${formatarData(log.data)}
      </p>

      <div class="tags">

        <span class="tag">
          ${log.acao || "-"}
        </span>

        ${log.statusNovo ? `
          <span class="tag ok">
            ${log.statusNovo}
          </span>
        ` : ""}

      </div>

    </div>

  `).join("");
};

onAuthStateChanged(auth,user=>{

  if(!user){

    window.location.href = "login.html";
    return;
  }

  carregarLogs();
});

</script>

</body>
</html>
