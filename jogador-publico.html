<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogador Público - Liga Goiana</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="menu.css">

<style>
:root{
  --gold:#f7c600;
  --gold2:#ffe45c;
  --muted:#cbd6ea;
  --gold-line:rgba(247,198,0,.45);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:
    linear-gradient(rgba(2,8,20,.88), rgba(2,8,20,.96)),
    url("fundo.png") center/cover fixed no-repeat;
  color:#fff;
  min-height:100vh;
}

.wrap{
  width:min(100% - 24px,1280px);
  margin:auto;
  padding:22px 0 40px;
}

.hero{
  background:
    radial-gradient(circle at top left, rgba(247,198,0,.18), transparent 34%),
    linear-gradient(135deg, rgba(16,42,82,.97), rgba(8,23,44,.98));
  border:1px solid var(--gold-line);
  border-radius:22px;
  padding:22px;
  display:grid;
  grid-template-columns:180px 1fr;
  gap:22px;
  align-items:center;
  margin-bottom:16px;
}

.foto{
  width:160px;
  height:160px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid var(--gold);
  background:#fff;
}

.hero h1{
  color:var(--gold);
  font-size:38px;
  margin-bottom:8px;
}

.hero p{
  color:var(--muted);
  line-height:1.6;
}

.tags{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}

.tag{
  background:#1a3f73;
  padding:7px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.tag.ok{
  background:#1b5e20;
}

.tag.red{
  background:#b42323;
}

.stats{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:12px;
  margin-bottom:16px;
}

.stat{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.12), transparent 35%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:16px;
  padding:15px;
  text-align:center;
}

.stat strong{
  display:block;
  color:var(--gold);
  font-size:26px;
}

.stat span{
  color:var(--muted);
  font-size:10px;
  font-weight:900;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.panel{
  background:
    radial-gradient(circle at top right, rgba(247,198,0,.10), transparent 35%),
    linear-gradient(180deg, rgba(16,42,82,.96), rgba(8,23,44,.97));
  border:1px solid rgba(247,198,0,.22);
  border-radius:18px;
  overflow:hidden;
}

.panel h2{
  color:var(--gold);
  padding:16px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.panel-body{
  padding:14px;
}

.item{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.item:last-child{
  border-bottom:none;
}

.item span{
  color:var(--muted);
}

.item strong{
  color:#fff;
}

.jogo{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}

.jogo strong{
  display:block;
  margin-bottom:6px;
}

.jogo p{
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}

.loading{
  max-width:700px;
  margin:80px auto;
  background:rgba(16,42,82,.96);
  border:1px solid var(--gold-line);
  color:var(--gold);
  padding:24px;
  border-radius:18px;
  text-align:center;
  font-weight:900;
}

@media(max-width:1100px){
  .stats{
    grid-template-columns:repeat(4,1fr);
  }
}

@media(max-width:700px){
  .hero{
    grid-template-columns:1fr;
    text-align:center;
  }

  .foto{
    margin:auto;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .stats{
    grid-template-columns:1fr 1fr;
  }

  .hero h1{
    font-size:30px;
  }

  .tags{
    justify-content:center;
  }
}

@media(max-width:500px){
  .stats{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="wrap" id="app">

  <div class="loading">
    <i class="fa-solid fa-spinner fa-spin"></i><br>
    Carregando jogador...
  </div>

</div>

<script type="module">

import { renderMenu } from "./menu.js";
import { db } from "./firebase.js";

import {
  collection,
  getDocs,
  getDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

renderMenu("jogadores");

const app = document.getElementById("app");
const id = new URLSearchParams(location.search).get("id");

let jogador = null;
let jogos = [];
let sumulas = [];

function val(obj,chaves,f=""){
  for(const c of chaves){
    if(obj && obj[c] !== undefined && obj[c] !== null && obj[c] !== ""){
      return obj[c];
    }
  }
  return f;
}

function n(t){
  return String(t || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .trim();
}

function nomeJogador(j){
  return val(j,["nome","nomeCompleto","jogador"],"Jogador");
}

function fotoJogador(j){
  return val(j,["foto","imagem","avatar","fotoUrl"],"logo-liga.jfif");
}

function textoRegistro(v,f="-"){
  if(v && typeof v === "object"){
    return val(v,["nome","nomeTime","time","equipe","clube"],f);
  }
  return v || f;
}

function timeJogador(j){
  return textoRegistro(val(j,["time","timeObj","equipe","clube"],""), val(j,["timeNome","nomeTime","equipeNome","clubeNome"],"-"));
}

function timeIdJogador(j){
  return String(
    val(j,["timeId","equipeId","clubeId","idTime"],"") ||
    (val(j,["time","timeObj","equipe","clube"],null)?.id || "") ||
    (val(j,["time","timeObj","equipe","clube"],null)?.timeId || "")
  );
}

function nomeTimeRegistroJogo(j,lado){
  const obj = lado === "A"
    ? val(j,["timeA","mandante","timeMandante"],null)
    : val(j,["timeB","visitante","timeVisitante"],null);

  const direto = lado === "A"
    ? val(j,["timeANome","nomeTimeA","mandanteNome","timeMandanteNome"],"")
    : val(j,["timeBNome","nomeTimeB","visitanteNome","timeVisitanteNome"],"");

  return textoRegistro(obj,direto || (lado === "A" ? "Time A" : "Time B"));
}

function idTimeRegistroJogo(j,lado){
  const obj = lado === "A"
    ? val(j,["timeA","mandante","timeMandante"],null)
    : val(j,["timeB","visitante","timeVisitante"],null);

  const direto = lado === "A"
    ? val(j,["timeAId","mandanteId","timeMandanteId"],"")
    : val(j,["timeBId","visitanteId","timeVisitanteId"],"");

  return String(direto || obj?.id || obj?.timeId || "");
}

function jogoDoTimeDoJogador(j){
  const meuNome = n(timeJogador(jogador));
  const meuId = timeIdJogador(jogador);

  const idA = idTimeRegistroJogo(j,"A");
  const idB = idTimeRegistroJogo(j,"B");
  const nomeA = n(nomeTimeRegistroJogo(j,"A"));
  const nomeB = n(nomeTimeRegistroJogo(j,"B"));

  return (meuId && (idA === meuId || idB === meuId)) || nomeA === meuNome || nomeB === meuNome;
}

function jogadorEhDoLado(j,lado){
  const meuNome = n(timeJogador(jogador));
  const meuId = timeIdJogador(jogador);

  const idLado = idTimeRegistroJogo(j,lado);
  const nomeLado = n(nomeTimeRegistroJogo(j,lado));

  return (meuId && idLado === meuId) || nomeLado === meuNome;
}

function posicao(j){
  return val(j,["posicao","funcao","função"],"-");
}

function categorias(j){
  const cats = val(j,["categorias"],[]);
  if(Array.isArray(cats) && cats.length) return cats;
  const cat = val(j,["categoria","categoriaNome"],"");
  return cat ? [cat] : [];
}

function mesmoJogador(item){
  if(!item || !jogador) return false;

  const ids = [
    val(item,["id","uid"],""),
    val(item,["jogadorId","idJogador","atletaId","playerId"],"")
  ].map(v=>String(v || "")).filter(Boolean);

  if(ids.includes(String(id || ""))) return true;

  const cpfItem = n(val(item,["cpf","CPF"],""));
  const cpfJogador = n(val(jogador,["cpf","CPF"],""));

  if(cpfItem && cpfJogador && cpfItem === cpfJogador) return true;

  const numeroItem = String(val(item,["numero","camisa","numeroCamisa"],"")).trim();
  const numeroJogador = String(val(jogador,["numero","camisa","numeroCamisa"],"")).trim();

  const nomeItem = n(val(item,["nome","jogador","nomeJogador","jogadorNome","atleta"],""));
  const nomeBase = n(nomeJogador(jogador));

  if(nomeItem && nomeBase && nomeItem === nomeBase) return true;

  return false;
}

function finalizado(j){
  return j.finalizado === true ||
    j.encerrado === true ||
    j.sumulaFinalizada === true ||
    n(val(j,["status"],"")) === "finalizado";
}


function dataMs(v){
  if(!v) return 0;
  if(typeof v.toDate === "function") return v.toDate().getTime();
  const d = new Date(v).getTime();
  return Number.isFinite(d) ? d : 0;
}

function dataBR(v){
  if(!v) return "-";
  if(typeof v.toDate === "function") v = v.toDate();
  const d = new Date(v);
  if(!isNaN(d.getTime())){
    return d.toLocaleDateString("pt-BR");
  }
  return String(v);
}

function statusFinalizadoRegistro(j){
  const st = n(val(j,["status","sumulaStatus"],""));
  return finalizado(j) || st.includes("final");
}

function calcular(){

  let jogosCount = 0;
  let gols = 0;
  let assistencias = 0;
  let amarelos = 0;
  let vermelhos = 0;
  let v = 0;
  let e = 0;
  let d = 0;

  const recentesMap = new Map();
  const partidasContadas = new Set();

  sumulas.forEach(s=>{

    const elenco = [
      ...(Array.isArray(s.escalacao) ? s.escalacao : []),
      ...(Array.isArray(s.jogadores) ? s.jogadores : []),
      ...(Array.isArray(s.jogadoresA) ? s.jogadoresA.map(p=>({...p,time:"A"})) : []),
      ...(Array.isArray(s.jogadoresB) ? s.jogadoresB.map(p=>({...p,time:"B"})) : []),
      ...(Array.isArray(s.escalacaoA) ? s.escalacaoA.map(p=>({...p,time:"A"})) : []),
      ...(Array.isArray(s.escalacaoB) ? s.escalacaoB.map(p=>({...p,time:"B"})) : [])
    ];

    const participou = elenco.some(p=>mesmoJogador(p));

    if(participou){
      const partidaId = String(val(s,["jogoId","id"], s.id || ""));
      if(partidaId && !partidasContadas.has(partidaId)){
        partidasContadas.add(partidaId);
        jogosCount++;
      }
    }

    const golsLista = [
      ...(Array.isArray(s.gols) ? s.gols : []),
      ...(Array.isArray(s.golsLista) ? s.golsLista : [])
    ];

    golsLista.forEach(ev=>{
      if(!mesmoJogador(ev)) return;
      const tipo = n(val(ev,["tipo","evento","acao"],"gol"));
      if(!tipo.includes("contra")) gols++;
    });

    const assistenciasLista = [
      ...(Array.isArray(s.assistencias) ? s.assistencias : []),
      ...(Array.isArray(s.assistenciasLista) ? s.assistenciasLista : [])
    ];

    assistenciasLista.forEach(ev=>{
      if(mesmoJogador(ev)) assistencias++;
    });

    const cartoesLista = [
      ...(Array.isArray(s.cartoes) ? s.cartoes : []),
      ...(Array.isArray(s.cartoesLista) ? s.cartoesLista : [])
    ];

    cartoesLista.forEach(ev=>{
      if(!mesmoJogador(ev)) return;
      const tipo = n(val(ev,["tipo","cartao","cor"],""));
      if(tipo.includes("verm")) vermelhos++;
      else amarelos++;
    });
  });

  jogos.forEach(j=>{

    if(!jogoDoTimeDoJogador(j)) return;

    recentesMap.set(j.id || Math.random(), j);

    if(statusFinalizadoRegistro(j)){

      const ga = Number(val(j,["golsA","placarA"],0));
      const gb = Number(val(j,["golsB","placarB"],0));

      if(jogadorEhDoLado(j,"A")){
        if(ga > gb) v++;
        else if(ga === gb) e++;
        else d++;
      }else if(jogadorEhDoLado(j,"B")){
        if(gb > ga) v++;
        else if(gb === ga) e++;
        else d++;
      }
    }
  });

  const pontos = (v * 3) + e;
  const total = v + e + d;

  const aproveitamento = total
    ? Math.round((pontos / (total * 3)) * 100)
    : 0;

  const recentes = Array.from(recentesMap.values())
    .sort((a,b)=>dataMs(val(b,["dataHora","data","dataJogo"],"")) - dataMs(val(a,["dataHora","data","dataJogo"],"")))
    .slice(0,8);

  return {
    jogos:jogosCount || Number(val(jogador,["jogos","partidas","participacoes"],0)),
    gols:gols || Number(val(jogador,["gols","totalGols"],0)),
    assistencias:assistencias || Number(val(jogador,["assistencias","totalAssistencias"],0)),
    amarelos:amarelos || Number(val(jogador,["amarelos","cartoesAmarelos"],0)),
    vermelhos:vermelhos || Number(val(jogador,["vermelhos","cartoesVermelhos"],0)),
    v,e,d,
    aproveitamento,
    suspenso:
      vermelhos > 0 ||
      amarelos >= 3 ||
      jogador.suspenso === true,
    recentes
  };
}

function jogoNome(j){
  const a = nomeTimeRegistroJogo(j,"A");
  const b = nomeTimeRegistroJogo(j,"B");
  return `${a} x ${b}`;
}

function render(){

  if(!jogador){
    app.innerHTML = `<div class="loading">Jogador não encontrado.</div>`;
    return;
  }

  const s = calcular();

  app.innerHTML = `
    <section class="hero">

      <img class="foto" src="${fotoJogador(jogador)}" onerror="this.src='logo-liga.jfif'">

      <div>

        <h1>${nomeJogador(jogador)}</h1>

        <p>
          Jogador oficial da Liga Goiana de Futebol de Base.<br>
          Time: ${timeJogador(jogador)}<br>
          Posição: ${posicao(jogador)}<br>
          Camisa: ${val(jogador,["numero","camisa","numeroCamisa"],"-")}
        </p>

        <div class="tags">

          <span class="tag">${timeJogador(jogador)}</span>

          ${categorias(jogador).map(c=>`
            <span class="tag">${c}</span>
          `).join("")}

          ${
            s.suspenso
            ? `<span class="tag red">Suspenso</span>`
            : `<span class="tag ok">Liberado</span>`
          }

        </div>

      </div>

    </section>

    <section class="stats">

      <div class="stat">
        <strong>${s.jogos}</strong>
        <span>JOGOS</span>
      </div>

      <div class="stat">
        <strong>${s.gols}</strong>
        <span>GOLS</span>
      </div>

      <div class="stat">
        <strong>${s.assistencias}</strong>
        <span>ASSIST.</span>
      </div>

      <div class="stat">
        <strong>${s.amarelos}</strong>
        <span>AMARELOS</span>
      </div>

      <div class="stat">
        <strong>${s.vermelhos}</strong>
        <span>VERMELHOS</span>
      </div>

      <div class="stat">
        <strong>${s.v}</strong>
        <span>VITÓRIAS</span>
      </div>

      <div class="stat">
        <strong>${s.e}</strong>
        <span>EMPATES</span>
      </div>

      <div class="stat">
        <strong>${s.d}</strong>
        <span>DERROTAS</span>
      </div>

    </section>

    <section class="grid">

      <div class="panel">

        <h2><i class="fa-solid fa-chart-line"></i> Estatísticas</h2>

        <div class="panel-body">

          <div class="item">
            <span>Aproveitamento</span>
            <strong>${s.aproveitamento}%</strong>
          </div>

          <div class="item">
            <span>Status</span>
            <strong>${s.suspenso ? "Suspenso" : "Liberado"}</strong>
          </div>

          <div class="item">
            <span>Posição</span>
            <strong>${posicao(jogador)}</strong>
          </div>

          <div class="item">
            <span>Categoria</span>
            <strong>${categorias(jogador).join(", ")}</strong>
          </div>

        </div>

      </div>

      <div class="panel">

        <h2><i class="fa-solid fa-calendar-days"></i> Jogos recentes</h2>

        <div class="panel-body">

          ${
            s.recentes.length
            ? s.recentes.map(j=>`
              <div class="jogo">

                <strong>${jogoNome(j)}</strong>

                <p>
                  Campeonato: ${val(j,["campeonato","campeonatoNome"],"-")}<br>
                  Categoria: ${val(j,["categoria"],"-")}<br>
                  Data: ${dataBR(val(j,["dataHora","data","dataJogo"],""))}<br>
                  Status: ${val(j,["status"],"-")}
                </p>

              </div>
            `).join("")
            : `<div class="loading">Nenhum jogo encontrado.</div>`
          }

        </div>

      </div>

    </section>
  `;
}

async function carregar(){

  if(!id){
    app.innerHTML = `<div class="loading">ID do jogador não informado.</div>`;
    return;
  }

  const jogadorSnap = await getDoc(doc(db,"jogadores",id));

  if(jogadorSnap.exists()){

    jogador = {
      id:jogadorSnap.id,
      ...jogadorSnap.data()
    };
  }

  const jogosSnap = await getDocs(collection(db,"jogos"));

  jogos = jogosSnap.docs.map(d=>({
    id:d.id,
    ...d.data()
  }));

  const sumulasSnap = await getDocs(collection(db,"sumulas"));

  sumulas = sumulasSnap.docs.map(d=>({
    id:d.id,
    ...d.data()
  }));

  render();
}

carregar();

</script>

</body>
</html>
